<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futuristic Sound Maker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    :root {
      --primary: #0ff;
      --secondary: #f0f;
      --dark: #111;
      --light: #fff;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    
    body {
      background-color: var(--dark);
      color: var(--light);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }
    
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    
    .glow {
      text-shadow: 0 0 10px var(--primary);
      animation: glow 2s infinite alternate;
    }
    
    @keyframes glow {
      from {
        text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary);
      }
      to {
        text-shadow: 0 0 20px var(--primary), 0 0 30px var(--primary);
      }
    }
    
    .panel {
      background: rgba(30, 30, 40, 0.8);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
      border: 1px solid rgba(0, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }
    
    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      z-index: 1;
    }
    
    .flex {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    .col {
      flex: 1;
      min-width: 300px;
    }
    
    .controls {
      margin-bottom: 20px;
    }
    
    h2 {
      margin-bottom: 15px;
      color: var(--primary);
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      color: var(--light);
    }
    
    input[type="range"] {
      width: 100%;
      background: #333;
      height: 8px;
      border-radius: 4px;
      outline: none;
      margin-bottom: 15px;
      -webkit-appearance: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: var(--primary);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--primary);
    }
    
    select, input[type="number"] {
      width: 100%;
      padding: 8px 12px;
      background: #222;
      border: 1px solid #444;
      color: var(--light);
      border-radius: 5px;
      margin-bottom: 15px;
    }
    
    button {
      padding: 10px 20px;
      background: linear-gradient(45deg, var(--secondary), var(--primary));
      border: none;
      color: var(--dark);
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 10px;
      margin-bottom: 10px;
      transition: all 0.3s;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
    }
    
    .keyboard {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }
    
    .key {
      width: 40px;
      height: 120px;
      background: #fff;
      border: 1px solid #000;
      display: inline-block;
      margin: 0 2px;
      position: relative;
      cursor: pointer;
      border-radius: 0 0 5px 5px;
    }
    
    .key.black {
      background: #000;
      width: 30px;
      height: 80px;
      margin-left: -15px;
      margin-right: -15px;
      z-index: 2;
    }
    
    .key.active {
      background: var(--primary);
      box-shadow: 0 0 15px var(--primary);
    }
    
    .key.black.active {
      background: var(--secondary);
      box-shadow: 0 0 15px var(--secondary);
    }
    
    .pads {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .pad {
      aspect-ratio: 1;
      background: #222;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 5px 0 #111;
      transition: all 0.1s;
    }
    
    .pad::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .pad:hover::after {
      opacity: 1;
    }
    
    .pad.active {
      transform: translateY(5px);
      box-shadow: 0 0 0 #111;
    }
    
    .pad.active::after {
      opacity: 1;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.5), rgba(255, 0, 255, 0.5));
    }
    
    .visualizer {
      width: 100%;
      height: 150px;
      background: #111;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .loading-bar {
      height: 5px;
      width: 0;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      position: absolute;
      bottom: 0;
      left: 0;
      transition: width 0.3s;
    }
    
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .preset-btn {
      flex: 1;
      min-width: 120px;
    }
    
    footer {
      text-align: center;
      margin-top: 50px;
      padding: 20px;
      font-size: 0.9rem;
      color: #777;
    }
    
    .effect-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 20px;
    }
    
    .effect-btn {
      padding: 15px;
      text-align: center;
      background: rgba(30, 30, 40, 0.8);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid rgba(0, 255, 255, 0.2);
    }
    
    .effect-btn:hover {
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
      transform: translateY(-2px);
    }
    
    .effect-btn.active {
      background: rgba(0, 255, 255, 0.2);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
    }
    
    @media (max-width: 768px) {
      .pads {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .effect-pad {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    /* Futuristic Elements */
    .glowing-line {
      height: 1px;
      width: 100%;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      margin: 30px 0;
      position: relative;
    }
    
    .glowing-line::before {
      content: '';
      position: absolute;
      left: 0;
      top: -5px;
      width: 10px;
      height: 10px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--primary);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% {
        box-shadow: 0 0 10px var(--primary);
      }
      50% {
        box-shadow: 0 0 20px var(--primary), 0 0 30px var(--primary);
      }
      100% {
        box-shadow: 0 0 10px var(--primary);
      }
    }
    
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 255, 255, 0.2);
      padding: 15px 20px;
      border-radius: 8px;
      border-left: 4px solid var(--primary);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
      transform: translateX(200%);
      transition: transform 0.3s;
      z-index: 1000;
    }
    
    .notification.show {
      transform: translateX(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>SONIC <span class="glow">PULSE</span></h1>
      <p>Create, customize, and download futuristic sound effects & music</p>
    </header>
    
    <div class="panel">
      <div class="visualizer">
        <canvas id="visualizer"></canvas>
        <div class="loading-bar" id="loadingBar"></div>
      </div>
      
      <div class="flex">
        <div class="col">
          <button id="playBtn">▶ PLAY</button>
          <button id="stopBtn">■ STOP</button>
          <button id="recordBtn">● REC</button>
          <button id="downloadBtn">↓ DOWNLOAD</button>
        </div>
        <div class="col">
          <label for="bpm">TEMPO (BPM)</label>
          <input type="range" id="bpm" min="60" max="200" value="120">
          <span id="bpmValue">120 BPM</span>
        </div>
      </div>
    </div>
    
    <div class="flex">
      <div class="col">
        <div class="panel">
          <h2>SYNTHESIZER</h2>
          <div class="controls">
            <label for="waveform">WAVEFORM</label>
            <select id="waveform">
              <option value="sine">Sine</option>
              <option value="square">Square</option>
              <option value="sawtooth">Sawtooth</option>
              <option value="triangle">Triangle</option>
              <option value="pwm">PWM</option>
              <option value="fmsine">FM Sine</option>
              <option value="amsine">AM Sine</option>
              <option value="fatsawtooth">Fat Sawtooth</option>
              <option value="fatsquare">Fat Square</option>
            </select>
            
            <label for="attack">ATTACK</label>
            <input type="range" id="attack" min="0.01" max="2" step="0.01" value="0.1">
            
            <label for="decay">DECAY</label>
            <input type="range" id="decay" min="0.01" max="2" step="0.01" value="0.2">
            
            <label for="sustain">SUSTAIN</label>
            <input type="range" id="sustain" min="0" max="1" step="0.01" value="0.5">
            
            <label for="release">RELEASE</label>
            <input type="range" id="release" min="0.01" max="5" step="0.01" value="0.5">
          </div>
          
          <div class="keyboard" id="keyboard">
            <!-- Keys will be added with JavaScript -->
          </div>
        </div>
        
        <div class="panel">
          <h2>SOUND EFFECTS</h2>
          <div class="effect-pad" id="effectPad">
            <div class="effect-btn" data-effect="laser">LASER</div>
            <div class="effect-btn" data-effect="explosion">EXPLOSION</div>
            <div class="effect-btn" data-effect="woosh">WOOSH</div>
            <div class="effect-btn" data-effect="powerup">POWER UP</div>
            <div class="effect-btn" data-effect="alarm">ALARM</div>
            <div class="effect-btn" data-effect="beep">BEEP</div>
          </div>
        </div>
      </div>
      
      <div class="col">
        <div class="panel">
          <h2>DRUM MACHINE</h2>
          <div class="controls">
            <label for="drumVolume">VOLUME</label>
            <input type="range" id="drumVolume" min="0" max="1" step="0.01" value="0.8">
          </div>
          
          <div class="pads" id="drumPads">
            <!-- Drum pads will be added with JavaScript -->
          </div>
        </div>
        
        <div class="panel">
          <h2>EFFECTS & FILTERS</h2>
          <div class="controls">
            <label for="filterCutoff">FILTER CUTOFF</label>
            <input type="range" id="filterCutoff" min="50" max="15000" step="1" value="15000">
            
            <label for="filterResonance">RESONANCE</label>
            <input type="range" id="filterResonance" min="0" max="20" step="0.1" value="1">
            
            <label for="delayTime">DELAY TIME</label>
            <input type="range" id="delayTime" min="0" max="1" step="0.01" value="0.3">
            
            <label for="delayFeedback">DELAY FEEDBACK</label>
            <input type="range" id="delayFeedback" min="0" max="0.9" step="0.01" value="0.4">
            
            <label for="reverbDecay">REVERB SIZE</label>
            <input type="range" id="reverbDecay" min="0.1" max="10" step="0.1" value="1">
          </div>
        </div>
      </div>
    </div>
    
    <div class="panel">
      <h2>PRESETS</h2>
      <div class="presets">
        <button class="preset-btn" data-preset="synthwave">SYNTHWAVE</button>
        <button class="preset-btn" data-preset="cyberpunk">CYBERPUNK</button>
        <button class="preset-btn" data-preset="scifi">SCI-FI</button>
        <button class="preset-btn" data-preset="lofi">LO-FI</button>
        <button class="preset-btn" data-preset="ambient">AMBIENT</button>
        <button class="preset-btn" data-preset="techno">TECHNO</button>
      </div>
    </div>
    
    <div class="glowing-line"></div>
    
    <footer>
      <p>SONIC PULSE v1.0 | Futuristic Sound Maker</p>
    </footer>
  </div>
  
  <div class="notification" id="notification">
    Sound effect created successfully!
  </div>
  
  <script>
    // Initialize Tone.js
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for user interaction before starting audio context
      document.body.addEventListener('click', function() {
        if (Tone.context.state !== 'running') Tone.context.resume();
      }, { once: true });
      
      // Create synth
      const synth = new Tone.PolySynth(Tone.Synth).toDestination();
      
      // Set up effects
      const filter = new Tone.Filter(15000, "lowpass").toDestination();
      const delay = new Tone.FeedbackDelay(0.3, 0.4).connect(filter);
      const reverb = new Tone.Reverb(1).connect(filter);
      
      // Connect synth to effects chain
      synth.disconnect();
      synth.connect(delay);
      synth.connect(reverb);
      synth.connect(filter);
      
      // Drum machine setup
      const drumSamples = {
        kick: new Tone.Player('https://teropa.info/ext-assets/drumkit/kick.mp3').toDestination(),
        snare: new Tone.Player('https://teropa.info/ext-assets/drumkit/snare.mp3').toDestination(),
        hihat: new Tone.Player('https://teropa.info/ext-assets/drumkit/hihat.mp3').toDestination(),
        openhat: new Tone.Player('https://teropa.info/ext-assets/drumkit/openhat.mp3').toDestination(),
        clap: new Tone.Player('https://teropa.info/ext-assets/drumkit/clap.mp3').toDestination(),
        rim: new Tone.Player('https://teropa.info/ext-assets/drumkit/rim.mp3').toDestination(),
        tom: new Tone.Player('https://teropa.info/ext-assets/drumkit/tom.mp3').toDestination(),
        crash: new Tone.Player('https://teropa.info/ext-assets/drumkit/crash.mp3').toDestination()
      };
      
      // Load all drum samples
      Tone.loaded().then(() => {
        console.log("All samples loaded");
        document.getElementById('loadingBar').style.width = "100%";
      });
      
      // Set up recorder
      const recorder = new Tone.Recorder();
      filter.connect(recorder);
      let recording = false;
      let recordedBlob = null;
      
      // Set up visualizer
      const analyser = new Tone.Analyser("waveform", 128);
      filter.connect(analyser);
      
      const canvas = document.getElementById("visualizer");
      const canvasCtx = canvas.getContext("2d");
      
      function drawVisualizer() {
        const width = canvas.width;
        const height = canvas.height;
        canvasCtx.clearRect(0, 0, width, height);
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = '#0ff';
        canvasCtx.shadowBlur = 10;
        canvasCtx.shadowColor = '#0ff';
        const waveform = analyser.getValue();
        canvasCtx.beginPath();
        const sliceWidth = width / waveform.length;
        let x = 0;
        for (let i = 0; i < waveform.length; i++) {
          const v = waveform[i] * 0.5 + 0.5;
          const y = v * height;
          if (i === 0) {
            canvasCtx.moveTo(x, y);
          } else {
            canvasCtx.lineTo(x, y);
          }
          x += sliceWidth;
        }
        canvasCtx.stroke();
        requestAnimationFrame(drawVisualizer);
      }
      
      drawVisualizer();
      
      // Resize canvas to match container
      function resizeCanvas() {
        const container = document.querySelector('.visualizer');
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
      }
      
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      
      // Create keyboard
      const keyboard = document.getElementById('keyboard');
      const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
      const octave = 4;
      
      notes.forEach((note) => {
        const key = document.createElement('div');
        key.className = `key ${note.includes('#') ? 'black' : ''}`;
        key.dataset.note = `${note}${octave}`;
        keyboard.appendChild(key);
        // Event listeners for mouse
        key.addEventListener('mousedown', () => {
          playNote(`${note}${octave}`);
          key.classList.add('active');
        });
        key.addEventListener('mouseup', () => {
          stopNote(`${note}${octave}`);
          key.classList.remove('active');
        });
        key.addEventListener('mouseleave', () => {
          stopNote(`${note}${octave}`);
          key.classList.remove('active');
        });
      });
      
      // Create drum pads
      const drumPads = document.getElementById('drumPads');
      const drumTypes = ['kick', 'snare', 'hihat', 'openhat', 'clap', 'rim', 'tom', 'crash'];
      
      drumTypes.forEach(type => {
        const pad = document.createElement('div');
        pad.className = 'pad';
        pad.textContent = type.toUpperCase();
        pad.dataset.drum = type;
        drumPads.appendChild(pad);
        pad.addEventListener('mousedown', () => {
          pad.classList.add('active');
          playDrum(type);
        });
        pad.addEventListener('mouseup', () => {
          pad.classList.remove('active');
        });
        pad.addEventListener('mouseleave', () => {
          pad.classList.remove('active');
        });
      });
      
      // Sound effects
      const effectButtons = document.querySelectorAll('.effect-btn');
      effectButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          playEffect(btn.dataset.effect);
          showNotification(`${btn.dataset.effect.toUpperCase()} effect created!`);
          btn.classList.add('active');
          setTimeout(() => {
            btn.classList.remove('active');
          }, 300);
        });
      });
      
      // Notification system
      function showNotification(message) {
        const notification = document.getElementById('notification');
        notification.textContent = message;
        notification.classList.add('show');
        setTimeout(() => {
          notification.classList.remove('show');
        }, 3000);
      }
      
      // Functions to play sounds
      function playNote(note) {
        const attack = parseFloat(document.getElementById('attack').value);
        const decay = parseFloat(document.getElementById('decay').value);
        const sustain = parseFloat(document.getElementById('sustain').value);
        const release = parseFloat(document.getElementById('release').value);
        synth.set({
          envelope: {
            attack: attack,
            decay: decay,
            sustain: sustain,
            release: release
          }
        });
        synth.triggerAttack(note);
      }
      
      function stopNote(note) {
        synth.triggerRelease(note);
      }
      
      function playDrum(type) {
        const volume = parseFloat(document.getElementById('drumVolume').value);
        drumSamples[type].volume.value = Tone.gainToDb(volume);
        drumSamples[type].start();
      }
      
      function playEffect(effect) {
        const now = Tone.now();
        switch(effect) {
          case 'laser':
            const laser = new Tone.Synth({
              oscillator: { type: 'sawtooth' },
              envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.1 }
            }).connect(filter);
            laser.frequency.setValueAtTime(3000, now);
            laser.frequency.exponentialRampToValueAtTime(200, now + 0.3);
            laser.triggerAttackRelease(0.3, now);
            break;
            
          case 'explosion':
            const noise = new Tone.NoiseSynth({
              noise: { type: 'brown' },
              envelope: { attack: 0.01, decay: 0.3, sustain: 0.3, release: 0.5 }
            }).connect(filter);
            noise.volume.setValueAtTime(-10, now);
            noise.volume.exponentialRampToValueAtTime(-40, now + 0.8);
            noise.triggerAttackRelease(0.8, now);
            break;
            
          case 'woosh':
            const woosh = new Tone.NoiseSynth({
              noise: { type: 'pink' },
              envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 0.3 }
            }).connect(filter);
            const wooshFilter = new Tone.Filter({
              frequency: 400,
              type: 'bandpass',
              Q: 2
            }).connect(filter);
            woosh.connect(wooshFilter);
            wooshFilter.frequency.setValueAtTime(100, now);
            wooshFilter.frequency.exponentialRampToValueAtTime(8000, now + 0.6);
            woosh.triggerAttackRelease(0.6, now);
            break;
            
          case 'powerup':
            const powerup = new Tone.Synth({
              oscillator: { type: 'sine' },
              envelope: { attack: 0.01, decay: 0.1, sustain: 0.5, release: 0.1 }
            }).connect(filter);
            powerup.frequency.setValueAtTime(300, now);
            powerup.frequency.exponentialRampToValueAtTime(1200, now + 0.4);
            powerup.triggerAttackRelease(0.4, now);
            break;
            
          case 'alarm':
            const alarm = new Tone.Synth({
              oscillator: { type: 'square' },
              envelope: { attack: 0.01, decay: 0.3, sustain: 0.5, release: 0.1 }
            }).connect(filter);
            for (let i = 0; i < 5; i++) {
              alarm.triggerAttackRelease(800, now + i * 0.15, 0.7);
            }
            break;
            
          case 'beep':
            const beep = new Tone.Synth({
              oscillator: { type: 'sine' },
              envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }
            }).connect(filter);
            beep.triggerAttackRelease(880, 0.1, now);
            beep.triggerAttackRelease(1320, 0.1, now + 0.15);
            break;
        }
      }
      
      // Event listeners for controls
      document.getElementById('waveform').addEventListener('change', function() {
        synth.set({
          oscillator: {
            type: this.value
          }
        });
      });
      
      document.getElementById('bpm').addEventListener('input', function() {
        const bpm = parseInt(this.value);
        document.getElementById('bpmValue').textContent = bpm + " BPM";
        Tone.Transport.bpm.value = bpm;
      });
      
      document.getElementById('filterCutoff').addEventListener('input', function() {
        filter.frequency.value = parseFloat(this.value);
      });
      
      document.getElementById('filterResonance').addEventListener('input', function() {
        filter.Q.value = parseFloat(this.value);
      });
      
      document.getElementById('delayTime').addEventListener('input', function() {
        delay.delayTime.value = parseFloat(this.value);
      });
      
      document.getElementById('delayFeedback').addEventListener('input', function() {
        delay.feedback.value = parseFloat(this.value);
      });
      
      document.getElementById('reverbDecay').addEventListener('input', function() {
        reverb.decay = parseFloat(this.value);
      });
      
      // Buttons
      document.getElementById('playBtn').addEventListener('click', function() {
        Tone.Transport.start();
        showNotification("Playback started");
      });
      
      document.getElementById('stopBtn').addEventListener('click', function() {
        Tone.Transport.stop();
        showNotification("Playback stopped");
      });
      
      document.getElementById('recordBtn').addEventListener('click', async function() {
        if (!recording) {
          await Tone.start();
          recorder.start();
          recording = true;
          this.textContent = "■ STOP REC";
          this.style.background = "linear-gradient(45deg, #f00, #f0f)";
          showNotification("Recording started");
        } else {
          const recordedData = await recorder.stop();
          recording = false;
          recordedBlob = recordedData;
          this.textContent = "● REC";
          this.style.background = "";
          showNotification("Recording finished");
        }
      });
      
      document.getElementById('downloadBtn').addEventListener('click', function() {
        if (recordedBlob) {
          const url = URL.createObjectURL(recordedBlob);
          const a = document.createElement("a");
          document.body.appendChild(a);
          a.style.display = "none";
          a.href = url;
          a.download = "sonic-pulse-recording.mp3";
          a.click();
          window.URL.revokeObjectURL(url);
          showNotification("Downloaded audio file");
        } else {
          showNotification("Record something first!");
        }
      });
      
      // Presets
      const presets = {
        synthwave: {
          waveform: 'sawtooth',
          attack: 0.01,
          decay: 0.3,
          sustain: 0.4,
          release: 0.8,
          filterCutoff: 1500,
          filterResonance: 5,
          delayTime: 0.3,
          delayFeedback: 0.5,
          reverbDecay: 2.5
        },
        cyberpunk: {
          waveform: 'square',
          attack: 0.01,
          decay: 0.1,
          sustain: 0.3,
          release: 0.2,
          filterCutoff: 3000,
          filterResonance: 10,
          delayTime: 0.15,
          delayFeedback: 0.7,
          reverbDecay: 1.2
        },
        scifi: {
          waveform: 'fmsine',
          attack: 0.05,
          decay: 0.5,
          sustain: 0.2,
          release: 1.5,
          filterCutoff: 5000,
          filterResonance: 8,
          delayTime: 0.4,
          delayFeedback: 0.3,
          reverbDecay: 4
        },
        lofi: {
          waveform: 'triangle',
          attack: 0.05,
          decay: 0.1,
          sustain: 0.8,
          release: 0.3,
          filterCutoff: 1000,
          filterResonance: 1,
          delayTime: 0.2,
          delayFeedback: 0.2,
          reverbDecay: 1.5
        },
        ambient: {
          waveform: 'sine',
          attack: 0.5,
          decay: 1,
          sustain: 0.7,
          release: 3,
          filterCutoff: 8000,
          filterResonance: 2,
          delayTime: 0.6,
          delayFeedback: 0.6,
          reverbDecay: 8
        },
        techno: {
          waveform: 'fatsawtooth',
          attack: 0.01,
          decay: 0.2,
          sustain: 0.5,
          release: 0.2,
          filterCutoff: 2000,
          filterResonance: 12,
          delayTime: 0.25,
          delayFeedback: 0.4,
          reverbDecay: 0.8
        }
      };
      
      const presetButtons = document.querySelectorAll('.preset-btn');
      presetButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          const preset = presets[btn.dataset.preset];
          document.getElementById('waveform').value = preset.waveform;
          document.getElementById('attack').value = preset.attack;
          document.getElementById('decay').value = preset.decay;
          document.getElementById('sustain').value = preset.sustain;
          document.getElementById('release').value = preset.release;
          document.getElementById('filterCutoff').value = preset.filterCutoff;
          document.getElementById('filterResonance').value = preset.filterResonance;
          document.getElementById('delayTime').value = preset.delayTime;
          document.getElementById('delayFeedback').value = preset.delayFeedback;
          document.getElementById('reverbDecay').value = preset.reverbDecay;
          
          // Apply settings
          synth.set({
            oscillator: {
              type: preset.waveform
            },
            envelope: {
              attack: preset.attack,
              decay: preset.decay,
              sustain: preset.sustain,
              release: preset.release
            }
          });
          
          filter.frequency.value = preset.filterCutoff;
          filter.Q.value = preset.filterResonance;
          delay.delayTime.value = preset.delayTime;
          delay.feedback.value = preset.delayFeedback;
          reverb.decay = preset.reverbDecay;
          
          showNotification(`${btn.dataset.preset.toUpperCase()} preset loaded`);
        });
      });
      
      // Keyboard controls
      const keyboardMap = {
        'a': 'C4',
        'w': 'C#4',
        's': 'D4',
        'e': 'D#4',
        'd': 'E4',
        'f': 'F4',
        't': 'F#4',
        'g': 'G4',
        'y': 'G#4',
        'h': 'A4',
        'u': 'A#4',
        'j': 'B4'
      };
      
      document.addEventListener('keydown', function(e) {
        if (!e.repeat && keyboardMap[e.key]) {
          const note = keyboardMap[e.key];
          playNote(note);
          const keyElement = document.querySelector(`.key[data-note="${note}"]`);
          if (keyElement) keyElement.classList.add('active');
        }
      });
      
      document.addEventListener('keyup', function(e) {
        if (keyboardMap[e.key]) {
          const note = keyboardMap[e.key];
          stopNote(note);
          const keyElement = document.querySelector(`.key[data-note="${note}"]`);
          if (keyElement) keyElement.classList.remove('active');
        }
      });
    });
  </script>
</body>
</html>
