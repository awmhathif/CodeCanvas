<!DOCTYPE html><html lang="en"><head><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peaceful Sound Creator</title>
    <style>
        :root {
            --glow-color-1: #00eeff;
            --glow-color-2: #ff00e6;
            --glow-color-3: #8400ff;
            --bg-color: #0a0a12;
            --panel-color: rgba(20, 20, 30, 0.8);
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--glow-color-1), 
                         0 0 20px var(--glow-color-1),
                         0 0 40px var(--glow-color-1);
            background: linear-gradient(90deg, var(--glow-color-1), var(--glow-color-2), var(--glow-color-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 8s linear infinite;
        }
        
        @keyframes glow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        .controls-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .sound-module {
            background-color: var(--panel-color);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 238, 255, 0.3);
            transition: box-shadow 0.3s ease;
        }
        
        .sound-module:hover {
            box-shadow: 0 0 25px rgba(0, 238, 255, 0.6);
        }
        
        .sound-module h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: var(--glow-color-1);
            text-shadow: 0 0 5px var(--glow-color-1);
        }
        
        .slider-container {
            margin-bottom: 15px;
        }
        
        .slider-container label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #cccccc;
        }
        
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, #1a1a2e, #0f3057);
            outline: none;
            margin-bottom: 10px;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--glow-color-1);
            cursor: pointer;
            box-shadow: 0 0 10px var(--glow-color-1);
        }
        
        button {
            background: linear-gradient(45deg, var(--glow-color-3), var(--glow-color-1));
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 238, 255, 0.5);
            outline: none;
            margin: 5px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 238, 255, 0.8);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        button.active {
            background: linear-gradient(45deg, #ff00e6, #ff5e00);
            box-shadow: 0 0 15px rgba(255, 0, 230, 0.8);
        }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .visualizer {
            width: 100%;
            height: 200px;
            background-color: var(--panel-color);
            border-radius: 15px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 238, 255, 0.3);
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 25px;
            background-color: var(--panel-color);
            box-shadow: 0 0 15px rgba(0, 238, 255, 0.3);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }
        
        .status.show {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .controls-panel {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .button-group {
                flex-direction: column;
                align-items: center;
            }
            
            button {
                width: 100%;
                max-width: 300px;
            }
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--color) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Peaceful Sound Creator</h1>
        </header>
        
        <div class="controls-panel">
            <div class="sound-module" id="ambient-module">
                <h2>Ambient Pad</h2>
                <div class="slider-container">
                    <label for="ambient-volume">Volume</label>
                    <input type="range" id="ambient-volume" min="0" max="1" step="0.01" value="0.5">
                </div>
                <div class="slider-container">
                    <label for="ambient-frequency">Frequency</label>
                    <input type="range" id="ambient-frequency" min="50" max="500" step="1" value="100">
                </div>
                <div class="slider-container">
                    <label for="ambient-modulation">Modulation</label>
                    <input type="range" id="ambient-modulation" min="0" max="10" step="0.1" value="2">
                </div>
                <button id="ambient-toggle">Start Ambient</button>
            </div>
            
            <div class="sound-module" id="chimes-module">
                <h2>Gentle Chimes</h2>
                <div class="slider-container">
                    <label for="chimes-volume">Volume</label>
                    <input type="range" id="chimes-volume" min="0" max="1" step="0.01" value="0.5">
                </div>
                <div class="slider-container">
                    <label for="chimes-frequency">Frequency</label>
                    <input type="range" id="chimes-frequency" min="200" max="2000" step="1" value="800">
                </div>
                <div class="slider-container">
                    <label for="chimes-rate">Rate</label>
                    <input type="range" id="chimes-rate" min="1" max="10" step="0.1" value="3">
                </div>
                <button id="chimes-toggle">Start Chimes</button>
            </div>
            
            <div class="sound-module" id="water-module">
                <h2>Water Sounds</h2>
                <div class="slider-container">
                    <label for="water-volume">Volume</label>
                    <input type="range" id="water-volume" min="0" max="1" step="0.01" value="0.5">
                </div>
                <div class="slider-container">
                    <label for="water-density">Density</label>
                    <input type="range" id="water-density" min="1" max="100" step="1" value="20">
                </div>
                <div class="slider-container">
                    <label for="water-filter">Filter</label>
                    <input type="range" id="water-filter" min="200" max="10000" step="100" value="3000">
                </div>
                <button id="water-toggle">Start Water</button>
            </div>
        </div>
        
        <div class="visualizer">
            <canvas id="visualizer-canvas"></canvas>
        </div>
        
        <div class="button-group">
            <button id="record-button">Start Recording</button>
            <button id="download-button" disabled="">Download Recording</button>
            <button id="reset-button">Reset All</button>
        </div>
    </div>
    
    <div class="status" id="status-message"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Audio Context
            let audioContext;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                showStatus('Web Audio API is not supported in this browser', 5000);
                return;
            }
            
            // Main gain node for overall volume
            const masterGainNode = audioContext.createGain();
            masterGainNode.gain.value = 0.7;
            masterGainNode.connect(audioContext.destination);
            
            // For recording
            let mediaRecorder;
            let audioChunks = [];
            let isRecording = false;
            const recordButton = document.getElementById('record-button');
            const downloadButton = document.getElementById('download-button');
            const resetButton = document.getElementById('reset-button');
            
            // Sound modules
            const ambientModule = {
                isPlaying: false,
                oscillator: null,
                lfo: null,
                gain: audioContext.createGain(),
                toggle: document.getElementById('ambient-toggle'),
                volumeControl: document.getElementById('ambient-volume'),
                frequencyControl: document.getElementById('ambient-frequency'),
                modulationControl: document.getElementById('ambient-modulation')
            };
            
            const chimesModule = {
                isPlaying: false,
                intervalId: null,
                gain: audioContext.createGain(),
                toggle: document.getElementById('chimes-toggle'),
                volumeControl: document.getElementById('chimes-volume'),
                frequencyControl: document.getElementById('chimes-frequency'),
                rateControl: document.getElementById('chimes-rate')
            };
            
            const waterModule = {
                isPlaying: false,
                intervalId: null,
                gain: audioContext.createGain(),
                filter: audioContext.createBiquadFilter(),
                toggle: document.getElementById('water-toggle'),
                volumeControl: document.getElementById('water-volume'),
                densityControl: document.getElementById('water-density'),
                filterControl: document.getElementById('water-filter')
            };
            
            // Connect module gain nodes to master gain
            ambientModule.gain.connect(masterGainNode);
            chimesModule.gain.connect(masterGainNode);
            waterModule.filter.connect(waterModule.gain);
            waterModule.gain.connect(masterGainNode);
            
            // Set up filter
            waterModule.filter.type = 'lowpass';
            waterModule.filter.frequency.value = 3000;
            
            // Initialize volume values
            ambientModule.gain.gain.value = parseFloat(ambientModule.volumeControl.value);
            chimesModule.gain.gain.value = parseFloat(chimesModule.volumeControl.value);
            waterModule.gain.gain.value = parseFloat(waterModule.volumeControl.value);
            
            // Set up visualizer
            const canvas = document.getElementById('visualizer-canvas');
            const canvasCtx = canvas.getContext('2d');
            const analyser = audioContext.createAnalyser();
            masterGainNode.connect(analyser);
            analyser.fftSize = 2048;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            // Ambient Pad Sound
            ambientModule.toggle.addEventListener('click', function() {
                if (ambientModule.isPlaying) {
                    stopAmbient();
                } else {
                    startAmbient();
                }
            });
            
            function startAmbient() {
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                ambientModule.oscillator = audioContext.createOscillator();
                ambientModule.lfo = audioContext.createOscillator();
                const lfoGain = audioContext.createGain();
                
                ambientModule.oscillator.type = 'sine';
                ambientModule.lfo.type = 'sine';
                
                const frequency = parseFloat(ambientModule.frequencyControl.value);
                const modulation = parseFloat(ambientModule.modulationControl.value);
                
                ambientModule.oscillator.frequency.value = frequency;
                ambientModule.lfo.frequency.value = 0.2;
                lfoGain.gain.value = modulation;
                
                ambientModule.lfo.connect(lfoGain);
                lfoGain.connect(ambientModule.oscillator.frequency);
                ambientModule.oscillator.connect(ambientModule.gain);
                
                ambientModule.oscillator.start();
                ambientModule.lfo.start();
                
                ambientModule.isPlaying = true;
                ambientModule.toggle.textContent = 'Stop Ambient';
                ambientModule.toggle.classList.add('active');
                
                // Create particles for ambient effect
                createParticles('ambient');
            }
            
            function stopAmbient() {
                if (ambientModule.oscillator) {
                    ambientModule.oscillator.stop();
                    ambientModule.lfo.stop();
                    ambientModule.oscillator = null;
                    ambientModule.lfo = null;
                }
                
                ambientModule.isPlaying = false;
                ambientModule.toggle.textContent = 'Start Ambient';
                ambientModule.toggle.classList.remove('active');
            }
            
            // Update ambient parameters
            ambientModule.volumeControl.addEventListener('input', function() {
                ambientModule.gain.gain.value = parseFloat(this.value);
            });
            
            ambientModule.frequencyControl.addEventListener('input', function() {
                if (ambientModule.oscillator) {
                    ambientModule.oscillator.frequency.value = parseFloat(this.value);
                }
            });
            
            ambientModule.modulationControl.addEventListener('input', function() {
                if (ambientModule.lfo && ambientModule.oscillator) {
                    const lfoGain = audioContext.createGain();
                    lfoGain.gain.value = parseFloat(this.value);
                    ambientModule.lfo.connect(lfoGain);
                    lfoGain.connect(ambientModule.oscillator.frequency);
                }
            });
            
            // Chimes Sound
            chimesModule.toggle.addEventListener('click', function() {
                if (chimesModule.isPlaying) {
                    stopChimes();
                } else {
                    startChimes();
                }
            });
            
            function startChimes() {
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                const rate = 1000 / parseFloat(chimesModule.rateControl.value);
                
                chimesModule.intervalId = setInterval(function() {
                    playChime();
                }, rate);
                
                chimesModule.isPlaying = true;
                chimesModule.toggle.textContent = 'Stop Chimes';
                chimesModule.toggle.classList.add('active');
            }
            
            function playChime() {
                const oscillator = audioContext.createOscillator();
                const envelope = audioContext.createGain();
                
                oscillator.type = 'sine';
                
                // Random frequency around base frequency
                const baseFreq = parseFloat(chimesModule.frequencyControl.value);
                const randomOffset = Math.random() * 200 - 100; // -100 to +100
                oscillator.frequency.value = baseFreq + randomOffset;
                
                // Connect oscillator through envelope to module gain
                oscillator.connect(envelope);
                envelope.connect(chimesModule.gain);
                
                // Quick attack, long release envelope
                envelope.gain.value = 0;
                const now = audioContext.currentTime;
                envelope.gain.setValueAtTime(0, now);
                envelope.gain.linearRampToValueAtTime(0.3 * Math.random() + 0.1, now + 0.02);
                envelope.gain.exponentialRampToValueAtTime(0.001, now + 3 + Math.random() * 2);
                
                oscillator.start();
                oscillator.stop(now + 5);
                
                // Create particles for chime effect
                createParticles('chime');
                
                oscillator.onended = function() {
                    oscillator.disconnect();
                    envelope.disconnect();
                };
            }
            
            function stopChimes() {
                if (chimesModule.intervalId) {
                    clearInterval(chimesModule.intervalId);
                    chimesModule.intervalId = null;
                }
                
                chimesModule.isPlaying = false;
                chimesModule.toggle.textContent = 'Start Chimes';
                chimesModule.toggle.classList.remove('active');
            }
            
            // Update chimes parameters
            chimesModule.volumeControl.addEventListener('input', function() {
                chimesModule.gain.gain.value = parseFloat(this.value);
            });
            
            chimesModule.rateControl.addEventListener('input', function() {
                if (chimesModule.isPlaying) {
                    stopChimes();
                    startChimes();
                }
            });
            
            // Water Sound
            waterModule.toggle.addEventListener('click', function() {
                if (waterModule.isPlaying) {
                    stopWater();
                } else {
                    startWater();
                }
            });
            
            function startWater() {
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                const density = parseFloat(waterModule.densityControl.value);
                
                waterModule.intervalId = setInterval(function() {
                    for (let i = 0; i < 3; i++) {
                        playWaterDrop();
                    }
                }, 1000 / density);
                
                waterModule.isPlaying = true;
                waterModule.toggle.textContent = 'Stop Water';
                waterModule.toggle.classList.add('active');
            }
            
            function playWaterDrop() {
                const noise = audioContext.createBufferSource();
                const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.1, audioContext.sampleRate);
                const data = buffer.getChannelData(0);
                
                // Fill buffer with noise
                for (let i = 0; i < buffer.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                noise.buffer = buffer;
                
                // Create envelope for the noise
                const envelope = audioContext.createGain();
                envelope.gain.value = 0;
                
                const now = audioContext.currentTime;
                envelope.gain.setValueAtTime(0, now);
                envelope.gain.linearRampToValueAtTime(Math.random() * 0.05 + 0.02, now + 0.002);
                envelope.gain.exponentialRampToValueAtTime(0.001, now + 0.1 + Math.random() * 0.1);
                
                noise.connect(envelope);
                envelope.connect(waterModule.filter);
                
                noise.start();
                noise.stop(now + 0.2);
                
                // Create particles for water effect
                createParticles('water');
                
                noise.onended = function() {
                    noise.disconnect();
                    envelope.disconnect();
                };
            }
            
            function stopWater() {
                if (waterModule.intervalId) {
                    clearInterval(waterModule.intervalId);
                    waterModule.intervalId = null;
                }
                
                waterModule.isPlaying = false;
                waterModule.toggle.textContent = 'Start Water';
                waterModule.toggle.classList.remove('active');
            }
            
            // Update water parameters
            waterModule.volumeControl.addEventListener('input', function() {
                waterModule.gain.gain.value = parseFloat(this.value);
            });
            
            waterModule.densityControl.addEventListener('input', function() {
                if (waterModule.isPlaying) {
                    stopWater();
                    startWater();
                }
            });
            
            waterModule.filterControl.addEventListener('input', function() {
                waterModule.filter.frequency.value = parseFloat(this.value);
            });
            
            // Recording functionality
            recordButton.addEventListener('click', function() {
                if (!isRecording) {
                    startRecording();
                } else {
                    stopRecording();
                }
            });
            
            downloadButton.addEventListener('click', function() {
                downloadRecording();
            });
            
            function startRecording() {
                // Create a MediaStream from the audio context
                const destination = audioContext.createMediaStreamDestination();
                masterGainNode.connect(destination);
                
                // Create a MediaRecorder
                mediaRecorder = new MediaRecorder(destination.stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = function(event) {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = function() {
                    downloadButton.disabled = false;
                    showStatus('Recording stopped. Click "Download Recording" to save.', 5000);
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordButton.textContent = 'Stop Recording';
                recordButton.classList.add('active');
                showStatus('Recording started...', 2000);
            }
            
            function stopRecording() {
                if (mediaRecorder && isRecording) {
                    mediaRecorder.stop();
                    isRecording = false;
                    recordButton.textContent = 'Start Recording';
                    recordButton.classList.remove('active');
                }
            }
            
            function downloadRecording() {
                if (audioChunks.length === 0) {
                    showStatus('No recording available to download.', 3000);
                    return;
                }
                
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                const url = URL.createObjectURL(audioBlob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'peaceful-sound-' + new Date().toISOString() + '.mp3';
                document.body.appendChild(a);
                a.click();
                
                // Clean up
                setTimeout(function() {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
                
                showStatus('Recording downloaded!', 3000);
            }
            
            // Reset all buttons
            resetButton.addEventListener('click', function() {
                if (ambientModule.isPlaying) stopAmbient();
                if (chimesModule.isPlaying) stopChimes();
                if (waterModule.isPlaying) stopWater();
                if (isRecording) stopRecording();
                
                // Reset sliders
                ambientModule.volumeControl.value = 0.5;
                ambientModule.frequencyControl.value = 100;
                ambientModule.modulationControl.value = 2;
                
                chimesModule.volumeControl.value = 0.5;
                chimesModule.frequencyControl.value = 800;
                chimesModule.rateControl.value = 3;
                
                waterModule.volumeControl.value = 0.5;
                waterModule.densityControl.value = 20;
                waterModule.filterControl.value = 3000;
                
                // Apply reset values
                ambientModule.gain.gain.value = 0.5;
                chimesModule.gain.gain.value = 0.5;
                waterModule.gain.gain.value = 0.5;
                waterModule.filter.frequency.value = 3000;
                
                showStatus('All settings reset.', 2000);
            });
            
            // Visualizer animation
            function drawVisualizer() {
                requestAnimationFrame(drawVisualizer);
                
                // Adjust canvas size if window is resized
                if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
                    canvas.width = canvas.clientWidth;
                    canvas.height = canvas.clientHeight;
                }
                
                // Get frequency data
                analyser.getByteFrequencyData(dataArray);
                
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw based on what's playing
                if (ambientModule.isPlaying || chimesModule.isPlaying || waterModule.isPlaying) {
                    drawWaveform();
                } else {
                    drawIdleState();
                }
            }
            
            function drawWaveform() {
                const width = canvas.width;
                const height = canvas.height;
                const barWidth = width / bufferLength * 5;
                
                canvasCtx.fillStyle = 'rgba(10, 10, 18, 0.2)';
                canvasCtx.fillRect(0, 0, width, height);
                
                let x = 0;
                
                // Create gradient
                const gradient = canvasCtx.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, 'rgba(0, 238, 255, 0.8)');
                gradient.addColorStop(0.5, 'rgba(132, 0, 255, 0.6)');
                gradient.addColorStop(1, 'rgba(255, 0, 230, 0.4)');
                
                for (let i = 0; i < bufferLength; i+=5) {
                    const barHeight = dataArray[i] / 255 * height * 0.8;
                    
                    canvasCtx.fillStyle = gradient;
                    canvasCtx.fillRect(x, height - barHeight, barWidth, barHeight);
                    
                    x += barWidth + 1;
                }
            }
            
            function drawIdleState() {
                const width = canvas.width;
                const height = canvas.height;
                
                // Clear with gradient
                const bgGradient = canvasCtx.createLinearGradient(0, 0, 0, height);
                bgGradient.addColorStop(0, 'rgba(20, 20, 30, 1)');
                bgGradient.addColorStop(1, 'rgba(10, 10, 18, 1)');
                
                canvasCtx.fillStyle = bgGradient;
                canvasCtx.fillRect(0, 0, width, height);
                
                // Draw text
                canvasCtx.fillStyle = 'rgba(0, 238, 255, 0.5)';
                canvasCtx.font = '20px Arial';
                canvasCtx.textAlign = 'center';
                canvasCtx.fillText('Start a sound to see visualization', width/2, height/2);
            }
            
            // Particles effect
            function createParticles(type) {
                const visualizer = document.querySelector('.visualizer');
                const particleCount = type === 'chime' ? 1 : (type === 'water' ? 3 : 5);
                
                for (let i = 0; i < particleCount; i++) {
                    setTimeout(() => {
                        const particle = document.createElement('div');
                        particle.classList.add('particle');
                        
                        // Different colors for different sound types
                        let color;
                        if (type === 'ambient') {
                            color = 'rgba(0, 238, 255, 0.7)';
                        } else if (type === 'chime') {
                            color = 'rgba(255, 0, 230, 0.7)';
                        } else {
                            color = 'rgba(132, 0, 255, 0.7)';
                        }
                        
                        particle.style.setProperty('--color', color);
                        
                        // Random position
                        const size = Math.random() * 100 + 50;
                        const x = Math.random() * visualizer.offsetWidth;
                        const y = Math.random() * visualizer.offsetHeight;
                        
                        particle.style.width = size + 'px';
                        particle.style.height = size + 'px';
                        particle.style.left = x + 'px';
                        particle.style.top = y + 'px';
                        
                        visualizer.appendChild(particle);
                        
                        // Animate
                        setTimeout(() => {
                            particle.style.opacity = 0.7;
                        }, 10);
                        
                        setTimeout(() => {
                            particle.style.opacity = 0;
                            setTimeout(() => {
                                visualizer.removeChild(particle);
                            }, 300);
                        }, 1000);
                    }, i * 200);
                }
            }
            
            // Status message helper
            function showStatus(message, duration) {
                const status = document.getElementById('status-message');
                status.textContent = message;
                status.classList.add('show');
                
                setTimeout(function() {
                    status.classList.remove('show');
                }, duration);
            }
            
            // Start visualizer
            drawVisualizer();
            
            // Show welcome message
            showStatus('Welcome to Peaceful Sound Creator!', 3000);
        });
    </script>
