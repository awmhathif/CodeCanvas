<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoTone Piano</title>
    <style>
        :root {
            --primary-glow: #0ff;
            --secondary-glow: #f0f;
            --key-white: rgba(255, 255, 255, 0.9);
            --key-black: rgba(0, 0, 0, 0.8);
            --bg-dark: #111;
            --bg-darker: #000;
            --text-color: #fff;
            --control-bg: rgba(40, 40, 40, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: linear-gradient(45deg, var(--bg-darker), var(--bg-dark));
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            touch-action: manipulation;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 10px var(--primary-glow);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 auto;
        }

        .menu-btn, .settings-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 10px 5px;
            background: var(--control-bg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .control-group {
            margin: 5px;
            text-align: center;
            flex: 1;
            min-width: 70px;
            max-width: 120px;
        }

        .control-label {
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .btn {
            background: rgba(60, 60, 60, 0.8);
            border: 1px solid rgba(100, 100, 100, 0.5);
            border-radius: 5px;
            color: var(--text-color);
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.active {
            background: rgba(0, 255, 200, 0.2);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .btn.record {
            background: rgba(255, 0, 0, 0.3);
        }

        .btn.record.active {
            background: rgba(255, 0, 0, 0.6);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 15px rgba(255, 0, 0, 0.8); }
            100% { box-shadow: 0 0 5px rgba(255, 0, 0, 0.5); }
        }

        .slider-container {
            width: 100%;
            margin-top: 5px;
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: var(--primary-glow);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .visualizer-container {
            height: 60px;
            width: 100%;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: height 0.3s;
        }

        .visualizer-container.hidden {
            height: 0;
        }

        #visualizer {
            width: 100%;
            height: 100%;
        }

        .keyboard-container {
            flex: 1;
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 10px 0;
            -webkit-overflow-scrolling: touch;
        }

        .piano-keyboard {
            height: 100%;
            min-width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            padding-bottom: 5px;
        }

        .piano-key {
            height: 100%;
            position: relative;
            display: inline-block;
            border-radius: 0 0 5px 5px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.05s;
            will-change: transform, box-shadow;
        }

        .white-key {
            background: var(--key-white);
            width: calc(100vw / 7);
            z-index: 1;
            border: 1px solid rgba(0, 0, 0, 0.3);
        }

        .black-key {
            background: var(--key-black);
            width: calc(100vw / 12);
            height: 65%;
            z-index: 2;
            margin-left: calc(-1 * (100vw / 24));
            margin-right: calc(-1 * (100vw / 24));
        }

        .piano-key.active {
            transform: translateY(5px);
            box-shadow: 0 0 10px var(--primary-glow), 0 0 20px var(--primary-glow);
        }

        .white-key.active {
            background: linear-gradient(to bottom, rgba(0, 255, 255, 0.3), var(--key-white));
        }

        .black-key.active {
            background: linear-gradient(to bottom, rgba(255, 0, 255, 0.3), var(--key-black));
        }

        .key-label {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.7);
            pointer-events: none;
        }

        .black-key .key-label {
            color: rgba(255, 255, 255, 0.7);
            bottom: 5px;
            font-size: 10px;
        }

        .note-ripple {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 10px;
            background: var(--primary-glow);
            border-radius: 50%;
            opacity: 0.7;
            pointer-events: none;
            animation: ripple 0.5s ease-out;
            z-index: 3;
        }

        @keyframes ripple {
            0% { 
                height: 10px;
                width: 30%;
                opacity: 0.7;
            }
            100% { 
                height: 100%;
                width: 100%;
                opacity: 0;
            }
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--bg-dark);
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
            max-height: 80%;
            overflow-y: auto;
            box-shadow: 0 0 20px var(--primary-glow);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .modal-header {
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-group {
            margin-bottom: 15px;
        }

        .settings-label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            opacity: 0.9;
        }

        .dropdown {
            width: 100%;
            padding: 8px;
            background: rgba(60, 60, 60, 0.8);
            border: 1px solid rgba(100, 100, 100, 0.5);
            color: var(--text-color);
            border-radius: 5px;
        }

        .recordings-list {
            list-style: none;
            margin-top: 10px;
        }

        .recording-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .recording-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 5px;
        }

        .recording-btn-group {
            display: flex;
            gap: 5px;
        }

        .recording-btn {
            background: rgba(60, 60, 60, 0.8);
            border: none;
            color: var(--text-color);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .recording-btn.play {
            background: rgba(0, 200, 100, 0.3);
        }

        .recording-btn.delete {
            background: rgba(255, 50, 50, 0.3);
        }

        .recording-btn.download {
            background: rgba(0, 100, 255, 0.3);
        }

        .metronome-display {
            font-size: 20px;
            margin-top: 5px;
            font-weight: bold;
        }

        .metronome-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 3px;
        }

        .metronome-dot.active {
            background: var(--primary-glow);
            box-shadow: 0 0 5px var(--primary-glow);
        }

        .chord-display {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 16px;
            pointer-events: none;
        }

        .glow-effect {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.1;
            background: radial-gradient(circle, var(--primary-glow), transparent 70%);
            filter: blur(20px);
            animation: glow-move 20s infinite alternate;
            z-index: -1;
        }

        @keyframes glow-move {
            0% { left: -100px; top: -100px; }
            25% { left: 80%; top: 10%; }
            50% { left: 50%; top: 80%; }
            75% { left: 10%; top: 60%; }
            100% { left: 70%; top: -50px; }
        }

        .glow-effect:nth-child(2) {
            background: radial-gradient(circle, var(--secondary-glow), transparent 70%);
            animation-delay: -5s;
            animation-duration: 25s;
            width: 200px;
            height: 200px;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: -1;
            perspective: 500px;
            transform-style: preserve-3d;
            transform: rotateX(60deg);
            opacity: 0.3;
        }

        .loop-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            width: 100%;
        }

        .loop-indicator {
            height: 4px;
            background: rgba(0, 255, 255, 0.2);
            flex-grow: 1;
            margin: 0 10px;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .loop-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--primary-glow);
            width: 0%;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .effect-panel {
            display: flex;
            overflow-x: auto;
            padding: 5px;
            background: rgba(20, 20, 20, 0.5);
        }

        .effect-item {
            flex: 0 0 auto;
            margin: 0 5px;
            background: rgba(40, 40, 40, 0.8);
            border-radius: 5px;
            padding: 5px 10px;
            color: var(--text-color);
            border: 1px solid rgba(80, 80, 80, 0.5);
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }

        .effect-item.active {
            background: rgba(0, 200, 255, 0.2);
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px var(--primary-glow);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="menu-btn">☰</button>
            <h1>NeoTone Piano</h1>
            <button class="settings-btn">⚙</button>
        </header>
        
        <div class="control-panel">
            <div class="control-group">
                <div class="control-label">Record</div>
                <button class="btn record" id="recordBtn">REC</button>
            </div>
            
            <div class="control-group">
                <div class="control-label">Octave</div>
                <div class="btn-group">
                    <button class="btn" id="octaveDownBtn">-</button>
                    <span id="octaveDisplay" style="margin: 0 5px;">4</span>
                    <button class="btn" id="octaveUpBtn">+</button>
                </div>
            </div>
            
            <div class="control-group">
                <div class="control-label">Volume</div>
                <div class="slider-container">
                    <input type="range" min="0" max="100" value="80" class="slider" id="volumeSlider">
                </div>
            </div>
            
            <div class="control-group">
                <div class="control-label">Metronome</div>
                <button class="btn" id="metronomeBtn">OFF</button>
            </div>
            
            <div class="control-group">
                <div class="control-label">Visualize</div>
                <button class="btn" id="visualizerBtn">SHOW</button>
            </div>
        </div>
        
        <div class="effect-panel">
            <div class="effect-item" id="reverbEffect">Reverb</div>
            <div class="effect-item" id="delayEffect">Delay</div>
            <div class="effect-item" id="chorusEffect">Chorus</div>
            <div class="effect-item" id="distortionEffect">Distortion</div>
            <div class="effect-item" id="wahEffect">Wah</div>
            <div class="effect-item" id="flangerEffect">Flanger</div>
        </div>
        
        <div class="visualizer-container hidden">
            <canvas id="visualizer"></canvas>
        </div>
        
        <div class="keyboard-container">
            <div class="piano-keyboard" id="pianoKeyboard">
                <!-- Keys will be generated by JavaScript -->
            </div>
            <div class="chord-display" id="chordDisplay"></div>
        </div>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <button class="modal-close" id="closeSettingsBtn">×</button>
            <h2 class="modal-header">Settings</h2>
            
            <div class="settings-group">
                <label class="settings-label">Instrument Sound</label>
                <select class="dropdown" id="instrumentSelect">
                    <option value="piano">Grand Piano</option>
                    <option value="electric-piano">Electric Piano</option>
                    <option value="synth">Synth</option>
                    <option value="organ">Organ</option>
                    <option value="strings">Strings</option>
                    <option value="bass">Bass</option>
                    <option value="guitar">Guitar</option>
                </select>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">Key Labels</label>
                <select class="dropdown" id="keyLabelsSelect">
                    <option value="notes">Note Names (C, D, E...)</option>
                    <option value="keyboard">Keyboard Keys (A, S, D...)</option>
                    <option value="both">Both</option>
                    <option value="none">None</option>
                </select>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">Sustain Length</label>
                <div class="slider-container">
                    <input type="range" min="0.2" max="5" step="0.1" value="1.5" class="slider" id="sustainSlider">
                    <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                        <span>Short</span>
                        <span>Long</span>
                    </div>
                </div>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">Metronome Speed (BPM)</label>
                <div class="slider-container">
                    <input type="range" min="40" max="240" value="120" class="slider" id="tempoBPMSlider">
                    <div style="text-align: center; margin-top: 5px;">
                        <span id="tempoBPMDisplay">120</span> BPM
                    </div>
                </div>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">Theme Color</label>
                <select class="dropdown" id="themeSelect">
                    <option value="cyan-magenta">Cyan & Magenta</option>
                    <option value="blue-purple">Blue & Purple</option>
                    <option value="green-yellow">Green & Yellow</option>
                    <option value="red-orange">Red & Orange</option>
                    <option value="rainbow">Rainbow Flow</option>
                </select>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">Recording Quality</label>
                <select class="dropdown" id="recordingQualitySelect">
                    <option value="high">High (320kbps)</option>
                    <option value="medium" selected>Medium (192kbps)</option>
                    <option value="low">Low (128kbps)</option>
                </select>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">MIDI Support</label>
                <button class="btn" id="midiBtn">Connect MIDI Device</button>
            </div>
        </div>
    </div>
    
    <!-- Recordings Modal -->
    <div class="modal" id="recordingsModal">
        <div class="modal-content">
            <button class="modal-close" id="closeRecordingsBtn">×</button>
            <h2 class="modal-header">My Recordings</h2>
            
            <div class="settings-group">
                <button class="btn" id="exportAllBtn">Export All Recordings</button>
            </div>
            
            <ul class="recordings-list" id="recordingsList">
                <!-- Recordings will be listed here by JavaScript -->
                <li class="recording-item">
                    <span class="recording-name">No recordings yet</span>
                </li>
            </ul>
        </div>
    </div>
    
    <!-- Loop Recording Modal -->
    <div class="modal" id="loopModal">
        <div class="modal-content">
            <button class="modal-close" id="closeLoopBtn">×</button>
            <h2 class="modal-header">Loop Creator</h2>
            
            <div class="settings-group">
                <label class="settings-label">Loop Length (bars)</label>
                <select class="dropdown" id="loopLengthSelect">
                    <option value="1">1 Bar</option>
                    <option value="2" selected>2 Bars</option>
                    <option value="4">4 Bars</option>
                    <option value="8">8 Bars</option>
                </select>
            </div>
            
            <div class="settings-group">
                <button class="btn" id="startLoopBtn">Start Recording Loop</button>
                <button class="btn" id="clearLoopBtn" style="margin-top: 10px;">Clear Loop</button>
            </div>
            
            <div class="loop-controls">
                <button class="btn" id="playLoopBtn">▶</button>
                <div class="loop-indicator">
                    <div class="loop-progress" id="loopProgress"></div>
                </div>
                <button class="btn" id="stopLoopBtn">■</button>
            </div>
            
            <div class="settings-group">
                <button class="btn" id="saveLoopBtn">Save as MP3</button>
            </div>
        </div>
    </div>
    
    <!-- Background effects -->
    <div class="glow-effect"></div>
    <div class="glow-effect"></div>
    <div class="grid-bg"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Audio Context setup
            let audioContext;
            let masterGainNode;
            let currentOctave = 4;
            let sustainLength = 1.5;
            let isRecording = false;
            let mediaRecorder = null;
            let audioChunks = [];
            let recordingStream = null;
            let metronomeInterval = null;
            let isMetronomeOn = false;
            let metronomeBPM = 120;
            let currentBeat = 0;
            let visualizerActive = false;
            let analyser = null;
            let visualizerContext = null;
            
            // Audio effects nodes
            let reverbNode = null;
            let delayNode = null;
            let chorusNode = null;
            let distortionNode = null;
            let wahNode = null;
            let flangerNode = null;
            
            // Active effects
            const activeEffects = {
                reverb: false,
                delay: false,
                chorus: false,
                distortion: false,
                wah: false,
                flanger: false
            };
            
            // Initialize piano keyboard
            const pianoKeyboard = document.getElementById('pianoKeyboard');
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const keyboardMapping = {
                'z': 'C', 's': 'C#', 'x': 'D', 'd': 'D#', 'c': 'E', 'v': 'F',
                'g': 'F#', 'b': 'G', 'h': 'G#', 'n': 'A', 'j': 'A#', 'm': 'B',
                'q': 'C', '2': 'C#', 'w': 'D', '3': 'D#', 'e': 'E', 'r': 'F',
                '5': 'F#', 't': 'G', '6': 'G#', 'y': 'A', '7': 'A#', 'u': 'B'
            };
            
            const activeNotes = new Map(); // Keep track of active notes and their oscillators
            const recordedNotes = []; // Store recorded notes for loop playback
            
            // Initialize UI controls
            const recordBtn = document.getElementById('recordBtn');
            const octaveDownBtn = document.getElementById('octaveDownBtn');
            const octaveUpBtn = document.getElementById('octaveUpBtn');
            const octaveDisplay = document.getElementById('octaveDisplay');
            const volumeSlider = document.getElementById('volumeSlider');
            const metronomeBtn = document.getElementById('metronomeBtn');
            const visualizerBtn = document.getElementById('visualizerBtn');
            const menuBtn = document.querySelector('.menu-btn');
            const settingsBtn = document.querySelector('.settings-btn');
            const closeSettingsBtn = document.getElementById('closeSettingsBtn');
            const closeRecordingsBtn = document.getElementById('closeRecordingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const recordingsModal = document.getElementById('recordingsModal');
            const instrumentSelect = document.getElementById('instrumentSelect');
            const keyLabelsSelect = document.getElementById('keyLabelsSelect');
            const sustainSlider = document.getElementById('sustainSlider');
            const tempoBPMSlider = document.getElementById('tempoBPMSlider');
            const tempoBPMDisplay = document.getElementById('tempoBPMDisplay');
            const themeSelect = document.getElementById('themeSelect');
            const visualizerContainer = document.querySelector('.visualizer-container');
            const visualizerCanvas = document.getElementById('visualizer');
            const chordDisplay = document.getElementById('chordDisplay');
            
            // Effect controls
            const reverbEffect = document.getElementById('reverbEffect');
            const delayEffect = document.getElementById('delayEffect');
            const chorusEffect = document.getElementById('chorusEffect');
            const distortionEffect = document.getElementById('distortionEffect');
            const wahEffect = document.getElementById('wahEffect');
            const flangerEffect = document.getElementById('flangerEffect');
            
            // Initialize Audio Context when user interacts
            function initAudio() {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    masterGainNode = audioContext.createGain();
                    masterGainNode.gain.value = volumeSlider.value / 100;
                    masterGainNode.connect(audioContext.destination);
                    
                    // Create analyzer node for visualizer
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    masterGainNode.connect(analyser);
                    
                    // Initialize effect nodes
                    initEffectNodes();
                }
            }
            
            // Initialize audio effects
            function initEffectNodes() {
                // Reverb (ConvolverNode would be used in a complete implementation)
                reverbNode = audioContext.createGain();
                
                // Delay
                delayNode = audioContext.createDelay();
                delayNode.delayTime.value = 0.3;
                const delayFeedback = audioContext.createGain();
                delayFeedback.gain.value = 0.4;
                delayNode.connect(delayFeedback);
                delayFeedback.connect(delayNode);
                
                // Chorus (simplified version)
                chorusNode = audioContext.createGain();
                
                // Distortion
                distortionNode = audioContext.createWaveShaper();
                function createDistortionCurve(amount) {
                    const samples = 44100;
                    const curve = new Float32Array(samples);
                    const deg = Math.PI / 180;
                    
                    for (let i = 0; i < samples; ++i) {
                        const x = (i * 2) / samples - 1;
                        curve[i] = (3 + amount) * x * 20 * deg / (Math.PI + amount * Math.abs(x));
                    }
                    
                    return curve;
                }
                distortionNode.curve = createDistortionCurve(400);
                distortionNode.oversample = '4x';
                
                // Wah and Flanger would use dynamic filters
                wahNode = audioContext.createGain();
                flangerNode = audioContext.createGain();
            }
            
            // Create the piano keyboard
            function createKeyboard() {
                pianoKeyboard.innerHTML = '';
                
                // Create 2 octaves of keys
                for (let octave = currentOctave; octave <= currentOctave + 1; octave++) {
                    for (let i = 0; i < notes.length; i++) {
                        const note = notes[i];
                        const isBlack = note.includes('#');
                        const keyElement = document.createElement('div');
                        const noteWithOctave = note + octave;
                        
                        keyElement.className = `piano-key ${isBlack ? 'black-key' : 'white-key'}`;
                        keyElement.dataset.note = noteWithOctave;
                        
                        // Add appropriate key label based on settings
                        const keyLabel = document.createElement('div');
                        keyLabel.className = 'key-label';
                        
                        // This is a simplified version - you'd need to map this properly
                        const keyboardKey = Object.keys(keyboardMapping).find(
                            key => keyboardMapping[key] === note && 
                            (octave === currentOctave ? key.toLowerCase() === key : key.toUpperCase() === key)
                        );
                        
                        let labelType = keyLabelsSelect ? keyLabelsSelect.value : 'notes';
                        
                        if (labelType === 'notes' || labelType === 'both') {
                            keyLabel.textContent = note;
                        }
                        if (labelType === 'keyboard' || labelType === 'both') {
                            if (keyboardKey) {
                                keyLabel.textContent = labelType === 'both' 
                                    ? `${keyLabel.textContent} (${keyboardKey})` 
                                    : keyboardKey;
                            }
                        }
                        
                        keyElement.appendChild(keyLabel);
                        pianoKeyboard.appendChild(keyElement);
                        
                        // Add touch and mouse event listeners
                        keyElement.addEventListener('touchstart', function(e) {
                            e.preventDefault();
                            playNote(noteWithOctave);
                        });
                        
                        keyElement.addEventListener('touchend', function(e) {
                            e.preventDefault();
                            stopNote(noteWithOctave);
                        });
                        
                        keyElement.addEventListener('mousedown', function(e) {
                            playNote(noteWithOctave);
                        });
                        
                        keyElement.addEventListener('mouseup', function() {
                            stopNote(noteWithOctave);
                        });
                        
                        keyElement.addEventListener('mouseleave', function() {
                            stopNote(noteWithOctave);
                        });
                    }
                }
            }
            
            // Play a note
            function playNote(note) {
                initAudio();
                
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                // Check if note is already playing
                if (activeNotes.has(note)) {
                    return;
                }
                
                // Parse the note and octave
                const noteName = note.replace(/\d+$/, '');
                const octave = parseInt(note.match(/\d+$/)[0]);
                
                // Convert note to frequency
                const noteIndex = notes.indexOf(noteName);
                const frequency = 440 * Math.pow(2, (noteIndex - 9 + (octave - 4) * 12) / 12);
                
                // Create oscillator
                const oscillator = audioContext.createOscillator();
                const instrumentType = instrumentSelect ? instrumentSelect.value : 'piano';
                
                // Set oscillator type based on instrument
                switch(instrumentType) {
                    case 'piano':
                        oscillator.type = 'sine';
                        break;
                    case 'electric-piano':
                        oscillator.type = 'triangle';
                        break;
                    case 'synth':
                        oscillator.type = 'sawtooth';
                        break;
                    case 'organ':
                        oscillator.type = 'square';
                        break;
                    case 'strings':
                        oscillator.type = 'sine';
                        break;
                    case 'bass':
                        oscillator.type = 'sawtooth';
                        break;
                    case 'guitar':
                        oscillator.type = 'triangle';
                        break;
                    default:
                        oscillator.type = 'sine';
                }
                
                oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
                
                // Create gain node for envelope
                const gainNode = audioContext.createGain();
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, audioContext.currentTime + 0.01);
                
                // Apply audio effects chain if active
                let outputNode = gainNode;
                
                if (activeEffects.reverb) {
                    outputNode.connect(reverbNode);
                    outputNode = reverbNode;
                }
                
                if (activeEffects.delay) {
                    outputNode.connect(delayNode);
                    outputNode = delayNode;
                }
                
                if (activeEffects.chorus) {
                    outputNode.connect(chorusNode);
                    outputNode = chorusNode;
                }
                
                if (activeEffects.distortion) {
                    outputNode.connect(distortionNode);
                    outputNode = distortionNode;
                }
                
                if (activeEffects.wah) {
                    outputNode.connect(wahNode);
                    outputNode = wahNode;
                }
                
                if (activeEffects.flanger) {
                    outputNode.connect(flangerNode);
                    outputNode = flangerNode;
                }
                
                // Connect oscillator to effects chain and then to master gain
                oscillator.connect(gainNode);
                outputNode.connect(masterGainNode);
                
                // Start oscillator
                oscillator.start();
                
                // Store reference to oscillator and gain node
                activeNotes.set(note, { oscillator, gainNode, outputNode });
                
                // Add to recorded notes if recording a loop
                if (isRecording) {
                    recordedNotes.push({
                        note: note,
                        startTime: audioContext.currentTime,
                        endTime: null // Will be set when note is released
                    });
                }
                
                // Update UI
                const keyElement = document.querySelector(`.piano-key[data-note="${note}"]`);
                if (keyElement) {
                    keyElement.classList.add('active');
                    
                    // Add ripple effect
                    const ripple = document.createElement('div');
                    ripple.className = 'note-ripple';
                    keyElement.appendChild(ripple);
                    
                    // Remove ripple after animation completes
                    setTimeout(() => {
                        ripple.remove();
                    }, 500);
                }
                
                // Check for chord recognition
                detectChord();
            }
            
            // Stop a note
            function stopNote(note) {
                if (activeNotes.has(note)) {
                    const { oscillator, gainNode } = activeNotes.get(note);
                    
                    // Apply release envelope
                    const releaseTime = audioContext.currentTime + sustainLength;
                    gainNode.gain.setValueAtTime(gainNode.gain.value, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, releaseTime);
                    
                    // Stop oscillator after release
                    oscillator.stop(releaseTime);
                    
                    // Update recorded note end time if recording
                    if (isRecording) {
                        const recordedNote = recordedNotes.find(n => n.note === note && n.endTime === null);
                        if (recordedNote) {
                            recordedNote.endTime = audioContext.currentTime;
                        }
                    }
                    
                    // Remove note from active notes
                    activeNotes.delete(note);
                    
                    // Update UI
                    const keyElement = document.querySelector(`.piano-key[data-note="${note}"]`);
                    if (keyElement) {
                        keyElement.classList.remove('active');
                    }
                    
                    // Update chord display
                    detectChord();
                }
            }
            
            // Detect and display chord based on active notes
            function detectChord() {
                // This is a simplified chord detection
                const activeNoteNames = Array.from(activeNotes.keys()).map(note => note.replace(/\d+$/, ''));
                
                if (activeNoteNames.length >= 3) {
                    // Sort notes in circle of fifths order to better detect chord
                    const sortedNotes = [...activeNoteNames].sort((a, b) => notes.indexOf(a) - notes.indexOf(b));
                    let chordName = "?";
                    
                    // Very basic chord detection - would need to be expanded for a full app
                    if (sortedNotes.length === 3) {
                        const intervals = [
                            (notes.indexOf(sortedNotes[1]) - notes.indexOf(sortedNotes[0]) + 12) % 12,
                            (notes.indexOf(sortedNotes[2]) - notes.indexOf(sortedNotes[1]) + 12) % 12
                        ];
                        
                        if (intervals[0] === 4 && intervals[1] === 3) {
                            chordName = sortedNotes[0] + " Major";
                        } else if (intervals[0] === 3 && intervals[1] === 4) {
                            chordName = sortedNotes[0] + " Minor";
                        } else if (intervals[0] === 3 && intervals[1] === 3) {
                            chordName = sortedNotes[0] + " Diminished";
                        } else if (intervals[0] === 4 && intervals[1] === 4) {
                            chordName = sortedNotes[0] + " Augmented";
                        }
                    }
                    
                    chordDisplay.textContent = chordName;
                    chordDisplay.style.opacity = 1;
                } else {
                    chordDisplay.style.opacity = 0;
                }
            }
            
            // Toggle audio effect
            function toggleEffect(effectName) {
                activeEffects[effectName] = !activeEffects[effectName];
                
                // Update UI
                const effectElement = document.getElementById(`${effectName}Effect`);
                if (effectElement) {
                    if (activeEffects[effectName]) {
                        effectElement.classList.add('active');
                    } else {
                        effectElement.classList.remove('active');
                    }
                }
                
                // Re-apply effects to currently playing notes
                activeNotes.forEach((noteData, note) => {
                    stopNote(note);
                    playNote(note);
                });
            }
            
            // Start recording audio
            function startRecording() {
                if (!navigator.mediaDevices) {
                    alert('Recording is not supported in this browser.');
                    return;
                }
                
                const constraints = {
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                };
                
                navigator.mediaDevices.getUserMedia(constraints)
                    .then(stream => {
                        recordingStream = stream;
                        
                        const options = {
                            audioBitsPerSecond: 128000, // 128kbps
                            mimeType: 'audio/webm;codecs=opus'
                        };
                        
                        if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                            mediaRecorder = new MediaRecorder(stream, options);
                        } else {
                            mediaRecorder = new MediaRecorder(stream);
                        }
                        
                        audioChunks = [];
                        
                        mediaRecorder.ondataavailable = e => {
                            audioChunks.push(e.data);
                        };
                        
                        mediaRecorder.onstop = () => {
                            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                            saveRecording(audioBlob);
                        };
                        
                        mediaRecorder.start();
                        isRecording = true;
                        recordBtn.classList.add('active');
                        recordBtn.textContent = 'STOP';
                    })
                    .catch(err => {
                        console.error('Error accessing microphone:', err);
                        alert('Error accessing microphone. Please check permissions.');
                    });
            }
            
            // Stop recording
            function stopRecording() {
                if (mediaRecorder && isRecording) {
                    mediaRecorder.stop();
                    recordingStream.getTracks().forEach(track => track.stop());
                    isRecording = false;
                    recordBtn.classList.remove('active');
                    recordBtn.textContent = 'REC';
                }
            }
            
            // Save a recording
            function saveRecording(audioBlob) {
                const recordings = JSON.parse(localStorage.getItem('pianoRecordings') || '[]');
                const recordingName = `Recording ${recordings.length + 1}`;
                const recordingDate = new Date().toLocaleString();
                
                // Convert Blob to base64 for storage
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = function() {
                    const base64data = reader.result;
                    recordings.push({
                        id: Date.now(),
                        name: recordingName,
                        date: recordingDate,
                        data: base64data
                    });
                    
                    localStorage.setItem('pianoRecordings', JSON.stringify(recordings));
                    updateRecordingsList();
                };
            }
            
            // Update the recordings list in the UI
            function updateRecordingsList() {
                const recordingsList = document.getElementById('recordingsList');
                const recordings = JSON.parse(localStorage.getItem('pianoRecordings') || '[]');
                
                recordingsList.innerHTML = '';
                
                if (recordings.length === 0) {
                    recordingsList.innerHTML = '<li class="recording-item"><span class="recording-name">No recordings yet</span></li>';
                    return;
                }
                
                recordings.forEach(recording => {
                    const li = document.createElement('li');
                    li.className = 'recording-item';
                    li.innerHTML = `
                        <span class="recording-name">${recording.name}</span>
                        <div class="recording-btn-group">
                            <button class="recording-btn play" data-id="${recording.id}">▶</button>
                            <button class="recording-btn download" data-id="${recording.id}">⬇</button>
                            <button class="recording-btn delete" data-id="${recording.id}">×</button>
                        </div>
                    `;
                    recordingsList.appendChild(li);
                });
                
                // Add event listeners for play, download, and delete buttons
                document.querySelectorAll('.recording-btn.play').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.dataset.id);
                        playRecording(id);
                    });
                });
                
                document.querySelectorAll('.recording-btn.download').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.dataset.id);
                        downloadRecording(id);
                    });
                });
                
                document.querySelectorAll('.recording-btn.delete').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.dataset.id);
                        deleteRecording(id);
                    });
                });
            }
            
            // Play a recorded audio
            function playRecording(id) {
                const recordings = JSON.parse(localStorage.getItem('pianoRecordings') || '[]');
                const recording = recordings.find(r => r.id === id);
                
                if (recording) {
                    const audio = new Audio(recording.data);
                    audio.play();
                }
            }
            
            // Download a recording as MP3
            function downloadRecording(id) {
                const recordings = JSON.parse(localStorage.getItem('pianoRecordings') || '[]');
                const recording = recordings.find(r => r.id === id);
                
                if (recording) {
                    const a = document.createElement('a');
                    a.href = recording.data;
                    a.download = `${recording.name}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            }
            
            // Delete a recording
            function deleteRecording(id) {
                const recordings = JSON.parse(localStorage.getItem('pianoRecordings') || '[]');
                const updatedRecordings = recordings.filter(r => r.id !== id);
                localStorage.setItem('pianoRecordings', JSON.stringify(updatedRecordings));
                updateRecordingsList();
            }
            
            // Toggle metronome
            function toggleMetronome() {
                if (isMetronomeOn) {
                    stopMetronome();
                    metronomeBtn.textContent = 'OFF';
                    metronomeBtn.classList.remove('active');
                } else {
                    startMetronome();
                    metronomeBtn.textContent = 'ON';
                    metronomeBtn.classList.add('active');
                }
                
                isMetronomeOn = !isMetronomeOn;
            }
            
            // Start metronome
            function startMetronome() {
                if (!audioContext) {
                    initAudio();
                }
                
                if (metronomeInterval) {
                    clearInterval(metronomeInterval);
                }
                
                currentBeat = 0;
                const beatInterval = 60000 / metronomeBPM;
                
                metronomeInterval = setInterval(() => {
                    playMetronomeSound(currentBeat % 4 === 0 ? 'high' : 'low');
                    currentBeat++;
                }, beatInterval);
            }
            
            // Stop metronome
            function stopMetronome() {
                if (metronomeInterval) {
                    clearInterval(metronomeInterval);
                    metronomeInterval = null;
                }
            }
            
            // Play metronome sound
            function playMetronomeSound(type) {
                if (!audioContext) return;
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = type === 'high' ? 1500 : 1000;
                
                gainNode.gain.value = 0.1;
                
                oscillator.connect(gainNode);
                gainNode.connect(masterGainNode);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.05);
            }
            
            // Toggle visualizer
            function toggleVisualizer() {
                visualizerActive = !visualizerActive;
                
                if (visualizerActive) {
                    visualizerContainer.classList.remove('hidden');
                    visualizerBtn.textContent = 'HIDE';
                    visualizerBtn.classList.add('active');
                    startVisualizer();
                } else {
                    visualizerContainer.classList.add('hidden');
                    visualizerBtn.textContent = 'SHOW';
                    visualizerBtn.classList.remove('active');
                    stopVisualizer();
                }
            }
            
            // Start audio visualizer
            function startVisualizer() {
                if (!analyser || !audioContext) return;
                
                visualizerContext = visualizerCanvas.getContext('2d');
                visualizerCanvas.width = visualizerContainer.clientWidth;
                visualizerCanvas.height = visualizerContainer.clientHeight;
                
                function drawVisualizer() {
                    if (!visualizerActive) return;
                    
                    requestAnimationFrame(drawVisualizer);
                    
                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);
                    analyser.getByteFrequencyData(dataArray);
                    
                    visualizerContext.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
                    
                    const barWidth = (visualizerCanvas.width / bufferLength) * 2.5;
                    let x = 0;
                    
                    for (let i = 0; i < bufferLength; i++) {
                        const barHeight = dataArray[i] / 2;
                        
                        // Get color based on frequency
                        const hue = i / bufferLength * 360;
                        visualizerContext.fillStyle = `hsl(${hue}, 100%, 50%)`;
                        
                        visualizerContext.fillRect(
                            x, 
                            visualizerCanvas.height - barHeight, 
                            barWidth, 
                            barHeight
                        );
                        
                        x += barWidth + 1;
                    }
                }
                
                drawVisualizer();
            }
            
            // Stop visualizer
            function stopVisualizer() {
                // Nothing to do here, just stop the animation loop
            }
            
            // Event listeners
            recordBtn.addEventListener('click', function() {
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });
            
            octaveDownBtn.addEventListener('click', function() {
                if (currentOctave > 1) {
                    currentOctave--;
                    octaveDisplay.textContent = currentOctave;
                    createKeyboard();
                }
            });
            
            octaveUpBtn.addEventListener('click', function() {
                if (currentOctave < 6) {
                    currentOctave++;
                    octaveDisplay.textContent = currentOctave;
                    createKeyboard();
                }
            });
            
            volumeSlider.addEventListener('input', function() {
                if (masterGainNode) {
                    masterGainNode.gain.value = this.value / 100;
                }
            });
            
            metronomeBtn.addEventListener('click', toggleMetronome);
            visualizerBtn.addEventListener('click', toggleVisualizer);
            
            menuBtn.addEventListener('click', function() {
                recordingsModal.classList.add('active');
                updateRecordingsList();
            });
            
            settingsBtn.addEventListener('click', function() {
                settingsModal.classList.add('active');
            });
            
            closeSettingsBtn.addEventListener('click', function() {
                settingsModal.classList.remove('active');
            });
            
            closeRecordingsBtn.addEventListener('click', function() {
                recordingsModal.classList.remove('active');
            });
            
            // Effect toggles
            reverbEffect.addEventListener('click', function() {
                toggleEffect('reverb');
            });
            
            delayEffect.addEventListener('click', function() {
                toggleEffect('delay');
            });
            
            chorusEffect.addEventListener('click', function() {
                toggleEffect('chorus');
            });
            
            distortionEffect.addEventListener('click', function() {
                toggleEffect('distortion');
            });
            
            wahEffect.addEventListener('click', function() {
                toggleEffect('wah');
            });
            
            flangerEffect.addEventListener('click', function() {
                toggleEffect('flanger');
            });
            
            // Change instrument sound
            instrumentSelect.addEventListener('change', function() {
                // In a full implementation, this would load different samples
                // Re-create any active notes with the new instrument
                const activeNotesCopy = new Map(activeNotes);
                activeNotesCopy.forEach((data, note) => {
                    stopNote(note);
                    playNote(note);
                });
            });
            
            // Change key labels
            keyLabelsSelect.addEventListener('change', function() {
                createKeyboard();
            });
            
            // Change sustain length
            sustainSlider.addEventListener('input', function() {
                sustainLength = parseFloat(this.value);
            });
            
            // Change metronome tempo
            tempoBPMSlider.addEventListener('input', function() {
                metronomeBPM = parseInt(this.value);
                tempoBPMDisplay.textContent = metronomeBPM;
                
                if (isMetronomeOn) {
                    stopMetronome();
                    startMetronome();
                }
            });
            
            // Change theme color
            themeSelect.addEventListener('change', function() {
                const theme = this.value;
                const root = document.documentElement;
                
                switch(theme) {
                    case 'cyan-magenta':
                        root.style.setProperty('--primary-glow', '#0ff');
                        root.style.setProperty('--secondary-glow', '#f0f');
                        break;
                    case 'blue-purple':
                        root.style.setProperty('--primary-glow', '#00f');
                        root.style.setProperty('--secondary-glow', '#a0f');
                        break;
                    case 'green-yellow':
                        root.style.setProperty('--primary-glow', '#0f0');
                        root.style.setProperty('--secondary-glow', '#ff0');
                        break;
                    case 'red-orange':
                        root.style.setProperty('--primary-glow', '#f00');
                        root.style.setProperty('--secondary-glow', '#f90');
                        break;
                    case 'rainbow':
                        // Set animation for continuous color change
                        document.body.style.animation = 'rainbow-theme 20s infinite';
                        break;
                }
            });
            
            // Keyboard input handling
            document.addEventListener('keydown', function(e) {
                if (e.repeat) return; // Prevent key repeat
                
                const key = e.key.toLowerCase();
                if (keyboardMapping[key]) {
                    const octaveOffset = key === key.toLowerCase() ? 0 : 1;
                    const note = keyboardMapping[key] + (currentOctave + octaveOffset);
                    playNote(note);
                }
            });
            
            document.addEventListener('keyup', function(e) {
                const key = e.key.toLowerCase();
                if (keyboardMapping[key]) {
                    const octaveOffset = key === key.toLowerCase() ? 0 : 1;
                    const note = keyboardMapping[key] + (currentOctave + octaveOffset);
                    stopNote(note);
                }
            });
            
            // Resize event for visualizer
            window.addEventListener('resize', function() {
                if (visualizerActive && visualizerContext) {
                    visualizerCanvas.width = visualizerContainer.clientWidth;
                    visualizerCanvas.height = visualizerContainer.clientHeight;
                }
            });
            
            // Initialize the app
            createKeyboard();
            updateRecordingsList();
            
            // Prevent scrolling on touch for better mobile experience
            document.body.addEventListener('touchmove', function(e) {
                if (e.target.classList.contains('piano-key')) {
                    e.preventDefault();
                }
            }, { passive: false });
        });
    </script>
