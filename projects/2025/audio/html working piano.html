<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Working Piano</title>
    <style>
        /* Basic page styling */
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Piano container styling */
        .piano {
            display: flex;
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            position: relative; /* Needed for absolute positioning of black keys */
            height: 320px; /* Fixed height for the piano */
            border: 5px solid #111;
            overflow: hidden; /* Hide parts of keys if they overlap */
        }

        /* General key styling */
        .key {
            border: 1px solid #000;
            cursor: pointer;
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.2);
            transition: background-color 0.1s ease, box-shadow 0.1s ease, transform 0.05s ease;
            position: relative; /* Allow text positioning inside */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Align text to bottom */
            align-items: center; /* Center text horizontally */
            padding-bottom: 10px; /* Space for text */
            box-sizing: border-box;
        }

        /* White key specific styling */
        .key.white {
            width: 60px; /* Width of white keys */
            height: 300px; /* Height of white keys */
            background: linear-gradient(to bottom, #fff, #eee);
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
            margin-right: -1px; /* Slight overlap to hide double borders */
            color: #333; /* Text color */
            font-weight: bold;
            font-size: 14px;
        }

        /* Black key specific styling */
        .key.black {
            width: 38px; /* Width of black keys */
            height: 180px; /* Height of black keys */
            background: linear-gradient(to bottom, #333, #111);
            position: absolute; /* Position relative to the piano container */
            z-index: 10; /* Appear above white keys */
            border-radius: 0 0 4px 4px;
            margin-left: -19px; /* Half its width to center over white key boundary */
            color: #eee; /* Text color */
            font-size: 12px;
            padding-bottom: 5px; /* Less space for text */
            box-shadow: inset 0 -2px 3px rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Specific positioning for each black key */
        /* These values are relative to the start of the piano container */
        /* Adjust if key widths change */
        .key[data-note="Db3"] { left: calc(60px * 1 - 19px); }
        .key[data-note="Eb3"] { left: calc(60px * 2 - 19px); }
        .key[data-note="Gb3"] { left: calc(60px * 4 - 19px); }
        .key[data-note="Ab3"] { left: calc(60px * 5 - 19px); }
        .key[data-note="Bb3"] { left: calc(60px * 6 - 19px); }
        .key[data-note="Db4"] { left: calc(60px * 8 - 19px); }
        .key[data-note="Eb4"] { left: calc(60px * 9 - 19px); }
        .key[data-note="Gb4"] { left: calc(60px * 11 - 19px); }
        .key[data-note="Ab4"] { left: calc(60px * 12 - 19px); }
        .key[data-note="Bb4"] { left: calc(60px * 13 - 19px); }


        /* Hover effects */
        .key.white:hover {
            background: linear-gradient(to bottom, #f8f8f8, #e0e0e0);
        }
        .key.black:hover {
            background: linear-gradient(to bottom, #444, #222);
        }

        /* Active (pressed) state */
        .key.active {
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
            transform: translateY(2px); /* Slight press down effect */
        }
        .key.white.active {
            background: linear-gradient(to bottom, #ddd, #ccc);
        }
        .key.black.active {
             background: linear-gradient(to bottom, #222, #000);
             box-shadow: inset 0 -1px 2px rgba(255,255,255,0.1), 0 1px 1px rgba(0,0,0,0.5);
        }

        /* Key Labels */
        .key::after {
            content: attr(data-note-label); /* Use a separate attribute for display label */
        }

    </style>
</head>
<body>

    <div class="piano" id="piano">
        <div class="key white" data-note="C3" data-note-label="C3"></div>
        <div class="key black" data-note="Db3" data-note-label="C#3/Db3"></div>
        <div class="key white" data-note="D3" data-note-label="D3"></div>
        <div class="key black" data-note="Eb3" data-note-label="D#3/Eb3"></div>
        <div class="key white" data-note="E3" data-note-label="E3"></div>
        <div class="key white" data-note="F3" data-note-label="F3"></div>
        <div class="key black" data-note="Gb3" data-note-label="F#3/Gb3"></div>
        <div class="key white" data-note="G3" data-note-label="G3"></div>
        <div class="key black" data-note="Ab3" data-note-label="G#3/Ab3"></div>
        <div class="key white" data-note="A3" data-note-label="A3"></div>
        <div class="key black" data-note="Bb3" data-note-label="A#3/Bb3"></div>
        <div class="key white" data-note="B3" data-note-label="B3"></div>

        <div class="key white" data-note="C4" data-note-label="C4"></div>
        <div class="key black" data-note="Db4" data-note-label="C#4/Db4"></div>
        <div class="key white" data-note="D4" data-note-label="D4"></div>
        <div class="key black" data-note="Eb4" data-note-label="D#4/Eb4"></div>
        <div class="key white" data-note="E4" data-note-label="E4"></div>
        <div class="key white" data-note="F4" data-note-label="F4"></div>
        <div class="key black" data-note="Gb4" data-note-label="F#4/Gb4"></div>
        <div class="key white" data-note="G4" data-note-label="G4"></div>
        <div class="key black" data-note="Ab4" data-note-label="G#4/Ab4"></div>
        <div class="key white" data-note="A4" data-note-label="A4"></div>
        <div class="key black" data-note="Bb4" data-note-label="A#4/Bb4"></div>
        <div class="key white" data-note="B4" data-note-label="B4"></div>
    </div>

    <script>
        // --- Web Audio API Setup ---
        // Create AudioContext (must be created after user interaction in some browsers)
        let audioContext;
        const volume = 0.5; // Control overall volume (0 to 1)
        const noteDuration = 0.6; // Duration of the note sound in seconds

        // Function to initialize the AudioContext - often needed due to browser restrictions
        function initAudio() {
            if (!audioContext) {
                try {
                    // Standard way
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    console.log("AudioContext created successfully.");
                } catch (e) {
                    console.error("Web Audio API is not supported in this browser", e);
                    alert("Web Audio API is not supported in this browser. Piano sounds will not work.");
                }
            }
        }

        // --- Note Frequencies ---
        // Reference: A4 = 440 Hz
        // We can calculate frequencies based on semitones away from A4
        const A4 = 440;
        const noteFrequencies = {
            // Octave 3
            'C3':  A4 * Math.pow(2, -21/12),
            'Db3': A4 * Math.pow(2, -20/12),
            'D3':  A4 * Math.pow(2, -19/12),
            'Eb3': A4 * Math.pow(2, -18/12),
            'E3':  A4 * Math.pow(2, -17/12),
            'F3':  A4 * Math.pow(2, -16/12),
            'Gb3': A4 * Math.pow(2, -15/12),
            'G3':  A4 * Math.pow(2, -14/12),
            'Ab3': A4 * Math.pow(2, -13/12),
            'A3':  A4 * Math.pow(2, -12/12), // A3 is one octave below A4
            'Bb3': A4 * Math.pow(2, -11/12),
            'B3':  A4 * Math.pow(2, -10/12),
            // Octave 4
            'C4':  A4 * Math.pow(2, -9/12), // Middle C
            'Db4': A4 * Math.pow(2, -8/12),
            'D4':  A4 * Math.pow(2, -7/12),
            'Eb4': A4 * Math.pow(2, -6/12),
            'E4':  A4 * Math.pow(2, -5/12),
            'F4':  A4 * Math.pow(2, -4/12),
            'Gb4': A4 * Math.pow(2, -3/12),
            'G4':  A4 * Math.pow(2, -2/12),
            'Ab4': A4 * Math.pow(2, -1/12),
            'A4':  A4,                      // A4 Reference
            'Bb4': A4 * Math.pow(2, 1/12),
            'B4':  A4 * Math.pow(2, 2/12),
        };

        // --- Sound Playback Function ---
        function playNote(note) {
            // Ensure AudioContext is initialized (important for Safari/iOS etc.)
            initAudio();
            if (!audioContext) return; // Exit if AudioContext couldn't be created

            const frequency = noteFrequencies[note];
            if (!frequency) {
                console.warn(`Frequency not found for note: ${note}`);
                return; // Exit if note isn't in our map
            }

            // Create nodes
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            // Configure oscillator
            oscillator.type = 'sine'; // Type of sound wave (sine, square, sawtooth, triangle)
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime); // Set frequency immediately

            // Configure gain (volume control + fade out)
            gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
            // Optional: Add a slight fade-out to avoid clicks
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + noteDuration);

            // Connect nodes: Oscillator -> Gain -> Destination (speakers)
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            // Start and stop the oscillator
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + noteDuration); // Stop after specified duration
        }

        // --- Event Listeners ---
        const pianoKeys = document.querySelectorAll('.piano .key');

        pianoKeys.forEach(key => {
            const note = key.dataset.note; // Get the note from data-note attribute

            // Use mousedown for immediate feedback and styling
            key.addEventListener('mousedown', (e) => {
                // Prevent default behavior like text selection dragging
                e.preventDefault();

                // Initialize audio on first interaction if needed
                initAudio();

                // Play the sound
                playNote(note);

                // Add 'active' class for visual feedback
                key.classList.add('active');
            });

            // Use mouseup to remove active state
            key.addEventListener('mouseup', () => {
                key.classList.remove('active');
            });

            // Also remove active state if mouse leaves the key while pressed down
            key.addEventListener('mouseleave', () => {
                key.classList.remove('active');
            });

            // Touch events for mobile compatibility
             key.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Prevent potential scrolling/zooming
                initAudio();
                playNote(note);
                key.classList.add('active');
            }, { passive: false }); // Need passive: false to call preventDefault

            key.addEventListener('touchend', () => {
                key.classList.remove('active');
            });

             key.addEventListener('touchcancel', () => {
                key.classList.remove('active');
            });
        });

        // Initial message or check
        console.log("Piano ready. Click or tap the keys to play.");
        // Alert user if AudioContext is needed but not created (e.g., on page load before interaction)
        // We now create it on first interaction, which is generally better practice.

    </script>

</body>
</html>
