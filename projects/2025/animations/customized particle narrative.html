<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customized Particle Narrative</title>
  <style>
    /* Reset and full-screen canvas */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
    }
    /* Simple control panel styling */
    #control-panel {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(240, 240, 240, 0.9);
      padding: 10px;
      border-radius: 5px;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 10;
    }
    #control-panel h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    #control-panel label {
      display: block;
      margin-bottom: 8px;
    }
    #control-panel input,
    #control-panel select,
    #control-panel button {
      margin-top: 4px;
      margin-bottom: 8px;
      width: 100%;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="control-panel">
    <h3>Settings</h3>
    <label>
      Formation:
      <select id="formation-select">
        <option value="heart">Heart</option>
        <option value="star">Star</option>
        <option value="circle">Circle</option>
        <option value="spiral">Spiral</option>
        <option value="random">Random</option>
      </select>
    </label>
    <label>
      Auto Switch:
      <input type="checkbox" id="auto-switch">
    </label>
    <label>
      Auto Switch Interval (seconds):
      <input type="number" id="auto-interval" value="5" min="2" max="20">
    </label>
    <label>
      Easing Factor (0.01 - 0.2):
      <input type="range" id="easing-factor" min="1" max="20" value="7">
    </label>
    <label>
      Particle Color:
      <input type="color" id="particle-color" value="#ffffff">
    </label>
    <label>
      Particle Radius:
      <input type="range" id="particle-radius" min="1" max="10" value="2">
    </label>
    <label>
      Background Color:
      <input type="color" id="background-color" value="#000000">
    </label>
    <label>
      Number of Particles:
      <input type="range" id="particle-count" min="100" max="2000" value="600">
    </label>
    <button id="update-particles">Update Particles</button>
    <label>
      Trail Effect:
      <input type="checkbox" id="trail-effect">
    </label>
  </div>

  <script>
    // Global settings for the narrative visualization
    const settings = {
      easing: 0.07,              // How quickly particles move toward their target.
      particleColor: "#ffffff",   // Color of each particle.
      particleRadius: 2,          // Radius of the particle.
      backgroundColor: "#000000", // Background color of the canvas.
      numberOfParticles: 600,     // Total particles.
      formation: "heart",         // Active formation type.
      autoSwitch: false,          // Whether to auto-switch the scene.
      autoSwitchInterval: 5000,   // Time interval (ms) for auto-switching.
      trailEffect: false          // Whether to use a fading trail.
    };

    // Canvas setup
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Particle class: each particle moves toward its target
    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.tx = x; // target x
        this.ty = y; // target y
      }
      update() {
        const dx = this.tx - this.x;
        const dy = this.ty - this.y;
        this.x += dx * settings.easing;
        this.y += dy * settings.easing;
      }
      draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, settings.particleRadius, 0, Math.PI * 2);
        ctx.fillStyle = settings.particleColor;
        ctx.fill();
      }
    }

    let particles = [];

    // Initialize the particles array based on settings.numberOfParticles.
    function initParticles() {
      particles = [];
      for (let i = 0; i < settings.numberOfParticles; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        particles.push(new Particle(x, y));
      }
      setFormation();
    }

    // Formation functions that return an array of coordinate points.

    // 1. Heart shape formation
    function getHeartPoints(count) {
      const points = [];
      for (let i = 0; i < count; i++) {
        const t = Math.PI - (2 * Math.PI) * (i / count);
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        const scale = 10;
        points.push({ x: x * scale, y: -y * scale });
      }
      return points;
    }

    // 2. Star shape formation (5-pointed star)
    function getStarPoints(count) {
      const points = [];
      const outerRadius = 100;
      const innerRadius = 50;
      const numPoints = 5;
      const vertices = [];
      for (let i = 0; i < 2 * numPoints; i++) {
        const angle = (i * Math.PI) / numPoints;
        const r = (i % 2 === 0) ? outerRadius : innerRadius;
        const x = Math.cos(angle) * r;
        const y = Math.sin(angle) * r;
        vertices.push({ x, y });
      }
      const segments = [];
      let totalLength = 0;
      for (let i = 0; i < vertices.length; i++) {
        const next = vertices[(i + 1) % vertices.length];
        const dx = next.x - vertices[i].x;
        const dy = next.y - vertices[i].y;
        const segLength = Math.sqrt(dx * dx + dy * dy);
        segments.push(segLength);
        totalLength += segLength;
      }
      for (let i = 0; i < count; i++) {
        const distance = (i / count) * totalLength;
        let accumulated = 0;
        let j = 0;
        for (; j < segments.length; j++) {
          if (accumulated + segments[j] >= distance) break;
          accumulated += segments[j];
        }
        const t = (distance - accumulated) / segments[j];
        const start = vertices[j];
        const end = vertices[(j + 1) % vertices.length];
        const x = start.x + t * (end.x - start.x);
        const y = start.y + t * (end.y - start.y);
        points.push({ x, y });
      }
      return points;
    }

    // 3. Circle formation: particles evenly spaced around a circle.
    function getCirclePoints(count) {
      const points = [];
      const radius = 100;
      for (let i = 0; i < count; i++) {
        const angle = (2 * Math.PI * i) / count;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        points.push({ x, y });
      }
      return points;
    }

    // 4. Spiral formation: create an outward winding spiral.
    function getSpiralPoints(count) {
      const points = [];
      const a = 0;
      const b = 4;
      // About 2 full rotations.
      for (let i = 0; i < count; i++) {
        const t = (i / count) * (4 * Math.PI);
        const r = a + b * t;
        const x = Math.cos(t) * r;
        const y = Math.sin(t) * r;
        points.push({ x, y });
      }
      return points;
    }

    // 5. Random formation: scatter particles within a predefined range.
    function getRandomPoints(count) {
      const points = [];
      for (let i = 0; i < count; i++) {
        const x = (Math.random() - 0.5) * 800;
        const y = (Math.random() - 0.5) * 600;
        points.push({ x, y });
      }
      return points;
    }

    // Utility to return points for the chosen formation type.
    function getFormationPoints(formation, count) {
      switch (formation) {
        case 'heart':
          return getHeartPoints(count);
        case 'star':
          return getStarPoints(count);
        case 'circle':
          return getCirclePoints(count);
        case 'spiral':
          return getSpiralPoints(count);
        case 'random':
          return getRandomPoints(count);
        default:
          return getHeartPoints(count);
      }
    }

    // Update particles’ target positions based on the selected formation.
    function setFormation() {
      const formationPoints = getFormationPoints(settings.formation, 200);
      for (let i = 0; i < particles.length; i++) {
        const pt = formationPoints[i % formationPoints.length];
        particles[i].tx = canvas.width / 2 + pt.x;
        particles[i].ty = canvas.height / 2 + pt.y;
      }
    }

    // Animation loop: update the canvas background and each particle.
    function animate() {
      if (settings.trailEffect) {
        // Instead of clearing completely, use a semi-transparent fill for trails.
        ctx.fillStyle = hexToRGBA(settings.backgroundColor, 0.1);
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else {
        ctx.fillStyle = settings.backgroundColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      particles.forEach(p => {
        p.update();
        p.draw(ctx);
      });
      requestAnimationFrame(animate);
    }
    animate();

    // Utility to convert a hex color into an rgba() string with transparency.
    function hexToRGBA(hex, alpha) {
      const r = parseInt(hex.substring(1, 3), 16);
      const g = parseInt(hex.substring(3, 5), 16);
      const b = parseInt(hex.substring(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // Auto-switch logic: cycle through available formations automatically.
    const formationTypes = ['heart', 'star', 'circle', 'spiral', 'random'];
    let autoSwitchIntervalId = null;
    function startAutoSwitch() {
      stopAutoSwitch();
      autoSwitchIntervalId = setInterval(() => {
        let currentIndex = formationTypes.indexOf(settings.formation);
        let nextIndex = (currentIndex + 1) % formationTypes.length;
        settings.formation = formationTypes[nextIndex];
        formationSelect.value = settings.formation;
        setFormation();
      }, settings.autoSwitchInterval);
    }
    function stopAutoSwitch() {
      if (autoSwitchIntervalId) {
        clearInterval(autoSwitchIntervalId);
        autoSwitchIntervalId = null;
      }
    }

    // CONTROL PANEL: Wire up our UI elements to update settings.
    const formationSelect = document.getElementById('formation-select');
    formationSelect.addEventListener('change', (e) => {
      settings.formation = e.target.value;
      setFormation();
    });

    const autoSwitchCheckbox = document.getElementById('auto-switch');
    autoSwitchCheckbox.addEventListener('change', (e) => {
      settings.autoSwitch = e.target.checked;
      if (settings.autoSwitch) {
        settings.autoSwitchInterval = parseInt(autoIntervalInput.value, 10) * 1000;
        startAutoSwitch();
      } else {
        stopAutoSwitch();
      }
    });

    const autoIntervalInput = document.getElementById('auto-interval');
    autoIntervalInput.addEventListener('change', (e) => {
      const intervalSec = parseInt(e.target.value, 10);
      if (intervalSec >= 2 && intervalSec <= 20) {
        settings.autoSwitchInterval = intervalSec * 1000;
        if (settings.autoSwitch) startAutoSwitch();
      }
    });

    const easingSlider = document.getElementById('easing-factor');
    easingSlider.addEventListener('input', (e) => {
      // Map slider value (1-20) to easing factor (0.01-0.20).
      settings.easing = parseFloat(e.target.value) / 100;
    });

    const particleColorInput = document.getElementById('particle-color');
    particleColorInput.addEventListener('input', (e) => {
      settings.particleColor = e.target.value;
    });

    const radiusSlider = document.getElementById('particle-radius');
    radiusSlider.addEventListener('input', (e) => {
      settings.particleRadius = parseInt(e.target.value, 10);
    });

    const backgroundColorInput = document.getElementById('background-color');
    backgroundColorInput.addEventListener('input', (e) => {
      settings.backgroundColor = e.target.value;
    });

    const particleCountSlider = document.getElementById('particle-count');
    const updateParticlesButton = document.getElementById('update-particles');
    updateParticlesButton.addEventListener('click', () => {
      settings.numberOfParticles = parseInt(particleCountSlider.value, 10);
      initParticles();
    });

    const trailCheckbox = document.getElementById('trail-effect');
    trailCheckbox.addEventListener('change', (e) => {
      settings.trailEffect = e.target.checked;
    });

    // Resize canvas and re-center formation on window resize.
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      setFormation();
    });

    // Initialize particles on page load.
    initParticles();
  </script>
</body>
</html>
