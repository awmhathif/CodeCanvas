<html lang="en">

  <title>Neon Nexus - Interactive Digital Experience</title>
  <style>
    /* ======================================================================
       Neon Nexus - Interactive Digital Experience
       ======================================================================
       This CSS styles a futuristic, neon-glowing interface with immersive
       animations and a responsive design that adapts seamlessly across devices.
    ====================================================================== */

    /* Reset and base styles */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Fullscreen canvas for dynamic rendering */
    #canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Neon glowing title text */
    #title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #0ff;
      font-size: 36px;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      z-index: 10;
      pointer-events: none;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      #title {
        font-size: 24px;
      }
    }

    /* End of CSS styling */

<body>
  <!-- Title Display -->
  <div id="title">Neon Nexus</div>
  <!-- Main Canvas Element -->
  <canvas id="canvas"></canvas>
  <script>
    // ======================================================================
    // Neon Nexus - Interactive Digital Experience
    // ======================================================================
    // This groundbreaking digital experience fuses futuristic neon visuals
    // with immersive, interactive generative art. The environment reacts
    // dynamically to user input via physics-based interactions, particle
    // effects, and AI-driven ambient elements. Every session feels fresh,
    // unpredictable, and pushes the boundaries of web-based interactivity.
    // ======================================================================

    // ---------------------------------------------------------------
    // Global Variables and Setup
    // ---------------------------------------------------------------

    // Get the canvas element and its 2D drawing context
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Set canvas dimensions to match the window size
    let canvasWidth = window.innerWidth;
    let canvasHeight = window.innerHeight;
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;

    // Arrays to hold particles and generative shapes
    let particles = [];
    let shapes = [];

    // Global parameters for the particle system
    let maxParticles = 500;  // Maximum number of particles allowed
    let time = 0;            // Global time variable for animations

    // Mouse and touch state object
    let mouse = {
      x: canvasWidth / 2,
      y: canvasHeight / 2,
      isDown: false
    };

    // ---------------------------------------------------------------
    // Utility Functions
    // ---------------------------------------------------------------

    // Returns a random number between min and max
    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    // Maps a value from one range to another
    function map(value, inMin, inMax, outMin, outMax) {
      return ((value - inMin) * (outMax - outMin)) / (inMax - inMin) + outMin;
    }

    // Resizes the canvas when the window size changes
    function resizeCanvas() {
      canvasWidth = window.innerWidth;
      canvasHeight = window.innerHeight;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    // ---------------------------------------------------------------
    // Particle Class Definition
    // ---------------------------------------------------------------

    class Particle {
      /**
       * Creates a new particle.
       * @param {number} x - The starting x position.
       * @param {number} y - The starting y position.
       * @param {number} angle - The emission angle in radians.
       * @param {number} speed - The initial speed.
       * @param {number} life - The lifetime of the particle.
       * @param {string} color - The neon color of the particle.
       */
      constructor(x, y, angle, speed, life, color) {
        this.x = x;
        this.y = y;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.ax = 0;
        this.ay = 0;
        this.life = life;
        this.maxLife = life;
        this.size = rand(2, 6);
        this.color = color;
        this.fade = rand(0.005, 0.02);
      }

      // Update particle physics and reduce life
      update() {
        this.vx += this.ax;
        this.vy += this.ay;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.99;
        this.vy *= 0.99;
        this.life -= this.fade;
      }

      // Render the particle on the canvas
      draw(ctx) {
        let alpha = Math.max(this.life / this.maxLife, 0);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ---------------------------------------------------------------
    // Generative Shape Class Definition
    // ---------------------------------------------------------------

    class GenerativeShape {
      /**
       * Creates a generative shape (polygon) that grows and fades.
       * @param {number} x - The x position.
       * @param {number} y - The y position.
       * @param {number} radius - The initial radius.
       * @param {number} sides - Number of polygon sides.
       * @param {number} rotation - The starting rotation angle.
       * @param {string} color - Neon color.
       */
      constructor(x, y, radius, sides, rotation, color) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.sides = sides;
        this.rotation = rotation;
        this.color = color;
        this.growth = rand(0.1, 0.5);
        this.life = 1.0;
        this.fade = rand(0.001, 0.005);
      }

      // Update shape by growing and fading
      update() {
        this.radius += this.growth;
        this.life -= this.fade;
      }

      // Draw the polygon on the canvas
      draw(ctx) {
        let alpha = Math.max(this.life, 0);
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.globalAlpha = alpha;
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < this.sides; i++) {
          let angle = (i / this.sides) * Math.PI * 2;
          let px = Math.cos(angle) * this.radius;
          let py = Math.sin(angle) * this.radius;
          if (i === 0) {
            ctx.moveTo(px, py);
          } else {
            ctx.lineTo(px, py);
          }
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }
    }

    // ---------------------------------------------------------------
    // Particle System Functions
    // ---------------------------------------------------------------

    // Emit new particles at position (x, y)
    function emitParticles(x, y, count) {
      for (let i = 0; i < count; i++) {
        let angle = rand(0, Math.PI * 2);
        let speed = rand(1, 4);
        let life = rand(0.5, 1.0);
        let hue = rand(180, 300);
        let color = `hsl(${hue}, 100%, 50%)`;
        particles.push(new Particle(x, y, angle, speed, life, color));
      }
    }

    // Update all particles and remove those that have faded out
    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    // Draw all particles onto the canvas
    function drawParticles() {
      for (let p of particles) {
        p.draw(ctx);
      }
    }

    // ---------------------------------------------------------------
    // Generative Shape System Functions
    // ---------------------------------------------------------------

    // Create a new generative shape at (x, y)
    function createShape(x, y) {
      let radius = rand(10, 30);
      let sides = Math.floor(rand(3, 8));
      let rotation = rand(0, Math.PI * 2);
      let hue = rand(180, 300);
      let color = `hsl(${hue}, 100%, 50%)`;
      shapes.push(new GenerativeShape(x, y, radius, sides, rotation, color));
    }

    // Update all generative shapes and remove faded ones
    function updateShapes() {
      for (let i = shapes.length - 1; i >= 0; i--) {
        shapes[i].update();
        if (shapes[i].life <= 0) {
          shapes.splice(i, 1);
        }
      }
    }

    // Draw all generative shapes
    function drawShapes() {
      for (let s of shapes) {
        s.draw(ctx);
      }
    }

    // ---------------------------------------------------------------
    // Interactive Environment and AI-driven Elements
    // ---------------------------------------------------------------

    // Trigger an explosion: a burst of particles and shapes
    function triggerExplosion(x, y) {
      emitParticles(x, y, 50);
      for (let i = 0; i < 3; i++) {
        createShape(x, y);
      }
    }

    // AI-driven element that roams the canvas
    class AINexus {
      constructor() {
        this.x = rand(0, canvasWidth);
        this.y = rand(0, canvasHeight);
        this.vx = rand(-2, 2);
        this.vy = rand(-2, 2);
        this.size = 10;
        this.hue = rand(180, 300);
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvasWidth) this.vx *= -1;
        if (this.y < 0 || this.y > canvasHeight) this.vy *= -1;
        if (Math.random() < 0.005) {
          triggerExplosion(this.x, this.y);
        }
      }
      
      draw(ctx) {
        ctx.save();
        ctx.shadowBlur = 25;
        ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
        ctx.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    let aiNexus = new AINexus();

    // ---------------------------------------------------------------
    // Innovative Mechanic: Neural Feedback Loop
    // ---------------------------------------------------------------
    // This mechanism creates a mesmerizing effect by reacting to the
    // local density of particles near the user's cursor, creating a glowing
    // overlay that dynamically changes with user input.
    let neuralFeedback = {
      intensity: 0,   // Intensity between 0 and 1
      decay: 0.98,    // Decay rate per frame

      update: function() {
        let nearbyParticles = particles.filter(p => {
          let dx = p.x - mouse.x;
          let dy = p.y - mouse.y;
          return Math.sqrt(dx * dx + dy * dy) < 100;
        });
        this.intensity = Math.min(1, this.intensity + nearbyParticles.length * 0.001);
        this.intensity *= this.decay;
      },

      draw: function(ctx) {
        ctx.save();
        ctx.globalAlpha = this.intensity;
        ctx.shadowBlur = 50;
        ctx.shadowColor = "#0ff";
        ctx.strokeStyle = "#0ff";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, 80, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    };

    // ---------------------------------------------------------------
    // Event Listeners for User Interaction
    // ---------------------------------------------------------------

    // Update mouse position on movement
    canvas.addEventListener('mousemove', function(e) {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    // Touch movement for mobile devices
    canvas.addEventListener('touchmove', function(e) {
      e.preventDefault();
      let touch = e.touches[0];
      mouse.x = touch.clientX;
      mouse.y = touch.clientY;
    }, {passive: false});

    // On mouse down, trigger explosion and update state
    canvas.addEventListener('mousedown', function(e) {
      mouse.isDown = true;
      triggerExplosion(mouse.x, mouse.y);
    });

    // Touch start event handling
    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      mouse.isDown = true;
      let touch = e.touches[0];
      mouse.x = touch.clientX;
      mouse.y = touch.clientY;
      triggerExplosion(mouse.x, mouse.y);
    }, {passive: false});

    // On mouse up, update mouse state
    canvas.addEventListener('mouseup', function(e) {
      mouse.isDown = false;
    });
    canvas.addEventListener('touchend', function(e) {
      mouse.isDown = false;
    }, {passive: false});

    // ---------------------------------------------------------------
    // Main Animation Loop
    // ---------------------------------------------------------------

    function animate() {
      // Clear canvas with a semi-transparent overlay for trail effect
      ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      
      // Update global time
      time += 0.01;
      
      // Update systems
      updateParticles();
      updateShapes();
      aiNexus.update();
      neuralFeedback.update();

      // Emit ambient particles occasionally
      if (Math.random() < 0.03 && particles.length < maxParticles) {
        emitParticles(rand(0, canvasWidth), rand(0, canvasHeight), 5);
      }

      // Draw systems in proper order for layering
      drawShapes();
      drawParticles();
      aiNexus.draw(ctx);
      neuralFeedback.draw(ctx);

      // Request next frame
      requestAnimationFrame(animate);
    }
    // Start the animation loop
    animate();

    // ---------------------------------------------------------------
    // Debug Mode and Advanced Features
    // ---------------------------------------------------------------

    let debugMode = false;
    document.addEventListener('keydown', function(e) {
      if (e.key === 'd' || e.key === 'D') {
        debugMode = !debugMode;
      }
    });

    function displayDebugInfo() {
      if (!debugMode) return;
      ctx.save();
      ctx.fillStyle = "#0f0";
      ctx.font = "14px monospace";
      ctx.fillText("Particles: " + particles.length, 10, 20);
      ctx.fillText("Shapes: " + shapes.length, 10, 40);
      ctx.fillText("AI Nexus: (" + aiNexus.x.toFixed(1) + ", " + aiNexus.y.toFixed(1) + ")", 10, 60);
      ctx.fillText("Neural Feedback: " + neuralFeedback.intensity.toFixed(2), 10, 80);
      ctx.restore();
    }

    // ---------------------------------------------------------------
    // End of Neon Nexus Code

  </script>
