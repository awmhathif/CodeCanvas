<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Animation Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: #0f0f1e;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .header {
            position: relative;
            text-align: center;
            padding: 1rem;
            background: linear-gradient(90deg, rgba(20,20,40,0.8) 0%, rgba(40,40,80,0.8) 50%, rgba(20,20,40,0.8) 100%);
            z-index: 5;
            box-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #9c47ff, #00ccff, #9c47ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: title-glow 3s infinite alternate;
            text-shadow: 0 0 10px rgba(156, 71, 255, 0.5);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        
        .btn {
            background: rgba(60, 60, 100, 0.4);
            color: #00ccff;
            border: 1px solid rgba(100, 180, 255, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px rgba(100, 180, 255, 0.2);
        }
        
        .btn:hover, .btn.active {
            background: rgba(100, 100, 180, 0.6);
            box-shadow: 0 0 15px rgba(156, 71, 255, 0.6);
            transform: translateY(-2px);
        }
        
        .animation-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .animation-stage {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Particle background */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            background: rgba(100, 180, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(100, 180, 255, 0.8);
            animation: float-around 20s infinite linear;
        }
        
        /* Floating 3D Cube */
        .cube-container {
            width: 200px;
            height: 200px;
            perspective: 1000px;
            z-index: 3;
            transition: transform 1s ease;
        }
        
        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: cube-rotate 20s infinite linear;
        }
        
        .cube.paused {
            animation-play-state: paused;
        }
        
        .cube:hover {
            animation-play-state: paused;
        }
        
        .cube-face {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(100, 100, 180, 0.2);
            border: 1px solid rgba(100, 180, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: #00ccff;
            box-shadow: 0 0 20px rgba(100, 180, 255, 0.3) inset;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        
        .cube-face:hover {
            background: rgba(156, 71, 255, 0.3);
            box-shadow: 0 0 30px rgba(156, 71, 255, 0.5) inset;
        }
        
        .front { transform: translateZ(100px); }
        .back { transform: rotateY(180deg) translateZ(100px); }
        .right { transform: rotateY(90deg) translateZ(100px); }
        .left { transform: rotateY(-90deg) translateZ(100px); }
        .top { transform: rotateX(90deg) translateZ(100px); }
        .bottom { transform: rotateX(-90deg) translateZ(100px); }
        
        /* Pulsating Ring */
        .pulsating-ring {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid rgba(156, 71, 255, 0.7);
            box-shadow: 0 0 30px rgba(156, 71, 255, 0.5);
            z-index: 2;
            animation: pulse 3s infinite ease-in-out;
            opacity: 0.7;
        }
        
        /* Holographic display */
        .hologram {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(
                rgba(100, 180, 255, 0.1) 0%,
                rgba(100, 180, 255, 0.05) 40%,
                transparent 70%
            );
            z-index: 1;
            animation: hologram-rotate 10s infinite linear;
        }
        
        .hologram-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(100, 180, 255, 0.2);
            box-shadow: 0 0 10px rgba(100, 180, 255, 0.3);
        }
        
        .hologram-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(100, 180, 255, 0.5), transparent);
            transform-origin: center;
        }
        
        /* Constellation effect */
        .constellation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            animation: twinkle 4s infinite alternate;
        }
        
        .connection {
            position: absolute;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform-origin: left center;
        }
        
        /* Wave animation */
        .wave-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: none;
        }
        
        .wave {
            position: absolute;
            width: 100%;
            height: 400px;
            top: calc(50% - 200px);
            background: linear-gradient(to bottom, 
                transparent 0%, 
                rgba(100, 180, 255, 0.05) 20%, 
                rgba(100, 180, 255, 0.1) 50%,
                rgba(100, 180, 255, 0.05) 80%,
                transparent 100%
            );
            transform-origin: center;
            animation: wave 3s infinite linear;
        }
        
        /* Energy field animation */
        .energy-field {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(
                rgba(156, 71, 255, 0.2) 0%,
                rgba(100, 180, 255, 0.1) 40%,
                transparent 70%
            );
            z-index: 2;
            display: none;
            animation: energy-pulse 3s infinite alternate;
        }
        
        .energy-particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: rgba(156, 71, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(156, 71, 255, 0.8);
            animation: energy-orbit 3s infinite linear;
        }
        
        /* DNA Helix animation */
        .dna-container {
            position: absolute;
            width: 100px;
            height: 300px;
            perspective: 1000px;
            z-index: 3;
            display: none;
        }
        
        .dna-strand {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: dna-rotate 10s infinite linear;
        }
        
        .dna-step {
            position: absolute;
            width: 100%;
            height: 10px;
        }
        
        .dna-left, .dna-right {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(100, 180, 255, 0.6);
            box-shadow: 0 0 15px rgba(100, 180, 255, 0.8);
        }
        
        .dna-left { left: 0; }
        .dna-right { right: 0; }
        
        .dna-connector {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 80px;
            height: 2px;
            background: rgba(156, 71, 255, 0.6);
            box-shadow: 0 0 10px rgba(156, 71, 255, 0.6);
            transform-origin: left center;
        }
        
        /* Information panel */
        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 1rem;
            background: rgba(20, 20, 40, 0.7);
            border: 1px solid rgba(100, 180, 255, 0.5);
            border-radius: 10px;
            max-width: 300px;
            backdrop-filter: blur(5px);
            z-index: 10;
            transform: translateY(0);
            transition: transform 0.5s ease, opacity 0.5s ease;
            box-shadow: 0 0 20px rgba(100, 180, 255, 0.3);
        }
        
        .info-panel.hidden {
            transform: translateY(calc(100% + 20px));
            opacity: 0;
        }
        
        .info-title {
            margin-bottom: 0.5rem;
            color: #00ccff;
            font-size: 1.2rem;
        }
        
        .info-content {
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .info-toggle {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(40, 40, 80, 0.8);
            border: 1px solid rgba(100, 180, 255, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 11;
            box-shadow: 0 0 15px rgba(100, 180, 255, 0.4);
            transition: all 0.3s ease;
        }
        
        .info-toggle:hover {
            background: rgba(60, 60, 100, 0.8);
            box-shadow: 0 0 20px rgba(156, 71, 255, 0.6);
        }
        
        /* Keyframes for animations */
        @keyframes cube-rotate {
            0% { transform: rotateX(0) rotateY(0) rotateZ(0); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }
        
        @keyframes hologram-rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        
        @keyframes float-around {
            0% { transform: translate(0, 0); }
            25% { transform: translate(50px, 50px); }
            50% { transform: translate(0, 100px); }
            75% { transform: translate(-50px, 50px); }
            100% { transform: translate(0, 0); }
        }
        
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        @keyframes wave {
            0% { transform: scaleY(1); }
            50% { transform: scaleY(1.1); }
            100% { transform: scaleY(1); }
        }
        
        @keyframes energy-pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1.1); opacity: 0.9; }
        }
        
        @keyframes energy-orbit {
            0% { transform: rotate(0deg) translateX(150px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(150px) rotate(-360deg); }
        }
        
        @keyframes dna-rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        
        @keyframes title-glow {
            0% { text-shadow: 0 0 10px rgba(156, 71, 255, 0.5); }
            50% { text-shadow: 0 0 20px rgba(0, 204, 255, 0.8); }
            100% { text-shadow: 0 0 10px rgba(156, 71, 255, 0.5); }
        }
        
        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .cube-container {
                width: 150px;
                height: 150px;
            }
            
            .cube-face {
                width: 150px;
                height: 150px;
            }
            
            .front, .back { transform: translateZ(75px); }
            .right, .left { transform: rotateY(90deg) translateZ(75px); }
            .top, .bottom { transform: rotateX(90deg) translateZ(75px); }
            
            .pulsating-ring {
                width: 200px;
                height: 200px;
            }
            
            .hologram {
                width: 300px;
                height: 300px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 80%;
                margin-bottom: 0.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>FUTURISTIC ANIMATION GALLERY</h1>
        <div class="controls">
            <button class="btn active" data-animation="cube">3D Cube</button>
            <button class="btn" data-animation="constellation">Constellation</button>
            <button class="btn" data-animation="wave">Wave Field</button>
            <button class="btn" data-animation="energy">Energy Field</button>
            <button class="btn" data-animation="dna">DNA Helix</button>
        </div>
    </div>
    
    <div class="animation-container">
        <div class="animation-stage">
            <!-- Particles background -->
            <div class="particles"></div>
            
            <!-- Holographic display -->
            <div class="hologram">
                <div class="hologram-lines"></div>
            </div>
            
            <!-- Pulsating ring -->
            <div class="pulsating-ring"></div>
            
            <!-- 3D Cube -->
            <div class="cube-container">
                <div class="cube">
                    <div class="cube-face front">1</div>
                    <div class="cube-face back">2</div>
                    <div class="cube-face right">3</div>
                    <div class="cube-face left">4</div>
                    <div class="cube-face top">5</div>
                    <div class="cube-face bottom">6</div>
                </div>
            </div>
            
            <!-- Constellation effect -->
            <div class="constellation"></div>
            
            <!-- Wave animation -->
            <div class="wave-container">
                <div class="wave" style="animation-delay: 0s;"></div>
                <div class="wave" style="animation-delay: 1s;"></div>
                <div class="wave" style="animation-delay: 2s;"></div>
            </div>
            
            <!-- Energy field -->
            <div class="energy-field"></div>
            
            <!-- DNA Helix -->
            <div class="dna-container"></div>
        </div>
    </div>
    
    <!-- Information panel -->
    <div class="info-panel">
        <div class="info-title">3D Cube Animation</div>
        <div class="info-content">
            Interactive 3D cube with glowing edges. Click any face to see a reaction, or hover to pause the rotation. Tap or click the cube to change its speed.
        </div>
    </div>
    
    <div class="info-toggle">i</div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize animation elements
            const particlesContainer = document.querySelector('.particles');
            const cubeContainer = document.querySelector('.cube-container');
            const cube = document.querySelector('.cube');
            const constellation = document.querySelector('.constellation');
            const waveContainer = document.querySelector('.wave-container');
            const energyField = document.querySelector('.energy-field');
            const dnaContainer = document.querySelector('.dna-container');
            const infoPanel = document.querySelector('.info-panel');
            const infoTitle = document.querySelector('.info-title');
            const infoContent = document.querySelector('.info-content');
            const infoToggle = document.querySelector('.info-toggle');
            const animationButtons = document.querySelectorAll('.btn[data-animation]');
            const hologramLines = document.querySelector('.hologram-lines');
            
            // Animation state
            const state = {
                currentAnimation: 'cube',
                isPanelVisible: true,
                cubeRotationSpeed: 20
            };
            
            // Create particles
            function createParticles(count) {
                particlesContainer.innerHTML = '';
                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    
                    // Random size
                    const size = Math.random() * 4 + 1;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    
                    // Random position
                    particle.style.left = `${Math.random() * 100}%`;
                    particle.style.top = `${Math.random() * 100}%`;
                    
                    // Random animation duration and delay
                    const duration = Math.random() * 30 + 10;
                    const delay = Math.random() * 10;
                    particle.style.animationDuration = `${duration}s`;
                    particle.style.animationDelay = `${delay}s`;
                    
                    particlesContainer.appendChild(particle);
                }
            }
            
            // Create hologram lines
            function createHologramLines(count) {
                hologramLines.innerHTML = '';
                for (let i = 0; i < count; i++) {
                    const line = document.createElement('div');
                    line.classList.add('hologram-line');
                    line.style.transform = `rotate(${i * (180 / count)}deg)`;
                    hologramLines.appendChild(line);
                }
            }
            
            // Create stars for constellation
            function createConstellation(starsCount) {
                constellation.innerHTML = '';
                const stars = [];
                
                // Create stars
                for (let i = 0; i < starsCount; i++) {
                    const star = document.createElement('div');
                    star.classList.add('star');
                    
                    // Random position
                    const x = Math.random() * 100;
                    const y = Math.random() * 100;
                    star.style.left = `${x}%`;
                    star.style.top = `${y}%`;
                    
                    // Random animation delay
                    star.style.animationDelay = `${Math.random() * 4}s`;
                    
                    constellation.appendChild(star);
                    stars.push({ element: star, x, y });
                }
                
                // Connect nearby stars (not all connections, just enough to form a constellation)
                for (let i = 0; i < stars.length; i++) {
                    const currentStar = stars[i];
                    
                    // Find closest star
                    let closestDist = Infinity;
                    let closestStar = null;
                    
                    for (let j = 0; j < stars.length; j++) {
                        if (i === j) continue;
                        
                        const otherStar = stars[j];
                        const dist = Math.sqrt(
                            Math.pow(currentStar.x - otherStar.x, 2) + 
                            Math.pow(currentStar.y - otherStar.y, 2)
                        );
                        
                        if (dist < closestDist && dist < 30) {
                            closestDist = dist;
                            closestStar = otherStar;
                        }
                    }
                    
                    // Create connection to closest star if found
                    if (closestStar) {
                        const connection = document.createElement('div');
                        connection.classList.add('connection');
                        
                        // Calculate line length and angle
                        const length = Math.sqrt(
                            Math.pow(currentStar.x - closestStar.x, 2) + 
                            Math.pow(currentStar.y - closestStar.y, 2)
                        );
                        
                        const angle = Math.atan2(
                            closestStar.y - currentStar.y,
                            closestStar.x - currentStar.x
                        ) * 180 / Math.PI;
                        
                        // Position and rotate line
                        connection.style.width = `${length}%`;
                        connection.style.left = `${currentStar.x}%`;
                        connection.style.top = `${currentStar.y}%`;
                        connection.style.transform = `rotate(${angle}deg)`;
                        
                        constellation.appendChild(connection);
                    }
                }
            }
            
            // Create energy field particles
            function createEnergyField(particlesCount) {
                energyField.innerHTML = '';
                
                for (let i = 0; i < particlesCount; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('energy-particle');
                    
                    // Random starting angle
                    const angle = Math.random() * 360;
                    particle.style.animationDelay = `${Math.random() * 3}s`;
                    particle.style.transform = `rotate(${angle}deg) translateX(150px) rotate(-${angle}deg)`;
                    
                    energyField.appendChild(particle);
                }
            }
            
            // Create DNA helix structure
            function createDNAHelix(stepsCount) {
                const dnaStrand = document.createElement('div');
                dnaStrand.classList.add('dna-strand');
                dnaContainer.innerHTML = '';
                dnaContainer.appendChild(dnaStrand);
                
                const stepHeight = 300 / stepsCount;
                
                for (let i = 0; i < stepsCount; i++) {
                    const step = document.createElement('div');
                    step.classList.add('dna-step');
                    step.style.top = `${i * stepHeight}px`;
                    
                    // Left nucleotide
                    const leftNucleotide = document.createElement('div');
                    leftNucleotide.classList.add('dna-left');
                    
                    // Right nucleotide
                    const rightNucleotide = document.createElement('div');
                    rightNucleotide.classList.add('dna-right');
                    
                    // Connector
                    const connector = document.createElement('div');
                    connector.classList.add('dna-connector');
                    connector.style.transform = `rotate(${i % 2 ? 10 : -10}deg)`;
                    
                    step.appendChild(leftNucleotide);
                    step.appendChild(rightNucleotide);
                    step.appendChild(connector);
                    dnaStrand.appendChild(step);
                }
            }
            
            // Switch active animation
            function switchAnimation(animationName) {
                // Hide all animations
                cubeContainer.style.display = 'none';
                constellation.style.opacity = '0';
                waveContainer.style.display = 'none';
                energyField.style.display = 'none';
                dnaContainer.style.display = 'none';
                
                // Activate selected animation
                switch(animationName) {
                    case 'cube':
                        cubeContainer.style.display = 'block';
                        infoTitle.textContent = '3D Cube Animation';
                        infoContent.textContent = 'Interactive 3D cube with glowing edges. Click any face to see a reaction, or hover to pause the rotation. Tap or click the cube to change its speed.';
                        break;
                    case 'constellation':
                        constellation.style.opacity = '1';
                        infoTitle.textContent = 'Constellation Effect';
                        infoContent.textContent = 'Dynamic star constellation with connecting lines. The stars twinkle at different rates to create a lifelike cosmic effect.';
                        break;
                    case 'wave':
                        waveContainer.style.display = 'block';
                        infoTitle.textContent = 'Wave Field';
                        infoContent.textContent = 'Rippling energy waves that respond to your interaction. Click anywhere on the screen to create ripple effects.';
                        break;
                    case 'energy':
                        energyField.style.display = 'block';
                        infoTitle.textContent = 'Energy Field';
                        infoContent.textContent = 'Pulsating energy field with orbiting particles. Hover or tap to change the energy field\'s intensity and behavior.';
                        break;
                    case 'dna':
                        dnaContainer.style.display = 'block';
                        infoTitle.textContent = 'DNA Helix';
                        infoContent.textContent = 'Rotating DNA double helix structure with glowing nucleotides. Click to change rotation direction or speed.';
                        break;
                }
                
                // Update current animation state
                state.currentAnimation = animationName;
                
                // Update active button
                animationButtons.forEach(btn => {
                    if (btn.dataset.animation === animationName) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
            
            // Toggle info panel
            function toggleInfoPanel() {
                if (state.isPanelVisible) {
                    infoPanel.classList.add('hidden');
                } else {
                    infoPanel.classList.remove('hidden');
                }
                state.isPanelVisible = !state.isPanelVisible;
            }
            
            // Add event listeners for animation buttons
            animationButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    switchAnimation(this.dataset.animation);
                });
            });
            
            // Info panel toggle
            infoToggle.addEventListener('click', toggleInfoPanel);
            
            // Add interactivity to the cube
            cubeContainer.addEventListener('click', function() {
                // Change rotation speed on click
                state.cubeRotationSpeed = state.cubeRotationSpeed === 20 ? 5 : state.cubeRotationSpeed === 5 ? 40 : 20;
                cube.style.animationDuration = `${state.cubeRotationSpeed}s`;
            });
            
            // Make cube faces reactive
            document.querySelectorAll('.cube-face').forEach(face => {
                face.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.style.backgroundColor = `rgba(${Math.floor(Math.random() * 100 + 100)}, ${Math.floor(Math.random() * 100 + 100)}, ${Math.floor(Math.random() * 100 + 180)}, 0.4)`;
                    setTimeout(() => {
                        this.style.backgroundColor = '';
                    }, 1000);
                });
            });
// Add interaction for wave animation
            document.addEventListener('click', function(e) {
                if (state.currentAnimation === 'wave') {
                    const ripple = document.createElement('div');
                    ripple.style.position = 'absolute';
                    ripple.style.width = '10px';
                    ripple.style.height = '10px';
                    ripple.style.borderRadius = '50%';
                    ripple.style.background = 'rgba(156, 71, 255, 0.8)';
                    ripple.style.boxShadow = '0 0 20px rgba(156, 71, 255, 0.6)';
                    ripple.style.left = `${e.clientX}px`;
                    ripple.style.top = `${e.clientY}px`;
                    ripple.style.transform = 'scale(0)';
                    ripple.style.transition = 'all 1s ease-out';
                    document.body.appendChild(ripple);
                    
                    setTimeout(() => {
                        ripple.style.transform = 'scale(20)';
                        ripple.style.opacity = '0';
                        setTimeout(() => ripple.remove(), 1000);
                    }, 10);
                }
            });
            
            // Energy field interaction
            energyField.addEventListener('mousemove', function(e) {
                if (state.currentAnimation === 'energy') {
                    const bounds = this.getBoundingClientRect();
                    const x = e.clientX - bounds.left;
                    const y = e.clientY - bounds.top;
                    
                    // Adjust energy field based on mouse position
                    this.style.backgroundImage = `radial-gradient(circle at ${x}px ${y}px, rgba(156, 71, 255, 0.4) 0%, rgba(100, 180, 255, 0.2) 40%, transparent 70%)`;
                }
            });
            
            // DNA helix interaction
            dnaContainer.addEventListener('click', function() {
                const dnaStrand = this.querySelector('.dna-strand');
                const currentDirection = dnaStrand.style.animationDirection;
                
                if (!currentDirection || currentDirection === 'normal') {
                    dnaStrand.style.animationDirection = 'reverse';
                } else {
                    dnaStrand.style.animationDirection = 'normal';
                }
            });
            
            // Touch support for mobile
            document.addEventListener('touchstart', function(e) {
                const touch = e.touches[0];
                if (state.currentAnimation === 'wave') {
                    const ripple = document.createElement('div');
                    ripple.style.position = 'absolute';
                    ripple.style.width = '10px';
                    ripple.style.height = '10px';
                    ripple.style.borderRadius = '50%';
                    ripple.style.background = 'rgba(156, 71, 255, 0.8)';
                    ripple.style.boxShadow = '0 0 20px rgba(156, 71, 255, 0.6)';
                    ripple.style.left = `${touch.clientX}px`;
                    ripple.style.top = `${touch.clientY}px`;
                    ripple.style.transform = 'scale(0)';
                    ripple.style.transition = 'all 1s ease-out';
                    document.body.appendChild(ripple);
                    
                    setTimeout(() => {
                        ripple.style.transform = 'scale(20)';
                        ripple.style.opacity = '0';
                        setTimeout(() => ripple.remove(), 1000);
                    }, 10);
                }
            });
            
            // Initialize animations
            createParticles(50);
            createHologramLines(8);
            createConstellation(30);
            createEnergyField(15);
            createDNAHelix(20);
            
            // Start with default animation
            switchAnimation('cube');
            
            // Add window resize handler for responsiveness
            window.addEventListener('resize', function() {
                // Recreate animations that depend on screen size
                createConstellation(30);
            });
            
            // Easter egg: Konami code
            const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
            let konamiIndex = 0;
            
            document.addEventListener('keydown', function(e) {
                if (e.key === konamiCode[konamiIndex]) {
                    konamiIndex++;
                    if (konamiIndex === konamiCode.length) {
                        // Easter egg activated!
                        document.body.style.background = 'linear-gradient(to right, #ff00cc, #3333ff)';
                        setTimeout(() => {
                            document.body.style.background = '';
                            konamiIndex = 0;
                        }, 3000);
                    }
                } else {
                    konamiIndex = 0;
                }
            });
        });
    </script>
</body>
</html>
