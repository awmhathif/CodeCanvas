<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Futuristic Animation</title>
    <style>
        /* Base styles for animation container */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background-color: #0c0c1d;
            font-family: 'Arial', sans-serif;
        }
        
        /* Canvas for particle system */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Main container */
        .animation-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            perspective: 1000px;
        }
        
        /* Glowing text with changing colors */
        .neon-text {
            color: #fff;
            font-size: 5rem;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            animation: textGlow 5s infinite alternate;
            position: absolute;
            z-index: 3;
        }
        
        @keyframes textGlow {
            0% {
                text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #0073e6, 0 0 20px #0073e6, 0 0 25px #0073e6, 0 0 30px #0073e6, 0 0 35px #0073e6;
            }
            50% {
                text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #ff00de, 0 0 20px #ff00de, 0 0 25px #ff00de, 0 0 30px #ff00de, 0 0 35px #ff00de;
            }
            100% {
                text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #00ff88, 0 0 20px #00ff88, 0 0 25px #00ff88, 0 0 30px #00ff88, 0 0 35px #00ff88;
            }
        }
        
        /* Floating 3D objects */
        .floating-objects {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }
        
        .object {
            position: absolute;
            transform-style: preserve-3d;
            animation: float 8s infinite ease-in-out;
        }
        
        .cube {
            width: 100px;
            height: 100px;
            transform-style: preserve-3d;
            animation: rotate 20s infinite linear;
        }
        
        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(0, 0, 0, 0.1);
            border: 2px solid;
            box-shadow: 0 0 15px, 0 0 30px, 0 0 45px;
            backface-visibility: visible;
        }
        
        /* Glowing orbs with pulsating effect */
        .orb-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            animation: pulse 3s infinite alternate;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.5), 0 0 30px rgba(255, 255, 255, 0.3);
            }
            100% {
                transform: scale(1.2);
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 255, 255, 0.5), 0 0 60px rgba(255, 255, 255, 0.3);
            }
        }
        
        /* Pulsing rings that expand outward */
        .ring-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        
        .ring {
            position: absolute;
            border: 2px solid transparent;
            border-radius: 50%;
            animation: ringPulse 4s infinite;
        }
        
        @keyframes ringPulse {
            0% {
                width: 50px;
                height: 50px;
                opacity: 1;
                border-color: rgba(0, 255, 255, 0.8);
                box-shadow: 0 0 10px rgba(0, 255, 255, 0.8), inset 0 0 10px rgba(0, 255, 255, 0.5);
            }
            100% {
                width: 500px;
                height: 500px;
                opacity: 0;
                border-color: rgba(0, 255, 255, 0);
                box-shadow: 0 0 50px rgba(0, 255, 255, 0), inset 0 0 50px rgba(0, 255, 255, 0);
            }
        }
        
        /* Float animation for objects */
        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
            }
            50% {
                transform: translateY(-20px) translateX(20px);
            }
            100% {
                transform: translateY(0) translateX(0);
            }
        }
        
        /* Rotation animation for 3D objects */
        @keyframes rotate {
            0% {
                transform: rotateX(0) rotateY(0) rotateZ(0);
            }
            100% {
                transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
            }
        }
        
        /* Interactive button with glow effect */
        .glow-button {
            position: absolute;
            bottom: 10%;
            padding: 15px 30px;
            background: transparent;
            color: #00fff2;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid #00fff2;
            border-radius: 30px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            overflow: hidden;
        }
        
        .glow-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #00aeff, #00ff73, #ff00c8);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .glow-button:hover {
            color: #fff;
            box-shadow: 0 0 10px #00fff2, 0 0 20px #00fff2, 0 0 30px #00fff2;
        }
        
        .glow-button:hover::before {
            opacity: 0.3;
        }
        
        /* Energy beam animation */
        .energy-beam {
            position: absolute;
            width: 3px;
            background: linear-gradient(to top, rgba(0, 255, 255, 0), #00ffff);
            transform-origin: bottom center;
            z-index: 2;
            animation: beam 2s infinite;
        }
        
        @keyframes beam {
            0% {
                height: 0;
                opacity: 0.5;
            }
            50% {
                height: 100vh;
                opacity: 1;
            }
            100% {
                height: 0;
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <!-- Canvas for particles -->
    <canvas id="particleCanvas"></canvas>
    
    <!-- Main container -->
    <div class="animation-container">
        <!-- Glowing text -->
        <h1 class="neon-text">Futuristic</h1>
        
        <!-- Floating 3D objects -->
        <div class="floating-objects" id="floatingObjects"></div>
        
        <!-- Glowing orbs -->
        <div class="orb-container" id="orbContainer"></div>
        
        <!-- Pulsing rings -->
        <div class="ring-container">
            <div class="ring" style="animation-delay: 0s;"></div>
            <div class="ring" style="animation-delay: 1s;"></div>
            <div class="ring" style="animation-delay: 2s;"></div>
            <div class="ring" style="animation-delay: 3s;"></div>
        </div>
        
        <!-- Energy beams -->
        <div id="beamContainer"></div>
        
        <!-- Interactive button -->
        <button class="glow-button" id="actionButton">Activate</button>
    </div>
    
    <script>
        // Initialize animation elements on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Canvas setup for particle system
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            
            // Set canvas to full screen
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // Particle system
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 3 + 1;
                    this.speedX = Math.random() * 3 - 1.5;
                    this.speedY = Math.random() * 3 - 1.5;
                    this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    this.alpha = Math.random() * 0.5 + 0.5;
                }
                
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    // Bounce off edges
                    if (this.x > canvas.width || this.x < 0) {
                        this.speedX = -this.speedX;
                    }
                    if (this.y > canvas.height || this.y < 0) {
                        this.speedY = -this.speedY;
                    }
                }
                
                draw() {
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            
            // Create particles
            const particles = [];
            const particleCount = Math.min(100, Math.floor(window.innerWidth * window.innerHeight / 10000));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            
            // Function to draw connecting lines between particles
            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 150) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(255, 255, 255, ${1 - distance / 150})`;
                            ctx.lineWidth = 0.5;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
            }
            
            // Animation loop for particles
            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Update and draw particles
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                
                drawConnections();
                requestAnimationFrame(animateParticles);
            }
            
            animateParticles();
            
            // Create floating 3D objects
            const floatingObjectsContainer = document.getElementById('floatingObjects');
            const objectCount = 5;
            
            for (let i = 0; i < objectCount; i++) {
                createCube(i);
            }
            
            function createCube(index) {
                const object = document.createElement('div');
                object.className = 'object';
                object.style.left = `${Math.random() * 80 + 10}%`;
                object.style.top = `${Math.random() * 80 + 10}%`;
                object.style.animationDelay = `${index * 0.5}s`;
                
                const cube = document.createElement('div');
                cube.className = 'cube';
                
                // Create cube faces
                const colors = ['#00ffff', '#ff00ff', '#ffff00', '#00ff00', '#ff0000', '#0000ff'];
                
                for (let j = 0; j < 6; j++) {
                    const face = document.createElement('div');
                    face.className = 'cube-face';
                    face.style.borderColor = colors[j];
                    face.style.boxShadow = `0 0 15px ${colors[j]}, 0 0 30px ${colors[j]}, 0 0 45px ${colors[j]}`;
                    
                    // Position cube faces
                    switch (j) {
                        case 0: // front
                            face.style.transform = 'translateZ(50px)';
                            break;
                        case 1: // back
                            face.style.transform = 'translateZ(-50px) rotateY(180deg)';
                            break;
                        case 2: // right
                            face.style.transform = 'translateX(50px) rotateY(90deg)';
                            break;
                        case 3: // left
                            face.style.transform = 'translateX(-50px) rotateY(-90deg)';
                            break;
                        case 4: // top
                            face.style.transform = 'translateY(-50px) rotateX(90deg)';
                            break;
                        case 5: // bottom
                            face.style.transform = 'translateY(50px) rotateX(-90deg)';
                            break;
                    }
                    
                    cube.appendChild(face);
                }
                
                object.appendChild(cube);
                floatingObjectsContainer.appendChild(object);
            }
            
            // Create glowing orbs
            const orbContainer = document.getElementById('orbContainer');
            const orbCount = 15;
            
            for (let i = 0; i < orbCount; i++) {
                const orb = document.createElement('div');
                orb.className = 'orb';
                
                // Random position
                orb.style.left = `${Math.random() * 90 + 5}%`;
                orb.style.top = `${Math.random() * 90 + 5}%`;
                
                // Random size
                const size = Math.random() * 30 + 10;
                orb.style.width = `${size}px`;
                orb.style.height = `${size}px`;
                
                // Random color
                const hue = Math.random() * 360;
                orb.style.backgroundColor = `hsla(${hue}, 100%, 70%, 0.3)`;
                orb.style.boxShadow = `0 0 20px hsla(${hue}, 100%, 70%, 0.7), 0 0 40px hsla(${hue}, 100%, 70%, 0.5)`;
                
                // Animation delay
                orb.style.animationDelay = `${Math.random() * 3}s`;
                
                orbContainer.appendChild(orb);
            }
            
            // Create energy beams
            const beamContainer = document.getElementById('beamContainer');
            const beamCount = 8;
            
            for (let i = 0; i < beamCount; i++) {
                createBeam(i);
            }
            
            function createBeam(index) {
                const beam = document.createElement('div');
                beam.className = 'energy-beam';
                
                // Position the beam
                beam.style.left = `${(index / beamCount) * 100 + (100 / beamCount / 2)}%`;
                
                // Animation delay
                beam.style.animationDelay = `${index * 0.25}s`;
                
                beamContainer.appendChild(beam);
            }
            
            // Interactive button
            const actionButton = document.getElementById('actionButton');
            
            actionButton.addEventListener('click', function() {
                // Change text
                this.textContent = this.textContent === 'Activate' ? 'Deactivate' : 'Activate';
                
                // Toggle additional animations or effects
                document.body.classList.toggle('activated');
                
                // Create explosion effect
                createExplosionEffect(canvas.width / 2, canvas.height / 2);
            });
            
            // Mouse interaction
            document.addEventListener('mousemove', function(e) {
                // Create small orbs that follow the mouse and disappear
                const mouseOrb = document.createElement('div');
                mouseOrb.className = 'orb';
                
                // Set position to mouse position
                mouseOrb.style.left = `${e.clientX}px`;
                mouseOrb.style.top = `${e.clientY}px`;
                
                // Set size and style
                mouseOrb.style.width = '10px';
                mouseOrb.style.height = '10px';
                mouseOrb.style.backgroundColor = 'rgba(255, 255, 255, 0.5)';
                mouseOrb.style.boxShadow = '0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4)';
                mouseOrb.style.transition = 'transform 0.5s, opacity 0.5s';
                mouseOrb.style.position = 'fixed';
                mouseOrb.style.zIndex = '10';
                
                document.body.appendChild(mouseOrb);
                
                // Animate and remove
                setTimeout(() => {
                    mouseOrb.style.transform = 'scale(2)';
                    mouseOrb.style.opacity = '0';
                }, 10);
                
                setTimeout(() => {
                    mouseOrb.remove();
                }, 500);
            });
            
            // Function to create explosion effect
            function createExplosionEffect(x, y) {
                // Create multiple particles that spread out from the center
                for (let i = 0; i < 50; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'orb';
                    
                    // Set initial position
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    
                    // Random size
                    const size = Math.random() * 15 + 5;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    
                    // Random color
                    const hue = Math.random() * 360;
                    particle.style.backgroundColor = `hsla(${hue}, 100%, 70%, 0.7)`;
                    particle.style.boxShadow = `0 0 10px hsla(${hue}, 100%, 70%, 0.7)`;
                    
                    // Position attributes
                    particle.style.position = 'fixed';
                    particle.style.zIndex = '20';
                    particle.style.transition = 'transform 1s, opacity 1s';
                    
                    document.body.appendChild(particle);
                    
                    // Random direction
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 300 + 100;
                    const destX = Math.cos(angle) * distance;
                    const destY = Math.sin(angle) * distance;
                    
                    // Animate
                    setTimeout(() => {
                        particle.style.transform = `translate(${destX}px, ${destY}px)`;
                        particle.style.opacity = '0';
                    }, 10);
                    
                    // Remove after animation completes
                    setTimeout(() => {
                        particle.remove();
                    }, 1000);
                }
            }
            
            // Create auto-animation explosion effects at random intervals
            function randomExplosions() {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                
                createExplosionEffect(x, y);
                
                // Schedule next explosion
                setTimeout(randomExplosions, Math.random() * 3000 + 2000);
            }
            
            // Start random explosions
            setTimeout(randomExplosions, 2000);
            
            // Create a dynamic, animated background gradient
            function animateBackgroundGradient() {
                const gradientAngle = (Date.now() * 0.02) % 360;
                const hue1 = (Date.now() * 0.05) % 360;
                const hue2 = (hue1 + 180) % 360;
                
                document.body.style.background = `linear-gradient(${gradientAngle}deg, hsl(${hue1}, 70%, 10%), hsl(${hue2}, 70%, 20%))`;
                
                requestAnimationFrame(animateBackgroundGradient);
            }
            
            animateBackgroundGradient();
        });
    </script>
</body>
</html>
