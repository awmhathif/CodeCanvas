<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Particle Shapes</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 100;
            display:block;
            color: #ffffff;
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="info">Interactive Particle Shapes</div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import TWEEN from 'https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18.6.4/dist/tween.esm.js';

        // --- Scene Setup ---
        let scene, camera, renderer, composer, controls;
        let particleSystem, originalPositions;
        let meteoroids = [];
        const PARTICLE_COUNT = 8000;

        // --- Configurable Parameters ---
        const params = {
            particleColor: '#ff0055',
            meteoroidColor: '#ffffff',
            backgroundColor: '#000000',
            bloomStrength: 1.5,
            bloomThreshold: 0,
            bloomRadius: 0,
            animationSpeed: 1.0,
            shape: 'Heart',
            repelRadius: 4,
            repelStrength: 8,
            numMeteoroids: 1
        };

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(params.backgroundColor);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 100;

            // --- Particle System Creation ---
            createParticleSystem();

            // --- Meteoroid Creation ---
            createMeteoroids();
            
            // --- Post-processing (Bloom Effect) ---
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = params.bloomThreshold;
            bloomPass.strength = params.bloomStrength;
            bloomPass.radius = params.bloomRadius;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            
            // --- GUI ---
            setupGui(bloomPass);

            // --- Event Listeners ---
            window.addEventListener('resize', onWindowResize, false);
            
            // Start animation loop
            animate();
        }

        function createParticleSystem() {
            const geometry = new THREE.BufferGeometry();
            // Initialize with empty positions, they will be set by updateParticleShape
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(PARTICLE_COUNT * 3), 3));

            const material = new THREE.PointsMaterial({
                color: params.particleColor,
                size: 0.15,
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false,
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
            
            // Generate the initial shape
            updateParticleShape(true);
        }

        function setupGui(bloomPass) {
            const gui = new GUI();
            const visualsFolder = gui.addFolder('Visuals');
            visualsFolder.addColor(params, 'particleColor').name('Particle Color').onChange(() => {
                particleSystem.material.color.set(params.particleColor);
            });
            visualsFolder.addColor(params, 'meteoroidColor').name('Meteoroid Color').onChange(() => {
                meteoroids.forEach(m => m.material.color.set(params.meteoroidColor));
            });
            visualsFolder.addColor(params, 'backgroundColor').name('Background Color').onChange((value) => {
                scene.background = new THREE.Color(value);
            });
            visualsFolder.add(params, 'bloomStrength', 0, 3).name('Bloom Strength').onChange(value => bloomPass.strength = value);
            visualsFolder.close();

            const physicsFolder = gui.addFolder('Physics');
            physicsFolder.add(params, 'animationSpeed', 0.1, 3.0).name('Meteoroid Speed');
            physicsFolder.add(params, 'repelRadius', 1, 10).name('Repel Radius');
            physicsFolder.add(params, 'repelStrength', 1, 20).name('Repel Strength');
            physicsFolder.add(params, 'numMeteoroids', 1, 10, 1).name('Meteoroids').onChange(createMeteoroids);
            physicsFolder.close();

            gui.add(params, 'shape', ['Heart', 'Sphere', 'Cube', 'Torus', 'Torus Knot']).name('Shape').onChange(() => updateParticleShape(false));
        }

        // --- Shape Generation Logic ---
        function updateParticleShape(isInitial = false) {
            const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
            const scale = 10; // General scale for shapes

            // --- Helper to generate points for different shapes ---
            const generators = {
                'Heart': () => {
                    const heartShape = new THREE.Shape();
                    const x = -5, y = -5;
                    heartShape.moveTo(x + 2.5, y + 2.5);
                    heartShape.bezierCurveTo(x + 2.5, y + 2.5, x + 2, y, x, y);
                    heartShape.bezierCurveTo(x - 3, y, x - 3, y + 3.5,x - 3, y + 3.5);
                    heartShape.bezierCurveTo(x - 3, y + 5.5, x - 1.5, y + 7.7, x + 2.5, y + 9.5);
                    heartShape.bezierCurveTo(x + 6, y + 7.7, x + 8, y + 5.5, x + 8, y + 3.5);
                    heartShape.bezierCurveTo(x + 8, y + 3.5, x + 8, y, x + 5, y);
                    heartShape.bezierCurveTo(x + 3.5, y, x + 2.5, y + 2.5, x + 2.5, y + 2.5);
                    
                    const path = new THREE.Path(heartShape.getPoints(50));
                    
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        const u = Math.random();
                        const v = Math.random();
                        const pointOnPath = path.getPoint(u);
                        const radius = Math.sqrt(v) * scale * 0.8;
                        const angle = Math.random() * Math.PI * 2;
                        
                        targetPositions[i * 3] = pointOnPath.x + Math.cos(angle) * radius * (Math.random() * 0.5 + 0.5);
                        targetPositions[i * 3 + 1] = pointOnPath.y + Math.sin(angle) * radius * (Math.random() * 0.5 + 0.5);
                        targetPositions[i * 3 + 2] = (Math.random() - 0.5) * scale * 0.5;
                    }
                },
                'Sphere': () => {
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        const phi = Math.acos(2 * Math.random() - 1);
                        const theta = Math.random() * 2 * Math.PI;
                        const r = scale * Math.cbrt(Math.random()); 
                        targetPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                        targetPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                        targetPositions[i * 3 + 2] = r * Math.cos(phi);
                    }
                },
                'Cube': () => {
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        targetPositions[i * 3] = (Math.random() - 0.5) * scale * 1.5;
                        targetPositions[i * 3 + 1] = (Math.random() - 0.5) * scale * 1.5;
                        targetPositions[i * 3 + 2] = (Math.random() - 0.5) * scale * 1.5;
                    }
                },
                'Torus': () => {
                    const R = scale * 0.8; 
                    const r = scale * 0.3; 
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        const u = Math.random() * 2 * Math.PI;
                        const v = Math.random() * 2 * Math.PI;
                        targetPositions[i * 3] = (R + r * Math.cos(v)) * Math.cos(u);
                        targetPositions[i * 3 + 1] = (R + r * Math.cos(v)) * Math.sin(u);
                        targetPositions[i * 3 + 2] = r * Math.sin(v);
                    }
                },
                'Torus Knot': () => {
                    const p = 2;
                    const q = 3;
                    const radius = 6;
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        const u = Math.random() * 2 * Math.PI;
                        const v = Math.random() * 2 * Math.PI;
                        const r = 0.5;
                        const x = (radius + r * Math.cos(q * u)) * Math.cos(p * u);
                        const y = (radius + r * Math.cos(q * u)) * Math.sin(p * u);
                        const z = r * Math.sin(q * u);
                        targetPositions[i * 3] = x + (Math.random() - 0.5);
                        targetPositions[i * 3 + 1] = y + (Math.random() - 0.5);
                        targetPositions[i * 3 + 2] = z + (Math.random() - 0.5);
                    }
                }
            };

            generators[params.shape]();

            if (isInitial) {
                particleSystem.geometry.attributes.position.array.set(targetPositions);
                originalPositions = targetPositions.slice();
            } else {
                const currentPositions = particleSystem.geometry.attributes.position.array;
                const tempOriginals = targetPositions.slice();
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const i3 = i * 3;
                    new TWEEN.Tween({ x: currentPositions[i3], y: currentPositions[i3 + 1], z: currentPositions[i3 + 2] })
                        .to({ x: targetPositions[i3], y: targetPositions[i3 + 1], z: targetPositions[i3 + 2] }, 1500)
                        .easing(TWEEN.Easing.Quintic.Out)
                        .onUpdate(function(obj) {
                            currentPositions[i3] = obj.x;
                            currentPositions[i3 + 1] = obj.y;
                            currentPositions[i3 + 2] = obj.z;
                        })
                        .onComplete(() => {
                            if (i === PARTICLE_COUNT - 1) {
                                originalPositions = tempOriginals;
                            }
                        })
                        .start();
                }
            }
        }

        function createMeteoroids() {
            meteoroids.forEach(m => scene.remove(m));
            meteoroids = [];
            for (let i = 0; i < params.numMeteoroids; i++) {
                const geometry = new THREE.SphereGeometry(0.4, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color: params.meteoroidColor });
                const meteoroid = new THREE.Mesh(geometry, material);
                meteoroids.push(meteoroid);
                scene.add(meteoroid);
                animateMeteoroid(meteoroid);
            }
        }

        function animateMeteoroid(meteor) {
            const startPos = new THREE.Vector3().setFromSphericalCoords(
                80, // Start further away
                Math.acos(1 - 2 * Math.random()), 
                Math.random() * 2 * Math.PI
            );
            meteor.position.copy(startPos);
            meteor.visible = true;

            const endPos = startPos.clone().negate();
            
            const duration = (5000 + Math.random() * 2000) / params.animationSpeed;
            new TWEEN.Tween(meteor.position)
                .to(endPos, duration)
                .easing(TWEEN.Easing.Linear.None)
                .onComplete(() => {
                    animateMeteoroid(meteor);
                })
                .start();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        const particlePosition = new THREE.Vector3();
        const repelVector = new THREE.Vector3();

        function animate(time) {
            requestAnimationFrame(animate);

            TWEEN.update(time);
            controls.update();
            
            const positions = particleSystem.geometry.attributes.position.array;
            const t = time * 0.0008; // Slower pulsation

            if (originalPositions) {
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const i3 = i * 3;

                    // Get the base position for the current shape
                    const ox = originalPositions[i3];
                    const oy = originalPositions[i3 + 1];
                    const oz = originalPositions[i3 + 2];
                    
                    // 1. Apply gentle pulsation
                    const length = Math.sqrt(ox*ox + oy*oy + oz*oz);
                    if (length > 0) { // Prevent division by zero
                        const pulse = Math.sin(length * 0.3 - t) * 0.2;
                        particlePosition.set(
                            ox + (ox/length) * pulse,
                            oy + (oy/length) * pulse,
                            oz + (oz/length) * pulse
                        );
                    } else {
                        particlePosition.set(ox, oy, oz);
                    }
                    
                    // 2. Apply repulsion from meteoroids
                    meteoroids.forEach(meteoroid => {
                        repelVector.copy(particlePosition).sub(meteoroid.position);
                        const distance = repelVector.length();
                        
                        if (distance < params.repelRadius) {
                            const repelForce = (1 - distance / params.repelRadius) * params.repelStrength;
                            repelVector.normalize().multiplyScalar(repelForce);
                            particlePosition.add(repelVector);
                        }
                    });

                    // Update final position in the buffer
                    positions[i3] = particlePosition.x;
                    positions[i3 + 1] = particlePosition.y;
                    positions[i3 + 2] = particlePosition.z;
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
            }

            composer.render();
        }

        init();

    </script>
</body>
</html>
