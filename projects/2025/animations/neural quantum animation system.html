<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Quantum Animation System</title>
    <style>
        :root {
            --quantum-hue: 200;
            --neural-alpha: 0.15;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        /* Quantum Interface Layer */
        .quantum-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Neural Network Visualization */
        .neural-network {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        
        .neuron {
            position: absolute;
            width: 12px;
            height: 12px;
            background: hsl(var(--quantum-hue), 100%, 50%);
            border-radius: 50%;
            filter: blur(1px);
            animation: neuronPulse 2s infinite;
        }
        
        @keyframes neuronPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.8); opacity: 0.2; }
        }
        
        /* Holographic Interface */
        .hologram-container {
            position: fixed;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            z-index: 3;
        }
        
        .hologram {
            position: absolute;
            border: 2px solid hsl(var(--quantum-hue), 100%, 50%);
            box-shadow: 0 0 15px hsl(var(--quantum-hue), 100%, 50%);
            background: rgba(0, 0, 0, 0.3);
            transform-style: preserve-3d;
            animation: hologramFloat 8s infinite;
        }
        
        @keyframes hologramFloat {
            0%, 100% { transform: translateY(0) rotateX(0) rotateY(0); }
            50% { transform: translateY(-20px) rotateX(15deg) rotateY(15deg); }
        }
        
        /* Quantum Data Stream */
        .data-stream {
            position: fixed;
            bottom: 0;
            left: 0;
            color: #0f0;
            font-size: 1.2rem;
            padding: 20px;
            text-shadow: 0 0 10px #0f0;
            z-index: 4;
        }
        
        /* System Overlay */
        .system-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #0ff;
            font-size: 1.1rem;
            z-index: 5;
        }
    </style>
</head>
<body>
    <canvas class="quantum-canvas"></canvas>
    <div class="neural-network"></div>
    <div class="hologram-container"></div>
    <div class="data-stream"></div>
    <div class="system-overlay"></div>
    
    <script>
        // Quantum Fluid Dynamics Engine
        class QuantumFluid {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.springs = [];
                this.mouse = { x: 0, y: 0, active: false };
                this.init();
            }
            
            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.canvas.addEventListener('mousemove', e => this.handleMouse(e));
                this.canvas.addEventListener('mousedown', () => this.mouse.active = true);
                this.canvas.addEventListener('mouseup', () => this.mouse.active = false);
                
                // Create quantum particles
                for(let i = 0; i < 1000; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        vx: Math.random() * 2 - 1,
                        vy: Math.random() * 2 - 1,
                        connections: new Set()
                    });
                }
                
                this.animate();
            }
            
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }
            
            handleMouse(e) {
                this.mouse.x = e.clientX;
                this.mouse.y = e.clientY;
            }
            
            animate() {
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Update particles
                this.particles.forEach(particle => {
                    // Mouse interaction
                    if(this.mouse.active) {
                        const dx = this.mouse.x - particle.x;
                        const dy = this.mouse.y - particle.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if(dist < 100) {
                            particle.vx += dx * 0.0001;
                            particle.vy += dy * 0.0001;
                        }
                    }
                    
                    // Particle movement
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    
                    // Boundary checks
                    if(particle.x < 0 || particle.x > this.canvas.width) particle.vx *= -1;
                    if(particle.y < 0 || particle.y > this.canvas.height) particle.vy *= -1;
                });
                
                // Draw connections
                this.particles.forEach((p1, i) => {
                    this.particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if(dist < 80) {
                            this.ctx.beginPath();
                            this.ctx.strokeStyle = `hsla(${Math.abs(p1.x/p2.y * 360)}, 70%, 50%, ${1 - dist/80})`;
                            this.ctx.lineWidth = 0.5;
                            this.ctx.moveTo(p1.x, p1.y);
                            this.ctx.lineTo(p2.x, p2.y);
                            this.ctx.stroke();
                        }
                    });
                });
                
                requestAnimationFrame(() => this.animate());
            }
        }
        
        // Neural Interface System
        class NeuralInterface {
            constructor(container) {
                this.container = container;
                this.neurons = [];
                this.init();
            }
            
            init() {
                this.createNeurons();
                this.animate();
            }
            
            createNeurons() {
                for(let i = 0; i < 50; i++) {
                    const neuron = document.createElement('div');
                    neuron.className = 'neuron';
                    neuron.style.left = `${Math.random() * 100}%`;
                    neuron.style.top = `${Math.random() * 100}%`;
                    this.container.appendChild(neuron);
                    this.neurons.push(neuron);
                }
            }
            
            animate() {
                this.neurons.forEach(neuron => {
                    const x = parseFloat(neuron.style.left) + (Math.random() - 0.5) * 0.3;
                    const y = parseFloat(neuron.style.top) + (Math.random() - 0.5) * 0.3;
                    neuron.style.left = `${x}%`;
                    neuron.style.top = `${y}%`;
                });
                
                requestAnimationFrame(() => this.animate());
            }
        }
        
        // Holographic Generator
        class HologramSystem {
            constructor(container) {
                this.container = container;
                this.holograms = [];
                this.init();
            }
            
            init() {
                this.createHolograms();
                this.animate();
            }
            
            createHolograms() {
                const shapes = ['polygon(0% 0%, 100% 0%, 50% 100%)', 
                              'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)',
                              'polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)'];
                
                for(let i = 0; i < 7; i++) {
                    const hologram = document.createElement('div');
                    hologram.className = 'hologram';
                    hologram.style.cssText = `
                        left: ${Math.random() * 80 + 10}%;
                        top: ${Math.random() * 80 + 10}%;
                        width: ${Math.random() * 100 + 50}px;
                        height: ${Math.random() * 100 + 50}px;
                        clip-path: ${shapes[Math.floor(Math.random() * shapes.length)]};
                        animation-delay: ${Math.random() * 8}s;
                    `;
                    this.container.appendChild(hologram);
                    this.holograms.push(hologram);
                }
            }
            
            animate() {
                this.holograms.forEach(hologram => {
                    const hue = parseFloat(getComputedStyle(document.documentElement)
                        .getPropertyValue('--quantum-hue')) + Math.sin(Date.now()/1000) * 360;
                    hologram.style.borderColor = `hsl(${hue}, 100%, 50%)`;
                    hologram.style.boxShadow = `0 0 15px hsl(${hue}, 100%, 50%)`;
                });
                
                requestAnimationFrame(() => this.animate());
            }
        }
        
        // System Monitor
        class SystemMonitor {
            constructor(container) {
                this.container = container;
                this.stats = {
                    cpu: 0,
                    memory: 0,
                    quantum: 0,
                    neural: 0
                };
                this.init();
            }
            
            init() {
                this.update();
            }
            
            update() {
                this.stats = {
                    cpu: Math.abs(Math.sin(Date.now()/1000)) * 100,
                    memory: Math.abs(Math.cos(Date.now()/800)) * 100,
                    quantum: Math.random() * 100,
                    neural: Math.abs(Math.sin(Date.now()/1500)) * 100
                };
                
                this.container.innerHTML = `
                    SYSTEM STATUS:<br>
                    CPU: ${this.stats.cpu.toFixed(1)}%<br>
                    MEM: ${this.stats.memory.toFixed(1)}%<br>
                    QNT: ${this.stats.quantum.toFixed(1)}%<br>
                    NRL: ${this.stats.neural.toFixed(1)}%
                `;
                
                setTimeout(() => this.update(), 100);
            }
        }
        
        // Initialize all systems
        document.addEventListener('DOMContentLoaded', () => {
            // Launch quantum fluid system
            const quantumFluid = new QuantumFluid(document.querySelector('.quantum-canvas'));
            
            // Activate neural interface
            const neuralInterface = new NeuralInterface(document.querySelector('.neural-network'));
            
            // Start hologram system
            const hologramSystem = new HologramSystem(document.querySelector('.hologram-container'));
            
            // Initialize system monitor
            const systemMonitor = new SystemMonitor(document.querySelector('.system-overlay'));
            
            // Start data stream
            const dataStream = document.querySelector('.data-stream');
            const characters = '01';
            setInterval(() => {
                let newData = '';
                for(let i = 0; i < 100; i++) {
                    newData += characters.charAt(Math.floor(Math.random() * characters.length));
                }
                dataStream.textContent = newData.match(/.{1,4}/g).join(' ');
            }, 100);
            
            // Add color morphing
            setInterval(() => {
                document.documentElement.style.setProperty('--quantum-hue', 
                    Math.sin(Date.now()/5000) * 360);
            }, 100);
            
            // Add audio reactivity
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        const source = audioContext.createMediaStreamSource(stream);
                        source.connect(analyser);
                        analyser.fftSize = 256;
                        
                        const bufferLength = analyser.frequencyBinCount;
                        const dataArray = new Uint8Array(bufferLength);
                        
                        const updateAudio = () => {
                            analyser.getByteFrequencyData(dataArray);
                            const average = dataArray.reduce((a, b) => a + b) / bufferLength;
                            document.documentElement.style.setProperty('--neural-alpha', 
                                Math.min(0.5, average/255));
                            requestAnimationFrame(updateAudio);
                        };
                        updateAudio();
                    });
            } catch(e) {
                console.log('Audio input not available');
            }
        });
    </script>
</body>
</html>
