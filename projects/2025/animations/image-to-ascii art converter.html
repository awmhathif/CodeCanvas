<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image-to-ASCII Art Converter</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Courier New', monospace;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    color: #333;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

header {
    text-align: center;
    margin-bottom: 30px;
    color: white;
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

header p {
    font-size: 1.1rem;
    opacity: 0.9;
}

.upload-section {
    margin-bottom: 30px;
}

.upload-area {
    border: 3px dashed #fff;
    border-radius: 15px;
    padding: 40px 20px;
    text-align: center;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: all 0.3s ease;
    color: white;
}

.upload-area:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.upload-area.dragover {
    border-color: #4CAF50;
    background: rgba(76,175,80,0.2);
}

.upload-icon {
    font-size: 3rem;
    margin-bottom: 15px;
}

.controls, .animation-controls {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.control-group {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
    gap: 15px;
}

.control-group label {
    font-weight: bold;
    min-width: 120px;
}

.control-group input[type="range"] {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: #ddd;
    outline: none;
}

.control-group input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #667eea;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.control-group select {
    padding: 8px 15px;
    border: 2px solid #ddd;
    border-radius: 8px;
    background: white;
    font-family: inherit;
}

.button-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14px;
}

.btn.primary {
    background: linear-gradient(45deg, #667eea, #764ba2);
    color: white;
}

.btn.secondary {
    background: #f8f9fa;
    color: #333;
    border: 2px solid #ddd;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.preview-section {
    margin-top: 30px;
}

.preview-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}

.preview-panel {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.preview-panel h3 {
    margin-bottom: 15px;
    color: #333;
    display: flex;
    align-items: center;
    gap: 10px;
}

.image-preview {
    width: 100%;
    min-height: 200px;
    border: 2px dashed #ddd;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8f9fa;
}

.image-preview img {
    max-width: 100%;
    max-height: 400px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.ascii-output {
    font-family: 'Courier New', monospace;
    font-size: 8px;
    line-height: 0.8;
    white-space: pre;
    overflow: auto;
    max-height: 400px;
    background: #000;
    color: #0f0;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #333;
}

.ascii-output:empty::before {
    content: "ASCII art will appear here...";
    color: #666;
    font-style: italic;
}

#animationStatus {
    font-size: 0.8rem;
    color: #667eea;
    font-weight: normal;
}

.loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid #f3f3f3;
    border-top: 3px solid #667eea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.pulse {
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

@media (max-width: 768px) {
    .preview-container {
        grid-template-columns: 1fr;
    }
    
    .control-group {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
    }
    
    .control-group label {
        min-width: auto;
    }
    
    .button-group {
        justify-content: center;
    }
    
    header h1 {
        font-size: 2rem;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 ASCII Art Converter</h1>
            <p>Transform your images into beautiful ASCII art</p>
        </header>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <p>Drag & drop an image here or click to browse</p>
                <input type="file" id="imageInput" accept="image/*" hidden>
            </div>
        </div>

        <div class="controls" id="controls" style="display: none;">
            <div class="control-group">
                <label for="density">ASCII Density:</label>
                <input type="range" id="density" min="10" max="200" value="80" step="10">
                <span id="densityValue">80</span>
            </div>

            <div class="control-group">
                <label for="width">Output Width:</label>
                <input type="range" id="width" min="40" max="200" value="100" step="10">
                <span id="widthValue">100</span>
            </div>

            <div class="control-group">
                <label for="contrast">Contrast:</label>
                <input type="range" id="contrast" min="0.5" max="3" value="1" step="0.1">
                <span id="contrastValue">1.0</span>
            </div>

            <div class="control-group">
                <label for="charset">Character Set:</label>
                <select id="charset">
                    <option value="standard">Standard ASCII</option>
                    <option value="extended">Extended ASCII</option>
                    <option value="blocks">Block Characters</option>
                    <option value="minimal">Minimal</option>
                </select>
            </div>

            <div class="button-group">
                <button id="convertBtn" class="btn primary">Convert to ASCII</button>
                <button id="animateBtn" class="btn secondary" disabled>Animate Frames</button>
                <button id="downloadBtn" class="btn secondary" disabled>Download ASCII</button>
            </div>
        </div>

        <div class="preview-section">
            <div class="preview-container">
                <div class="preview-panel">
                    <h3>Original Image</h3>
                    <div class="image-preview" id="imagePreview"></div>
                </div>
                <div class="preview-panel">
                    <h3>ASCII Art <span id="animationStatus"></span></h3>
                    <div class="ascii-output" id="asciiOutput"></div>
                </div>
            </div>
        </div>

        <div class="animation-controls" id="animationControls" style="display: none;">
            <div class="control-group">
                <label for="frameCount">Animation Frames:</label>
                <input type="range" id="frameCount" min="3" max="20" value="8" step="1">
                <span id="frameCountValue">8</span>
            </div>
            
            <div class="control-group">
                <label for="animSpeed">Animation Speed:</label>
                <input type="range" id="animSpeed" min="100" max="1000" value="300" step="50">
                <span id="animSpeedValue">300ms</span>
            </div>

            <div class="button-group">
                <button id="playPauseBtn" class="btn primary">Play</button>
                <button id="stopBtn" class="btn secondary">Stop</button>
            </div>
        </div>
    </div>

    <script>
class ASCIIConverter {
    constructor() {
        this.currentImage = null;
        this.currentASCII = '';
        this.animationFrames = [];
        this.isAnimating = false;
        this.animationInterval = null;
        this.currentFrame = 0;
        
        this.charSets = {
            standard: ' .:-=+*#%@',
            extended: ' ░▒▓█',
            blocks: ' ▁▂▃▄▅▆▇█',
            minimal: ' .,;:!>+*#@'
        };
        
        this.initializeElements();
        this.bindEvents();
    }
    
    initializeElements() {
        this.uploadArea = document.getElementById('uploadArea');
        this.imageInput = document.getElementById('imageInput');
        this.controls = document.getElementById('controls');
        this.imagePreview = document.getElementById('imagePreview');
        this.asciiOutput = document.getElementById('asciiOutput');
        this.animationControls = document.getElementById('animationControls');
        this.animationStatus = document.getElementById('animationStatus');
        
        // Control elements
        this.densitySlider = document.getElementById('density');
        this.widthSlider = document.getElementById('width');
        this.contrastSlider = document.getElementById('contrast');
        this.charsetSelect = document.getElementById('charset');
        
        // Button elements
        this.convertBtn = document.getElementById('convertBtn');
        this.animateBtn = document.getElementById('animateBtn');
        this.downloadBtn = document.getElementById('downloadBtn');
        this.playPauseBtn = document.getElementById('playPauseBtn');
        this.stopBtn = document.getElementById('stopBtn');
        
        // Animation controls
        this.frameCountSlider = document.getElementById('frameCount');
        this.animSpeedSlider = document.getElementById('animSpeed');
    }
    
    bindEvents() {
        // Upload events
        this.uploadArea.addEventListener('click', () => this.imageInput.click());
        this.uploadArea.addEventListener('dragover', this.handleDragOver.bind(this));
        this.uploadArea.addEventListener('drop', this.handleDrop.bind(this));
        this.imageInput.addEventListener('change', this.handleFileSelect.bind(this));
        
        // Control events
        this.densitySlider.addEventListener('input', this.updateSliderValue.bind(this));
        this.widthSlider.addEventListener('input', this.updateSliderValue.bind(this));
        this.contrastSlider.addEventListener('input', this.updateSliderValue.bind(this));
        this.frameCountSlider.addEventListener('input', this.updateSliderValue.bind(this));
        this.animSpeedSlider.addEventListener('input', this.updateSliderValue.bind(this));
        
        // Button events
        this.convertBtn.addEventListener('click', this.convertToASCII.bind(this));
        this.animateBtn.addEventListener('click', this.generateAnimationFrames.bind(this));
        this.downloadBtn.addEventListener('click', this.downloadASCII.bind(this));
        this.playPauseBtn.addEventListener('click', this.toggleAnimation.bind(this));
        this.stopBtn.addEventListener('click', this.stopAnimation.bind(this));
    }
    
    updateSliderValue(event) {
        const slider = event.target;
        const valueSpan = document.getElementById(slider.id + 'Value');
        let value = slider.value;
        
        if (slider.id === 'contrast') {
            value = parseFloat(value).toFixed(1);
        } else if (slider.id === 'animSpeed') {
            value += 'ms';
        }
        
        valueSpan.textContent = value;
    }
    
    handleDragOver(event) {
        event.preventDefault();
        this.uploadArea.classList.add('dragover');
    }
    
    handleDrop(event) {
        event.preventDefault();
        this.uploadArea.classList.remove('dragover');
        
        const files = event.dataTransfer.files;
        if (files.length > 0 && files[0].type.startsWith('image/')) {
            this.loadImage(files[0]);
        }
    }
    
    handleFileSelect(event) {
        const file = event.target.files[0];
        if (file && file.type.startsWith('image/')) {
            this.loadImage(file);
        }
    }
    
    loadImage(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                this.currentImage = img;
                this.displayImage(img);
                this.controls.style.display = 'block';
                this.convertBtn.disabled = false;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
    
    displayImage(img) {
        this.imagePreview.innerHTML = '';
        const displayImg = img.cloneNode();
        this.imagePreview.appendChild(displayImg);
    }
    
    convertToASCII() {
        if (!this.currentImage) return;
        
        this.showLoading('Converting...');
        
        setTimeout(() => {
            try {
                const ascii = this.imageToASCII(this.currentImage);
                this.currentASCII = ascii;
                this.asciiOutput.textContent = ascii;
                this.animateBtn.disabled = false;
                this.downloadBtn.disabled = false;
                this.hideLoading();
            } catch (error) {
                console.error('Conversion error:', error);
                this.hideLoading();
                this.asciiOutput.textContent = 'Error converting image to ASCII';
            }
        }, 100);
    }
    
    imageToASCII(img) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        const width = parseInt(this.widthSlider.value);
        const aspectRatio = img.height / img.width;
        const height = Math.floor(width * aspectRatio * 0.5); // ASCII characters are taller than wide
        
        canvas.width = width;
        canvas.height = height;
        
        ctx.drawImage(img, 0, 0, width, height);
        
        const imageData = ctx.getImageData(0, 0, width, height);
        const pixels = imageData.data;
        const charset = this.charSets[this.charsetSelect.value];
        const contrast = parseFloat(this.contrastSlider.value);
        
        let ascii = '';
        
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const index = (y * width + x) * 4;
                const r = pixels[index];
                const g = pixels[index + 1];
                const b = pixels[index + 2];
                
                // Calculate brightness
                const brightness = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
                
                // Apply contrast
                const adjustedBrightness = Math.pow(brightness, 1 / contrast);
                
                // Map to character
                const charIndex = Math.floor(adjustedBrightness * (charset.length - 1));
                ascii += charset[charIndex];
            }
            ascii += '\n';
        }
        
        return ascii;
    }
    
    generateAnimationFrames() {
        if (!this.currentImage) return;
        
        this.showLoading('Generating frames...');
        this.animationFrames = [];
        
        const frameCount = parseInt(this.frameCountSlider.value);
        const originalContrast = parseFloat(this.contrastSlider.value);
        const originalCharset = this.charsetSelect.value;
        
        setTimeout(() => {
            try {
                // Generate frames with varying parameters
                for (let i = 0; i < frameCount; i++) {
                    const progress = i / (frameCount - 1);
                    
                    // Vary contrast
                    const contrastVariation = 0.5 + progress * 1.5;
                    this.contrastSlider.value = contrastVariation;
                    
                    // Cycle through character sets
                    const charsets = Object.keys(this.charSets);
                    const charsetIndex = Math.floor(progress * charsets.length) % charsets.length;
                    this.charsetSelect.value = charsets[charsetIndex];
                    
                    const frame = this.imageToASCII(this.currentImage);
                    this.animationFrames.push(frame);
                }
                
                // Restore original settings
                this.contrastSlider.value = originalContrast;
                this.charsetSelect.value = originalCharset;
                this.updateSliderValue({ target: this.contrastSlider });
                
                this.animationControls.style.display = 'block';
                this.hideLoading();
                this.animationStatus.textContent = `(${frameCount} frames ready)`;
            } catch (error) {
                console.error('Animation generation error:', error);
                this.hideLoading();
            }
        }, 100);
    }
    
    toggleAnimation() {
        if (this.isAnimating) {
            this.pauseAnimation();
        } else {
            this.startAnimation();
        }
    }
    
    startAnimation() {
        if (this.animationFrames.length === 0) return;
        
        this.isAnimating = true;
        this.playPauseBtn.textContent = 'Pause';
        this.animationStatus.textContent = '(Playing...)';
        
        const speed = parseInt(this.animSpeedSlider.value);
        
        this.animationInterval = setInterval(() => {
            this.asciiOutput.textContent = this.animationFrames[this.currentFrame];
            this.currentFrame = (this.currentFrame + 1) % this.animationFrames.length;
        }, speed);
    }
    
    pauseAnimation() {
        this.isAnimating = false;
        this.playPauseBtn.textContent = 'Play';
        this.animationStatus.textContent = '(Paused)';
        
        if (this.animationInterval) {
            clearInterval(this.animationInterval);
            this.animationInterval = null;
        }
    }
    
    stopAnimation() {
        this.pauseAnimation();
        this.currentFrame = 0;
        this.asciiOutput.textContent = this.currentASCII;
        this.animationStatus.textContent = `(${this.animationFrames.length} frames ready)`;
    }
    
    downloadASCII() {
        if (!this.currentASCII) return;
        
        const blob = new Blob([this.currentASCII], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ascii-art.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    
    showLoading(message) {
        this.animationStatus.innerHTML = `<span class="loading"></span> ${message}`;
    }
    
    hideLoading() {
        this.animationStatus.textContent = '';
    }
}

// Initialize the converter when DOM is loaded
document.addEventListener('DOMContentLoaded', () => {
    new ASCIIConverter();
});
    </script>
</body>
</html>
