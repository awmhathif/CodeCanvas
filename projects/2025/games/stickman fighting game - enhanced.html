<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stickman Fighting Game - Enhanced</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ======================================================
       Basic Reset & Global Styles
    ====================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #222;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    /* ======================================================
       Game Container & Canvas
    ====================================================== */
    #gameContainer {
      position: relative;
      width: 800px;
      height: 600px;
      margin: 20px auto;
      border: 2px solid #fff;
      background: #333;
    }
    #gameCanvas {
      display: block;
      background: linear-gradient(to bottom, #444, #222);
    }
    /* ======================================================
       UI Styles
    ====================================================== */
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }
    #ui button {
      padding: 10px 20px;
      margin: 5px;
      background: #555;
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    #ui button:hover {
      background: #777;
    }
    #ui .display {
      margin-top: 5px;
      font-size: 18px;
    }
    /* ======================================================
       Settings Panel
    ====================================================== */
    #settingsPanel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border: 1px solid #fff;
      display: none;
    }
    #settingsPanel input {
      width: 60px;
      margin-left: 5px;
    }
    #settingsPanel label {
      display: block;
      margin-bottom: 5px;
    }
    /* ======================================================
       Message Overlay (Game Over, etc.)
    ====================================================== */
    #messageOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 20;
      display: none;
    }
    #messageOverlay h1 {
      color: #fff;
      font-size: 48px;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <!-- UI Panel -->
    <div id="ui">
      <button id="startButton">Start Game</button>
      <button id="restartButton" disabled>Restart</button>
      <button id="fightButton" disabled>Fight</button>
      <button id="webButton" disabled>Web Attack</button>
      <button id="settingsToggle">Settings</button>
      <div class="display" id="comboDisplay">Combo: None</div>
      <div class="display" id="scoreDisplay">Score: 0</div>
      <div class="display" id="healthDisplay">Health: 100</div>
    </div>
    <!-- Settings Panel -->
    <div id="settingsPanel">
      <h3>Game Settings</h3>
      <label>
        Enemy Spawn Interval (ms): 
        <input type="number" id="spawnInterval" value="3000">
      </label>
      <label>
        Enemy Speed: 
        <input type="number" id="enemySpeed" value="100">
      </label>
      <label>
        Max Enemies: 
        <input type="number" id="maxEnemies" value="5">
      </label>
      <label>
        Player Health: 
        <input type="number" id="playerHealthSetting" value="100">
      </label>
      <button id="saveSettings">Save Settings</button>
    </div>
    <!-- Message Overlay -->
    <div id="messageOverlay">
      <h1 id="messageText">Game Over</h1>
    </div>
  </div>

  <script>
    /**************************************************************
     * Enhanced Stickman Fighting Game
     * 
     * Features:
     * - Start, Restart, Fight, and Web Attack buttons.
     * - A toggleable Settings panel for customizable game parameters.
     * - Main character drawn in black, enemies in various colors.
     * - Melee and web attacks, combo detection, blood effects.
     * - Flexible and modular game logic.
     **************************************************************/

    // ======================================================
    // Global Variables and Configurable Settings
    // ======================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI Elements
    const startButton = document.getElementById('startButton');
    const restartButton = document.getElementById('restartButton');
    const fightButton = document.getElementById('fightButton');
    const webButton = document.getElementById('webButton');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsPanel = document.getElementById('settingsPanel');
    const saveSettingsButton = document.getElementById('saveSettings');

    const comboDisplay = document.getElementById('comboDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const healthDisplay = document.getElementById('healthDisplay');
    const messageOverlay = document.getElementById('messageOverlay');
    const messageText = document.getElementById('messageText');

    // Default Configurations (modifiable via settings panel)
    let CONFIG = {
      enemySpawnInterval: 3000, // milliseconds
      enemySpeed: 100,          // pixels per second
      maxEnemies: 5,
      playerHealth: 100,
      playerSpeed: 200,
      webSpeed: 400,
      bloodLifetime: 1000       // milliseconds
    };

    // Game State Variables
    let gameRunning = false;
    let gameOver = false;
    let score = 0;
    let playerHealth = CONFIG.playerHealth;
    let comboSequence = [];
    let currentCombo = "None";

    // Timing Variables
    let lastFrameTime = 0;
    let deltaTime = 0;

    // Game Entities Arrays
    let player = null;
    let enemies = [];
    let webs = [];
    let bloodParticles = [];

    // Keyboard Input State
    let keysDown = {};

    // Combo definitions (sequences of keys)
    const combos = {
      'a,s,d': 'Triple Strike',
      's,d,f': 'Spin Kick',
      'd,f,g': 'Uppercut'
    };

    // Timer for enemy spawning
    let enemySpawnTimer = 0;

    // ======================================================
    // Utility Functions
    // ======================================================
    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    function distance(x1, y1, x2, y2) {
      return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
    }

    // ======================================================
    // Class Definitions
    // ======================================================

    // ---- Stickman Class (for both player and enemy) ----
    class Stickman {
      constructor(x, y, color, isPlayer = false) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.isPlayer = isPlayer;
        this.width = 20;
        this.height = 50;
        this.facing = 1; // 1 for right, -1 for left
        this.attackCooldown = 0;
        this.state = 'idle'; // idle, moving, attacking, hit
        this.attackTimer = 0;
      }
      update(dt) {
        if (this.attackCooldown > 0) {
          this.attackCooldown -= dt;
        }
        if (this.attackTimer > 0) {
          this.attackTimer -= dt;
          if (this.attackTimer <= 0 && this.state === 'attacking') {
            this.state = 'idle';
          }
        }
      }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.facing, 1);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        // Draw head
        ctx.beginPath();
        ctx.arc(0, -40, 10, 0, Math.PI * 2);
        ctx.stroke();
        // Draw body
        ctx.beginPath();
        ctx.moveTo(0, -30);
        ctx.lineTo(0, 10);
        ctx.stroke();
        // Draw arms
        if (this.state === 'attacking') {
          ctx.beginPath();
          ctx.moveTo(0, -20);
          ctx.lineTo(20, -20);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.moveTo(0, -20);
          ctx.lineTo(10, -10);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, -20);
          ctx.lineTo(-10, -10);
          ctx.stroke();
        }
        // Draw legs
        ctx.beginPath();
        ctx.moveTo(0, 10);
        ctx.lineTo(10, 30);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, 10);
        ctx.lineTo(-10, 30);
        ctx.stroke();
        ctx.restore();
      }
    }

    // ---- Web Projectile Class (Spider-Man–like web) ----
    class WebProjectile {
      constructor(x, y, targetX, targetY) {
        this.x = x;
        this.y = y;
        this.startX = x;
        this.startY = y;
        this.targetX = targetX;
        this.targetY = targetY;
        let angle = Math.atan2(targetY - y, targetX - x);
        this.vx = Math.cos(angle) * CONFIG.webSpeed;
        this.vy = Math.sin(angle) * CONFIG.webSpeed;
        this.active = true;
      }
      update(dt) {
        if (!this.active) return;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        if (
          this.x < 0 ||
          this.x > canvas.width ||
          this.y < 0 ||
          this.y > canvas.height
        ) {
          this.active = false;
        }
      }
      draw(ctx) {
        if (!this.active) return;
        ctx.save();
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.startX, this.startY);
        ctx.lineTo(this.x, this.y);
        ctx.stroke();
        ctx.restore();
      }
    }

    // ---- Blood Particle Class (for blood effects) ----
    class BloodParticle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 200;
        this.vy = (Math.random() - 0.5) * 200;
        this.alpha = 1;
        this.life = CONFIG.bloodLifetime;
      }
      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt * 1000;
        this.alpha = this.life / CONFIG.bloodLifetime;
      }
      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ======================================================
    // Game Initialization and Setup Functions
    // ======================================================
    function initGame() {
      gameRunning = false;
      gameOver = false;
      score = 0;
      playerHealth = CONFIG.playerHealth;
      comboSequence = [];
      currentCombo = "None";
      enemies = [];
      webs = [];
      bloodParticles = [];
      enemySpawnTimer = 0;
      // Create player stickman (in black)
      player = new Stickman(400, 500, '#000', true);
      // Enable UI buttons
      fightButton.disabled = false;
      webButton.disabled = false;
      restartButton.disabled = false;
      comboDisplay.innerText = "Combo: " + currentCombo;
      scoreDisplay.innerText = "Score: " + score;
      healthDisplay.innerText = "Health: " + playerHealth;
      messageOverlay.style.display = 'none';
    }

    // ======================================================
    // Enemy Spawning Functions
    // ======================================================
    function spawnEnemy() {
      let x = getRandomInt(50, canvas.width - 50);
      let y = 50;
      let colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff'];
      let color = colors[getRandomInt(0, colors.length - 1)];
      let enemy = new Stickman(x, y, color, false);
      enemy.facing = (player.x < x) ? -1 : 1;
      enemies.push(enemy);
    }

    // ======================================================
    // Input Handling
    // ======================================================
    window.addEventListener('keydown', function(e) {
      keysDown[e.key] = true;
      // Check for combo keys (a, s, d, f, g)
      if (['a', 's', 'd', 'f', 'g'].includes(e.key)) {
        comboSequence.push(e.key);
        checkCombo();
      }
    });
    window.addEventListener('keyup', function(e) {
      delete keysDown[e.key];
    });

    // ======================================================
    // Combo Sequence Checking
    // ======================================================
    function checkCombo() {
      let seq = comboSequence.slice(-3).join(',');
      if (combos[seq]) {
        currentCombo = combos[seq];
        comboDisplay.innerText = "Combo: " + currentCombo;
        comboSequence = [];
      } else {
        currentCombo = "None";
        comboDisplay.innerText = "Combo: " + currentCombo;
      }
    }

    // ======================================================
    // Player Movement and Action Update
    // ======================================================
    function updatePlayer(dt) {
      let dx = 0, dy = 0;
      if (keysDown['ArrowLeft']) {
        dx = -CONFIG.playerSpeed * dt;
        player.facing = -1;
      }
      if (keysDown['ArrowRight']) {
        dx = CONFIG.playerSpeed * dt;
        player.facing = 1;
      }
      if (keysDown['ArrowUp']) {
        dy = -CONFIG.playerSpeed * dt;
      }
      if (keysDown['ArrowDown']) {
        dy = CONFIG.playerSpeed * dt;
      }
      player.x += dx;
      player.y += dy;
      // Keep player within canvas bounds
      player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
      player.y = Math.max(50, Math.min(canvas.height - 20, player.y));
      player.update(dt);
    }

    // ======================================================
    // Update Enemies
    // ======================================================
    function updateEnemies(dt) {
      for (let enemy of enemies) {
        let angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        enemy.x += Math.cos(angle) * CONFIG.enemySpeed * dt;
        enemy.y += Math.sin(angle) * CONFIG.enemySpeed * dt;
        enemy.facing = (player.x < enemy.x) ? -1 : 1;
        enemy.update(dt);
        // Check for melee collision with player
        if (distance(enemy.x, enemy.y, player.x, player.y) < 30 && enemy.attackCooldown <= 0) {
          enemy.state = 'attacking';
          enemy.attackTimer = 0.3;
          enemy.attackCooldown = 1.0;
          playerHealth -= 10;
          healthDisplay.innerText = "Health: " + playerHealth;
          spawnBlood(player.x, player.y);
          if (playerHealth <= 0) {
            endGame();
          }
        }
      }
      enemies = enemies.filter(enemy =>
        enemy.x >= -50 && enemy.x <= canvas.width + 50 &&
        enemy.y >= -50 && enemy.y <= canvas.height + 50
      );
    }

    // ======================================================
    // Update Web Projectiles
    // ======================================================
    function updateWebs(dt) {
      for (let web of webs) {
        web.update(dt);
        for (let enemy of enemies) {
          if (web.active && distance(web.x, web.y, enemy.x, enemy.y) < 20) {
            score += 20;
            scoreDisplay.innerText = "Score: " + score;
            enemy.state = 'hit';
            spawnBlood(enemy.x, enemy.y);
            web.active = false;
          }
        }
      }
      webs = webs.filter(web => web.active);
    }

    // ======================================================
    // Update Blood Particles
    // ======================================================
    function updateBlood(dt) {
      for (let particle of bloodParticles) {
        particle.update(dt);
      }
      bloodParticles = bloodParticles.filter(p => p.life > 0);
    }

    // ======================================================
    // Spawn Blood Effect at (x, y)
    // ======================================================
    function spawnBlood(x, y) {
      for (let i = 0; i < 10; i++) {
        bloodParticles.push(new BloodParticle(x, y));
      }
    }

    // ======================================================
    // Handle Melee Fight Action
    // ======================================================
    function handleFight() {
      if (player.attackCooldown > 0) return;
      player.state = 'attacking';
      player.attackTimer = 0.3;
      player.attackCooldown = 0.5;
      for (let enemy of enemies) {
        if (distance(player.x, player.y, enemy.x, enemy.y) < 30) {
          enemy.state = 'hit';
          score += 10;
          scoreDisplay.innerText = "Score: " + score;
          spawnBlood(enemy.x, enemy.y);
        }
      }
      if (currentCombo !== "None") {
        score += 20;
        scoreDisplay.innerText = "Score: " + score;
        currentCombo = "None";
        comboDisplay.innerText = "Combo: None";
      }
    }

    // ======================================================
    // Handle Web Attack Action
    // ======================================================
    function handleWebAttack() {
      let targetX = player.x + (player.facing * 100);
      let targetY = player.y - 50;
      let web = new WebProjectile(player.x, player.y, targetX, targetY);
      webs.push(web);
    }

    // ======================================================
    // End Game Function
    // ======================================================
    function endGame() {
      gameOver = true;
      gameRunning = false;
      messageText.innerText = "Game Over!";
      messageOverlay.style.display = 'flex';
      fightButton.disabled = true;
      webButton.disabled = true;
    }

    // ======================================================
    // Extra Feature: Slow Motion on Combo Activation
    // ======================================================
    let slowMotion = false;
    function updateSlowMotion(dt) {
      if (currentCombo === 'Triple Strike' && !slowMotion) {
        slowMotion = true;
        let originalSpeed = CONFIG.enemySpeed;
        CONFIG.enemySpeed = originalSpeed / 2;
        setTimeout(() => {
          CONFIG.enemySpeed = originalSpeed;
          slowMotion = false;
        }, 2000);
      }
    }

    // ======================================================
    // Draw Combo Effect Text
    // ======================================================
    function drawComboEffect() {
      if (currentCombo !== "None") {
        ctx.save();
        ctx.font = "30px Arial";
        ctx.fillStyle = "yellow";
        ctx.fillText(currentCombo, player.x - 50, player.y - 60);
        ctx.restore();
      }
    }

    // ======================================================
    // Draw Background (Simple Gradient)
    // ======================================================
    function drawBackground() {
      let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#333');
      gradient.addColorStop(1, '#111');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // ======================================================
    // Main Game Loop using requestAnimationFrame
    // ======================================================
    function gameLoop(timestamp) {
      if (!lastFrameTime) lastFrameTime = timestamp;
      deltaTime = (timestamp - lastFrameTime) / 1000;
      lastFrameTime = timestamp;
      
      if (gameRunning) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        updatePlayer(deltaTime);
        enemySpawnTimer += deltaTime * 1000;
        if (enemySpawnTimer > CONFIG.enemySpawnInterval && enemies.length < CONFIG.maxEnemies) {
          spawnEnemy();
          enemySpawnTimer = 0;
        }
        updateEnemies(deltaTime);
        updateWebs(deltaTime);
        updateBlood(deltaTime);
        updateSlowMotion(deltaTime);
        drawBackground();
        player.draw(ctx);
        enemies.forEach(enemy => enemy.draw(ctx));
        webs.forEach(web => web.draw(ctx));
        bloodParticles.forEach(particle => particle.draw(ctx));
        drawComboEffect();
      }
      
      if (gameRunning || gameOver) {
        requestAnimationFrame(gameLoop);
      }
    }

    // ======================================================
    // UI Button Event Listeners
    // ======================================================
    startButton.addEventListener('click', function() {
      initGame();
      gameRunning = true;
      lastFrameTime = 0;
      messageOverlay.style.display = 'none';
      fightButton.disabled = false;
      webButton.disabled = false;
      restartButton.disabled = false;
      requestAnimationFrame(gameLoop);
    });

    restartButton.addEventListener('click', function() {
      initGame();
      if (!gameRunning) {
        gameRunning = true;
        lastFrameTime = 0;
        requestAnimationFrame(gameLoop);
      }
    });

    fightButton.addEventListener('click', function() {
      handleFight();
    });

    webButton.addEventListener('click', function() {
      handleWebAttack();
    });

    // Toggle Settings Panel
    settingsToggle.addEventListener('click', function() {
      if (settingsPanel.style.display === 'none' || settingsPanel.style.display === '') {
        settingsPanel.style.display = 'block';
      } else {
        settingsPanel.style.display = 'none';
      }
    });

    // Save Settings and apply them
    saveSettingsButton.addEventListener('click', function() {
      CONFIG.enemySpawnInterval = parseInt(document.getElementById('spawnInterval').value) || CONFIG.enemySpawnInterval;
      CONFIG.enemySpeed = parseInt(document.getElementById('enemySpeed').value) || CONFIG.enemySpeed;
      CONFIG.maxEnemies = parseInt(document.getElementById('maxEnemies').value) || CONFIG.maxEnemies;
      CONFIG.playerHealth = parseInt(document.getElementById('playerHealthSetting').value) || CONFIG.playerHealth;
      playerHealth = CONFIG.playerHealth;
      healthDisplay.innerText = "Health: " + playerHealth;
      settingsPanel.style.display = 'none';
    });

    // Additional Keyboard Shortcuts
    window.addEventListener('keydown', function(e) {
      if (e.key === ' ') {
        handleFight();
      }
      if (e.key === 'q') {
        handleWebAttack();
      }
    });
