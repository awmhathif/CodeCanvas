                const key = `${x},${y}`;
                
                if (visited.has(key)) continue;
                if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;

                const pos = (y * canvas.width + x) * 4;
                const r = pixels[pos];
                const g = pixels[pos + 1];
                const b = pixels[pos + 2];

                if (r !== startR || g !== startG || b !== startB) continue;

                visited.add(key);

                pixels[pos] = fillRGB.r;
                pixels[pos + 1] = fillRGB.g;
                pixels[pos + 2] = fillRGB.b;
                pixels[pos + 3] = 255;

                stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        // Mode selection
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                if (currentMode === 'fill') {
                    canvas.style.cursor = 'pointer';
                } else if (currentMode === 'erase') {
                    canvas.style.cursor = 'not-allowed';
                } else {
                    canvas.style.cursor = 'crosshair';
                }
            });
        });

        function updateModeButtons() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.mode === currentMode) {
                    btn.classList.add('active');
                }
            });
        }

        // Custom color picker
        document.getElementById('customColor').addEventListener('input', (e) => {
            selectColor(e.target.value, null);
        });

        // Brush size
        const brushSizeInput = document.getElementById('brushSize');
        const brushSizeValue = document.getElementById('brushSizeValue');
        brushSizeInput.addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            brushSizeValue.textContent = brushSize + 'px';
        });

        // Undo/Redo functionality
        function saveState() {
            if (undoStack.length >= 50) {
                undoStack.shift();
            }
            undoStack.push(canvas.toDataURL());
            redoStack = [];
        }

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (undoStack.length > 1) {
                redoStack.push(undoStack.pop());
                const img = new Image();
                img.src = undoStack[undoStack.length - 1];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        });

        document.getElementById('redoBtn').addEventListener('click', () => {
            if (redoStack.length > 0) {
                const state = redoStack.pop();
                undoStack.push(state);
                const img = new Image();
                img.src = state;
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        });

        // Clear canvas
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Are you sure you want to clear your coloring?')) {
                drawPage(allPages[currentPage]);
            }
        });

        // Save image
        document.getElementById('saveBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `coloring-page-${currentPage + 1}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });

        // Print
        document.getElementById('printBtn').addEventListener('click', () => {
            const dataUrl = canvas.toDataURL();
            const windowContent = `
                <!DOCTYPE html>
                <html>
                <head><title>Print Coloring Page</title></head>
                <body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;">
                    <img src="${dataUrl}" style="max-width:100%;height:auto;" onload="window.print();window.close();">
                </body>
                </html>
            `;
            const printWindow = window.open('', '', 'width=800,height=600');
            printWindow.document.open();
            printWindow.document.write(windowContent);
            printWindow.document.close();
        });

        // Initialize
        initColorPalette();
        initPageGrid();
    </script>


</body></html>
