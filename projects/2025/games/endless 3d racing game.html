<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless 3D Racing Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        #speed {
            font-size: 24px;
            font-weight: bold;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            display: none;
        }
        #restart {
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 20px;
            margin: 20px 0;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>Score: <span id="score">0</span></div>
        <div id="speed">0 MPH</div>
    </div>
    <div id="gameOver">
        <div>GAME OVER</div>
        <div>Your Score: <span id="finalScore">0</span></div>
        <button id="restart">Play Again</button>
    </div>
    <div id="instructions">
        Use ← → or A/D keys to steer | ↑ ↓ or W/S keys to accelerate/brake
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game variables
        let scene, camera, renderer, roadWidth = 15;
        let car, obstacles = [], trees = [], lights = [];
        let speed = 0, maxSpeed = 0.6, acceleration = 0.002, deceleration = 0.0005;
        let score = 0, gameActive = true, steerSpeed = 0.05;
        let roadSegments = [], segmentLength = 100, totalSegments = 500;
        let cameraHeight = 3, cameraDistance = 6;
        let keyState = {};
        let lastFrameTime = 0;
        let dayNightCycle = 0;

        // Initialize Three.js scene
        function init() {
            // Create scene
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 50, 200);
            
            // Create camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, cameraHeight, cameraDistance);
            camera.lookAt(0, 0, -30);
            
            // Create renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x87CEEB); // Sky blue
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Add directional light (sun)
            const sunLight = new THREE.DirectionalLight(0xffffaa, 1);
            sunLight.position.set(50, 100, 50);
            sunLight.castShadow = true;
            sunLight.shadow.camera.near = 1;
            sunLight.shadow.camera.far = 500;
            sunLight.shadow.camera.left = -100;
            sunLight.shadow.camera.right = 100;
            sunLight.shadow.camera.top = 100;
            sunLight.shadow.camera.bottom = -100;
            scene.add(sunLight);
            
            // Add ambient light
            const ambientLight = new THREE.AmbientLight(0x555555);
            scene.add(ambientLight);
            
            // Create road
            createRoad();
            
            // Create player car
            createCar();
            
            // Generate initial environment
            for (let i = 0; i < 100; i++) {
                createTreeAtDistance(-i * 20 - 20);
            }
            
            // Handle window resize
            window.addEventListener('resize', onWindowResize, false);
            
            // Keyboard controls
            document.addEventListener('keydown', function(e) { keyState[e.key] = true; });
            document.addEventListener('keyup', function(e) { keyState[e.key] = false; });
            
            // Restart button
            document.getElementById('restart').addEventListener('click', restartGame);
            
            // Start animation loop
            animate(0);
        }
        
        function createRoad() {
            // Create the infinite road system
            const roadGeometry = new THREE.PlaneGeometry(roadWidth, segmentLength * totalSegments);
            const roadMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x444444,
                roughness: 0.9,
                metalness: 0
            });
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.z = -segmentLength * totalSegments / 2;
            road.receiveShadow = true;
            scene.add(road);
            
            // Add road markings
            const lineGeometry = new THREE.PlaneGeometry(0.5, segmentLength * totalSegments);
            const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const centerLine = new THREE.Mesh(lineGeometry, lineMaterial);
            centerLine.rotation.x = -Math.PI / 2;
            centerLine.position.z = -segmentLength * totalSegments / 2;
            centerLine.position.y = 0.01;
            scene.add(centerLine);
            
            // Create grass on sides
            const grassGeometry = new THREE.PlaneGeometry(100, segmentLength * totalSegments);
            const grassMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1E8449,
                roughness: 1,
                metalness: 0
            });
            
            // Left grass
            const leftGrass = new THREE.Mesh(grassGeometry, grassMaterial);
            leftGrass.rotation.x = -Math.PI / 2;
            leftGrass.position.x = -roadWidth / 2 - grassGeometry.parameters.width / 2 + 1;
            leftGrass.position.z = -segmentLength * totalSegments / 2;
            leftGrass.receiveShadow = true;
            scene.add(leftGrass);
            
            // Right grass
            const rightGrass = new THREE.Mesh(grassGeometry, grassMaterial);
            rightGrass.rotation.x = -Math.PI / 2;
            rightGrass.position.x = roadWidth / 2 + grassGeometry.parameters.width / 2 - 1;
            rightGrass.position.z = -segmentLength * totalSegments / 2;
            rightGrass.receiveShadow = true;
            scene.add(rightGrass);
            
            // Generate road segments for curves
            for (let i = 0; i < totalSegments; i++) {
                roadSegments.push({
                    index: i,
                    curve: 0, // How much the road curves at this segment
                    y: 0      // Height of the road at this segment
                });
            }
            
            // Apply some curvature to road segments
            let curveDirection = 0;
            for (let i = 0; i < totalSegments; i += Math.floor(Math.random() * 50) + 10) {
                curveDirection = (Math.random() - 0.5) * 0.008;
                const curveLength = Math.floor(Math.random() * 50) + 50;
                
                for (let j = 0; j < curveLength && i + j < totalSegments; j++) {
                    roadSegments[i + j].curve = curveDirection;
                }
            }
            
            // Add some hills and valleys
            let heightDirection = 0;
            for (let i = 0; i < totalSegments; i += Math.floor(Math.random() * 30) + 10) {
                heightDirection = (Math.random() - 0.5) * 0.1;
                const heightChangeLength = Math.floor(Math.random() * 30) + 20;
                
                let currentHeight = i > 0 ? roadSegments[i - 1].y : 0;
                for (let j = 0; j < heightChangeLength && i + j < totalSegments; j++) {
                    currentHeight += heightDirection;
                    roadSegments[i + j].y = currentHeight;
                }
            }
        }
        
        function createCar() {
            // Create a simple car model
            const carGroup = new THREE.Group();
            
            // Car body
            const bodyGeometry = new THREE.BoxGeometry(2, 1, 4);
            const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.6, roughness: 0.4 });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.6;
            body.castShadow = true;
            carGroup.add(body);
            
            // Car top
            const topGeometry = new THREE.BoxGeometry(1.8, 0.7, 2);
            const topMaterial = new THREE.MeshStandardMaterial({ color: 0x990000, metalness: 0.6, roughness: 0.4 });
            const top = new THREE.Mesh(topGeometry, topMaterial);
            top.position.y = 1.45;
            top.position.z = -0.5;
            top.castShadow = true;
            carGroup.add(top);
            
            // Wheels
            const wheelGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
            const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
            
            // Front left wheel
            const wheelFL = new THREE.Mesh(wheelGeometry, wheelMaterial);
            wheelFL.rotation.z = Math.PI / 2;
            wheelFL.position.set(-1.1, 0.4, 1.2);
            carGroup.add(wheelFL);
            
            // Front right wheel
            const wheelFR = new THREE.Mesh(wheelGeometry, wheelMaterial);
            wheelFR.rotation.z = Math.PI / 2;
            wheelFR.position.set(1.1, 0.4, 1.2);
            carGroup.add(wheelFR);
            
            // Rear left wheel
            const wheelRL = new THREE.Mesh(wheelGeometry, wheelMaterial);
            wheelRL.rotation.z = Math.PI / 2;
            wheelRL.position.set(-1.1, 0.4, -1.2);
            carGroup.add(wheelRL);
            
            // Rear right wheel
            const wheelRR = new THREE.Mesh(wheelGeometry, wheelMaterial);
            wheelRR.rotation.z = Math.PI / 2;
            wheelRR.position.set(1.1, 0.4, -1.2);
            carGroup.add(wheelRR);
            
            // Windshield
            const windshieldGeometry = new THREE.PlaneGeometry(1.5, 0.7);
            const windshieldMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xadd8e6, 
                transparent: true, 
                opacity: 0.7,
                metalness: 0.9,
                roughness: 0.1
            });
            const windshield = new THREE.Mesh(windshieldGeometry, windshieldMaterial);
            windshield.position.set(0, 1.45, 0.5);
            windshield.rotation.x = Math.PI / 4;
            carGroup.add(windshield);
            
            // Headlights
            const headlightGeometry = new THREE.SphereGeometry(0.2, 16, 16);
            const headlightMaterial = new THREE.MeshBasicMaterial({ color: 0xffffaa });
            
            const headlightL = new THREE.Mesh(headlightGeometry, headlightMaterial);
            headlightL.position.set(-0.8, 0.7, 2);
            carGroup.add(headlightL);
            
            const headlightR = new THREE.Mesh(headlightGeometry, headlightMaterial);
            headlightR.position.set(0.8, 0.7, 2);
            carGroup.add(headlightR);
            
            // Add headlight glow effect
            const headlightLightL = new THREE.PointLight(0xffffaa, 2, 50);
            headlightLightL.position.set(-0.8, 0.7, 2.5);
            carGroup.add(headlightLightL);
            
            const headlightLightR = new THREE.PointLight(0xffffaa, 2, 50);
            headlightLightR.position.set(0.8, 0.7, 2.5);
            carGroup.add(headlightLightR);
            
            // Taillights
            const taillightGeometry = new THREE.BoxGeometry(0.5, 0.2, 0.1);
            const taillightMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            
            const taillightL = new THREE.Mesh(taillightGeometry, taillightMaterial);
            taillightL.position.set(-0.8, 0.7, -2);
            carGroup.add(taillightL);
            
            const taillightR = new THREE.Mesh(taillightGeometry, taillightMaterial);
            taillightR.position.set(0.8, 0.7, -2);
            carGroup.add(taillightR);
            
            scene.add(carGroup);
            car = carGroup;
            car.position.y = 0.4; // Lift car off the ground
        }
        
        function createObstacle() {
            // Choose obstacle type (car, barrier, etc)
            const type = Math.floor(Math.random() * 2);
            let obstacle;
            
            if (type === 0) {
                // Traffic car
                const obstacleGroup = new THREE.Group();
                
                // Car body
                const bodyGeometry = new THREE.BoxGeometry(2, 1, 4);
                const bodyMaterial = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color().setHSL(Math.random(), 0.8, 0.5), 
                    metalness: 0.6, 
                    roughness: 0.4 
                });
                const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                body.position.y = 0.6;
                body.castShadow = true;
                obstacleGroup.add(body);
                
                // Car roof
                const roofGeometry = new THREE.BoxGeometry(1.9, 0.7, 2.5);
                const roof = new THREE.Mesh(roofGeometry, bodyMaterial);
                roof.position.y = 1.45;
                roof.castShadow = true;
                obstacleGroup.add(roof);
                
                obstacle = obstacleGroup;
            } else {
                // Barrier
                const obstacleGroup = new THREE.Group();
                
                const barrierGeometry = new THREE.BoxGeometry(1, 1, 1);
                const barrierMaterial = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
                
                for (let i = 0; i < 3; i++) {
                    const barrier = new THREE.Mesh(barrierGeometry, barrierMaterial);
                    barrier.position.set((i - 1) * 1.2, 0.5, 0);
                    barrier.castShadow = true;
                    obstacleGroup.add(barrier);
                }
                
                obstacle = obstacleGroup;
            }
            
            // Position obstacle on the road
            const laneCount = 3;
            const laneWidth = roadWidth / laneCount;
            const lane = Math.floor(Math.random() * laneCount);
            const offset = (lane - 1) * laneWidth;
            
            obstacle.position.set(offset, 0, -200 - Math.random() * 200);
            
            scene.add(obstacle);
            obstacles.push(obstacle);
            
            // Limit the number of obstacles
            if (obstacles.length > 20) {
                scene.remove(obstacles[0]);
                obstacles.shift();
            }
        }
        
        function createTreeAtDistance(distance) {
            const side = Math.random() > 0.5 ? 1 : -1;
            const offset = (roadWidth / 2 + 5 + Math.random() * 10) * side;
            
            const treeGroup = new THREE.Group();
            
            // Tree trunk
            const trunkGeometry = new THREE.CylinderGeometry(0.5, 0.7, 4, 8);
            const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 2;
            trunk.castShadow = true;
            treeGroup.add(trunk);
            
            // Tree foliage
            const foliageGeometry = new THREE.ConeGeometry(3, 6, 8);
            const foliageMaterial = new THREE.MeshStandardMaterial({ 
                color: new THREE.Color().setHSL(0.3, 0.8, Math.random() * 0.2 + 0.3), 
                roughness: 1
            });
            const foliage = new THREE.Mesh(foliageGeometry, foliageMaterial);
            foliage.position.y = 6;
            foliage.castShadow = true;
            treeGroup.add(foliage);
            
            treeGroup.position.set(offset, 0, distance);
            
            scene.add(treeGroup);
            trees.push({
                mesh: treeGroup,
                initialZ: distance
            });
            
            // Limit the number of trees
            if (trees.length > 200) {
                scene.remove(trees[0].mesh);
                trees.shift();
            }
        }
        
        function createStreetLight(distance) {
            const side = Math.random() > 0.5 ? 1 : -1;
            const offset = (roadWidth / 2 + 1) * side;
            
            const lightGroup = new THREE.Group();
            
            // Light pole
            const poleGeometry = new THREE.CylinderGeometry(0.1, 0.2, 8, 8);
            const poleMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8 });
            const pole = new THREE.Mesh(poleGeometry, poleMaterial);
            pole.position.y = 4;
            lightGroup.add(pole);
            
            // Light arm
            const armGeometry = new THREE.CylinderGeometry(0.05, 0.05, 2, 8);
            const arm = new THREE.Mesh(armGeometry, poleMaterial);
            arm.position.set(side * 1, 7.5, 0);
            arm.rotation.z = Math.PI / 2 + side * Math.PI / 6;
            lightGroup.add(arm);
            
            // Light fixture
            const fixtureGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.5, 8);
            const fixtureMaterial = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6 });
            const fixture = new THREE.Mesh(fixtureGeometry, fixtureMaterial);
            fixture.position.set(side * 1.8, 7.7, 0);
            fixture.rotation.z = Math.PI / 2;
            lightGroup.add(fixture);
            
            // Light source
            const light = new THREE.PointLight(0xffffee, 1, 30, 2);
            light.position.set(side * 1.8, 7.5, 0);
            lightGroup.add(light);
            
            lightGroup.position.set(offset, 0, distance);
            
            scene.add(lightGroup);
            lights.push({
                mesh: lightGroup,
                light: light,
                initialZ: distance
            });
            
            // Limit the number of lights
            if (lights.length > 50) {
                scene.remove(lights[0].mesh);
                lights.shift();
            }
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function checkCollisions() {
            if (!gameActive) return;
            
            // Simple collision detection
            const carBox = new THREE.Box3().setFromObject(car);
            
            for (let i = 0; i < obstacles.length; i++) {
                const obstacleBox = new THREE.Box3().setFromObject(obstacles[i]);
                
                if (carBox.intersectsBox(obstacleBox)) {
                    gameOver();
                    return;
                }
            }
            
            // Check if car is off road
            if (Math.abs(car.position.x) > roadWidth / 2) {
                // Slow down dramatically when off road
                speed = Math.max(speed - 0.01, 0);
                
                // If we go too far off road, game over
                if (Math.abs(car.position.x) > roadWidth / 2 + 5) {
                    gameOver();
                }
            }
        }
        
        function gameOver() {
            gameActive = false;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalScore').textContent = Math.floor(score);
        }
        
        function restartGame() {
            // Reset game state
            speed = 0;
            score = 0;
            gameActive = true;
            
            // Reset UI
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('score').textContent = '0';
            document.getElementById('speed').textContent = '0 MPH';
            
            // Reset car position
            car.position.set(0, 0.4, 0);
            car.rotation.y = 0;
            
            // Remove all obstacles
            for (let obstacle of obstacles) {
                scene.remove(obstacle);
            }
            obstacles = [];
        }
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            // Calculate delta time for consistent motion
            const deltaTime = currentTime - lastFrameTime;
            lastFrameTime = currentTime;
            
            // Skip the first frame
            if (deltaTime === currentTime) return;
            
            if (gameActive) {
                // Handle day/night cycle
                dayNightCycle += 0.0001 * deltaTime;
                if (dayNightCycle > 2 * Math.PI) dayNightCycle -= 2 * Math.PI;
                
                // Update sky color based on time of day
                const dayFactor = (Math.sin(dayNightCycle) + 1) / 2;
                const skyColor = new THREE.Color().setRGB(
                    0.5 + 0.3 * dayFactor,
                    0.5 + 0.3 * dayFactor,
                    0.7 + 0.3 * dayFactor
                );
                renderer.setClearColor(skyColor);
                
                // Update scene fog based on time of day
                scene.fog.color.copy(skyColor);
                
                // Adjust ambient light based on time of day
                scene.children.forEach(child => {
                    if (child instanceof THREE.AmbientLight) {
                        child.intensity = 0.1 + 0.4 * dayFactor;
                    }
                });
                
                // Handle keyboard input
                if ((keyState['ArrowUp'] || keyState['w'] || keyState['W']) && gameActive) {
                    speed = Math.min(speed + acceleration * deltaTime, maxSpeed);
                } else if ((keyState['ArrowDown'] || keyState['s'] || keyState['S']) && gameActive) {
                    speed = Math.max(speed - deceleration * 2 * deltaTime, 0);
                } else {
                    speed = Math.max(speed - deceleration * deltaTime, 0);
                }
                
                if ((keyState['ArrowLeft'] || keyState['a'] || keyState['A']) && gameActive) {
                    car.rotation.y = Math.min(car.rotation.y + steerSpeed, 0.4);
                    car.position.x -= steerSpeed * speed * 20;
                } else if ((keyState['ArrowRight'] || keyState['d'] || keyState['D']) && gameActive) {
                    car.rotation.y = Math.max(car.rotation.y - steerSpeed, -0.4);
                    car.position.x += steerSpeed * speed * 20;
                } else {
                    // Return to center rotation
                    car.rotation.y *= 0.9;
                }
                
                // Update score based on speed
                score += speed * 0.1 * deltaTime;
                document.getElementById('score').textContent = Math.floor(score);
                document.getElementById('speed').textContent = Math.floor(speed * 600) + ' MPH';
                
                // Move obstacles
                for (let obstacle of obstacles) {
                    obstacle.position.z += speed * deltaTime;
                    
                    // Remove obstacles that have passed the player
                    if (obstacle.position.z > 10) {
                        scene.remove(obstacle);
                        obstacles.splice(obstacles.indexOf(obstacle), 1);
                    }
                }
                
                // Move trees
                for (let tree of trees) {
                    tree.mesh.position.z = tree.initialZ + (currentTime * speed * 0.01) % 2000;
                }
                
                // Move street lights
                for (let light of lights) {
                    light.mesh.position.z = light.initialZ + (currentTime * speed * 0.01) % 2000;
                    
                    // Toggle lights based on time of day
                    light.light.intensity = dayFactor < 0.5 ? 2 : 0;
                }
                
                // Generate new obstacles based on distance traveled
                if (Math.random() < 0.005 * (1 + speed)) {
                    createObstacle();
                }
                
                // Generate new trees
                if (Math.random() < 0.02) {
                    createTreeAtDistance(-200 - Math.random() * 100);
                }
                
                // Generate new street lights
                if (Math.random() < 0.005) {
                    createStreetLight(-200 - Math.random() * 100);
                }
                
                // Check for collisions
                checkCollisions();
                
                // Update camera position to follow car with some lag
                camera.position.x = car.position.x * 0.5;
                camera.position.y = cameraHeight + Math.abs(car.rotation.y) * 2;
                camera.lookAt(car.position.x * 0.8, 0, car.position.z - 15);
            }
            
            renderer.render(scene, camera);
        }
        
        // Initialize the game
        init();
    </script>
</body>
</html>
