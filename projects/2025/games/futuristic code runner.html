<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Futuristic Code Runner</title>
  <style>
    /* Global styling for a dark, futuristic look */
    body {
      background: #000;
      color: #0f0;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #0f0;
    }
    /* Editor styling */
    #editor {
      width: 100%;
      height: 300px;
      background: #111;
      border: none;
      color: #0f0;
      padding: 10px;
      font-size: 16px;
      resize: vertical;
      outline: none;
      box-shadow: 0 0 10px #0f0;
      margin-bottom: 10px;
    }
    /* Line count display */
    #lineCount {
      margin-bottom: 15px;
      font-size: 14px;
    }
    /* Button styling with glowing effect */
    .button {
      background: linear-gradient(45deg, #00ff00, #007700);
      border: none;
      color: #000;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 10px #0f0;
      transition: transform 0.2s;
    }
    .button:hover {
      transform: scale(1.05);
    }
    /* Output window styling */
    #output {
      margin-top: 20px;
      padding: 10px;
      background: #111;
      min-height: 100px;
      white-space: pre-wrap;
      font-family: 'Courier New', Courier, monospace;
      box-shadow: 0 0 10px #0f0;
    }
  </style>
</head>
<body>
  <h1>Futuristic Code Runner</h1>
  <textarea id="editor" placeholder="Write your code here..."></textarea>
  <div id="lineCount">Line Count: 0</div>
  <button class="button" id="runButton">Run Code</button>
  <button class="button" id="saveButton">Save Code</button>
  <div id="output"></div>

  <script>
    const editor = document.getElementById('editor');
    const lineCountDiv = document.getElementById('lineCount');
    const outputDiv = document.getElementById('output');
    const runButton = document.getElementById('runButton');
    const saveButton = document.getElementById('saveButton');

    // Update the line count as the user types
    editor.addEventListener('input', () => {
      const lines = editor.value.split('\n').length;
      lineCountDiv.textContent = 'Line Count: ' + lines;
    });

    // Execute JavaScript code safely
    runButton.addEventListener('click', () => {
      outputDiv.innerHTML = '';  // Clear previous output
      const code = editor.value;
      try {
        // Execute code within a function for better scoping.
        // Note: This executes only JavaScript. For other languages, additional handling is needed.
        const result = Function('"use strict";\n' + code)();
        outputDiv.textContent = result !== undefined ? result : 'Code executed successfully.';
      } catch (err) {
        outputDiv.textContent = 'Error: ' + err;
      }
    });

    // Save code to a file on the device
    saveButton.addEventListener('click', () => {
      const code = editor.value;
      const blob = new Blob([code], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'code.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  </script>
</body>
</html>
