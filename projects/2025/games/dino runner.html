<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #f7f7f7;
            touch-action: none;
            font-family: 'Press Start 2P', Arial, sans-serif;
        }

        #gameCanvas {
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        .hud {
            position: fixed;
            padding: 20px;
            color: #535353;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(83, 83, 83, 0.5);
        }

        #score {
            top: 0;
            right: 0;
        }

        #highScore {
            top: 0;
            left: 0;
        }

        #gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(247, 247, 247, 0.9);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }

        #restartBtn {
            background: #535353;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            color: #f7f7f7;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Press Start 2P', Arial, sans-serif;
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        .power-up-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: none;
            padding: 10px;
            background: rgba(83, 83, 83, 0.8);
            color: #f7f7f7;
            border-radius: 5px;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 5px #535353, 0 0 10px #535353;
            }
            to {
                box-shadow: 0 0 10px #535353, 0 0 20px #535353;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="score" class="hud">Score: <span id="scoreValue">0</span></div>
    <div id="highScore" class="hud">HI: <span id="highScoreValue">0</span></div>
    <div id="powerUpIndicator" class="power-up-indicator">Power-up Active!</div>
    <div id="gameOver">
        <h2>GAME OVER</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <p>High Score: <span id="finalHighScore">0</span></p>
        <button id="restartBtn">RESTART</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreValue');
        const highScoreElement = document.getElementById('highScoreValue');
        const finalScoreElement = document.getElementById('finalScore');
        const finalHighScoreElement = document.getElementById('finalHighScore');
        const gameOverScreen = document.getElementById('gameOver');
        const restartBtn = document.getElementById('restartBtn');
        const powerUpIndicator = document.getElementById('powerUpIndicator');

        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game variables
        let gameRunning = true;
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let speed = 6;
        let baseSpeed = 6;
        let gravity = 0.6;
        let jumpForce = -13;
        let nightMode = false;
        let frameCount = 0;
        let powerUpActive = false;
        let powerUpTimer = 0;

        // Dino
        const dino = {
            x: canvas.width * 0.2,
            y: 0,
            width: 60,
            height: 60,
            velocityY: 0,
            jumping: false,
            ducking: false,
            frame: 0,
            frameCount: 0,
            invincible: false
        };

        // Ground
        const ground = {
            y: canvas.height * 0.8,
            segments: [],
            segmentWidth: 50
        };

        // Initialize ground segments
        for (let x = 0; x < canvas.width + ground.segmentWidth; x += ground.segmentWidth) {
            ground.segments.push({
                x: x,
                width: ground.segmentWidth,
                height: canvas.height - ground.y
            });
        }

        // Obstacles array
        let obstacles = [];
        const obstacleTypes = ['cactus', 'bird', 'rock'];
        const minObstacleDistance = 300;
        const maxObstacleDistance = 500;

        // Power-ups array
        let powerUps = [];
        const powerUpTypes = ['shield', 'slowTime', 'doublePoints'];

        // Clouds array
        let clouds = [];

        // Stars array (for night mode)
        let stars = [];
        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (ground.y - 50),
                size: Math.random() * 2 + 1
            });
        }

        // Particles array
        let particles = [];

        // Game functions
        function createObstacle() {
            const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
            const lastObstacle = obstacles[obstacles.length - 1];
            const minX = lastObstacle ? lastObstacle.x + minObstacleDistance : canvas.width;
            const x = minX + Math.random() * (maxObstacleDistance - minObstacleDistance);

            let height, y;
            switch(type) {
                case 'bird':
                    height = 40;
                    y = ground.y - 100 - Math.random() * 100;
                    break;
                case 'rock':
                    height = 30;
                    y = ground.y - height;
                    break;
                default: // cactus
                    height = 50 + Math.random() * 30;
                    y = ground.y - height;
            }

            obstacles.push({
                x: x,
                y: y,
                width: 30,
                height: height,
                type: type
            });
        }

        function createPowerUp() {
            if (Math.random() < 0.1 && powerUps.length < 1) {
                const type = powerUpTypes[Math.floor(Math.random() * powerUpTypes.length)];
                powerUps.push({
                    x: canvas.width,
                    y: ground.y - 100 - Math.random() * 100,
                    width: 30,
                    height: 30,
                    type: type
                });
            }
        }

        function createParticle(x, y, color) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x,
                    y: y,
                    size: Math.random() * 3 + 2,
                    speedX: (Math.random() - 0.5) * 6,
                    speedY: (Math.random() - 0.5) * 6,
                    color: color,
                    life: 1
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.x += particle.speedX;
                particle.y += particle.speedY;
                particle.life -= 0.02;
                if (particle.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function createCloud() {
            if (Math.random() < 0.01 && clouds.length < 5) {
                clouds.push({
                    x: canvas.width,
                    y: Math.random() * (ground.y - 200),
                    width: 60 + Math.random() * 40,
                    height: 30,
                    speed: 1 + Math.random()
                });
            }
        }

        function activatePowerUp(type) {
            powerUpActive = true;
            powerUpTimer = 300; // 5 seconds at 60fps
            powerUpIndicator.style.display = 'block';

            switch(type) {
                case 'shield':
                    dino.invincible = true;
                    break;
                case 'slowTime':
                    speed = baseSpeed * 0.5;
                    break;
                case 'doublePoints':
                    // Score multiplier handled in update function
                    break;
            }
        }

        function deactivatePowerUp() {
            powerUpActive = false;
            powerUpTimer = 0;
            dino.invincible = false;
            speed = baseSpeed;
            powerUpIndicator.style.display = 'none';
        }

        function update() {
            if (!gameRunning) return;

            frameCount++;
            if (frameCount % 1000 === 0) {
                nightMode = !nightMode;
            }

            // Update dino
            dino.velocityY += gravity;
            dino.y += dino.velocityY;
            if (dino.y + dino.height > ground.y) {
                dino.y = ground.y - dino.height;
                dino.velocityY = 0;
                dino.jumping = false;
            }

            // Animate dino
            if (frameCount % 6 === 0) {
                dino.frame = (dino.frame + 1) % 2;
            }

            // Update ground
            ground.segments.forEach((segment, index) => {
                segment.x -= speed;
                if (segment.x + segment.width < 0) {
                    segment.x = ground.segments[(index - 1 + ground.segments.length) % ground.segments.length].x + ground.segmentWidth;
                }
            });

            // Update obstacles
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - minObstacleDistance) {
                createObstacle();
            }

            obstacles.forEach((obstacle, index) => {
                obstacle.x -= speed;

                // Collision detection
                if (!dino.invincible && 
                    dino.x < obstacle.x + obstacle.width &&
                    dino.x + dino.width > obstacle.x &&
                    dino.y < obstacle.y + obstacle.height &&
                    dino.y + dino.height > obstacle.y) {
                    gameOver();
                }

                if (obstacle.x + obstacle.width < 0) {
                    obstacles.splice(index, 1);
                    score += powerUpActive && powerUps[0]?.type === 'doublePoints' ? 20 : 10;
                    scoreElement.textContent = score;
                    if (score > highScore) {
                        highScore = score;
                        highScoreElement.textContent = highScore;
                        localStorage.setItem('highScore', highScore);
                    }
                    baseSpeed += 0.1;
                    if (!powerUpActive) speed = baseSpeed;
                }
            });

            // Update power-ups
            createPowerUp();
            powerUps.forEach((powerUp, index) => {
                powerUp.x -= speed;

                // Collision detection
                if (dino.x < powerUp.x + powerUp.width &&
                    dino.x + dino.width > powerUp.x &&
                    dino.y < powerUp.y + powerUp.height &&
                    dino.y + dino.height > powerUp.y) {
                    activatePowerUp(powerUp.type);
                    powerUps.splice(index, 1);
                    createParticle(powerUp.x, powerUp.y, '#00ff00');
                }

                if (powerUp.x + powerUp.width < 0) {
                    powerUps.splice(index, 1);
                }
            });

            // Update power-up timer
            if (powerUpActive) {
                powerUpTimer--;
                if (powerUpTimer <= 0) {
                    deactivatePowerUp();
                }
            }

            // Update clouds
            createCloud();
            clouds.forEach((cloud, index) => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    clouds.splice(index, 1);
                }
            });

            // Update particles
            updateParticles();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = nightMode ? '#2c3e50' : '#f7f7f7';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw stars in night mode
            if (nightMode) {
                stars.forEach(star => {
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            // Draw clouds
            ctx.fillStyle = nightMode ? '#34495e' : '#ffffff';
            clouds.forEach(cloud => {
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.height, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.width * 0.3, cloud.y - cloud.height * 0.2, cloud.height * 0.8, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.width * 0.6, cloud.y, cloud.height, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw ground
            ctx.fillStyle = nightMode ? '#34495e' : '#535353';
            ground.segments.forEach(segment => {
                ctx.fillRect(segment.x, ground.y, segment.width, segment.height);
            });

            // Draw dino
            ctx.fillStyle = nightMode ? '#ecf0f1' : '#535353';
            if (dino.invincible) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ff00';
            }
// Draw dino body
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
            
            // Draw dino eye
            ctx.fillStyle = nightMode ? '#2c3e50' : '#ffffff';
            ctx.fillRect(dino.x + dino.width - 15, dino.y + 10, 5, 5);
            
            // Reset shadow
            ctx.shadowBlur = 0;

            // Draw obstacles
            obstacles.forEach(obstacle => {
                switch(obstacle.type) {
                    case 'bird':
                        ctx.fillStyle = nightMode ? '#e74c3c' : '#c0392b';
                        // Draw bird body
                        ctx.beginPath();
                        ctx.ellipse(obstacle.x + 15, obstacle.y + 20, 15, 10, 0, 0, Math.PI * 2);
                        ctx.fill();
                        // Draw wings (animated)
                        const wingPosition = Math.sin(frameCount * 0.5) * 10;
                        ctx.beginPath();
                        ctx.moveTo(obstacle.x + 15, obstacle.y + 15);
                        ctx.lineTo(obstacle.x, obstacle.y + wingPosition);
                        ctx.lineTo(obstacle.x + 30, obstacle.y + wingPosition);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'rock':
                        ctx.fillStyle = nightMode ? '#7f8c8d' : '#95a5a6';
                        ctx.beginPath();
                        ctx.moveTo(obstacle.x, obstacle.y + obstacle.height);
                        ctx.lineTo(obstacle.x + 15, obstacle.y);
                        ctx.lineTo(obstacle.x + obstacle.width, obstacle.y + obstacle.height);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    default: // cactus
                        ctx.fillStyle = nightMode ? '#27ae60' : '#2ecc71';
                        ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                        // Draw cactus arms
                        ctx.fillRect(obstacle.x - 10, obstacle.y + 20, 10, 5);
                        ctx.fillRect(obstacle.x + obstacle.width, obstacle.y + 30, 10, 5);
                }
            });

            // Draw power-ups
            powerUps.forEach(powerUp => {
                ctx.beginPath();
                ctx.fillStyle = powerUp.type === 'shield' ? '#3498db' : 
                               powerUp.type === 'slowTime' ? '#9b59b6' : '#f1c40f';
                ctx.arc(powerUp.x + powerUp.width/2, powerUp.y + powerUp.height/2, 
                       powerUp.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw power-up symbol
                ctx.fillStyle = '#ffffff';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const symbol = powerUp.type === 'shield' ? '⛨' : 
                              powerUp.type === 'slowTime' ? '⏰' : '×2';
                ctx.fillText(symbol, powerUp.x + powerUp.width/2, 
                           powerUp.y + powerUp.height/2);
            });

            // Draw particles
            particles.forEach(particle => {
                ctx.beginPath();
                ctx.fillStyle = `rgba(${particle.color}, ${particle.life})`;
                ctx.arc(particle.x, particle.y, particle.size * particle.life, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function jump() {
            if (!dino.jumping && gameRunning) {
                dino.velocityY = jumpForce;
                dino.jumping = true;
                createParticle(dino.x + dino.width/2, dino.y + dino.height, 
                             nightMode ? '200,200,200' : '83,83,83');
            }
        }

        function duck() {
            if (!dino.jumping && gameRunning) {
                dino.height = 30;
                dino.y = ground.y - dino.height;
                dino.ducking = true;
            }
        }

        function unduck() {
            if (dino.ducking) {
                dino.height = 60;
                dino.y = ground.y - dino.height;
                dino.ducking = false;
            }
        }

        function gameOver() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            finalHighScoreElement.textContent = highScore;
            gameOverScreen.style.display = 'block';
            createParticle(dino.x + dino.width/2, dino.y + dino.height/2, '255,0,0');
        }

        function restart() {
            gameRunning = true;
            score = 0;
            speed = baseSpeed = 6;
            dino.y = ground.y - dino.height;
            dino.velocityY = 0;
            dino.jumping = false;
            dino.ducking = false;
            dino.height = 60;
            obstacles = [];
            powerUps = [];
            particles = [];
            powerUpActive = false;
            powerUpTimer = 0;
            scoreElement.textContent = '0';
            gameOverScreen.style.display = 'none';
            powerUpIndicator.style.display = 'none';
        }

        // Event listeners
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (touch.clientY > canvas.height * 0.7) {
                duck();
            } else {
                jump();
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            unduck();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                jump();
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                duck();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowDown') {
                e.preventDefault();
                unduck();
            }
        });

        restartBtn.addEventListener('click', restart);
        restartBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            restart();
        });

        // Initialize high score display
        highScoreElement.textContent = highScore;

        // Start game
        gameLoop();
    </script>
</body>
</html>
