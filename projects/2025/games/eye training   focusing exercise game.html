<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eye Training & Focusing Exercise Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* =============================================================================
       Eye Training & Focusing Exercise Game - CSS Styles
       =============================================================================
       This stylesheet establishes a futuristic, calming dark theme with neon glow
       effects. The game uses a full-screen canvas for rendering exercises and overlays
       UI elements for score, timer, and mode. A three-dot icon in the top-right toggles
       the settings/instructions panel.
       ============================================================================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background-color: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, #111, #000 80%);
    }
    /* UI Overlay */
    #uiOverlay {
      position: absolute;
      top: 10px; left: 10px;
      z-index: 10;
      color: #0ff;
      text-shadow: 0 0 8px #0ff;
      font-size: 18px;
    }
    #uiOverlay span { margin-right: 20px; }
    /* Start and Restart Buttons */
    #startButton, #restartButton {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background-color: #222;
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 5px;
      font-size: 20px;
      cursor: pointer;
      z-index: 20;
      text-shadow: 0 0 8px #0ff;
    }
    #restartButton { display: none; }
    /* Settings Icon (Three Dots) */
    #settingsIcon {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px; height: 30px;
      background-color: #222;
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 50%;
      text-align: center;
      line-height: 30px;
      font-size: 20px;
      cursor: pointer;
      z-index: 30;
      text-shadow: 0 0 8px #0ff;
    }
    /* Settings/Instructions Panel */
    #settingsPanel {
      position: absolute;
      top: 50px;
      right: 10px;
      width: 300px;
      background: rgba(20,20,20,0.95);
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 5px;
      padding: 10px;
      font-size: 14px;
      z-index: 30;
      display: none;
      max-height: 500px;
      overflow-y: auto;
    }
    #settingsPanel h2 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 18px;
    }
    #settingsPanel h3 {
      margin-top: 10px;
      font-size: 16px;
      text-decoration: underline;
    }
    #settingsPanel label {
      display: block;
      margin-top: 8px;
      font-weight: bold;
    }
    #settingsPanel input, #settingsPanel select, #settingsPanel button {
      width: 100%;
      padding: 6px;
      margin-top: 4px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
    }
    #settingsPanel input[type="number"] {
      background-color: #222;
      color: #0ff;
    }
    #settingsPanel input[type="checkbox"] {
      width: auto;
      margin-right: 4px;
    }
    #settingsPanel button {
      background-color: #0ff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    /* Responsive Design Adjustments */
    @media (max-width: 600px) {
      #uiOverlay { font-size: 14px; }
      #startButton, #restartButton { font-size: 18px; padding: 8px 16px; }
      #settingsPanel { width: 260px; font-size: 12px; }
      #settingsPanel h2 { font-size: 16px; }
    }
    /* =============================================================================
       End of CSS Styles
       ============================================================================= */
    
    /* Developer Note: The CSS here ensures a futuristic neon aesthetic with dark,
       calming visuals and that the UI elements are fully responsive. */
    
    /* Additional inline developer comments will be provided in the JS section below. */
    
    /* Developer Extra: End of CSS Section */

<body>
  <!-- Canvas where the game is rendered -->
  <canvas id="gameCanvas"></canvas>
  <!-- UI Overlay displaying Score, Timer, and Current Exercise Mode -->
  <div id="uiOverlay">
    <span id="scoreDisplay">Score: 0</span>
    <span id="timerDisplay">Time: 0</span>
    <span id="modeDisplay">Mode: SIZE</span>
  </div>
  <!-- Start and Restart Buttons -->
  <button id="startButton">Start Game</button>
  <button id="restartButton">Restart Game</button>
  <!-- Settings Icon (Three Dots) -->
  <div id="settingsIcon">&#8942;</div>
  <!-- Settings and Instructions Panel (Toggled by the Settings Icon) -->
  <div id="settingsPanel">
    <h2>Settings & Instructions</h2>
    <h3>Exercise Modes</h3>
    <p>Select the focus exercise mode:</p>
    <label for="exerciseModeSelect">Mode:</label>
    <select id="exerciseModeSelect">
      <option value="size" selected>Size Exercise</option>
      <option value="direction">Direction Exercise</option>
      <option value="random">Random Exercise</option>
      <option value="reaction">Reaction Training</option>
      <option value="speed">Speed Training</option>
    </select>
    <h3>Ball Settings</h3>
    <label for="ballSpeedInput">Ball Speed:</label>
    <input type="number" id="ballSpeedInput" value="2" min="0.5" max="10" step="0.5">
    <label for="ballSizeInput">Ball Base Size:</label>
    <input type="number" id="ballSizeInput" value="20" min="5" max="100" step="1">
    <h3>Background Style</h3>
    <label for="backgroundStyleSelect">Style:</label>
    <select id="backgroundStyleSelect">
      <option value="dark" selected>Dark Mode</option>
      <option value="gradient">Gradient</option>
      <option value="glow">Glowing Effects</option>
      <option value="calm">Calming Visuals</option>
    </select>
    <h3>Timer Settings</h3>
    <label for="exerciseTimerInput">Exercise Duration (sec):</label>
    <input type="number" id="exerciseTimerInput" value="30" min="10" max="300" step="5">
    <h3>Sound Options</h3>
    <label for="soundToggle">Sound Effects:</label>
    <input type="checkbox" id="soundToggle" checked>
    <label for="musicToggle">Background Music:</label>
    <input type="checkbox" id="musicToggle" checked>
    <h3>Difficulty</h3>
    <label for="difficultySelect">Level:</label>
    <select id="difficultySelect">
      <option value="easy">Easy</option>
      <option value="medium" selected>Medium</option>
      <option value="hard">Hard</option>
    </select>
    <button id="applySettings">Apply Settings</button>
  </div>
  <!-- End of Settings Panel -->
  <script>
    // ======================================================================
    // Eye Training and Focusing Exercise Game - JavaScript Code
    // ======================================================================
    // This game is designed to improve your focus and eye-tracking by having you
    // follow a small ball on the screen through multiple exercise modes:
    //   1. Size Exercise: The ball grows and shrinks as if moving closer and farther.
    //   2. Direction Exercise: The ball moves in a controlled cyclic pattern (up, right, down, left).
    //   3. Random Exercise: The ball moves in random, unpredictable directions.
    //   4. Reaction Training: The ball stops suddenly, and you must click it quickly to score.
    //   5. Speed Training: The ball gradually speeds up over time.
    // The game includes a score counter, a timer, and transitions between exercises with
    // a calming fade animation to reduce eye strain. All customizable settings (ball speed,
    // size, background style, timer, sound, music, and difficulty) are available in the settings
    // panel, which is accessed by clicking the three-dot icon in the top-right corner.
    // ======================================================================

    // ----------------------------------------------------------------------
    // 1. Global Variables and Initialization
    // ----------------------------------------------------------------------
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let canvasWidth = window.innerWidth, canvasHeight = window.innerHeight;
    canvas.width = canvasWidth; canvas.height = canvasHeight;
    // Game state variables
    let gameStarted = false;
    let exerciseActive = false;
    let exerciseMode = document.getElementById("exerciseModeSelect").value; // Modes: size, direction, random, reaction, speed
    let score = 0;
    let timer = 0; // seconds elapsed
    let exerciseDuration = parseInt(document.getElementById("exerciseTimerInput").value);
    let exerciseStartTime = 0;
    let modeTransition = false;
    let transitionAlpha = 1.0;
    let lastTime = performance.now();
    // Ball object representing the focus target
    let ball = {
      x: canvasWidth / 2,
      y: canvasHeight / 2,
      size: parseInt(document.getElementById("ballSizeInput").value),
      speed: parseFloat(document.getElementById("ballSpeedInput").value),
      vx: 0,
      vy: 0
    };
    // Sound and Music flags and objects
    let soundEnabled = document.getElementById("soundToggle").checked;
    let musicEnabled = document.getElementById("musicToggle").checked;
    let difficulty = document.getElementById("difficultySelect").value;
    let backgroundStyle = document.getElementById("backgroundStyleSelect").value;
    // Reaction mode variables
    let reactionActive = false;
    let reactionStartTime = 0;
    let reactionResponseTime = 0;
    // Array of exercise modes for automatic transitions
    const exerciseSequence = ["size", "direction", "random", "reaction", "speed"];
    let currentExerciseIndex = 0;
    // Background music object
    let backgroundMusic = new Audio("https://actions.google.com/sounds/v1/ambiences/space_ambience.ogg");
    backgroundMusic.loop = true;
    backgroundMusic.volume = 0.2;
    if (musicEnabled) backgroundMusic.play();
    // ----------------------------------------------------------------------
    // 2. Utility Functions
    // ----------------------------------------------------------------------
    function rand(min, max) { return Math.random() * (max - min) + min; }
    function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
    function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function formatTime(seconds) {
      let m = Math.floor(seconds / 60);
      let s = Math.floor(seconds % 60);
      return m + ":" + (s < 10 ? "0" : "") + s;
    }
    // ----------------------------------------------------------------------
    // 3. Responsive Canvas Resizing
    // ----------------------------------------------------------------------
    window.addEventListener("resize", function() {
      canvasWidth = window.innerWidth;
      canvasHeight = window.innerHeight;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
      // Recenter the ball on resize
      ball.x = canvasWidth / 2;
      ball.y = canvasHeight / 2;
    });
    // ----------------------------------------------------------------------
    // 4. Ball Update Functions for Different Exercise Modes
    // ----------------------------------------------------------------------
    function updateBallSizeExercise(deltaTime) {
      // The ball oscillates in size between 50% and 150% of the base size
      let period = 2000; // period in ms
      let t = (performance.now() % period) / period;
      let scale = lerp(0.5, 1.5, Math.abs(t - 0.5) * 2);
      ball.size = parseInt(document.getElementById("ballSizeInput").value * scale);
    }
    function updateBallDirectionExercise(deltaTime) {
      // The ball moves in a fixed cycle: up, right, down, left.
      let cycle = 4000; // ms for a full cycle
      let t = (performance.now() % cycle) / cycle;
      if (t < 0.25) { ball.vx = 0; ball.vy = -ball.speed; }
      else if (t < 0.5) { ball.vx = ball.speed; ball.vy = 0; }
      else if (t < 0.75) { ball.vx = 0; ball.vy = ball.speed; }
      else { ball.vx = -ball.speed; ball.vy = 0; }
      ball.x += ball.vx;
      ball.y += ball.vy;
      ball.x = clamp(ball.x, ball.size, canvasWidth - ball.size);
      ball.y = clamp(ball.y, ball.size, canvasHeight - ball.size);
    }
    function updateBallRandomExercise(deltaTime) {
      // Randomly change velocity at intervals
      if (Math.random() < 0.01) {
        let angle = rand(0, Math.PI * 2);
        ball.vx = Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
      }
      ball.x += ball.vx;
      ball.y += ball.vy;
      if (ball.x <= ball.size || ball.x >= canvasWidth - ball.size) ball.vx *= -1;
      if (ball.y <= ball.size || ball.y >= canvasHeight - ball.size) ball.vy *= -1;
    }
    function updateBallReactionExercise(deltaTime) {
      // The ball stops for reaction training; if clicked, record reaction time and resume movement.
      if (!reactionActive) {
        // Randomly trigger a stop
        if (Math.random() < 0.005) {
          reactionActive = true;
          reactionStartTime = performance.now();
          ball.vx = 0;
          ball.vy = 0;
        }
      }
      // If still active, do nothing (wait for click)
      // Movement resumes on click in the event listener below.
    }
    function updateBallSpeedExercise(deltaTime) {
      // The ball moves and gradually accelerates
      ball.x += ball.vx;
      ball.y += ball.vy;
      // Gradually increase speed based on difficulty
      let acceleration = 0.001;
      ball.vx *= 1 + acceleration * deltaTime;
      ball.vy *= 1 + acceleration * deltaTime;
      if (ball.x <= ball.size || ball.x >= canvasWidth - ball.size) ball.vx *= -1;
      if (ball.y <= ball.size || ball.y >= canvasHeight - ball.size) ball.vy *= -1;
    }
    // ----------------------------------------------------------------------
    // 5. Ball Rendering Function
    // ----------------------------------------------------------------------
    function drawBall() {
      ctx.save();
      ctx.translate(ball.x, ball.y);
      ctx.shadowBlur = 20;
      ctx.shadowColor = "#0ff";
      ctx.fillStyle = "#0ff";
      ctx.beginPath();
      ctx.arc(0, 0, ball.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    // ----------------------------------------------------------------------
    // 6. Background Rendering Functions
    // ----------------------------------------------------------------------
    function drawBackground() {
      if (backgroundStyle === "dark") {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      } else if (backgroundStyle === "gradient") {
        let grd = ctx.createRadialGradient(canvasWidth/2, canvasHeight/2, 50, canvasWidth/2, canvasHeight/2, canvasWidth);
        grd.addColorStop(0, "#003");
        grd.addColorStop(1, "#000");
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      } else if (backgroundStyle === "glow") {
        ctx.fillStyle = "#010";
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        drawGlowingParticles();
      } else if (backgroundStyle === "calm") {
        ctx.fillStyle = "#002";
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        drawCalmWaves();
      }
    }
    function drawGlowingParticles() {
      for (let i = 0; i < 50; i++) {
        let x = rand(0, canvasWidth), y = rand(0, canvasHeight);
        let r = rand(1, 3);
        ctx.save();
        ctx.fillStyle = "#0ff";
        ctx.globalAlpha = 0.2;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
    function drawCalmWaves() {
      ctx.save();
      ctx.strokeStyle = "rgba(0,255,255,0.1)";
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        let y = canvasHeight / 5 * i + rand(0, 20);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.bezierCurveTo(canvasWidth / 3, y + rand(-30, 30), 2 * canvasWidth / 3, y + rand(-30, 30), canvasWidth, y);
        ctx.stroke();
      }
      ctx.restore();
    }
    // ----------------------------------------------------------------------
    // 7. Transition Effect between Exercises
    // ----------------------------------------------------------------------
    function drawTransition() {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0," + transitionAlpha + ")";
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      ctx.restore();
    }
    function transitionToNextExercise() {
      modeTransition = true;
      transitionAlpha = 1.0;
      let interval = setInterval(() => {
        transitionAlpha -= 0.02;
        if (transitionAlpha <= 0) {
          clearInterval(interval);
          modeTransition = false;
          currentExerciseIndex = (currentExerciseIndex + 1) % exerciseSequence.length;
          exerciseMode = exerciseSequence[currentExerciseIndex];
          document.getElementById("modeDisplay").innerText = "Mode: " + exerciseMode.toUpperCase();
          resetBall();
          startBallMovement();
          exerciseStartTime = performance.now();
          timer = 0;
        }
      }, 50);
    }
    // ----------------------------------------------------------------------
    // 8. Ball Movement Starter and Reset
    // ----------------------------------------------------------------------
    function resetBall() {
      ball.x = canvasWidth / 2;
      ball.y = canvasHeight / 2;
      ball.size = parseInt(document.getElementById("ballSizeInput").value);
      ball.speed = parseFloat(document.getElementById("ballSpeedInput").value);
      ball.vx = 0;
      ball.vy = 0;
    }
    function startBallMovement() {
      if (exerciseMode === "direction") {
        ball.vx = ball.speed;
        ball.vy = 0;
      } else if (exerciseMode === "random") {
        let angle = rand(0, Math.PI * 2);
        ball.vx = Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
      } else if (exerciseMode === "speed") {
        let angle = rand(0, Math.PI * 2);
        ball.vx = Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
      } else {
        ball.vx = 0;
        ball.vy = 0;
      }
    }
    // ----------------------------------------------------------------------
    // 9. Timer and Score Update Functions
    // ----------------------------------------------------------------------
    function updateTimer() {
      let now = performance.now();
      timer = Math.floor((now - exerciseStartTime) / 1000);
    }
    function updateScore() {
      // For non-reaction exercises, score increases over time
      if (exerciseMode !== "reaction") {
        score += 0.1;
      }
    }
    // ----------------------------------------------------------------------
    // 10. Main Game Loop
    // ----------------------------------------------------------------------
    function gameLoop(timestamp) {
      let deltaTime = timestamp - lastTime;
      lastTime = timestamp;
      // Start the exercise if not already active
      if (gameStarted && !exerciseActive) {
        exerciseActive = true;
        exerciseStartTime = performance.now();
        timer = 0;
        score = 0;
      }
      // Update timer and score if not in transition
      if (exerciseActive && !modeTransition) {
        updateTimer();
        updateScore();
      }
      // Update ball movement based on current exercise mode
      if (!modeTransition) {
        if (exerciseMode === "size") {
          updateBallSizeExercise(deltaTime);
        } else if (exerciseMode === "direction") {
          updateBallDirectionExercise(deltaTime);
        } else if (exerciseMode === "random") {
          updateBallRandomExercise(deltaTime);
        } else if (exerciseMode === "reaction") {
          updateBallReactionExercise(deltaTime);
        } else if (exerciseMode === "speed") {
          updateBallSpeedExercise(deltaTime);
        }
      }
      // Draw background and ball
      drawBackground();
      drawBall();
      // Update UI overlay
      document.getElementById("scoreDisplay").innerText = "Score: " + Math.floor(score);
      document.getElementById("timerDisplay").innerText = "Time: " + formatTime(timer);
      // Check if exercise duration is reached
      if (timer >= exerciseDuration && !modeTransition) {
        transitionToNextExercise();
        exerciseActive = false;
      }
      // Draw transition overlay if in transition
      if (modeTransition) { drawTransition(); }
      // Draw debug info if enabled
      if (debugMode) { drawDebugInfo(); }
      requestAnimationFrame(gameLoop);
    }
    // ----------------------------------------------------------------------
    // 11. Restart Handler
    // ----------------------------------------------------------------------
    document.getElementById("restartButton").addEventListener("click", function() {
      restartExercise();
    });
    function restartExercise() {
      exerciseActive = false;
      score = 0;
      timer = 0;
      resetBall();
      startBallMovement();
      document.getElementById("restartButton").style.display = "none";
      exerciseStartTime = performance.now();
    }
    // ----------------------------------------------------------------------
    // 12. Event Listener for Reaction Mode Clicks
    // ----------------------------------------------------------------------
    canvas.addEventListener("click", function(e) {
      if (exerciseMode === "reaction" && !reactionActive) return;
      if (exerciseMode === "reaction" && reactionActive) {
        let rt = performance.now() - reactionStartTime;
        reactionResponseTime = rt;
        score += Math.max(0, 1000 - rt);
        if (soundEnabled) { soundReaction.currentTime = 0; soundReaction.play(); }
        reactionActive = false;
        startBallMovement();
      }
    });
    // ----------------------------------------------------------------------
    // 13. Settings Panel Toggle via Three-Dot Icon
    // ----------------------------------------------------------------------
    const settingsIcon = document.getElementById("settingsIcon");
    const settingsPanel = document.getElementById("settingsPanel");
    settingsIcon.addEventListener("click", function() {
      if (settingsPanel.style.display === "none" || settingsPanel.style.display === "") {
        settingsPanel.style.display = "block";
      } else {
        settingsPanel.style.display = "none";
      }
    });
    // ----------------------------------------------------------------------
    // 14. Settings Application Handler
    // ----------------------------------------------------------------------
    document.getElementById("applySettings").addEventListener("click", function() {
      // Update exercise mode and settings based on user inputs
      exerciseMode = document.getElementById("exerciseModeSelect").value;
      ball.speed = parseFloat(document.getElementById("ballSpeedInput").value);
      ball.size = parseInt(document.getElementById("ballSizeInput").value);
      backgroundStyle = document.getElementById("backgroundStyleSelect").value;
      exerciseDuration = parseInt(document.getElementById("exerciseTimerInput").value);
      soundEnabled = document.getElementById("soundToggle").checked;
      musicEnabled = document.getElementById("musicToggle").checked;
      difficulty = document.getElementById("difficultySelect").value;
      document.getElementById("modeDisplay").innerText = "Mode: " + exerciseMode.toUpperCase();
      resetBall();
      startBallMovement();
      exerciseStartTime = performance.now();
      settingsPanel.style.display = "none";
    });
    // ----------------------------------------------------------------------
    // 15. Sound Toggle Handlers
    // ----------------------------------------------------------------------
    document.getElementById("soundToggle").addEventListener("change", function() {
      soundEnabled = this.checked;
    });
    document.getElementById("musicToggle").addEventListener("change", function() {
      musicEnabled = this.checked;
      if (musicEnabled) { backgroundMusic.play(); }
      else { backgroundMusic.pause(); }
    });
    // ----------------------------------------------------------------------
    // 16. Debug Mode Toggle and Debug Drawing
    // ----------------------------------------------------------------------
    let debugMode = false;
    document.addEventListener("keydown", function(e) {
      if (e.key === "d" || e.key === "D") {
        debugMode = !debugMode;
      }
    });
    function drawDebugInfo() {
      ctx.save();
      ctx.fillStyle = "#fff";
      ctx.font = "14px Arial";
      ctx.fillText("DEBUG MODE ON", 10, canvasHeight - 30);
      ctx.fillText("Ball Pos: (" + ball.x.toFixed(2) + ", " + ball.y.toFixed(2) + ")", 10, canvasHeight - 50);
      ctx.restore();
    }
    // ----------------------------------------------------------------------
    // 17. Main Loop Start Handler (Start Game Button)
    // ----------------------------------------------------------------------
    document.getElementById("startButton").addEventListener("click", function() {
      gameStarted = true;
      this.style.display = "none";
      exerciseActive = false;
      exerciseMode = document.getElementById("exerciseModeSelect").value;
      resetBall();
      startBallMovement();
      exerciseStartTime = performance.now();
      requestAnimationFrame(gameLoop);
    });
    // ----------------------------------------------------------------------
    // 18. Developer Logging and Debugging Tools
    // ----------------------------------------------------------------------
    function developerLog() {
      console.log("Current Mode:", exerciseMode, "Score:", Math.floor(score), "Timer:", timer, "Ball Speed:", ball.speed, "Ball Size:", ball.size);
    }
    setInterval(developerLog, 15000);
    // ----------------------------------------------------------------------
    // 19. Extra Developer Debug Functions
    // ----------------------------------------------------------------------
    function extraDebugOutput() {
      console.log("Extra Debug: Delta Time =", (performance.now() - lastTime).toFixed(2) + " ms");
    }
    setInterval(extraDebugOutput, 5000);
    // ----------------------------------------------------------------------
    // 20. Additional Developer Documentation and Logging
    // ----------------------------------------------------------------------
    /*
      Developer Documentation:
      - Global state variables (gameStarted, exerciseMode, score, timer) manage game flow.
      - The ball object represents the focus target whose behavior varies by exercise mode.
      - Each exercise mode has its own update function to simulate natural movement.
      - A transition effect is used when switching exercises to avoid eye strain.
      - The settings panel (toggled by the three-dot icon) provides comprehensive customization.
      - Debug mode (toggled by pressing "D") overlays extra information on the canvas.
      - Sound and music can be toggled from the settings panel.
      - The game loop uses requestAnimationFrame for smooth animations.
      - Developer logging functions are scheduled to help monitor performance.
