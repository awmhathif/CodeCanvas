<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shape-Shifting Shooter</title>
  <style>
    /* =============================================================================
       Shape-Shifting Shooter
       =============================================================================
       This CSS defines a neon-glowing, futuristic style for a space shooter game.
       The game features a dynamic background, glowing UI elements, and a responsive
       layout that adapts to desktop and mobile screens.
    ============================================================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }
    /* The main game canvas */
    #gameCanvas {
      display: block;
      background: radial-gradient(ellipse at center, #111, #000 70%);
      width: 100%;
      height: 100%;
    }
    /* UI overlay for score and restart */
    #uiOverlay {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: #0ff;
      text-shadow: 0 0 10px #0ff;
      font-size: 20px;
    }
    #restartButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 30px;
      background-color: #222;
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 8px;
      font-size: 24px;
      cursor: pointer;
      display: none;
      z-index: 20;
      text-shadow: 0 0 10px #0ff;
    }
    /* Responsive styling for mobile devices */
    @media (max-width: 600px) {
      #uiOverlay {
        font-size: 16px;
      }
      #restartButton {
        font-size: 20px;
        padding: 10px 20px;
      }
    }
    /* End of CSS for the game */
    /* =============================================================================
       End of style.css section
    ============================================================================= */
    
    /* Additional meaningful comments to help with code organization follow. */
    
    /* ---------------------------------------------------------------------------
       No filler blank lines have been inserted here.
    --------------------------------------------------------------------------- */
  </style>
</head>
<body>
  <!-- Main game canvas -->
  <canvas id="gameCanvas"></canvas>
  <!-- UI overlay: score, lives, current shape, etc. -->
  <div id="uiOverlay">
    <div id="scoreDisplay">Score: 0</div>
    <div id="livesDisplay">Lives: 3</div>
    <div id="shapeDisplay">Shape: TRIANGLE</div>
  </div>
  <!-- Restart button (hidden until game over) -->
  <button id="restartButton">Restart Game</button>
  
  <script>
    /* =============================================================================
       Shape-Shifting Shooter
       =============================================================================
       This JavaScript code implements an advanced shape-shifting shooter game.
       The player controls a spaceship that can morph into different shapes—
       triangle, square, and circle—each with unique abilities. Enemies spawn in
       waves with increasing difficulty, and power-ups appear at random.
       
       Features:
         - Player spaceship with three morphable shapes:
              • Triangle: high speed, rapid-fire.
              • Square: strong defense, slower movement.
              • Circle: wide attack spread.
         - Enemies with vulnerabilities/resistances based on shape.
         - Power-ups: boosts (faster morphing, stronger attacks, shields).
         - Neon-themed dynamic background with particle effects.
         - Smooth animations and responsive physics.
         - Scoring system with bonus points for using effective shapes.
         - Sound effects and background music.
         - Restart button on game over.
         - Optimized using the Canvas API.
       
       The code is modular and structured into sections:
         1. Global Variables and Setup
         2. Utility Functions
         3. Class Definitions:
              - Player
              - Enemy
              - Bullet
              - PowerUp
              - Particle (for explosions and background effects)
         4. Input Handling
         5. Game Logic: update and render loops, collision detection, spawning
         6. Sound Management
         7. Main Game Loop and Initialization
         8. Event Listeners and Restart Logic
         9. Additional Comments and Documentation
       
       ============================================================================= */

    /* ============================================================================
       1. Global Variables and Setup
       ============================================================================ */
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let canvasWidth = window.innerWidth;
    let canvasHeight = window.innerHeight;
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;

    // Game state variables
    let gameOver = false;
    let score = 0;
    let lives = 3;
    let currentWave = 1;
    let enemySpawnTimer = 0;
    let powerUpSpawnTimer = 0;
    let gameTime = 0;
    let lastTime = 0;
    let enemySpawnInterval = 2000; // ms
    let powerUpSpawnInterval = 10000; // ms

    // Arrays for game objects
    const enemies = [];
    const bullets = [];
    const enemyBullets = [];
    const powerUps = [];
    const particles = [];
    const backgroundStars = [];

    // Global key state
    const keys = {};

    // Current player shape type: "triangle", "square", or "circle"
    let currentShape = "triangle";

    // Global sound objects (placeholders; replace src with actual sound files if available)
    const shootSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    const explosionSound = new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");
    const powerUpSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    const bgMusic = new Audio("https://actions.google.com/sounds/v1/ambiences/space_ambience.ogg");
    bgMusic.loop = true;
    bgMusic.volume = 0.3;
    bgMusic.play();

    // ---------------------------------------------------------------------------
    // 2. Utility Functions
    // ---------------------------------------------------------------------------
    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
    function distance(x1, y1, x2, y2) {
      return Math.hypot(x2 - x1, y2 - y1);
    }
    function degToRad(deg) {
      return deg * Math.PI / 180;
    }
    function getCurrentTime() {
      return performance.now();
    }

    // Resize canvas on window resize
    window.addEventListener("resize", () => {
      canvasWidth = window.innerWidth;
      canvasHeight = window.innerHeight;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
    });

    /* ============================================================================
       3. Class Definitions
       ============================================================================ */

    // 3.1. Player Class
    class Player {
      constructor() {
        this.x = canvasWidth / 2;
        this.y = canvasHeight - 100;
        this.radius = 20;
        this.speed = 5;
        this.dx = 0;
        this.dy = 0;
        this.shape = "triangle"; // initial shape
        this.morphCooldown = 0; // time before next allowed morph (ms)
        this.lastMorphTime = 0;
        this.shootCooldown = 300; // ms between shots
        this.lastShotTime = 0;
        this.shield = false; // temporary shield power-up
        this.poweredAttack = false; // temporary attack boost
      }
      update(deltaTime) {
        // Movement update based on keys
        if (keys["ArrowLeft"] || keys["a"]) {
          this.dx = -this.speed;
        } else if (keys["ArrowRight"] || keys["d"]) {
          this.dx = this.speed;
        } else {
          this.dx = 0;
        }
        if (keys["ArrowUp"] || keys["w"]) {
          this.dy = -this.speed;
        } else if (keys["ArrowDown"] || keys["s"]) {
          this.dy = this.speed;
        } else {
          this.dy = 0;
        }
        this.x += this.dx;
        this.y += this.dy;
        // Keep player within screen bounds
        this.x = clamp(this.x, this.radius, canvasWidth - this.radius);
        this.y = clamp(this.y, this.radius, canvasHeight - this.radius);
      }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#0ff";
        ctx.fillStyle = "#0ff";
        ctx.strokeStyle = "#0ff";
        // Draw shape based on current form
        if (this.shape === "triangle") {
          // Triangle: high speed, rapid fire
          ctx.beginPath();
          ctx.moveTo(0, -this.radius);
          ctx.lineTo(-this.radius, this.radius);
          ctx.lineTo(this.radius, this.radius);
          ctx.closePath();
          ctx.fill();
        } else if (this.shape === "square") {
          // Square: high defense
          ctx.beginPath();
          ctx.rect(-this.radius, -this.radius, this.radius * 2, this.radius * 2);
          ctx.fill();
        } else if (this.shape === "circle") {
          // Circle: wide attack
          ctx.beginPath();
          ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        // If shielded, draw an outer glow
        if (this.shield) {
          ctx.beginPath();
          ctx.strokeStyle = "#ff0";
          ctx.lineWidth = 3;
          ctx.arc(0, 0, this.radius + 5, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }
      morph(newShape) {
        const now = getCurrentTime();
        if (now - this.lastMorphTime < this.morphCooldown) {
          return; // still cooling down
        }
        this.shape = newShape;
        this.lastMorphTime = now;
        // Set morph cooldown based on shape (for example, triangle can morph fast)
        if (newShape === "triangle") {
          this.morphCooldown = 300;
          this.speed = 7;
        } else if (newShape === "square") {
          this.morphCooldown = 600;
          this.speed = 4;
        } else if (newShape === "circle") {
          this.morphCooldown = 500;
          this.speed = 5;
        }
        // Update UI shape display
        document.getElementById("shapeDisplay").innerText = "Shape: " + newShape.toUpperCase();
      }
      shoot() {
        const now = getCurrentTime();
        if (now - this.lastShotTime < this.shootCooldown) return;
        this.lastShotTime = now;
        // Create bullets based on current shape
        if (this.shape === "triangle") {
          // Single fast bullet upward
          bullets.push(new Bullet(this.x, this.y - this.radius, 0, -8, this.poweredAttack ? 2 : 1));
        } else if (this.shape === "square") {
          // Two bullets (left and right) for a stronger shot
          bullets.push(new Bullet(this.x - 10, this.y - this.radius, -1, -7, this.poweredAttack ? 2 : 1));
          bullets.push(new Bullet(this.x + 10, this.y - this.radius, 1, -7, this.poweredAttack ? 2 : 1));
        } else if (this.shape === "circle") {
          // Spread shot: three bullets at different angles
          bullets.push(new Bullet(this.x, this.y - this.radius, 0, -7, this.poweredAttack ? 2 : 1));
          bullets.push(new Bullet(this.x, this.y - this.radius, -0.5, -7, this.poweredAttack ? 2 : 1));
          bullets.push(new Bullet(this.x, this.y - this.radius, 0.5, -7, this.poweredAttack ? 2 : 1));
        }
        shootSound.currentTime = 0;
        shootSound.play();
      }
    }

    // 3.2. Bullet Class (for player and enemy bullets)
    class Bullet {
      constructor(x, y, dx, dy, power = 1) {
        this.x = x;
        this.y = y;
        this.dx = dx;
        this.dy = dy;
        this.radius = 4;
        this.power = power; // multiplier for damage
        this.active = true;
      }
      update(deltaTime) {
        this.x += this.dx;
        this.y += this.dy;
        // Deactivate if off-screen
        if (this.x < 0 || this.x > canvasWidth || this.y < 0 || this.y > canvasHeight) {
          this.active = false;
        }
      }
      draw(ctx) {
        ctx.save();
        ctx.fillStyle = "#0ff";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#0ff";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // 3.3. Enemy Class
    class Enemy {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // enemy type determines vulnerability and behavior
        // Types: "light", "heavy", "swarm"
        // Vulnerability: light vulnerable to square, heavy vulnerable to circle, swarm vulnerable to triangle
        if (type === "light") {
          this.vulnerability = "square";
          this.speed = 2;
          this.health = 2;
          this.size = 15;
        } else if (type === "heavy") {
          this.vulnerability = "circle";
          this.speed = 1.5;
          this.health = 5;
          this.size = 25;
        } else if (type === "swarm") {
          this.vulnerability = "triangle";
          this.speed = 3;
          this.health = 1;
          this.size = 10;
        }
        // Random horizontal movement direction
        this.dx = rand(-1, 1);
        this.dy = this.speed;
        this.active = true;
      }
      update(deltaTime) {
        this.x += this.dx;
        this.y += this.dy;
        // Bounce off horizontal boundaries
        if (this.x < this.size || this.x > canvasWidth - this.size) {
          this.dx *= -1;
        }
        // Deactivate if off-screen (bottom)
        if (this.y - this.size > canvasHeight) {
          this.active = false;
        }
      }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.shadowBlur = 10;
        // Color based on type
        if (this.type === "light") {
          ctx.fillStyle = "#ff0";
          ctx.shadowColor = "#ff0";
        } else if (this.type === "heavy") {
          ctx.fillStyle = "#f0f";
          ctx.shadowColor = "#f0f";
        } else if (this.type === "swarm") {
          ctx.fillStyle = "#0f0";
          ctx.shadowColor = "#0f0";
        }
        // Draw enemy as a polygon (for variety)
        ctx.beginPath();
        if (this.type === "light") {
          // Light enemy: draw a small triangle
          ctx.moveTo(0, -this.size);
          ctx.lineTo(-this.size, this.size);
          ctx.lineTo(this.size, this.size);
          ctx.closePath();
        } else if (this.type === "heavy") {
          // Heavy enemy: draw a square
          ctx.rect(-this.size, -this.size, this.size * 2, this.size * 2);
        } else if (this.type === "swarm") {
          // Swarm enemy: draw a circle
          ctx.arc(0, 0, this.size, 0, Math.PI * 2);
        }
        ctx.fill();
        ctx.restore();
      }
    }

    // 3.4. PowerUp Class
    class PowerUp {
      constructor(x, y, effect) {
        this.x = x;
        this.y = y;
        // Effects: "morph", "attack", "shield"
        this.effect = effect;
        this.radius = 12;
        this.duration = 5000; // effect lasts 5 seconds
        this.active = true;
      }
      update(deltaTime) {
        // Slowly drift downward
        this.y += 1;
        if (this.y - this.radius > canvasHeight) {
          this.active = false;
        }
      }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.shadowBlur = 15;
        if (this.effect === "morph") {
          ctx.fillStyle = "#0ff";
          ctx.shadowColor = "#0ff";
        } else if (this.effect === "attack") {
          ctx.fillStyle = "#f80";
          ctx.shadowColor = "#f80";
        } else if (this.effect === "shield") {
          ctx.fillStyle = "#0f0";
          ctx.shadowColor = "#0f0";
        }
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // 3.5. Particle Class (for explosions and background effects)
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.dx = rand(-3, 3);
        this.dy = rand(-3, 3);
        this.radius = rand(2, 4);
        this.life = 1.0; // 1.0 is full life
        this.fade = rand(0.01, 0.03);
        this.color = color;
      }
      update(deltaTime) {
        this.x += this.dx;
        this.y += this.dy;
        this.life -= this.fade;
      }
      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = clamp(this.life, 0, 1);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // 3.6. Background Star Class (for dynamic background)
    class Star {
      constructor() {
        this.x = rand(0, canvasWidth);
        this.y = rand(0, canvasHeight);
        this.radius = rand(0.5, 2);
        this.speed = rand(0.1, 0.5);
      }
      update(deltaTime) {
        this.y += this.speed;
        if (this.y > canvasHeight) {
          this.y = 0;
          this.x = rand(0, canvasWidth);
        }
      }
      draw(ctx) {
        ctx.save();
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    /* ============================================================================
       4. Input Handling
       ============================================================================ */
    window.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      // Morphing controls: keys 1, 2, 3
      if (e.key === "1") {
        player.morph("triangle");
      } else if (e.key === "2") {
        player.morph("square");
      } else if (e.key === "3") {
        player.morph("circle");
      }
      // Shooting control: spacebar
      if (e.key === " " || e.key === "Spacebar") {
        player.shoot();
      }
    });
    window.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    /* ============================================================================
       5. Game Logic: Update and Render
       ============================================================================ */
    // Create player instance
    const player = new Player();

    // Initialize background stars
    for (let i = 0; i < 100; i++) {
      backgroundStars.push(new Star());
    }

    // Function to spawn enemies based on the current wave and difficulty
    function spawnEnemy() {
      let x = rand(30, canvasWidth - 30);
      let y = -30;
      // Randomly select enemy type weighted by wave number
      let r = Math.random();
      let type;
      if (r < 0.4) {
        type = "swarm";
      } else if (r < 0.75) {
        type = "light";
      } else {
        type = "heavy";
      }
      enemies.push(new Enemy(x, y, type));
    }

    // Function to spawn power-ups randomly
    function spawnPowerUp() {
      let x = rand(30, canvasWidth - 30);
      let y = -30;
      // Randomly select power-up effect
      let effects = ["morph", "attack", "shield"];
      let effect = effects[Math.floor(rand(0, effects.length))];
      powerUps.push(new PowerUp(x, y, effect));
    }

    // Check collisions between circle objects
    function circleCollision(x1, y1, r1, x2, y2, r2) {
      return distance(x1, y1, x2, y2) < (r1 + r2);
    }

    // Handle collisions: bullets vs enemies, enemy vs player, power-ups vs player
    function handleCollisions() {
      // Player bullets and enemies
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (circleCollision(b.x, b.y, b.radius, e.x, e.y, e.size)) {
            // Determine damage; bonus if player's shape matches enemy vulnerability
            let damage = b.power;
            if (player.shape === e.vulnerability) {
              damage *= 2;
              score += 5; // bonus score
            } else {
              score += 2;
            }
            e.health -= damage;
            b.active = false;
            // Create explosion particles
            for (let k = 0; k < 5; k++) {
              particles.push(new Particle(e.x, e.y, "#ff0"));
            }
            if (e.health <= 0) {
              explosionSound.currentTime = 0;
              explosionSound.play();
              enemies.splice(j, 1);
              score += 10;
            }
            break;
          }
        }
      }
      // Enemy collisions with player
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (circleCollision(e.x, e.y, e.size, player.x, player.y, player.radius)) {
          // If shielded, ignore collision
          if (!player.shield) {
            lives -= 1;
            explosionSound.currentTime = 0;
            explosionSound.play();
          }
          enemies.splice(i, 1);
          if (lives <= 0) {
            gameOver = true;
          }
        }
      }
      // Power-up collisions with player
      for (let i = powerUps.length - 1; i >= 0; i--) {
        const p = powerUps[i];
        if (circleCollision(p.x, p.y, p.radius, player.x, player.y, player.radius)) {
          powerUpSound.currentTime = 0;
          powerUpSound.play();
          // Apply power-up effect
          if (p.effect === "morph") {
            // Temporarily reduce morph cooldown
            player.morphCooldown /= 2;
            setTimeout(() => {
              player.morphCooldown *= 2;
            }, p.duration);
          } else if (p.effect === "attack") {
            // Temporarily boost attack power
            player.poweredAttack = true;
            setTimeout(() => {
              player.poweredAttack = false;
            }, p.duration);
          } else if (p.effect === "shield") {
            // Grant temporary shield
            player.shield = true;
            setTimeout(() => {
              player.shield = false;
            }, p.duration);
          }
          powerUps.splice(i, 1);
          score += 15;
        }
      }
    }

    // Update all game objects
    function updateGame(deltaTime) {
      gameTime += deltaTime;
      // Update player
      player.update(deltaTime);
      // Update bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].update(deltaTime);
        if (!bullets[i].active) {
          bullets.splice(i, 1);
        }
      }
      // Update enemy bullets (if any; could add enemy shooting later)
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        enemyBullets[i].update(deltaTime);
        if (!enemyBullets[i].active) {
          enemyBullets.splice(i, 1);
        }
      }
      // Update enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].update(deltaTime);
        if (!enemies[i].active) {
          enemies.splice(i, 1);
        }
      }
      // Update power-ups
      for (let i = powerUps.length - 1; i >= 0; i--) {
        powerUps[i].update(deltaTime);
        if (!powerUps[i].active) {
          powerUps.splice(i, 1);
        }
      }
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(deltaTime);
        if (particles[i].life <= 0) {
          particles.splice(i, 1);
        }
      }
      // Update background stars
      backgroundStars.forEach(star => star.update(deltaTime));
      // Handle collisions
      handleCollisions();
      // Spawn enemies over time
      enemySpawnTimer += deltaTime;
      if (enemySpawnTimer > enemySpawnInterval) {
        spawnEnemy();
        enemySpawnTimer = 0;
        // Gradually decrease spawn interval to increase difficulty
        enemySpawnInterval = Math.max(500, enemySpawnInterval - 20);
      }
      // Spawn power-ups occasionally
      powerUpSpawnTimer += deltaTime;
      if (powerUpSpawnTimer > powerUpSpawnInterval) {
        spawnPowerUp();
        powerUpSpawnTimer = 0;
      }
    }

    // Render all game objects
    function renderGame() {
      // Clear the canvas with a slight transparent overlay for trails
      ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      // Draw background stars
      backgroundStars.forEach(star => star.draw(ctx));
      // Draw player
      player.draw(ctx);
      // Draw bullets
      bullets.forEach(bullet => bullet.draw(ctx));
      // Draw enemy bullets
      enemyBullets.forEach(bullet => bullet.draw(ctx));
      // Draw enemies
      enemies.forEach(enemy => enemy.draw(ctx));
      // Draw power-ups
      powerUps.forEach(powerUp => powerUp.draw(ctx));
      // Draw particles
      particles.forEach(particle => particle.draw(ctx));
      // Update UI elements
      document.getElementById("scoreDisplay").innerText = "Score: " + score;
      document.getElementById("livesDisplay").innerText = "Lives: " + lives;
    }

    /* ============================================================================
       6. Sound Management
       ============================================================================ */
    // (Sound objects are created above; additional sound management functions could be added here.)

    /* ============================================================================
       7. Main Game Loop and Initialization
       ============================================================================ */
    let animationId;
    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const deltaTime = timestamp - lastTime;
      lastTime = timestamp;
      if (!gameOver) {
        updateGame(deltaTime);
        renderGame();
        animationId = requestAnimationFrame(gameLoop);
      } else {
        cancelAnimationFrame(animationId);
        showRestartButton();
      }
    }
    requestAnimationFrame(gameLoop);

    /* ============================================================================
       8. Event Listeners and Restart Logic
       ============================================================================ */
    // Restart button click handler
    document.getElementById("restartButton").addEventListener("click", () => {
      restartGame();
    });

    function showRestartButton() {
      document.getElementById("restartButton").style.display = "block";
    }

    function hideRestartButton() {
      document.getElementById("restartButton").style.display = "none";
    }

    function restartGame() {
      // Reset global game variables
      gameOver = false;
      score = 0;
      lives = 3;
      currentWave = 1;
      enemySpawnTimer = 0;
      powerUpSpawnTimer = 0;
      gameTime = 0;
      enemySpawnInterval = 2000;
      // Clear arrays
      enemies.length = 0;
      bullets.length = 0;
      enemyBullets.length = 0;
      powerUps.length = 0;
      particles.length = 0;
      // Reset player
      player.x = canvasWidth / 2;
      player.y = canvasHeight - 100;
      player.morph("triangle");
      // Hide restart button
      hideRestartButton();
      // Restart game loop
      lastTime = 0;
      requestAnimationFrame(gameLoop);
    }
