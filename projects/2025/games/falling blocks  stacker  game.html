<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falling Blocks (Stacker) Game</title>
  <style>
    /* =====================================================
       Neon-Glowing Dark Theme Styles for Falling Blocks (Stacker)
       ===================================================== */

    html, body {
      margin: 0;
      padding: 0;
      background-color: #000;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      height: 100%;
      width: 100%;
    }

    /* Canvas style: fills the screen and shows a dark background */
    #gameCanvas {
      display: block;
      background-color: #111;
      margin: 0 auto;
    }

    /* Score counter styling */
    #scoreBoard {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #0ff;
      font-size: 24px;
      text-shadow: 0 0 10px #0ff;
      z-index: 10;
    }

    /* Restart button styling */
    #restartButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      font-size: 24px;
      background-color: #222;
      color: #0ff;
      border: none;
      border-radius: 10px;
      box-shadow: 0 0 20px #0ff;
      cursor: pointer;
      display: none;
      z-index: 10;
    }

    /* Responsive adjustments for small devices */
    @media (max-width: 600px) {
      #scoreBoard {
        font-size: 18px;
      }
      #restartButton {
        font-size: 18px;
        padding: 15px 30px;
      }
    }

    /* Extra spacing for readability in the CSS file */

</head>
<body>
  <!-- =====================================================
       Canvas element where the game is rendered
       ===================================================== -->
  <canvas id="gameCanvas"></canvas>

  <!-- =====================================================
       Score counter element
       ===================================================== -->
  <div id="scoreBoard">Score: 0</div>

  <!-- =====================================================
       Restart button (shown on game over)
       ===================================================== -->
  <button id="restartButton">Restart Game</button>

  <script>
    // =====================================================
    // Falling Blocks (Stacker) Game
    // Developed using HTML5 Canvas, CSS, and JavaScript.
    // This game features neon-glowing visuals, responsive design,
    // smooth animations, physics-based stacking, and increasing difficulty.
    // Press any key, click, or tap to drop the moving block.
    // =====================================================

    // -------------------------------
    // Global Variables and Constants
    // -------------------------------

    // Get a reference to the canvas element and its drawing context
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Get references to other DOM elements
    const scoreBoard = document.getElementById('scoreBoard');
    const restartButton = document.getElementById('restartButton');

    // Constants for game configuration
    const GRAVITY = 0.5;            // Gravity acceleration for falling blocks
    const BLOCK_HEIGHT = 30;        // Height of each block
    const INITIAL_SPEED = 4;        // Initial horizontal speed for moving block
    const SPEED_INCREMENT = 0.2;    // Increase in horizontal speed after each success
    const FALL_START_OFFSET = 200;  // Vertical offset to spawn the new block above the stack

    // Game state variables
    let stack = [];               // Array to hold blocks that have been successfully stacked
    let currentBlock = null;      // The block that is currently moving (and will fall on tap)
    let gameOver = false;         // Flag to indicate game over
    let score = 0;                // Score counter (number of stacked blocks)
    let currentSpeed = INITIAL_SPEED; // Current horizontal speed (increases with each block)
    let scrollOffset = 0;         // Vertical offset for camera scrolling (if needed)

    // Flag to indicate if the collapse (game-over animation) is active
    let collapsing = false;

    // -------------------------------
    // Utility Functions for the Game
    // -------------------------------

    // Resize the canvas to fill the browser window
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    // Update the score display on the screen
    function updateScore() {
      scoreBoard.textContent = "Score: " + score;
    }

    // Initialize game state and variables for a new game
    function initGame() {
      // Reset game state variables
      stack = [];
      score = 0;
      gameOver = false;
      collapsing = false;
      currentSpeed = INITIAL_SPEED;
      scrollOffset = 0;
      updateScore();

      // Hide the restart button when starting/restarting the game
      restartButton.style.display = "none";

      // Create the base block (the starting block) at the bottom center
      let baseWidth = canvas.width * 0.6;
      let baseX = (canvas.width - baseWidth) / 2;
      let baseY = canvas.height - BLOCK_HEIGHT - 20; // 20px margin from the bottom

      // Base block object with all necessary properties
      let baseBlock = {
        x: baseX,
        y: baseY,
        width: baseWidth,
        height: BLOCK_HEIGHT,
        horizontalSpeed: 0,
        direction: 0,
        falling: false,
        verticalVelocity: 0,
        angle: 0,
        angularVelocity: 0
      };

      // Add the base block to the stack array
      stack.push(baseBlock);

      // Spawn the first moving block
      spawnNewBlock();
    }

    // Spawn a new block that will move horizontally and then fall on tap/key press
    function spawnNewBlock() {
      // Get the last block in the stack (the top block)
      let previousBlock = stack[stack.length - 1];

      // Randomly choose a horizontal direction: right (1) or left (-1)
      let dir = Math.random() > 0.5 ? 1 : -1;

      // Set initial x position based on chosen direction
      let initX = (dir === 1) ? 0 : canvas.width - previousBlock.width;

      // Create a new block object
      currentBlock = {
        x: initX,
        y: previousBlock.y - FALL_START_OFFSET, // Spawn above the previous block
        width: previousBlock.width,             // Begin with the same width as previous block
        height: BLOCK_HEIGHT,
        horizontalSpeed: currentSpeed,
        direction: dir,
        falling: false,
        verticalVelocity: 0,
        angle: 0,
        angularVelocity: 0
      };
    }

    // Trigger the collapse animation when the stack becomes unstable (game over)
    function initiateCollapse() {
      collapsing = true; // Set the collapse flag

      // Apply falling physics and a slight rotation to each block in the stack
      for (let i = 0; i < stack.length; i++) {
        let block = stack[i];
        block.falling = true;
        block.verticalVelocity = Math.random() * 5 + 2;
        block.angularVelocity = (Math.random() - 0.5) * 0.1;
        block.angle = 0;
      }

      // Also apply the falling effect to the current block (if it wasn’t already added)
      if (currentBlock && !currentBlock.falling) {
        currentBlock.falling = true;
        currentBlock.verticalVelocity = Math.random() * 5 + 2;
        currentBlock.angularVelocity = (Math.random() - 0.5) * 0.1;
        currentBlock.angle = 0;
        // Add the current block to the stack
        stack.push(currentBlock);
      }
    }

    // -------------------------------
    // Game Loop: Update and Render
    // -------------------------------

    // The main game loop using requestAnimationFrame for smooth animations
    function gameLoop() {
      update();
      render();

      // Continue the loop if the game is active or if collapse animation is in progress
      if (!gameOver || collapsing) {
        requestAnimationFrame(gameLoop);
      }
    }

    // Update the game state each frame
    function update() {
      // If game over and collapsing animation is active, update the collapse physics
      if (gameOver && collapsing) {
        updateCollapse();
        return;
      }

      // If there is an active current block, update its position
      if (currentBlock) {
        // If the block is still moving horizontally (waiting for player input)
        if (!currentBlock.falling) {
          // Update the horizontal position based on speed and direction
          currentBlock.x += currentBlock.horizontalSpeed * currentBlock.direction;

          // Reverse direction if the block hits the edges of the canvas
          if (currentBlock.x <= 0) {
            currentBlock.x = 0;
            currentBlock.direction = 1;
          } else if (currentBlock.x + currentBlock.width >= canvas.width) {
            currentBlock.x = canvas.width - currentBlock.width;
            currentBlock.direction = -1;
          }
        } else {
          // The block is in falling state: apply gravity to its vertical movement
          currentBlock.verticalVelocity += GRAVITY;
          currentBlock.y += currentBlock.verticalVelocity;

          // Get the block on top of which the current block should land
          let previousBlock = stack[stack.length - 1];

          // When the falling block reaches (or passes) the previous block’s top, snap it in place
          if (currentBlock.y + currentBlock.height >= previousBlock.y) {
            currentBlock.y = previousBlock.y - currentBlock.height;

            // Calculate the overlapping region between the current block and the previous block
            let overlapLeft = Math.max(currentBlock.x, previousBlock.x);
            let overlapRight = Math.min(currentBlock.x + currentBlock.width, previousBlock.x + previousBlock.width);
            let overlapWidth = overlapRight - overlapLeft;

            // If there is no overlap, the stack becomes unstable (game over)
            if (overlapWidth <= 0) {
              gameOver = true;
              initiateCollapse();
              // Show the restart button after a short delay so the collapse is visible
              setTimeout(() => {
                restartButton.style.display = "block";
              }, 1500);
            } else {
              // Adjust the block to only include the overlapping section
              currentBlock.x = overlapLeft;
              currentBlock.width = overlapWidth;

              // Add the current block to the stack as a successful placement
              stack.push(currentBlock);

              // Increment the score and update the display
              score++;
              updateScore();

              // Increase the horizontal speed for the next block (increasing difficulty)
              currentSpeed += SPEED_INCREMENT;

              // Adjust the scroll offset so that the stack remains visible if it grows too high
              if (currentBlock.y < canvas.height / 3) {
                scrollOffset = canvas.height / 3 - currentBlock.y;
              }

              // Spawn a new block for the next round
              spawnNewBlock();
            }
          }
        }
      }
    }

    // Update the falling physics and rotation for each block during the collapse animation
    function updateCollapse() {
      for (let i = 0; i < stack.length; i++) {
        let block = stack[i];
        if (block.falling) {
          // Apply gravity to the block’s vertical velocity (using a reduced gravity factor)
          block.verticalVelocity += GRAVITY * 0.2;
          block.y += block.verticalVelocity;

          // Update the block’s rotation angle for a tumbling effect
          block.angle += block.angularVelocity;
        }
      }
    }

    // Render the game scene on the canvas
    function render() {
      // Clear the canvas with a dark background
      ctx.fillStyle = "#111";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Save the current context state and apply vertical scrolling
      ctx.save();
      ctx.translate(0, scrollOffset);

      // Draw all the blocks that have been stacked
      for (let i = 0; i < stack.length; i++) {
        drawBlock(stack[i]);
      }

      // Draw the current moving (or falling) block if it hasn’t been added to the stack yet
      if (currentBlock && !stack.includes(currentBlock)) {
        drawBlock(currentBlock);
      }

      // Restore the context state after drawing the blocks
      ctx.restore();

      // If the game is over and not in collapse mode, display "GAME OVER" text with neon glow
      if (gameOver && !collapsing) {
        ctx.fillStyle = "#0ff";
        ctx.font = "48px Courier New";
        ctx.textAlign = "center";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#0ff";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
      }
    }

    // Draw a single block on the canvas with neon glow effects and optional rotation
    function drawBlock(block) {
      ctx.save();

      // If the block has a rotation angle, apply rotation around its center
      if (block.angle !== 0) {
        ctx.translate(block.x + block.width / 2, block.y + block.height / 2);
        ctx.rotate(block.angle);
        ctx.translate(- (block.x + block.width / 2), - (block.y + block.height / 2));
      }

      // Set neon glow properties for the block
      ctx.shadowBlur = 20;
      ctx.shadowColor = "#0ff";
      ctx.fillStyle = "#00ffff";

      // Draw the block as a filled rectangle
      ctx.fillRect(block.x, block.y, block.width, block.height);

      // Optionally, draw a neon border around the block
      ctx.lineWidth = 2;
      ctx.strokeStyle = "#0ff";
      ctx.strokeRect(block.x, block.y, block.width, block.height);

      ctx.restore();
    }

    // ------------------------------------
    // Event Listeners for Player Interaction
    // ------------------------------------

    // Listen for keyboard events (any key press drops the block)
    document.addEventListener('keydown', function(e) {
      if (!gameOver && currentBlock && !currentBlock.falling) {
        currentBlock.falling = true;
      }
    });

    // Listen for mouse clicks
    document.addEventListener('click', function(e) {
      if (!gameOver && currentBlock && !currentBlock.falling) {
        currentBlock.falling = true;
      }
    });

    // Listen for touch events for mobile devices
    document.addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (!gameOver && currentBlock && !currentBlock.falling) {
        currentBlock.falling = true;
      }
    }, {passive: false});

    // Restart button event: restart the game when clicked
    restartButton.addEventListener('click', function() {
      initGame();
      requestAnimationFrame(gameLoop);
    });

    // ------------------------------------
    // Additional Helper Functions and Features
    // ------------------------------------

    // Start the game: resize canvas, initialize game state, and begin the loop
    function startGame() {
      resizeCanvas();
      initGame();
      requestAnimationFrame(gameLoop);
    }

    // Listen for window resize events and adjust the canvas size accordingly
    window.addEventListener('resize', function() {
      resizeCanvas();
    });

    // ------------------------------------
    // Debug Helper: Log Game State (Optional)
    // ------------------------------------
    function debugGameState() {
      console.clear();
      console.log("Score:", score);
      console.log("Current Speed:", currentSpeed.toFixed(2));
      console.log("Stack Length:", stack.length);
      if (currentBlock) {
        console.log("Current Block:", currentBlock);
      }
    }
    // Uncomment the next line to log game state every 2 seconds for debugging
    // setInterval(debugGameState, 2000);

    // ------------------------------------
    // Utility: Generate Random Neon Colors (for future theme changes)
    // ------------------------------------
    function getRandomNeonColor() {
      const neonColors = ['#0ff', '#ff0', '#f0f', '#0f0', '#ff1493', '#00ffff'];
      return neonColors[Math.floor(Math.random() * neonColors.length)];
    }

    // ------------------------------------
    // Future Feature: Animated Background Elements
    // ------------------------------------
    function drawBackground() {
      // This function can be used to draw animated neon lines or particles in the background.
      // For now, it is not used.
    }

    // ------------------------------------
    // Start the Game When the Page Loads
    // ------------------------------------
    window.onload = function() {
      startGame();
    };
