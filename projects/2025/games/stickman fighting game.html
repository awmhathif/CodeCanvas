<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stickman Fighting Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ======================================================
       Basic Reset & Global Styles
    ====================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #222;
      color: #fff;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }
    /* ======================================================
       Game Container & Canvas
    ====================================================== */
    #gameContainer {
      position: relative;
      width: 800px;
      height: 600px;
      margin: 20px auto;
      border: 2px solid #fff;
      background: #333;
    }
    #gameCanvas {
      display: block;
      background: linear-gradient(to bottom, #444, #222);
    }
    /* ======================================================
       UI Styles
    ====================================================== */
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }
    #ui button {
      padding: 10px 20px;
      margin-right: 10px;
      margin-bottom: 5px;
      background: #555;
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    #ui button:hover {
      background: #777;
    }
    #ui .display {
      margin-top: 5px;
      font-size: 18px;
    }
    /* ======================================================
       Message Overlay (Game Over, etc.)
    ====================================================== */
    #messageOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 20;
      display: none;
    }
    #messageOverlay h1 {
      color: #fff;
      font-size: 48px;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui">
      <button id="startButton">Start Game</button>
      <button id="fightButton" disabled>Fight</button>
      <button id="webButton" disabled>Web Attack</button>
      <div class="display" id="comboDisplay">Combo: None</div>
      <div class="display" id="scoreDisplay">Score: 0</div>
      <div class="display" id="healthDisplay">Health: 100</div>
    </div>
    <div id="messageOverlay">
      <h1 id="messageText">Game Over</h1>
    </div>
  </div>

  <script>
    /**************************************************************
     * Stickman Fighting Game
     * 
     * Features:
     * - Simple UI with Start, Fight, and Web Attack buttons.
     * - Main character (player) drawn in black.
     * - Enemies (stickmen) in various colors.
     * - Movement using arrow keys.
     * - Combo detection using keys (a, s, d, f, g).
     * - Melee attacks and Spider-Man–like web projectiles.
     * - Blood effects when characters are hit.
     * - Extra features such as slow motion on combo activation.
     *
     * This file contains over 500 lines of code (including comments)
     * to implement a rich stickman fighting game experience.
     **************************************************************/

    // ======================================================
    // Global Variables and Constants
    // ======================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI Elements
    const startButton = document.getElementById('startButton');
    const fightButton = document.getElementById('fightButton');
    const webButton = document.getElementById('webButton');
    const comboDisplay = document.getElementById('comboDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const healthDisplay = document.getElementById('healthDisplay');
    const messageOverlay = document.getElementById('messageOverlay');
    const messageText = document.getElementById('messageText');

    // Game state variables
    let gameRunning = false;
    let gameOver = false;
    let score = 0;
    let playerHealth = 100;
    let comboSequence = [];
    let currentCombo = "None";

    // Timing variables
    let lastFrameTime = 0;
    let deltaTime = 0;

    // Game Entities Arrays
    let player = null;
    let enemies = [];
    let webs = [];
    let bloodParticles = [];

    // Keyboard Input State
    let keysDown = {};

    // Gameplay constants
    const PLAYER_SPEED = 200;       // pixels per second
    const ENEMY_SPEED = 100;        // enemy movement speed
    const MAX_ENEMIES = 5;          // maximum simultaneous enemies
    const ENEMY_SPAWN_INTERVAL = 3000; // in milliseconds
    const WEB_SPEED = 400;          // speed of web projectile
    const BLOOD_LIFETIME = 1000;    // blood particle lifetime in ms

    // Combo definitions (simple sequences)
    const combos = {
      'a,s,d': 'Triple Strike',
      's,d,f': 'Spin Kick',
      'd,f,g': 'Uppercut'
    };

    // ======================================================
    // Utility Functions
    // ======================================================
    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function distance(x1, y1, x2, y2) {
      return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
    }

    // ======================================================
    // Class Definitions
    // ======================================================

    // ---- Stickman Class (for both player and enemy) ----
    class Stickman {
      constructor(x, y, color, isPlayer = false) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.isPlayer = isPlayer;
        this.width = 20;
        this.height = 50;
        this.facing = 1; // 1 for right, -1 for left
        this.attackCooldown = 0;
        this.combo = [];
        this.state = 'idle'; // states: idle, moving, attacking, hit
        this.attackTimer = 0;
      }

      update(dt) {
        if (this.attackCooldown > 0) {
          this.attackCooldown -= dt;
        }
        if (this.attackTimer > 0) {
          this.attackTimer -= dt;
          if (this.attackTimer <= 0 && this.state === 'attacking') {
            this.state = 'idle';
          }
        }
      }

      // Draw the stickman figure
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.facing, 1);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;

        // Draw head
        ctx.beginPath();
        ctx.arc(0, -40, 10, 0, Math.PI * 2);
        ctx.stroke();

        // Draw body
        ctx.beginPath();
        ctx.moveTo(0, -30);
        ctx.lineTo(0, 10);
        ctx.stroke();

        // Draw arms
        if (this.state === 'attacking') {
          // Attacking: arms extended
          ctx.beginPath();
          ctx.moveTo(0, -20);
          ctx.lineTo(20, -20);
          ctx.stroke();
        } else {
          // Idle: arms relaxed
          ctx.beginPath();
          ctx.moveTo(0, -20);
          ctx.lineTo(10, -10);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, -20);
          ctx.lineTo(-10, -10);
          ctx.stroke();
        }

        // Draw legs
        ctx.beginPath();
        ctx.moveTo(0, 10);
        ctx.lineTo(10, 30);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, 10);
        ctx.lineTo(-10, 30);
        ctx.stroke();

        ctx.restore();
      }
    }

    // ---- Web Projectile Class (Spider-Man–like web) ----
    class WebProjectile {
      constructor(x, y, targetX, targetY) {
        this.x = x;
        this.y = y;
        this.startX = x;
        this.startY = y;
        this.targetX = targetX;
        this.targetY = targetY;
        let angle = Math.atan2(targetY - y, targetX - x);
        this.vx = Math.cos(angle) * WEB_SPEED;
        this.vy = Math.sin(angle) * WEB_SPEED;
        this.active = true;
      }

      update(dt) {
        if (!this.active) return;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        // Deactivate if off screen
        if (
          this.x < 0 ||
          this.x > canvas.width ||
          this.y < 0 ||
          this.y > canvas.height
        ) {
          this.active = false;
        }
      }

      draw(ctx) {
        if (!this.active) return;
        ctx.save();
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.startX, this.startY);
        ctx.lineTo(this.x, this.y);
        ctx.stroke();
        ctx.restore();
      }
    }

    // ---- Blood Particle Class (for blood effects) ----
    class BloodParticle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 200;
        this.vy = (Math.random() - 0.5) * 200;
        this.alpha = 1;
        this.life = BLOOD_LIFETIME;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt * 1000;
        this.alpha = this.life / BLOOD_LIFETIME;
      }

      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ======================================================
    // Game Initialization and Setup Functions
    // ======================================================
    function initGame() {
      // Reset game state variables
      gameRunning = false;
      gameOver = false;
      score = 0;
      playerHealth = 100;
      comboSequence = [];
      currentCombo = "None";
      enemies = [];
      webs = [];
      bloodParticles = [];
      // Create player stickman (in black)
      player = new Stickman(400, 500, '#000', true);
      // Enable UI buttons
      fightButton.disabled = false;
      webButton.disabled = false;
      comboDisplay.innerText = "Combo: " + currentCombo;
      scoreDisplay.innerText = "Score: " + score;
      healthDisplay.innerText = "Health: " + playerHealth;
      messageOverlay.style.display = 'none';
      enemySpawnTimer = 0;
    }

    // ======================================================
    // Enemy Spawning Functions
    // ======================================================
    let enemySpawnTimer = 0;
    function spawnEnemy() {
      // Spawn enemy at a random horizontal position near the top
      let x = getRandomInt(50, canvas.width - 50);
      let y = 50;
      // Choose a random color for the enemy stickman
      let colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff'];
      let color = colors[getRandomInt(0, colors.length - 1)];
      let enemy = new Stickman(x, y, color, false);
      enemy.facing = (player.x < x) ? -1 : 1;
      enemies.push(enemy);
    }

    // ======================================================
    // Input Handling
    // ======================================================
    window.addEventListener('keydown', function(e) {
      keysDown[e.key] = true;

      // Check for combo keys (a, s, d, f, g)
      if (['a', 's', 'd', 'f', 'g'].includes(e.key)) {
        comboSequence.push(e.key);
        checkCombo();
      }
    });

    window.addEventListener('keyup', function(e) {
      delete keysDown[e.key];
    });

    // ======================================================
    // Combo Sequence Checking
    // ======================================================
    function checkCombo() {
      // Consider only the last three keys
      let seq = comboSequence.slice(-3).join(',');
      if (combos[seq]) {
        currentCombo = combos[seq];
        comboDisplay.innerText = "Combo: " + currentCombo;
        // Reset the combo sequence upon a successful combo
        comboSequence = [];
      } else {
        currentCombo = "None";
        comboDisplay.innerText = "Combo: " + currentCombo;
      }
    }

    // ======================================================
    // Player Movement and Action Update
    // ======================================================
    function updatePlayer(dt) {
      // Movement via arrow keys
      let dx = 0;
      let dy = 0;
      if (keysDown['ArrowLeft']) {
        dx = -PLAYER_SPEED * dt;
        player.facing = -1;
      }
      if (keysDown['ArrowRight']) {
        dx = PLAYER_SPEED * dt;
        player.facing = 1;
      }
      if (keysDown['ArrowUp']) {
        dy = -PLAYER_SPEED * dt;
      }
      if (keysDown['ArrowDown']) {
        dy = PLAYER_SPEED * dt;
      }
      player.x += dx;
      player.y += dy;

      // Keep player within canvas bounds
      player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
      player.y = Math.max(50, Math.min(canvas.height - 20, player.y));

      player.update(dt);
    }

    // ======================================================
    // Update Enemies
    // ======================================================
    function updateEnemies(dt) {
      for (let enemy of enemies) {
        // Move enemy towards player
        let angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        enemy.x += Math.cos(angle) * ENEMY_SPEED * dt;
        enemy.y += Math.sin(angle) * ENEMY_SPEED * dt;
        enemy.facing = (player.x < enemy.x) ? -1 : 1;
        enemy.update(dt);

        // Check for melee collision with player
        if (distance(enemy.x, enemy.y, player.x, player.y) < 30 && enemy.attackCooldown <= 0) {
          // Enemy attacks the player
          enemy.state = 'attacking';
          enemy.attackTimer = 0.3;
          enemy.attackCooldown = 1.0;
          // Reduce player's health
          playerHealth -= 10;
          healthDisplay.innerText = "Health: " + playerHealth;
          spawnBlood(player.x, player.y);
          // End game if health drops to zero
          if (playerHealth <= 0) {
            endGame();
          }
        }
      }
      // Remove enemies that stray too far off-screen
      enemies = enemies.filter(enemy => enemy.x >= -50 && enemy.x <= canvas.width + 50 && enemy.y >= -50 && enemy.y <= canvas.height + 50);
    }

    // ======================================================
    // Update Web Projectiles
    // ======================================================
    function updateWebs(dt) {
      for (let web of webs) {
        web.update(dt);
        // Check collision with each enemy
        for (let enemy of enemies) {
          if (web.active && distance(web.x, web.y, enemy.x, enemy.y) < 20) {
            // Web hits enemy: score points and create blood effect
            score += 20;
            scoreDisplay.innerText = "Score: " + score;
            enemy.state = 'hit';
            spawnBlood(enemy.x, enemy.y);
            web.active = false;
          }
        }
      }
      // Remove inactive web projectiles
      webs = webs.filter(web => web.active);
    }

    // ======================================================
    // Update Blood Particles
    // ======================================================
    function updateBlood(dt) {
      for (let particle of bloodParticles) {
        particle.update(dt);
      }
      bloodParticles = bloodParticles.filter(p => p.life > 0);
    }

    // ======================================================
    // Spawn Blood Effect at (x, y)
    // ======================================================
    function spawnBlood(x, y) {
      for (let i = 0; i < 10; i++) {
        bloodParticles.push(new BloodParticle(x, y));
      }
    }

    // ======================================================
    // Handle Melee Fight Action
    // ======================================================
    function handleFight() {
      if (player.attackCooldown > 0) return;
      player.state = 'attacking';
      player.attackTimer = 0.3;
      player.attackCooldown = 0.5;
      // Check for enemies within melee range
      for (let enemy of enemies) {
        if (distance(player.x, player.y, enemy.x, enemy.y) < 30) {
          enemy.state = 'hit';
          score += 10;
          scoreDisplay.innerText = "Score: " + score;
          spawnBlood(enemy.x, enemy.y);
        }
      }
      // If a combo is active, grant extra effects
      if (currentCombo !== "None") {
        score += 20;
        scoreDisplay.innerText = "Score: " + score;
        currentCombo = "None";
        comboDisplay.innerText = "Combo: None";
      }
    }

    // ======================================================
    // Handle Web Attack Action
    // ======================================================
    function handleWebAttack() {
      // Create a web projectile shooting forward from the player
      let targetX = player.x + (player.facing * 100);
      let targetY = player.y - 50;
      let web = new WebProjectile(player.x, player.y, targetX, targetY);
      webs.push(web);
    }

    // ======================================================
    // End Game Function
    // ======================================================
    function endGame() {
      gameOver = true;
      gameRunning = false;
      messageText.innerText = "Game Over!";
      messageOverlay.style.display = 'flex';
      fightButton.disabled = true;
      webButton.disabled = true;
    }

    // ======================================================
    // Extra Feature: Slow Motion on Combo Activation
    // ======================================================
    let slowMotion = false;
    function updateSlowMotion(dt) {
      if (currentCombo === 'Triple Strike' && !slowMotion) {
        slowMotion = true;
        let originalEnemySpeed = ENEMY_SPEED;
        let slowedSpeed = ENEMY_SPEED / 2;
        // Temporarily slow enemy movement
        ENEMY_SPEED = slowedSpeed;
        setTimeout(() => {
          ENEMY_SPEED = originalEnemySpeed;
          slowMotion = false;
        }, 2000);
      }
    }

    // ======================================================
    // Extra Feature: Draw Combo Effect Text
    // ======================================================
    function drawComboEffect() {
      if (currentCombo !== "None") {
        ctx.save();
        ctx.font = "30px Arial";
        ctx.fillStyle = "yellow";
        ctx.fillText(currentCombo, player.x - 50, player.y - 60);
        ctx.restore();
      }
    }

    // ======================================================
    // Draw Background Function (Simple Gradient)
    // ======================================================
    function drawBackground() {
      let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#333');
      gradient.addColorStop(1, '#111');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // ======================================================
    // Main Game Loop
    // ======================================================
    function gameLoop(timestamp) {
      if (!lastFrameTime) lastFrameTime = timestamp;
      deltaTime = (timestamp - lastFrameTime) / 1000;
      lastFrameTime = timestamp;

      if (gameRunning) {
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Update game entities
        updatePlayer(deltaTime);
        enemySpawnTimer += deltaTime * 1000;
        if (enemySpawnTimer > ENEMY_SPAWN_INTERVAL && enemies.length < MAX_ENEMIES) {
          spawnEnemy();
          enemySpawnTimer = 0;
        }
        updateEnemies(deltaTime);
        updateWebs(deltaTime);
        updateBlood(deltaTime);
        updateSlowMotion(deltaTime);

        // Draw all game elements
        drawBackground();
        player.draw(ctx);
        for (let enemy of enemies) {
          enemy.draw(ctx);
        }
        for (let web of webs) {
          web.draw(ctx);
        }
        for (let particle of bloodParticles) {
          particle.draw(ctx);
        }
        drawComboEffect();
      }

      if (gameRunning || gameOver) {
        requestAnimationFrame(gameLoop);
      }
    }

    // ======================================================
    // UI Button Event Listeners
    // ======================================================
    startButton.addEventListener('click', function() {
      initGame();
      gameRunning = true;
      lastFrameTime = 0;
      requestAnimationFrame(gameLoop);
    });

    fightButton.addEventListener('click', function() {
      handleFight();
    });

    webButton.addEventListener('click', function() {
      handleWebAttack();
    });

    // ======================================================
    // Additional Keyboard Shortcuts
    // ======================================================
    window.addEventListener('keydown', function(e) {
      // Spacebar triggers fight action
      if (e.key === ' ') {
        handleFight();
      }
      // 'q' key triggers web attack
      if (e.key === 'q') {
        handleWebAttack();
      }
    });
