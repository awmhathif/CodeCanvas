<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Cyber Runner</title>
  <style>
    /* ==========================================================
       CSS Code Start – Futuristic Neon Cyberpunk Style
       ========================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }
    #gameCanvas {
      display: block;
      background: #111;
    }
    #scoreBoard {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #0ff;
      font-size: 24px;
      text-shadow: 0 0 5px #0ff;
      z-index: 2;
    }
    #gameOverScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #0ff;
      display: none;
      z-index: 3;
    }
    #gameOverScreen h1 {
      font-size: 48px;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      margin-bottom: 20px;
    }
    #restartButton {
      font-size: 24px;
      padding: 10px 20px;
      background: #111;
      border: 2px solid #0ff;
      color: #0ff;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #restartButton:hover {
      background: #0ff;
      color: #111;
    }
    /* ==========================================================
       CSS Code End
       ========================================================== */
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="scoreBoard">Score: 0</div>
  <div id="gameOverScreen">
    <h1>Game Over</h1>
    <button id="restartButton">Restart</button>
  </div>
  <script>
    // ==========================================================
    // JavaScript Code Start – Neon Cyber Runner Game
    // ==========================================================

    // Set up the canvas and context
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let canvasWidth = window.innerWidth;
    let canvasHeight = window.innerHeight;
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;

    // Global Game Variables
    let gameSpeed = 5;
    let gravity = 0.6;
    let score = 0;
    let gameOver = false;
    let lastTime = 0;
    let obstacleTimer = 0;
    let obstacleInterval = 1500; // milliseconds
    let coinTimer = 0;
    let coinInterval = 1000; // milliseconds

    // DOM Elements for UI
    const scoreBoard = document.getElementById('scoreBoard');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const restartButton = document.getElementById('restartButton');

    // Responsive canvas resize
    window.addEventListener('resize', function () {
      canvasWidth = window.innerWidth;
      canvasHeight = window.innerHeight;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
      // (Redraw background layers automatically on next frame)
    });

    // Utility function for rectangle collision detection
    function isColliding(rect1, rect2) {
      return !(rect2.x > rect1.x + rect1.width ||
               rect2.x + rect2.width < rect1.x ||
               rect2.y > rect1.y + rect1.height ||
               rect2.y + rect2.height < rect1.y);
    }

    // ================================
    // Player Class
    // ================================
    class Player {
      constructor() {
        this.width = 50;
        this.height = 80;
        this.x = 50;
        this.y = canvasHeight - this.height - 30; // ground level offset
        this.dy = 0;
        this.jumpForce = 15;
        this.originalHeight = this.height;
        this.grounded = false;
        this.jumpTimer = 0;
        this.color = '#0ff';
      }

      animate() {
        // If the spacebar (or touch) is pressed, call jump
        if (keys['Space'] || keys['Touch']) {
          this.jump();
        } else {
          this.jumpTimer = 0;
        }

        // Apply vertical speed and gravity
        this.y += this.dy;
        if (this.y + this.height < canvasHeight - 30) {
          this.dy += gravity;
          this.grounded = false;
        } else {
          this.dy = 0;
          this.grounded = true;
          this.y = canvasHeight - this.height - 30;
        }
        this.draw();
      }

      jump() {
        if (this.grounded && this.jumpTimer === 0) {
          this.jumpTimer = 1;
          this.dy = -this.jumpForce;
        } else if (this.jumpTimer > 0 && this.jumpTimer < 15) {
          this.jumpTimer++;
          this.dy = -this.jumpForce - (this.jumpTimer / 50);
        }
      }

      draw() {
        ctx.save();
        // Neon glow effect for the player
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.restore();
      }
    }

    // ================================
    // Obstacle Class
    // ================================
    class Obstacle {
      constructor() {
        this.width = 50 + Math.random() * 50;
        this.height = 50 + Math.random() * 50;
        this.x = canvasWidth;
        this.y = canvasHeight - this.height - 30;
        this.color = '#f0f';
        this.speed = gameSpeed;
      }

      update(deltaTime) {
        this.x -= this.speed;
        this.draw();
      }

      draw() {
        ctx.save();
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.restore();
      }
    }

    // ================================
    // Coin Class
    // ================================
    class Coin {
      constructor() {
        this.radius = 15;
        this.x = canvasWidth;
        // Randomize vertical position (above the ground)
        this.y = canvasHeight - this.radius - 30 - Math.random() * 150;
        this.color = '#ff0';
        this.speed = gameSpeed;
        this.collected = false;
      }

      update(deltaTime) {
        this.x -= this.speed;
        this.draw();
      }

      draw() {
        ctx.save();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.closePath();
        ctx.restore();
      }
    }

    // ================================
    // Background Layer Class for Parallax Scrolling
    // ================================
    class BackgroundLayer {
      constructor(image, speedModifier) {
        this.image = image;
        this.speedModifier = speedModifier;
        this.x = 0;
        this.y = 0;
        this.width = canvasWidth;
        this.height = canvasHeight;
      }

      update() {
        this.x -= gameSpeed * this.speedModifier;
        if (this.x <= -this.width) {
          this.x = 0;
        }
        this.draw();
        this.drawSecond();
      }

      draw() {
        ctx.save();
        ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
        ctx.restore();
      }

      drawSecond() {
        ctx.save();
        ctx.drawImage(this.image, this.x + this.width, this.y, this.width, this.height);
        ctx.restore();
      }
    }

    // ================================
    // Create Background Layers (Futuristic Cityscape)
    // ================================
    function createBackgroundLayer(color, speedModifier) {
      let bgCanvas = document.createElement('canvas');
      bgCanvas.width = canvasWidth;
      bgCanvas.height = canvasHeight;
      let bgCtx = bgCanvas.getContext('2d');

      // Draw a futuristic cityscape silhouette with random buildings
      bgCtx.fillStyle = color;
      for (let i = 0; i < 50; i++) {
        let buildingWidth = 20 + Math.random() * 50;
        let buildingHeight = 50 + Math.random() * (canvasHeight / 2);
        let x = Math.random() * canvasWidth;
        let y = canvasHeight - buildingHeight - 30;
        bgCtx.fillRect(x, y, buildingWidth, buildingHeight);
      }
      return new BackgroundLayer(bgCanvas, speedModifier);
    }

    // Initialize background layers (three layers for a parallax effect)
    let backgroundLayers = [];
    backgroundLayers.push(createBackgroundLayer('rgba(0, 255, 255, 0.1)', 0.2)); // far layer
    backgroundLayers.push(createBackgroundLayer('rgba(255, 0, 255, 0.2)', 0.4));   // mid layer
    backgroundLayers.push(createBackgroundLayer('rgba(255, 255, 0, 0.3)', 0.6));   // near layer

    // ================================
    // Instantiate Player, Obstacles, and Coins
    // ================================
    let player = new Player();
    let obstacles = [];
    let coins = [];

    // ================================
    // Input Handling (Keyboard and Touch)
    // ================================
    const keys = {};
    window.addEventListener('keydown', function (e) {
      if (e.code === 'Space') {
        keys['Space'] = true;
      }
    });
    window.addEventListener('keyup', function (e) {
      if (e.code === 'Space') {
        keys['Space'] = false;
      }
    });
    // Touch controls for mobile devices
    window.addEventListener('touchstart', function (e) {
      keys['Touch'] = true;
    });
    window.addEventListener('touchend', function (e) {
      keys['Touch'] = false;
    });

    // ================================
    // Main Game Loop (Using requestAnimationFrame)
    // ================================
    function animate(timestamp) {
      if (!lastTime) lastTime = timestamp;
      let deltaTime = timestamp - lastTime;
      lastTime = timestamp;

      ctx.clearRect(0, 0, canvasWidth, canvasHeight);

      // Update and draw background layers
      backgroundLayers.forEach(layer => {
        layer.update();
      });

      // Increase score over time
      score += deltaTime * 0.01;
      scoreBoard.innerText = 'Score: ' + Math.floor(score);

      // Animate the player
      player.animate();

      // Handle obstacles: spawn new obstacles at regular intervals
      obstacleTimer += deltaTime;
      if (obstacleTimer > obstacleInterval) {
        obstacles.push(new Obstacle());
        obstacleTimer = 0;
      }
      obstacles.forEach((obstacle, index) => {
        obstacle.update(deltaTime);
        // Check collision with the player
        if (isColliding(
            { x: player.x, y: player.y, width: player.width, height: player.height },
            { x: obstacle.x, y: obstacle.y, width: obstacle.width, height: obstacle.height }
          )) {
          gameOver = true;
        }
        // Remove obstacles that have moved off-screen
        if (obstacle.x + obstacle.width < 0) {
          obstacles.splice(index, 1);
        }
      });

      // Handle coins: spawn new coins at regular intervals
      coinTimer += deltaTime;
      if (coinTimer > coinInterval) {
        coins.push(new Coin());
        coinTimer = 0;
      }
      coins.forEach((coin, index) => {
        coin.update(deltaTime);
        // Simple collision detection for coin collection
        let distX = Math.abs(coin.x - (player.x + player.width / 2));
        let distY = Math.abs(coin.y - (player.y + player.height / 2));
        if (distX <= (player.width / 2 + coin.radius) && distY <= (player.height / 2 + coin.radius)) {
          score += 10;
          coins.splice(index, 1);
        }
        // Remove coins that have moved off-screen
        if (coin.x + coin.radius < 0) {
          coins.splice(index, 1);
        }
      });

      // If game is not over, request the next frame; otherwise show the Game Over screen.
      if (!gameOver) {
        requestAnimationFrame(animate);
      } else {
        showGameOver();
      }
    }

    // ================================
    // Show Game Over Screen
    // ================================
    function showGameOver() {
      gameOverScreen.style.display = 'block';
    }

    // ================================
    // Reset Game Function – Called on Restart
    // ================================
    function resetGame() {
      gameOver = false;
      score = 0;
      obstacles = [];
      coins = [];
      player = new Player();
      lastTime = 0;
      obstacleTimer = 0;
      coinTimer = 0;
      gameOverScreen.style.display = 'none';
      animate(0);
    }
    restartButton.addEventListener('click', function () {
      resetGame();
    });

    // Start the game with the basic animation loop
    animate(0);

    // ================================
    // Additional Neon Effects and Utilities
    // ================================

    // Function to draw neon text (can be used for debug or additional UI effects)
    function drawNeonText(text, x, y, color, fontSize) {
      ctx.save();
      ctx.font = fontSize + 'px Courier New';
      ctx.fillStyle = color;
      ctx.shadowBlur = 20;
      ctx.shadowColor = color;
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    // Function to draw a futuristic grid on the ground
    function drawFuturisticGrid() {
      ctx.save();
      ctx.strokeStyle = 'rgba(0,255,255,0.2)';
      ctx.lineWidth = 2;
      ctx.shadowBlur = 10;
      ctx.shadowColor = 'rgba(0,255,255,0.5)';
      let gridSize = 50;
      for (let i = 0; i < canvasWidth; i += gridSize) {
        ctx.beginPath();
        ctx.moveTo(i, canvasHeight - 30);
        ctx.lineTo(i, canvasHeight);
        ctx.stroke();
      }
      for (let j = canvasHeight - 30; j < canvasHeight; j += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(canvasWidth, j);
        ctx.stroke();
      }
      ctx.restore();
    }

    // An alternative animation loop that also draws the futuristic grid
    function animateWithGrid(timestamp) {
      if (!lastTime) lastTime = timestamp;
      let deltaTime = timestamp - lastTime;
      lastTime = timestamp;

      ctx.clearRect(0, 0, canvasWidth, canvasHeight);

      // Update background layers
      backgroundLayers.forEach(layer => {
        layer.update();
      });

      // Draw the futuristic grid at the bottom of the screen
      drawFuturisticGrid();

      // Update the score over time
      score += deltaTime * 0.01;
      scoreBoard.innerText = 'Score: ' + Math.floor(score);

      // Animate the player
      player.animate();

      // Handle obstacles with collision and removal logic
      obstacleTimer += deltaTime;
      if (obstacleTimer > obstacleInterval) {
        obstacles.push(new Obstacle());
        obstacleTimer = 0;
      }
      obstacles.forEach((obstacle, index) => {
        obstacle.update(deltaTime);
        if (isColliding(
            { x: player.x, y: player.y, width: player.width, height: player.height },
            { x: obstacle.x, y: obstacle.y, width: obstacle.width, height: obstacle.height }
          )) {
          gameOver = true;
        }
        if (obstacle.x + obstacle.width < 0) {
          obstacles.splice(index, 1);
        }
      });

      // Handle coins with collision detection
      coinTimer += deltaTime;
      if (coinTimer > coinInterval) {
        coins.push(new Coin());
        coinTimer = 0;
      }
      coins.forEach((coin, index) => {
        coin.update(deltaTime);
        let distX = Math.abs(coin.x - (player.x + player.width / 2));
        let distY = Math.abs(coin.y - (player.y + player.height / 2));
        if (distX <= (player.width / 2 + coin.radius) && distY <= (player.height / 2 + coin.radius)) {
          score += 10;
          coins.splice(index, 1);
        }
        if (coin.x + coin.radius < 0) {
          coins.splice(index, 1);
        }
      });

      if (!gameOver) {
        requestAnimationFrame(animateWithGrid);
      } else {
        showGameOver();
      }
    }

    // After a short delay, switch to the enhanced animation loop that includes the grid.
    setTimeout(function () {
      if (!gameOver) {
        lastTime = 0;
        animateWithGrid(0);
      }
    }, 100);

    // End of JavaScript Code
    // ==========================================================
