<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Consciousness Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000000 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #00ffff;
        }

        .quantum-space {
            position: fixed;
            width: 100vw;
            height: 100vh;
            perspective: 2000px;
            perspective-origin: 50% 50%;
        }

        .consciousness-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotate-consciousness 60s linear infinite;
        }

        @keyframes rotate-consciousness {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            33% { transform: rotateX(120deg) rotateY(240deg) rotateZ(80deg); }
            66% { transform: rotateX(240deg) rotateY(120deg) rotateZ(160deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(240deg); }
        }

        .thought-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ff00ff, #00ffff, #ffff00);
            border-radius: 50%;
            animation: quantum-dance 8s ease-in-out infinite;
            box-shadow: 0 0 20px currentColor;
        }

        @keyframes quantum-dance {
            0%, 100% { 
                transform: translate3d(0, 0, 0) scale(1);
                opacity: 1;
            }
            25% { 
                transform: translate3d(200px, -300px, 400px) scale(2);
                opacity: 0.7;
            }
            50% { 
                transform: translate3d(-400px, 200px, -200px) scale(0.5);
                opacity: 0.3;
            }
            75% { 
                transform: translate3d(300px, 400px, 300px) scale(1.5);
                opacity: 0.8;
            }
        }

        .neural-web {
            position: absolute;
            width: 2px;
            height: 400px;
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(0, 255, 255, 0.3) 25%, 
                rgba(255, 0, 255, 0.5) 50%, 
                rgba(255, 255, 0, 0.3) 75%, 
                transparent 100%);
            transform-origin: 0 0;
            animation: neural-pulse 4s ease-in-out infinite;
        }

        @keyframes neural-pulse {
            0%, 100% { 
                transform: rotateZ(0deg) scaleY(1);
                opacity: 0.3;
            }
            50% { 
                transform: rotateZ(180deg) scaleY(2);
                opacity: 1;
            }
        }

        .dimension-portal {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: portal-spin 12s linear infinite;
            background: conic-gradient(from 0deg, 
                rgba(255, 0, 255, 0.1) 0deg,
                rgba(0, 255, 255, 0.2) 120deg,
                rgba(255, 255, 0, 0.1) 240deg,
                rgba(255, 0, 255, 0.1) 360deg);
        }

        @keyframes portal-spin {
            0% { 
                transform: rotate(0deg) scale(1);
                border-color: rgba(255, 0, 255, 0.3);
            }
            33% { 
                transform: rotate(120deg) scale(1.5);
                border-color: rgba(0, 255, 255, 0.5);
            }
            66% { 
                transform: rotate(240deg) scale(0.8);
                border-color: rgba(255, 255, 0, 0.4);
            }
            100% { 
                transform: rotate(360deg) scale(1);
                border-color: rgba(255, 0, 255, 0.3);
            }
        }

        .consciousness-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, 
                rgba(255, 0, 255, 0.1) 0%, 
                rgba(0, 255, 255, 0.05) 30%, 
                transparent 70%);
            animation: wave-consciousness 20s ease-in-out infinite;
            transform-origin: 50% 50%;
        }

        @keyframes wave-consciousness {
            0%, 100% { 
                transform: scale(1) rotate(0deg);
                opacity: 0.5;
            }
            25% { 
                transform: scale(2) rotate(90deg);
                opacity: 0.8;
            }
            50% { 
                transform: scale(0.5) rotate(180deg);
                opacity: 0.3;
            }
            75% { 
                transform: scale(1.5) rotate(270deg);
                opacity: 0.6;
            }
        }

        .quantum-field {
            position: absolute;
            width: 1px;
            height: 1px;
            background: rgba(255, 255, 255, 0.8);
            animation: field-fluctuation 6s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
        }

        @keyframes field-fluctuation {
            0%, 100% { 
                transform: translate3d(0, 0, 0) scale(1);
                box-shadow: 0 0 40px rgba(255, 0, 255, 0.8);
            }
            16% { 
                transform: translate3d(300px, -200px, 100px) scale(3);
                box-shadow: 0 0 80px rgba(0, 255, 255, 0.6);
            }
            32% { 
                transform: translate3d(-200px, 300px, -150px) scale(0.5);
                box-shadow: 0 0 20px rgba(255, 255, 0, 0.9);
            }
            48% { 
                transform: translate3d(400px, 100px, 200px) scale(2);
                box-shadow: 0 0 60px rgba(255, 0, 255, 0.7);
            }
            64% { 
                transform: translate3d(-100px, -300px, -100px) scale(1.5);
                box-shadow: 0 0 50px rgba(0, 255, 255, 0.8);
            }
            80% { 
                transform: translate3d(200px, 200px, 300px) scale(0.8);
                box-shadow: 0 0 30px rgba(255, 255, 0, 0.6);
            }
        }

        .memory-fragment {
            position: absolute;
            width: 20px;
            height: 20px;
            background: linear-gradient(45deg, 
                rgba(255, 0, 255, 0.3), 
                rgba(0, 255, 255, 0.5), 
                rgba(255, 255, 0, 0.3));
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation: fragment-float 15s ease-in-out infinite;
        }

        @keyframes fragment-float {
            0%, 100% { 
                transform: translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg);
                opacity: 0.6;
            }
            20% { 
                transform: translate3d(250px, -400px, 300px) rotateX(72deg) rotateY(144deg);
                opacity: 1;
            }
            40% { 
                transform: translate3d(-350px, 250px, -200px) rotateX(144deg) rotateY(288deg);
                opacity: 0.4;
            }
            60% { 
                transform: translate3d(450px, 350px, 100px) rotateX(216deg) rotateY(432deg);
                opacity: 0.8;
            }
            80% { 
                transform: translate3d(-200px, -200px, 400px) rotateX(288deg) rotateY(576deg);
                opacity: 0.5;
            }
        }

        .info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            z-index: 1000;
            animation: panel-glow 4s ease-in-out infinite alternate;
        }

        @keyframes panel-glow {
            0% { 
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            }
            100% { 
                box-shadow: 0 0 40px rgba(255, 0, 255, 0.5);
            }
        }

        .control-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .control-btn {
            background: rgba(255, 0, 255, 0.2);
            border: 1px solid rgba(255, 0, 255, 0.5);
            color: #fff;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 0, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
        }

        .temporal-distortion {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, 
                rgba(255, 255, 255, 0.1) 0%, 
                rgba(0, 255, 255, 0.2) 50%, 
                transparent 100%);
            border-radius: 50%;
            animation: temporal-warp 10s ease-in-out infinite;
        }

        @keyframes temporal-warp {
            0%, 100% { 
                transform: scale(1) rotate(0deg);
                filter: blur(0px);
            }
            25% { 
                transform: scale(3) rotate(90deg);
                filter: blur(2px);
            }
            50% { 
                transform: scale(0.3) rotate(180deg);
                filter: blur(5px);
            }
            75% { 
                transform: scale(2) rotate(270deg);
                filter: blur(1px);
            }
        }
    </style>
</head>
<body>
    <div class="quantum-space">
        <div class="consciousness-layer" id="layer1"></div>
        <div class="consciousness-layer" id="layer2"></div>
        <div class="consciousness-layer" id="layer3"></div>
    </div>

    <div class="info-panel">
        <h3>Quantum Consciousness Visualizer</h3>
        <p>Dimensions Active: <span id="dimensions">∞</span></p>
        <p>Thought Particles: <span id="particles">0</span></p>
        <p>Consciousness Coherence: <span id="coherence">97.3%</span></p>
        <p>Temporal Flux: <span id="flux">Stable</span></p>
    </div>

    <div class="control-panel">
        <button class="control-btn" onclick="amplifyConsciousness()">Amplify</button>
        <button class="control-btn" onclick="quantumJump()">Quantum Jump</button>
        <button class="control-btn" onclick="resetReality()">Reset Reality</button>
    </div>

    <script>
        let particleCount = 0;
        let isAmplified = false;
        let quantumState = 'normal';
        
        function createThoughtParticle(layer, x, y, z) {
            const particle = document.createElement('div');
            particle.className = 'thought-particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.transform = `translateZ(${z}px)`;
            particle.style.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
            layer.appendChild(particle);
            
            setTimeout(() => {
                if (particle.parentNode) {
                    particle.parentNode.removeChild(particle);
                }
            }, Math.random() * 15000 + 10000);
            
            return particle;
        }

        function createNeuralWeb(layer, x, y, angle) {
            const web = document.createElement('div');
            web.className = 'neural-web';
            web.style.left = x + 'px';
            web.style.top = y + 'px';
            web.style.transform = `rotateZ(${angle}deg)`;
            web.style.animationDelay = Math.random() * 4 + 's';
            layer.appendChild(web);
            
            setTimeout(() => {
                if (web.parentNode) {
                    web.parentNode.removeChild(web);
                }
            }, Math.random() * 20000 + 15000);
        }

        function createDimensionPortal(layer, x, y, size) {
            const portal = document.createElement('div');
            portal.className = 'dimension-portal';
            portal.style.left = x + 'px';
            portal.style.top = y + 'px';
            portal.style.width = size + 'px';
            portal.style.height = size + 'px';
            portal.style.animationDelay = Math.random() * 12 + 's';
            layer.appendChild(portal);
            
            setTimeout(() => {
                if (portal.parentNode) {
                    portal.parentNode.removeChild(portal);
                }
            }, Math.random() * 30000 + 20000);
        }

        function createQuantumField(layer, x, y, z) {
            const field = document.createElement('div');
            field.className = 'quantum-field';
            field.style.left = x + 'px';
            field.style.top = y + 'px';
            field.style.transform = `translateZ(${z}px)`;
            field.style.animationDelay = Math.random() * 6 + 's';
            layer.appendChild(field);
            
            setTimeout(() => {
                if (field.parentNode) {
                    field.parentNode.removeChild(field);
                }
            }, Math.random() * 12000 + 8000);
        }

        function createMemoryFragment(layer, x, y, z) {
            const fragment = document.createElement('div');
            fragment.className = 'memory-fragment';
            fragment.style.left = x + 'px';
            fragment.style.top = y + 'px';
            fragment.style.transform = `translateZ(${z}px)`;
            fragment.style.animationDelay = Math.random() * 15 + 's';
            layer.appendChild(fragment);
            
            setTimeout(() => {
                if (fragment.parentNode) {
                    fragment.parentNode.removeChild(fragment);
                }
            }, Math.random() * 25000 + 20000);
        }

        function createTemporalDistortion(layer, x, y) {
            const distortion = document.createElement('div');
            distortion.className = 'temporal-distortion';
            distortion.style.left = x + 'px';
            distortion.style.top = y + 'px';
            distortion.style.animationDelay = Math.random() * 10 + 's';
            layer.appendChild(distortion);
            
            setTimeout(() => {
                if (distortion.parentNode) {
                    distortion.parentNode.removeChild(distortion);
                }
            }, Math.random() * 20000 + 15000);
        }

        function generateConsciousness() {
            const layers = [
                document.getElementById('layer1'),
                document.getElementById('layer2'),
                document.getElementById('layer3')
            ];
            
            layers.forEach((layer, index) => {
                // Create consciousness wave
                const wave = document.createElement('div');
                wave.className = 'consciousness-wave';
                wave.style.animationDelay = (index * 7) + 's';
                layer.appendChild(wave);
                
                // Generate thought particles
                for (let i = 0; i < 20; i++) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    const z = Math.random() * 1000 - 500;
                    createThoughtParticle(layer, x, y, z);
                    particleCount++;
                }
                
                // Generate neural webs
                for (let i = 0; i < 15; i++) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    const angle = Math.random() * 360;
                    createNeuralWeb(layer, x, y, angle);
                }
                
                // Generate dimension portals
                for (let i = 0; i < 5; i++) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    const size = Math.random() * 300 + 100;
                    createDimensionPortal(layer, x, y, size);
                }
                
                // Generate quantum fields
                for (let i = 0; i < 30; i++) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    const z = Math.random() * 800 - 400;
                    createQuantumField(layer, x, y, z);
                }
                
                // Generate memory fragments
                for (let i = 0; i < 10; i++) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    const z = Math.random() * 600 - 300;
                    createMemoryFragment(layer, x, y, z);
                }
                
                // Generate temporal distortions
                for (let i = 0; i < 8; i++) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    createTemporalDistortion(layer, x, y);
                }
            });
        }

        function updateDisplay() {
            document.getElementById('particles').textContent = particleCount;
            document.getElementById('coherence').textContent = (Math.random() * 10 + 90).toFixed(1) + '%';
            document.getElementById('flux').textContent = ['Stable', 'Fluctuating', 'Chaotic', 'Harmonious'][Math.floor(Math.random() * 4)];
        }

        function amplifyConsciousness() {
            isAmplified = !isAmplified;
            const layers = document.querySelectorAll('.consciousness-layer');
            layers.forEach(layer => {
                if (isAmplified) {
                    layer.style.animationDuration = '20s';
                    layer.style.filter = 'brightness(1.5) contrast(1.2)';
                } else {
                    layer.style.animationDuration = '60s';
                    layer.style.filter = 'brightness(1) contrast(1)';
                }
            });
        }

        function quantumJump() {
            quantumState = quantumState === 'normal' ? 'quantum' : 'normal';
            const space = document.querySelector('.quantum-space');
            if (quantumState === 'quantum') {
                space.style.filter = 'hue-rotate(180deg) saturate(2)';
                space.style.transform = 'scale(1.2) rotateX(45deg)';
            } else {
                space.style.filter = 'hue-rotate(0deg) saturate(1)';
                space.style.transform = 'scale(1) rotateX(0deg)';
            }
        }

        function resetReality() {
            location.reload();
        }

        // Initialize the consciousness
        generateConsciousness();
        
        // Continuous generation
        setInterval(() => {
            generateConsciousness();
            updateDisplay();
        }, 5000);
        
        // Update display every second
        setInterval(updateDisplay, 1000);
        
        // Mouse interaction
        document.addEventListener('mousemove', (e) => {
            const layer = document.getElementById('layer1');
            if (Math.random() < 0.3) {
                createThoughtParticle(layer, e.clientX, e.clientY, Math.random() * 200 - 100);
                particleCount++;
            }
        });
        
        // Click interaction
        document.addEventListener('click', (e) => {
            const layer = document.getElementById('layer2');
            createQuantumField(layer, e.clientX, e.clientY, 0);
            createMemoryFragment(layer, e.clientX, e.clientY, 0);
        });
    </script>
</body>
</html>
