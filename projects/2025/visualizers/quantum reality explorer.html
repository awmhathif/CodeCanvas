<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Reality Explorer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        #interface {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            opacity: 0.9;
            pointer-events: none;
        }
        #interface h1 {
            font-size: 2em;
            margin: 0;
        }
        #interface p {
            font-size: 1em;
            margin: 5px 0;
        }
        #status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div id="interface">
        <h1>Quantum Reality Explorer</h1>
        <p>Voice: "spawn particles", "clear", "pulse" | Mouse: Rotate, Click to Interact</p>
    </div>
    <div id="status">Initializing Quantum Field...</div>

    <!-- Libraries -->
    <script src="https://threejs.org/build/three.js"></script>
    <script src="https://threejs.org/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script>
        // Core Three.js Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00ffcc, 1, 50);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Camera Positioning and Controls
        camera.position.set(0, 5, 10);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Quantum Particles Array
        const particles = [];
        const particleGroups = [];

        // Particle Creation Function
        function createQuantumParticle(x, y, z) {
            const geometry = new THREE.IcosahedronGeometry(0.2, 1);
            const material = new THREE.MeshPhongMaterial({
                color: Math.random() * 0xffffff,
                transparent: true,
                opacity: 0.7,
                emissive: 0x00ffcc,
                emissiveIntensity: 0.5,
                shininess: 100
            });
            const particle = new THREE.Mesh(geometry, material);
            particle.position.set(x, y, z);
            particle.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.05,
                (Math.random() - 0.5) * 0.05,
                (Math.random() - 0.5) * 0.05
            );
            particle.rotationSpeed = Math.random() * 0.1 - 0.05;
            scene.add(particle);
            particles.push(particle);
            return particle;
        }

        // Particle Group (Quantum Cluster)
        function spawnParticleCluster(count) {
            const group = new THREE.Group();
            for (let i = 0; i < count; i++) {
                const particle = createQuantumParticle(
                    Math.random() * 5 - 2.5,
                    Math.random() * 5 - 2.5,
                    Math.random() * 5 - 2.5
                );
                group.add(particle);
            }
            scene.add(group);
            particleGroups.push(group);
            return group;
        }

        // Background Particle Field
        const starField = new THREE.Group();
        const starGeometry = new THREE.SphereGeometry(0.05, 8, 8);
        const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for (let i = 0; i < 500; i++) {
            const star = new THREE.Mesh(starGeometry, starMaterial);
            star.position.set(
                Math.random() * 100 - 50,
                Math.random() * 100 - 50,
                Math.random() * 100 - 50
            );
            starField.add(star);
        }
        scene.add(starField);

        // Audio Setup
        const listener = new THREE.AudioListener();
        camera.add(listener);
        const audioLoader = new THREE.AudioLoader();
        const pulseSound = new THREE.Audio(listener);
        const spawnSound = new THREE.Audio(listener);
        audioLoader.load('https://threejs.org/examples/sounds/ping.wav', (buffer) => {
            spawnSound.setBuffer(buffer);
            spawnSound.setVolume(0.5);
        });
        audioLoader.load('https://threejs.org/examples/sounds/pulse.wav', (buffer) => {
            pulseSound.setBuffer(buffer);
            pulseSound.setVolume(0.5);
        });

        // Voice Recognition
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = true;
        recognition.onresult = (event) => {
            const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
            document.getElementById('status').textContent = `Heard: "${command}"`;
            if (command.includes('spawn particles')) {
                spawnParticleCluster(10);
                if (spawnSound.isPlaying) spawnSound.stop();
                spawnSound.play();
            } else if (command.includes('clear')) {
                particles.forEach(p => scene.remove(p));
                particleGroups.forEach(g => scene.remove(g));
                particles.length = 0;
                particleGroups.length = 0;
            } else if (command.includes('pulse')) {
                pulseParticles();
                if (pulseSound.isPlaying) pulseSound.stop();
                pulseSound.play();
            }
        };
        recognition.onerror = () => {
            document.getElementById('status').textContent = 'Voice recognition failed. Retrying...';
            recognition.start();
        };
        recognition.start();

        // Raycaster for Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(particles);
            if (intersects.length > 0) {
                const particle = intersects[0].object;
                new TWEEN.Tween(particle.scale)
                    .to({ x: 2, y: 2, z: 2 }, 500)
                    .easing(TWEEN.Easing.Elastic.Out)
                    .onComplete(() => {
                        new TWEEN.Tween(particle.scale)
                            .to({ x: 1, y: 1, z: 1 }, 500)
                            .start();
                    })
                    .start();
                if (spawnSound.isPlaying) spawnSound.stop();
                spawnSound.play();
            }
        }
        window.addEventListener('click', onMouseClick);

        // Pulse Animation
        function pulseParticles() {
            particles.forEach(particle => {
                new TWEEN.Tween(particle.scale)
                    .to({ x: 1.5, y: 1.5, z: 1.5 }, 300)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .yoyo(true)
                    .repeat(1)
                    .start();
            });
        }

        // Quantum Field Simulation
        const quantumField = [];
        function createFieldNode(x, y, z) {
            const node = new THREE.Mesh(
                new THREE.TetrahedronGeometry(0.1),
                new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true })
            );
            node.position.set(x, y, z);
            node.phase = Math.random() * Math.PI * 2;
            quantumField.push(node);
            scene.add(node);
        }
        for (let x = -5; x <= 5; x += 1) {
            for (let y = -5; y <= 5; y += 1) {
                for (let z = -5; z <= 5; z += 1) {
                    if (Math.random() < 0.1) createFieldNode(x, y, z);
                }
            }
        }

        // Holographic Core
        const coreGeometry = new THREE.DodecahedronGeometry(1);
        const coreMaterial = new THREE.MeshPhongMaterial({
            color: 0x00ffcc,
            transparent: true,
            opacity: 0.6,
            emissive: 0x00ffcc,
            emissiveIntensity: 1
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);

        // Animation Loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // Update Particles
            particles.forEach((particle, index) => {
                particle.position.add(particle.velocity);
                particle.rotation.x += particle.rotationSpeed;
                particle.rotation.y += particle.rotationSpeed;
                particle.material.emissiveIntensity = Math.sin(time + index) * 0.5 + 0.5;

                // Boundary Check
                if (particle.position.length() > 10) {
                    particle.velocity.negate();
                }
            });

            // Update Particle Groups
            particleGroups.forEach(group => {
                group.rotation.y += 0.01;
                group.position.y = Math.sin(time) * 0.5;
            });

            // Update Quantum Field
            quantumField.forEach(node => {
                node.phase += 0.05;
                node.scale.setScalar(Math.sin(node.phase) * 0.5 + 0.5);
            });

            // Update Core
            core.rotation.x += 0.01;
            core.rotation.y += 0.02;
            core.scale.setScalar(Math.sin(time) * 0.1 + 1);

            // Update Star Field
            starField.rotation.y += 0.001;

            TWEEN.update();
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Initial Spawn
        spawnParticleCluster(5);

        // Event Listeners
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Dynamic Status Updates
        setInterval(() => {
            const particleCount = particles.length;
            const energyLevel = (Math.sin(time) * 50 + 50).toFixed(2);
            document.getElementById('status').textContent = 
                `Particles: ${particleCount} | Quantum Energy: ${energyLevel}%`;
        }, 1000);

        // Intro Animation
        new TWEEN.Tween(core.scale)
            .to({ x: 1, y: 1, z: 1 }, 2000)
            .easing(TWEEN.Easing.Bounce.Out)
            .start();
    </script>
</body>
</html>
