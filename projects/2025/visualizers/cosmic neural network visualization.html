<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Neural Network Visualization</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
    .instructions {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-family: monospace;
      font-size: 12px;
      pointer-events: none;
      transition: opacity 0.5s;
      opacity: 1;
    }
    .instructions.fade {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="instructions" id="instructions">
    MOVE MOUSE to interact | SCROLL to zoom | CLICK to pulse
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Global variables
    let scene, camera, renderer, composer;
    let particles, particleSystem;
    let neuralNodes = [];
    let connections = [];
    let mouseX = 0, mouseY = 0;
    let targetRotationX = 0, targetRotationY = 0;
    let timeElapsed = 0;
    let pulseTime = 0;
    
    // Neural node class
    class NeuralNode {
      constructor(position, size, color) {
        this.position = position;
        this.size = size;
        this.originalSize = size;
        this.color = new THREE.Color(color);
        this.originalColor = new THREE.Color(color);
        this.activity = 0;
        this.targetActivity = 0;
        this.connections = [];
        
        const geometry = new THREE.SphereGeometry(size, 16, 16);
        const material = new THREE.MeshBasicMaterial({
          color: this.color,
          transparent: true,
          opacity: 0.7
        });
        
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.position.copy(position);
        
        // Create glow
        const glowGeometry = new THREE.SphereGeometry(size * 1.5, 16, 16);
        const glowMaterial = new THREE.ShaderMaterial({
          uniforms: {
            glowColor: { value: new THREE.Color(color) },
            viewVector: { value: new THREE.Vector3() }
          },
          vertexShader: `
            uniform vec3 viewVector;
            varying float intensity;
            void main() {
              vec3 vNormal = normalize(normalMatrix * normal);
              vec3 vNormel = normalize(normalMatrix * viewVector);
              intensity = pow(0.8 - dot(vNormal, vNormel), 2.0);
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform vec3 glowColor;
            varying float intensity;
            void main() {
              vec3 glow = glowColor * intensity;
              gl_FragColor = vec4(glow, intensity);
            }
          `,
          side: THREE.BackSide,
          blending: THREE.AdditiveBlending,
          transparent: true
        });
        
        this.glow = new THREE.Mesh(glowGeometry, glowMaterial);
        this.glow.position.copy(position);
        
        scene.add(this.mesh);
        scene.add(this.glow);
      }
      
      update(deltaTime, cameraPosition) {
        // Update activity
        this.activity += (this.targetActivity - this.activity) * deltaTime * 2;
        
        // Update size based on activity
        const scale = 1 + this.activity * 0.5;
        this.mesh.scale.set(scale, scale, scale);
        this.glow.scale.set(scale * 1.2, scale * 1.2, scale * 1.2);
        
        // Update color based on activity
        const newColor = this.originalColor.clone().lerp(new THREE.Color(0xffffff), this.activity * 0.5);
        this.mesh.material.color = newColor;
        this.glow.material.uniforms.glowColor.value = newColor;
        
        // Update glow effect based on camera position
        const viewVector = new THREE.Vector3().subVectors(cameraPosition, this.glow.position);
        this.glow.material.uniforms.viewVector.value = viewVector;
        
        // Decay activity
        this.targetActivity *= 0.95;
      }
      
      activate(amount = 1.0) {
        this.targetActivity = Math.min(this.targetActivity + amount, 1.0);
      }
    }
    
    class Connection {
      constructor(nodeA, nodeB) {
        this.nodeA = nodeA;
        this.nodeB = nodeB;
        this.activity = 0;
        
        const points = [nodeA.position, nodeB.position];
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        
        this.material = new THREE.LineBasicMaterial({
          color: 0x4080ff,
          transparent: true,
          opacity: 0.2,
          linewidth: 1
        });
        
        this.line = new THREE.Line(geometry, this.material);
        scene.add(this.line);
        
        // Add this connection to both nodes
        nodeA.connections.push(this);
        nodeB.connections.push(this);
      }
      
      update() {
        // Update line opacity based on activity
        this.material.opacity = 0.2 + this.activity * 0.8;
        
        // Color shift based on activity
        const color = new THREE.Color(0x4080ff).lerp(new THREE.Color(0x40ffff), this.activity);
        this.material.color = color;
        
        // Decay activity
        this.activity *= 0.95;
      }
      
      activate(amount = 1.0) {
        this.activity = Math.min(this.activity + amount, 1.0);
        // Propagate activation to connected nodes
        this.nodeB.activate(amount * 0.7);
      }
    }
    
    // Initialize the scene
    function init() {
      // Create scene
      scene = new THREE.Scene();
      
      // Create camera
      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 35;
      
      // Create renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);
      
      // Create ambient light
      const ambientLight = new THREE.AmbientLight(0x111122);
      scene.add(ambientLight);
      
      // Create background stars
      createStars();
      
      // Create neural network
      createNeuralNetwork();
      
      // Event listeners
      window.addEventListener('resize', onWindowResize);
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mousedown', onMouseDown);
      document.addEventListener('wheel', onMouseWheel);
      
      // Hide instructions after 5 seconds
      setTimeout(() => {
        document.getElementById('instructions').classList.add('fade');
      }, 5000);
      
      // Start animation loop
      animate();
    }
    
    function createStars() {
      // Create star particles
      const particleCount = 7000;
      const particles = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);
      const colors = new Float32Array(particleCount * 3);
      
      // Create particles with random positions
      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        // Position in a sphere
        const radius = 100 + Math.random() * 900;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        
        positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i3 + 2] = radius * Math.cos(phi);
        
        // Random size
        sizes[i] = 0.1 + Math.random() * 2.0;
        
        // Colors - slight variation of blues/cyans
        const color = new THREE.Color();
        color.setHSL(0.5 + Math.random() * 0.2, 0.8, 0.8);
        colors[i3] = color.r;
        colors[i3 + 1] = color.g;
        colors[i3 + 2] = color.b;
      }
      
      particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particles.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      
      // Shader material for better looking stars
      const material = new THREE.ShaderMaterial({
        uniforms: {
          time: { value: 0.0 },
          pixelRatio: { value: window.devicePixelRatio }
        },
        vertexShader: `
          attribute float size;
          attribute vec3 color;
          varying vec3 vColor;
          uniform float time;
          void main() {
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            // Twinkle effect
            float twinkle = sin(time * 0.5 + position.x * 0.01 + position.y * 0.01 + position.z * 0.01) * 0.5 + 0.5;
            gl_PointSize = size * (300.0 / length(mvPosition.xyz)) * twinkle;
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          uniform float pixelRatio;
          void main() {
            // Create circular points
            vec2 xy = gl_PointCoord.xy - vec2(0.5);
            float radius = length(xy);
            if (radius > 0.5) discard;
            
            // Add glow effect
            float opacity = (0.5 - radius) * 2.0;
            gl_FragColor = vec4(vColor, opacity);
          }
        `,
        blending: THREE.AdditiveBlending,
        depthTest: false,
        transparent: true
      });
      
      particleSystem = new THREE.Points(particles, material);
      scene.add(particleSystem);
    }
    
    function createNeuralNetwork() {
      // Create neural nodes
      const nodeCount = 20;
      const radius = 15;
      
      // Create nodes in a spherical arrangement
      for (let i = 0; i < nodeCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        
        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.sin(phi) * Math.sin(theta);
        const z = radius * Math.cos(phi);
        
        const position = new THREE.Vector3(x, y, z);
        const size = 0.3 + Math.random() * 0.5;
        
        // Create a color with hue variation
        const hue = 0.5 + Math.random() * 0.3; // Blue to purple range
        const color = new THREE.Color().setHSL(hue, 1.0, 0.5);
        
        const node = new NeuralNode(position, size, color);
        neuralNodes.push(node);
      }
      
      // Create connections between nodes
      for (let i = 0; i < neuralNodes.length; i++) {
        // Connect to 2-4 other random nodes
        const connectionCount = 2 + Math.floor(Math.random() * 3);
        const nodeA = neuralNodes[i];
        
        for (let j = 0; j < connectionCount; j++) {
          // Find a random node to connect to
          let randomIndex;
          do {
            randomIndex = Math.floor(Math.random() * neuralNodes.length);
          } while (randomIndex === i); // Don't connect to self
          
          const nodeB = neuralNodes[randomIndex];
          
          // Check if connection already exists
          const connectionExists = connections.some(conn => 
            (conn.nodeA === nodeA && conn.nodeB === nodeB) || 
            (conn.nodeA === nodeB && conn.nodeB === nodeA)
          );
          
          if (!connectionExists) {
            const connection = new Connection(nodeA, nodeB);
            connections.push(connection);
          }
        }
      }
    }
    
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    function onMouseMove(event) {
      // Calculate mouse position in normalized device coordinates (-1 to +1)
      mouseX = (event.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
      
      // Update target rotation based on mouse position
      targetRotationX = mouseY * 0.5;
      targetRotationY = mouseX * 0.5;
    }
    
    function onMouseDown(event) {
      // Generate a pulse through the network
      pulseTime = timeElapsed;
      
      // Activate a random node to start the pulse
      const randomNode = neuralNodes[Math.floor(Math.random() * neuralNodes.length)];
      randomNode.activate(1.0);
      
      // Activate its connections
      randomNode.connections.forEach(conn => {
        conn.activate(0.9);
      });
    }
    
    function onMouseWheel(event) {
      // Zoom in/out with mouse wheel
      camera.position.z += event.deltaY * 0.05;
      // Clamp zoom
      camera.position.z = Math.max(15, Math.min(100, camera.position.z));
    }
    
    function animate() {
      requestAnimationFrame(animate);
      
      const delta = 1/60; // Assume 60fps for simplicity
      timeElapsed += delta;
      
      // Update rotation based on target
      scene.rotation.x += (targetRotationX - scene.rotation.x) * 0.05;
      scene.rotation.y += (targetRotationY - scene.rotation.y) * 0.05;
      
      // Gentle automatic rotation
      scene.rotation.y += 0.001;
      
      // Update stars
      if (particleSystem) {
        particleSystem.material.uniforms.time.value = timeElapsed;
        // Slowly rotate the stars
        particleSystem.rotation.y = timeElapsed * 0.05;
      }
      
      // Check if it's time for a random activation
      if (Math.random() < 0.02) {
        const randomNode = neuralNodes[Math.floor(Math.random() * neuralNodes.length)];
        randomNode.activate(0.5 + Math.random() * 0.5);
      }
      
      // Update neural nodes
      neuralNodes.forEach(node => {
        node.update(delta, camera.position);
      });
      
      // Update connections
      connections.forEach(conn => {
        conn.update();
      });
      
      // Render
      renderer.render(scene, camera);
    }
    
    // Start the visualization
    init();
  </script>
</body>
</html>
