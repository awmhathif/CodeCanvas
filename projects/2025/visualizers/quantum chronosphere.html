<!DOCTYPE html><html lang="en"><head><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Chronosphere</title>
    <style>
        :root {
            --primary-glow: rgb(0, 225, 255);
            --secondary-glow: rgb(255, 0, 128);
            --tertiary-glow: rgb(255, 215, 0);
            --bg-color: #000;
            --text-color: #fff;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 70%);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }
        
        .quantum-sphere {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            transform-style: preserve-3d;
            animation: float 8s ease-in-out infinite;
        }
        
        .floating-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            z-index: 10;
        }
        
        .time-display {
            font-size: min(10vw, 6rem);
            font-weight: 700;
            letter-spacing: 0.1em;
            text-align: center;
            text-shadow: 
                0 0 10px var(--primary-glow),
                0 0 20px var(--primary-glow),
                0 0 30px var(--primary-glow);
            font-variant-numeric: tabular-nums;
            animation: pulse 3s infinite alternate;
        }
        
        .date-display {
            font-size: min(3vw, 1.5rem);
            margin-top: 15px;
            opacity: 0.8;
            letter-spacing: 2px;
        }
        
        .dimension-selector {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 5px;
        }
        
        .dimension-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: var(--text-color);
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        
        .dimension-btn:hover {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 10px var(--primary-glow);
        }
        
        .multi-dimensional {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0 20px;
        }
        
        .dimension {
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 150px;
        }
        
        .dimension:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 225, 255, 0.3);
        }
        
        .dimension-label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        
        .dimension-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--tertiary-glow);
        }
        
        .binary-display {
            display: flex;
            justify-content: center;
            margin: 15px 0;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .binary-group {
            display: flex;
            gap: 2px;
            margin: 0 5px;
        }
        
        .binary-bit {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        
        .binary-bit.on {
            background: var(--secondary-glow);
            box-shadow: 0 0 5px var(--secondary-glow),
                        0 0 10px var(--secondary-glow);
        }
        
        .time-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .time-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary-glow);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }
        
        .fractal-visualizer {
            position: absolute;
            bottom: 120px;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 3px;
        }
        
        .fractal-bar {
            width: 5px;
            height: 5px;
            background: linear-gradient(to top, var(--primary-glow), var(--secondary-glow));
            border-radius: 2px;
            transition: height 0.2s ease;
        }
        
        .quantum-rings {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
            z-index: -1;
        }
        
        .quantum-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 225, 255, 0.3);
            transform-style: preserve-3d;
            transform: rotateX(80deg);
        }
        
        .chronosphere-facts {
            position: absolute;
            bottom: -30px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            transition: all 0.3s ease;
        }
        
        .event-horizon {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.15;
            mix-blend-mode: screen;
        }
        
        @keyframes pulse {
            0% {
                text-shadow: 0 0 10px var(--primary-glow),
                            0 0 20px var(--primary-glow);
            }
            100% {
                text-shadow: 0 0 15px var(--primary-glow),
                            0 0 30px var(--primary-glow),
                            0 0 45px var(--primary-glow);
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        
        @media (max-width: 768px) {
            .quantum-sphere {
                max-width: 95%;
            }
            
            .multi-dimensional {
                flex-direction: column;
                align-items: center;
                bottom: auto;
                top: 70px;
            }
            
            .fractal-visualizer {
                bottom: 200px;
            }
            
            .time-display {
                margin-top: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="quantum-sphere" id="quantum-sphere">
        <div class="time-particles" id="time-particles"></div>
        <div class="quantum-rings" id="quantum-rings"></div>
        <div class="event-horizon" id="event-horizon"></div>
        
        <div class="floating-container">
            <div class="dimension-selector">
                <button class="dimension-btn" id="dimension-toggle">Toggle Dimension</button>
                <button class="dimension-btn" id="color-warp">Color Warp</button>
                <button class="dimension-btn" id="sound-toggle">Sound: Off</button>
            </div>
            
            <div class="time-display" id="time-display">00:00:00.000</div>
            <div class="date-display" id="date-display">MONDAY, JANUARY 01, 2025</div>
            
            <div class="binary-display" id="binary-display"></div>
            
            <div class="fractal-visualizer" id="fractal-visualizer"></div>
            
            <div class="multi-dimensional" id="multi-dimensional">
                <div class="dimension">
                    <div class="dimension-label">QUANTUM TIME</div>
                    <div class="dimension-value" id="quantum-time">0.00000</div>
                </div>
                <div class="dimension">
                    <div class="dimension-label">TIME DILATION</div>
                    <div class="dimension-value" id="time-dilation">1.00000</div>
                </div>
                <div class="dimension">
                    <div class="dimension-label">ENTROPY LEVEL</div>
                    <div class="dimension-value" id="entropy-level">0.00000</div>
                </div>
            </div>
            
            <div class="chronosphere-facts" id="chronosphere-facts">
                Initializing quantum chronosphere...
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize clock elements
            initBinaryDisplay();
            initFractalVisualizer();
            initQuantumRings();
            initTimeParticles();
            initEventHorizon();
            
            // Start the clock
            updateTime();
            setInterval(updateTime, 10); // Update every 10ms for millisecond precision
            
            // Load time facts
            const facts = [
                "One second on the event horizon of a black hole equals 7 years on Earth",
                "Time is actually slowing down as the universe expands",
                "According to quantum theory, time may be discrete rather than continuous",
                "Time is relative - it flows differently depending on your velocity and gravity",
                "The 'arrow of time' is determined by increasing entropy",
                "Light experiences no time at all due to time dilation at light speed",
                "On Mercury, a single day lasts two Mercury years",
                "Time may be an emergent property rather than a fundamental dimension",
                "Quantum entanglement appears to work instantly across any distance",
                "The Planck time (5.39×10^-44 seconds) is the smallest measurable unit of time"
            ];
            
            rotateFacts(facts);
            
            // Initialize sound synthesizer
            let audioContext;
            let isSoundEnabled = false;
            
            // Button event listeners
            document.getElementById('dimension-toggle').addEventListener('click', toggleDimension);
            document.getElementById('color-warp').addEventListener('click', colorWarp);
            document.getElementById('sound-toggle').addEventListener('click', toggleSound);
            
            // Mouse move creates time ripples
            document.addEventListener('mousemove', createTimeRipple);
            
            // Dimension variables
            let currentDimension = 0;
            const dimensions = ['normal', 'reverse', 'fractal', 'quantum'];
            
            function toggleDimension() {
                currentDimension = (currentDimension + 1) % dimensions.length;
                document.getElementById('quantum-sphere').setAttribute('data-dimension', dimensions[currentDimension]);
                document.getElementById('dimension-toggle').textContent = `Dimension: ${dimensions[currentDimension]}`;
            }
            
            function colorWarp() {
                const hue1 = Math.floor(Math.random() * 360);
                const hue2 = (hue1 + 180) % 360;
                document.documentElement.style.setProperty('--primary-glow', `hsl(${hue1}, 100%, 50%)`);
                document.documentElement.style.setProperty('--secondary-glow', `hsl(${hue2}, 100%, 50%)`);
                document.documentElement.style.setProperty('--tertiary-glow', `hsl(${(hue1 + 90) % 360}, 100%, 50%)`);
            }
            
            function toggleSound() {
                isSoundEnabled = !isSoundEnabled;
                document.getElementById('sound-toggle').textContent = `Sound: ${isSoundEnabled ? 'On' : 'Off'}`;
                
                if (isSoundEnabled) {
                    if (!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    playTimeNote(440, 0.1); // Play A4 as confirmation
                }
            }
            
            function updateTime() {
                const now = new Date();
                
                // Main time display with milliseconds
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');
                const milliseconds = now.getMilliseconds().toString().padStart(3, '0');
                
                document.getElementById('time-display').textContent = `${hours}:${minutes}:${seconds}.${milliseconds}`;
                
                // Date display
                const days = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
                const months = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
                
                const day = days[now.getDay()];
                const month = months[now.getMonth()];
                const date = now.getDate().toString().padStart(2, '0');
                const year = now.getFullYear();
                
                document.getElementById('date-display').textContent = `${day}, ${month} ${date}, ${year}`;
                
                // Update binary display
                updateBinaryDisplay(hours, minutes, seconds);
                
                // Update fractal visualizer
                updateFractalVisualizer(now);
                
                // Update quantum time
                const dayProgress = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds()) / 86400;
                const quantumTime = (Math.sin(dayProgress * Math.PI * 2) + 1) / 2;
                document.getElementById('quantum-time').textContent = quantumTime.toFixed(5);
                
                // Update time dilation
                const timeDilation = 1 + 0.1 * Math.sin(now.getSeconds() * Math.PI / 30);
                document.getElementById('time-dilation').textContent = timeDilation.toFixed(5);
                
                // Update entropy level
                const entropyProgress = (now.getMilliseconds() / 1000) + now.getSeconds() / 60;
                const entropy = Math.abs(Math.sin(entropyProgress * Math.PI * 2));
                document.getElementById('entropy-level').textContent = entropy.toFixed(5);
                
                // Generate time sound if enabled
                if (isSoundEnabled && now.getMilliseconds() < 15) {
                    if (now.getSeconds() === 0 && now.getMinutes() === 0) {
                        // Hour change
                        playTimeChord([261.63, 329.63, 392.00], 0.5); // C major chord
                    } else if (now.getSeconds() === 0) {
                        // Minute change
                        playTimeNote(523.25, 0.2); // C5
                    } else if (now.getSeconds() % 15 === 0) {
                        // Every 15 seconds
                        playTimeNote(392.00, 0.1); // G4
                    }
                }
                
                // Trigger particle burst on second change
                if (now.getMilliseconds() < 20) {
                    createParticleBurst();
                }
            }
            
            function initBinaryDisplay() {
                const binaryDisplay = document.getElementById('binary-display');
                
                // Create hour binary group
                const hourGroup = document.createElement('div');
                hourGroup.className = 'binary-group';
                for (let i = 0; i < 6; i++) {
                    const bit = document.createElement('div');
                    bit.className = 'binary-bit';
                    bit.setAttribute('data-position', 'hour-' + (5-i));
                    hourGroup.appendChild(bit);
                }
                binaryDisplay.appendChild(hourGroup);
                
                // Create minute binary group
                const minuteGroup = document.createElement('div');
                minuteGroup.className = 'binary-group';
                for (let i = 0; i < 6; i++) {
                    const bit = document.createElement('div');
                    bit.className = 'binary-bit';
                    bit.setAttribute('data-position', 'minute-' + (5-i));
                    minuteGroup.appendChild(bit);
                }
                binaryDisplay.appendChild(minuteGroup);
                
                // Create second binary group
                const secondGroup = document.createElement('div');
                secondGroup.className = 'binary-group';
                for (let i = 0; i < 6; i++) {
                    const bit = document.createElement('div');
                    bit.className = 'binary-bit';
                    bit.setAttribute('data-position', 'second-' + (5-i));
                    secondGroup.appendChild(bit);
                }
                binaryDisplay.appendChild(secondGroup);
            }
            
            function updateBinaryDisplay(hours, minutes, seconds) {
                // Convert to binary strings padded to 6 bits
                const hourBinary = parseInt(hours).toString(2).padStart(6, '0');
                const minuteBinary = parseInt(minutes).toString(2).padStart(6, '0');
                const secondBinary = parseInt(seconds).toString(2).padStart(6, '0');
                
                // Update hour bits
                for (let i = 0; i < 6; i++) {
                    const bit = document.querySelector(`[data-position="hour-${i}"]`);
                    if (hourBinary[5-i] === '1') {
                        bit.classList.add('on');
                    } else {
                        bit.classList.remove('on');
                    }
                }
                
                // Update minute bits
                for (let i = 0; i < 6; i++) {
                    const bit = document.querySelector(`[data-position="minute-${i}"]`);
                    if (minuteBinary[5-i] === '1') {
                        bit.classList.add('on');
                    } else {
                        bit.classList.remove('on');
                    }
                }
                
                // Update second bits
                for (let i = 0; i < 6; i++) {
                    const bit = document.querySelector(`[data-position="second-${i}"]`);
                    if (secondBinary[5-i] === '1') {
                        bit.classList.add('on');
                    } else {
                        bit.classList.remove('on');
                    }
                }
            }
            
            function initFractalVisualizer() {
                const visualizer = document.getElementById('fractal-visualizer');
                for (let i = 0; i < 60; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'fractal-bar';
                    visualizer.appendChild(bar);
                }
            }
            
            function updateFractalVisualizer(now) {
                const bars = document.querySelectorAll('.fractal-bar');
                const seconds = now.getSeconds();
                const milliseconds = now.getMilliseconds() / 1000;
                
                bars.forEach((bar, index) => {
                    // Create complex wave pattern
                    const timeValue = (index / 60) * Math.PI * 2;
                    const sinValue = Math.sin(timeValue + seconds * Math.PI / 30);
                    const cosValue = Math.cos(timeValue * 2 + milliseconds * Math.PI * 2);
                    
                    const height = 5 + Math.abs(sinValue * cosValue) * 35;
                    
                    bar.style.height = `${height}px`;
                    
                    // Highlight current second position
                    if (index === seconds) {
                        bar.style.boxShadow = `0 0 5px var(--primary-glow), 0 0 10px var(--secondary-glow)`;
                    } else {
                        bar.style.boxShadow = 'none';
                    }
                });
            }
            
            function initQuantumRings() {
                const ringsContainer = document.getElementById('quantum-rings');
                const numRings = 5;
                
                for (let i = 0; i < numRings; i++) {
                    const ring = document.createElement('div');
                    ring.className = 'quantum-ring';
                    
                    const size = 80 + i * 20;
                    const duration = 10 + i * 5;
                    const delay = i * -3;
                    
                    ring.style.width = `${size}%`;
                    ring.style.height = `${size}%`;
                    ring.style.left = `${(100 - size) / 2}%`;
                    ring.style.top = `${(100 - size) / 2}%`;
                    ring.style.animation = `rotate ${duration}s linear ${delay}s infinite`;
                    
                    ringsContainer.appendChild(ring);
                }
            }
            
            function initTimeParticles() {
                const container = document.getElementById('time-particles');
                
                // Create reusable particles
                for (let i = 0; i < 50; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'time-particle';
                    container.appendChild(particle);
                }
            }
            
            function createParticleBurst() {
                const particles = document.querySelectorAll('.time-particle');
                const center = { 
                    x: document.getElementById('quantum-sphere').offsetWidth / 2, 
                    y: document.getElementById('quantum-sphere').offsetHeight / 2 
                };
                
                particles.forEach((particle, index) => {
                    // Random angle and distance
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 50 + Math.random() * 150;
                    
                    // Calculate position
                    const x = center.x + Math.cos(angle) * distance;
                    const y = center.y + Math.sin(angle) * distance;
                    
                    // Apply styles for animation
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.opacity = '0';
                    particle.style.transform = 'scale(0)';
                    
                    // Animate
                    setTimeout(() => {
                        particle.style.opacity = '1';
                        particle.style.transform = 'scale(1)';
                        particle.style.transition = 'all 1s ease-out';
                        
                        setTimeout(() => {
                            particle.style.opacity = '0';
                            particle.style.transform = 'scale(0)';
                        }, 500);
                    }, index * 10);
                });
            }
            
            function createTimeRipple(event) {
                // Only create ripples occasionally
                if (Math.random() > 0.1) return;
                
                const sphere = document.getElementById('quantum-sphere');
                const rect = sphere.getBoundingClientRect();
                
                // Check if mouse is inside the sphere
                if (event.clientX >= rect.left && 
                    event.clientX <= rect.right && 
                    event.clientY >= rect.top && 
                    event.clientY <= rect.bottom) {
                    
                    const x = event.clientX - rect.left;
                    const y = event.clientY - rect.top;
                    
                    const ripple = document.createElement('div');
                    ripple.className = 'time-ripple';
                    ripple.style.left = `${x}px`;
                    ripple.style.top = `${y}px`;
                    ripple.style.position = 'absolute';
                    ripple.style.borderRadius = '50%';
                    ripple.style.border = '1px solid var(--primary-glow)';
                    ripple.style.width = '10px';
                    ripple.style.height = '10px';
                    ripple.style.opacity = '1';
                    ripple.style.transition = 'all 1s ease-out';
                    ripple.style.pointerEvents = 'none';
                    
                    sphere.appendChild(ripple);
                    
                    // Animate ripple
                    setTimeout(() => {
                        ripple.style.width = '100px';
                        ripple.style.height = '100px';
                        ripple.style.opacity = '0';
                        
                        // Remove after animation
                        setTimeout(() => ripple.remove(), 1000);
                    }, 10);
                }
            }
            
            function initEventHorizon() {
                const horizon = document.getElementById('event-horizon');
                const horizonCtx = document.createElement('canvas');
                horizon.appendChild(horizonCtx);
                
                const canvas = horizonCtx;
                const ctx = canvas.getContext('2d');
                
                // Set canvas size
                function resizeCanvas() {
                    canvas.width = horizon.offsetWidth;
                    canvas.height = horizon.offsetHeight;
                }
                
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();
                
                // Draw time ripples
                function drawHorizon() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Draw radial gradient
                    const gradient = ctx.createRadialGradient(
                        canvas.width/2, canvas.height/2, 0,
                        canvas.width/2, canvas.height/2, canvas.width/2
                    );
                    
                    gradient.addColorStop(0, 'rgba(0, 225, 255, 0.5)');
                    gradient.addColorStop(0.5, 'rgba(255, 0, 128, 0.2)');
                    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Draw time grid
                    const now = new Date();
                    const time = now.getSeconds() + now.getMilliseconds() / 1000;
                    
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = 0.5;
                    
                    // Horizontal lines
                    for (let i = 0; i < canvas.height; i += 20) {
                        ctx.beginPath();
                        ctx.moveTo(0, i + Math.sin(time + i * 0.01) * 5);
                        
                        for (let x = 0; x < canvas.width; x += 10) {
                            ctx.lineTo(x, i + Math.sin(time + i * 0.01 + x * 0.01) * 5);
                        }
                        
                        ctx.stroke();
                    }
                    
                    // Vertical lines
                    for (let i = 0; i < canvas.width; i += 20) {
                        ctx.beginPath();
                        ctx.moveTo(i + Math.sin(time + i * 0.01) * 5, 0);
                        
                        for (let y = 0; y < canvas.height; y += 10) {
                            ctx.lineTo(i + Math.sin(time + i * 0.01 + y * 0.01) * 5, y);
                        }
                        
                        ctx.stroke();
                    }
                    
                    requestAnimationFrame(drawHorizon);
                }
                
                drawHorizon();
            }
            
            function rotateFacts(facts) {
                const factElement = document.getElementById('chronosphere-facts');
                let currentFact = 0;
                
                function showNextFact() {
                    factElement.style.opacity = '0';
                    
                    setTimeout(() => {
                        currentFact = (currentFact + 1) % facts.length;
                        factElement.textContent = facts[currentFact];
                        factElement.style.opacity = '0.6';
                    }, 500);
                }
                
                // Change fact every 10 seconds
                setInterval(showNextFact, 10000);
                showNextFact();
            }
            
            function playTimeNote(frequency, duration) {
                if (!audioContext || !isSoundEnabled) return;
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;
                
                gainNode.gain.value = 0.1;
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);
                
                setTimeout(() => oscillator.stop(), duration * 1000);
            }
            
            function playTimeChord(frequencies, duration) {
                if (!audioContext || !isSoundEnabled) return;
                
                frequencies.forEach(freq => {
                    playTimeNote(freq, duration);
                });
            }
        });
    </script>


</body></html>
