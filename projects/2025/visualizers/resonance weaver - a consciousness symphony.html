<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resonance Weaver - A Consciousness Symphony</title>
<style>
/* Global Styles and Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

body {
    overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
    cursor: none;
    position: relative;
}

/* Main Canvas */
#gameCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at center, #0a0a1f 0%, #000 100%);
}

/* Custom Cursor */
#cursor {
    position: fixed;
    width: 40px;
    height: 40px;
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s ease;
    mix-blend-mode: screen;
}

#cursor::after {
    content: '';
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* UI Overlay */
#ui {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 20px;
    z-index: 100;
    pointer-events: none;
}

#progressBar {
    width: 300px;
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    margin: 0 auto;
    border-radius: 2px;
    overflow: hidden;
}

#progressFill {
    height: 100%;
    background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00);
    width: 0%;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px currentColor;
}

/* Phase Indicator */
#phaseIndicator {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 14px;
    letter-spacing: 3px;
    opacity: 0;
    transition: opacity 1s ease;
    text-align: center;
    text-transform: uppercase;
}

/* Narrative Text */
#narrative {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.9);
    font-size: 18px;
    max-width: 600px;
    text-align: center;
    line-height: 1.6;
    opacity: 0;
    transition: opacity 2s ease;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    pointer-events: none;
}

/* Resonance Counter */
#resonanceDisplay {
    position: fixed;
    top: 100px;
    right: 30px;
    color: white;
    font-size: 16px;
    opacity: 0.8;
}

/* Start Screen */
#startScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at center, #1a0033 0%, #000 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    transition: opacity 2s ease;
}

#startScreen h1 {
    color: white;
    font-size: 48px;
    margin-bottom: 20px;
    letter-spacing: 8px;
    text-transform: uppercase;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff; }
    to { text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff; }
}

#startButton {
    padding: 15px 40px;
    background: transparent;
    border: 2px solid white;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 2px;
    text-transform: uppercase;
}

#startButton:hover {
    background: white;
    color: black;
    box-shadow: 0 0 30px white;
}

/* End Screen */
#endScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at center, #000033 0%, #000 100%);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 3s ease;
}

#endScreen h2 {
    color: white;
    font-size: 36px;
    margin-bottom: 30px;
    text-align: center;
    letter-spacing: 4px;
}

#finalScore {
    color: #00ffff;
    font-size: 24px;
    margin-bottom: 40px;
}

/* Fragment Styles */
.fragment {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    transition: all 0.3s ease;
}

.fragment.resonating {
    animation: resonate 0.5s ease;
}

@keyframes resonate {
    0% { transform: scale(1); }
    50% { transform: scale(1.5); }
    100% { transform: scale(1); }
}

/* Wave Effect */
.wave {
    position: absolute;
    border: 2px solid;
    border-radius: 50%;
    pointer-events: none;
    animation: waveExpand 1s ease-out forwards;
}

@keyframes waveExpand {
    0% {
        width: 0;
        height: 0;
        opacity: 1;
    }
    100% {
        width: 300px;
        height: 300px;
        opacity: 0;
    }
}

/* Particle Effects */
.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
}

/* Connection Lines */
.connection {
    position: absolute;
    height: 2px;
    transform-origin: left center;
    pointer-events: none;
    opacity: 0.6;
}
</style>
</head>
<body>
<!-- Game Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- Custom Cursor -->
<div id="cursor"></div>

<!-- UI Elements -->
<div id="ui">
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
    <div id="phaseIndicator"></div>
    <div id="resonanceDisplay">RESONANCE: <span id="resonanceValue">0</span></div>
</div>

<!-- Narrative Display -->
<div id="narrative"></div>

<!-- Start Screen -->
<div id="startScreen">
    <h1>Resonance Weaver</h1>
    <p style="color: #aaa; margin-bottom: 30px; max-width: 500px; text-align: center; line-height: 1.6;">
        Harmonize scattered consciousness fragments through color and sound.<br>
        Draw connections. Create resonance. Weave reality.
    </p>
    <button id="startButton">BEGIN SYNTHESIS</button>
</div>

<!-- End Screen -->
<div id="endScreen">
    <h2>CONSCIOUSNESS UNIFIED</h2>
    <div id="finalScore"></div>
    <p style="color: #aaa; max-width: 500px; text-align: center; line-height: 1.6;">
        You have woven the fragments into a singular harmony.<br>
        The resonance echoes through infinite dimensions.
    </p>
</div>

<script>
// ==================== AUDIO SYNTHESIS MODULE ====================
class AudioEngine {
    constructor() {
        this.context = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.context.createGain();
        this.masterGain.connect(this.context.destination);
        this.masterGain.gain.value = 0.3;
        
        this.frequencies = {
            C: 261.63, D: 293.66, E: 329.63, F: 349.23,
            G: 392.00, A: 440.00, B: 493.88
        };
        
        this.activeOscillators = new Map();
        this.backgroundDrone = null;
        this.initBackgroundDrone();
    }
    
    initBackgroundDrone() {
        // Create atmospheric background drone
        const oscillator1 = this.context.createOscillator();
        const oscillator2 = this.context.createOscillator();
        const gainNode = this.context.createGain();
        
        oscillator1.frequency.value = 55; // Low A
        oscillator2.frequency.value = 82.5; // Low E
        
        oscillator1.type = 'sine';
        oscillator2.type = 'triangle';
        
        gainNode.gain.value = 0.05;
        
        oscillator1.connect(gainNode);
        oscillator2.connect(gainNode);
        gainNode.connect(this.masterGain);
        
        oscillator1.start();
        oscillator2.start();
        
        // Subtle modulation
        const lfo = this.context.createOscillator();
        const lfoGain = this.context.createGain();
        lfo.frequency.value = 0.2;
        lfoGain.gain.value = 2;
        lfo.connect(lfoGain);
        lfoGain.connect(oscillator1.frequency);
        lfo.start();
        
        this.backgroundDrone = { oscillator1, oscillator2, gainNode };
    }
    
    playTone(frequency, duration = 0.3, type = 'sine') {
        const oscillator = this.context.createOscillator();
        const gainNode = this.context.createGain();
        
        oscillator.frequency.value = frequency;
        oscillator.type = type;
        
        gainNode.gain.setValueAtTime(0, this.context.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.2, this.context.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.001, this.context.currentTime + duration);
        
        oscillator.connect(gainNode);
        gainNode.connect(this.masterGain);
        
        oscillator.start();
        oscillator.stop(this.context.currentTime + duration);
    }
    
    playResonance(color) {
        // Map colors to musical notes
        const colorToNote = {
            '#ff00ff': this.frequencies.C,
            '#00ffff': this.frequencies.E,
            '#ffff00': this.frequencies.G,
            '#ff00aa': this.frequencies.A,
            '#00ff00': this.frequencies.D,
            '#ff8800': this.frequencies.F,
            '#8800ff': this.frequencies.B
        };
        
        const frequency = colorToNote[color] || this.frequencies.C;
        this.playTone(frequency * 2, 0.5, 'triangle');
    }
    
    playConnection() {
        // Ascending arpeggio for successful connection
        const notes = [this.frequencies.C, this.frequencies.E, this.frequencies.G, this.frequencies.C * 2];
        notes.forEach((freq, i) => {
            setTimeout(() => this.playTone(freq, 0.2, 'square'), i * 50);
        });
    }
    
    playPhaseTransition() {
        // Dramatic sweep for phase changes
        const sweep = this.context.createOscillator();
        const gainNode = this.context.createGain();
        
        sweep.frequency.setValueAtTime(100, this.context.currentTime);
        sweep.frequency.exponentialRampToValueAtTime(2000, this.context.currentTime + 1);
        
        gainNode.gain.setValueAtTime(0.3, this.context.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, this.context.currentTime + 1);
        
        sweep.connect(gainNode);
        gainNode.connect(this.masterGain);
        
        sweep.start();
        sweep.stop(this.context.currentTime + 1);
    }
}

// ==================== FRAGMENT ENTITY CLASS ====================
class Fragment {
    constructor(x, y, color, size, id) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = size;
        this.id = id;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.angle = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.05;
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.connected = false;
        this.resonating = false;
        this.harmonicFreq = 200 + Math.random() * 600;
        this.connections = new Set();
        this.element = this.createElement();
    }
    
    createElement() {
        const elem = document.createElement('div');
        elem.className = 'fragment';
        elem.style.width = this.size + 'px';
        elem.style.height = this.size + 'px';
        elem.style.background = `radial-gradient(circle at 30% 30%, ${this.color}, transparent)`;
        elem.style.boxShadow = `0 0 ${this.size}px ${this.color}`;
        elem.dataset.id = this.id;
        document.body.appendChild(elem);
        return elem;
    }
    
    update(deltaTime, mouseX, mouseY) {
        // Orbital movement
        this.angle += this.rotationSpeed;
        
        // Pulse effect
        this.pulsePhase += deltaTime * 0.003;
        const pulseFactor = 1 + Math.sin(this.pulsePhase) * 0.2;
        
        // Mouse attraction when close
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < 200 && distance > 0) {
            const force = (200 - distance) / 200 * 0.5;
            this.vx += (dx / distance) * force;
            this.vy += (dy / distance) * force;
        }
        
        // Apply velocity with damping
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.98;
        this.vy *= 0.98;
        
        // Boundary collision
        const margin = this.size / 2;
        if (this.x < margin || this.x > window.innerWidth - margin) {
            this.vx *= -0.8;
            this.x = Math.max(margin, Math.min(window.innerWidth - margin, this.x));
        }
        if (this.y < margin || this.y > window.innerHeight - margin) {
            this.vy *= -0.8;
            this.y = Math.max(margin, Math.min(window.innerHeight - margin, this.y));
        }
        
        // Update DOM element
        this.element.style.left = (this.x - this.size / 2) + 'px';
        this.element.style.top = (this.y - this.size / 2) + 'px';
        this.element.style.transform = `scale(${pulseFactor}) rotate(${this.angle}rad)`;
        
        if (this.resonating) {
            this.element.style.filter = `brightness(2) saturate(2)`;
        } else {
            this.element.style.filter = '';
        }
    }
    
    destroy() {
        if (this.element && this.element.parentNode) {
            this.element.parentNode.removeChild(this.element);
        }
    }
}

// ==================== GAME STATE MANAGER ====================
class GameState {
    constructor() {
        this.phase = 0; // 0: Intro, 1: Gathering, 2: Weaving, 3: Resonance, 4: Unity
        this.resonance = 0;
        this.maxResonance = 100;
        this.fragments = [];
        this.connections = [];
        this.mouseX = 0;
        this.mouseY = 0;
        this.isDrawing = false;
        this.drawPath = [];
        this.audio = new AudioEngine();
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.startTime = Date.now();
        this.phaseStartTime = Date.now();
        
        this.narratives = [
            "Fragments of consciousness drift in the void...",
            "Draw connections between the fragments. Create harmony.",
            "The resonance grows stronger. Reality begins to shift.",
            "Patterns emerge from chaos. The weaving accelerates.",
            "Unity approaches. All fragments converge into one."
        ];
        
        this.phaseNames = [
            "AWAKENING",
            "GATHERING",
            "WEAVING", 
            "RESONANCE",
            "UNITY"
        ];
        
        this.colorPalettes = [
            ['#ff00ff', '#00ffff', '#ffff00'],
            ['#ff00aa', '#00ff00', '#ff8800'],
            ['#8800ff', '#00ffaa', '#ffaa00'],
            ['#ff0088', '#0088ff', '#88ff00'],
            ['#ffffff', '#aaaaaa', '#666666']
        ];
        
        this.init();
    }
    
    init() {
        this.setupCanvas();
        this.setupEventListeners();
        this.spawnFragments(5);
        this.showNarrative(0);
        this.updatePhaseIndicator();
    }
    
    setupCanvas() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        
        window.addEventListener('resize', () => {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
        });
    }
    
    setupEventListeners() {
        // Mouse movement
        document.addEventListener('mousemove', (e) => {
            this.mouseX = e.clientX;
            this.mouseY = e.clientY;
            
            // Update custom cursor
            const cursor = document.getElementById('cursor');
            cursor.style.left = (e.clientX - 20) + 'px';
            cursor.style.top = (e.clientY - 20) + 'px';
            
            if (this.isDrawing) {
                this.drawPath.push({x: e.clientX, y: e.clientY});
                if (this.drawPath.length > 50) {
                    this.drawPath.shift();
                }
            }
        });
        
        // Mouse interactions
        document.addEventListener('mousedown', (e) => {
            if (this.phase >= 1 && this.phase <= 3) {
                this.isDrawing = true;
                this.drawPath = [{x: e.clientX, y: e.clientY}];
                this.audio.playTone(440, 0.1);
            }
        });
        
        document.addEventListener('mouseup', () => {
            if (this.isDrawing) {
                this.processDrawing();
                this.isDrawing = false;
                this.drawPath = [];
            }
        });
        
        // Keyboard interactions
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' && this.phase < 4) {
                this.advancePhase();
            }
        });
    }
    
    spawnFragments(count) {
        const palette = this.colorPalettes[this.phase];
        for (let i = 0; i < count; i++) {
            const x = Math.random() * (window.innerWidth - 100) + 50;
            const y = Math.random() * (window.innerHeight - 100) + 50;
            const color = palette[Math.floor(Math.random() * palette.length)];
            const size = 20 + Math.random() * 30;
            const fragment = new Fragment(x, y, color, size, `frag_${Date.now()}_${i}`);
            this.fragments.push(fragment);
        }
    }
    
    processDrawing() {
        if (this.drawPath.length < 10) return;
        
        // Check if drawing path intersects multiple fragments
        const intersectedFragments = [];
        
        for (let fragment of this.fragments) {
            for (let point of this.drawPath) {
                const dist = Math.sqrt(
                    Math.pow(point.x - fragment.x, 2) + 
                    Math.pow(point.y - fragment.y, 2)
                );
                
                if (dist < fragment.size + 20) {
                    if (!intersectedFragments.includes(fragment)) {
                        intersectedFragments.push(fragment);
                    }
                    break;
                }
            }
        }
        
        // Create connections between intersected fragments
        if (intersectedFragments.length >= 2) {
            for (let i = 0; i < intersectedFragments.length - 1; i++) {
                for (let j = i + 1; j < intersectedFragments.length; j++) {
                    this.createConnection(intersectedFragments[i], intersectedFragments[j]);
                }
            }
            
            // Increase resonance
            const resonanceGain = intersectedFragments.length * 3;
            this.addResonance(resonanceGain);
            
            // Visual feedback
            this.createWaveEffect(this.mouseX, this.mouseY, '#00ffff');
            
            // Audio feedback
            this.audio.playConnection();
        }
    }
    
    createConnection(fragment1, fragment2) {
        // Check if connection already exists
        const connectionId = `${fragment1.id}_${fragment2.id}`;
        const reverseId = `${fragment2.id}_${fragment1.id}`;
        
        if (this.connections.find(c => c.id === connectionId || c.id === reverseId)) {
            return;
        }
        
        // Create connection object
        const connection = {
            id: connectionId,
            fragment1: fragment1,
            fragment2: fragment2,
            strength: 1,
            color: this.blendColors(fragment1.color, fragment2.color)
        };
        
        this.connections.push(connection);
        
        // Mark fragments as connected
        fragment1.connected = true;
        fragment2.connected = true;
        fragment1.connections.add(fragment2.id);
        fragment2.connections.add(fragment1.id);
        
        // Trigger resonance in connected fragments
        fragment1.resonating = true;
        fragment2.resonating = true;
        
        setTimeout(() => {
            fragment1.resonating = false;
            fragment2.resonating = false;
        }, 500);
    }
    
    blendColors(color1, color2) {
        // Simple color blending
        const colors = [color1, color2];
        return colors[Math.floor(Math.random() * colors.length)];
    }
    
    createWaveEffect(x, y, color) {
        const wave = document.createElement('div');
        wave.className = 'wave';
        wave.style.left = (x - 150) + 'px';
        wave.style.top = (y - 150) + 'px';
        wave.style.borderColor = color;
        document.body.appendChild(wave);
        
        setTimeout(() => {
            wave.remove();
        }, 1000);
    }
    
    createParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.background = color;
            
            const angle = (Math.PI * 2 / count) * i;
            const velocity = 100 + Math.random() * 100;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;
            
            document.body.appendChild(particle);
            
            let opacity = 1;
            const animate = () => {
                const currentX = parseFloat(particle.style.left);
                const currentY = parseFloat(particle.style.top);
                
                particle.style.left = (currentX + vx * 0.02) + 'px';
                particle.style.top = (currentY + vy * 0.02) + 'px';
                
                opacity -= 0.02;
                particle.style.opacity = opacity;
                
                if (opacity > 0) {
                    requestAnimationFrame(animate);
                } else {
                    particle.remove();
                }
            };
            
            requestAnimationFrame(animate);
        }
    }
    
    addResonance(amount) {
        this.resonance = Math.min(this.maxResonance, this.resonance + amount);
        document.getElementById('resonanceValue').textContent = Math.floor(this.resonance);
        document.getElementById('progressFill').style.width = (this.resonance / this.maxResonance * 100) + '%';
        
        // Check for phase advancement
        if (this.resonance >= 25 && this.phase === 1) {
            this.advancePhase();
        } else if (this.resonance >= 50 && this.phase === 2) {
            this.advancePhase();
        } else if (this.resonance >= 75 && this.phase === 3) {
            this.advancePhase();
        } else if (this.resonance >= 100 && this.phase === 4) {
            this.endGame();
        }
    }
    
    advancePhase() {
        this.phase++;
        this.phaseStartTime = Date.now();
        
        if (this.phase > 4) {
            this.endGame();
            return;
        }
        
        // Phase transition effects
        this.audio.playPhaseTransition();
        this.createWaveEffect(window.innerWidth / 2, window.innerHeight / 2, '#ffffff');
        
        // Update UI
        this.showNarrative(this.phase);
        this.updatePhaseIndicator();
        
        // Spawn new fragments for new phase
        if (this.phase <= 3) {
            this.spawnFragments(3 + this.phase);
        }
        
        // Special phase effects
        if (this.phase === 3) {
            // Resonance phase - fragments move faster
            this.fragments.forEach(f => {
                f.vx *= 2;
                f.vy *= 2;
            });
        } else if (this.phase === 4) {
            // Unity phase - all fragments converge
            this.initiateConvergence();
        }
    }
    
    updatePhaseIndicator() {
        const indicator = document.getElementById('phaseIndicator');
        indicator.textContent = `PHASE ${this.phase + 1}: ${this.phaseNames[this.phase]}`;
        indicator.style.opacity = 1;
        
        setTimeout(() => {
            indicator.style.opacity = 0;
        }, 3000);
    }
    
    showNarrative(index) {
        const narrative = document.getElementById('narrative');
        narrative.style.opacity = 0;
        
        setTimeout(() => {
            narrative.textContent = this.narratives[index];
            narrative.style.opacity = 1;
        }, 500);
        
        setTimeout(() => {
            narrative.style.opacity = 0;
        }, 5000);
    }
    
    initiateConvergence() {
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        
        // All fragments move toward center
        this.fragments.forEach((fragment, i) => {
            setTimeout(() => {
                const angle = (Math.PI * 2 / this.fragments.length) * i;
                const targetX = centerX + Math.cos(angle) * 100;
                const targetY = centerY + Math.sin(angle) * 100;
                
                const moveFragment = () => {
                    const dx = targetX - fragment.x;
                    const dy = targetY - fragment.y;
                    
                    fragment.x += dx * 0.05;
                    fragment.y += dy * 0.05;
                    
                    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
                        requestAnimationFrame(moveFragment);
                    } else {
                        fragment.resonating = true;
                        this.createParticles(fragment.x, fragment.y, 10, fragment.color);
                    }
                };
                
                moveFragment();
            }, i * 200);
        });
        
        // End game after convergence
        setTimeout(() => {
            this.endGame();
        }, 8000);
    }
    
    update(deltaTime) {
        // Update fragments
        this.fragments.forEach(fragment => {
            fragment.update(deltaTime, this.mouseX, this.mouseY);
        });
        
        // Draw connections
        this.drawConnections();
        
        // Draw current drawing path
        if (this.isDrawing && this.drawPath.length > 1) {
            this.drawCurrentPath();
        }
        
        // Background effects
        this.drawBackground();
    }
    
    drawBackground() {
        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        // Subtle grid pattern
        const time = Date.now() * 0.0001;
        this.ctx.strokeStyle = `rgba(255, 255, 255, 0.02)`;
        this.ctx.lineWidth = 1;
        
        const gridSize = 50;
        for (let x = 0; x < this.canvas.width; x += gridSize) {
            for (let y = 0; y < this.canvas.height; y += gridSize) {
                const offset = Math.sin(time + x * 0.01 + y * 0.01) * 5;
                this.ctx.beginPath();
                this.ctx.moveTo(x + offset, y);
                this.ctx.lineTo(x + gridSize + offset, y);
                this.ctx.stroke();
            }
        }
    }
    
    drawConnections() {
        this.ctx.lineCap = 'round';
        
        this.connections.forEach(connection => {
            const f1 = connection.fragment1;
            const f2 = connection.fragment2;
            
            // Calculate connection strength based on distance
            const distance = Math.sqrt(
                Math.pow(f2.x - f1.x, 2) + 
                Math.pow(f2.y - f1.y, 2)
            );
            
            const opacity = Math.max(0.1, 1 - distance / 500);
            
            // Draw connection line
            this.ctx.strokeStyle = connection.color + Math.floor(opacity * 255).toString(16).padStart(2, '0');
            this.ctx.lineWidth = 2 * opacity;
            
            this.ctx.beginPath();
            this.ctx.moveTo(f1.x, f1.y);
            
            // Curved connection
            const midX = (f1.x + f2.x) / 2;
            const midY = (f1.y + f2.y) / 2;
            const curve = Math.sin(Date.now() * 0.001) * 20;
            
            this.ctx.quadraticCurveTo(
                midX + curve,
                midY - curve,
                f2.x,
                f2.y
            );
            
            this.ctx.stroke();
            
            // Energy particles along connection
            if (Math.random() < 0.02) {
                const t = Math.random();
                const px = f1.x * (1 - t) + f2.x * t;
                const py = f1.y * (1 - t) + f2.y * t;
                this.createParticles(px, py, 2, connection.color);
            }
        });
    }
    
    drawCurrentPath() {
        if (this.drawPath.length < 2) return;
        
        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        this.ctx.lineWidth = 3;
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';
        
        this.ctx.beginPath();
        this.ctx.moveTo(this.drawPath[0].x, this.drawPath[0].y);
        
        for (let i = 1; i < this.drawPath.length; i++) {
            this.ctx.lineTo(this.drawPath[i].x, this.drawPath[i].y);
        }
        
        this.ctx.stroke();
        
        // Glow effect
        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        this.ctx.lineWidth = 10;
        this.ctx.stroke();
    }
    
    endGame() {
        // Calculate final score
        const totalConnections = this.connections.length;
        const timePlayed = Math.floor((Date.now() - this.startTime) / 1000);
        const finalScore = this.resonance * 10 + totalConnections * 50;
        
        // Show end screen
        const endScreen = document.getElementById('endScreen');
        const finalScoreElement = document.getElementById('finalScore');
        
        finalScoreElement.innerHTML = `
            RESONANCE ACHIEVED: ${Math.floor(this.resonance)}<br>
            CONNECTIONS WOVEN: ${totalConnections}<br>
            TIME ELAPSED: ${timePlayed} seconds<br>
            HARMONY SCORE: ${finalScore}
        `;
        
        endScreen.style.display = 'flex';
        
        setTimeout(() => {
            endScreen.style.opacity = '1';
        }, 100);
        
        // Final audio crescendo
        this.audio.playPhaseTransition();
        
        // Create final particle explosion
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const x = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
                const y = window.innerHeight / 2 + (Math.random() - 0.5) * 200;
                this.createParticles(x, y, 20, '#ffffff');
            }, i * 50);
        }
    }
}

// ==================== MAIN GAME CONTROLLER ====================
class ResonanceWeaver {
    constructor() {
        this.gameState = null;
        this.animationId = null;
        this.lastTime = Date.now();
        this.isRunning = false;
        
        this.init();
    }
    
    init() {
        // Setup start button
        document.getElementById('startButton').addEventListener('click', () => {
            this.startGame();
        });
    }
    
    startGame() {
        // Hide start screen
        const startScreen = document.getElementById('startScreen');
        startScreen.style.opacity = '0';
        
        setTimeout(() => {
            startScreen.style.display = 'none';
            
            // Initialize game state
            this.gameState = new GameState();
            this.isRunning = true;
            
            // Show UI elements
            document.getElementById('ui').style.opacity = '1';
            document.getElementById('resonanceDisplay').style.opacity = '0.8';
            
            // Start game loop
            this.gameLoop();
        }, 2000);
    }
    
    gameLoop() {
        if (!this.isRunning) return;
        
        const currentTime = Date.now();
        const deltaTime = currentTime - this.lastTime;
        this.lastTime = currentTime;
        
        // Update game state
        this.gameState.update(deltaTime);
        
        // Continue loop
        this.animationId = requestAnimationFrame(() => this.gameLoop());
    }
    
    stopGame() {
        this.isRunning = false;
        if (this.animationId) {
            cancelAnimationFrame(this.animationId);
        }
    }
}

// ==================== UTILITY FUNCTIONS ====================
function lerp(start, end, amount) {
    return start + (end - start) * amount;
}

function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
}

function randomRange(min, max) {
    return Math.random() * (max - min) + min;
}

function distance(x1, y1, x2, y2) {
    return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
}

// ==================== BROWSER COMPATIBILITY ====================
(function() {
    // RequestAnimationFrame polyfill
    const vendors = ['webkit', 'moz', 'ms', 'o'];
    for (let i = 0; i < vendors.length && !window.requestAnimationFrame; i++) {
        window.requestAnimationFrame = window[vendors[i] + 'RequestAnimationFrame'];
        window.cancelAnimationFrame = window[vendors[i] + 'CancelAnimationFrame'] ||
                                      window[vendors[i] + 'CancelRequestAnimationFrame'];
    }
    
    if (!window.requestAnimationFrame) {
        window.requestAnimationFrame = function(callback) {
            return setTimeout(callback, 1000 / 60);
        };
    }
    
    if (!window.cancelAnimationFrame) {
        window.cancelAnimationFrame = function(id) {
            clearTimeout(id);
        };
    }
})();
