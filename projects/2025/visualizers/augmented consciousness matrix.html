<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Augmented Consciousness Matrix</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; background: #000000; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.z = 5;
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    const stars = new THREE.Group();
    scene.add(stars);

    const parameters = {
      count: 5000,
      size: 0.1,
      radius: 40,
      branches: 5,
      spin: 1,
      randomness: 0.3,
      randomnessPower: 3,
      insideColor: '#ffffff',
      outsideColor: '#1b3984'
    };

    let geometry = null;
    let material = null;
    let points = null;

    function generateGalaxy() {
      if (stars.children[0] !== undefined) stars.remove(stars.children[0]);

      geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(parameters.count * 3);
      const colors = new Float32Array(parameters.count * 3);
      const colorInside = new THREE.Color(parameters.insideColor);
      const colorOutside = new THREE.Color(parameters.outsideColor);

      for (let i = 0; i < parameters.count; i++) {
        const i3 = i * 3;

        const radius = Math.random() * parameters.radius;
        const spinAngle = radius * parameters.spin;
        const branchAngle = (i % parameters.branches) / parameters.branches * Math.PI * 2;

        const randomX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? -1 : 1) * parameters.randomness * radius;
        const randomY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? -1 : 1) * parameters.randomness * radius;
        const randomZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? -1 : 1) * parameters.randomness * radius;

        positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
        positions[i3 + 1] = randomY;
        positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

        const mixedColor = colorInside.clone();
        mixedColor.lerp(colorOutside, radius / parameters.radius);

        colors[i3] = mixedColor.r;
        colors[i3 + 1] = mixedColor.g;
        colors[i3 + 2] = mixedColor.b;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      material = new THREE.PointsMaterial({
        size: parameters.size,
        sizeAttenuation: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true
      });

      points = new THREE.Points(geometry, material);
      stars.add(points);
    }

    generateGalaxy();

    const [noiseScale, speed, range] = [50, 2, 100];
    let t = 0;

    function animate() {
      t += 0.05;
      scene.rotation.y += 0.0025;
      stars.rotation.y += 0.0025;

      camera.position.x = Math.cos(t) * speed;
      camera.position.z = Math.sin(t) * speed;
      camera.position.y = noise(t, noiseScale) * (Math.sin(t * speed) + 0.5) * range;
      camera.lookAt(scene.position);

      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    function noise(x, scale) {
      return (Math.sin(x * scale) + Math.sin(x * 0.5 * scale) * 0.5 + Math.sin(x * 0.25 * scale) * 0.25) * 0.5;
    }
  </script>
</body>
</html>
