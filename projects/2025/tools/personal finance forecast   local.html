<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Personal Finance Forecast — Local</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="title">Finance Forecast</div>
      <div class="controls">
        <label>Months <input id="months" type="number" min="1" value="12"></label>
        <label>Start <input id="startBalance" type="number" step="0.01" value="1000"></label>
        <button id="addScenario" class="btn">New Scenario</button>
        <button id="exportCSV" class="btn ghost">Export CSV</button>
        <button id="clearAll" class="btn danger">Clear</button>
      </div>
    </header>

    <main class="main">
      <aside class="left">
        <section class="card">
          <div class="section-head">
            <strong>Scenarios</strong>
            <span class="muted small">select to compare</span>
          </div>
          <div id="scenarioList" class="list"></div>
        </section>

        <section class="card">
          <div class="section-head"><strong>Add Item</strong></div>
          <form id="itemForm" class="form">
            <input id="itemScenario" type="hidden">
            <div class="row">
              <input id="itemName" placeholder="Name (e.g., Salary)" required>
              <input id="itemAmt" type="number" placeholder="Amount" required>
            </div>
            <div class="row">
              <select id="itemType">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
              <select id="itemFreq">
                <option value="monthly">Monthly</option>
                <option value="one-time">One-time</option>
                <option value="annual">Annual</option>
              </select>
              <input id="itemStart" type="number" min="0" value="0" title="start month index (0 = first month)">
            </div>
            <div class="row actions">
              <button class="btn" type="submit">Add</button>
              <button id="importBtn" class="btn ghost" type="button">Import JSON</button>
            </div>
          </form>
        </section>

        <section class="card small" id="itemsPanel">
          <div class="section-head"><strong>Items</strong> <span id="itemsCount" class="muted small"></span></div>
          <div id="itemsList" class="items"></div>
        </section>
      </aside>

      <section class="right">
        <div class="card chart-card">
          <canvas id="chart"></canvas>
        </div>

        <div class="card small table-card">
          <div class="section-head"><strong>Projection table</strong></div>
          <div id="tableWrap" class="table-wrap"></div>
        </div>
      </section>
    </main>

    <footer class="foot small muted">
      Local-only. Data stored in this browser (localStorage). No servers.
    </footer>
  </div>

  <input id="fileImport" type="file" accept="application/json" style="display:none;">
  <script src="script.js"></script>
</body>
</html>
