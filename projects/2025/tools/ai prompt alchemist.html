<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Alchemist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Custom styles for the dark, glowing UI */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0f;
            color: #e0e0e0;
        }
        .title-font {
            font-family: 'Orbitron', sans-serif;
        }
        .glow-cyan {
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.5), 0 0 10px rgba(0, 255, 255, 0.3), 0 0 15px rgba(0, 255, 255, 0.2);
        }
        .glow-magenta {
            box-shadow: 0 0 5px rgba(255, 0, 255, 0.5), 0 0 10px rgba(255, 0, 255, 0.3), 0 0 15px rgba(255, 0, 255, 0.2);
        }
        .btn-glow {
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.8), 0 0 15px rgba(0, 255, 255, 0.6), 0 0 25px rgba(0, 255, 255, 0.4);
        }
        .btn-glow-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 8px rgba(255, 0, 100, 0.8), 0 0 15px rgba(255, 0, 100, 0.6), 0 0 25px rgba(255, 0, 100, 0.4);
        }
        .prompt-box {
            background-color: rgba(10, 20, 30, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            transition: box-shadow 0.3s ease;
        }
        .prompt-box:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.8), 0 0 15px rgba(0, 255, 255, 0.6);
        }
        .category-card {
            background-color: rgba(15, 25, 40, 0.7);
            border: 1px solid rgba(0, 180, 200, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .option-btn {
            background-color: rgba(0, 100, 120, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.2s ease;
        }
        .option-btn:hover {
            background-color: rgba(0, 255, 255, 0.3);
            border-color: rgba(0, 255, 255, 0.7);
            transform: scale(1.05);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.4);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 255, 0.7);
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-6 lg:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="title-font text-4xl sm:text-5xl lg:text-6xl font-bold text-cyan-300 tracking-wider">
                AI Prompt <span class="text-fuchsia-400">Alchemist</span>
            </h1>
            <p class="mt-2 text-lg text-cyan-100/80">Craft unimaginable prompts for generative AI art.</p>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Prompt Box and Controls -->
            <section id="prompt-output" class="mb-8">
                <div class="relative">
                    <textarea id="prompt-textarea" rows="6" class="prompt-box glow-cyan w-full p-4 rounded-lg text-lg text-white placeholder-gray-400 resize-y" placeholder="Your masterpiece prompt will appear here..."></textarea>
                    <div id="copy-feedback" class="absolute top-2 right-2 bg-green-500 text-white text-xs font-bold px-2 py-1 rounded-md opacity-0 transition-opacity duration-500">Copied!</div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-4">
                    <button id="copy-btn" class="btn-glow w-full bg-cyan-600 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy Prompt
                    </button>
                    <button id="random-btn" class="btn-glow w-full bg-fuchsia-600 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
                        Randomize
                    </button>
                     <button id="clear-btn" class="btn-glow-danger w-full bg-red-700 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        Clear
                    </button>
                    <button id="refine-btn" class="btn-glow w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2" title="Add random details to the current prompt">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8-5.6.8 4 4.2-1 5.8L12 16l5.5 3-1-5.8 4-4.2-5.6-.8z"/></svg>
                        Refine
                    </button>
                </div>
            </section>

            <!-- Prompt Builder Options -->
            <section id="prompt-builder">
                <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Categories will be injected here by JavaScript -->
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- DATABASE OF PROMPT COMPONENTS ---
        const promptData = {
            subject: [
                "A majestic lion", "A forgotten android", "A celestial goddess", "A lone astronaut", "A mythical kraken", "A steampunk inventor", "A spectral knight", "A crystal-infused golem", "A time-traveling historian", "The last dragon", "A sentient forest", "A city that walks", "A queen of the underworld", "An interdimensional cartographer"
            ],
            action: [
                "discovering a hidden realm", "casting a cosmic spell", "building a starship from scraps", "contemplating the end of the universe", "weaving the fabric of spacetime", "battling a psychic entity", "conducting a symphony of light", "deciphering an ancient prophecy", "navigating a dreamscape", "guarding a celestial gate", "planting a garden on a desolate moon"
            ],
            place: [
                "in a city made of glass", "within a biomechanical forest", "on the edge of a black hole", "inside a library containing all possible books", "atop the highest peak of a neon-drenched mountain", "in the ruins of a forgotten civilization", "amidst a field of floating, luminescent crystals", "in a palace carved from a single gemstone", "on a Möbius strip highway", "within a zero-gravity cathedral"
            ],
            style: [
                "Impressionism", "Expressionism", "Surrealism", "Cubism", "Art Nouveau", "Pop Art", "Minimalism", "Abstract", "Photorealistic", "Hyperrealistic", "Cel-shaded", "Anime key visual", "Ukiyo-e", "Baroque", "Gothic", "Steampunk", "Cyberpunk", "Solarpunk", "Biopunk", "Dieselpunk", "Atompunk", "Pastel Goth", "Vaporwave aesthetic"
            ],
            artist: [
                "in the style of H.R. Giger", "in the style of Zdzisław Beksiński", "in the style of James Jean", "in the style of Moebius", "in the style of Hayao Miyazaki", "in thestyle of Syd Mead", "in the style of Alphonse Mucha", "in the style of Greg Rutkowski", "in the style of Artgerm", "in the style of Banksy", "in the style of Salvador Dalí"
            ],
            elements: [
                "bioluminescent flora", "clockwork animals", "tentacles", "aurora borealis", "nebula clouds", "geometric patterns", "shattered glass", "liquid metal", "ancient runes", "holographic projections", "sentient smoke", "ethereal wisps", "crystalline structures", "impossible architecture", "cosmic dust", "glowing tattoos"
            ],
            lighting: [
                "Cinematic lighting", "Volumetric lighting", "Dramatic lighting", "Rim lighting", "Soft, diffused lighting", "Golden hour", "Blue hour", "Neon glow", "Caustic lighting", "God rays", "Studio lighting", "Backlighting", "Chiaroscuro", "Hard shadows", "Flickering candlelight"
            ],
            color: [
                "Vibrant color palette", "Monochromatic", "Analogous colors", "Complementary colors", "Triadic colors", "Pastel colors", "Neon color palette", "Iridescent", "Duotone", "Sepia tone", "Grayscale with a splash of color", "Electric hues", "Earthy tones"
            ],
            composition: [
                "Wide-angle shot", "Macro shot", "Close-up portrait", "Dutch angle", "Symmetrical", "Asymmetrical", "Leading lines", "Rule of thirds", "Bird's-eye view", "Worm's-eye view", "Epic cinematic shot", "Shallow depth of field", "Deep depth of field", "Fisheye lens"
            ],
            quality: [
                "masterpiece", "best quality", "highly detailed", "intricate detail", "4K", "8K", "UHD", "sharp focus", "trending on ArtStation", "Unreal Engine 5", "Octane render", "V-Ray", "physically-based rendering", "subsurface scattering", "ray tracing"
            ]
        };

        // --- DOM ELEMENT REFERENCES ---
        const promptTextarea = document.getElementById('prompt-textarea');
        const copyBtn = document.getElementById('copy-btn');
        const randomBtn = document.getElementById('random-btn');
        const clearBtn = document.getElementById('clear-btn');
        const refineBtn = document.getElementById('refine-btn');
        const copyFeedback = document.getElementById('copy-feedback');
        const optionsContainer = document.getElementById('options-container');

        // --- CORE FUNCTIONS ---

        /**
         * Appends a given text to the main prompt textarea.
         * Handles adding a comma and space if the textarea is not empty.
         * @param {string} text - The text to add to the prompt.
         */
        function addToPrompt(text) {
            if (promptTextarea.value.trim() !== '' && !promptTextarea.value.endsWith(', ')) {
                promptTextarea.value += ', ';
            }
            promptTextarea.value += text;
            promptTextarea.focus();
            // Auto-scroll to the end
            promptTextarea.scrollTop = promptTextarea.scrollHeight;
        }
        
        /**
         * Gets a random element from an array.
         * @param {Array} arr - The array to pick from.
         * @returns {*} A random element from the array.
         */
        function getRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        /**
         * Shuffles an array in place.
         * @param {Array} array - The array to shuffle.
         * @returns {Array} The shuffled array.
         */
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        /**
         * Generates a highly randomized and detailed prompt.
         */
        function generateRandomPrompt() {
            let prompt = [];

            // 1. Core Concept (Subject + Action + Place) - always included
            const coreConcept = [
                getRandomElement(promptData.subject),
                getRandomElement(promptData.action),
                getRandomElement(promptData.place)
            ];
            prompt.push(...coreConcept);

            // 2. Visual Style (Art Style or Artist)
            if (Math.random() > 0.3) { // 70% chance to add a style
                prompt.push(getRandomElement(promptData.style));
            }
            if (Math.random() > 0.7) { // 30% chance to add an artist
                prompt.push(getRandomElement(promptData.artist));
            }

            // 3. Add supporting details (random number of each)
            const detailCategories = ['elements', 'lighting', 'color', 'composition', 'quality'];
            let details = [];

            detailCategories.forEach(category => {
                // Add 1 to 3 details from each category, with a chance of skipping
                const numToAdd = Math.floor(Math.random() * 4); // 0 to 3
                for (let i = 0; i < numToAdd; i++) {
                    details.push(getRandomElement(promptData[category]));
                }
            });
            
            // Remove duplicates and shuffle for more variety
            details = [...new Set(details)];
            shuffleArray(details);

            prompt.push(...details);
            
            promptTextarea.value = prompt.join(', ');
        }

        /**
         * Adds random details to the existing prompt.
         */
        function refinePrompt() {
            if (promptTextarea.value.trim() === '') {
                generateRandomPrompt();
                return;
            }

            let details = [];
            const detailCategories = ['elements', 'lighting', 'color', 'composition', 'quality'];
            const numToRefine = Math.floor(Math.random() * 3) + 2; // Add 2 to 4 new details

            for (let i = 0; i < numToRefine; i++) {
                const randomCategory = getRandomElement(detailCategories);
                details.push(getRandomElement(promptData[randomCategory]));
            }
            
            // Remove duplicates that might already be in the prompt
            const existingPromptParts = promptTextarea.value.split(',').map(s => s.trim());
            const uniqueDetails = [...new Set(details)].filter(d => !existingPromptParts.includes(d));

            if (uniqueDetails.length > 0) {
                addToPrompt(uniqueDetails.join(', '));
            }
        }

        /**
         * Dynamically creates and populates the option categories.
         */
        function buildOptionsUI() {
            for (const category in promptData) {
                const categoryTitle = category.charAt(0).toUpperCase() + category.slice(1);
                
                const card = document.createElement('div');
                card.className = 'category-card rounded-lg p-4 flex flex-col';
                
                const title = document.createElement('h3');
                title.className = 'title-font text-xl font-bold mb-3 text-cyan-200 border-b border-cyan-500/30 pb-2';
                title.textContent = categoryTitle;
                card.appendChild(title);

                const buttonContainer = document.createElement('div');
                buttonContainer.className = 'flex flex-wrap gap-2';
                
                promptData[category].forEach(option => {
                    const button = document.createElement('button');
                    button.className = 'option-btn text-sm text-cyan-100/90 py-1 px-3 rounded-full';
                    button.textContent = option;
                    button.onclick = () => addToPrompt(option);
                    buttonContainer.appendChild(button);
                });

                card.appendChild(buttonContainer);
                optionsContainer.appendChild(card);
            }
        }

        // --- EVENT LISTENERS ---
        copyBtn.addEventListener('click', () => {
            if (!promptTextarea.value) return;

            // Use a temporary textarea to copy for better compatibility
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = promptTextarea.value;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            try {
                document.execCommand('copy');
                // Show feedback
                copyFeedback.style.opacity = '1';
                setTimeout(() => {
                    copyFeedback.style.opacity = '0';
                }, 2000);
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }
            document.body.removeChild(tempTextArea);
        });

        randomBtn.addEventListener('click', generateRandomPrompt);

        clearBtn.addEventListener('click', () => {
            promptTextarea.value = '';
        });

        refineBtn.addEventListener('click', refinePrompt);

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            buildOptionsUI();
        });
    </script>
</body>
</html>
