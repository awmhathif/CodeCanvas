<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporal Light Painting</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
        }
        .controls button, .controls select {
            margin: 5px;
            padding: 8px 12px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .controls button:hover {
            background-color: #555;
        }
        .info {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <h3>Temporal Light Painting</h3>
        <button id="add-particles">Add Particles</button>
        <button id="clear">Clear Canvas</button>
        <div>
            <label for="mode-select">Mode:</label>
            <select id="mode-select">
                <option value="orbit">Orbital</option>
                <option value="flow">Flow Field</option>
                <option value="audio">Audio Reactive</option>
                <option value="mouse">Mouse Follow</option>
            </select>
        </div>
        <div>
            <label for="decay-select">Trail Length:</label>
            <select id="decay-select">
                <option value="0.05">Short</option>
                <option value="0.02" selected>Medium</option>
                <option value="0.005">Long</option>
                <option value="0.001">Very Long</option>
            </select>
        </div>
        <div>
            <label for="color-mode">Color Mode:</label>
            <select id="color-mode">
                <option value="rainbow">Rainbow</option>
                <option value="complementary">Complementary</option>
                <option value="monochrome">Monochrome</option>
            </select>
        </div>
    </div>
    
    <div class="info">
        <p>Particles: <span id="particle-count">0</span></p>
        <p>FPS: <span id="fps">0</span></p>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas to full window size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Particle system
        let particles = [];
        let decayRate = 0.02;
        let currentMode = 'orbit';
        let colorMode = 'rainbow';
        let baseHue = 0;
        let flowField = [];
        let flowFieldSize = 20;
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let audioData = new Uint8Array(128);
        let audioContext;
        let audioAnalyser;
        let audioInitialized = false;
        
        // FPS tracking
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 0;
        
        // Initialize flow field
        function initFlowField() {
            flowField = [];
            const cols = Math.ceil(canvas.width / flowFieldSize);
            const rows = Math.ceil(canvas.height / flowFieldSize);
            
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const angle = noise(x * 0.1, y * 0.1) * Math.PI * 2;
                    flowField.push(angle);
                }
            }
        }
        
        // Simple noise function (could be replaced with Perlin noise for better results)
        function noise(x, y) {
            return Math.sin(x * 10 + y * 8) * Math.cos(x * 8 - y * 6) * 0.5 + 0.5;
        }
        
        // Initialize audio context
        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                    .then(stream => {
                        const source = audioContext.createMediaStreamSource(stream);
                        audioAnalyser = audioContext.createAnalyser();
                        audioAnalyser.fftSize = 256;
                        source.connect(audioAnalyser);
                        audioInitialized = true;
                        alert("Audio input initialized! Make some noise to see the visualization react.");
                    })
                    .catch(err => {
                        console.error("Error accessing microphone:", err);
                        alert("Could not access microphone. Switching to orbit mode.");
                        currentMode = 'orbit';
                        document.getElementById('mode-select').value = 'orbit';
                    });
            } catch (err) {
                console.error("Web Audio API not supported:", err);
                alert("Audio visualization not supported in this browser. Switching to orbit mode.");
                currentMode = 'orbit';
                document.getElementById('mode-select').value = 'orbit';
            }
        }
        
        // Particle class
        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.hue = Math.random() * 360;
                this.brightness = 50 + Math.random() * 50;
                this.alpha = 1;
                this.history = [];
                this.maxHistory = 20 + Math.floor(Math.random() * 30); // Variable trail length
            }
            
            update() {
                // Save current position to history
                this.history.push({ x: this.x, y: this.y });
                
                // Limit history length
                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }
                
                // Different movement patterns based on mode
                switch (currentMode) {
                    case 'orbit':
                        // Orbital movement
                        const centerX = canvas.width / 2;
                        const centerY = canvas.height / 2;
                        const angle = Math.atan2(this.y - centerY, this.x - centerX);
                        const distance = Math.sqrt((this.x - centerX) ** 2 + (this.y - centerY) ** 2);
                        const orbitSpeed = 0.01 + (300 / (distance + 100)) * 0.02;
                        
                        this.speedX = -Math.sin(angle) * distance * 0.01;
                        this.speedY = Math.cos(angle) * distance * 0.01;
                        break;
                        
                    case 'flow':
                        // Flow field movement
                        const col = Math.floor(this.x / flowFieldSize);
                        const row = Math.floor(this.y / flowFieldSize);
                        const index = row * Math.ceil(canvas.width / flowFieldSize) + col;
                        
                        if (flowField[index]) {
                            const angle = flowField[index];
                            const force = 0.5;
                            this.speedX = Math.cos(angle) * force;
                            this.speedY = Math.sin(angle) * force;
                        }
                        break;
                        
                    case 'audio':
                        // Audio reactive movement
                        if (audioInitialized) {
                            audioAnalyser.getByteFrequencyData(audioData);
                            const audioIndex = Math.floor(this.x / canvas.width * audioData.length);
                            const audioValue = audioData[audioIndex] / 255.0;
                            
                            const angle = Math.atan2(this.y - canvas.height/2, this.x - canvas.width/2);
                            const distance = Math.sqrt((this.x - canvas.width/2) ** 2 + (this.y - canvas.height/2) ** 2);
                            
                            this.speedX = Math.cos(angle) * audioValue * 2;
                            this.speedY = Math.sin(angle) * audioValue * 2;
                            this.brightness = 50 + audioValue * 50;
                        }
                        break;
                        
                    case 'mouse':
                        // Mouse following
                        const dx = mouseX - this.x;
                        const dy = mouseY - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist > 0.1) {
                            this.speedX += dx * 0.001;
                            this.speedY += dy * 0.001;
                        }
                        
                        // Add some randomness
                        this.speedX += (Math.random() - 0.5) * 0.2;
                        this.speedY += (Math.random() - 0.5) * 0.2;
                        
                        // Limit speed
                        const maxSpeed = 2;
                        const speed = Math.sqrt(this.speedX * this.speedX + this.speedY * this.speedY);
                        if (speed > maxSpeed) {
                            this.speedX = (this.speedX / speed) * maxSpeed;
                            this.speedY = (this.speedY / speed) * maxSpeed;
                        }
                        break;
                }
                
                // Apply velocity
                this.x += this.speedX;
                this.y += this.speedY;
                
                // Boundary checking with wrapping
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
                
                // Update color based on mode
                if (colorMode === 'rainbow') {
                    this.hue = (this.hue + 0.5) % 360;
                } else if (colorMode === 'complementary') {
                    this.hue = (baseHue + Math.sin(this.x * 0.01) * 60) % 360;
                } else if (colorMode === 'monochrome') {
                    this.hue = baseHue;
                    this.brightness = 50 + Math.sin(performance.now() * 0.001 + this.x * 0.1) * 25;
                }
            }
            
            draw() {
                // Draw trail
                ctx.strokeStyle = `hsla(${this.hue}, 100%, ${this.brightness}%, ${this.alpha})`;
                ctx.lineWidth = this.size;
                ctx.beginPath();
                
                if (this.history.length > 1) {
                    ctx.moveTo(this.history[0].x, this.history[0].y);
                    
                    for (let i = 1; i < this.history.length; i++) {
                        const point = this.history[i];
                        ctx.lineTo(point.x, point.y);
                    }
                    
                    ctx.lineTo(this.x, this.y);
                    ctx.stroke();
                }
                
                // Draw current position
                ctx.fillStyle = `hsla(${this.hue}, 100%, ${this.brightness}%, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Create particles
        function addParticles(count = 50) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
            updateParticleCount();
        }
        
        // Update particle count display
        function updateParticleCount() {
            document.getElementById('particle-count').textContent = particles.length;
        }
        
        // Animation loop
        function animate() {
            // Apply decay effect (this creates the fading trails)
            ctx.fillStyle = `rgba(0, 0, 0, ${decayRate})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update and draw particles
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // Update base hue
            baseHue = (baseHue + 0.5) % 360;
            
            // Calculate FPS
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = Math.round((frameCount * 1000) / (currentTime - lastTime));
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
            }
            
            requestAnimationFrame(animate);
        }
        
        // Event listeners
        document.getElementById('add-particles').addEventListener('click', () => {
            addParticles(50);
        });
        
        document.getElementById('clear').addEventListener('click', () => {
            particles = [];
            updateParticleCount();
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });
        
        document.getElementById('mode-select').addEventListener('change', (e) => {
            currentMode = e.target.value;
            if (currentMode === 'flow') {
                initFlowField();
            } else if (currentMode === 'audio' && !audioInitialized) {
                initAudio();
            }
        });
        
        document.getElementById('decay-select').addEventListener('change', (e) => {
            decayRate = parseFloat(e.target.value);
        });
        
        document.getElementById('color-mode').addEventListener('change', (e) => {
            colorMode = e.target.value;
        });
        
        // Track mouse position
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (currentMode === 'flow') {
                initFlowField();
            }
        });
        
        // Initialize
        initFlowField();
        addParticles(100);
        animate();
    </script>
</body>
</html>
