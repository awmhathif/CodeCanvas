<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Flux Counter</title>
    <style>
        :root {
            --primary-glow: #00f7ff;
            --secondary-glow: #ff00aa;
            --tertiary-glow: #7700ff;
            --bg-color: #0a0a20;
            --text-color: #e0e0ff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
            user-select: none;
        }
        
        .quantum-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(10, 10, 40, 0.7);
            box-shadow: 0 0 30px rgba(0, 247, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 247, 255, 0.1);
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            z-index: 10;
        }
        
        .quantum-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow), var(--tertiary-glow));
            z-index: -1;
            border-radius: 22px;
            animation: borderGlow 8s linear infinite;
            background-size: 400%;
            opacity: 0.7;
        }
        
        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 247, 255, 0.3);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            from { text-shadow: 0 0 10px rgba(0, 247, 255, 0.3), 0 0 20px rgba(0, 247, 255, 0.2); }
            to { text-shadow: 0 0 20px rgba(0, 247, 255, 0.5), 0 0 30px rgba(0, 247, 255, 0.3), 0 0 40px rgba(0, 247, 255, 0.2); }
        }
        
        .counter-display {
            font-size: 8rem;
            text-align: center;
            margin: 30px 0;
            font-weight: 700;
            position: relative;
            transition: all 0.3s ease;
            text-shadow: 0 0 15px var(--primary-glow);
        }
        
        .counter-display::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-glow), transparent);
            opacity: 0.7;
        }
        
        .counter-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            background: rgba(0, 247, 255, 0.1);
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            outline: none;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 247, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.1);
        }
        
        .control-btn:hover {
            background: rgba(0, 247, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.3);
            transform: translateY(-3px);
        }
        
        .control-btn:active {
            transform: translateY(1px);
        }
        
        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 247, 255, 0.4), transparent);
            transition: 0.5s;
        }
        
        .control-btn:hover::before {
            left: 100%;
        }
        
        .settings-panel {
            margin-top: 40px;
            padding: 20px;
            background: rgba(0, 10, 20, 0.5);
            border-radius: 15px;
            border: 1px solid rgba(0, 247, 255, 0.1);
        }
        
        .settings-title {
            text-align: center;
            margin-bottom: 15px;
            color: var(--primary-glow);
            font-size: 1.2rem;
        }
        
        .setting-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }
        
        .setting-label {
            font-size: 0.9rem;
            color: var(--text-color);
        }
        
        .setting-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: var(--primary-glow);
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        .particle {
            position: absolute;
            background: var(--primary-glow);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
        }
        
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 247, 255, 0.4);
            transform: scale(0);
            pointer-events: none;
            animation: ripple 1s linear;
        }
        
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        
        .count-animation {
            animation: countPop 0.5s ease-out;
        }
        
        @keyframes countPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); text-shadow: 0 0 30px var(--secondary-glow); }
            100% { transform: scale(1); }
        }
        
        .quantum-wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" fill="%2300f7ff" opacity=".25"/><path d="M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z" fill="%2300f7ff" opacity=".5"/><path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" fill="%2300f7ff"/></svg>');
            background-size: cover;
            background-repeat: no-repeat;
            opacity: 0.1;
            z-index: -1;
            animation: waveMove 20s linear infinite;
        }
        
        @keyframes waveMove {
            0% { background-position-x: 0; }
            100% { background-position-x: 1200px; }
        }
        
        .holographic-line {
            position: absolute;
            height: 1px;
            width: 100%;
            background: linear-gradient(90deg, transparent, var(--primary-glow), transparent);
            opacity: 0.3;
            z-index: -1;
            animation: lineScan 8s linear infinite;
        }
        
        @keyframes lineScan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        
        .keyboard-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(224, 224, 255, 0.6);
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .quantum-container {
                padding: 20px;
                width: 95%;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .counter-display {
                font-size: 5rem;
            }
            
            .control-btn {
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .counter-controls {
                flex-direction: column;
                align-items: center;
            }
            
            .counter-display {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <div class="quantum-container">
        <h1>Quantum Flux Counter</h1>
        
        <div class="counter-display" id="counter">0</div>
        
        <div class="counter-controls">
            <button class="control-btn" id="decrement">DECREMENT</button>
            <button class="control-btn" id="increment">INCREMENT</button>
            <button class="control-btn" id="reset">RESET</button>
        </div>
        
        <div class="settings-panel">
            <div class="settings-title">ADVANCED SETTINGS</div>
            
            <div class="setting-option">
                <span class="setting-label">Spacebar Counting</span>
                <div class="setting-control">
                    <label class="toggle-switch">
                        <input type="checkbox" id="spacebarToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            
            <div class="setting-option">
                <span class="setting-label">Animation Intensity</span>
                <div class="setting-control">
                    <input type="range" id="animationIntensity" min="1" max="10" value="5">
                </div>
            </div>
            
            <div class="setting-option">
                <span class="setting-label">Glow Effect</span>
                <div class="setting-control">
                    <label class="toggle-switch">
                        <input type="checkbox" id="glowToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="keyboard-hint">Press SPACEBAR to count (when enabled) | Arrow keys also work</div>
    </div>
    
    <div class="quantum-wave"></div>
    <div class="holographic-line"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const counterElement = document.getElementById('counter');
            const incrementBtn = document.getElementById('increment');
            const decrementBtn = document.getElementById('decrement');
            const resetBtn = document.getElementById('reset');
            const spacebarToggle = document.getElementById('spacebarToggle');
            const animationIntensity = document.getElementById('animationIntensity');
            const glowToggle = document.getElementById('glowToggle');
            const quantumContainer = document.querySelector('.quantum-container');
            
            let count = 0;
            let animationLevel = 5;
            let glowEnabled = true;
            let spacebarEnabled = true;
            
            // Initialize from localStorage
            if (localStorage.getItem('quantumCounter')) {
                count = parseInt(localStorage.getItem('quantumCounter'));
                counterElement.textContent = count;
            }
            
            if (localStorage.getItem('animationLevel')) {
                animationLevel = parseInt(localStorage.getItem('animationLevel'));
                animationIntensity.value = animationLevel;
            }
            
            if (localStorage.getItem('glowEnabled')) {
                glowEnabled = localStorage.getItem('glowEnabled') === 'true';
                glowToggle.checked = glowEnabled;
                updateGlowEffect();
            }
            
            if (localStorage.getItem('spacebarEnabled')) {
                spacebarEnabled = localStorage.getItem('spacebarEnabled') === 'true';
                spacebarToggle.checked = spacebarEnabled;
            }
            
            // Update counter display with animation
            function updateCounter() {
                counterElement.textContent = count;
                counterElement.classList.add('count-animation');
                
                // Create particles
                if (animationLevel > 3) {
                    createParticles();
                }
                
                // Create ripple effect
                if (animationLevel > 5) {
                    createRipple();
                }
                
                // Save to localStorage
                localStorage.setItem('quantumCounter', count.toString());
                
                // Remove animation class after animation completes
                setTimeout(() => {
                    counterElement.classList.remove('count-animation');
                }, 500);
            }
            
            // Create particle explosion
            function createParticles() {
                const particleCount = Math.min(50, animationLevel * 8);
                const colors = ['#00f7ff', '#ff00aa', '#7700ff', '#ffffff'];
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    
                    // Random properties
                    const size = Math.random() * 5 + 2;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const duration = Math.random() * 2 + 1;
                    const delay = Math.random() * 0.5;
                    
                    // Position at counter element
                    const counterRect = counterElement.getBoundingClientRect();
                    const x = counterRect.left + counterRect.width / 2;
                    const y = counterRect.top + counterRect.height / 2;
                    
                    // Set particle styles
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.background = color;
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    
                    // Add to document
                    document.body.appendChild(particle);
                    
                    // Animate particle
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 100 * (animationLevel / 5);
                    const xEnd = x + Math.cos(angle) * distance;
                    const yEnd = y + Math.sin(angle) * distance;
                    
                    particle.animate([
                        { 
                            transform: 'translate(0, 0) scale(1)',
                            opacity: 1 
                        },
                        { 
                            transform: `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(0)`,
                            opacity: 0 
                        }
                    ], {
                        duration: duration * 1000,
                        delay: delay * 1000,
                        easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
                        fill: 'forwards'
                    });
                    
                    // Remove particle after animation
                    setTimeout(() => {
                        particle.remove();
                    }, (duration + delay) * 1000);
                }
            }
            
            // Create ripple effect
            function createRipple() {
                const counterRect = counterElement.getBoundingClientRect();
                const x = counterRect.left + counterRect.width / 2;
                const y = counterRect.top + counterRect.height / 2;
                
                const ripple = document.createElement('div');
                ripple.classList.add('ripple');
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                document.body.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 1000);
            }
            
            // Update glow effect based on toggle
            function updateGlowEffect() {
                if (glowEnabled) {
                    document.documentElement.style.setProperty('--primary-glow', '#00f7ff');
                    document.documentElement.style.setProperty('--secondary-glow', '#ff00aa');
                    document.documentElement.style.setProperty('--tertiary-glow', '#7700ff');
                } else {
                    document.documentElement.style.setProperty('--primary-glow', '#ffffff');
                    document.documentElement.style.setProperty('--secondary-glow', '#dddddd');
                    document.documentElement.style.setProperty('--tertiary-glow', '#bbbbbb');
                }
            }
            
            // Increment function
            function increment() {
                count++;
                updateCounter();
                
                // Container tilt effect
                if (animationLevel > 3) {
                    quantumContainer.style.transform = 'rotateY(5deg) rotateX(-2deg)';
                    setTimeout(() => {
                        quantumContainer.style.transform = 'rotateY(0) rotateX(0)';
                    }, 300);
                }
            }
            
            // Decrement function
            function decrement() {
                count--;
                updateCounter();
                
                // Container tilt effect
                if (animationLevel > 3) {
                    quantumContainer.style.transform = 'rotateY(-5deg) rotateX(2deg)';
                    setTimeout(() => {
                        quantumContainer.style.transform = 'rotateY(0) rotateX(0)';
                    }, 300);
                }
            }
            
            // Reset function
            function reset() {
                count = 0;
                updateCounter();
                
                // Special reset animation
                if (animationLevel > 2) {
                    quantumContainer.animate([
                        { transform: 'scale(1)' },
                        { transform: 'scale(0.9)' },
                        { transform: 'scale(1.1)' },
                        { transform: 'scale(1)' }
                    ], {
                        duration: 500,
                        easing: 'ease-out'
                    });
                }
            }
            
            // Event listeners for buttons
            incrementBtn.addEventListener('click', increment);
            decrementBtn.addEventListener('click', decrement);
            resetBtn.addEventListener('click', reset);
            
            // Keyboard controls
            document.addEventListener('keydown', function(e) {
                if (e.code === 'ArrowUp' || e.code === 'ArrowRight') {
                    increment();
                } else if (e.code === 'ArrowDown' || e.code === 'ArrowLeft') {
                    decrement();
                } else if (e.code === 'Space' && spacebarEnabled) {
                    increment();
                    e.preventDefault(); // Prevent spacebar from scrolling
                } else if (e.code === 'Escape') {
                    reset();
                }
            });
            
            // Settings change listeners
            spacebarToggle.addEventListener('change', function() {
                spacebarEnabled = this.checked;
                localStorage.setItem('spacebarEnabled', spacebarEnabled.toString());
            });
            
            animationIntensity.addEventListener('input', function() {
                animationLevel = parseInt(this.value);
                localStorage.setItem('animationLevel', animationLevel.toString());
            });
            
            glowToggle.addEventListener('change', function() {
                glowEnabled = this.checked;
                localStorage.setItem('glowEnabled', glowEnabled.toString());
                updateGlowEffect();
            });
            
            // Mouse move parallax effect
            document.addEventListener('mousemove', function(e) {
                if (animationLevel > 7) {
                    const x = e.clientX / window.innerWidth;
                    const y = e.clientY / window.innerHeight;
                    
                    quantumContainer.style.transform = `
                        rotateX(${(y - 0.5) * 5}deg)
                        rotateY(${(x - 0.5) * -5}deg)
                    `;
                }
            });
            
            // Mouse leave reset position
            quantumContainer.addEventListener('mouseleave', function() {
                quantumContainer.style.transform = 'rotateX(0) rotateY(0)';
            });
            
            // Initial animation
            setTimeout(() => {
                quantumContainer.style.opacity = '1';
                quantumContainer.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
