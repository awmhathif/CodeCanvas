<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Type Tester</title>
    <style>
        :root {
            --primary-color: #00ff88;
            --secondary-color: #0066ff;
            --background-color: #111;
            --text-color: #fff;
            --error-color: #ff3366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 2rem auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .title {
            font-size: 3rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px var(--primary-color);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px var(--primary-color);
            }
            to {
                text-shadow: 0 0 20px var(--primary-color);
            }
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .typing-area {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-display {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #666;
        }

        .text-display span {
            position: relative;
        }

        .text-display span.active {
            color: var(--text-color);
            background: rgba(0, 255, 136, 0.1);
        }

        .text-display span.correct {
            color: var(--primary-color);
        }

        .text-display span.incorrect {
            color: var(--error-color);
        }

        .input-area {
            position: relative;
            width: 100%;
        }

        .type-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            transition: all 0.3s ease;
        }

        .type-input:focus {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--primary-color);
            color: var(--background-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        .settings-panel {
            position: fixed;
            right: -300px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            padding: 2rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .settings-panel.active {
            right: 0;
        }

        .settings-title {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .setting-item {
            margin-bottom: 1.5rem;
        }

        .setting-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        .setting-input {
            width: 100%;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: var(--text-color);
        }

        .visual-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(
                180deg,
                transparent,
                rgba(0, 255, 136, 0.1)
            );
            animation: wave 3s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .achievements {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
        }

        .achievement {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .achievement-icon {
            font-size: 1.5rem;
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--primary-color);
            transition: width 0.3s ease;
        }

        @media (max-width: 768px) {
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .title {
                font-size: 2rem;
            }

            .text-display {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .stats-container {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="title">Futuristic Type Tester</h1>
        </header>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">WPM</div>
                <div class="stat-value" id="wpm">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Accuracy</div>
                <div class="stat-value" id="accuracy">0%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="time">60s</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Characters</div>
                <div class="stat-value" id="characters">0</div>
            </div>
        </div>

        <div class="typing-area">
            <div class="text-display" id="textDisplay"></div>
            <div class="input-area">
                <input type="text" class="type-input" id="typeInput" placeholder="Start typing here..." autocomplete="off">
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="startBtn">Start Test</button>
            <button class="btn" id="resetBtn">Reset</button>
            <button class="btn" id="settingsBtn">Settings</button>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <h2 class="settings-title">Settings</h2>
        <div class="setting-item">
            <label class="setting-label">Test Duration (seconds)</label>
            <input type="number" class="setting-input" id="durationInput" value="60" min="10" max="300">
        </div>
        <div class="setting-item">
            <label class="setting-label">Theme</label>
            <select class="setting-input" id="themeSelect">
                <option value="default">Default</option>
                <option value="cyberpunk">Cyberpunk</option>
                <option value="matrix">Matrix</option>
                <option value="neon">Neon</option>
            </select>
        </div>
        <div class="setting-item">
            <label class="setting-label">Sound Effects</label>
            <input type="checkbox" id="soundToggle" checked>
        </div>
    </div>

    <div class="visual-effects">
        <div class="wave"></div>
    </div>

    <div class="achievements" id="achievements"></div>

    <script>
        const textDisplay = document.getElementById('textDisplay');
        const typeInput = document.getElementById('typeInput');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const timeDisplay = document.getElementById('time');
        const charactersDisplay = document.getElementById('characters');
        const progressBar = document.getElementById('progressBar');
        const achievements = document.getElementById('achievements');

        let timeLeft = 60;
        let timer = null;
        let isTestActive = false;
        let currentWordIndex = 0;
        let correctCharacters = 0;
        let totalCharacters = 0;

        const texts = [
            "The quick brown fox jumps over the lazy dog.",
            "Programming is the art of telling another human what one wants the computer to do.",
            "Technology is best when it brings people together.",
            "The only way to do great work is to love what you do.",
            "Innovation distinguishes between a leader and a follower."
        ];

        function initializeTest() {
            const randomText = texts[Math.floor(Math.random() * texts.length)];
            textDisplay.innerHTML = randomText.split('').map(char => 
                `<span>${char}</span>`
            ).join('');
            currentWordIndex = 0;
            correctCharacters = 0;
            totalCharacters = 0;
            typeInput.value = '';
            typeInput.disabled = false;
            updateStats();
        }

        function startTest() {
            if (isTestActive) return;
            isTestActive = true;
            timeLeft = parseInt(document.getElementById('durationInput').value);
            initializeTest();
            timer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft + 's';
                progressBar.style.width = ((60 - timeLeft) / 60 * 100) + '%';
                
                if (timeLeft <= 0) {
                    endTest();
                }
            }, 1000);
            typeInput.focus();
        }

        function endTest() {
            clearInterval(timer);
            isTestActive = false;
            typeInput.disabled = true;
            checkAchievements();
        }

        function resetTest() {
            clearInterval(timer);
            isTestActive = false;
            timeLeft = 60;
            timeDisplay.textContent = timeLeft + 's';
            progressBar.style.width = '0%';
            initializeTest();
        }

        function updateStats() {
            const minutes = (60 - timeLeft) / 60;
            const wpm = Math.round(correctCharacters / 5 / minutes) || 0;
            const accuracy = totalCharacters > 0 
                ? Math.round((correctCharacters / totalCharacters) * 100) 
                : 0;

            wpmDisplay.textContent = wpm;
            accuracyDisplay.textContent = accuracy + '%';
            charactersDisplay.textContent = correctCharacters;
        }

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            document.body.appendChild(particle);

            const size = Math.random() * 10 + 5;
            const destinationX = x + (Math.random() - 0.5) * 100;
            const destinationY = y - Math.random() * 100;

            particle.style.width = size + 'px';
            particle.style.height = size + 'px';

            particle.animate([
                {
                    transform: `translate(0, 0) scale(1)`,
                    opacity: 1
                },
                {
                    transform: `translate(${destinationX - x}px, ${destinationY - y}px) scale(0)`,
                    opacity: 0
                }
            ], {
                duration: 1000,
                easing: 'cubic-bezier(0.4, 0.0, 0.2, 1)',
                fill: 'forwards'
            }).onfinish = () => particle.remove();
        }

        function checkAchievements() {
            const wpm = parseInt(wpmDisplay.textContent);
            const accuracy = parseInt(accuracyDisplay.textContent);

            if (wpm >= 100) {
                showAchievement('🏆 Speed Demon', 'Reached 100+ WPM!');
            }
            if (accuracy >= 98) {
                showAchievement('🎯 Precision Master', '98%+ Accuracy!');
            }
        }

        function showAchievement(title, description) {
            const achievement = document.createElement('div');
            achievement.className = 'achievement';
            achievement.innerHTML = `
                <div class="achievement-icon">🏆</div>
                <div>
                    <div>${title}</div>
                    <small>${description}</small>
                </div>
            `;
            achievements.appendChild(achievement);

            setTimeout(() => {
                achievement.style.opacity = '0';
                setTimeout(() => achievement.remove(), 500);
            }, 3000);
        }

        typeInput.addEventListener('input', (e) => {
            if (!isTestActive) {
                startTest();
            }

            const currentChar = textDisplay.children[currentWordIndex];
            const typedChar = e.target.value.slice(-1);

            if (currentChar) {
                if (typedChar === currentChar.textContent) {
                    currentChar.classList.add('correct');
                    correctCharacters++;
                    createParticle(currentChar.offsetLeft, currentChar.offsetTop);
                } else {
                    currentChar.classList.add('incorrect');
                }
                currentChar.classList.remove('active');
                currentWordIndex++;
                totalCharacters++;

                if (currentWordIndex < textDisplay.children.length) {
                    textDisplay.children[currentWordIndex].classList.add('active');
                }

                updateStats();
            }
        });

        startBtn.addEventListener('click', startTest);
        resetBtn.addEventListener('click', resetTest);
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('active');
        });

        document.addEventListener('click', (e) => {
            if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) {
                settingsPanel.classList.remove('active');
            }
        });

        // Initialize
        initializeTest();
    </script>
</body>
</html>
