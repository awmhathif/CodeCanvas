<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Neon Calculator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        .calculator {
            background: rgba(10, 10, 20, 0.8);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 20px #0ff,
                        0 0 40px #0ff,
                        0 0 60px #0ff;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 20px #0ff,
                           0 0 40px #0ff,
                           0 0 60px #0ff;
            }
            to {
                box-shadow: 0 0 40px #f0f,
                           0 0 80px #f0f,
                           0 0 120px #f0f;
            }
        }

        #display {
            width: 100%;
            height: 80px;
            margin-bottom: 20px;
            background: rgba(0, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: #0ff;
            font-size: 2.5em;
            text-align: right;
            padding: 10px;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            padding: 20px;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            background: rgba(0, 255, 255, 0.1);
            color: #0ff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #0ff;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.1);
            box-shadow: 0 0 15px #0ff;
        }

        button:active {
            transform: scale(0.95);
        }

        button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            animation: shine 3s infinite linear;
        }

        @keyframes shine {
            from {
                transform: rotate(45deg) translateY(-100%);
            }
            to {
                transform: rotate(45deg) translateY(100%);
            }
        }

        .operator {
            background: rgba(255, 0, 255, 0.1);
            color: #f0f;
            text-shadow: 0 0 5px #f0f;
        }

        .operator:hover {
            background: rgba(255, 0, 255, 0.3);
            box-shadow: 0 0 15px #f0f;
        }

        #equals {
            grid-column: span 2;
            background: rgba(0, 255, 0, 0.1);
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }

        #equals:hover {
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 15px #0f0;
        }

        .hologram {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0.1;
            animation: hologram 10s infinite linear;
        }

        @keyframes hologram {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteChar()">DEL</button>
            <button onclick="appendChar('%')" class="operator">%</button>
            <button onclick="appendChar('/')" class="operator">÷</button>
            <button onclick="appendChar('7')">7</button>
            <button onclick="appendChar('8')">8</button>
            <button onclick="appendChar('9')">9</button>
            <button onclick="appendChar('*')" class="operator">×</button>
            <button onclick="appendChar('4')">4</button>
            <button onclick="appendChar('5')">5</button>
            <button onclick="appendChar('6')">6</button>
            <button onclick="appendChar('-')" class="operator">-</button>
            <button onclick="appendChar('1')">1</button>
            <button onclick="appendChar('2')">2</button>
            <button onclick="appendChar('3')">3</button>
            <button onclick="appendChar('+')" class="operator">+</button>
            <button onclick="appendChar('0')">0</button>
            <button onclick="appendChar('.')">.</button>
            <button onclick="calculate()" id="equals">=</button>
        </div>
    </div>

    <div class="hologram">
        <svg width="400" height="400" viewBox="0 0 400 400">
            <circle cx="200" cy="200" r="150" stroke="#0ff" stroke-width="2" fill="none"/>
            <circle cx="200" cy="200" r="100" stroke="#f0f" stroke-width="2" fill="none"/>
            <circle cx="200" cy="200" r="50" stroke="#0f0" stroke-width="2" fill="none"/>
        </svg>
    </div>

    <script>
        let display = document.getElementById('display');

        function appendChar(char) {
            display.value += char;
            playClickSound();
        }

        function clearDisplay() {
            display.value = '';
            playClickSound();
        }

        function deleteChar() {
            display.value = display.value.slice(0, -1);
            playClickSound();
        }

        function calculate() {
            try {
                display.value = eval(display.value);
                playCalculateSound();
            } catch (error) {
                display.value = 'Error';
                playErrorSound();
            }
        }

        function playClickSound() {
            // Add futuristic click sound here
            const audio = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgA');
            audio.play();
        }

        function playCalculateSound() {
            // Add calculation complete sound here
            const audio = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgA');
            audio.play();
        }

        function playErrorSound() {
            // Add error sound here
            const audio = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgA');
            audio.play();
        }

        // Add keyboard support
        document.addEventListener('keydown', (event) => {
            const key = event.key;
            if (/[0-9.+\-*/%]/.test(key)) {
                appendChar(key);
            } else if (key === 'Enter') {
                calculate();
            } else if (key === 'Backspace') {
                deleteChar();
            } else if (key === 'Escape') {
                clearDisplay();
            }
        });

        // Add hover effect animation
        const buttons = document.querySelectorAll('button');
        buttons.forEach(button => {
            button.addEventListener('mouseover', () => {
                button.style.transform = 'scale(1.1)';
            });
            button.addEventListener('mouseout', () => {
                button.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
