<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Nexus Notepad</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: 'Consolas', monospace;
            color: #00ffcc;
        }

        #notepad {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ffcc;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }

        #text-area {
            width: calc(100% - 20px);
            height: calc(100% - 60px); /* Adjusted height for control panel */
            background: transparent;
            border: none;
            outline: none;
            color: #00ffcc;
            font-family: 'Consolas', monospace;
            font-size: 1.1em;
            padding: 10px;
            resize: none;
            overflow: auto;
            position: relative;
            z-index: 1;
        }

        #text-area::selection {
            background: rgba(0, 255, 204, 0.3);
        }

        #text-area::placeholder {
            color: #00a080;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        #controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            display: flex;
            justify-content: space-around;
        }

        .control-button {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .control-button:hover {
            background: rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 10px #00ffcc;
        }

    </style>
</head>
<body>
    <div id="notepad">
        <canvas id="particle-canvas"></canvas>
        <textarea id="text-area" placeholder="Enter your dynamic thoughts..."></textarea>
        <div id="controls">
            <button class="control-button" onclick="changeTheme('#ff6699')">Pink</button>
            <button class="control-button" onclick="changeTheme('#ffff66')">Yellow</button>
            <button class="control-button" onclick="changeTheme('#6699ff')">Blue</button>
            <button class="control-button" onclick="changeTheme('#00ffcc')">Cyan</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const mouse = { x: undefined, y: undefined };

        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 1,
                speedX: Math.random() * 1 - 0.5,
                speedY: Math.random() * 1 - 0.5,
                color: `rgba(0, 255, 204, ${Math.random()})`
            });
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.x += particle.speedX;
                particle.y += particle.speedY;

                if (particle.x < 0 || particle.x > canvas.width) particle.speedX *= -1;
                if (particle.y < 0 || particle.y > canvas.height) particle.speedY *= -1;

                const dx = mouse.x - particle.x;
                const dy = mouse.y - particle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 100) {
                    particle.x += dx * 0.03;
                    particle.y += dy * 0.03;
                }

                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                ctx.fillStyle = particle.color;
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        animateParticles();

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        function changeTheme(color) {
            document.body.style.color = color;
            document.getElementById('notepad').style.borderColor = color;
            document.getElementById('notepad').style.boxShadow = `0 0 20px rgba(${parseInt(color.slice(1,3), 16)}, ${parseInt(color.slice(3,5), 16)}, ${parseInt(color.slice(5,7), 16)}, 0.5)`;
            document.querySelectorAll('.control-button').forEach(button => {
                button.style.borderColor = color;
                button.style.color = color;
            });
            particles.forEach(particle => {
                particle.color = `rgba(${parseInt(color.slice(1,3), 16)}, ${parseInt(color.slice(3,5), 16)}, ${parseInt(color.slice(5,7), 16)}, ${Math.random()})`;
            });
        }
    </script>
</body>
</html>
