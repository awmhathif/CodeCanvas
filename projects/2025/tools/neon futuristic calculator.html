<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Futuristic Calculator</title>
    <style>
        /* Base styles */
        :root {
            --primary-neon: #0ff;
            --secondary-neon: #f0f;
            --tertiary-neon: #0f0;
            --background: #111;
            --display-bg: rgba(0, 0, 0, 0.7);
            --button-bg: rgba(20, 20, 30, 0.8);
            --button-hover: rgba(40, 40, 60, 0.9);
            --button-active: rgba(60, 60, 80, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background-color: var(--background);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 50% 50%, rgba(0, 255, 0, 0.05) 0%, transparent 40%);
        }

        /* Calculator container */
        .calculator {
            width: 320px;
            max-width: 90vw;
            background: rgba(10, 10, 15, 0.8);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            padding: 20px;
            box-shadow: 
                0 0 10px var(--primary-neon),
                0 0 20px rgba(0, 255, 255, 0.3),
                inset 0 0 5px rgba(0, 255, 255, 0.2);
            position: relative;
            animation: float 5s infinite ease-in-out;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        /* Ambient light effects */
        .calculator::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: radial-gradient(
                circle at center,
                rgba(0, 255, 255, 0.1) 0%,
                transparent 70%
            );
            z-index: -1;
            border-radius: 30px;
            filter: blur(15px);
        }

        /* Display styling */
        .display {
            width: 100%;
            height: 80px;
            margin-bottom: 20px;
            background: var(--display-bg);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 10px 15px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 
                0 0 5px var(--primary-neon),
                inset 0 0 10px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .previous-operand {
            font-size: 1.2rem;
            color: rgba(0, 255, 255, 0.7);
            height: 24px;
            text-shadow: 0 0 5px var(--primary-neon);
            opacity: 0.7;
        }

        .current-operand {
            font-size: 2.2rem;
            color: var(--primary-neon);
            height: 48px;
            text-shadow: 
                0 0 5px var(--primary-neon),
                0 0 10px var(--primary-neon);
            letter-spacing: 1px;
            animation: glow 2s infinite alternate ease-in-out;
        }

        /* Display scan line effect */
        .display::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 5px var(--primary-neon);
            animation: scanline 3s linear infinite;
        }

        /* Button grid */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 12px;
        }

        .btn {
            aspect-ratio: 1;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            background: var(--button-bg);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
        }

        .btn:hover {
            background: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 
                0 0 10px rgba(0, 255, 255, 0.5),
                0 0 20px rgba(0, 255, 255, 0.2);
        }

        .btn:active {
            transform: scale(0.95);
            background: var(--button-active);
            box-shadow: 
                0 0 15px rgba(0, 255, 255, 0.7),
                0 0 30px rgba(0, 255, 255, 0.3);
        }

        /* Different button types */
        .operation {
            color: var(--secondary-neon);
            text-shadow: 0 0 5px var(--secondary-neon);
            border-color: rgba(255, 0, 255, 0.3);
        }

        .operation:hover {
            box-shadow: 
                0 0 10px rgba(255, 0, 255, 0.5),
                0 0 20px rgba(255, 0, 255, 0.2);
        }

        .clear, .delete {
            color: var(--tertiary-neon);
            text-shadow: 0 0 5px var(--tertiary-neon);
            border-color: rgba(0, 255, 0, 0.3);
        }

        .clear:hover, .delete:hover {
            box-shadow: 
                0 0 10px rgba(0, 255, 0, 0.5),
                0 0 20px rgba(0, 255, 0, 0.2);
        }

        .equals {
            color: var(--primary-neon);
            text-shadow: 0 0 5px var(--primary-neon);
            border-color: rgba(0, 255, 255, 0.3);
            background: rgba(0, 80, 80, 0.4);
        }

        .equals:hover {
            background: rgba(0, 100, 100, 0.5);
        }

        .btn span {
            position: relative;
            z-index: 2;
        }

        /* Button ripple effect */
        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1);
            transition: all 0.6s ease;
        }

        .btn:active::after {
            transform: scale(20);
            opacity: 0;
            transition: 0s;
        }

        /* Special span to hold neon glow */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 10px;
            box-shadow: inset 0 0 5px rgba(0, 255, 255, 0.3);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn:hover::before {
            opacity: 1;
        }

        /* Animations */
        @keyframes glow {
            0% {
                text-shadow: 
                    0 0 5px var(--primary-neon),
                    0 0 10px var(--primary-neon);
            }
            100% {
                text-shadow: 
                    0 0 10px var(--primary-neon),
                    0 0 20px var(--primary-neon),
                    0 0 30px var(--primary-neon);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes scanline {
            0% {
                top: 0%;
            }
            100% {
                top: 100%;
            }
        }

        /* Ambient particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: var(--primary-neon);
            box-shadow: 0 0 10px var(--primary-neon);
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(10vw);
                opacity: 0;
            }
        }

        /* Responsive adjustments */
        @media (max-width: 360px) {
            .calculator {
                padding: 15px;
            }
            
            .buttons-grid {
                grid-gap: 8px;
            }
            
            .current-operand {
                font-size: 1.8rem;
            }
            
            .previous-operand {
                font-size: 1rem;
            }
        }

        /* Loading animation */
        .loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeOut 1s ease-in-out 2s forwards;
        }

        .loading-text {
            color: var(--primary-neon);
            font-size: 1.5rem;
            letter-spacing: 3px;
            animation: loadingGlow 1s ease-in-out infinite alternate;
        }

        @keyframes loadingGlow {
            0% {
                text-shadow: 0 0 5px var(--primary-neon);
            }
            100% {
                text-shadow: 
                    0 0 10px var(--primary-neon),
                    0 0 20px var(--primary-neon),
                    0 0 30px var(--primary-neon);
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                visibility: visible;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* HUD Elements */
        .hud-element {
            position: absolute;
            pointer-events: none;
            color: var(--primary-neon);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--primary-neon);
            opacity: 0.7;
        }

        .hud-top-left {
            top: 10px;
            left: 10px;
        }

        .hud-top-right {
            top: 10px;
            right: 10px;
            text-align: right;
        }

        .hud-bottom-left {
            bottom: 10px;
            left: 10px;
        }

        .hud-bottom-right {
            bottom: 10px;
            right: 10px;
            text-align: right;
        }

        /* Power button */
        .power-button {
            position: absolute;
            top: -15px;
            right: 20px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--button-bg);
            border: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            z-index: 10;
        }

        .power-button::after {
            content: '⏻';
            color: var(--primary-neon);
            font-size: 16px;
            text-shadow: 0 0 5px var(--primary-neon);
        }

        .power-button:hover {
            box-shadow: 
                0 0 10px var(--primary-neon),
                0 0 20px rgba(0, 255, 255, 0.5);
        }

        /* Animation for calculator startup */
        .calculator.powering-on {
            animation: powerOn 2s ease-in-out forwards;
        }

        @keyframes powerOn {
            0% {
                opacity: 0;
                transform: scale(0.9);
                filter: brightness(0);
            }
            30% {
                filter: brightness(1.5);
            }
            50% {
                filter: brightness(0.8);
            }
            70% {
                filter: brightness(1.2);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: brightness(1);
            }
        }

        /* Extra neon light effect around buttons */
        .neon-light {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            background: transparent;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .equals .neon-light {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .operation .neon-light {
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        .clear .neon-light, .delete .neon-light {
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .btn:hover .neon-light {
            opacity: 0.5;
        }

        /* Digital circuits pattern in background */
        .circuit-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
            background-image: 
                linear-gradient(90deg, var(--primary-neon) 1px, transparent 1px),
                linear-gradient(0deg, var(--primary-neon) 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: center center;
            z-index: -2;
        }

        /* Holographic display effect */
        .holographic-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.03) 0px,
                rgba(0, 255, 255, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            opacity: 0.5;
            border-radius: 10px;
        }

        /* Glitch effect for display */
        .glitch-effect {
            animation: glitch 5s infinite;
            position: relative;
        }

        @keyframes glitch {
            0%, 97%, 100% { transform: translateX(0); }
            98% { transform: translateX(3px); }
            99% { transform: translateX(-3px); }
        }

        /* Energy bars on sides */
        .energy-bar {
            position: absolute;
            width: 3px;
            background: var(--primary-neon);
            border-radius: 3px;
            box-shadow: 0 0 10px var(--primary-neon);
            animation: energyPulse 2s infinite alternate ease-in-out;
        }

        .energy-bar-left {
            left: 5px;
            top: 40px;
            height: 60%;
        }

        .energy-bar-right {
            right: 5px;
            top: 40px;
            height: 60%;
            animation-delay: 0.5s;
        }

        @keyframes energyPulse {
            0% { opacity: 0.3; height: 40%; }
            100% { opacity: 0.8; height: 60%; }
        }

        /* Visual equalizer effect */
        .equalizer {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
            height: 15px;
            align-items: flex-end;
        }

        .equalizer-bar {
            width: 3px;
            background: var(--primary-neon);
            border-radius: 1px;
            box-shadow: 0 0 5px var(--primary-neon);
            animation: equalizerPulse infinite ease-in-out;
        }

        @keyframes equalizerPulse {
            0%, 100% { height: 20%; }
            50% { height: 100%; }
        }

        /* Matrix rain effect in background */
        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            pointer-events: none;
            opacity: 0.1;
        }

        .matrix-column {
            position: absolute;
            top: -100px;
            width: 20px;
            color: var(--primary-neon);
            font-family: monospace;
            font-size: 1.2rem;
            text-align: center;
            animation: matrixRain linear infinite;
        }

        @keyframes matrixRain {
            0% { transform: translateY(-100px); }
            100% { transform: translateY(100vh); }
        }

        /* Cybernetic UI elements */
        .cyber-corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border-style: solid;
            border-width: 2px;
            border-color: transparent var(--primary-neon) var(--primary-neon) transparent;
            opacity: 0.7;
        }

        .cyber-corner-tl {
            top: 5px;
            left: 5px;
            transform: rotate(180deg);
        }

        .cyber-corner-tr {
            top: 5px;
            right: 5px;
            transform: rotate(270deg);
        }

        .cyber-corner-bl {
            bottom: 5px;
            left: 5px;
            transform: rotate(90deg);
        }

        .cyber-corner-br {
            bottom: 5px;
            right: 5px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="loading">
        <div class="loading-text">INITIALIZING SYSTEM</div>
    </div>

    <div class="circuit-background"></div>
    <div class="matrix-rain" id="matrix-rain"></div>
    <div class="particles" id="particles"></div>
    
    <div class="calculator">
        <div class="power-button"></div>
        <div class="cyber-corner cyber-corner-tl"></div>
        <div class="cyber-corner cyber-corner-tr"></div>
        <div class="cyber-corner cyber-corner-bl"></div>
        <div class="cyber-corner cyber-corner-br"></div>
        
        <div class="energy-bar energy-bar-left"></div>
        <div class="energy-bar energy-bar-right"></div>
        
        <div class="hud-element hud-top-left">SYS.V.01</div>
        <div class="hud-element hud-top-right" id="hud-date">00:00:00</div>
        <div class="hud-element hud-bottom-left">QUANTUM CALC</div>
        <div class="hud-element hud-bottom-right" id="hud-status">READY</div>
        
        <div class="display">
            <div class="holographic-lines"></div>
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand glitch-effect" id="current-operand">0</div>
            <div class="equalizer">
                <div class="equalizer-bar" style="animation-duration: 0.5s;"></div>
                <div class="equalizer-bar" style="animation-duration: 0.7s;"></div>
                <div class="equalizer-bar" style="animation-duration: 0.3s;"></div>
                <div class="equalizer-bar" style="animation-duration: 0.6s;"></div>
                <div class="equalizer-bar" style="animation-duration: 0.5s;"></div>
            </div>
        </div>
        
        <div class="buttons-grid">
            <button class="btn clear" data-all-clear>
                <span>AC</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn delete" data-delete>
                <span>DEL</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn operation" data-operation>
                <span>%</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn operation" data-operation>
                <span>÷</span>
                <div class="neon-light"></div>
            </button>
            
            <button class="btn number" data-number>
                <span>7</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn number" data-number>
                <span>8</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn number" data-number>
                <span>9</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn operation" data-operation>
                <span>×</span>
                <div class="neon-light"></div>
            </button>
            
            <button class="btn number" data-number>
                <span>4</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn number" data-number>
                <span>5</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn number" data-number>
                <span>6</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn operation" data-operation>
                <span>-</span>
                <div class="neon-light"></div>
            </button>
            
            <button class="btn number" data-number>
                <span>1</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn number" data-number>
                <span>2</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn number" data-number>
                <span>3</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn operation" data-operation>
                <span>+</span>
                <div class="neon-light"></div>
            </button>
            
            <button class="btn number" data-number>
                <span>.</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn number" data-number>
                <span>0</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn operation" data-operation>
                <span>^</span>
                <div class="neon-light"></div>
            </button>
            <button class="btn equals" data-equals>
                <span>=</span>
                <div class="neon-light"></div>
            </button>
        </div>
    </div>

    <script>
        // Initialize particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random starting position
                const posX = Math.random() * 100;
                const posY = Math.random() * 100 + 100; // Start below the screen
                
                // Random size
                const size = Math.random() * 3 + 1;
                
                // Random animation duration
                const duration = Math.random() * 20 + 10;
                
                // Random color
                const colors = ['#0ff', '#f0f', '#0f0'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                // Apply styles
                particle.style.left = `${posX}vw`;
                particle.style.top = `${posY}vh`;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.background = color;
                particle.style.boxShadow = `0 0 10px ${color}`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                
                particlesContainer.appendChild(particle);
            }
        }

        // Create matrix rain effect
        function createMatrixRain() {
            const matrixContainer = document.getElementById('matrix-rain');
            const columnCount = Math.floor(window.innerWidth / 20);
            
            for (let i = 0; i < columnCount; i++) {
                const column = document.createElement('div');
                column.classList.add('matrix-column');
                
                // Random position
                column.style.left = `${i * 20}px`;
                
                // Random animation duration
                const duration = Math.random() * 10 + 5;
                column.style.animationDuration = `${duration}s`;
                
                // Random delay
                column.style.animationDelay = `${Math.random() * 10}s`;
                
                // Create characters
                const charCount = Math.floor(Math.random() * 15) + 10;
                let chars = '';
                for (let j = 0; j < charCount; j++) {
                    const charCode = Math.floor(Math.random() * 94) + 33;
                    chars += String.fromCharCode(charCode) + '<br>';
                }
                column.innerHTML = chars;
                
                matrixContainer.appendChild(column);
            }
        }
        
        // Update HUD date/time
        function updateHudTime() {
            const hudDate = document.getElementById('hud-date');
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            hudDate.textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        // Calculator class
        class Calculator {
            constructor(previousOperandElement, currentOperandElement) {
                this.previousOperandElement = previousOperandElement;
                this.currentOperandElement = currentOperandElement;
                this.clear();
            }
            
            clear() {
                this.currentOperand = '0';
                this.previousOperand = '';
                this.operation = undefined;
                this.updateDisplay();
            }
            
            delete() {
                // If it's just "0", do nothing
                if (this.currentOperand === '0') return;
                
                // If there's just one digit or it's a negative sign followed by just one digit,
                // replace with "0"
                if (this.currentOperand.length === 1 || 
                    (this.currentOperand.length === 2 && this.currentOperand.startsWith('-'))) {
                    this.currentOperand = '0';
                } else {
                    // Otherwise delete the last character
                    this.currentOperand = this.currentOperand.toString().slice(0, -1);
                }
                
                this.updateDisplay();
            }
            
            appendNumber(number) {
                // Prevent multiple decimal points
                if (number === '.' && this.currentOperand.includes('.')) return;
                
                // Replace 0 with the new number, unless it's a decimal point
                if (this.currentOperand === '0' && number !== '.') {
                    this.currentOperand = number.toString();
                } else {
                    this.currentOperand = this.currentOperand.toString() + number.toString();
                }
                
                this.updateDisplay();
            }
            
            chooseOperation(operation) {
                if (this.currentOperand === '0' && this.previousOperand === '') return;
                
                if (this.previousOperand !== '') {
                    this.compute();
                }
                
                this.operation = operation;
                this.previousOperand = this.currentOperand;
                this.currentOperand = '0';
                this.updateDisplay();
            }
            
            compute() {
                let computation;
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);
                
                if (isNaN(prev) || isNaN(current)) return;
                
                switch (this.operation) {
                    case '+':
                        computation = prev + current;
                        break;
                    case '-':
                        computation = prev - current;
                        break;
                    case '×':
                        computation = prev * current;
                        break;
                    case '÷':
                        computation = prev / current;
                        break;
                    case '%':
                        computation = prev % current;
                        break;
                    case '^':
                        computation = Math.pow(prev, current);
                        break;
                    default:
                        return;
                }
                
                // Animate HUD status
                const hudStatus = document.getElementById('hud-status');
                hudStatus.textContent = 'CALCULATING...';
                setTimeout(() => {
                    hudStatus.textContent = 'READY';
                }, 300);
                
                // Update the calculator state
                this.currentOperand = computation.toString();
                this.operation = undefined;
                this.previousOperand = '';
                this.updateDisplay();
            }
            
            getDisplayNumber(number) {
                const stringNumber = number.toString();
                const integerDigits = parseFloat(stringNumber.split('.')[0]);
                const decimalDigits = stringNumber.split('.')[1];
                
                let integerDisplay;
                
                if (isNaN(integerDigits)) {
                    integerDisplay = '0';
                } else {
                    integerDisplay = integerDigits.toLocaleString('en', {
                        maximumFractionDigits: 0
                    });
                }
                
                if (decimalDigits != null) {
                    return `${integerDisplay}.${decimalDigits}`;
                } else {
                    return integerDisplay;
                }
            }
            
            updateDisplay() {
                // Update current operand display
                this.currentOperandElement.textContent = this.getDisplayNumber(this.currentOperand);
                
                // Update previous operand display with operation
                if (this.operation != null) {
                    this.previousOperandElement.textContent = 
                        `${this.getDisplayNumber(this.previousOperand)} ${this.operation}`;
                } else {
                    this.previousOperandElement.textContent = '';
                }
            }
        }
        
        // Button press animation
        function addButtonPressAnimation() {
            const buttons = document.querySelectorAll('.btn');
            
            buttons.forEach(button => {
                button.addEventListener('mousedown', () => {
                    button.classList.add('pressed');
                });
                
                button.addEventListener('mouseup', () => {
                    button.classList.remove('pressed');
                });
                
                button.addEventListener('mouseleave', () => {
                    button.classList.remove('pressed');
                });
            });
        }
        
        // Initialize calculator when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            const previousOperandElement = document.getElementById('previous-operand');
            const currentOperandElement = document.getElementById('current-operand');
            const numberButtons = document.querySelectorAll('[data-number]');
            const operationButtons = document.querySelectorAll('[data-operation]');
            const equalsButton = document.querySelector('[data-equals]');
            const deleteButton = document.querySelector('[data-delete]');
            const allClearButton = document.querySelector('[data-all-clear]');
            const powerButton = document.querySelector('.power-button');
            const calculator = new Calculator(previousOperandElement, currentOperandElement);
            
            // Initialize particles
            createParticles();
            
            // Initialize matrix rain
            createMatrixRain();
            
            // Initialize HUD time
            updateHudTime();
            setInterval(updateHudTime, 1000);
            
            // Add button press animations
            addButtonPressAnimation();
            
            // Button event listeners
            numberButtons.forEach(button => {
                button.addEventListener('click', () => {
                    calculator.appendNumber(button.querySelector('span').innerText);
                });
            });
            
            operationButtons.forEach(button => {
                button.addEventListener('click', () => {
                    calculator.chooseOperation(button.querySelector('span').innerText);
                });
            });
            
            equalsButton.addEventListener('click', () => {
                calculator.compute();
            });
            
            allClearButton.addEventListener('click', () => {
                calculator.clear();
            });
            
            deleteButton.addEventListener('click', () => {
                calculator.delete();
            });
            
            // Power button functionality
            powerButton.addEventListener('click', () => {
                const calculatorElement = document.querySelector('.calculator');
                
                if (calculatorElement.classList.contains('powering-on')) {
                    return;
                }
                
                // Toggle calculator on/off animation
                calculatorElement.classList.add('powering-on');
                
                // Reset calculator
                calculator.clear();
                
                // Update HUD status
                const hudStatus = document.getElementById('hud-status');
                hudStatus.textContent = 'BOOTING...';
                
                setTimeout(() => {
                    hudStatus.textContent = 'READY';
                    calculatorElement.classList.remove('powering-on');
                }, 2000);
            });
            
            // Keyboard support
            document.addEventListener('keydown', event => {
                // Number keys
                if (!isNaN(event.key) || event.key === '.') {
                    calculator.appendNumber(event.key);
                }
                
                // Operation keys
                if (event.key === '+' || event.key === '-') {
                    calculator.chooseOperation(event.key);
                }
                
                if (event.key === '*') {
                    calculator.chooseOperation('×');
                }
                
                if (event.key === '/') {
                    calculator.chooseOperation('÷');
                }
                
                if (event.key === '%') {
                    calculator.chooseOperation('%');
                }
                
                if (event.key === '^') {
                    calculator.chooseOperation('^');
                }
                
                // Equals key (Enter)
                if (event.key === 'Enter' || event.key === '=') {
                    event.preventDefault();
                    calculator.compute();
                }
                
                // Delete key (Backspace)
                if (event.key === 'Backspace') {
                    calculator.delete();
                }
                
                // Clear key (Escape)
                if (event.key === 'Escape') {
                    calculator.clear();
                }
            });
        });
    </script>
</body>
</html>
