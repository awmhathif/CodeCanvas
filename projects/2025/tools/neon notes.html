<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Notes</title>
    <style>
        :root {
            --primary-dark: #0a0a1a;
            --secondary-dark: #151530;
            --primary-light: #f0f0ff;
            --secondary-light: #e0e0f0;
            --neon-color: #00ffaa;
            --neon-purple: #bb33ff;
            --neon-blue: #3399ff;
            --neon-pink: #ff33cc;
            --neon-shadow: 0 0 5px var(--neon-color), 0 0 10px var(--neon-color);
            --neon-border: 1px solid var(--neon-color);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--primary-dark);
            color: var(--primary-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.light-theme {
            background-color: var(--primary-light);
            color: var(--primary-dark);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: var(--secondary-dark);
            border-bottom: var(--neon-border);
            box-shadow: var(--neon-shadow);
        }

        .light-theme .header {
            background-color: var(--secondary-light);
            border-bottom: 1px solid var(--neon-color);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--neon-color);
            text-shadow: var(--neon-shadow);
        }

        .menu-button {
            background: none;
            border: none;
            color: var(--neon-color);
            font-size: 20px;
            cursor: pointer;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 0;
            background-color: var(--secondary-dark);
            transition: width 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-right: var(--neon-border);
            box-shadow: var(--neon-shadow);
        }

        .light-theme .sidebar {
            background-color: var(--secondary-light);
        }

        .sidebar.active {
            width: 250px;
        }

        .sidebar-item {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
        }

        .light-theme .sidebar-item {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .sidebar-item:hover {
            background-color: rgba(0, 255, 170, 0.1);
        }

        .sidebar-item i {
            margin-right: 10px;
            color: var(--neon-color);
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .notes-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .note-toolbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background-color: var(--secondary-dark);
            border-radius: 8px;
            border: var(--neon-border);
            box-shadow: var(--neon-shadow);
        }

        .light-theme .note-toolbar {
            background-color: var(--secondary-light);
        }

        .search-bar {
            flex: 1;
            margin-right: 15px;
            padding: 8px 15px;
            border-radius: 20px;
            border: var(--neon-border);
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--primary-light);
            outline: none;
            box-shadow: var(--neon-shadow);
        }

        .light-theme .search-bar {
            background-color: rgba(255, 255, 255, 0.8);
            color: var(--primary-dark);
        }

        .new-note-btn {
            padding: 8px 15px;
            border-radius: 20px;
            border: var(--neon-border);
            background-color: transparent;
            color: var(--neon-color);
            cursor: pointer;
            box-shadow: var(--neon-shadow);
            outline: none;
            display: flex;
            align-items: center;
        }

        .new-note-btn:hover {
            background-color: var(--neon-color);
            color: var(--primary-dark);
        }

        .new-note-btn i {
            margin-right: 5px;
        }

        .note-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .note-title {
            padding: 10px 15px;
            font-size: 20px;
            border: none;
            border-bottom: var(--neon-border);
            background-color: var(--secondary-dark);
            color: var(--neon-color);
            margin-bottom: 10px;
            border-radius: 8px 8px 0 0;
            outline: none;
            box-shadow: var(--neon-shadow);
        }

        .light-theme .note-title {
            background-color: var(--secondary-light);
            color: var(--primary-dark);
        }

        .note-content {
            flex: 1;
            padding: 15px;
            border: var(--neon-border);
            border-radius: 0 0 8px 8px;
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--primary-light);
            resize: none;
            outline: none;
            font-size: 16px;
            line-height: 1.6;
            box-shadow: var(--neon-shadow);
            margin-bottom: 15px;
        }

        .light-theme .note-content {
            background-color: rgba(255, 255, 255, 0.8);
            color: var(--primary-dark);
        }

        .notes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .note-card {
            background-color: var(--secondary-dark);
            border-radius: 8px;
            border: var(--neon-border);
            padding: 15px;
            cursor: pointer;
            box-shadow: var(--neon-shadow);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            max-height: 200px;
            overflow: hidden;
        }

        .light-theme .note-card {
            background-color: var(--secondary-light);
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-color);
        }

        .note-card h3 {
            color: var(--neon-color);
            margin-bottom: 8px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .note-card p {
            font-size: 14px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
        }

        .note-timestamp {
            font-size: 12px;
            color: #888;
            margin-top: auto;
            padding-top: 8px;
        }

        .calendar-container, .habit-tracker-container, .settings-container {
            display: none;
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .calendar {
            background-color: var(--secondary-dark);
            border-radius: 8px;
            border: var(--neon-border);
            overflow: hidden;
            box-shadow: var(--neon-shadow);
        }

        .light-theme .calendar {
            background-color: var(--secondary-light);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--neon-color);
        }

        .light-theme .calendar-header {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .calendar-nav {
            background: none;
            border: none;
            color: var(--neon-color);
            font-size: 18px;
            cursor: pointer;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            padding: 15px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            cursor: pointer;
        }

        .calendar-day:hover {
            background-color: rgba(0, 255, 170, 0.2);
        }

        .calendar-day.today {
            background-color: var(--neon-color);
            color: var(--primary-dark);
        }

        .calendar-day.has-notes {
            border: 1px solid var(--neon-color);
            box-shadow: 0 0 5px var(--neon-color);
        }

        .habit-tracker {
            background-color: var(--secondary-dark);
            border-radius: 8px;
            border: var(--neon-border);
            overflow: hidden;
            box-shadow: var(--neon-shadow);
        }

        .light-theme .habit-tracker {
            background-color: var(--secondary-light);
        }

        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--neon-color);
        }

        .light-theme .habit-header {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .add-habit-btn {
            padding: 5px 10px;
            border-radius: 20px;
            border: var(--neon-border);
            background-color: transparent;
            color: var(--neon-color);
            cursor: pointer;
            box-shadow: var(--neon-shadow);
        }

        .add-habit-btn:hover {
            background-color: var(--neon-color);
            color: var(--primary-dark);
        }

        .habits-list {
            padding: 15px;
        }

        .habit-item {
            margin-bottom: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid rgba(0, 255, 170, 0.3);
        }

        .light-theme .habit-item {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .habit-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .habit-title h3 {
            color: var(--neon-color);
        }

        .habit-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
        }

        .habit-progress {
            height: 10px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }

        .light-theme .habit-progress {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .habit-progress-bar {
            height: 100%;
            background-color: var(--neon-color);
            box-shadow: 0 0 5px var(--neon-color), 0 0 10px var(--neon-color);
        }

        .habit-tracker-days {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .habit-day {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid var(--neon-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            cursor: pointer;
        }

        .habit-day.completed {
            background-color: var(--neon-color);
            color: var(--primary-dark);
            box-shadow: 0 0 5px var(--neon-color);
        }

        .settings-section {
            background-color: var(--secondary-dark);
            border-radius: 8px;
            border: var(--neon-border);
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: var(--neon-shadow);
        }

        .light-theme .settings-section {
            background-color: var(--secondary-light);
        }

        .settings-header {
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--neon-color);
            font-weight: bold;
        }

        .light-theme .settings-header {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .settings-options {
            padding: 15px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .light-theme .setting-item {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .theme-toggle {
            position: relative;
            width: 50px;
            height: 24px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            cursor: pointer;
        }

        .light-theme .theme-toggle {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .theme-toggle-slider {
            position: absolute;
            left: 2px;
            top: 2px;
            width: 20px;
            height: 20px;
            background-color: var(--neon-color);
            border-radius: 50%;
            transition: transform 0.3s;
            box-shadow: 0 0 5px var(--neon-color);
        }

        .light-theme .theme-toggle-slider {
            transform: translateX(26px);
        }

        .backup-btn {
            padding: 8px 15px;
            border-radius: 20px;
            border: var(--neon-border);
            background-color: transparent;
            color: var(--neon-color);
            cursor: pointer;
            box-shadow: var(--neon-shadow);
        }

        .backup-btn:hover {
            background-color: var(--neon-color);
            color: var(--primary-dark);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--secondary-dark);
            border-radius: 8px;
            border: var(--neon-border);
            width: 90%;
            max-width: 500px;
            padding: 20px;
            box-shadow: var(--neon-shadow);
            position: relative;
        }

        .light-theme .modal-content {
            background-color: var(--secondary-light);
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: var(--neon-color);
            font-size: 18px;
            cursor: pointer;
        }

        .modal-header {
            margin-bottom: 15px;
            color: var(--neon-color);
            font-size: 18px;
            font-weight: bold;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: var(--neon-border);
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--primary-light);
            outline: none;
        }

        .light-theme .modal-input {
            background-color: rgba(255, 255, 255, 0.8);
            color: var(--primary-dark);
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 8px 15px;
            border-radius: 20px;
            border: var(--neon-border);
            background-color: transparent;
            color: var(--neon-color);
            cursor: pointer;
            margin-left: 10px;
            box-shadow: var(--neon-shadow);
        }

        .modal-btn:hover {
            background-color: var(--neon-color);
            color: var(--primary-dark);
        }

        .habit-options {
            display: flex;
            margin-top: 10px;
        }

        .habit-option {
            margin-right: 10px;
            display: flex;
            align-items: center;
        }

        .habit-option input {
            margin-right: 5px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--neon-color);
            color: var(--primary-dark);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 0 15px var(--neon-color);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        .floating-action-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--neon-color);
            color: var(--primary-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-color);
            cursor: pointer;
            z-index: 99;
        }

        /* Neon color themes */
        .neon-theme-option {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px currentColor;
            border: 2px solid transparent;
        }

        .color-option.selected {
            border: 2px solid white;
        }

        .color-option:nth-child(1) {
            background-color: #00ffaa;
            color: #00ffaa;
        }

        .color-option:nth-child(2) {
            background-color: #bb33ff;
            color: #bb33ff;
        }

        .color-option:nth-child(3) {
            background-color: #3399ff;
            color: #3399ff;
        }

        .color-option:nth-child(4) {
            background-color: #ff33cc;
            color: #ff33cc;
        }

        /* Loader */
        .loader {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loader-content {
            width: 100px;
            height: 100px;
            border: 3px solid transparent;
            border-top: 3px solid var(--neon-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--neon-color);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Media Queries */
        @media (max-width: 768px) {
            .notes-list {
                grid-template-columns: 1fr;
            }

            .habit-tracker-days {
                flex-wrap: wrap;
                gap: 5px;
            }

            .sidebar.active {
                width: 100%;
                position: absolute;
                z-index: 100;
                height: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">Neon Notes</div>
            <button class="menu-button" id="menu-toggle">☰</button>
        </div>
        <div class="main-content">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-item" id="notes-nav">
                    <i>📝</i> Notes
                </div>
                <div class="sidebar-item" id="calendar-nav">
                    <i>📅</i> Calendar
                </div>
                <div class="sidebar-item" id="habits-nav">
                    <i>⏱️</i> Habit Tracker
                </div>
                <div class="sidebar-item" id="settings-nav">
                    <i>⚙️</i> Settings
                </div>
            </div>
            <div class="content">
                <div class="notes-container" id="notes-container">
                    <div class="note-toolbar">
                        <input type="text" class="search-bar" placeholder="Search notes...">
                        <button class="new-note-btn" id="new-note-btn"><i>+</i> New Note</button>
                    </div>
                    <div class="note-editor">
                        <input type="text" class="note-title" id="note-title" placeholder="Note Title">
                        <textarea class="note-content" id="note-content" placeholder="Write your note here..."></textarea>
                    </div>
                    <div class="notes-list" id="notes-list">
                        <!-- Notes will be added here dynamically -->
                    </div>
                </div>
                <div class="calendar-container" id="calendar-container">
                    <div class="calendar">
                        <div class="calendar-header">
                            <button class="calendar-nav" id="prev-month"><</button>
                            <h2 id="current-month">February 2025</h2>
                            <button class="calendar-nav" id="next-month">></button>
                        </div>
                        <div class="calendar-days-header">
                            <div class="calendar-grid">
                                <div class="calendar-day">Su</div>
                                <div class="calendar-day">Mo</div>
                                <div class="calendar-day">Tu</div>
                                <div class="calendar-day">We</div>
                                <div class="calendar-day">Th</div>
                                <div class="calendar-day">Fr</div>
                                <div class="calendar-day">Sa</div>
                            </div>
                        </div>
                        <div class="calendar-grid" id="calendar-grid">
                            <!-- Calendar days will be added here dynamically -->
                        </div>
                    </div>
                </div>
                <div class="habit-tracker-container" id="habit-tracker-container">
                    <div class="habit-tracker">
                        <div class="habit-header">
                            <h2>Habit Tracker</h2>
                            <button class="add-habit-btn" id="add-habit-btn">+ Add Habit</button>
                        </div>
                        <div class="habits-list" id="habits-list">
                            <!-- Habits will be added here dynamically -->
                        </div>
                    </div>
                </div>
                <div class="settings-container" id="settings-container">
                    <div class="settings-section">
                        <div class="settings-header">Appearance</div>
                        <div class="settings-options">
                            <div class="setting-item">
                                <div>Theme</div>
                                <div class="theme-toggle" id="theme-toggle">
                                    <div class="theme-toggle-slider"></div>
                                </div>
                            </div>
                            <div class="setting-item">
                                <div>Neon Color</div>
                                <div class="neon-theme-option">
                                    <div class="color-option selected" data-color="#00ffaa"></div>
                                    <div class="color-option" data-color="#bb33ff"></div>
                                    <div class="color-option" data-color="#3399ff"></div>
                                    <div class="color-option" data-color="#ff33cc"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="settings-section">
                        <div class="settings-header">Data</div>
                        <div class="settings-options">
                            <div class="setting-item">
                                <div>Auto Save</div>
                                <div class="theme-toggle" id="autosave-toggle">
                                    <div class="theme-toggle-slider"></div>
                                </div>
                            </div>
                            <div class="setting-item">
                                <div>Backup to Device</div>
                                <button class="backup-btn" id="backup-btn">Backup Now</button>
                            </div>
                            <div class="setting-item">
                                <div>Restore from Backup</div>
                                <button class="backup-btn" id="restore-btn">Restore</button>
                            </div>
                        </div>
                    </div>
                    <div class="settings-section">
                        <div class="settings-header">About</div>
                        <div class="settings-options">
                            <div class="setting-item">
                                <div>Version</div>
                                <div>1.0.0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Habit Modal -->
    <div class="modal" id="habit-modal">
        <div class="modal-content">
            <button class="close-modal" id="close-habit-modal">×</button>
            <div class="modal-header">Add New Habit</div>
            <input type="text" class="modal-input" id="habit-name" placeholder="Habit Name">
            <div class="habit-options">
                <div class="habit-option">
                    <input type="radio" name="habit-type" id="habit-daily" checked>
                    <label for="habit-daily">Daily</label>
                </div>
                <div class="habit-option">
                    <input type="radio" name="habit-type" id="habit-weekly">
                    <label for="habit-weekly">Weekly</label>
                </div>
                <div class="habit-option">
                    <input type="radio" name="habit-type" id="habit-monthly">
                    <label for="habit-monthly">Monthly</label>
                </div>
            </div>
            <input type="number" class="modal-input" id="habit-goal" placeholder="Goal (e.g., 7 times a week)">
            <div class="modal-buttons">
                <button class="modal-btn" id="cancel-habit">Cancel</button>
                <button class="modal-btn" id="save-habit">Save</button>
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-content"></div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Floating Action Button -->
    <div class="floating-action-btn" id="floating-action-btn">+</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // DOM elements
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const notesNav = document.getElementById('notes-nav');
            const calendarNav = document.getElementById('calendar-nav');
            const habitsNav = document.getElementById('habits-nav');
const settingsNav = document.getElementById('settings-nav');
            const notesContainer = document.getElementById('notes-container');
            const calendarContainer = document.getElementById('calendar-container');
            const habitTrackerContainer = document.getElementById('habit-tracker-container');
            const settingsContainer = document.getElementById('settings-container');
            const newNoteBtn = document.getElementById('new-note-btn');
            const floatingActionBtn = document.getElementById('floating-action-btn');
            const noteTitle = document.getElementById('note-title');
            const noteContent = document.getElementById('note-content');
            const notesList = document.getElementById('notes-list');
            const themeToggle = document.getElementById('theme-toggle');
            const autosaveToggle = document.getElementById('autosave-toggle');
            const backupBtn = document.getElementById('backup-btn');
            const restoreBtn = document.getElementById('restore-btn');
            const colorOptions = document.querySelectorAll('.color-option');
            const addHabitBtn = document.getElementById('add-habit-btn');
            const habitModal = document.getElementById('habit-modal');
            const closeHabitModal = document.getElementById('close-habit-modal');
            const saveHabitBtn = document.getElementById('save-habit');
            const cancelHabitBtn = document.getElementById('cancel-habit');
            const habitsList = document.getElementById('habits-list');
            const toast = document.getElementById('toast');
            const loader = document.getElementById('loader');
            const prevMonth = document.getElementById('prev-month');
            const nextMonth = document.getElementById('next-month');
            const currentMonth = document.getElementById('current-month');
            const calendarGrid = document.getElementById('calendar-grid');

            // App state
            let notes = JSON.parse(localStorage.getItem('neon-notes')) || [];
            let habits = JSON.parse(localStorage.getItem('neon-habits')) || [];
            let currentNoteId = null;
            let autosave = localStorage.getItem('autosave') === 'true' || true;
            let currentDate = new Date();
            
            // Initialize
            init();

            function init() {
                // Set theme from localStorage
                if (localStorage.getItem('theme') === 'light') {
                    document.body.classList.add('light-theme');
                    themeToggle.querySelector('.theme-toggle-slider').style.transform = 'translateX(26px)';
                }

                // Set neon color from localStorage
                const savedColor = localStorage.getItem('neon-color') || '#00ffaa';
                document.documentElement.style.setProperty('--neon-color', savedColor);
                colorOptions.forEach(option => {
                    if (option.dataset.color === savedColor) {
                        option.classList.add('selected');
                    } else {
                        option.classList.remove('selected');
                    }
                });

                // Set autosave toggle
                if (autosave) {
                    autosaveToggle.querySelector('.theme-toggle-slider').style.transform = 'translateX(26px)';
                }

                // Display notes
                renderNotes();
                
                // Render calendar
                renderCalendar();
                
                // Render habits
                renderHabits();
            }

            // Event listeners
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
            });

            notesNav.addEventListener('click', () => {
                showContainer(notesContainer);
                sidebar.classList.remove('active');
            });

            calendarNav.addEventListener('click', () => {
                showContainer(calendarContainer);
                sidebar.classList.remove('active');
            });

            habitsNav.addEventListener('click', () => {
                showContainer(habitTrackerContainer);
                sidebar.classList.remove('active');
            });

            settingsNav.addEventListener('click', () => {
                showContainer(settingsContainer);
                sidebar.classList.remove('active');
            });

            newNoteBtn.addEventListener('click', createNewNote);
            floatingActionBtn.addEventListener('click', createNewNote);

            noteTitle.addEventListener('input', saveCurrentNote);
            noteContent.addEventListener('input', saveCurrentNote);

            themeToggle.addEventListener('click', toggleTheme);
            autosaveToggle.addEventListener('click', toggleAutosave);

            backupBtn.addEventListener('click', backupData);
            restoreBtn.addEventListener('click', restoreData);

            addHabitBtn.addEventListener('click', showHabitModal);
            closeHabitModal.addEventListener('click', hideHabitModal);
            cancelHabitBtn.addEventListener('click', hideHabitModal);
            saveHabitBtn.addEventListener('click', saveHabit);

            prevMonth.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });

            nextMonth.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });

            colorOptions.forEach(option => {
                option.addEventListener('click', function() {
                    colorOptions.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                    const color = this.dataset.color;
                    document.documentElement.style.setProperty('--neon-color', color);
                    localStorage.setItem('neon-color', color);
                    showToast('Theme color updated');
                });
            });

            // Functions
            function showContainer(container) {
                [notesContainer, calendarContainer, habitTrackerContainer, settingsContainer].forEach(cont => {
                    cont.style.display = 'none';
                });
                container.style.display = 'flex';
            }

            function createNewNote() {
                currentNoteId = Date.now().toString();
                noteTitle.value = '';
                noteContent.value = '';
                noteTitle.focus();
                saveCurrentNote();
            }

            function saveCurrentNote() {
                if (!currentNoteId) return;
                
                if (autosave && (noteTitle.value || noteContent.value)) {
                    const note = {
                        id: currentNoteId,
                        title: noteTitle.value || 'Untitled Note',
                        content: noteContent.value,
                        timestamp: Date.now()
                    };
                    
                    const existingIndex = notes.findIndex(n => n.id === currentNoteId);
                    if (existingIndex >= 0) {
                        notes[existingIndex] = note;
                    } else {
                        notes.push(note);
                    }
                    
                    localStorage.setItem('neon-notes', JSON.stringify(notes));
                    renderNotes();
                }
            }

            function renderNotes() {
                notesList.innerHTML = '';
                notes.sort((a, b) => b.timestamp - a.timestamp).forEach(note => {
                    const noteCard = document.createElement('div');
                    noteCard.className = 'note-card';
                    noteCard.innerHTML = `
                        <h3>${note.title}</h3>
                        <p>${note.content}</p>
                        <div class="note-timestamp">${formatDate(note.timestamp)}</div>
                    `;
                    noteCard.addEventListener('click', () => {
                        currentNoteId = note.id;
                        noteTitle.value = note.title;
                        noteContent.value = note.content;
                    });
                    notesList.appendChild(noteCard);
                });
            }

            function renderCalendar() {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                
                currentMonth.textContent = new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                
                calendarGrid.innerHTML = '';
                
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                
                // Add empty cells for days before the first day of month
                for (let i = 0; i < firstDay; i++) {
                    const dayEl = document.createElement('div');
                    dayEl.className = 'calendar-day';
                    calendarGrid.appendChild(dayEl);
                }
                
                // Add days of month
                for (let i = 1; i <= daysInMonth; i++) {
                    const dayEl = document.createElement('div');
                    dayEl.className = 'calendar-day';
                    dayEl.textContent = i;
                    
                    // Check if today
                    const today = new Date();
                    if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) {
                        dayEl.classList.add('today');
                    }
                    
                    // Check if has notes on this day
                    const dateStr = new Date(year, month, i).toDateString();
                    const hasNotes = notes.some(note => {
                        const noteDate = new Date(note.timestamp).toDateString();
                        return noteDate === dateStr;
                    });
                    
                    if (hasNotes) {
                        dayEl.classList.add('has-notes');
                    }
                    
                    dayEl.addEventListener('click', () => {
                        // Show notes for this day
                        showNotesForDate(new Date(year, month, i));
                    });
                    
                    calendarGrid.appendChild(dayEl);
                }
            }

            function showNotesForDate(date) {
                const dateStr = date.toDateString();
                showContainer(notesContainer);
                
                // Filter notes list to show only notes from this date
                const filteredNotes = notes.filter(note => {
                    const noteDate = new Date(note.timestamp).toDateString();
                    return noteDate === dateStr;
                });
                
                if (filteredNotes.length > 0) {
                    showToast(`Showing ${filteredNotes.length} notes for ${formatDate(date.getTime())}`);
                    renderFilteredNotes(filteredNotes);
                } else {
                    showToast(`No notes for ${formatDate(date.getTime())}`);
                    renderNotes();
                }
            }

            function renderFilteredNotes(filteredNotes) {
                notesList.innerHTML = '';
                filteredNotes.forEach(note => {
                    const noteCard = document.createElement('div');
                    noteCard.className = 'note-card';
                    noteCard.innerHTML = `
                        <h3>${note.title}</h3>
                        <p>${note.content}</p>
                        <div class="note-timestamp">${formatDate(note.timestamp)}</div>
                    `;
                    noteCard.addEventListener('click', () => {
                        currentNoteId = note.id;
                        noteTitle.value = note.title;
                        noteContent.value = note.content;
                    });
                    notesList.appendChild(noteCard);
                });
            }

            function showHabitModal() {
                habitModal.style.display = 'flex';
                document.getElementById('habit-name').focus();
            }

            function hideHabitModal() {
                habitModal.style.display = 'none';
                document.getElementById('habit-name').value = '';
                document.getElementById('habit-goal').value = '';
                document.getElementById('habit-daily').checked = true;
            }

            function saveHabit() {
                const name = document.getElementById('habit-name').value;
                const goal = parseInt(document.getElementById('habit-goal').value) || 1;
                
                let type = 'daily';
                if (document.getElementById('habit-weekly').checked) type = 'weekly';
                if (document.getElementById('habit-monthly').checked) type = 'monthly';
                
                if (!name) {
                    showToast('Please enter a habit name');
                    return;
                }
                
                const habit = {
                    id: Date.now().toString(),
                    name,
                    type,
                    goal,
                    progress: 0,
                    streak: 0,
                    history: []
                };
                
                habits.push(habit);
                localStorage.setItem('neon-habits', JSON.stringify(habits));
                renderHabits();
                hideHabitModal();
                showToast('Habit added successfully');
            }

            function renderHabits() {
                habitsList.innerHTML = '';
                habits.forEach(habit => {
                    const habitEl = document.createElement('div');
                    habitEl.className = 'habit-item';
                    
                    // Calculate progress percentage
                    const progressPercent = (habit.progress / habit.goal) * 100;
                    
                    habitEl.innerHTML = `
                        <div class="habit-title">
                            <h3>${habit.name}</h3>
                            <span>${habit.progress}/${habit.goal}</span>
                        </div>
                        <div class="habit-progress">
                            <div class="habit-progress-bar" style="width: ${progressPercent}%"></div>
                        </div>
                        <div class="habit-info">
                            <span>${habit.type}</span>
                            <span>Streak: ${habit.streak} days</span>
                        </div>
                        <div class="habit-tracker-days">
                            ${renderHabitDays(habit)}
                        </div>
                    `;
                    
                    habitsList.appendChild(habitEl);
                });
            }

            function renderHabitDays(habit) {
                let daysHTML = '';
                const today = new Date();
                
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(today.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    
                    const isCompleted = habit.history.includes(dateStr);
                    const dayEl = `
                        <div class="habit-day ${isCompleted ? 'completed' : ''}" 
                             data-habit="${habit.id}" 
                             data-date="${dateStr}">
                            ${date.getDate()}
                        </div>
                    `;
                    daysHTML += dayEl;
                }
                
                return daysHTML;
            }

            // After rendering habits, add event listeners to habit days
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('habit-day')) {
                    const habitId = e.target.dataset.habit;
                    const dateStr = e.target.dataset.date;
                    toggleHabitCompletion(habitId, dateStr);
                }
            });

            function toggleHabitCompletion(habitId, dateStr) {
                const habitIndex = habits.findIndex(h => h.id === habitId);
                if (habitIndex < 0) return;
                
                const habit = habits[habitIndex];
                const historyIndex = habit.history.indexOf(dateStr);
                
                if (historyIndex >= 0) {
                    // Remove date if already completed
                    habit.history.splice(historyIndex, 1);
                    habit.progress = Math.max(0, habit.progress - 1);
                } else {
                    // Add date if not completed
                    habit.history.push(dateStr);
                    habit.progress = Math.min(habit.goal, habit.progress + 1);
                }
                
                // Update streak
                updateHabitStreak(habit);
                
                // Save and render
                habits[habitIndex] = habit;
                localStorage.setItem('neon-habits', JSON.stringify(habits));
                renderHabits();
            }

            function updateHabitStreak(habit) {
                let streak = 0;
                const today = new Date();
                
                // Check backward from today
                for (let i = 0; i < 365; i++) {
                    const date = new Date();
                    date.setDate(today.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    
                    if (habit.history.includes(dateStr)) {
                        streak++;
                    } else if (i > 0) { // Allow today to be not completed yet
                        break;
                    }
                }
                
                habit.streak = streak;
            }

            function toggleTheme() {
                document.body.classList.toggle('light-theme');
                localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
                showToast('Theme updated');
            }

            function toggleAutosave() {
                autosave = !autosave;
                localStorage.setItem('autosave', autosave);
                if (autosave) {
                    autosaveToggle.querySelector('.theme-toggle-slider').style.transform = 'translateX(26px)';
                    showToast('Auto save enabled');
                } else {
                    autosaveToggle.querySelector('.theme-toggle-slider').style.transform = 'translateX(0)';
                    showToast('Auto save disabled');
                }
            }

            function backupData() {
                const data = {
                    notes: notes,
                    habits: habits,
                    settings: {
                        theme: localStorage.getItem('theme'),
                        neonColor: localStorage.getItem('neon-color'),
                        autosave: localStorage.getItem('autosave')
                    }
                };
                
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `neon-notes-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                
                showToast('Backup created successfully');
            }

            function restoreData() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                
                input.onchange = function(e) {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    
                    showLoader(true);
                    
                    reader.onload = function(e) {
                        try {
                            const data = JSON.parse(e.target.result);
                            
                            if (data.notes) {
                                notes = data.notes;
                                localStorage.setItem('neon-notes', JSON.stringify(notes));
                                renderNotes();
                            }
                            
                            if (data.habits) {
                                habits = data.habits;
                                localStorage.setItem('neon-habits', JSON.stringify(habits));
                                renderHabits();
                            }
                            
                            if (data.settings) {
                                if (data.settings.theme) {
                                    localStorage.setItem('theme', data.settings.theme);
                                    document.body.classList.toggle('light-theme', data.settings.theme === 'light');
                                }
                                
                                if (data.settings.neonColor) {
                                    localStorage.setItem('neon-color', data.settings.neonColor);
                                    document.documentElement.style.setProperty('--neon-color', data.settings.neonColor);
                                }
                                
                                if (data.settings.autosave) {
                                    localStorage.setItem('autosave', data.settings.autosave);
                                    autosave = data.settings.autosave === 'true';
                                    autosaveToggle.querySelector('.theme-toggle-slider').style.transform = 
                                        autosave ? 'translateX(26px)' : 'translateX(0)';
                                }
                            }
                            
                            showToast('Data restored successfully');
                        } catch (error) {
                            console.error(error);
                            showToast('Error restoring data');
                        } finally {
                            showLoader(false);
                        }
                    };
                    
                    reader.readAsText(file);
                };
                
                input.click();
            }

            function formatDate(timestamp) {
                const date = new Date(timestamp);
                return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            function showToast(message) {
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            function showLoader(show) {
                loader.style.display = show ? 'flex' : 'none';
            }

            // Start with Notes view
            showContainer(notesContainer);

            // Handle page unload - save current note
            window.addEventListener('beforeunload', function() {
                if (currentNoteId) {
                    saveCurrentNote();
                }
            });
        });
    </script>
</body>
</html>
