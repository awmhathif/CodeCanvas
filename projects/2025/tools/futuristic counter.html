<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Counter</title>
    <style>
        :root {
            --primary: #00ffaa;
            --secondary: #0066ff;
            --background: #111122;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--background);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        .counter-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .counter-display {
            font-size: 8rem;
            font-weight: bold;
            color: var(--text);
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary), 0 0 30px var(--primary);
            transition: all 0.3s ease;
            position: relative;
            transform-style: preserve-3d;
        }

        .counter-button {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.5rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 50px;
            color: var(--text);
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .counter-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--primary), 0 0 50px var(--secondary);
        }

        .counter-button:active {
            transform: scale(0.95);
        }

        .counter-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            transform: rotate(45deg);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .counter-button:hover::before {
            opacity: 0.3;
            animation: shine 1.5s infinite;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        .hexagon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .hexagon {
            position: absolute;
            width: 100px;
            height: 110px;
            background: linear-gradient(135deg, rgba(0, 255, 170, 0.1), rgba(0, 102, 255, 0.1));
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            animation: float 10s infinite ease-in-out;
            opacity: 0.3;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        .mode-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 102, 255, 0.3);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: var(--primary);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(0, 255, 170, 0.3);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
            background-color: var(--secondary);
        }

        .theme-label {
            font-size: 0.9rem;
        }

        .counter-ring {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid var(--primary);
            border-bottom: 4px solid var(--secondary);
            animation: spin 8s linear infinite;
        }

        .counter-ring:before, .counter-ring:after {
            content: '';
            position: absolute;
            border-radius: 50%;
        }

        .counter-ring:before {
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 4px solid transparent;
            border-left: 4px solid var(--primary);
            border-right: 4px solid var(--secondary);
            animation: spin 6s linear infinite reverse;
        }

        .counter-ring:after {
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 4px solid transparent;
            border-top: 4px solid var(--secondary);
            border-bottom: 4px solid var(--primary);
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(20px) rotate(-5deg); }
        }

        @keyframes shine {
            0% { transform: rotate(45deg) translateX(-100%); }
            100% { transform: rotate(45deg) translateX(100%); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }

        .glitch-effect {
            animation: glitch 0.3s ease;
        }

        .pulse-effect {
            animation: pulse 0.5s ease;
        }

        .theme-options {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: transform 0.3s ease;
        }

        .theme-btn:hover {
            transform: scale(1.2);
        }

        .theme-cyan {
            background: linear-gradient(45deg, #00ffcc, #0099ff);
        }

        .theme-purple {
            background: linear-gradient(45deg, #ff00cc, #9900ff);
        }

        .theme-orange {
            background: linear-gradient(45deg, #ff9900, #ff3300);
        }

        .counter-info {
            position: absolute;
            top: 70px;
            font-size: 1.2rem;
            opacity: 0.8;
            text-align: center;
        }

        .milestone {
            position: absolute;
            font-size: 2rem;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="counter-container">
        <div class="counter-ring"></div>
        <div class="counter-info">Count: <span id="count-info">0</span></div>
        <div class="counter-display" id="counter">0</div>
        <button class="counter-button" id="increment-btn">INCREMENT</button>
        <div class="instructions">Press SPACEBAR or click the button to increment</div>
        
        <div class="hexagon-container" id="hexagon-container"></div>
        <div class="particles" id="particles"></div>
        
        <div class="theme-options">
            <div class="theme-btn theme-cyan" data-theme="cyan"></div>
            <div class="theme-btn theme-purple" data-theme="purple"></div>
            <div class="theme-btn theme-orange" data-theme="orange"></div>
        </div>
        
        <div class="mode-switch">
            <span class="theme-label">Dark</span>
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider"></span>
            </label>
            <span class="theme-label">Light</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Elements
            const counterDisplay = document.getElementById('counter');
            const countInfo = document.getElementById('count-info');
            const incrementBtn = document.getElementById('increment-btn');
            const particlesContainer = document.getElementById('particles');
            const hexagonContainer = document.getElementById('hexagon-container');
            const themeToggle = document.getElementById('theme-toggle');
            const themeButtons = document.querySelectorAll('.theme-btn');
            
            // Variables
            let count = 0;
            let lastIncrementTime = 0;
            let comboCount = 0;
            
            // Create hexagons
            for (let i = 0; i < 15; i++) {
                const hexagon = document.createElement('div');
                hexagon.classList.add('hexagon');
                hexagon.style.left = `${Math.random() * 100}%`;
                hexagon.style.top = `${Math.random() * 100}%`;
                hexagon.style.animationDelay = `${Math.random() * 5}s`;
                hexagon.style.transform = `scale(${0.5 + Math.random()})`;
                hexagonContainer.appendChild(hexagon);
            }
            
            // Increment function
            function incrementCounter() {
                const now = Date.now();
                const timeDiff = now - lastIncrementTime;
                
                // Check for combo (fast clicks/presses)
                if (timeDiff < 500) {
                    comboCount++;
                } else {
                    comboCount = 0;
                }
                
                count++;
                counterDisplay.textContent = count;
                countInfo.textContent = count;
                
                // Apply different animations based on count and combo
                if (count % 10 === 0) {
                    counterDisplay.classList.add('pulse-effect');
                    setTimeout(() => counterDisplay.classList.remove('pulse-effect'), 500);
                    createMilestone(`×${count}!`);
                } else {
                    counterDisplay.classList.add('glitch-effect');
                    setTimeout(() => counterDisplay.classList.remove('glitch-effect'), 300);
                }
                
                // Create particles
                const particleCount = 5 + (comboCount * 2);
                createParticles(particleCount);
                
                // Special effects for milestones
                if (count % 50 === 0) {
                    createSpecialEffect();
                }
                
                lastIncrementTime = now;
            }
            
            // Create particles
            function createParticles(num) {
                for (let i = 0; i < num; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    
                    // Random size between 5 and 15 pixels
                    const size = 5 + Math.random() * 10;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    
                    // Position near the counter
                    const counterRect = counterDisplay.getBoundingClientRect();
                    const containerRect = particlesContainer.getBoundingClientRect();
                    
                    const x = counterRect.left - containerRect.left + counterRect.width / 2;
                    const y = counterRect.top - containerRect.top + counterRect.height / 2;
                    
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    
                    // Random color
                    const hue = Math.random() * 60 + 120; // Cyan to blue range
                    particle.style.backgroundColor = `hsl(${hue}, 100%, 70%)`;
                    particle.style.boxShadow = `0 0 10px hsl(${hue}, 100%, 70%)`;
                    
                    // Animation
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 8;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    
                    particlesContainer.appendChild(particle);
                    
                    // Animate and remove
                    let posX = x;
                    let posY = y;
                    let opacity = 1;
                    let size2 = size;
                    
                    function animateParticle() {
                        if (opacity <= 0) {
                            particle.remove();
                            return;
                        }
                        
                        posX += vx;
                        posY += vy;
                        opacity -= 0.02;
                        size2 *= 0.98;
                        
                        particle.style.left = `${posX}px`;
                        particle.style.top = `${posY}px`;
                        particle.style.opacity = opacity;
                        particle.style.width = `${size2}px`;
                        particle.style.height = `${size2}px`;
                        
                        requestAnimationFrame(animateParticle);
                    }
                    
                    requestAnimationFrame(animateParticle);
                }
            }
            
            // Create milestone text
            function createMilestone(text) {
                const milestone = document.createElement('div');
                milestone.classList.add('milestone');
                milestone.textContent = text;
                
                // Position
                milestone.style.left = `${50 + (Math.random() * 40 - 20)}%`;
                milestone.style.top = `${50 + (Math.random() * 40 - 20)}%`;
                
                document.querySelector('.counter-container').appendChild(milestone);
                
                // Animate
                setTimeout(() => {
                    milestone.style.opacity = '1';
                    milestone.style.transform = 'scale(1.5) translateY(-20px)';
                    milestone.style.transition = 'all 0.5s ease-out';
                    
                    setTimeout(() => {
                        milestone.style.opacity = '0';
                        milestone.style.transform = 'scale(2) translateY(-40px)';
                        
                        setTimeout(() => {
                            milestone.remove();
                        }, 500);
                    }, 1000);
                }, 10);
            }
            
            // Special effect for big milestones
            function createSpecialEffect() {
                // Flash the background
                document.body.style.backgroundColor = 'var(--primary)';
                setTimeout(() => {
                    document.body.style.backgroundColor = 'var(--background)';
                }, 100);
                
                // Create a wave of particles
                for (let i = 0; i < 360; i += 10) {
                    setTimeout(() => {
                        const angle = i * Math.PI / 180;
                        const x = Math.cos(angle) * 100 + 50;
                        const y = Math.sin(angle) * 100 + 50;
                        
                        const particle = document.createElement('div');
                        particle.classList.add('particle');
                        particle.style.width = '10px';
                        particle.style.height = '10px';
                        particle.style.left = `${x}%`;
                        particle.style.top = `${y}%`;
                        particle.style.opacity = '1';
                        
                        const hue = i % 360;
                        particle.style.backgroundColor = `hsl(${hue}, 100%, 70%)`;
                        particle.style.boxShadow = `0 0 15px hsl(${hue}, 100%, 70%)`;
                        
                        particlesContainer.appendChild(particle);
                        
                        setTimeout(() => {
                            particle.style.opacity = '0';
                            particle.style.transform = 'scale(3)';
                            particle.style.transition = 'all 1s ease-out';
                            
                            setTimeout(() => {
                                particle.remove();
                            }, 1000);
                        }, 10);
                    }, i * 5);
                }
            }
            
            // Event listeners
            incrementBtn.addEventListener('click', incrementCounter);
            
            document.addEventListener('keydown', function(event) {
                if (event.code === 'Space') {
                    event.preventDefault();
                    incrementCounter();
                }
            });
            
            // Theme toggle
            themeToggle.addEventListener('change', function() {
                if (this.checked) {
                    document.documentElement.style.setProperty('--background', '#f0f5ff');
                    document.documentElement.style.setProperty('--text', '#111122');
                } else {
                    document.documentElement.style.setProperty('--background', '#111122');
                    document.documentElement.style.setProperty('--text', '#ffffff');
                }
            });
            
            // Theme color buttons
            themeButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const theme = this.getAttribute('data-theme');
                    
                    switch(theme) {
                        case 'cyan':
                            document.documentElement.style.setProperty('--primary', '#00ffaa');
                            document.documentElement.style.setProperty('--secondary', '#0066ff');
                            break;
                        case 'purple':
                            document.documentElement.style.setProperty('--primary', '#ff00cc');
                            document.documentElement.style.setProperty('--secondary', '#9900ff');
                            break;
                        case 'orange':
                            document.documentElement.style.setProperty('--primary', '#ff9900');
                            document.documentElement.style.setProperty('--secondary', '#ff3300');
                            break;
                    }
                });
            });
        });
    </script>
</body>
</html>
