<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Landscape</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
        #input-area {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
        }
        textarea {
            width: 80%;
            height: 60px;
            margin-right: 10px;
        }
        button {
            height: 60px;
            vertical-align: top;
        }
    </style>
</head>
<body>
    <div id="controls">
        <h3>Emotional Landscape</h3>
        <div>
            <label for="time-slider">Time: </label>
            <input type="range" id="time-slider" min="0" max="0" value="0">
            <span id="time-display">Current</span>
        </div>
    </div>
    
    <div id="input-area">
        <textarea id="sentiment-input" placeholder="Enter text to analyze sentiment and update the landscape..."></textarea>
        <button id="analyze-btn">Analyze</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simplex-noise@2.4.0/simplex-noise.min.js"></script>
    <script>
        // Main visualization code
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
        camera.position.set(0, 15, 30);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        document.body.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        
        // Terrain parameters
        const terrainSize = 50;
        const resolution = 100;
        const segmentSize = terrainSize / resolution;
        
        // History of emotional states
        let emotionalHistory = [];
        let currentHistoryIndex = 0;
        
        // Initialize terrain
        let terrain;
        let weatherParticles;
        
        // Simple sentiment analysis function
        function analyzeSentiment(text) {
            // This is a very basic sentiment analysis
            // In a real application, you'd use a proper NLP library
            const positiveWords = ['happy', 'joy', 'love', 'excited', 'good', 'great', 'excellent', 'wonderful', 'amazing'];
            const negativeWords = ['sad', 'angry', 'hate', 'upset', 'bad', 'terrible', 'awful', 'horrible', 'disappointed'];
            
            text = text.toLowerCase();
            let score = 0;
            let words = text.match(/\b(\w+)\b/g) || [];
            
            words.forEach(word => {
                if (positiveWords.includes(word)) score += 1;
                if (negativeWords.includes(word)) score -= 1;
            });
            
            // Normalize between -1 and 1
            return words.length > 0 ? score / Math.max(words.length, 5) : 0;
        }
        
        // Extract emotional dimensions from text
        function extractEmotions(text) {
            const sentiment = analyzeSentiment(text);
            
            // Generate additional emotional dimensions
            // In a real app, these would come from more sophisticated analysis
            const intensity = Math.min(1, Math.abs(sentiment) * 1.5 + Math.random() * 0.3);
            const volatility = Math.random() * 0.5 + (text.includes('!') ? 0.5 : 0);
            
            return {
                sentiment, // -1 to 1 (negative to positive)
                intensity, // 0 to 1 (mild to intense)
                volatility, // 0 to 1 (stable to volatile)
                timestamp: Date.now()
            };
        }
        
        // Generate terrain based on emotional data
        function generateTerrain(emotions) {
            if (terrain) scene.remove(terrain);
            if (weatherParticles) scene.remove(weatherParticles);
            
            const geometry = new THREE.PlaneGeometry(terrainSize, terrainSize, resolution, resolution);
            
            // Create simplex noise for natural-looking terrain
            const simplex = new SimplexNoise();
            
            // Determine color scheme based on sentiment
            let baseColor, peakColor, valleyColor;
            if (emotions.sentiment > 0.3) {
                // Positive emotions - warm colors
                baseColor = new THREE.Color(0xf7d794);
                peakColor = new THREE.Color(0xff9a00);
                valleyColor = new THREE.Color(0xf8c291);
            } else if (emotions.sentiment < -0.3) {
                // Negative emotions - cool/dark colors
                baseColor = new THREE.Color(0x778beb);
                peakColor = new THREE.Color(0x546de5);
                valleyColor = new THREE.Color(0x3dc1d3);
            } else {
                // Neutral emotions - green/earth tones
                baseColor = new THREE.Color(0x7bed9f);
                peakColor = new THREE.Color(0x2ed573);
                valleyColor = new THREE.Color(0xb8e994);
            }
            
            // Modify vertices to create the terrain
            const vertices = geometry.attributes.position;
            const colors = new Float32Array(vertices.count * 3);
            const colorAttribute = new THREE.BufferAttribute(colors, 3);
            
            for (let i = 0; i < vertices.count; i++) {
                const x = vertices.getX(i);
                const y = vertices.getY(i);
                
                // Base noise for natural terrain
                let z = simplex.noise2D(x / 10, y / 10) * 2;
                
                // Add emotional influence
                // Sentiment affects the overall height
                z += emotions.sentiment * 5;
                
                // Intensity creates more dramatic peaks and valleys
                z *= (1 + emotions.intensity);
                
                // Volatility adds additional noise/roughness
                if (emotions.volatility > 0.5) {
                    z += simplex.noise2D(x / 3, y / 3) * emotions.volatility * 2;
                }
                
                vertices.setZ(i, z);
                
                // Color based on height
                let color = new THREE.Color();
                if (z > 2) {
                    color.copy(peakColor);
                } else if (z < -2) {
                    color.copy(valleyColor);
                } else {
                    const t = (z + 2) / 4; // normalize to 0-1
                    color.copy(valleyColor).lerp(peakColor, t);
                }
                
                color.toArray(colors, i * 3);
            }
            
            geometry.setAttribute('color', colorAttribute);
            geometry.computeVertexNormals();
            
            // Create material with vertex colors
            const material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                flatShading: true,
                roughness: 0.8,
                metalness: 0.2
            });
            
            terrain = new THREE.Mesh(geometry, material);
            terrain.rotation.x = -Math.PI / 2;
            scene.add(terrain);
            
            // Add weather effects based on emotional state
            addWeatherEffects(emotions);
        }
        
        function addWeatherEffects(emotions) {
            // Create particles for weather effects
            const particleCount = 1000;
            const particleGeometry = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            
            let particleColor;
            let particleSize = 0.1;
            
            // Determine weather type based on emotions
            if (emotions.sentiment > 0.5 && emotions.intensity > 0.7) {
                // Sunny sparkles for very positive emotions
                particleColor = new THREE.Color(0xffdd00);
                particleSize = 0.15;
                
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    particlePositions[i3] = (Math.random() - 0.5) * terrainSize;
                    particlePositions[i3 + 1] = Math.random() * 15 + 5;
                    particlePositions[i3 + 2] = (Math.random() - 0.5) * terrainSize;
                }
            } else if (emotions.sentiment < -0.5) {
                // Rain for negative emotions
                particleColor = new THREE.Color(0x60a3bc);
                particleSize = 0.08;
                
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    particlePositions[i3] = (Math.random() - 0.5) * terrainSize;
                    particlePositions[i3 + 1] = Math.random() * 20 + 10;
                    particlePositions[i3 + 2] = (Math.random() - 0.5) * terrainSize;
                }
            } else if (emotions.volatility > 0.7) {
                // Fog/mist for volatile emotions
                particleColor = new THREE.Color(0xdfe4ea);
                particleSize = 0.2;
                
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    particlePositions[i3] = (Math.random() - 0.5) * terrainSize * 1.2;
                    particlePositions[i3 + 1] = Math.random() * 5;
                    particlePositions[i3 + 2] = (Math.random() - 0.5) * terrainSize * 1.2;
                }
            } else {
                // Gentle clouds for neutral emotions
                particleColor = new THREE.Color(0xf1f2f6);
                particleSize = 0.25;
                
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    particlePositions[i3] = (Math.random() - 0.5) * terrainSize;
                    particlePositions[i3 + 1] = Math.random() * 10 + 8;
                    particlePositions[i3 + 2] = (Math.random() - 0.5) * terrainSize;
                }
            }
            
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            
            const particleMaterial = new THREE.PointsMaterial({
                color: particleColor,
                size: particleSize,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });
            
            weatherParticles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(weatherParticles);
        }
        
        // Update the time slider when new emotional data is added
        function updateTimeSlider() {
            const slider = document.getElementById('time-slider');
            slider.max = emotionalHistory.length - 1;
            slider.value = emotionalHistory.length - 1;
            currentHistoryIndex = emotionalHistory.length - 1;
            
            updateTimeDisplay();
        }
        
        function updateTimeDisplay() {
            const display = document.getElementById('time-display');
            if (currentHistoryIndex === emotionalHistory.length - 1) {
                display.textContent = 'Current';
            } else {
                const timeDiff = Date.now() - emotionalHistory[currentHistoryIndex].timestamp;
                const minutes = Math.floor(timeDiff / 60000);
                display.textContent = `${minutes} minute${minutes !== 1 ? 's' : ''} ago`;
            }
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Animate weather particles if they exist
            if (weatherParticles) {
                const positions = weatherParticles.geometry.attributes.position;
                const count = positions.count;
                
                for (let i = 0; i < count; i++) {
                    const i3 = i * 3;
                    
                    // Different animation based on current emotion
                    if (emotionalHistory.length > 0) {
                        const emotions = emotionalHistory[currentHistoryIndex];
                        
                        if (emotions.sentiment < -0.5) {
                            // Rain falls down
                            positions.array[i3 + 1] -= 0.1;
                            if (positions.array[i3 + 1] < -2) {
                                positions.array[i3 + 1] = 20;
                            }
                        } else if (emotions.volatility > 0.7) {
                            // Fog swirls slowly
                            positions.array[i3] += Math.sin(Date.now() * 0.001 + i) * 0.01;
                            positions.array[i3 + 2] += Math.cos(Date.now() * 0.001 + i) * 0.01;
                        } else {
                            // Clouds/sun particles drift
                            positions.array[i3] += Math.sin(Date.now() * 0.0005) * 0.01;
                            positions.array[i3 + 2] += Math.cos(Date.now() * 0.0005) * 0.01;
                        }
                    }
                }
                
                positions.needsUpdate = true;
            }
            
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;
            
            camera.aspect = newWidth / newHeight;
            camera.updateProjectionMatrix();
            
            renderer.setSize(newWidth, newHeight);
        });
        
        // Initialize with default emotional state
        const defaultEmotions = {
            sentiment: 0,
            intensity: 0.5,
            volatility: 0.3,
            timestamp: Date.now()
        };
        
        emotionalHistory.push(defaultEmotions);
        generateTerrain(defaultEmotions);
        updateTimeSlider();
        
        // Event listeners
        document.getElementById('analyze-btn').addEventListener('click', () => {
            const text = document.getElementById('sentiment-input').value;
            if (text.trim()) {
                const emotions = extractEmotions(text);
                emotionalHistory.push(emotions);
                generateTerrain(emotions);
                updateTimeSlider();
                document.getElementById('sentiment-input').value = '';
            }
        });
        
        document.getElementById('time-slider').addEventListener('input', (e) => {
            currentHistoryIndex = parseInt(e.target.value);
            if (emotionalHistory[currentHistoryIndex]) {
                generateTerrain(emotionalHistory[currentHistoryIndex]);
                updateTimeDisplay();
            }
        });
        
        // Start animation loop
        animate();
    </script>
</body>
</html>
