<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Neural Dimension</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        .interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .hud {
            position: absolute;
            color: rgba(0, 255, 255, 0.7);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            font-size: 14px;
        }
        .top-left {
            top: 20px;
            left: 20px;
        }
        .top-right {
            top: 20px;
            right: 20px;
            text-align: right;
        }
        .bottom-left {
            bottom: 20px;
            left: 20px;
        }
        .bottom-right {
            bottom: 20px;
            right: 20px;
            text-align: right;
        }
        .center-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            animation: pulse 5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0; text-shadow: 0 0 10px rgba(0, 255, 255, 0); }
            50% { opacity: 1; text-shadow: 0 0 30px rgba(0, 255, 255, 0.8); }
            100% { opacity: 0; text-shadow: 0 0 10px rgba(0, 255, 255, 0); }
        }
        .loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0ff;
            font-size: 24px;
            z-index: 100;
            transition: opacity 2s ease-out;
        }
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, transparent 50%, rgba(0, 255, 255, 0.04) 50%, rgba(0, 255, 255, 0.04));
            background-size: 100% 4px;
            z-index: 15;
            pointer-events: none;
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }
    </style>
</head>
<body>
    <div class="loader">INITIALIZING NEURAL DIMENSION...</div>
    <div class="interface">
        <div class="scanline"></div>
        <div class="hud top-left">
            <div>NEURAL FLOW: <span id="metric1">97.3%</span></div>
            <div>QUANTUM STABILITY: <span id="metric2">OPTIMAL</span></div>
        </div>
        <div class="hud top-right">
            <div>DIMENSION: <span id="metric3">ALPHA-7</span></div>
            <div>SYNERGY: <span id="metric4">HARMONIZED</span></div>
        </div>
        <div class="hud bottom-left">
            <div>TEMPORAL SHIFT: <span id="metric5">0.42</span></div>
            <div>PARTICLE FLOW: <span id="metric6">DYNAMIC</span></div>
        </div>
        <div class="hud bottom-right">
            <div>REALITY ANCHORS: <span id="metric7">STABLE</span></div>
            <div>CONSCIOUSNESS SYNC: <span id="metric8">94.7%</span></div>
        </div>
        <div class="center-message">Transcending Dimensional Boundaries</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { EffectComposer } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/ShaderPass.js';
        import { LuminosityHighPassShader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/shaders/LuminosityHighPassShader.js';
        
        // Randomization helpers
        const random = (min, max) => Math.random() * (max - min) + min;
        const randomInt = (min, max) => Math.floor(random(min, max));

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 50;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);
        
        // Post-processing
        const renderScene = new RenderPass(scene, camera);
        
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,  // strength
            0.4,  // radius
            0.85  // threshold
        );
        
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0x111111);
        scene.add(ambientLight);
        
        const pointLight1 = new THREE.PointLight(0x0088ff, 2, 100);
        pointLight1.position.set(10, 10, 10);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0xff00ff, 2, 100);
        pointLight2.position.set(-10, -10, 10);
        scene.add(pointLight2);
        
        // Particle systems
        const createParticleSystem = (count, size, color, speed, spread) => {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            const velocities = [];
            
            for (let i = 0; i < count; i++) {
                vertices.push(
                    random(-spread, spread),
                    random(-spread, spread),
                    random(-spread, spread)
                );
                
                velocities.push(
                    random(-speed, speed) * 0.1,
                    random(-speed, speed) * 0.1,
                    random(-speed, speed) * 0.1
                );
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('velocity', new THREE.Float32BufferAttribute(velocities, 3));
            
            const material = new THREE.PointsMaterial({
                size,
                color,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            
            const particles = new THREE.Points(geometry, material);
            particles.userData.velocityAttribute = particles.geometry.getAttribute('velocity');
            
            scene.add(particles);
            return particles;
        };
        
        const particleSystems = [
            createParticleSystem(2000, 0.2, 0x00ffff, 0.2, 100),
            createParticleSystem(1000, 0.3, 0xff00ff, 0.3, 80),
            createParticleSystem(500, 0.5, 0xffff00, 0.4, 60)
        ];
        
        // Neural network visualization
        const createNeuralNode = (x, y, z, size, color) => {
            const geometry = new THREE.SphereGeometry(size, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color,
                emissive: color,
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.2
            });
            
            const node = new THREE.Mesh(geometry, material);
            node.position.set(x, y, z);
            scene.add(node);
            return node;
        };
        
        const createNeuralConnection = (nodeA, nodeB, color) => {
            const material = new THREE.LineBasicMaterial({ 
                color, 
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            
            const points = [nodeA.position, nodeB.position];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            
            return {
                line,
                update: () => {
                    const positions = line.geometry.attributes.position.array;
                    positions[0] = nodeA.position.x;
                    positions[1] = nodeA.position.y;
                    positions[2] = nodeA.position.z;
                    positions[3] = nodeB.position.x;
                    positions[4] = nodeB.position.y;
                    positions[5] = nodeB.position.z;
                    line.geometry.attributes.position.needsUpdate = true;
                }
            };
        };
        
        // Create neural network structure
        const nodes = [];
        const connections = [];
        const nodeCount = 50;
        
        for (let i = 0; i < nodeCount; i++) {
            const angle = random(0, Math.PI * 2);
            const height = random(-20, 20);
            const radius = random(15, 30);
            
            const x = Math.cos(angle) * radius;
            const y = height;
            const z = Math.sin(angle) * radius;
            
            const size = random(0.2, 0.5);
            const hue = (i / nodeCount) * 360;
            const color = new THREE.Color(`hsl(${hue}, 100%, 70%)`);
            
            const node = createNeuralNode(x, y, z, size, color);
            node.userData = {
                initialPos: new THREE.Vector3(x, y, z),
                phase: random(0, Math.PI * 2),
                speed: random(0.005, 0.02),
                amplitude: random(0.5, 2)
            };
            
            nodes.push(node);
        }
        
        // Connect nodes
        for (let i = 0; i < nodes.length; i++) {
            const connectionsCount = randomInt(2, 5);
            
            for (let j = 0; j < connectionsCount; j++) {
                const targetIndex = randomInt(0, nodes.length);
                if (targetIndex !== i) {
                    const hue = ((i + targetIndex) / (nodes.length * 2)) * 360;
                    const color = new THREE.Color(`hsl(${hue}, 100%, 70%)`);
                    const connection = createNeuralConnection(nodes[i], nodes[targetIndex], color);
                    connections.push(connection);
                }
            }
        }
        
        // Energy core
        const coreGeometry = new THREE.IcosahedronGeometry(5, 4);
        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ffff,
            emissive: 0x00ffff,
            emissiveIntensity: 1,
            metalness: 1,
            roughness: 0,
            wireframe: true
        });
        
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);
        
        // Energy rings
        const rings = [];
        
        for (let i = 0; i < 3; i++) {
            const radius = 8 + i * 3;
            const tube = 0.2;
            const radialSegments = 16;
            const tubularSegments = 100;
            
            const geometry = new THREE.TorusGeometry(radius, tube, radialSegments, tubularSegments);
            const hue = i * 60;
            const material = new THREE.MeshStandardMaterial({
                color: new THREE.Color(`hsl(${hue}, 100%, 70%)`),
                emissive: new THREE.Color(`hsl(${hue}, 100%, 70%)`),
                emissiveIntensity: 0.7,
                metalness: 0.8,
                roughness: 0.2
            });
            
            const ring = new THREE.Mesh(geometry, material);
            ring.rotation.x = Math.PI / 2;
            ring.userData = {
                rotationSpeed: random(0.005, 0.01),
                wobblePhase: random(0, Math.PI * 2),
                wobbleSpeed: random(0.01, 0.03),
                wobbleAmount: random(0.1, 0.3)
            };
            
            scene.add(ring);
            rings.push(ring);
        }
        
        // Flying data cubes
        const cubes = [];
        const cubeCount = 30;
        
        for (let i = 0; i < cubeCount; i++) {
            const size = random(0.2, 0.8);
            const geometry = new THREE.BoxGeometry(size, size, size);
            
            const hue = random(180, 270);
            const material = new THREE.MeshStandardMaterial({
                color: new THREE.Color(`hsl(${hue}, 100%, 70%)`),
                emissive: new THREE.Color(`hsl(${hue}, 100%, 70%)`),
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.2,
                transparent: true,
                opacity: 0.7
            });
            
            const cube = new THREE.Mesh(geometry, material);
            
            // Starting position on a larger sphere
            const phi = Math.acos(-1 + (2 * i) / cubeCount);
            const theta = Math.sqrt(cubeCount * Math.PI) * phi;
            
            const radius = random(40, 60);
            cube.position.x = radius * Math.sin(phi) * Math.cos(theta);
            cube.position.y = radius * Math.sin(phi) * Math.sin(theta);
            cube.position.z = radius * Math.cos(phi);
            
            // Target (where the cube is flying to)
            const targetRadius = random(10, 20);
            const target = new THREE.Vector3(
                targetRadius * Math.sin(phi) * Math.cos(theta),
                targetRadius * Math.sin(phi) * Math.sin(theta),
                targetRadius * Math.cos(phi)
            );
            
            cube.userData = {
                target,
                speed: random(0.01, 0.03),
                rotationSpeed: {
                    x: random(-0.03, 0.03),
                    y: random(-0.03, 0.03),
                    z: random(-0.03, 0.03)
                },
                reachedTarget: false,
                respawnDelay: random(100, 300),
                respawnTimer: 0
            };
            
            scene.add(cube);
            cubes.push(cube);
        }
        
        // Create energy beams
        const beams = [];
        const beamCount = 8;
        
        for (let i = 0; i < beamCount; i++) {
            const beamGeometry = new THREE.CylinderGeometry(0.1, 0.1, 40, 8, 1, true);
            const hue = random(160, 280);
            const beamMaterial = new THREE.MeshBasicMaterial({
                color: new THREE.Color(`hsl(${hue}, 100%, 70%)`),
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            
            const beam = new THREE.Mesh(beamGeometry, beamMaterial);
            beam.rotation.x = Math.PI / 2;
            
            const angle = (i / beamCount) * Math.PI * 2;
            const radius = 15;
            beam.position.x = Math.cos(angle) * radius;
            beam.position.z = Math.sin(angle) * radius;
            
            beam.userData = {
                pulsePhase: random(0, Math.PI * 2),
                pulseSpeed: random(0.05, 0.1),
                rotationSpeed: random(0.003, 0.01) * (Math.random() > 0.5 ? 1 : -1)
            };
            
            scene.add(beam);
            beams.push(beam);
        }
        
        // HUD animations
        const updateHUD = () => {
            const metrics = [
                document.getElementById('metric1'),
                document.getElementById('metric2'),
                document.getElementById('metric3'),
                document.getElementById('metric4'),
                document.getElementById('metric5'),
                document.getElementById('metric6'),
                document.getElementById('metric7'),
                document.getElementById('metric8')
            ];
            
            const values = [
                `${(95 + Math.sin(Date.now() * 0.001) * 5).toFixed(1)}%`,
                ['OPTIMAL', 'BALANCED', 'STABILIZING'][Math.floor((Date.now() * 0.0001) % 3)],
                `ALPHA-${Math.floor(7 + Math.sin(Date.now() * 0.0005) * 2)}`,
                ['HARMONIZED', 'SYNERGIZING', 'RESONATING'][Math.floor((Date.now() * 0.0002) % 3)],
                (0.4 + Math.sin(Date.now() * 0.001) * 0.1).toFixed(2),
                ['DYNAMIC', 'FLOWING', 'PULSING'][Math.floor((Date.now() * 0.0003) % 3)],
                ['STABLE', 'ANCHORED', 'ALIGNED'][Math.floor((Date.now() * 0.00015) % 3)],
                `${(90 + Math.sin(Date.now() * 0.0008) * 9).toFixed(1)}%`
            ];
            
            metrics.forEach((element, index) => {
                if (element) element.textContent = values[index];
            });
        };
        
        // Animation loop
        const animate = () => {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // Rotate camera around the scene
            camera.position.x = Math.sin(time * 0.1) * 60;
            camera.position.z = Math.cos(time * 0.1) * 60;
            camera.lookAt(0, 0, 0);
            
            // Update particle systems
            particleSystems.forEach(particles => {
                const positions = particles.geometry.attributes.position.array;
                const velocities = particles.userData.velocityAttribute.array;
                
                for (let i = 0; i < positions.length; i += 3) {
                    positions[i] += velocities[i];
                    positions[i + 1] += velocities[i + 1];
                    positions[i + 2] += velocities[i + 2];
                    
                    // Boundary check
                    const distance = Math.sqrt(
                        positions[i] * positions[i] + 
                        positions[i + 1] * positions[i + 1] + 
                        positions[i + 2] * positions[i + 2]
                    );
                    
                    if (distance > 100) {
                        positions[i] *= 0.1;
                        positions[i + 1] *= 0.1;
                        positions[i + 2] *= 0.1;
                    }
                }
                
                particles.geometry.attributes.position.needsUpdate = true;
                particles.rotation.y = time * 0.05;
            });
            
            // Update neural nodes
            nodes.forEach(node => {
                const { initialPos, phase, speed, amplitude } = node.userData;
                
                node.position.x = initialPos.x + Math.sin(time * speed + phase) * amplitude;
                node.position.y = initialPos.y + Math.cos(time * speed * 1.5 + phase) * amplitude * 0.5;
                node.position.z = initialPos.z + Math.sin(time * speed * 0.7 + phase) * amplitude;
            });
            
            // Update neural connections
            connections.forEach(connection => {
                connection.update();
            });
            
            // Rotate core
            core.rotation.x = time * 0.2;
            core.rotation.y = time * 0.3;
            core.rotation.z = time * 0.1;
            
            // Pulse core scale
            const coreScale = 1 + Math.sin(time * 2) * 0.1;
            core.scale.set(coreScale, coreScale, coreScale);
            
            // Update rings
            rings.forEach(ring => {
                const { rotationSpeed, wobblePhase, wobbleSpeed, wobbleAmount } = ring.userData;
                
                ring.rotation.z += rotationSpeed;
                ring.rotation.x = Math.PI / 2 + Math.sin(time * wobbleSpeed + wobblePhase) * wobbleAmount;
                ring.rotation.y = Math.sin(time * wobbleSpeed * 0.7 + wobblePhase) * wobbleAmount;
            });
            
            // Update cubes
            cubes.forEach(cube => {
                const { target, speed, rotationSpeed, reachedTarget, respawnTimer } = cube.userData;
                
                if (!reachedTarget) {
                    // Move towards target
                    cube.position.lerp(target, speed);
                    
                    // Check if reached target
                    const distance = cube.position.distanceTo(target);
                    if (distance < 0.5) {
                        cube.userData.reachedTarget = true;
                    }
                } else {
                    // Handle respawn logic
                    cube.userData.respawnTimer++;
                    
                    if (cube.userData.respawnTimer >= cube.userData.respawnDelay) {
                        // Respawn at new outer position
                        const phi = Math.random() * Math.PI * 2;
                        const theta = Math.random() * Math.PI;
                        
                        const radius = random(40, 60);
                        cube.position.x = radius * Math.sin(theta) * Math.cos(phi);
                        cube.position.y = radius * Math.sin(theta) * Math.sin(phi);
                        cube.position.z = radius * Math.cos(theta);
                        
                        // Set new target
                        const targetRadius = random(10, 20);
                        cube.userData.target = new THREE.Vector3(
                            targetRadius * Math.sin(theta) * Math.cos(phi),
                            targetRadius * Math.sin(theta) * Math.sin(phi),
                            targetRadius * Math.cos(theta)
                        );
                        
                        cube.userData.reachedTarget = false;
                        cube.userData.respawnTimer = 0;
                        cube.userData.speed = random(0.01, 0.03);
                    }
                }
                
                // Rotate cube
                cube.rotation.x += rotationSpeed.x;
                cube.rotation.y += rotationSpeed.y;
                cube.rotation.z += rotationSpeed.z;
            });
            
            // Update beams
            beams.forEach(beam => {
                const { pulsePhase, pulseSpeed, rotationSpeed } = beam.userData;
                
                beam.material.opacity = 0.3 + Math.sin(time * pulseSpeed + pulsePhase) * 0.2;
                beam.rotation.y += rotationSpeed;
                
                // Make beam scale pulse
                const scaleY = 1 + Math.sin(time * pulseSpeed * 2 + pulsePhase) * 0.2;
                beam.scale.y = scaleY;
            });
            
            // Update HUD
            updateHUD();
            
            // Render scene with post-processing
            composer.render();
        };
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Mouse interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });
        
        // Add subtle camera movement following the mouse
        const updateCamera = () => {
            camera.position.x += (mouse.x * 5 - camera.position.x) * 0.01;
            camera.position.y += (mouse.y * 5 - camera.position.y) * 0.01;
            camera.lookAt(0, 0, 0);
            
            requestAnimationFrame(updateCamera);
        };
        
        updateCamera();
        
        // Hide loader after 3 seconds
        setTimeout(() => {
            const loader = document.querySelector('.loader');
            if (loader) {
                loader.style.opacity = 0;
                setTimeout(() => loader.style.display = 'none', 2000);
            }
        }, 3000);
        
        // Start animation loop
        animate();
    </script>
</body>
</html>
