<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Calculator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Default Theme - Neon Cyberpunk */
            --primary-bg: #0a0a0a;
            --secondary-bg: #1a1a1a;
            --accent-color: #00fff2;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --neon-glow: 0 0 10px var(--accent-color);
            --error-color: #ff3333;
            --success-color: #00ff95;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            background: var(--secondary-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--accent-color);
            box-shadow: var(--neon-glow);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .digital-clock {
            text-align: center;
            padding: 15px;
            background: rgba(0, 255, 242, 0.1);
            border-radius: 10px;
            border: 1px solid var(--accent-color);
        }

        .time {
            font-size: 2em;
            color: var(--accent-color);
            text-shadow: var(--neon-glow);
        }

        .date {
            font-size: 1em;
            color: var(--text-secondary);
        }

        .user-info {
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid var(--accent-color);
        }

        /* Main Calculator Styles */
        .main-content {
            background: var(--secondary-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--accent-color);
            box-shadow: var(--neon-glow);
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 20px;
        }

        .calculator {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 15px;
        }

        .display {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--accent-color);
        }

        .expression {
            font-size: 1.2em;
            color: var(--text-secondary);
            min-height: 24px;
            margin-bottom: 5px;
        }

        .result {
            font-size: 2.5em;
            color: var(--accent-color);
            text-align: right;
            text-shadow: var(--neon-glow);
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            padding: 15px;
            font-size: 1.2em;
            border: 1px solid var(--accent-color);
            background: rgba(0, 255, 242, 0.1);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: var(--neon-glow);
        }

        .btn:hover {
            background: var(--accent-color);
            color: var(--primary-bg);
            transform: translateY(-2px);
            box-shadow: var(--neon-glow);
        }

        .btn.operator {
            background: rgba(255, 0, 242, 0.1);
            border-color: #ff00f2;
        }

        .btn.operator:hover {
            background: #ff00f2;
        }

        .btn.function {
            background: rgba(0, 242, 255, 0.1);
            border-color: #00f2ff;
        }

        .btn.function:hover {
            background: #00f2ff;
        }

        /* Notes Panel */
        .notes-panel {
            background: var(--secondary-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--accent-color);
            margin-top: 20px;
        }

        .note-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--accent-color);
            color: var(--text-primary);
            border-radius: 8px;
            margin-bottom: 10px;
            resize: vertical;
        }

        .notes-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .note-item {
            padding: 10px;
            background: rgba(0, 255, 242, 0.1);
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--accent-color);
        }

        /* Settings Panel */
        .settings-panel {
            position: fixed;
            right: -300px;
            top: 0;
            width: 300px;
            height: 100%;
            background: var(--secondary-bg);
            padding: 20px;
            transition: right 0.3s ease;
            border-left: 1px solid var(--accent-color);
            z-index: 1000;
        }

        .settings-panel.active {
            right: 0;
        }

        .theme-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid var(--accent-color);
        }

        .theme-option:hover {
            background: rgba(0, 255, 242, 0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--secondary-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }

        /* Animations */
        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--accent-color); }
            50% { box-shadow: 0 0 20px var(--accent-color); }
            100% { box-shadow: 0 0 5px var(--accent-color); }
        }

        .glow-effect {
            animation: glow 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: 2;
            }

            .settings-panel {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="user-info">
                <h3>Welcome</h3>
            </div>
            
            <div class="digital-clock">
                <div class="time" id="time">00:00:00</div>
                <div class="date" id="date">2025-01-30</div>
            </div>

            <div class="notes-panel">
                <h3>Quick Notes</h3>
                <textarea class="note-input" placeholder="Add a note..."></textarea>
                <div class="notes-list" id="notesList"></div>
            </div>
        </aside>

        <main class="main-content">
            <div class="calculator">
                <div class="display">
                    <div class="expression" id="expression"></div>
                    <div class="result" id="result">0</div>
                </div>

                <div class="keypad">
                    <button class="btn function">MC</button>
                    <button class="btn function">MR</button>
                    <button class="btn function">M+</button>
                    <button class="btn function">M-</button>

                    <button class="btn operator">√</button>
                    <button class="btn operator">x²</button>
                    <button class="btn operator">%</button>
                    <button class="btn operator">÷</button>

                    <button class="btn">7</button>
                    <button class="btn">8</button>
                    <button class="btn">9</button>
                    <button class="btn operator">×</button>

                    <button class="btn">4</button>
                    <button class="btn">5</button>
                    <button class="btn">6</button>
                    <button class="btn operator">-</button>

                    <button class="btn">1</button>
                    <button class="btn">2</button>
                    <button class="btn">3</button>
                    <button class="btn operator">+</button>

                    <button class="btn">±</button>
                    <button class="btn">0</button>
                    <button class="btn">.</button>
                    <button class="btn operator">=</button>
                </div>
            </div>
        </main>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <h2>Settings</h2>
        <div class="theme-options">
            <div class="theme-option" data-theme="cyberpunk">
                <span class="theme-color" style="background: #00fff2"></span>
                <span>Cyberpunk</span>
            </div>
            <div class="theme-option" data-theme="matrix">
                <span class="theme-color" style="background: #00ff00"></span>
                <span>Matrix</span>
            </div>
            <div class="theme-option" data-theme="synthwave">
                <span class="theme-color" style="background: #ff00ff"></span>
                <span>Synthwave</span>
            </div>
        </div>
    </div>

    <script>
        // Calculator functionality
        let currentExpression = '';
        let currentResult = '0';
        let memory = 0;

        const expressionDisplay = document.getElementById('expression');
        const resultDisplay = document.getElementById('result');

        document.querySelector('.keypad').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn')) {
                handleButtonClick(e.target.textContent);
            }
        });

        function handleButtonClick(value) {
            switch(value) {
                case '=':
                    calculateResult();
                    break;
                case 'C':
                    clearCalculator();
                    break;
                case '±':
                    toggleSign();
                    break;
                case 'MC':
                    memory = 0;
                    break;
                case 'MR':
                    currentResult = memory.toString();
                    resultDisplay.textContent = currentResult;
                    break;
                case 'M+':
                    memory += parseFloat(currentResult);
                    break;
                case 'M-':
                    memory -= parseFloat(currentResult);
                    break;
                default:
                    updateExpression(value);
            }
        }

        function calculateResult() {
            try {
                currentResult = eval(currentExpression).toString();
                expressionDisplay.textContent = currentExpression + ' =';
                resultDisplay.textContent = currentResult;
                currentExpression = currentResult;
            } catch (error) {
                resultDisplay.textContent = 'Error';
            }
        }

        function updateExpression(value) {
            currentExpression += value;
            expressionDisplay.textContent = currentExpression;
        }

        // Clock functionality
        function updateClock() {
            const now = new Date();
            const timeDisplay = document.getElementById('time');
            const dateDisplay = document.getElementById('date');

            timeDisplay.textContent = now.toTimeString().split(' ')[0];
            dateDisplay.textContent = now.toISOString().split('T')[0];
        }

        setInterval(updateClock, 1000);
        updateClock();

        // Notes functionality
        const noteInput = document.querySelector('.note-input');
        const notesList = document.getElementById('notesList');
        let notes = JSON.parse(localStorage.getItem('calculator_notes')) || [];

        noteInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                addNote(noteInput.value);
                noteInput.value = '';
            }
        });

        function addNote(content) {
            if (content.trim()) {
                const note = {
                    id: Date.now(),
                    content,
                    timestamp: new Date().toISOString()
                };
                notes.unshift(note);
                localStorage.setItem('calculator_notes', JSON.stringify(notes));
                renderNotes();
            }
        }

        function renderNotes() {
            notesList.innerHTML = notes.map(note => `
                <div class="note-item">
                    <p>${note.content}</p>
                    <small>${new Date(note.timestamp).toLocaleString()}</small>
                </div>
            `).join('');
        }

        // Theme functionality
        const themeOptions = document.querySelectorAll('.theme-option');
        const themes = {
            cyberpunk: {
                '--accent-color': '#00fff2',
                '--primary-bg': '#0a0a0a',
                '--secondary-bg': '#1a1a1a'
            },
            matrix: {
                '--accent-color': '#00ff00',
                '--primary-bg': '#000000',
                '--secondary-bg': '#0a0a0a'
            },
            synthwave: {
                '--accent-color': '#ff00ff',
                '--primary-bg': '#2b0028',
                '--secondary-bg': '#1a001a'
            }
            <!-- Continue from previous script tag -->
        };

        themeOptions.forEach(option => {
            option.addEventListener('click', () => {
                const theme = option.dataset.theme;
                applyTheme(theme);
            });
        });

        function applyTheme(themeName) {
            const theme = themes[themeName];
            Object.keys(theme).forEach(property => {
                document.documentElement.style.setProperty(property, theme[property]);
            });
            localStorage.setItem('calculator_theme', themeName);
        }

        // Settings Panel Toggle
        const settingsButton = document.createElement('button');
        settingsButton.innerHTML = '<i class="fas fa-cog"></i>';
        settingsButton.classList.add('settings-toggle');
        document.body.appendChild(settingsButton);

        settingsButton.addEventListener('click', () => {
            document.getElementById('settingsPanel').classList.toggle('active');
        });

        // Advanced Calculator Features
        function calculateSquareRoot() {
            const number = parseFloat(currentResult);
            if (number >= 0) {
                currentResult = Math.sqrt(number).toString();
                expressionDisplay.textContent = `√(${number})`;
                resultDisplay.textContent = currentResult;
            } else {
                resultDisplay.textContent = 'Error';
            }
        }

        function calculateSquare() {
            const number = parseFloat(currentResult);
            currentResult = (number * number).toString();
            expressionDisplay.textContent = `(${number})²`;
            resultDisplay.textContent = currentResult;
        }

        function calculatePercentage() {
            const number = parseFloat(currentResult);
            currentResult = (number / 100).toString();
            expressionDisplay.textContent = `${number}%`;
            resultDisplay.textContent = currentResult;
        }

        // History Feature
        const calculationHistory = [];
        const maxHistoryItems = 10;

        function addToHistory(expression, result) {
            calculationHistory.unshift({
                expression,
                result,
                timestamp: new Date().toISOString()
            });

            if (calculationHistory.length > maxHistoryItems) {
                calculationHistory.pop();
            }

            saveHistory();
            renderHistory();
        }

        function saveHistory() {
            localStorage.setItem('calculator_history', JSON.stringify(calculationHistory));
        }

        // Backup & Restore Feature
        function createBackup() {
            const backup = {
                notes,
                history: calculationHistory,
                theme: localStorage.getItem('calculator_theme'),
                timestamp: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `calculator_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            
            URL.revokeObjectURL(url);
        }

        function restoreBackup(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const backup = JSON.parse(e.target.result);
                    notes = backup.notes;
                    calculationHistory.length = 0;
                    calculationHistory.push(...backup.history);
                    applyTheme(backup.theme);
                    
                    localStorage.setItem('calculator_notes', JSON.stringify(notes));
                    localStorage.setItem('calculator_history', JSON.stringify(calculationHistory));
                    localStorage.setItem('calculator_theme', backup.theme);
                    
                    renderNotes();
                    renderHistory();
                    showNotification('Backup restored successfully!');
                } catch (error) {
                    showNotification('Error restoring backup!', 'error');
                }
            };
            reader.readAsText(file);
        }

        // Notification System
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.classList.add('show');
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 300);
                }, 2000);
            }, 100);
        }

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9' || ['+', '-', '*', '/', '.'].includes(e.key)) {
                handleButtonClick(e.key);
            } else if (e.key === 'Enter') {
                handleButtonClick('=');
            } else if (e.key === 'Escape') {
                handleButtonClick('C');
            } else if (e.key === 'Backspace') {
                currentExpression = currentExpression.slice(0, -1);
                expressionDisplay.textContent = currentExpression;
            }
        });

        // Add these styles to support notifications
        const style = document.createElement('style');
        style.textContent = `
            .notification {
                position: fixed;
                bottom: 20px;
                right: 20px;
                padding: 15px 25px;
                border-radius: 8px;
                background: var(--secondary-bg);
                border: 1px solid var(--accent-color);
                color: var(--text-primary);
                transform: translateY(100px);
                opacity: 0;
                transition: all 0.3s ease;
                z-index: 1000;
            }

            .notification.show {
                transform: translateY(0);
                opacity: 1;
            }

            .notification.success {
                border-color: var(--success-color);
            }

            .notification.error {
                border-color: var(--error-color);
            }

            .backup-controls {
                margin-top: 20px;
                padding: 15px;
                border-top: 1px solid var(--accent-color);
            }

            .backup-btn {
                width: 100%;
                padding: 10px;
                margin-bottom: 10px;
                background: rgba(0, 255, 242, 0.1);
                border: 1px solid var(--accent-color);
                color: var(--text-primary);
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .backup-btn:hover {
                background: var(--accent-color);
                color: var(--primary-bg);
            }
        `;
        document.head.appendChild(style);

        // Add backup controls to settings panel
        const backupControls = document.createElement('div');
        backupControls.className = 'backup-controls';
        backupControls.innerHTML = `
            <button class="backup-btn" onclick="createBackup()">Create Backup</button>
            <input type="file" id="restoreFile" accept=".json" style="display: none">
            <button class="backup-btn" onclick="document.getElementById('restoreFile').click()">Restore Backup</button>
        `;
        document.getElementById('settingsPanel').appendChild(backupControls);

        document.getElementById('restoreFile').addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                restoreBackup(e.target.files[0]);
            }
        });

        // Initialize
        function initialize() {
            // Load saved theme
            const savedTheme = localStorage.getItem('calculator_theme');
            if (savedTheme) {
                applyTheme(savedTheme);
            }

            // Load saved history
            const savedHistory = localStorage.getItem('calculator_history');
            if (savedHistory) {
                calculationHistory.push(...JSON.parse(savedHistory));
                renderHistory();
            }

            // Render initial notes
            renderNotes();

            // Start clock
            updateClock();
        }

        initialize();
    </script>
</body>
</html>
