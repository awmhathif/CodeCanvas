<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Builder Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Toolbar */
        .toolbar {
            width: 280px;
            background: #2c3e50;
            color: white;
            padding: 20px;
            overflow-y: auto;
        }

        .toolbar h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .tool-section {
            margin-bottom: 25px;
        }

        .tool-section h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: #ecf0f1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .tool-btn {
            background: #34495e;
            border: none;
            padding: 12px 8px;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            font-size: 12px;
            transition: all 0.2s;
            text-align: center;
        }

        .tool-btn:hover {
            background: #4a5f7f;
            transform: translateY(-2px);
        }

        .tool-btn:active {
            transform: translateY(0);
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: #ecf0f1;
        }

        .control-group input,
        .control-group select {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
        }

        .color-picker-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-picker-group input[type="color"] {
            width: 50px;
            height: 35px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #27ae60;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #229954;
        }

        .action-btn.secondary {
            background: #3498db;
        }

        .action-btn.secondary:hover {
            background: #2980b9;
        }

        .action-btn.danger {
            background: #e74c3c;
        }

        .action-btn.danger:hover {
            background: #c0392b;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ecf0f1;
        }

        .top-bar {
            background: white;
            padding: 15px 20px;
            border-bottom: 2px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar h1 {
            font-size: 22px;
            color: #2c3e50;
        }

        .top-actions {
            display: flex;
            gap: 10px;
        }

        .top-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .top-btn.primary {
            background: #27ae60;
            color: white;
        }

        .top-btn.primary:hover {
            background: #229954;
        }

        .canvas-wrapper {
            flex: 1;
            overflow: auto;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        #canvas {
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
            cursor: crosshair;
        }

        /* Elements on Canvas */
        .element {
            position: absolute;
            cursor: move;
            user-select: none;
            transition: box-shadow 0.2s;
        }

        .element:hover {
            box-shadow: 0 0 0 2px #3498db;
        }

        .element.selected {
            box-shadow: 0 0 0 3px #e74c3c;
        }

        .element.navbar {
            background: #34495e;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 14px;
        }

        .element.header {
            background: #ecf0f1;
            border: 2px dashed #95a5a6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #7f8c8d;
        }

        .element.text {
            background: transparent;
            border: 1px dashed #bdc3c7;
            padding: 10px;
            font-size: 14px;
            color: #2c3e50;
            display: flex;
            align-items: center;
        }

        .element.button {
            background: #3498db;
            color: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .element.input {
            background: white;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            padding: 10px;
            font-size: 14px;
            color: #7f8c8d;
        }

        .element.image {
            background: #ecf0f1;
            border: 2px dashed #95a5a6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #95a5a6;
        }

        .element.container {
            background: transparent;
            border: 2px dashed #3498db;
        }

        .element.card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .element.sidebar {
            background: #34495e;
            border-right: 1px solid #2c3e50;
        }

        .element.footer {
            background: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .element.icon {
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #7f8c8d;
        }

        .element.video {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 50px;
        }

        .element.table {
            background: white;
            border: 2px solid #bdc3c7;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: #bdc3c7;
        }

        .element.table > div {
            background: white;
            padding: 10px;
            font-size: 12px;
        }

        .element.form {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
        }

        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #e74c3c;
            border: 2px solid white;
            border-radius: 50%;
            right: -5px;
            bottom: -5px;
            cursor: nwse-resize;
            display: none;
        }

        .element.selected .resize-handle {
            display: block;
        }

        .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 24px;
            height: 24px;
            background: #e74c3c;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        .element.selected .delete-btn {
            display: flex;
        }

        /* Properties Panel */
        .properties {
            width: 280px;
            background: white;
            border-left: 2px solid #ddd;
            padding: 20px;
            overflow-y: auto;
        }

        .properties h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .prop-group {
            margin-bottom: 15px;
        }

        .prop-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #7f8c8d;
            font-weight: 600;
        }

        .prop-group input,
        .prop-group select,
        .prop-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        .prop-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Toolbar -->
        <div class="toolbar">
            <h2>🎨 Wireframe Builder</h2>
            
            <div class="tool-section">
                <h3>Layout Elements</h3>
                <div class="tool-grid">
                    <button class="tool-btn" onclick="addElement('navbar')">📋 Navbar</button>
                    <button class="tool-btn" onclick="addElement('header')">📰 Header</button>
                    <button class="tool-btn" onclick="addElement('sidebar')">📂 Sidebar</button>
                    <button class="tool-btn" onclick="addElement('footer')">📄 Footer</button>
                    <button class="tool-btn" onclick="addElement('container')">📦 Container</button>
                    <button class="tool-btn" onclick="addElement('card')">🃏 Card</button>
                </div>
            </div>

            <div class="tool-section">
                <h3>Content Elements</h3>
                <div class="tool-grid">
                    <button class="tool-btn" onclick="addElement('text')">📝 Text</button>
                    <button class="tool-btn" onclick="addElement('image')">🖼️ Image</button>
                    <button class="tool-btn" onclick="addElement('video')">🎥 Video</button>
                    <button class="tool-btn" onclick="addElement('icon')">⭐ Icon</button>
                </div>
            </div>

            <div class="tool-section">
                <h3>Form Elements</h3>
                <div class="tool-grid">
                    <button class="tool-btn" onclick="addElement('button')">🔘 Button</button>
                    <button class="tool-btn" onclick="addElement('input')">✏️ Input</button>
                    <button class="tool-btn" onclick="addElement('form')">📋 Form</button>
                    <button class="tool-btn" onclick="addElement('table')">📊 Table</button>
                </div>
            </div>

            <div class="tool-section">
                <h3>Canvas Settings</h3>
                <div class="control-group">
                    <label>Canvas Size</label>
                    <select id="canvasSize" onchange="changeCanvasSize()">
                        <option value="1920x1080">Desktop (1920×1080)</option>
                        <option value="1366x768" selected>Laptop (1366×768)</option>
                        <option value="768x1024">Tablet (768×1024)</option>
                        <option value="375x667">Mobile (375×667)</option>
                        <option value="custom">Custom Size</option>
                    </select>
                </div>
                <div class="control-group" id="customSizeInputs" style="display: none;">
                    <label>Width (px)</label>
                    <input type="number" id="customWidth" value="1366">
                    <label>Height (px)</label>
                    <input type="number" id="customHeight" value="768">
                    <button class="action-btn secondary" onclick="applyCustomSize()">Apply Size</button>
                </div>
                <div class="control-group">
                    <label>Background Color</label>
                    <div class="color-picker-group">
                        <input type="color" id="bgColor" value="#ffffff" onchange="changeBackgroundColor()">
                        <input type="text" id="bgColorText" value="#ffffff" onchange="changeBackgroundColorFromText()">
                    </div>
                </div>
                <div class="control-group">
                    <label>Grid</label>
                    <select id="gridToggle" onchange="toggleGrid()">
                        <option value="off">Off</option>
                        <option value="on">On</option>
                    </select>
                </div>
            </div>

            <div class="tool-section">
                <button class="action-btn" onclick="exportToPNG()">💾 Save as PNG</button>
                <button class="action-btn secondary" onclick="clearCanvas()">🗑️ Clear Canvas</button>
                <button class="action-btn danger" onclick="deleteSelected()">❌ Delete Selected</button>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-area">
            <div class="top-bar">
                <h1>Your Wireframe</h1>
                <div class="top-actions">
                    <button class="top-btn primary" onclick="exportToPNG()">💾 Export PNG</button>
                </div>
            </div>
            <div class="canvas-wrapper">
                <div id="canvas"></div>
            </div>
        </div>

        <!-- Properties Panel -->
        <div class="properties">
            <h3>Properties</h3>
            <div id="propertiesContent">
                <p style="color: #95a5a6; font-size: 14px;">Select an element to edit its properties</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        let canvas = document.getElementById('canvas');
        let selectedElement = null;
        let elementCounter = 0;
        let isDragging = false;
        let isResizing = false;
        let dragStartX, dragStartY, elementStartX, elementStartY;
        let resizeStartX, resizeStartY, resizeStartWidth, resizeStartHeight;

        // Initialize canvas
        function initCanvas() {
            canvas.style.width = '1366px';
            canvas.style.height = '768px';
            canvas.style.position = 'relative';
        }

        initCanvas();

        // Add element to canvas
        function addElement(type) {
            elementCounter++;
            const element = document.createElement('div');
            element.className = `element ${type}`;
            element.id = `element-${elementCounter}`;
            element.setAttribute('data-type', type);
            
            // Default positions and sizes
            let width = 200, height = 100;
            let content = '';

            switch(type) {
                case 'navbar':
                    width = 1366;
                    height = 60;
                    content = 'Navigation Bar';
                    break;
                case 'header':
                    width = 800;
                    height = 200;
                    content = 'HEADER';
                    break;
                case 'text':
                    width = 300;
                    height = 40;
                    content = 'Sample Text';
                    break;
                case 'button':
                    width = 150;
                    height = 45;
                    content = 'Button';
                    break;
                case 'input':
                    width = 300;
                    height = 45;
                    content = 'Input field...';
                    break;
                case 'image':
                    width = 300;
                    height = 200;
                    content = '🖼️';
                    break;
                case 'container':
                    width = 600;
                    height = 400;
                    break;
                case 'card':
                    width = 300;
                    height = 250;
                    break;
                case 'sidebar':
                    width = 250;
                    height = 600;
                    break;
                case 'footer':
                    width = 1366;
                    height = 80;
                    content = '© 2024 Your Website';
                    break;
                case 'icon':
                    width = 50;
                    height = 50;
                    content = '⭐';
                    break;
                case 'video':
                    width = 640;
                    height = 360;
                    content = '▶️';
                    break;
                case 'table':
                    width = 400;
                    height = 200;
                    content = '<div>Header 1</div><div>Header 2</div><div>Header 3</div><div>Cell 1</div><div>Cell 2</div><div>Cell 3</div>';
                    break;
                case 'form':
                    width = 400;
                    height = 300;
                    content = '<div style="color: #7f8c8d;">Form Container</div>';
                    break;
            }

            element.style.width = width + 'px';
            element.style.height = height + 'px';
            element.style.left = '50px';
            element.style.top = '50px';
            element.innerHTML = content;

            // Add resize handle
            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'resize-handle';
            element.appendChild(resizeHandle);

            // Add delete button
            const deleteBtn = document.createElement('div');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '×';
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                element.remove();
                if (selectedElement === element) {
                    selectedElement = null;
                    showProperties(null);
                }
            };
            element.appendChild(deleteBtn);

            // Add event listeners
            element.addEventListener('mousedown', (e) => startDrag(e, element));
            resizeHandle.addEventListener('mousedown', (e) => startResize(e, element));
            element.addEventListener('click', (e) => {
                e.stopPropagation();
                selectElement(element);
            });

            canvas.appendChild(element);
            selectElement(element);
        }

        // Drag functionality
        function startDrag(e, element) {
            if (e.target.className === 'resize-handle' || e.target.className === 'delete-btn') return;
            
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            elementStartX = parseInt(element.style.left);
            elementStartY = parseInt(element.style.top);
            
            selectElement(element);
            e.preventDefault();
        }

        function drag(e) {
            if (!isDragging || !selectedElement) return;
            
            const deltaX = e.clientX - dragStartX;
            const deltaY = e.clientY - dragStartY;
            
            selectedElement.style.left = (elementStartX + deltaX) + 'px';
            selectedElement.style.top = (elementStartY + deltaY) + 'px';
            
            updateProperties();
        }

        function stopDrag() {
            isDragging = false;
            isResizing = false;
        }

        // Resize functionality
        function startResize(e, element) {
            isResizing = true;
            resizeStartX = e.clientX;
            resizeStartY = e.clientY;
            resizeStartWidth = element.offsetWidth;
            resizeStartHeight = element.offsetHeight;
            
            selectElement(element);
            e.stopPropagation();
            e.preventDefault();
        }

        function resize(e) {
            if (!isResizing || !selectedElement) return;
            
            const deltaX = e.clientX - resizeStartX;
            const deltaY = e.clientY - resizeStartY;
            
            const newWidth = Math.max(50, resizeStartWidth + deltaX);
            const newHeight = Math.max(30, resizeStartHeight + deltaY);
            
            selectedElement.style.width = newWidth + 'px';
            selectedElement.style.height = newHeight + 'px';
            
            updateProperties();
        }

        // Select element
        function selectElement(element) {
            if (selectedElement) {
                selectedElement.classList.remove('selected');
            }
            selectedElement = element;
            selectedElement.classList.add('selected');
            showProperties(element);
        }

        // Show properties
        function showProperties(element) {
            const propertiesContent = document.getElementById('propertiesContent');
            
            if (!element) {
                propertiesContent.innerHTML = '<p style="color: #95a5a6; font-size: 14px;">Select an element to edit its properties</p>';
                return;
            }

            const type = element.getAttribute('data-type');
            const width = parseInt(element.style.width);
            const height = parseInt(element.style.height);
            const left = parseInt(element.style.left);
            const top = parseInt(element.style.top);
            const bgColor = element.style.backgroundColor || '#ffffff';
            const textColor = element.style.color || '#000000';
            const text = element.textContent;

            propertiesContent.innerHTML = `
                <div class="prop-group">
                    <label>Element Type</label>
                    <input type="text" value="${type}" disabled>
                </div>
                <div class="prop-group">
                    <label>Position</label>
                    <div class="grid-layout">
                        <div>
                            <label>X</label>
                            <input type="number" id="propX" value="${left}" onchange="updateElementProperty('left', this.value + 'px')">
                        </div>
                        <div>
                            <label>Y</label>
                            <input type="number" id="propY" value="${top}" onchange="updateElementProperty('top', this.value + 'px')">
                        </div>
                    </div>
                </div>
                <div class="prop-group">
                    <label>Size</label>
                    <div class="grid-layout">
                        <div>
                            <label>Width</label>
                            <input type="number" id="propWidth" value="${width}" onchange="updateElementProperty('width', this.value + 'px')">
                        </div>
                        <div>
                            <label>Height</label>
                            <input type="number" id="propHeight" value="${height}" onchange="updateElementProperty('height', this.value + 'px')">
                        </div>
                    </div>
                </div>
                <div class="prop-group">
                    <label>Background Color</label>
                    <input type="color" value="${rgbToHex(bgColor)}" onchange="updateElementProperty('backgroundColor', this.value)">
                </div>
                <div class="prop-group">
                    <label>Text Color</label>
                    <input type="color" value="${rgbToHex(textColor)}" onchange="updateElementProperty('color', this.value)">
                </div>
                <div class="prop-group">
                    <label>Text Content</label>
                    <textarea id="propText" onchange="updateElementText(this.value)">${text}</textarea>
                </div>
                <div class="prop-group">
                    <label>Border Radius</label>
                    <input type="number" id="propRadius" value="0" onchange="updateElementProperty('borderRadius', this.value + 'px')">
                </div>
                <div class="prop-group">
                    <label>Opacity</label>
                    <input type="range" min="0" max="1" step="0.1" value="1" onchange="updateElementProperty('opacity', this.value)">
                </div>
            `;
        }

        function updateProperties() {
            if (selectedElement) {
                showProperties(selectedElement);
            }
        }

        function updateElementProperty(property, value) {
            if (selectedElement) {
                selectedElement.style[property] = value;
            }
        }

        function updateElementText(value) {
            if (selectedElement) {
                const resizeHandle = selectedElement.querySelector('.resize-handle');
                const deleteBtn = selectedElement.querySelector('.delete-btn');
                selectedElement.textContent = value;
                if (resizeHandle) selectedElement.appendChild(resizeHandle);
                if (deleteBtn) selectedElement.appendChild(deleteBtn);
            }
        }

        function rgbToHex(rgb) {
            if (rgb.startsWith('#')) return rgb;
            const result = rgb.match(/\d+/g);
            if (!result) return '#ffffff';
            return '#' + result.map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
        }

        // Global mouse events
        document.addEventListener('mousemove', (e) => {
            if (isDragging) drag(e);
            if (isResizing) resize(e);
        });

        document.addEventListener('mouseup', stopDrag);

        // Canvas click (deselect)
        canvas.addEventListener('click', (e) => {
            if (e.target === canvas) {
                if (selectedElement) {
                    selectedElement.classList.remove('selected');
                    selectedElement = null;
                    showProperties(null);
                }
            }
        });

        // Canvas size
        function changeCanvasSize() {
            const size = document.getElementById('canvasSize').value;
            const customInputs = document.getElementById('customSizeInputs');
            
            if (size === 'custom') {
                customInputs.style.display = 'block';
            } else {
                customInputs.style.display = 'none';
                const [width, height] = size.split('x');
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
            }
        }

        function applyCustomSize() {
            const width = document.getElementById('customWidth').value;
            const height = document.getElementById('customHeight').value;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
        }

        // Background color
        function changeBackgroundColor() {
            const color = document.getElementById('bgColor').value;
            canvas.style.backgroundColor = color;
            document.getElementById('bgColorText').value = color;
        }

        function changeBackgroundColorFromText() {
            const color = document.getElementById('bgColorText').value;
            canvas.style.backgroundColor = color;
            document.getElementById('bgColor').value = color;
        }

        // Grid toggle
        function toggleGrid() {
            const grid = document.getElementById('gridToggle').value;
            if (grid === 'on') {
                canvas.style.backgroundImage = 'linear-gradient(#eee 1px, transparent 1px), linear-gradient(90deg, #eee 1px, transparent 1px)';
                canvas.style.backgroundSize = '20px 20px';
            } else {
                canvas.style.backgroundImage = 'none';
            }
        }

        // Delete selected
        function deleteSelected() {
            if (selectedElement) {
                selectedElement.remove();
                selectedElement = null;
                showProperties(null);
            }
        }

        // Clear canvas
        function clearCanvas() {
            if (confirm('Are you sure you want to clear the entire canvas?')) {
                canvas.innerHTML = '';
                selectedElement = null;
                showProperties(null);
            }
        }

        // Export to PNG
        function exportToPNG() {
            // Temporarily hide selection indicators
            const selected = document.querySelector('.element.selected');
            if (selected) {
                selected.classList.remove('selected');
            }

            html2canvas(canvas, {
                backgroundColor: canvas.style.backgroundColor || '#ffffff',
                scale: 2
            }).then(canvasElement => {
                const link = document.createElement('a');
                link.download = 'wireframe-' + Date.now() + '.png';
                link.href = canvasElement.toDataURL();
                link.click();

                // Restore selection
                if (selected) {
                    selected.classList.add('selected');
                }
            });
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' && selectedElement) {
                deleteSelected();
            }
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 's') {
                    e.preventDefault();
                    exportToPNG();
                }
                if (e.key === 'd') {
                    e.preventDefault();
                    if (selectedElement) {
                        duplicateElement();
                    }
                }
            }
            // Arrow keys for precise movement
            if (selectedElement && !e.shiftKey) {
                let left = parseInt(selectedElement.style.left);
                let top = parseInt(selectedElement.style.top);
                
                switch(e.key) {
                    case 'ArrowLeft':
                        e.preventDefault();
                        selectedElement.style.left = (left - 1) + 'px';
                        updateProperties();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        selectedElement.style.left = (left + 1) + 'px';
                        updateProperties();
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        selectedElement.style.top = (top - 1) + 'px';
                        updateProperties();
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        selectedElement.style.top = (top + 1) + 'px';
                        updateProperties();
                        break;
                }
            }
        });

        // Duplicate element
        function duplicateElement() {
            if (!selectedElement) return;
            
            const clone = selectedElement.cloneNode(true);
            elementCounter++;
            clone.id = `element-${elementCounter}`;
            
            // Offset the clone
            const left = parseInt(selectedElement.style.left);
            const top = parseInt(selectedElement.style.top);
            clone.style.left = (left + 20) + 'px';
            clone.style.top = (top + 20) + 'px';
            
            // Re-attach event listeners
            const resizeHandle = clone.querySelector('.resize-handle');
            const deleteBtn = clone.querySelector('.delete-btn');
            
            clone.addEventListener('mousedown', (e) => startDrag(e, clone));
            if (resizeHandle) {
                resizeHandle.addEventListener('mousedown', (e) => startResize(e, clone));
            }
            if (deleteBtn) {
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    clone.remove();
                    if (selectedElement === clone) {
                        selectedElement = null;
                        showProperties(null);
                    }
                };
            }
            clone.addEventListener('click', (e) => {
                e.stopPropagation();
                selectElement(clone);
            });
            
            canvas.appendChild(clone);
            selectElement(clone);
        }
    </script>
</body>
</html>
