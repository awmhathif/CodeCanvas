<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Dreams Paint Studio</title>
  <style>
    :root {
      --bg-color: #0a0a1a;
      --primary: #ff2a6d;
      --secondary: #05d9e8;
      --tertiary: #d1f7ff;
      --accent: #7700ff;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      font-family: 'Arial', sans-serif;
      color: white;
      overflow: hidden;
      user-select: none;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background-color: rgba(0, 0, 0, 0.7);
      border-bottom: 1px solid var(--primary);
    }
    
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      color: var(--secondary);
      text-shadow: 0 0 10px var(--secondary);
    }
    
    .main {
      display: flex;
      flex: 1;
    }
    
    .toolbar {
      width: 70px;
      background-color: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 5px;
      gap: 15px;
      overflow-y: auto;
      border-right: 1px solid var(--primary);
    }
    
    .tool-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid var(--tertiary);
      background-color: transparent;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      position: relative;
    }
    
    .tool-btn:hover, .tool-btn.active {
      background-color: var(--primary);
      box-shadow: 0 0 15px var(--primary);
      transform: scale(1.1);
    }
    
    .tool-btn.active::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: var(--tertiary);
      border-radius: 50%;
      bottom: -5px;
    }
    
    .sidebar {
      width: 250px;
      background-color: rgba(0, 0, 0, 0.8);
      padding: 15px;
      overflow-y: auto;
      border-left: 1px solid var(--primary);
    }
    
    .sidebar-section {
      margin-bottom: 20px;
    }
    
    .sidebar-section h3 {
      color: var(--secondary);
      margin-bottom: 10px;
      font-size: 1rem;
      text-shadow: 0 0 5px var(--secondary);
    }
    
    .brush-preview {
      width: 100%;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      margin-bottom: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .brush-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    
    .brush-option {
      width: 40px;
      height: 40px;
      border-radius: 5px;
      background-color: rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .brush-option:hover, .brush-option.active {
      background-color: var(--primary);
      box-shadow: 0 0 10px var(--primary);
    }
    
    .slider-container {
      margin-bottom: 10px;
    }
    
    .slider-container label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    
    .slider {
      width: 100%;
      -webkit-appearance: none;
      height: 5px;
      border-radius: 5px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      outline: none;
    }
    
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--tertiary);
      cursor: pointer;
      box-shadow: 0 0 5px var(--tertiary);
    }
    
    .color-picker {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .color-swatch {
      width: 40px;
      height: 40px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .color-swatch:hover {
      transform: scale(1.1);
      box-shadow: 0 0 10px currentColor;
    }
    
    .custom-color {
      width: 100%;
      margin-bottom: 10px;
    }
    
    .effect-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    
    .effect-option {
      padding: 8px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      cursor: pointer;
      text-align: center;
      font-size: 0.8rem;
      transition: all 0.3s;
    }
    
    .effect-option:hover, .effect-option.active {
      background-color: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }
    
    .layer-list {
      max-height: 150px;
      overflow-y: auto;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 5px;
      padding: 5px;
    }
    
    .layer-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px;
      margin-bottom: 5px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    
    .layer-item.active {
      background-color: var(--primary);
    }
    
    .layer-controls {
      display: flex;
      gap: 5px;
    }
    
    .layer-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
    }
    
    .layer-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }
    
    .action-btn {
      padding: 5px 10px;
      background-color: var(--accent);
      border: none;
      border-radius: 3px;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
    }
    
    .action-btn:hover {
      background-color: var(--primary);
      box-shadow: 0 0 10px var(--primary);
    }
    
    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    #main-canvas {
      background-color: transparent;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }
    
    .cursor {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid white;
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
    }
    
    .footer {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background-color: rgba(0, 0, 0, 0.7);
      border-top: 1px solid var(--primary);
    }
    
    .status {
      font-size: 0.8rem;
      color: var(--tertiary);
    }
    
    .file-actions {
      display: flex;
      gap: 10px;
    }
    
    .file-btn {
      padding: 5px 10px;
      background-color: var(--accent);
      border: none;
      border-radius: 3px;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
    }
    
    .file-btn:hover {
      background-color: var(--primary);
      box-shadow: 0 0 10px var(--primary);
    }
    
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.7;
    }
    
    /* Tooltip styles */
    .tooltip {
      position: relative;
    }
    
    .tooltip:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      background-color: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 0.8rem;
      white-space: nowrap;
      z-index: 100;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      margin-left: 10px;
    }
    
    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    
    .modal-content {
      background-color: var(--bg-color);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid var(--primary);
      width: 500px;
      max-width: 90%;
      box-shadow: 0 0 20px var(--primary);
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .modal-close {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
    }
    
    .modal-body {
      margin-bottom: 20px;
    }
    
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    
    /* Animation keyframes */
    @keyframes glow {
      0% { box-shadow: 0 0 5px var(--primary); }
      50% { box-shadow: 0 0 20px var(--primary); }
      100% { box-shadow: 0 0 5px var(--primary); }
    }
    
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Neon Dreams Paint Studio</h1>
      <div class="file-actions">
        <button class="file-btn" id="new-btn">New</button>
        <button class="file-btn" id="save-btn">Save</button>
        <button class="file-btn" id="export-btn">Export</button>
      </div>
    </div>
    
    <div class="main">
      <div class="toolbar">
        <button class="tool-btn active tooltip" id="brush-tool" data-tooltip="Brush">🖌️</button>
        <button class="tool-btn tooltip" id="eraser-tool" data-tooltip="Eraser">🧽</button>
        <button class="tool-btn tooltip" id="fill-tool" data-tooltip="Fill">🪣</button>
        <button class="tool-btn tooltip" id="gradient-tool" data-tooltip="Gradient">🌈</button>
        <button class="tool-btn tooltip" id="text-tool" data-tooltip="Text">📝</button>
        <button class="tool-btn tooltip" id="shape-tool" data-tooltip="Shapes">◯</button>
        <button class="tool-btn tooltip" id="neon-tool" data-tooltip="Neon">💫</button>
        <button class="tool-btn tooltip" id="particle-tool" data-tooltip="Particles">✨</button>
        <button class="tool-btn tooltip" id="blend-tool" data-tooltip="Blend">🔀</button>
        <button class="tool-btn tooltip" id="symmetry-tool" data-tooltip="Symmetry">⚖️</button>
        <button class="tool-btn tooltip" id="filter-tool" data-tooltip="Filters">🎨</button>
        <button class="tool-btn tooltip" id="move-tool" data-tooltip="Move">👆</button>
        <button class="tool-btn tooltip" id="undo-tool" data-tooltip="Undo">↩️</button>
        <button class="tool-btn tooltip" id="redo-tool" data-tooltip="Redo">↪️</button>
      </div>
      
      <div class="canvas-container">
        <canvas id="main-canvas" width="800" height="600"></canvas>
        <div class="cursor"></div>
      </div>
      
      <div class="sidebar">
        <div class="sidebar-section">
          <h3>Brush Style</h3>
          <div class="brush-preview" id="brush-preview"></div>
          <div class="brush-options">
            <div class="brush-option active" data-brush="round">●</div>
            <div class="brush-option" data-brush="square">■</div>
            <div class="brush-option" data-brush="star">★</div>
            <div class="brush-option" data-brush="spray">☁️</div>
            <div class="brush-option" data-brush="ribbon">〰️</div>
            <div class="brush-option" data-brush="pixel">🔲</div>
            <div class="brush-option" data-brush="neon">🔆</div>
            <div class="brush-option" data-brush="glow">✨</div>
            <div class="brush-option" data-brush="custom">+</div>
          </div>
        </div>
        
        <div class="sidebar-section">
          <h3>Brush Settings</h3>
          <div class="slider-container">
            <label>
              <span>Size</span>
              <span id="size-value">10px</span>
            </label>
            <input type="range" min="1" max="100" value="10" class="slider" id="size-slider">
          </div>
          
          <div class="slider-container">
            <label>
              <span>Opacity</span>
              <span id="opacity-value">100%</span>
            </label>
            <input type="range" min="1" max="100" value="100" class="slider" id="opacity-slider">
          </div>
          
          <div class="slider-container">
            <label>
              <span>Flow</span>
              <span id="flow-value">100%</span>
            </label>
            <input type="range" min="1" max="100" value="100" class="slider" id="flow-slider">
          </div>
          
          <div class="slider-container">
            <label>
              <span>Glow</span>
              <span id="glow-value">0%</span>
            </label>
            <input type="range" min="0" max="50" value="0" class="slider" id="glow-slider">
          </div>
        </div>
        
        <div class="sidebar-section">
          <h3>Color</h3>
          <div class="color-picker">
            <div class="color-swatch" style="background-color: #ff2a6d;" data-color="#ff2a6d"></div>
            <div class="color-swatch" style="background-color: #05d9e8;" data-color="#05d9e8"></div>
            <div class="color-swatch" style="background-color: #d1f7ff;" data-color="#d1f7ff"></div>
            <div class="color-swatch" style="background-color: #7700ff;" data-color="#7700ff"></div>
            <div class="color-swatch" style="background-color: #ff9e00;" data-color="#ff9e00"></div>
            <div class="color-swatch" style="background-color: #00ff9f;" data-color="#00ff9f"></div>
            <div class="color-swatch" style="background-color: #ffffff;" data-color="#ffffff"></div>
            <div class="color-swatch" style="background-color: #000000;" data-color="#000000"></div>
          </div>
          <input type="color" class="custom-color" id="custom-color" value="#ff2a6d">
        </div>
        
        <div class="sidebar-section">
          <h3>Effects</h3>
          <div class="effect-options">
            <div class="effect-option" data-effect="none">None</div>
            <div class="effect-option" data-effect="glow">Neon Glow</div>
            <div class="effect-option" data-effect="rainbow">Rainbow</div>
            <div class="effect-option" data-effect="particle">Particles</div>
            <div class="effect-option" data-effect="shadow">Shadow</div>
            <div class="effect-option" data-effect="ghost">Ghosting</div>
          </div>
        </div>
        
        <div class="sidebar-section">
          <h3>Layers</h3>
          <div class="layer-list" id="layer-list">
            <div class="layer-item active">
              <span>Layer 1</span>
              <div class="layer-controls">
                <button class="layer-btn">👁️</button>
                <button class="layer-btn">🔒</button>
              </div>
            </div>
          </div>
          <div class="layer-actions">
            <button class="action-btn" id="add-layer">Add Layer</button>
            <button class="action-btn" id="delete-layer">Delete</button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="footer">
      <div class="status" id="coordinates">X: 0, Y: 0</div>
      <div class="status" id="zoom-level">Zoom: 100%</div>
    </div>
  </div>
  
  <!-- Modals -->
  <div class="modal" id="export-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Export Artwork</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="slider-container">
          <label>
            <span>Quality</span>
            <span id="quality-value">90%</span>
          </label>
          <input type="range" min="10" max="100" value="90" class="slider" id="quality-slider">
        </div>
        <div style="margin-top: 15px;">
          <label>Format:</label>
          <select id="export-format" style="background-color: var(--bg-color); color: white; padding: 5px; border: 1px solid var(--primary); border-radius: 3px; width: 100%; margin-top: 5px;">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
            <option value="svg">SVG (Limited support)</option>
            <option value="webp">WebP</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="file-btn" id="cancel-export">Cancel</button>
        <button class="file-btn" id="confirm-export">Export</button>
      </div>
    </div>
  </div>

  <script>
    // App state
    const state = {
      currentTool: 'brush-tool',
      currentBrush: 'round',
      brushSize: 10,
      brushOpacity: 100,
      brushFlow: 100,
      brushGlow: 0,
      currentColor: '#ff2a6d',
      currentEffect: 'none',
      isDrawing: false,
      lastX: 0,
      lastY: 0,
      layers: [],
      currentLayerIndex: 0,
      undoStack: [],
      redoStack: [],
      zoom: 1,
      symmetryEnabled: false,
      symmetryPoints: 2,
      symmetryAngle: 0
    };

    // DOM elements
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    const cursor = document.querySelector('.cursor');
    const coordinatesDisplay = document.getElementById('coordinates');
    const zoomDisplay = document.getElementById('zoom-level');
    const toolButtons = document.querySelectorAll('.tool-btn');
    const brushOptions = document.querySelectorAll('.brush-option');
    const sizeSlider = document.getElementById('size-slider');
    const sizeValue = document.getElementById('size-value');
    const opacitySlider = document.getElementById('opacity-slider');
    const opacityValue = document.getElementById('opacity-value');
    const flowSlider = document.getElementById('flow-slider');
    const flowValue = document.getElementById('flow-value');
    const glowSlider = document.getElementById('glow-slider');
    const glowValue = document.getElementById('glow-value');
    const colorSwatches = document.querySelectorAll('.color-swatch');
    const customColorPicker = document.getElementById('custom-color');
    const effectOptions = document.querySelectorAll('.effect-option');
    const layerList = document.getElementById('layer-list');
    const addLayerBtn = document.getElementById('add-layer');
    const deleteLayerBtn = document.getElementById('delete-layer');
    const exportModal = document.getElementById('export-modal');
    const exportBtn = document.getElementById('export-btn');
    const cancelExportBtn = document.getElementById('cancel-export');
    const confirmExportBtn = document.getElementById('confirm-export');
    const modalCloseBtn = document.querySelector('.modal-close');
    const brushPreview = document.getElementById('brush-preview');
    const undoBtn = document.getElementById('undo-tool');
    const redoBtn = document.getElementById('redo-tool');
    const saveBtn = document.getElementById('save-btn');
    const newBtn = document.getElementById('new-btn');

    // Initialize layers
    function initializeLayers() {
      const baseLayer = {
        canvas: document.createElement('canvas'),
        visible: true,
        locked: false,
        name: 'Layer 1'
      };
      baseLayer.canvas.width = canvas.width;
      baseLayer.canvas.height = canvas.height;
      
      state.layers = [baseLayer];
      state.currentLayerIndex = 0;
      
      saveToUndoStack();
    }

    // Initialize the app
    function init() {
      canvas.width = 800;
      canvas.height = 600;
      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      initializeLayers();
      setupEventListeners();
      updateBrushPreview();
      drawCanvas();
    }

    // Set up event listeners
    function setupEventListeners() {
      toolButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          toolButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.currentTool = btn.id;
          updateCursor();
        });
      });
      
      brushOptions.forEach(option => {
        option.addEventListener('click', () => {
          brushOptions.forEach(o => o.classList.remove('active'));
          option.classList.add('active');
          state.currentBrush = option.dataset.brush;
          updateBrushPreview();
        });
      });
      
      sizeSlider.addEventListener('input', () => {
        state.brushSize = sizeSlider.value;
        sizeValue.textContent = `${state.brushSize}px`;
        updateCursor();
        updateBrushPreview();
      });
      
      opacitySlider.addEventListener('input', () => {
        state.brushOpacity = opacitySlider.value;
        opacityValue.textContent = `${state.brushOpacity}%`;
        updateBrushPreview();
      });
      
      flowSlider.addEventListener('input', () => {
        state.brushFlow = flowSlider.value;
        flowValue.textContent = `${state.brushFlow}%`;
        updateBrushPreview();
      });
      
      glowSlider.addEventListener('input', () => {
        state.brushGlow = glowSlider.value;
        glowValue.textContent = `${state.brushGlow}%`;
        updateBrushPreview();
      });
      
      colorSwatches.forEach(swatch => {
        swatch.addEventListener('click', () => {
          state.currentColor = swatch.dataset.color;
          customColorPicker.value = state.currentColor;
          updateBrushPreview();
        });
      });
      
      customColorPicker.addEventListener('input', () => {
        state.currentColor = customColorPicker.value;
        updateBrushPreview();
      });
      
      effectOptions.forEach(option => {
        option.addEventListener('click', () => {
          effectOptions.forEach(o => o.classList.remove('active'));
          option.classList.add('active');
          state.currentEffect = option.dataset.effect;
          updateBrushPreview();
        });
      });
      
      canvas.addEventListener('mousedown', startDrawing);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', stopDrawing);
      canvas.addEventListener('mouseout', stopDrawing);
      canvas.addEventListener('mousemove', updateCoordinates);
      
      addLayerBtn.addEventListener('click', addLayer);
      deleteLayerBtn.addEventListener('click', deleteLayer);
      
      exportBtn.addEventListener('click', () => {
        exportModal.style.display = 'flex';
      });
      
      cancelExportBtn.addEventListener('click', () => {
        exportModal.style.display = 'none';
      });
      
      confirmExportBtn.addEventListener('click', exportArtwork);
      
      modalCloseBtn.addEventListener('click', () => {
        exportModal.style.display = 'none';
      });
      
      undoBtn.addEventListener('click', undo);
      redoBtn.addEventListener('click', redo);
      
      saveBtn.addEventListener('click', saveArtwork);
      
      newBtn.addEventListener('click', () => {
        if (confirm('Create a new artwork? All unsaved changes will be lost.')) {
          clearCanvas();
        }
      });
      
      document.addEventListener('keydown', handleKeyboardShortcuts);
    }

    // Start drawing
    function startDrawing(e) {
      if (state.layers[state.currentLayerIndex].locked) return;
      state.isDrawing = true;
      const { x, y } = getCanvasCoordinates(e);
      state.lastX = x;
      state.lastY = y;
      drawStroke(x, y, x, y);
      
      if (state.currentEffect === 'particle') {
        createParticles(x, y);
      }
    }

    // Drawing function
    function draw(e) {
      if (!state.isDrawing || state.layers[state.currentLayerIndex].locked) return;
      const { x, y } = getCanvasCoordinates(e);
      
      switch (state.currentTool) {
        case 'brush-tool':
          drawStroke(state.lastX, state.lastY, x, y);
          break;
        case 'eraser-tool':
          eraserStroke(state.lastX, state.lastY, x, y);
          break;
        case 'neon-tool':
          neonStroke(state.lastX, state.lastY, x, y);
          break;
        case 'particle-tool':
          particleStroke(state.lastX, state.lastY, x, y);
          break;
      }
      
      if (state.currentEffect === 'particle') {
        createParticles(x, y);
      }
      
      state.lastX = x;
      state.lastY = y;
      drawCanvas();
    }

    // Stop drawing – now with a single check
    function stopDrawing() {
      if (state.isDrawing) {
        saveToUndoStack();
        state.isDrawing = false;
      }
    }

    // Drawing strokes
    function drawStroke(startX, startY, endX, endY) {
      const layerCtx = state.layers[state.currentLayerIndex].canvas.getContext('2d');
      layerCtx.globalAlpha = state.brushOpacity / 100;
      layerCtx.strokeStyle = state.currentColor;
      layerCtx.lineWidth = state.brushSize;
      layerCtx.lineCap = 'round';
      layerCtx.lineJoin = 'round';
      
      switch (state.currentBrush) {
        case 'round':
          drawRoundBrush(layerCtx, startX, startY, endX, endY);
          break;
        case 'square':
          drawSquareBrush(layerCtx, startX, startY, endX, endY);
          break;
        case 'neon':
          drawNeonBrush(layerCtx, startX, startY, endX, endY);
          break;
        case 'glow':
          drawGlowBrush(layerCtx, startX, startY, endX, endY);
          break;
        default:
          drawRoundBrush(layerCtx, startX, startY, endX, endY);
      }
    }

    // Basic brushes
    function drawRoundBrush(ctx, startX, startY, endX, endY) {
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      
      if (state.symmetryEnabled) {
        drawSymmetryLines(ctx, startX, startY, endX, endY);
      }
    }

    function drawSquareBrush(ctx, startX, startY, endX, endY) {
      ctx.lineCap = 'square';
      ctx.lineJoin = 'miter';
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
    }

    function drawNeonBrush(ctx, startX, startY, endX, endY) {
      ctx.shadowBlur = 15;
      ctx.shadowColor = state.currentColor;
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      
      ctx.shadowBlur = 5;
      ctx.lineWidth = state.brushSize * 0.5;
      ctx.strokeStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function drawGlowBrush(ctx, startX, startY, endX, endY) {
      const glowAmount = Math.max(5, state.brushGlow);
      ctx.shadowBlur = glowAmount;
      ctx.shadowColor = state.currentColor;
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Eraser
    function eraserStroke(startX, startY, endX, endY) {
      const layerCtx = state.layers[state.currentLayerIndex].canvas.getContext('2d');
      layerCtx.globalCompositeOperation = 'destination-out';
      layerCtx.lineWidth = state.brushSize;
      layerCtx.lineCap = 'round';
      layerCtx.lineJoin = 'round';
      
      layerCtx.beginPath();
      layerCtx.moveTo(startX, startY);
      layerCtx.lineTo(endX, endY);
      layerCtx.stroke();
      
      layerCtx.globalCompositeOperation = 'source-over';
    }

    // Neon effect
    function neonStroke(startX, startY, endX, endY) {
      const layerCtx = state.layers[state.currentLayerIndex].canvas.getContext('2d');
      layerCtx.shadowBlur = 20;
      layerCtx.shadowColor = state.currentColor;
      layerCtx.strokeStyle = state.currentColor;
      layerCtx.lineWidth = state.brushSize;
      
      layerCtx.beginPath();
      layerCtx.moveTo(startX, startY);
      layerCtx.lineTo(endX, endY);
      layerCtx.stroke();
      
      layerCtx.shadowBlur = 5;
      layerCtx.strokeStyle = '#ffffff';
      layerCtx.lineWidth = state.brushSize / 2;
      
      layerCtx.beginPath();
      layerCtx.moveTo(startX, startY);
      layerCtx.lineTo(endX, endY);
      layerCtx.stroke();
      layerCtx.shadowBlur = 0;
    }

    // Particle effect
    function particleStroke(startX, startY, endX, endY) {
      drawRoundBrush(state.layers[state.currentLayerIndex].canvas.getContext('2d'), startX, startY, endX, endY);
      createParticles(endX, endY);
    }

    // Create particles
    function createParticles(x, y) {
      const container = document.querySelector('.canvas-container');
      const particleCount = Math.floor(state.brushSize / 2);
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        const size = Math.random() * (state.brushSize / 2) + 2;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        
        const startX = x + (Math.random() * 20 - 10);
        const startY = y + (Math.random() * 20 - 10);
        particle.style.left = `${startX}px`;
        particle.style.top = `${startY}px`;
        
        if (Math.random() > 0.5) {
          particle.style.backgroundColor = state.currentColor;
        } else {
          const hue = Math.floor(Math.random() * 360);
          particle.style.backgroundColor = `hsl(${hue}, 100%, 70%)`;
        }
        
        container.appendChild(particle);
        
        setTimeout(() => {
          particle.style.transition = 'all 1s ease-out';
          particle.style.transform = `translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px)`;
          particle.style.opacity = '0';
          
          setTimeout(() => {
            container.removeChild(particle);
          }, 1000);
        }, 10);
      }
    }

    // Draw symmetry lines
    function drawSymmetryLines(ctx, startX, startY, endX, endY) {
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      
      const startX2 = centerX - (startX - centerX);
      const startY2 = centerY - (startY - centerY);
      const endX2 = centerX - (endX - centerX);
      const endY2 = centerY - (endY - centerY);
      
      ctx.beginPath();
      ctx.moveTo(startX2, startY2);
      ctx.lineTo(endX2, endY2);
      ctx.stroke();
    }

    // Redraw the main canvas
    function drawCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      state.layers.forEach(layer => {
        if (layer.visible) {
          ctx.drawImage(layer.canvas, 0, 0);
        }
      });
    }

    // Get canvas coordinates
    function getCanvasCoordinates(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) / state.zoom,
        y: (e.clientY - rect.top) / state.zoom
      };
    }

    // Update custom cursor
    function updateCursor() {
      if (['brush-tool', 'eraser-tool', 'neon-tool', 'particle-tool'].includes(state.currentTool)) {
        cursor.style.display = 'block';
        cursor.style.width = `${state.brushSize}px`;
        cursor.style.height = `${state.brushSize}px`;
        
        if (state.currentTool === 'brush-tool') {
          cursor.style.borderColor = state.currentColor;
        } else if (state.currentTool === 'eraser-tool') {
          cursor.style.borderColor = 'white';
        } else if (state.currentTool === 'neon-tool') {
          cursor.style.borderColor = state.currentColor;
          cursor.style.boxShadow = `0 0 10px ${state.currentColor}`;
        }
      } else {
        cursor.style.display = 'none';
      }
    }

    // Update coordinates display
    function updateCoordinates(e) {
      const { x, y } = getCanvasCoordinates(e);
      coordinatesDisplay.textContent = `X: ${Math.floor(x)}, Y: ${Math.floor(y)}`;
      
      if (cursor.style.display === 'block') {
        cursor.style.left = `${e.clientX}px`;
        cursor.style.top = `${e.clientY}px`;
      }
    }

    // Update brush preview
    function updateBrushPreview() {
      const previewCtx = document.createElement('canvas').getContext('2d');
      previewCtx.canvas.width = brushPreview.offsetWidth;
      previewCtx.canvas.height = brushPreview.offsetHeight;
      
      const centerX = previewCtx.canvas.width / 2;
      const centerY = previewCtx.canvas.height / 2;
      previewCtx.clearRect(0, 0, previewCtx.canvas.width, previewCtx.canvas.height);
      
      previewCtx.globalAlpha = state.brushOpacity / 100;
      
      if (state.currentBrush === 'neon' || state.currentBrush === 'glow') {
        previewCtx.shadowBlur = 15;
        previewCtx.shadowColor = state.currentColor;
      }
      
      previewCtx.fillStyle = state.currentColor;
      
      switch (state.currentBrush) {
        case 'round':
          previewCtx.beginPath();
          previewCtx.arc(centerX, centerY, state.brushSize / 2, 0, Math.PI * 2);
          previewCtx.fill();
          break;
        case 'square':
          previewCtx.fillRect(centerX - state.brushSize / 2, centerY - state.brushSize / 2, state.brushSize, state.brushSize);
          break;
        case 'star':
          drawStar(previewCtx, centerX, centerY, 5, state.brushSize / 2, state.brushSize / 4);
          break;
        default:
          previewCtx.beginPath();
          previewCtx.arc(centerX, centerY, state.brushSize / 2, 0, Math.PI * 2);
          previewCtx.fill();
      }
      
      previewCtx.shadowBlur = 0;
      
      if (state.currentEffect === 'glow') {
        previewCtx.shadowBlur = 15;
        previewCtx.shadowColor = state.currentColor;
        previewCtx.beginPath();
        previewCtx.arc(centerX, centerY, state.brushSize / 2, 0, Math.PI * 2);
        previewCtx.fill();
      }
      
      while (brushPreview.firstChild) {
        brushPreview.removeChild(brushPreview.firstChild);
      }
      brushPreview.appendChild(previewCtx.canvas);
    }

    // Draw a star shape
    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
      let rot = Math.PI / 2 * 3;
      let x = cx;
      let y = cy;
      let step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(cx, cy - outerRadius);
      
      for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;

        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
      }
      
      ctx.lineTo(cx, cy - outerRadius);
      ctx.closePath();
      ctx.fill();
    }

    // Layer management
    function addLayer() {
      const newLayer = {
        canvas: document.createElement('canvas'),
        visible: true,
        locked: false,
        name: `Layer ${state.layers.length + 1}`
      };
      newLayer.canvas.width = canvas.width;
      newLayer.canvas.height = canvas.height;
      
      state.layers.push(newLayer);
      state.currentLayerIndex = state.layers.length - 1;
      
      updateLayerList();
      saveToUndoStack();
    }

    function deleteLayer() {
      if (state.layers.length <= 1) return;
      
      state.layers.splice(state.currentLayerIndex, 1);
      state.currentLayerIndex = Math.min(state.currentLayerIndex, state.layers.length - 1);
      
      updateLayerList();
      drawCanvas();
      saveToUndoStack();
    }

    function updateLayerList() {
      layerList.innerHTML = '';
      
      state.layers.forEach((layer, index) => {
        const layerItem = document.createElement('div');
        layerItem.className = 'layer-item';
        if (index === state.currentLayerIndex) layerItem.classList.add('active');
        
        layerItem.innerHTML = `
          <span>${layer.name}</span>
          <div class="layer-controls">
            <button class="layer-btn">${layer.visible ? '👁️' : '👁️‍🗨️'}</button>
            <button class="layer-btn">${layer.locked ? '🔒' : '🔓'}</button>
          </div>
        `;
        
        layerItem.addEventListener('click', (e) => {
          if (!e.target.classList.contains('layer-btn')) {
            state.currentLayerIndex = index;
            updateLayerList();
          }
        });
        
        const visibilityBtn = layerItem.querySelector('.layer-btn:first-child');
        visibilityBtn.addEventListener('click', () => {
          layer.visible = !layer.visible;
          updateLayerList();
          drawCanvas();
        });
        
        const lockBtn = layerItem.querySelector('.layer-btn:last-child');
        lockBtn.addEventListener('click', () => {
          layer.locked = !layer.locked;
          updateLayerList();
        });
        
        layerList.appendChild(layerItem);
      });
    }

    // Undo/Redo functionality using stored deep copies
    function saveToUndoStack() {
      const layersCopy = state.layers.map(layer => {
        const newLayer = {
          canvas: document.createElement('canvas'),
          visible: layer.visible,
          locked: layer.locked,
          name: layer.name
        };
        newLayer.canvas.width = layer.canvas.width;
        newLayer.canvas.height = layer.canvas.height;
        newLayer.canvas.getContext('2d').drawImage(layer.canvas, 0, 0);
        return newLayer;
      });
      
      state.undoStack.push({
        layers: layersCopy,
        currentLayerIndex: state.currentLayerIndex
      });
      
      if (state.undoStack.length > 20) {
        state.undoStack.shift();
      }
      
      state.redoStack = [];
    }

    function undo() {
      if (state.undoStack.length <= 1) return;
      const currentState = state.undoStack.pop();
      state.redoStack.push(currentState);
      
      const prevState = state.undoStack[state.undoStack.length - 1];
      state.layers = prevState.layers;
      state.currentLayerIndex = prevState.currentLayerIndex;
      
      updateLayerList();
      drawCanvas();
    }

    function redo() {
      if (state.redoStack.length === 0) return;
      
      const nextState = state.redoStack.pop();
      state.undoStack.push({
        layers: state.layers,
        currentLayerIndex: state.currentLayerIndex
      });
      
      state.layers = nextState.layers;
      state.currentLayerIndex = nextState.currentLayerIndex;
      
      updateLayerList();
      drawCanvas();
    }

    // Export artwork
    function exportArtwork() {
      const format = document.getElementById('export-format').value;
      const quality = document.getElementById('quality-slider').value / 100;
      
      let dataURL;
      if (format === 'jpeg') {
        dataURL = canvas.toDataURL('image/jpeg', quality);
      } else if (format === 'webp') {
        dataURL = canvas.toDataURL('image/webp', quality);
      } else {
        dataURL = canvas.toDataURL('image/png');
      }
      
      const link = document.createElement('a');
      link.download = `neon-dreams-${Date.now()}.${format}`;
      link.href = dataURL;
      link.click();
      
      exportModal.style.display = 'none';
    }

    // Save artwork
    function saveArtwork() {
      const artworkData = {
        width: canvas.width,
        height: canvas.height,
        layers: state.layers.map(layer => ({
          dataURL: layer.canvas.toDataURL(),
          visible: layer.visible,
          locked: layer.locked,
          name: layer.name
        })),
        currentLayerIndex: state.currentLayerIndex
      };
      
      const artworkJSON = JSON.stringify(artworkData);
      const blob = new Blob([artworkJSON], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      
      const link = document.createElement('a');
      link.download = `neon-dreams-${Date.now()}.neon`;
      link.href = url;
      link.click();
      
      URL.revokeObjectURL(url);
    }

    // Clear canvas for new artwork
    function clearCanvas() {
      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      state.layers = [];
      initializeLayers();
      updateLayerList();
      state.undoStack = [];
      state.redoStack = [];
      saveToUndoStack();
    }

    // Keyboard shortcuts
    function handleKeyboardShortcuts(e) {
      if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        undo();
      }
      
      if (e.ctrlKey && e.key === 'y') {
        e.preventDefault();
        redo();
      }
      
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        saveArtwork();
      }
      
      if (e.key === '[') {
        e.preventDefault();
        state.brushSize = Math.max(1, state.brushSize - 5);
        sizeSlider.value = state.brushSize;
        sizeValue.textContent = `${state.brushSize}px`;
        updateCursor();
        updateBrushPreview();
      }
      
      if (e.key === ']') {
        e.preventDefault();
        state.brushSize = Math.min(100, state.brushSize + 5);
        sizeSlider.value = state.brushSize;
        sizeValue.textContent = `${state.brushSize}px`;
        updateCursor();
        updateBrushPreview();
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
