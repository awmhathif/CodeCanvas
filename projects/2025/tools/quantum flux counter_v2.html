<!DOCTYPE html><html lang="en"><head><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Flux Counter</title>
    <style>
        :root {
            --primary: #00ffff;
            --secondary: #ff00ff;
            --dark: #0a0a1a;
            --light: #ffffff;
            --accent: #ffcc00;
            --glow-size: 15px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #000510 0%, #001030 100%);
            color: var(--light);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .counter-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: rgba(5, 10, 25, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 var(--glow-size) rgba(0, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s ease;
        }

        .counter-title {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            font-weight: 600;
            letter-spacing: 2px;
        }

        .display {
            position: relative;
            font-size: 7rem;
            font-weight: 700;
            color: var(--light);
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
            margin: 20px 0;
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
        }

        .display::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .button {
            padding: 15px 25px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0, 120, 255, 0.2), rgba(0, 255, 255, 0.2));
            color: var(--light);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .button:active {
            transform: scale(0.98);
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .button:hover::before {
            left: 100%;
        }

        .features {
            margin-top: 40px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .feature-card {
            background: rgba(0, 40, 80, 0.3);
            border-radius: 10px;
            padding: 15px;
            min-width: 150px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            background: rgba(0, 80, 120, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .feature-title {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: var(--accent);
        }

        .feature-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .slider-container {
            width: 100%;
            margin-top: 30px;
            padding: 0 10px;
        }

        .slider {
            width: 100%;
            -webkit-appearance: none;
            height: 8px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 4px;
            outline: none;
            transition: opacity 0.2s;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
        }

        .slider::-moz-range-thumb {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: float 4s ease-in-out infinite;
        }

        .pulse {
            animation: pulse 0.5s ease-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-300px) rotate(720deg);
                opacity: 0;
            }
        }

        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .counter-container {
                padding: 20px;
            }
            
            .counter-title {
                font-size: 1.8rem;
            }
            
            .display {
                font-size: 5rem;
            }
            
            .buttons {
                gap: 10px;
            }
            
            .button {
                padding: 12px 20px;
                font-size: 1rem;
            }
            
            .feature-card {
                min-width: 120px;
            }
        }

        @media (max-width: 480px) {
            .counter-container {
                padding: 15px;
            }
            
            .counter-title {
                font-size: 1.5rem;
            }
            
            .display {
                font-size: 3.5rem;
            }
            
            .button {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
            
            .features {
                flex-direction: column;
            }
            
            .feature-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="counter-container" id="counterContainer">
        <h1 class="counter-title">QUANTUM FLUX COUNTER</h1>
        
        <div class="theme-toggle" id="themeToggle"></div>
        
        <div class="display" id="counter">0</div>
        
        <div class="buttons">
            <button class="button" id="decrement">-</button>
            <button class="button" id="increment">+</button>
            <button class="button" id="reset">RESET</button>
            <button class="button" id="autoCount">AUTO</button>
        </div>
        
        <div class="slider-container">
            <input type="range" min="1" max="100" value="10" class="slider" id="stepSlider">
        </div>
        
        <div class="features">
            <div class="feature-card">
                <div class="feature-title">STEP SIZE</div>
                <div class="feature-value" id="stepValue">1</div>
            </div>
            <div class="feature-card">
                <div class="feature-title">TOTAL CLICKS</div>
                <div class="feature-value" id="totalClicks">0</div>
            </div>
            <div class="feature-card">
                <div class="feature-title">AUTO SPEED</div>
                <div class="feature-value" id="autoSpeed">10</div>
            </div>
            <div class="feature-card">
                <div class="feature-title">HIGHEST VALUE</div>
                <div class="feature-value" id="highestValue">0</div>
            </div>
        </div>
        
        <div class="info-panel">Press SPACE to increment | SHIFT+SPACE to decrement</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Variables
            let count = 0;
            let step = 1;
            let totalClicks = 0;
            let highestValue = 0;
            let autoSpeed = 10;
            let autoCountInterval = null;
            let isAutoCountOn = false;
            let themes = [
                {primary: '#00ffff', secondary: '#ff00ff', dark: '#0a0a1a'},
                {primary: '#ffcc00', secondary: '#ff6600', dark: '#1a0a0a'},
                {primary: '#00ff99', secondary: '#0066ff', dark: '#0a1a0a'},
                {primary: '#ff3399', secondary: '#9933ff', dark: '#1a0a1a'},
                {primary: '#66ffff', secondary: '#ff66ff', dark: '#0a0a1f'}
            ];
            let currentTheme = 0;
            
            // DOM Elements
            const counterDisplay = document.getElementById('counter');
            const counterContainer = document.getElementById('counterContainer');
            const incrementBtn = document.getElementById('increment');
            const decrementBtn = document.getElementById('decrement');
            const resetBtn = document.getElementById('reset');
            const autoCountBtn = document.getElementById('autoCount');
            const stepSlider = document.getElementById('stepSlider');
            const stepValueDisplay = document.getElementById('stepValue');
            const totalClicksDisplay = document.getElementById('totalClicks');
            const autoSpeedDisplay = document.getElementById('autoSpeed');
            const highestValueDisplay = document.getElementById('highestValue');
            const themeToggle = document.getElementById('themeToggle');
            const particlesContainer = document.getElementById('particles');
            
            // Functions
            function updateCounter(value) {
                count = value;
                counterDisplay.textContent = count;
                counterDisplay.classList.add('pulse');
                
                setTimeout(() => {
                    counterDisplay.classList.remove('pulse');
                }, 500);
                
                if (count > highestValue) {
                    highestValue = count;
                    highestValueDisplay.textContent = highestValue;
                }
                
                // Create particles if milestone reached
                if (count % 10 === 0 && count !== 0) {
                    createParticleExplosion(50);
                }
            }
            
            function incrementCounter() {
                updateCounter(count + step);
                totalClicks++;
                totalClicksDisplay.textContent = totalClicks;
            }
            
            function decrementCounter() {
                updateCounter(count - step);
                totalClicks++;
                totalClicksDisplay.textContent = totalClicks;
            }
            
            function resetCounter() {
                updateCounter(0);
                // Create particles for reset
                createParticleExplosion(30);
            }
            
            function toggleAutoCount() {
                isAutoCountOn = !isAutoCountOn;
                
                if (isAutoCountOn) {
                    autoCountBtn.textContent = 'STOP';
                    autoCountBtn.style.background = 'linear-gradient(135deg, rgba(255, 0, 0, 0.3), rgba(255, 100, 100, 0.2))';
                    autoCountInterval = setInterval(incrementCounter, 1000 / (autoSpeed / 10));
                } else {
                    autoCountBtn.textContent = 'AUTO';
                    autoCountBtn.style.background = 'linear-gradient(135deg, rgba(0, 120, 255, 0.2), rgba(0, 255, 255, 0.2))';
                    clearInterval(autoCountInterval);
                }
            }
            
            function updateStep() {
                step = parseInt(stepSlider.value);
                stepValueDisplay.textContent = step;
                autoSpeed = step;
                autoSpeedDisplay.textContent = autoSpeed;
                
                if (isAutoCountOn) {
                    clearInterval(autoCountInterval);
                    autoCountInterval = setInterval(incrementCounter, 1000 / (autoSpeed / 10));
                }
            }
            
            function changeTheme() {
                currentTheme = (currentTheme + 1) % themes.length;
                const theme = themes[currentTheme];
                
                document.documentElement.style.setProperty('--primary', theme.primary);
                document.documentElement.style.setProperty('--secondary', theme.secondary);
                document.documentElement.style.setProperty('--dark', theme.dark);
                
                // Create theme change particles
                createParticleExplosion(20);
            }
            
            function createParticle(x, y, size, color) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.background = color;
                particle.style.boxShadow = `0 0 ${size/2}px ${color}`;
                
                // Randomize animation duration and delay
                const duration = 2 + Math.random() * 4;
                const delay = Math.random() * 0.5;
                
                particle.style.animation = `float ${duration}s ease-in-out ${delay}s`;
                
                // Remove particle after animation completes
                setTimeout(() => {
                    if (particle.parentNode === particlesContainer) {
                        particlesContainer.removeChild(particle);
                    }
                }, (duration + delay) * 1000);
                
                return particle;
            }
            
            function createParticleExplosion(number) {
                const rect = counterDisplay.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                for (let i = 0; i < number; i++) {
                    const size = 5 + Math.random() * 15;
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 20 + Math.random() * 80;
                    
                    const x = centerX + Math.cos(angle) * distance;
                    const y = centerY + Math.sin(angle) * distance;
                    
                    // Pick random color from theme
                    const colors = [
                        getComputedStyle(document.documentElement).getPropertyValue('--primary').trim(),
                        getComputedStyle(document.documentElement).getPropertyValue('--secondary').trim(),
                        getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(),
                        '#ffffff'
                    ];
                    
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    const particle = createParticle(x, y, size, color);
                    particlesContainer.appendChild(particle);
                }
            }
            
            // Event Listeners
            incrementBtn.addEventListener('click', incrementCounter);
            decrementBtn.addEventListener('click', decrementCounter);
            resetBtn.addEventListener('click', resetCounter);
            autoCountBtn.addEventListener('click', toggleAutoCount);
            stepSlider.addEventListener('input', updateStep);
            themeToggle.addEventListener('click', changeTheme);
            
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        decrementCounter();
                    } else {
                        incrementCounter();
                    }
                }
            });
            
            // Initialize
            updateStep();
            
            // Create initial particles
            for (let i = 0; i < 20; i++) {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                const size = 2 + Math.random() * 5;
                const color = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
                
                const particle = createParticle(x, y, size, color);
                particlesContainer.appendChild(particle);
            }
            
            // Create welcome animation
            setTimeout(() => {
                createParticleExplosion(30);
            }, 500);
        });
    </script>


</body></html>
