<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Flux Notepad</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #000020, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            color: #00ffff;
            perspective: 1000px;
        }

        #notepad {
            position: relative;
            width: 80%;
            height: 80%;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            box-shadow: 0 0 50px #00ffff, 0 0 100px #0099ff;
            border-radius: 10px;
            overflow: hidden;
            transform-style: preserve-3d;
            transform: rotateX(15deg) rotateY(10deg);
        }

        #notepad::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ffff, #0099ff, #00ffff);
            z-index: -1;
            filter: blur(5px);
            border-radius: 10px;
        }

        #text-area {
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            background: transparent;
            border: none;
            outline: none;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
            padding: 10px;
            resize: none;
            overflow: auto;
            position: relative;
            z-index: 1;
        }

        #text-area::selection {
            background: rgba(0, 255, 255, 0.3);
        }

        #text-area::placeholder {
            color: #0099ff;
        }

        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 2;
        }

        .control-button {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .control-button:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 10px #00ffff;
        }

        #holographic-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mix-blend-mode: overlay;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.05), rgba(0, 255, 255, 0.05) 1px, transparent 1px, transparent 2px), repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.05), rgba(0, 255, 255, 0.05) 1px, transparent 1px, transparent 2px);
            z-index: 0;
        }

        #data-stream {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: linear-gradient(to right, transparent, rgba(0, 255, 255, 0.2), transparent);
            overflow: hidden;
            z-index: 2;
        }

        #data-stream div {
            width: 200%;
            height: 100%;
            background: repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.5), rgba(0, 255, 255, 0.5) 10px, transparent 10px, transparent 20px);
            animation: dataStreamAnimation 5s linear infinite;
        }

        @keyframes dataStreamAnimation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        #audio-visualizer {
            position: absolute;
            bottom: 20px;
            left: 10px;
            width: 100px;
            height: 50px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            z-index: 2;
        }

        .visualizer-bar {
            width: 8px;
            background: linear-gradient(to top, #00ffff, #0099ff);
            border-radius: 2px;
            transform-origin: bottom;
            transition: height 0.1s;
        }
    </style>
</head>
<body>
    <div id="notepad">
        <div id="holographic-overlay"></div>
        <textarea id="text-area" placeholder="Enter your quantum thoughts..."></textarea>
        <div id="controls">
            <button class="control-button" onclick="saveText()">Save</button>
            <button class="control-button" onclick="clearText()">Clear</button>
            <button class="control-button" onclick="generateRandomData()">Generate Data</button>
        </div>
        <div id="data-stream"><div></div></div>
        <div id="audio-visualizer">
            <div class="visualizer-bar"></div>
            <div class="visualizer-bar"></div>
            <div class="visualizer-bar"></div>
            <div class="visualizer-bar"></div>
            <div class="visualizer-bar"></div>
        </div>
    </div>

    <script>
        function saveText() {
            const text = document.getElementById('text-area').value;
            localStorage.setItem('notepadText', text);
        }

        function clearText() {
            document.getElementById('text-area').value = '';
            localStorage.removeItem('notepadText');
        }

        window.onload = function() {
            const savedText = localStorage.getItem('notepadText');
            if (savedText) {
                document.getElementById('text-area').value = savedText;
            }
            visualizeAudio();
        };

        function generateRandomData() {
            const randomData = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            document.getElementById('text-area').value += "\n" + randomData;
        }

        function visualizeAudio() {
            const bars = document.querySelectorAll('.visualizer-bar');
            setInterval(() => {
                bars.forEach(bar => {
                    bar.style.height = Math.random() * 50 + 'px';
                });
            }, 100);
        }
    </script>
</body>
</html>
