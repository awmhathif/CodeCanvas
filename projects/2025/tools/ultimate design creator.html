<!DOCTYPE html><html lang="en"><head><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Design Creator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c, #1a1a2e, #16213e);
            color: #fff;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .toolbar {
            width: 300px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            overflow-y: auto;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1a2e, #0c0c0c);
        }

        canvas {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
        }

        .tool-section {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tool-section h3 {
            margin-bottom: 15px;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .tool-btn {
            padding: 12px;
            background: linear-gradient(145deg, #2a2a4e, #1a1a3e);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 12px;
        }

        .tool-btn:hover {
            background: linear-gradient(145deg, #3a3a5e, #2a2a4e);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .tool-btn.active {
            background: linear-gradient(145deg, #00ffff, #0080ff);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        }

        .slider-container {
            margin: 10px 0;
        }

        .slider-container label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            width: 16px;
            height: 16px;
            background: linear-gradient(145deg, #00ffff, #0080ff);
            border-radius: 50%;
            cursor: pointer;
            -webkit-appearance: none;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .record-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(145deg, #ff4757, #ff3838);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .record-btn:hover {
            background: linear-gradient(145deg, #ff3838, #ff2f2f);
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
        }

        .record-btn.recording {
            background: linear-gradient(145deg, #7bed9f, #5f27cd);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .effects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .effect-btn {
            padding: 10px;
            background: linear-gradient(145deg, #2d3436, #636e72);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s ease;
        }

        .effect-btn:hover {
            background: linear-gradient(145deg, #636e72, #2d3436);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .mode-switch {
            display: flex;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            overflow: hidden;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: linear-gradient(145deg, #00ffff, #0080ff);
            color: #000;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ffff;
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="toolbar">
            <div class="mode-switch">
                <button class="mode-btn active" onclick="switchMode('2d')">2D Mode</button>
                <button class="mode-btn" onclick="switchMode('3d')">3D Mode</button>
            </div>

            <div class="tool-section">
                <h3>Drawing Tools</h3>
                <div class="tool-grid">
                    <div class="tool-btn active" onclick="selectTool('brush')">🖌️<br>Brush</div>
                    <div class="tool-btn" onclick="selectTool('line')">📏<br>Line</div>
                    <div class="tool-btn" onclick="selectTool('circle')">⭕<br>Circle</div>
                    <div class="tool-btn" onclick="selectTool('rect')">⬜<br>Rect</div>
                    <div class="tool-btn" onclick="selectTool('polygon')">🔷<br>Polygon</div>
                    <div class="tool-btn" onclick="selectTool('spray')">💨<br>Spray</div>
                </div>
            </div>

            <div class="tool-section">
                <h3>Visual Effects</h3>
                <div class="effects-grid">
                    <div class="effect-btn" onclick="toggleEffect('glow')">✨ Glow</div>
                    <div class="effect-btn" onclick="toggleEffect('rainbow')">🌈 Rainbow</div>
                    <div class="effect-btn" onclick="toggleEffect('neon')">💡 Neon</div>
                    <div class="effect-btn" onclick="toggleEffect('particles')">⭐ Particles</div>
                    <div class="effect-btn" onclick="toggleEffect('mirror')">🪞 Mirror</div>
                    <div class="effect-btn" onclick="toggleEffect('kaleidoscope')">🔮 Kaleidoscope</div>
                </div>
            </div>

            <div class="tool-section">
                <h3>3D Tools</h3>
                <div class="tool-grid">
                    <div class="tool-btn" onclick="select3DTool('cube')">📦<br>Cube</div>
                    <div class="tool-btn" onclick="select3DTool('sphere')">🌕<br>Sphere</div>
                    <div class="tool-btn" onclick="select3DTool('pyramid')">🔺<br>Pyramid</div>
                    <div class="tool-btn" onclick="select3DTool('torus')">🍩<br>Torus</div>
                </div>
            </div>

            <div class="tool-section">
                <h3>Properties</h3>
                <div class="slider-container">
                    <label>Brush Size: <span id="sizeValue">10</span></label>
                    <input type="range" id="brushSize" min="1" max="100" value="10" oninput="updateBrushSize(this.value)">
                </div>
                
                <div class="slider-container">
                    <label>Opacity: <span id="opacityValue">100</span>%</label>
                    <input type="range" id="opacity" min="10" max="100" value="100" oninput="updateOpacity(this.value)">
                </div>

                <div class="slider-container">
                    <label>Glow Intensity: <span id="glowValue">0</span></label>
                    <input type="range" id="glowIntensity" min="0" max="50" value="0" oninput="updateGlow(this.value)">
                </div>

                <div class="slider-container">
                    <label>Animation Speed: <span id="speedValue">1</span>x</label>
                    <input type="range" id="animSpeed" min="0.1" max="5" step="0.1" value="1" oninput="updateAnimSpeed(this.value)">
                </div>

                <div class="slider-container">
                    <label>Color:</label>
                    <input type="color" id="colorPicker" value="#00ffff" onchange="updateColor(this.value)">
                </div>
            </div>

            <div class="tool-section">
                <h3>Actions</h3>
                <button class="tool-btn" onclick="clearCanvas()" style="width: 100%; margin-bottom: 10px;">🗑️ Clear Canvas</button>
                <button class="tool-btn" onclick="saveImage()" style="width: 100%; margin-bottom: 10px;">💾 Save Image</button>
                <button class="tool-btn" onclick="addRandomEffect()" style="width: 100%; margin-bottom: 10px;">🎲 Random Effect</button>
            </div>

            <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
                🎥 Start Recording
            </button>
        </div>

        <div class="canvas-container">
            <canvas id="canvas" width="800" height="600"></canvas>
        </div>
    </div>

    <script>
        let canvas, ctx;
        let isDrawing = false;
        let currentTool = 'brush';
        let currentMode = '2d';
        let brushSize = 10;
        let currentColor = '#00ffff';
        let opacity = 1;
        let glowIntensity = 0;
        let animationSpeed = 1;
        let effects = {
            glow: false,
            rainbow: false,
            neon: false,
            particles: false,
            mirror: false,
            kaleidoscope: false
        };
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let animationFrame;
        let particleSystem = [];
        let hueShift = 0;

        // 3D Variables
        let scene3d = {
            objects: [],
            camera: { x: 0, y: 0, z: -5 },
            rotation: { x: 0, y: 0, z: 0 }
        };

        function initCanvas() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            // Set up event listeners
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            
            // Touch events for mobile
            canvas.addEventListener('touchstart', handleTouch);
            canvas.addEventListener('touchmove', handleTouch);
            canvas.addEventListener('touchend', stopDrawing);

            // Create background particles
            createParticles();
            
            // Start animation loop
            animate();
        }

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (3 + Math.random() * 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (mode === '3d') {
                init3D();
            }
        }

        function selectTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function select3DTool(tool) {
            if (currentMode === '3d') {
                add3DObject(tool);
            }
        }

        function toggleEffect(effect) {
            effects[effect] = !effects[effect];
            event.target.style.background = effects[effect] ? 
                'linear-gradient(145deg, #00ffff, #0080ff)' : 
                'linear-gradient(145deg, #2d3436, #636e72)';
        }

        function updateBrushSize(value) {
            brushSize = parseInt(value);
            document.getElementById('sizeValue').textContent = value;
        }

        function updateOpacity(value) {
            opacity = value / 100;
            document.getElementById('opacityValue').textContent = value;
        }

        function updateGlow(value) {
            glowIntensity = parseInt(value);
            document.getElementById('glowValue').textContent = value;
        }

        function updateAnimSpeed(value) {
            animationSpeed = parseFloat(value);
            document.getElementById('speedValue').textContent = value;
        }

        function updateColor(color) {
            currentColor = color;
        }

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent(e.type === 'touchstart' ? 'mousedown' : 
                                              e.type === 'touchmove' ? 'mousemove' : 'mouseup', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }

        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }

        function draw(e) {
            if (!isDrawing && currentTool === 'brush') return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.globalAlpha = opacity;
            
            if (effects.glow) {
                ctx.shadowColor = currentColor;
                ctx.shadowBlur = glowIntensity;
            } else {
                ctx.shadowBlur = 0;
            }

            let color = currentColor;
            if (effects.rainbow) {
                color = `hsl(${hueShift}, 100%, 50%)`;
            }

            ctx.strokeStyle = color;
            ctx.fillStyle = color;

            switch (currentTool) {
                case 'brush':
                    drawBrush(x, y);
                    break;
                case 'spray':
                    drawSpray(x, y);
                    break;
                case 'line':
                    if (isDrawing) drawLine(x, y);
                    break;
                case 'circle':
                    if (isDrawing) drawCircle(x, y);
                    break;
                case 'rect':
                    if (isDrawing) drawRectangle(x, y);
                    break;
                case 'polygon':
                    drawPolygon(x, y);
                    break;
            }

            if (effects.mirror) {
                drawMirror(x, y);
            }

            if (effects.kaleidoscope) {
                drawKaleidoscope(x, y);
            }

            if (effects.particles) {
                addParticleEffect(x, y);
            }
        }

        function drawBrush(x, y) {
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (!isDrawing) {
                ctx.beginPath();
                ctx.moveTo(x, y);
                return;
            }
            
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function drawSpray(x, y) {
            for (let i = 0; i < brushSize; i++) {
                const sprayX = x + (Math.random() - 0.5) * brushSize * 2;
                const sprayY = y + (Math.random() - 0.5) * brushSize * 2;
                ctx.fillRect(sprayX, sprayY, 1, 1);
            }
        }

        function drawLine(x, y) {
            ctx.lineWidth = brushSize;
            ctx.beginPath();
            ctx.moveTo(x - 50, y - 50);
            ctx.lineTo(x + 50, y + 50);
            ctx.stroke();
        }

        function drawCircle(x, y) {
            ctx.lineWidth = brushSize;
            ctx.beginPath();
            ctx.arc(x, y, brushSize * 2, 0, 2 * Math.PI);
            ctx.stroke();
        }

        function drawRectangle(x, y) {
            ctx.lineWidth = brushSize;
            ctx.strokeRect(x - brushSize * 2, y - brushSize * 2, brushSize * 4, brushSize * 4);
        }

        function drawPolygon(x, y) {
            const sides = 6;
            const radius = brushSize * 2;
            ctx.lineWidth = brushSize;
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const angle = (i * 2 * Math.PI) / sides;
                const px = x + radius * Math.cos(angle);
                const py = y + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.stroke();
        }

        function drawMirror(x, y) {
            const mirrorX = canvas.width - x;
            ctx.beginPath();
            ctx.arc(mirrorX, y, brushSize, 0, 2 * Math.PI);
            ctx.fill();
        }

        function drawKaleidoscope(x, y) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const segments = 8;
            
            for (let i = 0; i < segments; i++) {
                const angle = (i * 2 * Math.PI) / segments;
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                
                const newX = centerX + (x - centerX) * cos - (y - centerY) * sin;
                const newY = centerY + (x - centerX) * sin + (y - centerY) * cos;
                
                ctx.beginPath();
                ctx.arc(newX, newY, brushSize / 2, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        function addParticleEffect(x, y) {
            for (let i = 0; i < 5; i++) {
                particleSystem.push({
                    x: x + (Math.random() - 0.5) * 20,
                    y: y + (Math.random() - 0.5) * 20,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 60,
                    color: currentColor
                });
            }
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.beginPath();
        }

        function init3D() {
            // Initialize 3D rendering context
            scene3d.objects = [];
        }

        function add3DObject(type) {
            const object = {
                type: type,
                x: Math.random() * 400 + 200,
                y: Math.random() * 300 + 150,
                z: Math.random() * 100,
                rotation: { x: 0, y: 0, z: 0 },
                color: currentColor,
                size: brushSize * 2
            };
            scene3d.objects.push(object);
        }

        function render3D() {
            if (currentMode !== '3d') return;
            
            // Simple 3D projection and rendering
            scene3d.objects.forEach(obj => {
                const scale = 200 / (200 + obj.z);
                const x = obj.x * scale;
                const y = obj.y * scale;
                const size = obj.size * scale;
                
                ctx.fillStyle = obj.color;
                ctx.globalAlpha = opacity;
                
                switch (obj.type) {
                    case 'cube':
                        ctx.fillRect(x - size/2, y - size/2, size, size);
                        break;
                    case 'sphere':
                        ctx.beginPath();
                        ctx.arc(x, y, size/2, 0, 2 * Math.PI);
                        ctx.fill();
                        break;
                    case 'pyramid':
                        ctx.beginPath();
                        ctx.moveTo(x, y - size/2);
                        ctx.lineTo(x - size/2, y + size/2);
                        ctx.lineTo(x + size/2, y + size/2);
                        ctx.closePath();
                        ctx.fill();
                        break;
                    case 'torus':
                        ctx.beginPath();
                        ctx.arc(x, y, size/2, 0, 2 * Math.PI);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(x, y, size/4, 0, 2 * Math.PI);
                        ctx.stroke();
                        break;
                }
                
                // Rotate objects
                obj.rotation.y += 0.02 * animationSpeed;
            });
        }

        function animate() {
            // Update rainbow effect
            if (effects.rainbow) {
                hueShift = (hueShift + 2 * animationSpeed) % 360;
            }
            
            // Update particle system
            particleSystem = particleSystem.filter(particle => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life--;
                
                if (particle.life > 0) {
                    ctx.globalAlpha = particle.life / 60;
                    ctx.fillStyle = particle.color;
                    ctx.fillRect(particle.x, particle.y, 2, 2);
                    return true;
                }
                return false;
            });
            
            // Render 3D objects
            if (currentMode === '3d') {
                render3D();
            }
            
            animationFrame = requestAnimationFrame(animate);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            scene3d.objects = [];
            particleSystem = [];
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'design_' + Date.now() + '.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function addRandomEffect() {
            const effectKeys = Object.keys(effects);
            const randomEffect = effectKeys[Math.floor(Math.random() * effectKeys.length)];
            effects[randomEffect] = !effects[randomEffect];
            
            // Update button appearance
            const buttons = document.querySelectorAll('.effect-btn');
            buttons.forEach(btn => {
                if (btn.textContent.includes(randomEffect.charAt(0).toUpperCase() + randomEffect.slice(1))) {
                    btn.style.background = effects[randomEffect] ? 
                        'linear-gradient(145deg, #00ffff, #0080ff)' : 
                        'linear-gradient(145deg, #2d3436, #636e72)';
                }
            });
        }

        function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        function startRecording() {
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm; codecs=vp9'
            });
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'design_creation_' + Date.now() + '.webm';
                a.click();
                URL.revokeObjectURL(url);
            };
            
            mediaRecorder.start();
            isRecording = true;
            
            const recordBtn = document.getElementById('recordBtn');
            recordBtn.textContent = '⏹️ Stop Recording';
            recordBtn.classList.add('recording');
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                const recordBtn = document.getElementById('recordBtn');
                recordBtn.textContent = '🎥 Start Recording';
                recordBtn.classList.remove('recording');
            }
        }

        // Initialize everything
        window.onload = function() {
            initCanvas();
        };
    </script>
