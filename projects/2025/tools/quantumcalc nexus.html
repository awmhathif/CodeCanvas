<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumCalc Nexus</title>
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7d12ff;
            --background: #0a0e14;
            --panel: #1a1f29;
            --text: #ffffff;
            --glow: 0 0 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui;
        }

        body {
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .main-container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 2rem;
            width: 100%;
            max-width: 1400px;
            padding: 2rem;
            position: relative;
        }

        .hologram-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg,
                transparent 49%,
                rgba(125, 18, 255, 0.1) 50%,
                transparent 51%);
            animation: scan 6s linear infinite;
            pointer-events: none;
        }

        .calculator-panel {
            background: var(--panel);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--glow) var(--primary);
            position: relative;
            overflow: hidden;
        }

        .display {
            background: #000;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 2.5em;
            text-align: right;
            position: relative;
            overflow: hidden;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
        }

        .btn {
            background: #2d3440;
            border: none;
            color: var(--text);
            padding: 1.2rem;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #3d4450;
            transform: translateY(-2px);
        }

        .btn-operator {
            background: var(--secondary);
        }

        .btn-special {
            background: var(--primary);
            color: #000;
        }

        .side-panel {
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 1.5rem;
        }

        .clock {
            background: var(--panel);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            font-size: 2em;
            letter-spacing: 3px;
            text-shadow: var(--glow) var(--primary);
        }

        .notes-panel {
            background: var(--panel);
            border-radius: 15px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            margin: 1rem 0;
        }

        .note-item {
            background: #2d3440;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            animation: slideIn 0.3s ease;
        }

        .settings-panel {
            background: var(--panel);
            border-radius: 15px;
            padding: 1.5rem;
        }

        .theme-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1rem 0;
        }

        .theme-option {
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            background: var(--primary);
            border-radius: 50%;
        }

        @keyframes scan {
            from { transform: translateY(-100%); }
            to { transform: translateY(100%); }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .hidden-tab {
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .tab-active {
            display: block;
            opacity: 1;
        }

        .backup-options {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
        }

        .matrix-effect {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <canvas class="matrix-effect" id="matrix"></canvas>
    <div class="hologram-effect"></div>
    
    <div class="main-container">
        <div class="calculator-panel">
            <div class="display" id="display">0</div>
            <div class="calc-buttons">
                <button class="btn btn-special" data-action="clear">C</button>
                <button class="btn btn-operator" data-action="backspace">⌫</button>
                <button class="btn btn-operator" data-action="±">±</button>
                <button class="btn btn-operator" data-action="/">÷</button>
                <button class="btn" data-number="7">7</button>
                <button class="btn" data-number="8">8</button>
                <button class="btn" data-number="9">9</button>
                <button class="btn btn-operator" data-action="*">×</button>
                <button class="btn" data-number="4">4</button>
                <button class="btn" data-number="5">5</button>
                <button class="btn" data-number="6">6</button>
                <button class="btn btn-operator" data-action="-">−</button>
                <button class="btn" data-number="1">1</button>
                <button class="btn" data-number="2">2</button>
                <button class="btn" data-number="3">3</button>
                <button class="btn btn-operator" data-action="+">+</button>
                <button class="btn" data-number="0">0</button>
                <button class="btn" data-action=".">.</button>
                <button class="btn btn-operator" data-action="%">%</button>
                <button class="btn btn-special" data-action="=">=</button>
            </div>
        </div>

        <div class="side-panel">
            <div class="clock" id="clock"></div>
            
            <div class="notes-panel">
                <h3>Quantum Notes</h3>
                <div class="notes-list" id="notesList"></div>
                <textarea id="newNote" placeholder="Enter new note..."></textarea>
                <button class="btn" onclick="addNote()">Add Note</button>
            </div>

            <div class="settings-panel">
                <div class="tab-buttons">
                    <button class="btn" onclick="showTab('themes')">Themes</button>
                    <button class="btn" onclick="showTab('backup')">Backup</button>
                    <button class="btn" onclick="showTab('converter')">Converter</button>
                </div>

                <div id="themes" class="hidden-tab tab-active">
                    <div class="theme-selector">
                        <div class="theme-option" style="background: #00ff9d; color: #000" onclick="setTheme('cyber')">Cyber</div>
                        <div class="theme-option" style="background: #0f0; color: #000" onclick="setTheme('matrix')">Matrix</div>
                        <div class="theme-option" style="background: #ff074a; color: #fff" onclick="setTheme('neon')">Neon</div>
                    </div>
                </div>

                <div id="backup" class="hidden-tab">
                    <div class="backup-options">
                        <button class="btn" onclick="exportData()">Export</button>
                        <button class="btn" onclick="importData()">Import</button>
                        <input type="file" id="importFile" hidden>
                    </div>
                </div>

                <div id="converter" class="hidden-tab">
                    <div class="converter-interface">
                        <select id="converterType">
                            <option value="currency">Currency</option>
                            <option value="length">Length</option>
                            <option value="temperature">Temperature</option>
                        </select>
                        <input type="number" id="converterInput">
                        <span id="converterResult"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Calculator Logic
        let currentValue = '0';
        let previousValue = '';
        let operation = null;
        let shouldResetScreen = false;

        const display = document.getElementById('display');
        const buttons = document.querySelectorAll('.btn');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const action = button.dataset.action;
                const number = button.dataset.number;

                if (number) handleNumber(number);
                if (action) handleAction(action);
                createParticle(event);
            });
        });

        function handleNumber(num) {
            if (currentValue === '0' || shouldResetScreen) {
                currentValue = num;
                shouldResetScreen = false;
            } else {
                currentValue += num;
            }
            updateDisplay();
        }

        function handleAction(action) {
            switch(action) {
                case 'clear':
                    currentValue = '0';
                    previousValue = '';
                    operation = null;
                    break;
                case 'backspace':
                    currentValue = currentValue.slice(0, -1) || '0';
                    break;
                case '±':
                    currentValue = (-parseFloat(currentValue)).toString();
                    break;
                case '=':
                    calculate();
                    break;
                default:
                    handleOperator(action);
            }
            updateDisplay();
        }

        function handleOperator(operator) {
            previousValue = currentValue;
            operation = operator;
            shouldResetScreen = true;
        }

        function calculate() {
            let computation;
            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);

            switch(operation) {
                case '+': computation = prev + current; break;
                case '-': computation = prev - current; break;
                case '*': computation = prev * current; break;
                case '/': computation = prev / current; break;
                case '%': computation = prev % current; break;
            }

            currentValue = computation.toString();
            operation = null;
            previousValue = '';
        }

        function updateDisplay() {
            display.textContent = currentValue;
        }

        // Notes System
        function addNote() {
            const text = document.getElementById('newNote').value;
            if (!text) return;

            const note = {
                id: Date.now(),
                text: text,
                date: new Date().toLocaleString()
            };

            const noteElement = document.createElement('div');
            noteElement.className = 'note-item';
            noteElement.innerHTML = `
                <div>${note.text}</div>
                <div>
                    <small>${note.date}</small>
                    <button onclick="deleteNote(${note.id})">×</button>
                </div>
            `;

            document.getElementById('notesList').appendChild(noteElement);
            document.getElementById('newNote').value = '';
            saveNotes();
        }

        function deleteNote(id) {
            // Implement delete functionality
        }

        function saveNotes() {
            // Implement localStorage saving
        }

        // Theme System
        function setTheme(theme) {
            switch(theme) {
                case 'cyber':
                    document.documentElement.style.setProperty('--primary', '#00ff9d');
                    document.documentElement.style.setProperty('--secondary', '#7d12ff');
                    break;
                case 'matrix':
                    document.documentElement.style.setProperty('--primary', '#0f0');
                    document.documentElement.style.setProperty('--secondary', '#1a1f29');
                    break;
                case 'neon':
                    document.documentElement.style.setProperty('--primary', '#ff074a');
                    document.documentElement.style.setProperty('--secondary', '#ffd300');
            }
        }

        // Backup System
        function exportData() {
            // Implement data export
        }

        function importData() {
            document.getElementById('importFile').click();
        }

        // Visual Effects
        function createParticle(e) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = `${e.clientX}px`;
            particle.style.top = `${e.clientY}px`;
            document.body.appendChild(particle);

            particle.animate([
                { transform: 'scale(1)', opacity: 1 },
                { transform: 'scale(3)', opacity: 0 }
            ], { duration: 1000 });

            setTimeout(() => particle.remove(), 1000);
        }

        // Real-time Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString('en-US', { hour12: false });
        }
        setInterval(updateClock, 1000);

        // Matrix Background
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Matrix animation code would go here

        // Tab System
        function showTab(tabId) {
            document.querySelectorAll('.hidden-tab').forEach(tab => {
                tab.classList.remove('tab-active');
            });
            document.getElementById(tabId).classList.add('tab-active');
        }

        // Initialization
        updateClock();
    </script>
</body>
</html>
