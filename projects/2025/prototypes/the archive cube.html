<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive Cube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050510;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #0ff;
            font-size: 24px;
            letter-spacing: 8px;
            text-shadow: 0 0 20px #0ff;
            z-index: 10;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #0f8;
            font-size: 12px;
            text-align: center;
            z-index: 10;
        }

        .info {
            position: fixed;
            top: 30px;
            right: 30px;
            color: #f08;
            font-size: 11px;
            text-align: right;
            line-height: 1.8;
            z-index: 10;
        }

        .dimension {
            position: fixed;
            top: 30px;
            left: 30px;
            color: #0ff;
            font-size: 11px;
            line-height: 1.8;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div class="title">THE ARCHIVE CUBE</div>
    <div class="dimension">DIMENSION: <span id="dim">4D</span><br>W-AXIS: <span id="waxis">0.00</span><br>ROTATION:
        <span id="rot">ACTIVE</span></div>
    <div class="info">MEMORIES: 8<br>FORMAT: TESSERACT<br>STATUS: STABLE</div>
    <div class="controls">DRAG TO ROTATE · SCROLL FOR 4TH DIMENSION · CLICK CUBES TO ACCESS</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
        camera.position.z = 8;
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setClearColor(0x050510);
        document.body.appendChild(renderer.domElement);

        // 4D tesseract vertices
        const vertices4D = [];
        for (let i = 0; i < 16; i++) {
            vertices4D.push([
                (i & 1) ? 1 : -1,
                (i & 2) ? 1 : -1,
                (i & 4) ? 1 : -1,
                (i & 8) ? 1 : -1
            ]);
        }

        // Edges connect vertices that differ in exactly one coordinate
        const edges = [];
        for (let i = 0; i < 16; i++) {
            for (let j = i + 1; j < 16; j++) {
                let diff = 0;
                for (let k = 0; k < 4; k++) if (vertices4D[i][k] !== vertices4D[j][k]) diff++;
                if (diff === 1) edges.push([i, j]);
            }
        }

        const lineMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 });
        const coreMat = new THREE.MeshBasicMaterial({ color: 0xff0080, transparent: true, opacity: 0.8 });
        const cubeGroup = new THREE.Group();
        scene.add(cubeGroup);

        // Inner cubes (memories)
        const memories = [];
        const memColors = [0xff0080, 0x00ff88, 0x8800ff, 0xffff00, 0x00ffff, 0xff8800, 0x0088ff, 0xff00ff];
        const innerCubes = [];

        for (let i = 0; i < 8; i++) {
            const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const edges = new THREE.EdgesGeometry(geo);
            const mat = new THREE.LineBasicMaterial({ color: memColors[i], transparent: true, opacity: 0.9 });
            const cube = new THREE.LineSegments(edges, mat);

            const coreGeo = new THREE.IcosahedronGeometry(0.08, 0);
            const core = new THREE.Mesh(coreGeo, new THREE.MeshBasicMaterial({ color: memColors[i] }));
            cube.add(core);

            cube.position.set(
                (i & 1) ? 0.7 : -0.7,
                (i & 2) ? 0.7 : -0.7,
                (i & 4) ? 0.7 : -0.7
            );
            cube.userData = { basePos: cube.position.clone(), index: i };
            innerCubes.push(cube);
            cubeGroup.add(cube);
        }

        let wAngle = 0, xyAngle = 0, xzAngle = 0;
        let isDragging = false, lastMouse = { x: 0, y: 0 };

        function project4Dto3D(v, w) {
            const distance = 3;
            const sw = Math.sin(w), cw = Math.cos(w);
            const x4 = v[0], y4 = v[1], z4 = v[2], w4 = v[3];
            const w_rot = x4 * sw + w4 * cw;
            const scale = distance / (distance - w_rot);
            return new THREE.Vector3(
                (x4 * cw - w4 * sw) * scale,
                y4 * scale,
                z4 * scale
            );
        }

        function updateTesseract() {
            // Remove old lines
            cubeGroup.children.filter(c => c.isLine && !c.userData.index).forEach(c => cubeGroup.remove(c));

            const projected = vertices4D.map(v => project4Dto3D(v, wAngle));

            edges.forEach(([i, j]) => {
                const geo = new THREE.BufferGeometry().setFromPoints([projected[i], projected[j]]);
                const line = new THREE.Line(geo, lineMat);
                cubeGroup.add(line);
            });

            // Update inner cubes with 4D effect
            innerCubes.forEach((cube, i) => {
                const wOffset = ((i & 8) ? 1 : -1) * 0.5;
                const scale = 1 + Math.sin(wAngle + wOffset) * 0.3;
                cube.scale.setScalar(scale);
                cube.children[0].scale.setScalar(1 + Math.sin(Date.now() * 0.003 + i) * 0.2);
            });

            document.getElementById('waxis').textContent = wAngle.toFixed(2);
        }

        renderer.domElement.addEventListener('mousedown', e => { isDragging = true; lastMouse = { x: e.clientX, y: e.clientY }; });
        renderer.domElement.addEventListener('mousemove', e => {
            if (!isDragging) return;
            xyAngle += (e.clientX - lastMouse.x) * 0.01;
            xzAngle += (e.clientY - lastMouse.y) * 0.01;
            lastMouse = { x: e.clientX, y: e.clientY };
        });
        renderer.domElement.addEventListener('mouseup', () => isDragging = false);
        renderer.domElement.addEventListener('wheel', e => { wAngle += e.deltaY * 0.002; });

        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging) { xyAngle += 0.003; xzAngle += 0.002; }
            cubeGroup.rotation.y = xyAngle;
            cubeGroup.rotation.x = xzAngle;
            updateTesseract();
            renderer.render(scene, camera);
        }
        animate();

        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>

</html>
