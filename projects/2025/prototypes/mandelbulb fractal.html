<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandelbulb Fractal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #0ff;
            font-size: 22px;
            letter-spacing: 6px;
            text-shadow: 0 0 20px #0ff;
            z-index: 10;
        }

        .stats {
            position: fixed;
            top: 30px;
            left: 30px;
            color: #0f8;
            font-size: 11px;
            line-height: 1.8;
            z-index: 10;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #0ff;
            font-size: 11px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div class="title">MANDELBULB</div>
    <div class="stats">POWER: <span id="power">8</span><br>DEPTH: <span id="depth">0.00</span><br>ITERATIONS: 8</div>
    <div class="controls">DRAG TO LOOK · SCROLL TO ZOOM · WASD TO MOVE</div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl');
        canvas.width = innerWidth; canvas.height = innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);

        const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
        const fs = `
        precision highp float;
        uniform float t;
        uniform vec2 r;
        uniform vec3 cam;
        uniform vec2 rot;
        
        mat2 R(float a){float c=cos(a),s=sin(a);return mat2(c,-s,s,c);}
        
        float DE(vec3 p){
            vec3 z=p;
            float dr=1.,r=0.;
            float Power=8.;
            for(int i=0;i<8;i++){
                r=length(z);
                if(r>2.)break;
                float theta=acos(z.z/r);
                float phi=atan(z.y,z.x);
                dr=pow(r,Power-1.)*Power*dr+1.;
                float zr=pow(r,Power);
                theta*=Power;phi*=Power;
                z=zr*vec3(sin(theta)*cos(phi),sin(phi)*sin(theta),cos(theta))+p;
            }
            return .5*log(r)*r/dr;
        }
        
        vec3 norm(vec3 p){vec2 e=vec2(.0005,0);return normalize(vec3(DE(p+e.xyy)-DE(p-e.xyy),DE(p+e.yxy)-DE(p-e.yxy),DE(p+e.yyx)-DE(p-e.yyx)));}
        
        void main(){
            vec2 uv=(gl_FragCoord.xy-.5*r)/r.y;
            vec3 ro=cam;
            vec3 rd=normalize(vec3(uv,1.5));
            rd.xz*=R(rot.x);rd.yz*=R(rot.y);
            
            float d=0.;
            for(int i=0;i<100;i++){
                vec3 p=ro+rd*d;
                float h=DE(p);
                if(h<.0001||d>10.)break;
                d+=h*.5;
            }
            
            vec3 col=vec3(.02,.01,.03);
            if(d<10.){
                vec3 p=ro+rd*d;
                vec3 n=norm(p);
                vec3 l=normalize(vec3(1,1,-1));
                float diff=max(0.,dot(n,l))*.7;
                float spec=pow(max(0.,dot(reflect(-l,n),-rd)),16.);
                float ao=1.-d*.05;
                float rim=pow(1.-abs(dot(rd,n)),3.);
                col=vec3(.1,.02,.15)*diff;
                col+=vec3(0,.8,.9)*rim*.5;
                col+=vec3(1,.5,.8)*spec*.3;
                col+=vec3(.8,.2,1.)*ao*.2;
                float depth=length(p);
                col+=vec3(.5,.1,.8)*pow(max(0.,1.-depth),2.)*.3;
            }
            col=pow(col,vec3(.45));
            gl_FragColor=vec4(col,1);
        }`;

        function compile(src, type) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            return s;
        }

        const prog = gl.createProgram();
        gl.attachShader(prog, compile(vs, gl.VERTEX_SHADER));
        gl.attachShader(prog, compile(fs, gl.FRAGMENT_SHADER));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
        const p = gl.getAttribLocation(prog, 'p');
        gl.enableVertexAttribArray(p);
        gl.vertexAttribPointer(p, 2, gl.FLOAT, false, 0, 0);

        const tLoc = gl.getUniformLocation(prog, 't');
        const rLoc = gl.getUniformLocation(prog, 'r');
        const camLoc = gl.getUniformLocation(prog, 'cam');
        const rotLoc = gl.getUniformLocation(prog, 'rot');

        let cam = [0, 0, -2.5], rot = [0, 0];
        let keys = {}, isDrag = false, lastM = { x: 0, y: 0 };

        addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        canvas.addEventListener('mousedown', e => { isDrag = true; lastM = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('mousemove', e => { if (isDrag) { rot[0] += (e.clientX - lastM.x) * 0.005; rot[1] += (e.clientY - lastM.y) * 0.005; lastM = { x: e.clientX, y: e.clientY }; } });
        canvas.addEventListener('mouseup', () => isDrag = false);
        canvas.addEventListener('wheel', e => cam[2] += e.deltaY * 0.002);

        function render(time) {
            const speed = 0.02;
            if (keys['w']) { cam[0] += Math.sin(rot[0]) * speed; cam[2] += Math.cos(rot[0]) * speed; }
            if (keys['s']) { cam[0] -= Math.sin(rot[0]) * speed; cam[2] -= Math.cos(rot[0]) * speed; }
            if (keys['a']) { cam[0] -= Math.cos(rot[0]) * speed; cam[2] += Math.sin(rot[0]) * speed; }
            if (keys['d']) { cam[0] += Math.cos(rot[0]) * speed; cam[2] -= Math.sin(rot[0]) * speed; }

            gl.uniform1f(tLoc, time * 0.001);
            gl.uniform2f(rLoc, canvas.width, canvas.height);
            gl.uniform3f(camLoc, cam[0], cam[1], cam[2]);
            gl.uniform2f(rotLoc, rot[0], rot[1]);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            document.getElementById('depth').textContent = Math.sqrt(cam[0] * cam[0] + cam[1] * cam[1] + cam[2] * cam[2]).toFixed(2);
            requestAnimationFrame(render);
        }
        render(0);

        addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0, 0, canvas.width, canvas.height); });
    </script>
</body>

</html>
