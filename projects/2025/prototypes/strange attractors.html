<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strange Attractors</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050508;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #0ff;
            font-size: 22px;
            letter-spacing: 6px;
            text-shadow: 0 0 20px #0ff;
            z-index: 10;
        }

        .stats {
            position: fixed;
            top: 30px;
            left: 30px;
            color: #0f8;
            font-size: 11px;
            line-height: 1.8;
            z-index: 10;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .btn {
            padding: 10px 25px;
            font-size: 11px;
            font-family: inherit;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .btn.active {
            background: rgba(255, 0, 128, 0.2);
            border-color: #f08;
            color: #f08;
        }
    </style>
</head>

<body>
    <div class="title">STRANGE ATTRACTORS</div>
    <div class="stats">σ = <span id="sigma">10</span><br>ρ = <span id="rho">28</span><br>β = <span
            id="beta">2.67</span><br>POINTS: <span id="pts">0</span><br>VELOCITY: <span id="vel">0.00</span></div>
    <div class="controls">
        <button class="btn active" id="lorenz">LORENZ</button>
        <button class="btn" id="rossler">RÖSSLER</button>
        <button class="btn" id="thomas">THOMAS</button>
        <button class="btn" id="clear">CLEAR</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 80);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setClearColor(0x050508);
        document.body.appendChild(renderer.domElement);

        let points = [], colors = [];
        let x = 0.1, y = 0, z = 0;
        let type = 'lorenz';
        const maxPoints = 50000;
        let geometry, line;
        let rotY = 0, rotX = 0, isDrag = false, lastM = { x: 0, y: 0 };

        // Attractor parameters
        const params = {
            lorenz: { sigma: 10, rho: 28, beta: 8 / 3, dt: 0.005, scale: 1 },
            rossler: { a: 0.2, b: 0.2, c: 5.7, dt: 0.02, scale: 2 },
            thomas: { b: 0.208186, dt: 0.05, scale: 8 }
        };

        function step() {
            let dx, dy, dz, p = params[type], dt = p.dt;
            if (type === 'lorenz') {
                dx = p.sigma * (y - x); dy = x * (p.rho - z) - y; dz = x * y - p.beta * z;
            } else if (type === 'rossler') {
                dx = -y - z; dy = x + p.a * y; dz = p.b + z * (x - p.c);
            } else {
                dx = Math.sin(y) - p.b * x; dy = Math.sin(z) - p.b * y; dz = Math.sin(x) - p.b * z;
            }
            x += dx * dt; y += dy * dt; z += dz * dt;
            return { x: x * p.scale, y: y * p.scale, z: z * p.scale, v: Math.sqrt(dx * dx + dy * dy + dz * dz) };
        }

        function createLine() {
            geometry = new THREE.BufferGeometry();
            const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8 });
            line = new THREE.Line(geometry, mat);
            scene.add(line);
        }

        function updateLine() {
            const pos = new Float32Array(points.length * 3);
            const col = new Float32Array(colors.length * 3);
            points.forEach((p, i) => { pos[i * 3] = p.x; pos[i * 3 + 1] = p.y; pos[i * 3 + 2] = p.z; });
            colors.forEach((c, i) => { col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b; });
            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(col, 3));
        }

        function reset() {
            points = []; colors = [];
            x = 0.1 + Math.random() * 0.1; y = Math.random() * 0.1; z = Math.random() * 0.1;
            if (line) scene.remove(line);
            createLine();
        }

        function switchType(t) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            type = t; reset();
            const p = params[type];
            document.getElementById('sigma').textContent = p.sigma?.toFixed(0) || p.a?.toFixed(1) || p.b?.toFixed(2);
            document.getElementById('rho').textContent = p.rho?.toFixed(0) || p.b?.toFixed(1) || '-';
            document.getElementById('beta').textContent = p.beta?.toFixed(2) || p.c?.toFixed(1) || '-';
        }

        document.getElementById('lorenz').onclick = () => switchType('lorenz');
        document.getElementById('rossler').onclick = () => switchType('rossler');
        document.getElementById('thomas').onclick = () => switchType('thomas');
        document.getElementById('clear').onclick = reset;

        renderer.domElement.addEventListener('mousedown', e => { isDrag = true; lastM = { x: e.clientX, y: e.clientY }; });
        renderer.domElement.addEventListener('mousemove', e => { if (isDrag) { rotY += (e.clientX - lastM.x) * 0.005; rotX += (e.clientY - lastM.y) * 0.005; lastM = { x: e.clientX, y: e.clientY }; } });
        renderer.domElement.addEventListener('mouseup', () => isDrag = false);
        renderer.domElement.addEventListener('wheel', e => camera.position.z = Math.max(20, Math.min(200, camera.position.z + e.deltaY * 0.1)));

        createLine();
        function animate() {
            requestAnimationFrame(animate);
            for (let i = 0; i < 20; i++) {
                if (points.length >= maxPoints) { points.shift(); colors.shift(); }
                const p = step();
                points.push(new THREE.Vector3(p.x, p.y, p.z));
                const hue = (points.length / maxPoints + p.v * 0.01) % 1;
                colors.push(new THREE.Color().setHSL(hue, 1, 0.5));
                document.getElementById('vel').textContent = p.v.toFixed(2);
            }
            updateLine();
            document.getElementById('pts').textContent = points.length;
            if (!isDrag) rotY += 0.002;
            line.rotation.y = rotY; line.rotation.x = rotX;
            renderer.render(scene, camera);
        }
        animate();

        addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
    </script>
</body>

</html>
