<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mech Assembly Bay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .btn {
            padding: 15px 40px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5),
                        inset 0 0 30px rgba(0, 255, 255, 0.1);
        }

        .btn.active {
            background: rgba(255, 0, 128, 0.2);
            border-color: #ff0080;
            color: #ff0080;
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.5);
        }

        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            font-size: 28px;
            letter-spacing: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            z-index: 100;
        }

        .stats {
            position: fixed;
            top: 30px;
            right: 30px;
            color: #00ff88;
            font-size: 12px;
            text-align: right;
            z-index: 100;
            line-height: 1.8;
        }

        .stats span {
            color: #ffffff;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffff;
            font-size: 24px;
            letter-spacing: 5px;
            z-index: 1000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 3px
            );
            z-index: 99;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">INITIALIZING ASSEMBLY BAY...</div>
    <div class="scanline"></div>
    <div class="title">MECH ASSEMBLY BAY</div>
    <div class="stats">
        MODEL: <span>TITAN-X7</span><br>
        HEIGHT: <span>18.5M</span><br>
        WEIGHT: <span>847 TONS</span><br>
        CORE: <span id="core-status">ONLINE</span>
    </div>
    <div id="canvas-container"></div>
    <div class="controls">
        <button class="btn" id="explodeBtn">EXPLODE VIEW</button>
        <button class="btn" id="rotateBtn">AUTO ROTATE</button>
        <button class="btn" id="resetBtn">RESET</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Materials
        const wireMaterial = new THREE.LineBasicMaterial({ 
            color: 0x00ffff, 
            transparent: true, 
            opacity: 0.8 
        });

        const glowMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xff0080, 
            transparent: true, 
            opacity: 0.9 
        });

        const coreMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x00ff88, 
            transparent: true, 
            opacity: 0.8 
        });

        // Robot parts group
        const robot = new THREE.Group();
        const parts = [];
        const originalPositions = [];
        const explosionOffsets = [];

        // Create wireframe box helper function
        function createWireframeBox(width, height, depth) {
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const edges = new THREE.EdgesGeometry(geometry);
            return new THREE.LineSegments(edges, wireMaterial.clone());
        }

        // Create glowing core
        function createCore(radius) {
            const geometry = new THREE.IcosahedronGeometry(radius, 1);
            const core = new THREE.Mesh(geometry, coreMaterial.clone());
            core.userData.isCore = true;
            return core;
        }

        // Create piston
        function createPiston(length) {
            const group = new THREE.Group();
            
            const cylinder = createWireframeCylinder(0.15, length);
            group.add(cylinder);
            
            const piston = createWireframeCylinder(0.2, length * 0.4);
            piston.position.y = -length * 0.3;
            piston.userData.isPiston = true;
            piston.userData.baseY = piston.position.y;
            piston.userData.amplitude = length * 0.2;
            group.add(piston);
            
            return group;
        }

        function createWireframeCylinder(radius, height) {
            const geometry = new THREE.CylinderGeometry(radius, radius, height, 8);
            const edges = new THREE.EdgesGeometry(geometry);
            return new THREE.LineSegments(edges, wireMaterial.clone());
        }

        // Build robot
        function buildRobot() {
            // Torso
            const torso = createWireframeBox(4, 5, 2);
            torso.position.set(0, 2.5, 0);
            torso.userData.explosionOffset = new THREE.Vector3(0, 0, 0);
            parts.push(torso);
            robot.add(torso);

            // Chest core
            const chestCore = createCore(0.8);
            chestCore.position.set(0, 3, 0.5);
            chestCore.userData.explosionOffset = new THREE.Vector3(0, 0, 3);
            parts.push(chestCore);
            robot.add(chestCore);

            // Head
            const head = createWireframeBox(1.5, 2, 1.5);
            head.position.set(0, 6.5, 0);
            head.userData.explosionOffset = new THREE.Vector3(0, 4, 0);
            parts.push(head);
            robot.add(head);

            // Eyes
            const leftEye = createCore(0.2);
            leftEye.position.set(-0.4, 6.8, 0.7);
            leftEye.userData.explosionOffset = new THREE.Vector3(0, 4, 0);
            parts.push(leftEye);
            robot.add(leftEye);

            const rightEye = createCore(0.2);
            rightEye.position.set(0.4, 6.8, 0.7);
            rightEye.userData.explosionOffset = new THREE.Vector3(0, 4, 0);
            parts.push(rightEye);
            robot.add(rightEye);

            // Left arm
            const leftShoulder = createWireframeBox(1.5, 1.5, 1.5);
            leftShoulder.position.set(-3.5, 4, 0);
            leftShoulder.userData.explosionOffset = new THREE.Vector3(-4, 1, 0);
            parts.push(leftShoulder);
            robot.add(leftShoulder);

            const leftUpperArm = createWireframeBox(1, 3, 1);
            leftUpperArm.position.set(-3.5, 1.5, 0);
            leftUpperArm.userData.explosionOffset = new THREE.Vector3(-5, 0, 0);
            parts.push(leftUpperArm);
            robot.add(leftUpperArm);

            const leftForearm = createWireframeBox(0.8, 3, 0.8);
            leftForearm.position.set(-3.5, -1.5, 0);
            leftForearm.userData.explosionOffset = new THREE.Vector3(-6, -2, 0);
            parts.push(leftForearm);
            robot.add(leftForearm);

            const leftHand = createWireframeBox(1.2, 1.5, 0.5);
            leftHand.position.set(-3.5, -3.5, 0);
            leftHand.userData.explosionOffset = new THREE.Vector3(-7, -3, 0);
            parts.push(leftHand);
            robot.add(leftHand);

            // Right arm
            const rightShoulder = createWireframeBox(1.5, 1.5, 1.5);
            rightShoulder.position.set(3.5, 4, 0);
            rightShoulder.userData.explosionOffset = new THREE.Vector3(4, 1, 0);
            parts.push(rightShoulder);
            robot.add(rightShoulder);

            const rightUpperArm = createWireframeBox(1, 3, 1);
            rightUpperArm.position.set(3.5, 1.5, 0);
            rightUpperArm.userData.explosionOffset = new THREE.Vector3(5, 0, 0);
            parts.push(rightUpperArm);
            robot.add(rightUpperArm);

            const rightForearm = createWireframeBox(0.8, 3, 0.8);
            rightForearm.position.set(3.5, -1.5, 0);
            rightForearm.userData.explosionOffset = new THREE.Vector3(6, -2, 0);
            parts.push(rightForearm);
            robot.add(rightForearm);

            const rightHand = createWireframeBox(1.2, 1.5, 0.5);
            rightHand.position.set(3.5, -3.5, 0);
            rightHand.userData.explosionOffset = new THREE.Vector3(7, -3, 0);
            parts.push(rightHand);
            robot.add(rightHand);

            // Internal arm cores
            const leftArmCore = createCore(0.3);
            leftArmCore.position.set(-3.5, 1.5, 0);
            leftArmCore.userData.explosionOffset = new THREE.Vector3(-5, 0, 2);
            parts.push(leftArmCore);
            robot.add(leftArmCore);

            const rightArmCore = createCore(0.3);
            rightArmCore.position.set(3.5, 1.5, 0);
            rightArmCore.userData.explosionOffset = new THREE.Vector3(5, 0, 2);
            parts.push(rightArmCore);
            robot.add(rightArmCore);

            // Pelvis
            const pelvis = createWireframeBox(3, 1.5, 1.5);
            pelvis.position.set(0, -0.5, 0);
            pelvis.userData.explosionOffset = new THREE.Vector3(0, -1, 0);
            parts.push(pelvis);
            robot.add(pelvis);

            // Left leg
            const leftThigh = createWireframeBox(1.2, 4, 1.2);
            leftThigh.position.set(-1.2, -3.5, 0);
            leftThigh.userData.explosionOffset = new THREE.Vector3(-2, -3, 0);
            parts.push(leftThigh);
            robot.add(leftThigh);

            const leftShin = createWireframeBox(1, 4, 1);
            leftShin.position.set(-1.2, -7.5, 0);
            leftShin.userData.explosionOffset = new THREE.Vector3(-2, -5, 0);
            parts.push(leftShin);
            robot.add(leftShin);

            const leftFoot = createWireframeBox(1.5, 0.5, 2);
            leftFoot.position.set(-1.2, -9.8, 0.3);
            leftFoot.userData.explosionOffset = new THREE.Vector3(-2, -7, 0);
            parts.push(leftFoot);
            robot.add(leftFoot);

            // Right leg
            const rightThigh = createWireframeBox(1.2, 4, 1.2);
            rightThigh.position.set(1.2, -3.5, 0);
            rightThigh.userData.explosionOffset = new THREE.Vector3(2, -3, 0);
            parts.push(rightThigh);
            robot.add(rightThigh);

            const rightShin = createWireframeBox(1, 4, 1);
            rightShin.position.set(1.2, -7.5, 0);
            rightShin.userData.explosionOffset = new THREE.Vector3(2, -5, 0);
            parts.push(rightShin);
            robot.add(rightShin);

            const rightFoot = createWireframeBox(1.5, 0.5, 2);
            rightFoot.position.set(1.2, -9.8, 0.3);
            rightFoot.userData.explosionOffset = new THREE.Vector3(2, -7, 0);
            parts.push(rightFoot);
            robot.add(rightFoot);

            // Internal leg cores
            const leftLegCore = createCore(0.25);
            leftLegCore.position.set(-1.2, -3.5, 0);
            leftLegCore.userData.explosionOffset = new THREE.Vector3(-2, -3, 2);
            parts.push(leftLegCore);
            robot.add(leftLegCore);

            const rightLegCore = createCore(0.25);
            rightLegCore.position.set(1.2, -3.5, 0);
            rightLegCore.userData.explosionOffset = new THREE.Vector3(2, -3, 2);
            parts.push(rightLegCore);
            robot.add(rightLegCore);

            // Pistons
            const piston1 = createPiston(2);
            piston1.position.set(-1.8, 1, 0.8);
            piston1.userData.explosionOffset = new THREE.Vector3(-2, 0, 3);
            piston1.userData.pistonPhase = 0;
            parts.push(piston1);
            robot.add(piston1);

            const piston2 = createPiston(2);
            piston2.position.set(1.8, 1, 0.8);
            piston2.userData.explosionOffset = new THREE.Vector3(2, 0, 3);
            piston2.userData.pistonPhase = Math.PI;
            parts.push(piston2);
            robot.add(piston2);

            const piston3 = createPiston(1.5);
            piston3.position.set(-1, -0.5, 0.8);
            piston3.userData.explosionOffset = new THREE.Vector3(-1, -1, 3);
            piston3.userData.pistonPhase = Math.PI / 2;
            parts.push(piston3);
            robot.add(piston3);

            const piston4 = createPiston(1.5);
            piston4.position.set(1, -0.5, 0.8);
            piston4.userData.explosionOffset = new THREE.Vector3(1, -1, 3);
            piston4.userData.pistonPhase = Math.PI * 1.5;
            parts.push(piston4);
            robot.add(piston4);

            // Store original positions
            parts.forEach(part => {
                originalPositions.push(part.position.clone());
            });

            scene.add(robot);
        }

        // Create grid floor
        function createGrid() {
            const gridSize = 50;
            const gridDivisions = 50;
            const gridHelper = new THREE.GridHelper(gridSize, gridDivisions, 0x00ffff, 0x004444);
            gridHelper.position.y = -10;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.5;
            scene.add(gridHelper);

            // Outer ring
            const ringGeometry = new THREE.RingGeometry(15, 15.2, 64);
            const ringMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff, 
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.5
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = -9.9;
            scene.add(ring);
        }

        // Animation state
        let isExploded = false;
        let explosionProgress = 0;
        let autoRotate = true;
        let time = 0;

        // Button handlers
        document.getElementById('explodeBtn').addEventListener('click', function() {
            isExploded = !isExploded;
            this.classList.toggle('active');
            this.textContent = isExploded ? 'ASSEMBLE' : 'EXPLODE VIEW';
        });

        document.getElementById('rotateBtn').addEventListener('click', function() {
            autoRotate = !autoRotate;
            this.classList.toggle('active');
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            isExploded = false;
            autoRotate = true;
            explosionProgress = 0;
            document.getElementById('explodeBtn').classList.remove('active');
            document.getElementById('explodeBtn').textContent = 'EXPLODE VIEW';
            document.getElementById('rotateBtn').classList.remove('active');
            robot.rotation.y = 0;
            camera.position.set(0, 5, 20);
        });

        // Mouse controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;
            
            robot.rotation.y += deltaX * 0.01;
            robot.rotation.x += deltaY * 0.01;
            
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        renderer.domElement.addEventListener('mouseup', () => {
            isDragging = false;
        });

        renderer.domElement.addEventListener('wheel', (e) => {
            camera.position.z += e.deltaY * 0.05;
            camera.position.z = Math.max(10, Math.min(50, camera.position.z));
        });

        // Animation
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;

            // Handle explosion animation
            const targetProgress = isExploded ? 1 : 0;
            explosionProgress += (targetProgress - explosionProgress) * 0.05;

            // Update part positions
            parts.forEach((part, index) => {
                const original = originalPositions[index];
                const offset = part.userData.explosionOffset || new THREE.Vector3();
                
                part.position.x = original.x + offset.x * explosionProgress;
                part.position.y = original.y + offset.y * explosionProgress;
                part.position.z = original.z + offset.z * explosionProgress;

                // Animate cores
                if (part.userData.isCore) {
                    part.scale.setScalar(1 + Math.sin(time * 3) * 0.1);
                    part.material.opacity = 0.5 + Math.sin(time * 5) * 0.3;
                }

                // Animate pistons
                if (part.userData.pistonPhase !== undefined) {
                    part.children.forEach(child => {
                        if (child.userData.isPiston) {
                            const phase = part.userData.pistonPhase;
                            child.position.y = child.userData.baseY + 
                                Math.sin(time * 4 + phase) * child.userData.amplitude;
                        }
                    });
                }
            });

            // Auto rotate
            if (autoRotate && !isDragging) {
                robot.rotation.y += 0.005;
            }

            // Update core status
            const coreStatus = document.getElementById('core-status');
            coreStatus.style.color = Math.sin(time * 5) > 0 ? '#00ff88' : '#00cc66';

            renderer.render(scene, camera);
        }

        // Initialize
        buildRobot();
        createGrid();
        document.getElementById('loading').style.display = 'none';
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
