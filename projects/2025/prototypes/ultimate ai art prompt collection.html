        // Initialize the DOM with categories and prompts
        function initializePrompts() {
            const container = document.getElementById('prompts-container');
            let promptCounter = 1;
            
            categories.forEach(category => {
                const categorySection = document.createElement('div');
                categorySection.classList.add('category-section');
                categorySection.dataset.category = category.id;
                
                const categoryTitle = document.createElement('h2');
                categoryTitle.classList.add('category-title');
                categoryTitle.textContent = category.name;
                categorySection.appendChild(categoryTitle);
                
                const promptGrid = document.createElement('div');
                promptGrid.classList.add('prompt-container');
                
                category.prompts.forEach(promptText => {
                    const promptCard = document.createElement('div');
                    promptCard.classList.add('prompt-card');
                    promptCard.dataset.number = promptCounter;
                    
                    const promptNumber = document.createElement('div');
                    promptNumber.classList.add('prompt-number');
                    promptNumber.textContent = promptCounter;
                    
                    const promptContent = document.createElement('p');
                    promptContent.classList.add('prompt-text');
                    promptContent.textContent = promptText;
                    
                    const cardActions = document.createElement('div');
                    cardActions.classList.add('card-actions');
                    
                    const copyBtn = document.createElement('button');
                    copyBtn.classList.add('copy-btn');
                    copyBtn.textContent = 'Copy Prompt';
                    copyBtn.addEventListener('click', () => copyToClipboard(promptText));
                    
                    const favoriteBtn = document.createElement('button');
                    favoriteBtn.classList.add('favorite-btn');
                    favoriteBtn.innerHTML = '★';
                    favoriteBtn.addEventListener('click', (e) => toggleFavorite(e.target, promptCounter));
                    
                    cardActions.appendChild(copyBtn);
                    cardActions.appendChild(favoriteBtn);
                    
                    promptCard.appendChild(promptNumber);
                    promptCard.appendChild(promptContent);
                    promptCard.appendChild(cardActions);
                    
                    promptGrid.appendChild(promptCard);
                    promptCounter++;
                });
                
                categorySection.appendChild(promptGrid);
                container.appendChild(categorySection);
            });
        }
        
        // Function to copy prompt to clipboard
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showNotification('Copied to clipboard!');
            }).catch(err => {
                console.error('Could not copy text: ', err);
            });
        }
        
        // Show notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.opacity = '1';
            
            setTimeout(() => {
                notification.style.opacity = '0';
            }, 2000);
        }
        
        // Toggle favorite status
        function toggleFavorite(btn, promptId) {
            btn.classList.toggle('active');
            
            let favorites = JSON.parse(localStorage.getItem('favoritePrompts')) || [];
            
            if (btn.classList.contains('active')) {
                if (!favorites.includes(promptId)) {
                    favorites.push(promptId);
                }
            } else {
                favorites = favorites.filter(id => id !== promptId);
            }
            
            localStorage.setItem('favoritePrompts', JSON.stringify(favorites));
        }
        
        // Load favorites from localStorage
        function loadFavorites() {
            const favorites = JSON.parse(localStorage.getItem('favoritePrompts')) || [];
            
            favorites.forEach(promptId => {
                const promptCard = document.querySelector(`.prompt-card[data-number="${promptId}"]`);
                if (promptCard) {
                    const favoriteBtn = promptCard.querySelector('.favorite-btn');
                    favoriteBtn.classList.add('active');
                }
            });
        }
        
        // Filter prompts by category
        document.querySelector('.category-filter').addEventListener('change', function() {
            const selectedCategory = this.value;
            const categorySections = document.querySelectorAll('.category-section');
            
            categorySections.forEach(section => {
                if (selectedCategory === 'all' || section.dataset.category === selectedCategory) {
                    section.classList.remove('hidden');
                } else {
                    section.classList.add('hidden');
                }
            });
        });
        
        // Search functionality
        document.querySelector('.search-box').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const promptCards = document.querySelectorAll('.prompt-card');
            
            promptCards.forEach(card => {
                const promptText = card.querySelector('.prompt-text').textContent.toLowerCase();
                
                if (promptText.includes(searchTerm)) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
            
            // Show/hide category titles based on whether they have visible prompts
            document.querySelectorAll('.category-section').forEach(section => {
                const visiblePrompts = Array.from(section.querySelectorAll('.prompt-card')).filter(card => 
                    card.style.display !== 'none'
                );
                
                if (visiblePrompts.length === 0) {
                    section.querySelector('.category-title').style.display = 'none';
                } else {
                    section.querySelector('.category-title').style.display = '';
                }
            });
        });
        
        // Theme switching
        document.querySelector('.theme-selector').addEventListener('change', function() {
            document.documentElement.setAttribute('data-theme', this.value);
            localStorage.setItem('preferredTheme', this.value);
        });
        
        // Show favorites only
        document.querySelector('.show-favorites').addEventListener('click', function() {
            const showingFavorites = this.classList.toggle('active');
            
            if (showingFavorites) {
                this.textContent = 'Show All Prompts';
                const favorites = JSON.parse(localStorage.getItem('favoritePrompts')) || [];
                
                document.querySelectorAll('.prompt-card').forEach(card => {
                    if (favorites.includes(parseInt(card.dataset.number))) {
                        card.style.display = '';
                    } else {
                        card.style.display = 'none';
                    }
                });
                
                // Show/hide category titles based on whether they have visible prompts
                document.querySelectorAll('.category-section').forEach(section => {
                    const visiblePrompts = Array.from(section.querySelectorAll('.prompt-card')).filter(card => 
                        card.style.display !== 'none'
                    );
                    
                    if (visiblePrompts.length === 0) {
                        section.querySelector('.category-title').style.display = 'none';
                    } else {
                        section.querySelector('.category-title').style.display = '';
                    }
                });
            } else {
                this.textContent = 'Show Favorites';
                document.querySelectorAll('.prompt-card').forEach(card => {
                    card.style.display = '';
                });
                document.querySelectorAll('.category-title').forEach(title => {
                    title.style.display = '';
                });
            }
        });
        
        // Load saved theme preference
        function loadThemePreference() {
            const savedTheme = localStorage.getItem('preferredTheme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.querySelector('.theme-selector').value = savedTheme;
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            initializePrompts();
            loadThemePreference();
            loadFavorites();
        });
    </script>
