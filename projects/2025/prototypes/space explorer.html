<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #000022, #000033, #000044);
            font-family: Arial, sans-serif;
            color: white;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        #info h1 {
            font-size: 18px;
            margin: 0 0 10px;
            color: #00ffcc;
        }

        #info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>Space Explorer</h1>
        <p>Click on a planet to learn more.</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 2, 1000);
        pointLight.position.set(0, 0, 0);
        scene.add(pointLight);

        // Sun
        const sunGeometry = new THREE.SphereGeometry(8, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({
            color: 0xffcc00,
            emissive: 0xffdd00
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // Planets
        const planets = [];
        const planetData = [
            { name: "Mercury", distance: 15, size: 1, color: 0xa9a9a9 },
            { name: "Venus", distance: 25, size: 2, color: 0xffc04d },
            { name: "Earth", distance: 35, size: 2.2, color: 0x2e86ab },
            { name: "Mars", distance: 45, size: 1.5, color: 0xff4d4d },
            { name: "Jupiter", distance: 60, size: 5, color: 0xd9a066 },
            { name: "Saturn", distance: 80, size: 4.5, color: 0xffd27f },
            { name: "Uranus", distance: 100, size: 3, color: 0x8ab6d6 },
            { name: "Neptune", distance: 115, size: 3, color: 0x4d4dff },
        ];

        planetData.forEach((planet, index) => {
            const geometry = new THREE.SphereGeometry(planet.size, 32, 32);
            const material = new THREE.MeshPhongMaterial({ color: planet.color });
            const planetMesh = new THREE.Mesh(geometry, material);
            planetMesh.position.set(planet.distance, 0, 0);
            planetMesh.userData = { name: planet.name };
            planets.push({ mesh: planetMesh, distance: planet.distance });
            scene.add(planetMesh);

            // Rings for Saturn
            if (planet.name === "Saturn") {
                const ringGeometry = new THREE.RingGeometry(planet.size + 1, planet.size + 2, 64);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffddaa,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.5
                });
                const rings = new THREE.Mesh(ringGeometry, ringMaterial);
                rings.rotation.x = Math.PI / 3;
                rings.position.set(planet.distance, 0, 0);
                scene.add(rings);
            }
        });

        // Orbit controls (planets will rotate dynamically)
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // Rotate planets around the Sun
            planets.forEach((planet, index) => {
                const angle = time + index * 0.5;
                planet.mesh.position.set(
                    Math.cos(angle) * planet.distance,
                    0,
                    Math.sin(angle) * planet.distance
                );
            });

            renderer.render(scene, camera);
        }

        // Camera controls
        camera.position.z = 150;
        camera.position.y = 50;
        camera.lookAt(0, 0, 0);

        // Interactivity
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));

            if (intersects.length > 0) {
                const planet = intersects[0].object;
                alert(`You clicked on ${planet.userData.name}`);
            }
        });

        // Adjust renderer on window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
