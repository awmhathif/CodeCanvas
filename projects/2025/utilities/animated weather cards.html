<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Weather Cards</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
        }

        .weather-card {
            position: relative;
            width: 250px;
            height: 350px;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .weather-card:hover {
            transform: translateY(-10px);
        }

        .card-content {
            position: relative;
            padding: 20px;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 2;
        }

        .card-title {
            color: white;
            font-size: 24px;
            margin: 0;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .temperature {
            color: white;
            font-size: 48px;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .details {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-align: center;
        }

        /* Wind animation elements */
        .wind-card {
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            z-index: 1;
        }

        .wind-line {
            position: absolute;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            z-index: 1;
        }

        /* Rain animation elements */
        .rain-card {
            background: linear-gradient(to bottom, #0f3460, #162447);
        }

        .raindrop {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.4));
            width: 2px;
            border-radius: 50%;
            z-index: 1;
        }

        /* Sun animation elements */
        .sun-card {
            background: linear-gradient(to bottom, #4a3f35, #2c3036);
        }

        .sun {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 40px #ff9500;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        .ray {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255, 215, 0, 0.8), rgba(255, 215, 0, 0));
            z-index: 1;
        }

        /* Snow animation elements */
        .snow-card {
            background: linear-gradient(to bottom, #243B55, #141E30);
        }

        .snowflake {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            z-index: 1;
        }

        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 0 0 15px 15px;
            z-index: 1;
        }

        .controls {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            background-color: #444;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 0 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #555;
        }

        button.active {
            background-color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="weather-card wind-card" id="wind-card">
            <div class="card-content">
                <h2 class="card-title">Wind</h2>
                <div class="temperature">18°C</div>
                <div class="details">
                    <p>Wind Speed: 25 km/h</p>
                    <p>Humidity: 65%</p>
                </div>
            </div>
        </div>
        
        <div class="weather-card rain-card" id="rain-card">
            <div class="card-content">
                <h2 class="card-title">Rain</h2>
                <div class="temperature">14°C</div>
                <div class="details">
                    <p>Precipitation: 8mm</p>
                    <p>Humidity: 90%</p>
                </div>
            </div>
        </div>
        
        <div class="weather-card sun-card" id="sun-card">
            <div class="card-content">
                <h2 class="card-title">Sunny</h2>
                <div class="temperature">28°C</div>
                <div class="details">
                    <p>UV Index: High</p>
                    <p>Humidity: 40%</p>
                </div>
            </div>
            <div class="sun"></div>
        </div>
        
        <div class="weather-card snow-card" id="snow-card">
            <div class="card-content">
                <h2 class="card-title">Snow</h2>
                <div class="temperature">-3°C</div>
                <div class="details">
                    <p>Snowfall: 5cm</p>
                    <p>Humidity: 80%</p>
                </div>
            </div>
            <div class="ground"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize all weather animations
            initWindAnimation();
            initRainAnimation();
            initSunAnimation();
            initSnowAnimation();
        });

        function initWindAnimation() {
            const windCard = document.getElementById('wind-card');
            
            // Create clouds
            for (let i = 0; i < 5; i++) {
                createCloud(windCard, i);
            }
            
            // Create wind lines
            for (let i = 0; i < 15; i++) {
                createWindLine(windCard, i);
            }
        }

        function createCloud(card, index) {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            
            const size = 20 + Math.random() * 30;
            const top = 50 + Math.random() * 150;
            let left = -50 + (index * 30);
            
            cloud.style.width = size + 'px';
            cloud.style.height = size / 2 + 'px';
            cloud.style.top = top + 'px';
            cloud.style.left = left + 'px';
            
            card.appendChild(cloud);
            
            animateCloud(cloud);
        }

        function animateCloud(cloud) {
            const speed = 0.5 + Math.random() * 1;
            let position = parseFloat(cloud.style.left);
            
            function move() {
                position += speed;
                
                if (position > 300) {
                    position = -50;
                }
                
                cloud.style.left = position + 'px';
                requestAnimationFrame(move);
            }
            
            move();
        }

        function createWindLine(card, index) {
            const windLine = document.createElement('div');
            windLine.className = 'wind-line';
            
            const width = 20 + Math.random() * 40;
            const top = 30 + Math.random() * 250;
            let left = -100 + (index * 20);
            
            windLine.style.width = width + 'px';
            windLine.style.top = top + 'px';
            windLine.style.left = left + 'px';
            
            card.appendChild(windLine);
            
            animateWindLine(windLine);
        }

        function animateWindLine(windLine) {
            const speed = 2 + Math.random() * 3;
            let position = parseFloat(windLine.style.left);
            
            function move() {
                position += speed;
                
                if (position > 300) {
                    position = -50;
                }
                
                windLine.style.left = position + 'px';
                requestAnimationFrame(move);
            }
            
            move();
        }

        function initRainAnimation() {
            const rainCard = document.getElementById('rain-card');
            
            // Create raindrops
            for (let i = 0; i < 50; i++) {
                createRaindrop(rainCard);
            }
        }

        function createRaindrop(card) {
            const raindrop = document.createElement('div');
            raindrop.className = 'raindrop';
            
            const height = 10 + Math.random() * 15;
            const left = Math.random() * 250;
            let top = -20 - Math.random() * 100;
            
            raindrop.style.height = height + 'px';
            raindrop.style.left = left + 'px';
            raindrop.style.top = top + 'px';
            
            card.appendChild(raindrop);
            
            animateRaindrop(raindrop);
        }

        function animateRaindrop(raindrop) {
            const speed = 3 + Math.random() * 7;
            let position = parseFloat(raindrop.style.top);
            
            function fall() {
                position += speed;
                
                if (position > 350) {
                    position = -20 - Math.random() * 50;
                    raindrop.style.left = (Math.random() * 250) + 'px';
                }
                
                raindrop.style.top = position + 'px';
                requestAnimationFrame(fall);
            }
            
            fall();
        }

        function initSunAnimation() {
            const sunCard = document.getElementById('sun-card');
            const sun = sunCard.querySelector('.sun');
            
            // Create sun rays
            for (let i = 0; i < 8; i++) {
                createSunRay(sunCard, i);
            }
            
            // Animate sun glow
            animateSunGlow(sun);
        }

        function createSunRay(card, index) {
            const ray = document.createElement('div');
            ray.className = 'ray';
            
            const angle = (index * 45) * (Math.PI / 180);
            const length = 70 + Math.random() * 30;
            const width = 4 + Math.random() * 3;
            
            const centerX = 125;
            const centerY = 100;
            const startDistance = 50;
            
            const startX = centerX + Math.cos(angle) * startDistance;
            const startY = centerY + Math.sin(angle) * startDistance;
            
            ray.style.width = width + 'px';
            ray.style.height = length + 'px';
            ray.style.left = startX + 'px';
            ray.style.top = startY + 'px';
            ray.style.transform = `rotate(${angle + Math.PI/2}rad)`;
            
            card.appendChild(ray);
            
            animateSunRay(ray);
        }

        function animateSunRay(ray) {
            let opacity = 0.3 + Math.random() * 0.4;
            let increasing = Math.random() > 0.5;
            
            function pulse() {
                if (increasing) {
                    opacity += 0.01;
                    if (opacity >= 0.7) increasing = false;
                } else {
                    opacity -= 0.01;
                    if (opacity <= 0.3) increasing = true;
                }
                
                ray.style.opacity = opacity;
                requestAnimationFrame(pulse);
            }
            
            pulse();
        }

        function animateSunGlow(sun) {
            let size = 80;
            let growing = true;
            
            function pulse() {
                if (growing) {
                    size += 0.1;
                    if (size >= 85) growing = false;
                } else {
                    size -= 0.1;
                    if (size <= 80) growing = true;
                }
                
                sun.style.width = size + 'px';
                sun.style.height = size + 'px';
                sun.style.boxShadow = `0 0 ${size/2}px #ff9500`;
                
                requestAnimationFrame(pulse);
            }
            
            pulse();
        }

        function initSnowAnimation() {
            const snowCard = document.getElementById('snow-card');
            
            // Create snowflakes
            for (let i = 0; i < 40; i++) {
                createSnowflake(snowCard);
            }
        }

        function createSnowflake(card) {
            const snowflake = document.createElement('div');
            snowflake.className = 'snowflake';
            
            const size = 2 + Math.random() * 4;
            const left = Math.random() * 250;
            let top = -20 - Math.random() * 100;
            
            snowflake.style.width = size + 'px';
            snowflake.style.height = size + 'px';
            snowflake.style.left = left + 'px';
            snowflake.style.top = top + 'px';
            
            card.appendChild(snowflake);
            
            animateSnowflake(snowflake);
        }

        function animateSnowflake(snowflake) {
            const speed = 0.5 + Math.random() * 1.5;
            let positionY = parseFloat(snowflake.style.top);
            let positionX = parseFloat(snowflake.style.left);
            let wobble = 0;
            const wobbleSpeed = 0.02 + Math.random() * 0.05;
            const wobbleAmount = 0.5 + Math.random() * 1.5;
            
            function fall() {
                positionY += speed;
                wobble += wobbleSpeed;
                positionX += Math.sin(wobble) * wobbleAmount;
                
                if (positionY > 310) {
                    positionY = -20 - Math.random() * 50;
                    positionX = Math.random() * 250;
                }
                
                snowflake.style.top = positionY + 'px';
                snowflake.style.left = positionX + 'px';
                requestAnimationFrame(fall);
            }
            
            fall();
        }
    </script>
</body>
</html>
