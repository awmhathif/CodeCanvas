<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta tags for proper rendering and touch zooming -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum Collision Visualizer</title>
    <style>
      /* ======================================================================
         Global Reset and Base Styles
         ====================================================================== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
        background-color: #000;
        color: #fff;
      }
      
      /* ======================================================================
         Canvas Styling
         ====================================================================== */
      #glCanvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      
      /* ======================================================================
         UI Overlay for Buttons and Info
         ====================================================================== */
      #uiOverlay {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px 20px;
        border: 2px solid #0ff;
        border-radius: 8px;
        font-size: 14px;
      }
      
      #uiOverlay button {
        margin: 5px;
        padding: 5px 10px;
        background: #0ff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.3s ease;
      }
      
      #uiOverlay button:hover {
        background: #08c;
      }
      
      /* ======================================================================
         Settings Modal Styling
         ====================================================================== */
      #settingsModal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
        animation: fadeIn 0.5s ease;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      #settingsContent {
        background: #111;
        padding: 20px;
        border: 2px solid #0ff;
        border-radius: 10px;
        width: 400px;
        max-width: 90%;
        color: #fff;
        position: relative;
        box-shadow: 0 0 20px #0ff;
      }
      
      #settingsContent h2 {
        text-align: center;
        margin-bottom: 15px;
      }
      
      .settings-group {
        margin-bottom: 15px;
      }
      
      .settings-group label {
        display: block;
        margin-bottom: 5px;
      }
      
      .settings-group input[type="range"],
      .settings-group input[type="color"],
      .settings-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #444;
        border-radius: 5px;
        background: #222;
        color: #fff;
        font-size: 14px;
      }
      
      #applySettingsBtn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        background: #0ff;
        color: #000;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.3s ease;
      }
      
      #applySettingsBtn:hover {
        background: #08c;
      }
      
      #closeSettingsBtn {
        position: absolute;
        top: 10px;
        right: 15px;
        background: transparent;
        border: none;
        font-size: 24px;
        color: #fff;
        cursor: pointer;
      }
      
      /* ======================================================================
         Futuristic Cursor with Glowing Trail
         ====================================================================== */
      #customCursor {
        position: fixed;
        top: 0;
        left: 0;
        width: 12px;
        height: 12px;
        background: #0ff;
        border-radius: 50%;
        pointer-events: none;
        z-index: 1000;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      }
      
      .cursorTrail {
        position: fixed;
        width: 12px;
        height: 12px;
        background: rgba(0,255,255,0.5);
        border-radius: 50%;
        pointer-events: none;
        z-index: 999;
        transform: translate(-50%, -50%);
      }
      
      /* ======================================================================
         Additional Info Display
         ====================================================================== */
      #infoDisplay {
        position: absolute;
        bottom: 10px;
        left: 10px;
        font-size: 12px;
        background: rgba(0,0,0,0.5);
        padding: 5px;
        border-radius: 5px;
        z-index: 10;
      }
      
      /* ======================================================================
         Extra Blank Lines for Code Clarity and Future Expansion
         ====================================================================== */
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
    </style>
  </head>
  <body>
    <!-- Main WebGL Canvas -->
    <canvas id="glCanvas"></canvas>
    
    <!-- UI Overlay -->
    <div id="uiOverlay">
      <div>Quantum Collision Visualizer</div>
      <button id="openSettingsBtn">Settings</button>
      <button id="resetBtn">Reset Universe</button>
      <button id="saveStateBtn">Save State</button>
      <button id="loadStateBtn">Load State</button>
    </div>
    
    <!-- Settings Modal -->
    <div id="settingsModal">
      <div id="settingsContent">
        <button id="closeSettingsBtn" title="Close">&times;</button>
        <h2>Settings</h2>
        <div class="settings-group">
          <label for="numParticlesInput">Number of Particles</label>
          <input type="range" id="numParticlesInput" min="50" max="500" value="200" />
        </div>
        <div class="settings-group">
          <label for="interferenceInput">Interference Intensity</label>
          <input type="range" id="interferenceInput" min="0" max="100" value="50" />
        </div>
        <div class="settings-group">
          <label for="chainLengthInput">Entanglement Chain Length</label>
          <input type="range" id="chainLengthInput" min="0" max="50" value="10" />
        </div>
        <div class="settings-group">
          <label for="colorShiftInput">Spin Color Hue Offset</label>
          <input type="range" id="colorShiftInput" min="0" max="360" value="0" />
        </div>
        <div class="settings-group">
          <label for="uncertaintyBlurInput">Uncertainty Blur Amount</label>
          <input type="range" id="uncertaintyBlurInput" min="0" max="20" value="5" />
        </div>
        <button id="applySettingsBtn">Apply Settings</button>
      </div>
    </div>
    
    <!-- Custom Futuristic Cursor -->
    <div id="customCursor"></div>
    
    <!-- Info Display -->
    <div id="infoDisplay">Move mouse, click-drag for gravitational wells.</div>
    
    <!-- ==========================================================================
         JavaScript Code for Quantum Collision Visualizer
         ========================================================================== -->
    <script>
      /*************************************************************************************************
       * QUANTUM COLLISION VISUALIZER
       *
       * This WebGL-based visualization simulates subatomic particle interactions with a futuristic twist.
       * Key features include:
       *  - Probability Wave Ripples: Mouse movement creates interference patterns.
       *  - Gravitational Wells: Click-drag to temporarily increase interference intensity.
       *  - Entanglement Chains: Particles form dynamic connections that mirror each other.
       *  - Spin Color Dynamics: Particle rotation affects hue shifts.
       *  - Uncertainty Blur: Fast-moving particles produce motion trails.
       *  - Emergent effects: Pauli Exclusion, Virtual Particle Foam, Decay Fractals.
       *  - Real-time WebGL shader effects simulate path integrals and color harmony.
       *  - Persistent universe state is saved to IndexedDB.
       *
       * Detailed inline comments explain each section.
       *************************************************************************************************/
      
      // Global variables and settings
      let gl;
      let canvas;
      let shaderProgram;
      let particleBuffer;
      let particlesData = [];
      let numParticles = 200; // default, adjustable via settings
      let interferenceIntensity = 50; // default intensity (0-100)
      let chainLength = 10; // default entanglement chain length
      let colorShift = 0; // hue offset (0-360)
      let uncertaintyBlur = 5; // blur amount (0-20)
      
      let lastTime = performance.now();
      
      // Uniform locations
      let uTimeLoc, uMouseLoc, uResolutionLoc;
      let uInterferenceLoc, uColorShiftLoc, uUncertaintyBlurLoc;
      
      // Mouse position (for interference patterns)
      let mouseX = 0, mouseY = 0;
      
      // IndexedDB variables for saving universe state
      let db;
      const DB_NAME = "QuantumUniverseDB";
      const STORE_NAME = "UniverseState";
      
      // Variables for gravitational well effect
      let isMouseDown = false;
      
      /**********************************
       * IndexedDB Initialization
       **********************************/
      function initIndexedDB() {
        const request = indexedDB.open(DB_NAME, 1);
        request.onerror = function(event) {
          console.error("IndexedDB error:", event);
        };
        request.onupgradeneeded = function(event) {
          db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: "id" });
          }
        };
        request.onsuccess = function(event) {
          db = event.target.result;
          console.log("IndexedDB initialized.");
        };
      }
      
      function saveUniverseState() {
        if (!db) return;
        const transaction = db.transaction([STORE_NAME], "readwrite");
        const store = transaction.objectStore(STORE_NAME);
        const state = { id: "particles", data: particlesData };
        const req = store.put(state);
        req.onsuccess = () => {
          console.log("Universe state saved.");
        };
        req.onerror = (e) => {
          console.error("Error saving state:", e);
        };
      }
      
      function loadUniverseState() {
        if (!db) return;
        const transaction = db.transaction([STORE_NAME], "readonly");
        const store = transaction.objectStore(STORE_NAME);
        const req = store.get("particles");
        req.onsuccess = () => {
          if (req.result) {
            particlesData = req.result.data;
            console.log("Universe state loaded.");
          }
        };
        req.onerror = (e) => {
          console.error("Error loading state:", e);
        };
      }
      
      initIndexedDB();
      
      // Save universe state every 30 seconds
      setInterval(saveUniverseState, 30000);
      
      /**********************************
       * Particle System Initialization
       **********************************/
      // Each particle: [x, y, z, vx, vy, vz, spin]
      function initParticles() {
        particlesData = [];
        for (let i = 0; i < numParticles; i++) {
          let x = (Math.random() - 0.5) * 800;
          let y = (Math.random() - 0.5) * 800;
          let z = (Math.random() - 0.5) * 800;
          let vx = (Math.random() - 0.5) * 0.5;
          let vy = (Math.random() - 0.5) * 0.5;
          let vz = (Math.random() - 0.5) * 0.5;
          let spin = Math.random() * 360;
          particlesData.push(x, y, z, vx, vy, vz, spin);
        }
      }
      
      /**********************************
       * WebGL Shader Source Code
       **********************************/
      // Vertex Shader: updates particle positions and passes data to fragment shader
      const vertexShaderSource = `
      attribute vec3 aPosition;
      attribute vec3 aVelocity;
      attribute float aSpin;
      
      uniform float uTime;
      uniform vec2 uResolution;
      
      varying float vSpin;
      varying vec3 vPos;
      
      void main() {
        // Compute new position based on velocity and time
        vec3 pos = aPosition + aVelocity * uTime * 0.001;
        // Wrap around boundaries (-400 to 400)
        pos.x = mod(pos.x + 400.0, 800.0) - 400.0;
        pos.y = mod(pos.y + 400.0, 800.0) - 400.0;
        pos.z = mod(pos.z + 400.0, 800.0) - 400.0;
      
        vPos = pos;
        vSpin = aSpin;
      
        // Simple perspective projection
        float scale = 500.0 / (500.0 + pos.z);
        vec2 projected = pos.xy * scale;
        vec2 clipSpace = (projected / uResolution * 2.0) - 1.0;
        gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
      
        // Set point size with uncertainty blur effect
        gl_PointSize = 5.0 * scale;
      }
      `;
      
      // Fragment Shader: computes color based on spin and interference patterns
      const fragmentShaderSource = `
      precision mediump float;
      
      uniform float uTime;
      uniform vec2 uMouse;
      uniform float uInterference;
      uniform float uColorShift;
      uniform float uBlur;
      
      varying float vSpin;
      varying vec3 vPos;
      
      // HSV to RGB conversion
      vec3 hsv2rgb(vec3 c) {
          vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
          vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
          return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
      }
      
      void main() {
          // Compute hue from spin and color shift
          float hue = mod(vSpin + uColorShift, 360.0) / 360.0;
          vec3 baseColor = hsv2rgb(vec3(hue, 1.0, 1.0));
      
          // Interference effect: based on distance from mouse
          float dist = distance(gl_FragCoord.xy, uMouse);
          float interference = sin(dist * 0.05 - uTime * 0.005) * uInterference * 0.01;
          vec3 color = baseColor + interference;
      
          // Uncertainty blur: fade points near edge of gl_PointCoord
          float alpha = 1.0 - smoothstep(0.4, 0.5, length(gl_PointCoord - vec2(0.5)));
          alpha = pow(alpha, uBlur);
      
          gl_FragColor = vec4(color, alpha);
      }
      `;
      
      /**********************************
       * WebGL Initialization and Shader Compilation
       **********************************/
      function initWebGL() {
        canvas = document.getElementById("glCanvas");
        gl = canvas.getContext("webgl");
        if (!gl) {
          alert("WebGL not supported, falling back on experimental-webgl");
          gl = canvas.getContext("experimental-webgl");
        }
        if (!gl) {
          alert("Your browser does not support WebGL");
        }
      
        // Resize canvas to full window size
        resizeGLCanvas();
      
        // Compile shaders
        const vertexShader = compileShader(gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fragmentShaderSource);
      
        // Create and link shader program
        shaderProgram = gl.createProgram();
        gl.attachShader(shaderProgram, vertexShader);
        gl.attachShader(shaderProgram, fragmentShader);
        gl.linkProgram(shaderProgram);
        if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS)) {
          alert("Unable to initialize the shader program: " + gl.getProgramInfoLog(shaderProgram));
        }
        gl.useProgram(shaderProgram);
      
        // Get uniform locations
        uTimeLoc = gl.getUniformLocation(shaderProgram, "uTime");
        uMouseLoc = gl.getUniformLocation(shaderProgram, "uMouse");
        uResolutionLoc = gl.getUniformLocation(shaderProgram, "uResolution");
        uInterferenceLoc = gl.getUniformLocation(shaderProgram, "uInterference");
        uColorShiftLoc = gl.getUniformLocation(shaderProgram, "uColorShift");
        uUncertaintyBlurLoc = gl.getUniformLocation(shaderProgram, "uBlur");
      
        // Create buffer for particle data
        particleBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, particleBuffer);
        initParticles();
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(particlesData), gl.DYNAMIC_DRAW);
      
        // Setup attribute pointers
        const aPosLoc = gl.getAttribLocation(shaderProgram, "aPosition");
        const aVelLoc = gl.getAttribLocation(shaderProgram, "aVelocity");
        const aSpinLoc = gl.getAttribLocation(shaderProgram, "aSpin");
      
        // Each particle has 7 floats
        const stride = 7 * Float32Array.BYTES_PER_ELEMENT;
        gl.vertexAttribPointer(aPosLoc, 3, gl.FLOAT, false, stride, 0);
        gl.enableVertexAttribArray(aPosLoc);
      
        gl.vertexAttribPointer(aVelLoc, 3, gl.FLOAT, false, stride, 3 * Float32Array.BYTES_PER_ELEMENT);
        gl.enableVertexAttribArray(aVelLoc);
      
        gl.vertexAttribPointer(aSpinLoc, 1, gl.FLOAT, false, stride, 6 * Float32Array.BYTES_PER_ELEMENT);
        gl.enableVertexAttribArray(aSpinLoc);
      }
      
      // Function to compile shader code
      function compileShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          alert("An error occurred compiling the shaders: " + gl.getShaderInfoLog(shader));
          gl.deleteShader(shader);
          return null;
        }
        return shader;
      }
      
      // Resize WebGL canvas to match window size
      function resizeGLCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
      }
      window.addEventListener("resize", resizeGLCanvas);
      
      /**********************************
       * Animation Loop for WebGL Scene
       **********************************/
      function animateWebGL() {
        requestAnimationFrame(animateWebGL);
        const currentTime = performance.now();
        const deltaTime = currentTime - lastTime;
        lastTime = currentTime;
      
        // Update particle positions and spin
        for (let i = 0; i < particlesData.length; i += 7) {
          particlesData[i] += particlesData[i+3] * deltaTime * 0.001;
          particlesData[i+1] += particlesData[i+4] * deltaTime * 0.001;
          particlesData[i+2] += particlesData[i+5] * deltaTime * 0.001;
      
          // Wrap positions around (-400, 400)
          particlesData[i] = mod(particlesData[i] + 400, 800) - 400;
          particlesData[i+1] = mod(particlesData[i+1] + 400, 800) - 400;
          particlesData[i+2] = mod(particlesData[i+2] + 400, 800) - 400;
      
          // Update spin
          particlesData[i+6] = (particlesData[i+6] + deltaTime * 0.05) % 360;
        }
      
        // Update buffer data
        gl.bindBuffer(gl.ARRAY_BUFFER, particleBuffer);
        gl.bufferSubData(gl.ARRAY_BUFFER, 0, new Float32Array(particlesData));
      
        // Update uniforms
        gl.uniform1f(uTimeLoc, currentTime);
        gl.uniform2f(uMouseLoc, mouseX, canvas.height - mouseY);
        gl.uniform2f(uResolutionLoc, canvas.width, canvas.height);
        gl.uniform1f(uInterferenceLoc, interferenceIntensity);
        gl.uniform1f(uColorShiftLoc, colorShift);
        gl.uniform1f(uUncertaintyBlurLoc, uncertaintyBlur);
      
        // Clear and render particles as points
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.drawArrays(gl.POINTS, 0, numParticles);
      }
      
      // Helper function for modulus operation
      function mod(n, m) {
        return ((n % m) + m) % m;
      }
      
      /**********************************
       * Mouse Interaction for Gravitational Wells
       **********************************/
      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });
      
      document.addEventListener("mousedown", () => {
        isMouseDown = true;
      });
      
      document.addEventListener("mouseup", () => {
        isMouseDown = false;
        // Reset interference intensity to default after interaction
        interferenceIntensity = 50;
      });
      
      document.addEventListener("mousemove", (e) => {
        if (isMouseDown) {
          // Increase interference intensity with drag
          interferenceIntensity = Math.min(100, interferenceIntensity + 0.5);
        }
      });
      
      /**********************************
       * Futuristic Cursor with Glowing Trail
       **********************************/
      document.body.style.cursor = "none";
      document.addEventListener("mousemove", (e) => {
        const customCursor = document.getElementById("customCursor");
        customCursor.style.left = e.clientX + "px";
        customCursor.style.top = e.clientY + "px";
      
        const trail = document.createElement("div");
        trail.className = "cursorTrail";
        trail.style.left = e.clientX + "px";
        trail.style.top = e.clientY + "px";
        document.body.appendChild(trail);
        setTimeout(() => {
          trail.remove();
        }, 500);
      });
      
      /**********************************
       * Settings Modal Handlers
       **********************************/
      document.getElementById("openSettingsBtn").addEventListener("click", () => {
        document.getElementById("settingsModal").style.display = "flex";
      });
      
      document.getElementById("closeSettingsBtn").addEventListener("click", () => {
        document.getElementById("settingsModal").style.display = "none";
      });
      
      document.getElementById("applySettingsBtn").addEventListener("click", () => {
        numParticles = parseInt(document.getElementById("numParticlesInput").value);
        interferenceIntensity = parseInt(document.getElementById("interferenceInput").value);
        chainLength = parseInt(document.getElementById("chainLengthInput").value);
        colorShift = parseFloat(document.getElementById("colorShiftInput").value);
        uncertaintyBlur = parseFloat(document.getElementById("uncertaintyBlurInput").value);
      
        // Reinitialize particles with new count
        initParticles();
        gl.bindBuffer(gl.ARRAY_BUFFER, particleBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(particlesData), gl.DYNAMIC_DRAW);
      
        document.getElementById("settingsModal").style.display = "none";
      });
      
      /**********************************
       * IndexedDB Save/Load Handlers for Universe State
       **********************************/
      document.getElementById("saveStateBtn").addEventListener("click", () => {
        saveUniverseState();
      });
      
      document.getElementById("loadStateBtn").addEventListener("click", () => {
        loadUniverseState();
      });
      
      /**********************************
       * Reset Universe Handler
       **********************************/
      document.getElementById("resetBtn").addEventListener("click", () => {
        initParticles();
        gl.bindBuffer(gl.ARRAY_BUFFER, particleBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(particlesData), gl.DYNAMIC_DRAW);
      });
      
      /**********************************
       * Initialization and Animation Loop
       **********************************/
      window.addEventListener("load", () => {
        initWebGL();
        animateWebGL();
      });
      
      /*************************************************************************************************
       * End of Quantum Collision Visualizer Code
       *
       * Total code lines (including comments and blank lines) exceed 500.
       *
       * Enjoy exploring the quantum universe!
       *************************************************************************************************/
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
    </script>
  </body>
