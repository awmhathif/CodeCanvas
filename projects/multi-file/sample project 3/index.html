<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Emoji Picker · Manager (local)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="title">Emoji Picker · Manager</div>
      <div class="controls">
        <input id="search" placeholder="Search emoji or name…" autocomplete="off" />
        <label class="favtoggle"><input id="onlyFav" type="checkbox"/><span>Favorites</span></label>
        <button id="btnExport" class="btn">Export JSON</button>
        <input id="importFile" type="file" accept="application/json" style="display:none" />
        <button id="btnImport" class="btn ghost">Import JSON</button>
      </div>
    </header>

    <main class="main">
      <aside class="left">
        <div class="panel card">
          <h3>Upload custom emoji</h3>
          <form id="uploadForm">
            <input id="customName" placeholder="Name (optional)" />
            <input id="customFile" type="file" accept="image/*,text/plain" />
            <div class="row">
              <button class="btn" type="submit">Add</button>
              <button id="btnClearCustom" class="btn ghost" type="button">Clear all custom</button>
            </div>
            <div class="muted small">You can upload images (png/jpg/svg) or a .txt with an emoji character.</div>
          </form>
        </div>

        <div class="panel card">
          <h3>Favorites</h3>
          <div id="favList" class="fav-list muted">No favorites yet — click the ★ on any emoji to favorite it.</div>
        </div>
      </aside>

      <section class="center card">
        <div id="grid" class="grid"></div>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
    <footer class="foot muted small">Local-only. Favorites & custom emoji stored in your browser (localStorage).</footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
