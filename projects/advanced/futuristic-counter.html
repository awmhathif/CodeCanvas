<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Glowing Counter</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: #fff;
        }
        
        .counter-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .counter {
            font-size: 6rem;
            font-weight: bold;
            color: #3498db;
            text-shadow: 0 0 10px #3498db, 0 0 20px #3498db, 0 0 30px #3498db;
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .counter-ring {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid #3498db;
            animation: spin 2s linear infinite;
            box-shadow: 0 0 15px #3498db;
        }
        
        .counter-ring:nth-child(2) {
            width: 220px;
            height: 220px;
            border-top: 4px solid #2ecc71;
            border-right: 4px solid transparent;
            animation: spin 3s linear infinite;
            box-shadow: 0 0 15px #2ecc71;
        }
        
        .counter-ring:nth-child(3) {
            width: 240px;
            height: 240px;
            border-top: 4px solid #e74c3c;
            border-left: 4px solid transparent;
            animation: spin 4s linear infinite reverse;
            box-shadow: 0 0 15px #e74c3c;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #3498db;
            border-radius: 50%;
            box-shadow: 0 0 10px #3498db, 0 0 20px #3498db;
            opacity: 0;
        }
        
        .counter-info {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #ddd;
            text-align: center;
        }
        
        .counter-buttons {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }
        
        .btn:hover {
            background: rgba(52, 152, 219, 0.4);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.8);
        }
        
        .btn-reset {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }
        
        .btn-reset:hover {
            background: rgba(231, 76, 60, 0.4);
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.8);
        }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="counter-container">
        <div class="counter-ring"></div>
        <div class="counter-ring"></div>
        <div class="counter-ring"></div>
        <div class="particles"></div>
        <div class="counter" id="counter">0</div>
        <div class="counter-info" id="counter-info">Tap or press Space to count</div>
        <div class="counter-buttons">
            <button class="btn" id="increment">Tap</button>
            <button class="btn btn-reset" id="reset">Reset</button>
        </div>
    </div>
    
    <div class="instructions">
        Press spacebar or tap the button to increase counter
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const counterElement = document.getElementById('counter');
            const counterInfo = document.getElementById('counter-info');
            const incrementButton = document.getElementById('increment');
            const resetButton = document.getElementById('reset');
            const particlesContainer = document.querySelector('.particles');
            
            let count = 0;
            let lastIncrement = Date.now();
            let speed = 0;
            let speedHistory = [];
            
            // Create particles
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particlesContainer.appendChild(particle);
            }
            
            const particles = document.querySelectorAll('.particle');
            
            // Function to increment counter
            function incrementCounter() {
                // Calculate speed
                const now = Date.now();
                const timeDiff = now - lastIncrement;
                lastIncrement = now;
                
                if (count > 0 && timeDiff > 0) {
                    speed = Math.round(1000 / timeDiff);
                    speedHistory.push(speed);
                    if (speedHistory.length > 5) speedHistory.shift();
                    
                    const avgSpeed = speedHistory.reduce((a, b) => a + b, 0) / speedHistory.length;
                    counterInfo.textContent = `Speed: ${avgSpeed.toFixed(1)} clicks/sec`;
                }
                
                count++;
                counterElement.textContent = count;
                
                // Play animation
                counterElement.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    counterElement.style.transform = 'scale(1)';
                }, 100);
                
                // Change colors based on count
                const hue = (count * 10) % 360;
                counterElement.style.color = `hsl(${hue}, 80%, 60%)`;
                counterElement.style.textShadow = `0 0 10px hsl(${hue}, 80%, 60%), 0 0 20px hsl(${hue}, 80%, 60%)`;
                
                // Animate particles
                particles.forEach((particle, index) => {
                    // Only animate some particles each time
                    if (index % 5 === count % 5) {
                        const angle = Math.random() * Math.PI * 2;
                        const distance = 50 + Math.random() * 100;
                        const duration = 500 + Math.random() * 500;
                        
                        particle.style.opacity = '1';
                        particle.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(${Math.random() + 0.5})`;
                        particle.style.transition = `transform ${duration}ms ease-out, opacity ${duration}ms ease-out`;
                        particle.style.backgroundColor = `hsl(${hue}, 80%, 60%)`;
                        particle.style.boxShadow = `0 0 10px hsl(${hue}, 80%, 60%), 0 0 20px hsl(${hue}, 80%, 60%)`;
                        
                        setTimeout(() => {
                            particle.style.opacity = '0';
                        }, duration - 100);
                    }
                });
            }
            
            // Reset counter
            function resetCounter() {
                count = 0;
                speedHistory = [];
                counterElement.textContent = count;
                counterInfo.textContent = 'Tap or press Space to count';
                counterElement.style.color = '#3498db';
                counterElement.style.textShadow = '0 0 10px #3498db, 0 0 20px #3498db, 0 0 30px #3498db';
            }
            
            // Event listeners
            incrementButton.addEventListener('click', incrementCounter);
            resetButton.addEventListener('click', resetCounter);
            
            document.addEventListener('keydown', (event) => {
                if (event.code === 'Space') {
                    event.preventDefault(); // Prevent scrolling with space
                    incrementCounter();
                }
            });
            
            // Touch support for mobile
            document.addEventListener('touchstart', (event) => {
                if (event.target === document.body) {
                    event.preventDefault();
                    incrementCounter();
                }
            });
        });
    </script>
</body>
</html>
