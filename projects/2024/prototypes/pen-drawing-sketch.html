<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen Drawing Sketch</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text {
            font-size: 4rem;
            letter-spacing: 5px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid white;
            width: 0;
            animation: typing 4s steps(6, end), blink 0.5s step-end infinite;
        }

        @keyframes typing {
            from {
                width: 0;
            }
            to {
                width: 10ch;
            }
        }

        @keyframes blink {
            from, to {
                border-color: transparent;
            }
            50% {
                border-color: white;
            }
        }

        .pen {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 15px;
            height: 15px;
            background-color: white;
            border-radius: 50%;
            animation: movePen 4s steps(6, end);
        }

        @keyframes movePen {
            0% {
                transform: translate(-50%, -50%) translateX(0);
            }
            100% {
                transform: translate(-50%, -50%) translateX(370px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="pen"></div>
        <div class="text">SKETCH</div>
    </div>
</body>
</html>
