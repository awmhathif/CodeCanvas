<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDAW - Music Production Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-darkest: #0a0a0f;
            --bg-darker: #12121a;
            --bg-dark: #1a1a25;
            --bg-medium: #252532;
            --bg-light: #32324a;
            --border-color: #3a3a50;
            --text-primary: #e8e8f0;
            --text-secondary: #9090a8;
            --accent-primary: #7c5cff;
            --accent-secondary: #5c9cff;
            --accent-green: #5cff8c;
            --accent-red: #ff5c6c;
            --accent-yellow: #ffcc5c;
            --accent-orange: #ff8c5c;
            --track-1: #ff5c8c;
            --track-2: #5cccff;
            --track-3: #ffcc5c;
            --track-4: #5cff8c;
            --track-5: #cc5cff;
            --track-6: #ff8c5c;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-darkest);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* Layout */
        .daw-container {
            display: grid;
            grid-template-rows: 50px 60px 1fr 200px;
            height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo svg {
            width: 24px;
            height: 24px;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .project-name {
            background: var(--bg-medium);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            color: var(--text-primary);
            width: 200px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Transport */
        .transport {
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 20px;
        }

        .transport-controls {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .transport-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 6px;
            background: var(--bg-medium);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .transport-btn:hover {
            background: var(--bg-light);
        }

        .transport-btn.active {
            background: var(--accent-primary);
        }

        .transport-btn.record {
            color: var(--accent-red);
        }

        .transport-btn.record.active {
            background: var(--accent-red);
            color: white;
        }

        .transport-btn svg {
            width: 18px;
            height: 18px;
        }

        .time-display {
            background: var(--bg-darkest);
            padding: 8px 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            min-width: 140px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .tempo-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-medium);
            padding: 8px 12px;
            border-radius: 6px;
        }

        .tempo-control label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .tempo-control input {
            width: 60px;
            background: var(--bg-darkest);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-primary);
            text-align: center;
        }

        .time-sig {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--bg-medium);
            padding: 8px 12px;
            border-radius: 6px;
        }

        .time-sig select {
            background: var(--bg-darkest);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-primary);
        }

        .loop-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loop-btn {
            padding: 8px 15px;
            background: var(--bg-medium);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .loop-btn.active {
            background: var(--accent-secondary);
            border-color: var(--accent-secondary);
            color: white;
        }

        /* Main Area */
        .main-area {
            display: grid;
            grid-template-columns: 200px 1fr 280px;
            overflow: hidden;
        }

        /* Track List */
        .track-list {
            background: var(--bg-darker);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .track-list-header {
            padding: 10px 15px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-track-btn {
            background: var(--accent-primary);
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .track-item {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }

        .track-item:hover {
            background: var(--bg-dark);
        }

        .track-item.selected {
            background: var(--bg-medium);
        }

        .track-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .track-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .track-name {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 500;
            background: transparent;
            border: none;
            color: var(--text-primary);
            width: 100%;
        }

        .track-controls {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .track-btn {
            width: 26px;
            height: 26px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-dark);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .track-btn.active {
            color: white;
        }

        .track-btn.mute.active {
            background: var(--accent-yellow);
            border-color: var(--accent-yellow);
            color: black;
        }

        .track-btn.solo.active {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: black;
        }

        .track-volume {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: var(--bg-light);
            border-radius: 2px;
            margin-top: 5px;
        }

        .track-volume::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Timeline/Sequencer */
        .timeline-area {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .timeline-header {
            height: 30px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .timeline-ruler {
            display: flex;
            height: 100%;
        }

        .timeline-bar {
            min-width: 100px;
            border-right: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding-left: 5px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .sequencer-container {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        .sequencer-grid {
            position: relative;
            min-height: 100%;
        }

        .sequencer-track {
            height: 80px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            display: flex;
        }

        .sequencer-cell {
            width: 25px;
            height: 100%;
            border-right: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .sequencer-cell:nth-child(4n) {
            border-right: 1px solid var(--border-color);
        }

        .sequencer-cell:nth-child(16n) {
            border-right: 2px solid var(--border-color);
        }

        .clip {
            position: absolute;
            height: calc(100% - 10px);
            top: 5px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 50px;
        }

        .clip-header {
            padding: 3px 6px;
            font-size: 0.7rem;
            font-weight: 500;
            background: rgba(0,0,0,0.3);
        }

        .clip-content {
            flex: 1;
            padding: 3px;
            display: flex;
            flex-wrap: wrap;
            gap: 1px;
            opacity: 0.7;
        }

        .clip-note {
            width: 3px;
            height: 8px;
            background: rgba(255,255,255,0.6);
            border-radius: 1px;
        }

        .playhead {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: var(--accent-red);
            z-index: 100;
            pointer-events: none;
        }

        .playhead::before {
            content: '';
            position: absolute;
            top: -30px;
            left: -5px;
            width: 12px;
            height: 12px;
            background: var(--accent-red);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
        }

        /* Instrument Panel */
        .instrument-panel {
            background: var(--bg-darker);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .panel-tabs {
            display: flex;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
        }

        .panel-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .panel-tab.active {
            background: var(--bg-medium);
            color: var(--text-primary);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .panel-section {
            margin-bottom: 20px;
        }

        .panel-section-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .synth-type {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }

        .synth-type-btn {
            padding: 8px;
            background: var(--bg-medium);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .synth-type-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .knob-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .knob {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--bg-light), var(--bg-dark));
            border: 2px solid var(--border-color);
            position: relative;
            cursor: pointer;
        }

        .knob::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 12px;
            background: var(--accent-primary);
            border-radius: 2px;
        }

        .knob-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .knob-value {
            font-size: 0.75rem;
            color: var(--text-primary);
        }

        .slider-container {
            margin-bottom: 15px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .slider-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .slider-value {
            font-size: 0.8rem;
            color: var(--text-primary);
        }

        .slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: var(--bg-light);
            border-radius: 3px;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Effects */
        .effect-item {
            background: var(--bg-medium);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .effect-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .effect-name {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .effect-toggle {
            width: 40px;
            height: 20px;
            background: var(--bg-dark);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            border: none;
        }

        .effect-toggle.active {
            background: var(--accent-green);
        }

        .effect-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .effect-toggle.active::after {
            transform: translateX(20px);
        }

        .effect-controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        /* Piano Roll / Bottom Panel */
        .bottom-panel {
            background: var(--bg-darker);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .bottom-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
        }

        .bottom-panel-tabs {
            display: flex;
            gap: 10px;
        }

        .bottom-tab {
            padding: 5px 15px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .bottom-tab.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .piano-roll-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .piano-keys {
            width: 40px;
            background: var(--bg-dark);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .piano-key {
            height: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 3px;
            font-size: 0.6rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .piano-key.black {
            background: var(--bg-darkest);
        }

        .piano-key.white {
            background: var(--bg-medium);
        }

        .piano-key:hover {
            background: var(--accent-primary);
        }

        .note-grid {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        .note-grid-inner {
            position: relative;
            min-width: 100%;
        }

        .note-row {
            height: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            position: relative;
        }

        .note-row.black {
            background: rgba(0,0,0,0.2);
        }

        .note-cell {
            width: 25px;
            height: 100%;
            border-right: 1px solid rgba(255,255,255,0.03);
        }

        .note-cell:nth-child(4n) {
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .note-block {
            position: absolute;
            height: 13px;
            top: 1px;
            background: var(--accent-primary);
            border-radius: 2px;
            cursor: pointer;
            min-width: 23px;
        }

        /* Mixer */
        .mixer-container {
            flex: 1;
            display: flex;
            padding: 15px;
            gap: 10px;
            overflow-x: auto;
        }

        .mixer-channel {
            width: 70px;
            min-width: 70px;
            background: var(--bg-dark);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .mixer-channel-name {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mixer-fader-container {
            flex: 1;
            width: 30px;
            background: var(--bg-medium);
            border-radius: 4px;
            position: relative;
            min-height: 80px;
        }

        .mixer-fader {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--accent-green), var(--accent-yellow), var(--accent-red));
            border-radius: 4px;
            transition: height 0.1s;
        }

        .mixer-fader-thumb {
            position: absolute;
            width: 100%;
            height: 8px;
            background: white;
            border-radius: 2px;
            cursor: ns-resize;
        }

        .mixer-pan {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: var(--bg-light);
            border-radius: 2px;
        }

        .mixer-pan::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            background: var(--accent-secondary);
            border-radius: 50%;
            cursor: pointer;
        }

        .mixer-meter {
            width: 8px;
            height: 60px;
            background: var(--bg-darkest);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .mixer-meter-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--accent-green), var(--accent-yellow));
            transition: height 0.05s;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover {
            background: #8d6dff;
        }

        .btn-success {
            background: var(--accent-green);
            color: black;
        }

        .btn-secondary {
            background: var(--bg-medium);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border-color);
        }

        .modal h3 {
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons .btn {
            flex: 1;
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 60px;
            right: 20px;
            padding: 12px 20px;
            background: var(--bg-dark);
            border: 1px solid var(--accent-green);
            border-radius: 6px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Preset Browser */
        .preset-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .preset-item {
            padding: 8px 10px;
            background: var(--bg-dark);
            border-radius: 4px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .preset-item:hover {
            background: var(--bg-light);
        }

        .preset-item.active {
            background: var(--accent-primary);
        }

        /* Export Progress */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-medium);
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-primary);
            transition: width 0.3s;
        }

        /* Keyboard */
        .keyboard-container {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: var(--bg-dark);
        }

        .keyboard {
            display: flex;
            position: relative;
        }

        .key {
            cursor: pointer;
            user-select: none;
        }

        .key.white-key {
            width: 35px;
            height: 120px;
            background: linear-gradient(to bottom, #f5f5f5, #e0e0e0);
            border: 1px solid #999;
            border-radius: 0 0 4px 4px;
            z-index: 1;
        }

        .key.black-key {
            width: 24px;
            height: 75px;
            background: linear-gradient(to bottom, #333, #111);
            border-radius: 0 0 3px 3px;
            margin-left: -12px;

    <script>
        // =====================================================
        // AUDIO CONTEXT & CORE
        // =====================================================
        let audioCtx = null;
        let masterGain = null;
        let analyser = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Master chain
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.7;
            
            // Analyser for visualization
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            
            masterGain.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            initVisualizer();
        }

        // =====================================================
        // STATE
        // =====================================================
        const state = {
            isPlaying: false,
            isRecording: false,
            isLooping: false,
            tempo: 120,
            currentBeat: 0,
            selectedTrack: 0,
            selectedTrackType: 'synth',
            currentPanel: 'instrument',
            currentBottomPanel: 'pianoroll',
            loopStart: 0,

            beatsPerBar: 4,

        const TRACK_COLORS = ['#ff5c8c', '#5cccff', '#ffcc5c', '#5cff8c', '#cc5cff', '#ff8c5c'];

        let tracks = [

                            { note: 72, start: 6, duration: 2, velocity: 0.8 },
                            { note: 67, start: 8, duration: 2, velocity: 0.8 },
                            { note: 64, start: 10, duration: 2, velocity: 0.8 },
                            { note: 60, start: 12, duration: 4, velocity: 0.8 },
                        ]
                    }
                ]
            },
            {
                id: 1,
                name: 'Bass',
                type: 'bass',
                color: TRACK_COLORS[1],
                muted: false,
                solo: false,
                volume: 0.7,
                pan: 0,
                instrument: {
                    waveform: 'sine',
                    attack: 0.01,
                    decay: 0.1,
                    sustain: 0.8,
                    release: 0.1,
                    filterFreq: 500,
                    filterRes: 2,
                },
                effects: {
                    reverb: { enabled: false, mix: 0.2, decay: 1 },
                    delay: { enabled: false, time: 0.25, feedback: 0.3, mix: 0.2 },
                    distortion: { enabled: true, amount: 0.3 },
                },
                clips: [
                    {
                        id: 0,
                        startBeat: 0,
                        duration: 16,
                        notes: [
                            { note: 36, start: 0, duration: 2, velocity: 0.9 },
                            { note: 36, start: 4, duration: 2, velocity: 0.9 },
                            { note: 43, start: 8, duration: 2, velocity: 0.9 },
                            { note: 41, start: 12, duration: 2, velocity: 0.9 },
                        ]
                    }
                ]
            },
            {
                id: 2,
                name: 'Drums',
                type: 'drums',
                color: TRACK_COLORS[2],
                muted: false,
                solo: false,
                volume: 0.8,
                pan: 0,
                instrument: {
                    waveform: 'square',
                    attack: 0.001,
                    decay: 0.1,
                    sustain: 0,
                    release: 0.1,
                    filterFreq: 1000,
                    filterRes: 0,
                },
                effects: {
                    reverb: { enabled: true, mix: 0.15, decay: 0.5 },
                    delay: { enabled: false, time: 0.125, feedback: 0.2, mix: 0.1 },
                    distortion: { enabled: false, amount: 0.2 },
                },
                clips: [
                    {
                        id: 0,
                        startBeat: 0,
                        duration: 16,
                        notes: [
                            // Kick
                            { note: 36, start: 0, duration: 0.5, velocity: 1 },
                            { note: 36, start: 4, duration: 0.5, velocity: 1 },
                            { note: 36, start: 8, duration: 0.5, velocity: 1 },
                            { note: 36, start: 12, duration: 0.5, velocity: 1 },
                            // Snare
                            { note: 38, start: 4, duration: 0.5, velocity: 0.9 },
                            { note: 38, start: 12, duration: 0.5, velocity: 0.9 },
                            // Hi-hat
                            { note: 42, start: 0, duration: 0.25, velocity: 0.6 },
                            { note: 42, start: 2, duration: 0.25, velocity: 0.6 },
                            { note: 42, start: 4, duration: 0.25, velocity: 0.6 },
                            { note: 42, start: 6, duration: 0.25, velocity: 0.6 },
                            { note: 42, start: 8, duration: 0.25, velocity: 0.6 },
                            { note: 42, start: 10, duration: 0.25, velocity: 0.6 },
                            { note: 42, start: 12, duration: 0.25, velocity: 0.6 },
                            { note: 42, start: 14, duration: 0.25, velocity: 0.6 },
                        ]
                    }
                ]
            }
        ];

        // =====================================================
        // SYNTHESIZER ENGINE
        // =====================================================
        class Synth {
            constructor(track) {
                this.track = track;
                this.voices = [];
            }

            createVoice(frequency, time, duration, velocity) {
                const inst = this.track.instrument;
                const now = time || audioCtx.currentTime;
                
                // Oscillator
                const osc = audioCtx.createOscillator();
                osc.type = inst.waveform;
                osc.frequency.setValueAtTime(frequency, now);
                
                // Filter
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(inst.filterFreq, now);
                filter.Q.setValueAtTime(inst.filterRes, now);
                
                // Envelope (gain)
                const env = audioCtx.createGain();
                env.gain.setValueAtTime(0, now);
                env.gain.linearRampToValueAtTime(velocity * this.track.volume, now + inst.attack);
                env.gain.linearRampToValueAtTime(velocity * this.track.volume * inst.sustain, now + inst.attack + inst.decay);
                
                const releaseTime = now + duration;
                env.gain.setValueAtTime(velocity * this.track.volume * inst.sustain, releaseTime);
                env.gain.linearRampToValueAtTime(0, releaseTime + inst.release);
                
                // Track gain
                const trackGain = audioCtx.createGain();
                trackGain.gain.value = this.track.muted ? 0 : 1;
                
                // Pan
                const panner = audioCtx.createStereoPanner();
                panner.pan.value = this.track.pan;
                
                // Connect chain
                osc.connect(filter);
                filter.connect(env);
                env.connect(trackGain);
                trackGain.connect(panner);
                
                // Effects chain
                let lastNode = panner;
                lastNode = this.applyEffects(lastNode, now);
                
                lastNode.connect(masterGain);
                
                osc.start(now);
                osc.stop(releaseTime + inst.release + 0.1);
                
                return { osc, env, filter };
            }

            applyEffects(inputNode, time) {
                let currentNode = inputNode;
                const effects = this.track.effects;
                
                // Distortion
                if (effects.distortion && effects.distortion.enabled) {
                    const distortion = audioCtx.createWaveShaper();
                    distortion.curve = this.makeDistortionCurve(effects.distortion.amount * 100);
                    currentNode.connect(distortion);
                    currentNode = distortion;
                }
                
                // Delay
                if (effects.delay && effects.delay.enabled) {
                    const delay = audioCtx.createDelay();
                    const delayGain = audioCtx.createGain();
                    const feedback = audioCtx.createGain();
                    
                    delay.delayTime.value = effects.delay.time;
                    delayGain.gain.value = effects.delay.mix;
                    feedback.gain.value = effects.delay.feedback;
                    
                    currentNode.connect(delay);
                    delay.connect(feedback);
                    feedback.connect(delay);
                    delay.connect(delayGain);
                    
                    const dryWet = audioCtx.createGain();
                    currentNode.connect(dryWet);
                    delayGain.connect(dryWet);
                    currentNode = dryWet;
                }
                
                // Simple reverb (using convolver simulation)
                if (effects.reverb && effects.reverb.enabled) {
                    const reverbGain = audioCtx.createGain();
                    reverbGain.gain.value = effects.reverb.mix;
                    
                    // Create simple reverb using multiple delays
                    for (let i = 0; i < 5; i++) {
                        const delay = audioCtx.createDelay();
                        const gain = audioCtx.createGain();
                        delay.delayTime.value = 0.03 + (i * 0.02 * effects.reverb.decay);
                        gain.gain.value = 0.2 - (i * 0.03);
                        currentNode.connect(delay);
                        delay.connect(gain);
                        gain.connect(reverbGain);
                    }
                    
                    const dryWet = audioCtx.createGain();
                    currentNode.connect(dryWet);
                    reverbGain.connect(dryWet);
                    currentNode = dryWet;
                }
                
                return currentNode;
            }

            makeDistortionCurve(amount) {
                const samples = 44100;
                const curve = new Float32Array(samples);
                const deg = Math.PI / 180;
                
                for (let i = 0; i < samples; i++) {
                    const x = (i * 2) / samples - 1;
                    curve[i] = ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
                }
                return curve;
            }

            playNote(note, time, duration, velocity = 0.8) {
                const frequency = 440 * Math.pow(2, (note - 69) / 12);
                return this.createVoice(frequency, time, duration, velocity);
            }
        }

        // Drum synth
        class DrumSynth {
            constructor(track) {
                this.track = track;
            }

            playDrum(note, time, velocity = 0.8) {
                const now = time || audioCtx.currentTime;
                
                if (note === 36) { // Kick
                    this.playKick(now, velocity);
                } else if (note === 38) { // Snare
                    this.playSnare(now, velocity);
                } else if (note === 42) { // Hi-hat
                    this.playHiHat(now, velocity);
                }
            }

            playKick(time, velocity) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, time);
                osc.frequency.exponentialRampToValueAtTime(40, time + 0.1);
                
                gain.gain.setValueAtTime(velocity * this.track.volume, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
                
                osc.connect(gain);
                gain.connect(masterGain);
                
                osc.start(time);
                osc.stop(time + 0.3);
            }

            playSnare(time, velocity) {
                // Noise
                const bufferSize = audioCtx.sampleRate * 0.2;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(velocity * this.track.volume * 0.5, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
                
                // Body
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, time);
                osc.frequency.exponentialRampToValueAtTime(100, time + 0.05);
                
                const oscGain = audioCtx.createGain();
                oscGain.gain.setValueAtTime(velocity * this.track.volume * 0.5, time);
                oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(masterGain);
                
                osc.connect(oscGain);
                oscGain.connect(masterGain);
                
                noise.start(time);
                osc.start(time);
                noise.stop(time + 0.2);
                osc.stop(time + 0.1);
            }

            playHiHat(time, velocity) {
                const bufferSize = audioCtx.sampleRate * 0.05;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 7000;
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(velocity * this.track.volume * 0.4, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);
                
                noise.start(time);
                noise.stop(time + 0.05);
            }
        }

        // =====================================================
        // SEQUENCER
        // =====================================================
        let playInterval = null;
        let startTime = 0;

        function togglePlay() {
            initAudio();
            
            if (state.isPlaying) {
                stopPlayback();
            } else {
                startPlayback();
            }
        }

        function startPlayback() {
            state.isPlaying = true;
            startTime = audioCtx.currentTime;
            
            document.getElementById('playIcon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
            document.getElementById('playBtn').classList.add('active');
            
            scheduleNotes();
            
            playInterval = setInterval(() => {
                updatePlayhead();
            }, 16);
        }

        function stopPlayback() {
            state.isPlaying = false;
            
            document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
            document.getElementById('playBtn').classList.remove('active');
            
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        function scheduleNotes() {
            const beatsPerSecond = state.tempo / 60;
            const totalBeats = state.totalBars * state.beatsPerBar;
            
            tracks.forEach((track, trackIndex) => {
                const synth = track.type === 'drums' ? new DrumSynth(track) : new Synth(track);
                
                track.clips.forEach(clip => {
                    clip.notes.forEach(note => {
                        const noteBeat = clip.startBeat + note.start;
                        
                        if (noteBeat >= state.currentBeat) {
                            const noteTime = startTime + ((noteBeat - state.currentBeat) / beatsPerSecond);
                            const noteDuration = note.duration / beatsPerSecond;
                            
                            if (track.type === 'drums') {
                                synth.playDrum(note.note, noteTime, note.velocity);
                            } else {
                                synth.playNote(note.note, noteTime, noteDuration, note.velocity);
                            }
                        }
                    });
                });
            });
        }

        function updatePlayhead() {
            if (!state.isPlaying) return;
            
            const elapsed = audioCtx.currentTime - startTime;
            const beatsPerSecond = state.tempo / 60;
            const currentBeat = state.currentBeat + (elapsed * beatsPerSecond);
            
            const totalBeats = state.totalBars * state.beatsPerBar;
            
            if (currentBeat >= totalBeats) {
                if (state.isLooping) {
                    state.currentBeat = state.loopStart;
                    startTime = audioCtx.currentTime;
                    scheduleNotes();
                } else {
                    stopPlayback();
                    state.currentBeat = 0;
                }
            }
            
            // Update playhead position
            const playhead = document.getElementById('playhead');
            const pixelsPerBeat = 25;
            playhead.style.left = `${currentBeat * pixelsPerBeat}px`;
            
            // Update time display
            const totalSeconds = currentBeat / beatsPerSecond;
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = Math.floor(totalSeconds % 60);
            const ms = Math.floor((totalSeconds * 1000) % 1000);
            document.getElementById('timeDisplay').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}:${ms.toString().padStart(3, '0')}`;
        }

        function skipToStart() {
            state.currentBeat = 0;
            document.getElementById('playhead').style.left = '0px';
            document.getElementById('timeDisplay').textContent = '0:00:000';
            
            if (state.isPlaying) {
                stopPlayback();
                startPlayback();
            }
        }

        function toggleRecord() {
            state.isRecording = !state.isRecording;
            document.getElementById('recordBtn').classList.toggle('active');
        }

        function toggleLoop() {
            state.isLooping = !state.isLooping;
            document.getElementById('loopBtn').classList.toggle('active');
        }

        function setTempo(value) {
            state.tempo = parseInt(value) || 120;
        }

        // =====================================================
        // UI RENDERING
        // =====================================================

        function renderPianoRoll() {
            const track = tracks[state.selectedTrack];
            const clip = track.clips[0];
            const keysContainer = document.getElementById('pianoKeys');
            const gridContainer = document.getElementById('noteGrid');
            
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const totalBeats = state.totalBars * state.beatsPerBar;
            
            // Render piano keys (2 octaves)
            let keysHtml = '';
            for (let octave = 5; octave >= 3; octave--) {
                for (let n = 11; n >= 0; n--) {
                    const noteName = notes[n];
                    const isBlack = noteName.includes('#');
                    const midiNote = (octave + 1) * 12 + n;
                    keysHtml += `<div class="piano-key ${isBlack ? 'black' : 'white'}" 
                        data-note="${midiNote}" onclick="playPreviewNote(${midiNote})">${n === 0 ? noteName + octave : ''}</div>`;
                }
            }
            keysContainer.innerHTML = keysHtml;
            
            // Render note grid
            let gridHtml = '<div class="note-grid-inner">';
            for (let octave = 5; octave >= 3; octave--) {
                for (let n = 11; n >= 0; n--) {
                    const noteName = notes[n];
                    const isBlack = noteName.includes('#');
                    const midiNote = (octave + 1) * 12 + n;
                    
                    gridHtml += `<div class="note-row ${isBlack ? 'black' : ''}" data-note="${midiNote}">`;
                    for (let beat = 0; beat < totalBeats; beat++) {
                        gridHtml += `<div class="note-cell" data-beat="${beat}" onclick="toggleNote(${midiNote}, ${beat})"></div>`;
                    }
                    gridHtml += '</div>';
                }
            }
            
            // Render existing notes
            if (clip) {
                clip.notes.forEach(note => {
                    const rowTop = (71 - (note.note - 48)) * 15;
                    gridHtml += `<div class="note-block" style="left: ${note.start * 25 + 1}px; top: ${rowTop + 1}px; width: ${note.duration * 25 - 2}px; background: ${track.color}"></div>`;
                });
            }
            
            gridHtml += '</div>';
            gridContainer.innerHTML = gridHtml;
        }

        function renderKeyboard() {
            const container = document.getElementById('keyboard');
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            let html = '';
            
            for (let octave = 3; octave <= 5; octave++) {
                for (let n = 0; n < 12; n++) {
                    const noteName = notes[n];
                    const isBlack = noteName.includes('#');
                    const midiNote = (octave + 1) * 12 + n;
                    
                    if (!isBlack) {
                        html += `<div class="key white-key" data-note="${midiNote}" 
                            onmousedown="playKeyboardNote(${midiNote})" onmouseup="stopKeyboardNote(${midiNote})"
                            onmouseleave="stopKeyboardNote(${midiNote})"></div>`;
                    }
                }
            }
            
            // Add black keys
            container.innerHTML = html;
            
            // Insert black keys
            const whiteKeys = container.querySelectorAll('.white-key');
            let blackKeyPositions = [1, 2, 4, 5, 6]; // Positions after white keys
            let keyIndex = 0;
            
            for (let octave = 3; octave <= 5; octave++) {
                blackKeyPositions.forEach(pos => {
                    const position = keyIndex + pos;
                    if (position < whiteKeys.length) {
                        const blackNote = notes[[1, 3, 6, 8, 10][blackKeyPositions.indexOf(pos)]];
                        const midiNote = (octave + 1) * 12 + [1, 3, 6, 8, 10][blackKeyPositions.indexOf(pos)];
                        
                        const blackKey = document.createElement('div');
                        blackKey.className = 'key black-key';
                        blackKey.dataset.note = midiNote;
                        blackKey.onmousedown = () => playKeyboardNote(midiNote);
                        blackKey.onmouseup = () => stopKeyboardNote(midiNote);
                        blackKey.onmouseleave = () => stopKeyboardNote(midiNote);
                        
                        whiteKeys[position].insertAdjacentElement('afterend', blackKey);
                    }
                });
                keyIndex += 7;
            }
        }

        function initVisualizer() {
            const container = document.getElementById('visualizer');
            container.innerHTML = '';
            
            for (let i = 0; i < 32; i++) {
                const bar = document.createElement('div');
                bar.className = 'viz-bar';
                bar.style.height = '5px';
                container.appendChild(bar);
            }
            
            updateVisualizer();
        }

        function updateVisualizer() {
            if (!analyser) {
                requestAnimationFrame(updateVisualizer);
                return;
            }
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            const bars = document.querySelectorAll('.viz-bar');
            const step = Math.floor(bufferLength / bars.length);
            
            bars.forEach((bar, i) => {
                const value = dataArray[i * step];
                const height = Math.max(5, (value / 255) * 50);
                bar.style.height = `${height}px`;
            });
            
            requestAnimationFrame(updateVisualizer);
        }

        function loadPreset(preset) {
            const presets = {
                init: { waveform: 'sine', attack: 0.01, decay: 0.1, sustain: 1, release: 0.1, filterFreq: 20000, filterRes: 0 },
                lead: { waveform: 'sawtooth', attack: 0.01, decay: 0.2, sustain: 0.5, release: 0.3, filterFreq: 3000, filterRes: 2 },
                pad: { waveform: 'sine', attack: 0.5, decay: 0.5, sustain: 0.8, release: 1, filterFreq: 1500, filterRes: 1 },
                bass: { waveform: 'sine', attack: 0.01, decay: 0.1, sustain: 0.8, release: 0.1, filterFreq: 400, filterRes: 3 },
                pluck: { waveform: 'triangle', attack: 0.001, decay: 0.3, sustain: 0, release: 0.2, filterFreq: 5000, filterRes: 1 },
            };
            
            if (presets[preset]) {
                tracks[state.selectedTrack].instrument = { ...tracks[state.selectedTrack].instrument, ...presets[preset] };
                renderInstrumentPanel();
                showNotification(`Loaded preset: ${preset}`);
            }
        }

        // =====================================================
        // NOTE FUNCTIONS
        // =====================================================
        function toggleNote(midiNote, beat) {
            initAudio();
            const track = tracks[state.selectedTrack];
            
            if (!track.clips.length) {
                track.clips.push({
                    id: 0,
                    startBeat: 0,
                    duration: state.totalBars * state.beatsPerBar,
                    notes: []
                });
            }
            
            const clip = track.clips[0];
            const existingNoteIndex = clip.notes.findIndex(n => n.note === midiNote && n.start === beat);
            
            if (existingNoteIndex >= 0) {
                clip.notes.splice(existingNoteIndex, 1);
            } else {
                clip.notes.push({ note: midiNote, start: beat, duration: 1, velocity: 0.8 });
                playPreviewNote(midiNote);
            }
            
            renderPianoRoll();
            renderSequencer();
        }

        let activeNotes = {};

        function playPreviewNote(midiNote) {
            initAudio();
            const track = tracks[state.selectedTrack];
            
            if (track.type === 'drums') {
                const synth = new DrumSynth(track);
                synth.playDrum(midiNote, audioCtx.currentTime, 0.8);
            } else {
                const synth = new Synth(track);
                synth.playNote(midiNote, audioCtx.currentTime, 0.3, 0.8);
            }
        }

        function playKeyboardNote(midiNote) {
            initAudio();
            const track = tracks[state.selectedTrack];
            
            if (activeNotes[midiNote]) return;
            
            const key = document.querySelector(`[data-note="${midiNote}"]`);
            if (key) key.classList.add('active');
            
            if (track.type === 'drums') {
                const synth = new DrumSynth(track);
                synth.playDrum(midiNote, audioCtx.currentTime, 0.8);
            } else {
                const synth = new Synth(track);
                activeNotes[midiNote] = synth.playNote(midiNote, audioCtx.currentTime, 2, 0.8);
            }
        }

        function stopKeyboardNote(midiNote) {
            const key = document.querySelector(`[data-note="${midiNote}"]`);
            if (key) key.classList.remove('active');
            delete activeNotes[midiNote];
        }

        // Keyboard input
        const keyMap = {
            'a': 60, 'w': 61, 's': 62, 'e': 63, 'd': 64, 'f': 65, 't': 66,
            'g': 67, 'y': 68, 'h': 69, 'u': 70, 'j': 71, 'k': 72
        };

        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const note = keyMap[e.key.toLowerCase()];
            if (note) playKeyboardNote(note);
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        document.addEventListener('keyup', (e) => {
            const note = keyMap[e.key.toLowerCase()];
            if (note) stopKeyboardNote(note);
        });

        function showBottomPanel(panel) {
            state.currentBottomPanel = panel;
            document.querySelectorAll('.bottom-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderBottomPanel();
        }

        // =====================================================
        // EXPORT TO WAV
        // =====================================================
        function showExportModal() {
            document.getElementById('exportModal').classList.add('active');
            document.getElementById('exportProgress').style.display = 'none';
            document.getElementById('exportButtons').style.display = 'flex';
        }

        function updateExportDuration() {
            document.getElementById('exportDuration').textContent = document.getElementById('exportBars').value;
        }

        async function exportWAV() {
            initAudio();
            
            const bars = parseInt(document.getElementById('exportBars').value);
            const beatsPerSecond = state.tempo / 60;
            const duration = (bars * state.beatsPerBar) / beatsPerSecond;
            const sampleRate = 44100;
            const numSamples = Math.ceil(duration * sampleRate);
            
            document.getElementById('exportProgress').style.display = 'block';
            document.getElementById('exportButtons').style.display = 'none';
            
            // Create offline context
            const offlineCtx = new OfflineAudioContext(2, numSamples, sampleRate);
            const offlineMaster = offlineCtx.createGain();
            offlineMaster.gain.value = 0.7;
            offlineMaster.connect(offlineCtx.destination);
            
            // Schedule all notes
            tracks.forEach(track => {
                if (track.muted) return;
                
                track.clips.forEach(clip => {
                    clip.notes.forEach(note => {
                        const noteBeat = clip.startBeat + note.start;
                        const noteTime = noteBeat / beatsPerSecond;
                        const noteDuration = note.duration / beatsPerSecond;
                        
                        if (noteTime < duration) {
                            if (track.type === 'drums') {
                                renderDrumToOffline(offlineCtx, offlineMaster, track, note.note, noteTime, note.velocity);
                            } else {
                                renderNoteToOffline(offlineCtx, offlineMaster, track, note.note, noteTime, noteDuration, note.velocity);
                            }
                        }
                    });
                });
            });
            
            // Update progress
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += 5;
                if (progress > 90) progress = 90;
                document.getElementById('exportProgressFill').style.width = `${progress}%`;
            }, 100);
            
            // Render
            const renderedBuffer = await offlineCtx.startRendering();
            
            clearInterval(progressInterval);
            document.getElementById('exportProgressFill').style.width = '100%';
            
            // Convert to WAV
            const wavBlob = bufferToWave(renderedBuffer);
            
            // Download
            const url = URL.createObjectURL(wavBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.getElementById('projectName').value || 'export'}.wav`;
            a.click();
            URL.revokeObjectURL(url);
            
            setTimeout(() => {
                closeModal('exportModal');
            }, 500);
            
            showNotification('WAV exported successfully!');
        }

        function renderNoteToOffline(ctx, master, track, midiNote, time, duration, velocity) {
            const inst = track.instrument;
            const frequency = 440 * Math.pow(2, (midiNote - 69) / 12);
            
            const osc = ctx.createOscillator();
            osc.type = inst.waveform;
            osc.frequency.setValueAtTime(frequency, time);
            
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(inst.filterFreq, time);
            filter.Q.setValueAtTime(inst.filterRes, time);
            
            const env = ctx.createGain();
            env.gain.setValueAtTime(0, time);
            env.gain.linearRampToValueAtTime(velocity * track.volume, time + inst.attack);
            env.gain.linearRampToValueAtTime(velocity * track.volume * inst.sustain, time + inst.attack + inst.decay);
            
            const releaseTime = time + duration;
            env.gain.setValueAtTime(velocity * track.volume * inst.sustain, releaseTime);
            env.gain.linearRampToValueAtTime(0, releaseTime + inst.release);
            
            osc.connect(filter);
            filter.connect(env);
            env.connect(master);
            
            osc.start(time);
            osc.stop(releaseTime + inst.release + 0.1);
        }

        function renderDrumToOffline(ctx, master, track, note, time, velocity) {
            if (note === 36) { // Kick
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, time);
                osc.frequency.exponentialRampToValueAtTime(40, time + 0.1);
                gain.gain.setValueAtTime(velocity * track.volume, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
                osc.connect(gain);
                gain.connect(master);
                osc.start(time);
                osc.stop(time + 0.3);
            } else if (note === 38) { // Snare
                const bufferSize = ctx.sampleRate * 0.2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(velocity * track.volume * 0.5, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
                noise.connect(noiseGain);
                noiseGain.connect(master);
                noise.start(time);
                noise.stop(time + 0.2);
            } else if (note === 42) { // Hi-hat
                const bufferSize = ctx.sampleRate * 0.05;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 7000;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(velocity * track.volume * 0.4, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(master);
                noise.start(time);
                noise.stop(time + 0.05);
            }
        }

        function bufferToWave(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            
            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;
            
            const dataLength = buffer.length * blockAlign;
            const bufferLength = 44 + dataLength;
            
            const arrayBuffer = new ArrayBuffer(bufferLength);
            const view = new DataView(arrayBuffer);
            
            // RIFF header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(view, 8, 'WAVE');
            
            // fmt chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            
            // data chunk
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);
            
            // Write audio data
            const channels = [];
            for (let i = 0; i < numChannels; i++) {
                channels.push(buffer.getChannelData(i));
            }
            
            let offset = 44;
            for (let i = 0; i < buffer.length; i++) {
                for (let ch = 0; ch < numChannels; ch++) {
                    const sample = Math.max(-1, Math.min(1, channels[ch][i]));
                    const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(offset, intSample, true);
                    offset += 2;
                }
            }
            
            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        // =====================================================
        // UTILITY FUNCTIONS
        // =====================================================
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showNotification(message) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => notification.remove(), 3000);
        }

        function saveProject() {
            const projectData = {
                name: document.getElementById('projectName').value,
                tempo: state.tempo,
                tracks: tracks
            };
            
            const blob = new Blob([JSON.stringify(projectData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${projectData.name || 'project'}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showNotification('Project saved!');
        }

        function handleCellClick(trackIndex, beat) {
            // Select track and position
            selectTrack(trackIndex);
        }

        function renderAll() {
            renderTrackList();
            renderTimeline();
            renderSequencer();
            renderInstrumentPanel();
            renderBottomPanel();
        }

        // =====================================================
        // INITIALIZATION
        // =====================================================
        function init() {
            renderAll();
            
            // Click anywhere to init audio
            document.addEventListener('click', () => initAudio(), { once: true });
        }

        init();
    </script>
