<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>UltraNotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,500;1,400&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;}
body{font-family:'Outfit',system-ui,sans-serif;transition:background .3s,color .3s;}

/* THEMES */
:root{
  --bg0:#F2F4F7;--bg1:#FFFFFF;--bg2:#F8FAFC;--bg3:#EEF1F6;
  --border:#DDE3EC;--border2:#C8D0DC;
  --tx0:#0D1117;--tx1:#3B4558;--tx2:#6E7A90;--tx3:#9BA8BE;
  --acc:#5B5FEF;--acc2:#4346D4;--acc-glow:rgba(91,95,239,.18);
  --card-shadow:0 2px 8px rgba(0,0,0,.1);
  --sb-w:272px;
}
body.dark{
  --bg0:#0E1015;--bg1:#161B24;--bg2:#1C2333;--bg3:#222A3A;
  --border:#2A3347;--border2:#3A4560;
  --tx0:#EAF0FF;--tx1:#C0CCDF;--tx2:#7A8BA8;--tx3:#4A5A72;
  --acc:#7B7EF8;--acc2:#6366F1;--acc-glow:rgba(123,126,248,.2);
  --card-shadow:0 2px 12px rgba(0,0,0,.5);
}
body.obsidian{
  --bg0:#000000;--bg1:#0A0A0A;--bg2:#111111;--bg3:#1A1A1A;
  --border:#242424;--border2:#343434;
  --tx0:#F0F0F0;--tx1:#B0B0B0;--tx2:#686868;--tx3:#404040;
  --acc:#DEDEDE;--acc2:#C0C0C0;--acc-glow:rgba(220,220,220,.1);
  --card-shadow:0 2px 12px rgba(0,0,0,.9);
}
body.midnight{
  --bg0:#020818;--bg1:#060D24;--bg2:#0B152E;--bg3:#101D3A;
  --border:#1A2848;--border2:#243660;
  --tx0:#D4E8FF;--tx1:#94B8E8;--tx2:#4E6A90;--tx3:#2A3E60;
  --acc:#4FA3FF;--acc2:#2D8AEF;--acc-glow:rgba(79,163,255,.2);
  --card-shadow:0 2px 12px rgba(0,0,30,.7);
}
body.forest{
  --bg0:#060E08;--bg1:#0C1A10;--bg2:#102016;--bg3:#162B1C;
  --border:#1E3828;--border2:#2A4D38;
  --tx0:#C8EDD6;--tx1:#7FB894;--tx2:#3A6B50;--tx3:#224035;
  --acc:#4ACD7A;--acc2:#2FAF5E;--acc-glow:rgba(74,205,122,.18);
  --card-shadow:0 2px 12px rgba(0,20,5,.6);
}
body.ember{
  --bg0:#0C0602;--bg1:#180E04;--bg2:#211508;--bg3:#2A1B0C;
  --border:#3A2510;--border2:#4F3318;
  --tx0:#FFE8CC;--tx1:#D4A870;--tx2:#7A5530;--tx3:#4A3018;
  --acc:#FF8C3A;--acc2:#E0702A;--acc-glow:rgba(255,140,58,.2);
  --card-shadow:0 2px 12px rgba(30,10,0,.6);
}
body.paper{
  --bg0:#F0EBE0;--bg1:#FAF6EE;--bg2:#F5F0E4;--bg3:#EDE7D9;
  --border:#D8CFB8;--border2:#C5BAA0;
  --tx0:#2A2015;--tx1:#5C4A2A;--tx2:#907855;--tx3:#B8A07A;
  --acc:#7A5C2E;--acc2:#5C4020;--acc-glow:rgba(122,92,46,.15);
  --card-shadow:0 1px 6px rgba(80,50,10,.12);
}

/* LAYOUT */
#app{display:flex;height:100vh;background:var(--bg0);color:var(--tx0);overflow:hidden;}

/* SIDEBAR */
#sidebar{
  width:var(--sb-w);min-width:var(--sb-w);background:var(--bg1);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  transition:width .28s cubic-bezier(.4,0,.2,1),min-width .28s cubic-bezier(.4,0,.2,1);
  overflow:hidden;flex-shrink:0;
}
#sidebar.hidden{width:0;min-width:0;}

.sb-top{padding:15px 13px 10px;flex-shrink:0;display:flex;flex-direction:column;gap:9px;}
.logo-row{display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:15px;font-weight:800;color:var(--acc);letter-spacing:-.4px;display:flex;align-items:center;gap:7px;}
.logo-btns{display:flex;gap:3px;}

.ib{background:transparent;border:none;color:var(--tx2);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;font-family:inherit;flex-shrink:0;}
.ib:hover{background:var(--bg3);color:var(--tx0);}
.ib.acc{background:var(--acc);color:#fff;font-size:20px;font-weight:700;width:30px;height:30px;border-radius:8px;}
.ib.acc:hover{background:var(--acc2);}

.search-wrap{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:7px 11px;transition:border-color .2s;}
.search-wrap:focus-within{border-color:var(--acc);}
.si{color:var(--tx3);font-size:12px;flex-shrink:0;}
.search-wrap input{background:none;border:none;outline:none;color:var(--tx0);font-size:12.5px;width:100%;font-family:inherit;}
.search-wrap input::placeholder{color:var(--tx3);}
.clr-btn{color:var(--tx3);background:none;border:none;cursor:pointer;font-size:11px;display:none;padding:0 2px;font-family:inherit;}
.clr-btn:hover{color:var(--tx1);}

.nav-pills{display:flex;gap:2px;background:var(--bg3);padding:3px;border-radius:10px;}
.np{flex:1;border:none;background:transparent;color:var(--tx2);border-radius:7px;padding:5px 0;cursor:pointer;font-size:11.5px;font-family:inherit;font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:2px;}
.np:hover{color:var(--tx0);}
.np.on{background:var(--bg1);color:var(--tx0);box-shadow:0 1px 3px rgba(0,0,0,.15);}

.sb-sel{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;font-size:11.5px;color:var(--tx1);font-family:inherit;outline:none;cursor:pointer;}
.sb-sel:focus{border-color:var(--acc);}

.cstrip{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.cf-all{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .15s;}
.cf-all.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.cdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;}
.cdot.on{width:22px;height:22px;outline:2.5px solid;outline-offset:2px;}

.tstrip{display:flex;gap:4px;flex-wrap:wrap;padding:0 13px 6px;flex-shrink:0;}
.tpf{font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;background:var(--bg3);color:var(--tx2);cursor:pointer;border:1px solid var(--border);transition:all .15s;font-family:inherit;}
.tpf.on{background:var(--acc);color:#fff;border-color:var(--acc);}

.ncount{font-size:10px;color:var(--tx3);padding:0 13px 3px;flex-shrink:0;font-weight:500;}
.sbdiv{height:1px;background:var(--border);flex-shrink:0;}

/* NOTE CARDS — full color */
#note-list{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:5px;}
.nc{border-radius:12px;cursor:pointer;padding:11px 13px;transition:transform .15s,box-shadow .2s;position:relative;border:2px solid transparent;}
.nc:hover{transform:translateY(-1px);}
.nc.sel{border-color:rgba(255,255,255,.5)!important;box-shadow:0 6px 24px rgba(0,0,0,.3)!important;}
.nc-title{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.nc-preview{font-size:11px;opacity:.68;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;line-height:1.4;}
.nc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:7px;}
.nc-time{font-size:9.5px;opacity:.55;font-weight:500;}
.nc-badges{display:flex;gap:3px;align-items:center;}
.nc-tag{font-size:8.5px;padding:1px 6px;border-radius:10px;background:rgba(0,0,0,.14);font-weight:600;}
.nc-ico{font-size:9px;opacity:.75;}
.empty-list{text-align:center;padding:32px 14px;color:var(--tx3);font-size:12px;font-weight:500;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

/* SIDEBAR FOOTER */
.sb-footer{padding:10px 13px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:7px;}
.th-label{font-size:9.5px;color:var(--tx3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.th-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.tb{padding:5px 2px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--tx2);cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.tb:hover{border-color:var(--border2);color:var(--tx0);}
.tb.on{border-color:var(--acc);background:var(--acc-glow);color:var(--acc);}
.save-row{display:flex;align-items:center;gap:5px;}
.sdot{width:6px;height:6px;border-radius:50%;transition:background .3s;}
.sdot.saved{background:#22C55E;}
.sdot.saving{background:#F59E0B;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.slabel{font-size:10px;color:var(--tx3);font-weight:500;}

/* EDITOR PANE */
#epane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;transition:background .3s;}

#etb{padding:10px 17px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0;min-height:52px;}
.etb-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.etb-btn{background:transparent;color:var(--tx2);border:1px solid var(--border);border-radius:7px;padding:4px 10px;cursor:pointer;font-size:11.5px;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;font-weight:500;}
.etb-btn:hover{background:var(--bg3);color:var(--tx0);}
.etb-btn.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.etb-btn.del:hover{background:#FEE2E2;color:#B91C1C;border-color:#FCA5A5;}
body.dark .etb-btn.del:hover,body.obsidian .etb-btn.del:hover,body.midnight .etb-btn.del:hover,body.forest .etb-btn.del:hover,body.ember .etb-btn.del:hover{background:#380808;color:#F87171;border-color:#7F1D1D;}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:4px 8px;font-size:11.5px;color:var(--tx1);font-family:inherit;outline:none;width:100px;}
.fsz-g{display:flex;align-items:center;gap:3px;}
.fsz-g span{font-size:11px;color:var(--tx2);min-width:24px;text-align:center;font-weight:600;}
.fsz-b{background:var(--bg3);border:1px solid var(--border);border-radius:6px;width:26px;height:26px;cursor:pointer;color:var(--tx2);font-size:11px;font-weight:700;font-family:inherit;transition:all .15s;}
.fsz-b:hover{background:var(--bg2);color:var(--tx0);}
.sp{flex:1;}
.nnh{color:var(--tx3);font-size:13px;font-weight:500;}

/* EDITOR HEADER */
#eh{padding:18px 26px 8px;flex-shrink:0;display:none;}
#note-title{background:transparent;border:none;outline:none;font-size:24px;font-weight:800;width:100%;font-family:'Outfit',system-ui,sans-serif;transition:color .3s;line-height:1.2;}
#note-title::placeholder{opacity:.28;}
.tge{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:8px;}
.meta-txt{font-size:11px;opacity:.5;font-weight:500;}
.t-pill{font-size:10px;font-weight:600;padding:2px 9px;border-radius:12px;display:inline-flex;align-items:center;gap:4px;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s;}
.t-pill:hover{opacity:.7;}
.add-tag{font-size:10px;padding:2px 9px;border-radius:12px;background:transparent;border:1px dashed var(--border2);color:var(--tx3);cursor:pointer;font-family:inherit;transition:all .15s;}
.add-tag:hover{color:var(--tx1);border-color:var(--tx2);}
.tag-inp-i{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;outline:none;color:var(--tx0);width:90px;padding:2px 8px;font-family:inherit;}
.tag-inp-i:focus{border-color:var(--acc);}

/* EDITOR BODY */
#ebody{flex:1;padding:4px 26px 12px;overflow-y:auto;display:none;flex-direction:column;gap:10px;}
#note-content{flex:1;background:transparent;border:none;outline:none;resize:none;line-height:1.8;font-family:'Outfit',system-ui,sans-serif;min-height:180px;transition:color .3s;}
#note-content::placeholder{opacity:.28;}

/* CHECKLIST */
#cl-area{display:flex;flex-direction:column;gap:5px;}
.ci{display:flex;align-items:center;gap:8px;padding:2px 0;}
.ci input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;border-radius:4px;}
.ci-txt{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);outline:none;color:var(--tx0);font-family:inherit;padding:2px 5px;}
.ci-txt::placeholder{opacity:.3;color:var(--tx3);}
.ci.done .ci-txt{text-decoration:line-through;opacity:.42;}
.ci-rm{background:transparent;border:none;cursor:pointer;color:var(--tx3);font-size:13px;padding:2px 5px;border-radius:5px;font-family:inherit;opacity:0;transition:opacity .15s,background .15s;}
.ci:hover .ci-rm{opacity:1;}
.ci-rm:hover{background:#FEE2E2;color:#B91C1C;}
body.dark .ci-rm:hover,body.obsidian .ci-rm:hover,body.midnight .ci-rm:hover,body.forest .ci-rm:hover,body.ember .ci-rm:hover{background:#380808;color:#F87171;}
.add-ci{align-self:flex-start;margin-top:2px;background:transparent;border:1px dashed var(--border2);border-radius:8px;padding:5px 14px;font-size:12px;cursor:pointer;color:var(--tx3);font-family:inherit;transition:all .15s;}
.add-ci:hover{background:var(--bg3);color:var(--tx1);}
.cl-prog{font-size:11px;color:var(--tx3);margin-top:3px;font-weight:500;}

/* BOTTOM BAR */
#ebb{padding:7px 26px;border-top:1px solid var(--border);background:var(--bg1);flex-shrink:0;display:none;align-items:center;gap:8px;}
.bb-s{font-size:11px;color:var(--tx3);font-weight:500;}

/* EMPTY STATE */
#es{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--tx3);}
.es-ico{font-size:54px;opacity:.4;}
.es-ttl{font-size:20px;font-weight:800;color:var(--tx1);}
.es-sub{font-size:13px;}
.es-btn{background:var(--acc);color:#fff;border:none;border-radius:12px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .15s,transform .1s;}
.es-btn:hover{background:var(--acc2);transform:translateY(-1px);}

/* CTX MENU */
#ctx{position:fixed;background:var(--bg1);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.25);padding:5px;z-index:1000;min-width:168px;display:none;}
.ctx-i{padding:7px 13px;border-radius:8px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;color:var(--tx0);transition:background .1s;font-weight:500;}
.ctx-i:hover{background:var(--bg3);}
.ctx-i.d{color:#EF4444;}
.ctx-i.d:hover{background:#FEE2E2;color:#B91C1C;}
body.dark .ctx-i.d:hover,body.obsidian .ctx-i.d:hover,body.midnight .ctx-i.d:hover,body.forest .ctx-i.d:hover,body.ember .ctx-i.d:hover{background:#380808;}
.ctx-sep{height:1px;background:var(--border);margin:4px 0;}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--tx0);color:var(--bg0);padding:9px 22px;border-radius:24px;font-size:12px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:9999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SCROLLBARS */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--tx3);}

#expand-btn{display:none;}
</style>
</head>
<body>
<div id="app">

<!-- ══ SIDEBAR ══ -->
<div id="sidebar">
  <div class="sb-top">
    <div class="logo-row">
      <div class="logo">🗒️ UltraNotes</div>
      <div class="logo-btns">
        <button class="ib acc" id="new-btn" title="New Note (Ctrl+N)">+</button>
        <button class="ib" id="hide-sb" title="Collapse">◀</button>
      </div>
    </div>

    <div class="search-wrap">
      <span class="si">⌕</span>
      <input id="q" type="text" placeholder="Search notes & tags…"/>
      <button class="clr-btn" id="q-clr">✕</button>
    </div>

    <div class="nav-pills">
      <button class="np on" data-v="notes">📄 Notes</button>
      <button class="np" data-v="liked">❤️</button>
      <button class="np" data-v="archived">📦</button>
      <button class="np" data-v="trash">🗑️</button>
    </div>

    <select class="sb-sel" id="sort-sel">
      <option value="updated">↕ Last edited</option>
      <option value="created">↕ Created</option>
      <option value="alpha">↕ A–Z</option>
    </select>

    <div class="cstrip" id="cstrip">
      <button class="cf-all on" data-fc="">All</button>
    </div>
  </div>

  <div class="tstrip" id="tstrip" style="display:none;"></div>
  <div class="ncount" id="ncount"></div>
  <div class="sbdiv"></div>
  <div id="note-list"></div>

  <div class="sb-footer">
    <span class="th-label">Theme</span>
    <div class="th-grid">
      <button class="tb on" data-t="light" title="Light">☀️</button>
      <button class="tb" data-t="dark" title="Dark">🌑</button>
      <button class="tb" data-t="obsidian" title="Obsidian">⬛</button>
      <button class="tb" data-t="midnight" title="Midnight">🌌</button>
      <button class="tb" data-t="forest" title="Forest">🌲</button>
      <button class="tb" data-t="ember" title="Ember">🔥</button>
      <button class="tb" data-t="paper" title="Paper">📜</button>
    </div>
    <div class="save-row">
      <span class="sdot saved" id="sdot"></span>
      <span class="slabel" id="slabel">Auto-saved</span>
    </div>
  </div>
</div>

<!-- ══ EDITOR ══ -->
<div id="epane">

  <div id="etb">
    <button class="ib" id="expand-btn" title="Show sidebar">▶</button>
    <span class="nnh" id="nnh">Select or create a note</span>

    <div id="tc" style="display:none;align-items:center;gap:6px;flex-wrap:wrap;width:100%;">
      <div id="tc-colors" style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;"></div>
      <div class="etb-sep"></div>
      <select class="fsel" id="fsel">
        <option value="outfit">Default</option>
        <option value="mono">Monospace</option>
        <option value="serif">Serif</option>
        <option value="hand">Handwriting</option>
      </select>
      <div class="fsz-g">
        <button class="fsz-b" id="fsz-dn">A−</button>
        <span id="fsz-v">15</span>
        <button class="fsz-b" id="fsz-up">A+</button>
      </div>
      <div class="etb-sep"></div>
      <button class="etb-btn" id="pin-btn">📌 Pin</button>
      <button class="etb-btn" id="like-btn">❤️ Like</button>
      <button class="etb-btn" id="cl-btn">☑ List</button>
      <button class="etb-btn" id="dupe-btn">⧉ Dupe</button>
      <button class="etb-btn" id="copy-btn">📋 Copy</button>
      <div class="sp"></div>
      <button class="etb-btn" id="arch-btn">📦 Archive</button>
      <button class="etb-btn del" id="del-btn">🗑️ Delete</button>
      <button class="etb-btn" id="restore-btn" style="display:none">♻️ Restore</button>
      <button class="etb-btn del" id="pdel-btn" style="display:none">💀 Erase forever</button>
    </div>
  </div>

  <div id="eh">
    <input id="note-title" type="text" placeholder="Note title…"/>
    <div class="tge" id="tge">
      <span class="meta-txt" id="meta-txt"></span>
    </div>
  </div>

  <div id="ebody">
    <textarea id="note-content" placeholder="Start writing…"></textarea>
    <div id="cl-area" style="display:none;"></div>
  </div>

  <div id="ebb">
    <span class="bb-s" id="bb-c">0 chars</span>
    <span class="bb-s">·</span>
    <span class="bb-s" id="bb-w">0 words</span>
    <div class="sp"></div>
    <span class="bb-s" id="bb-u"></span>
  </div>

  <div id="es">
    <div class="es-ico">🗒️</div>
    <span class="es-ttl">UltraNotes</span>
    <span class="es-sub">Pick a note or start a new one</span>
    <button class="es-btn" id="es-new">+ New Note</button>
  </div>
</div>

</div><!-- /app -->

<!-- Context menu -->
<div id="ctx">
  <div class="ctx-i" data-a="pin">📌 Pin / Unpin</div>
  <div class="ctx-i" data-a="like">❤️ Like / Unlike</div>
  <div class="ctx-i" data-a="dupe">⧉ Duplicate</div>
  <div class="ctx-sep"></div>
  <div class="ctx-i" data-a="arch">📦 Archive</div>
  <div class="ctx-i d" data-a="del">🗑️ Move to Trash</div>
</div>

<div id="toast"></div>

<script>
/* ══ DATA ══ */
const COLORS=[
  {id:"yellow",label:"Sunny",     bg:"#FEF08A",border:"#CA8A04",text:"#5C3A00"},
  {id:"amber", label:"Amber",     bg:"#FDE68A",border:"#D97706",text:"#6B3500"},
  {id:"orange",label:"Peach",     bg:"#FDCBA4",border:"#EA6C0A",text:"#7C2D12"},
  {id:"pink",  label:"Rose",      bg:"#FBCFE8",border:"#DB2777",text:"#6D1740"},
  {id:"red",   label:"Coral",     bg:"#FCA5A5",border:"#DC2626",text:"#7F1D1D"},
  {id:"purple",label:"Lavender",  bg:"#DDD6FE",border:"#7C3AED",text:"#3B0764"},
  {id:"indigo",label:"Indigo",    bg:"#C7D2FE",border:"#4338CA",text:"#1E1B4B"},
  {id:"blue",  label:"Sky",       bg:"#BAE6FD",border:"#0284C7",text:"#0C4A6E"},
  {id:"teal",  label:"Teal",      bg:"#99F6E4",border:"#0D9488",text:"#134E4A"},
  {id:"green", label:"Mint",      bg:"#BBF7D0",border:"#16A34A",text:"#14532D"},
  {id:"slate", label:"Stone",     bg:"#CBD5E1",border:"#475569",text:"#1E293B"},
  {id:"dark",  label:"Night",     bg:"#1E293B",border:"#64748B",text:"#F1F5F9"},
];
const FONTS={
  outfit:"'Outfit',system-ui,sans-serif",
  mono:"'JetBrains Mono',monospace",
  serif:"'Lora','Georgia',serif",
  hand:"'Caveat',cursive",
};

/* ══ STATE ══ */
let notes=[],activeId=null,view="notes",fc="",ftag="",sort="updated",theme="light";
let saveT=null,ctxId=null,seq=Date.now();
const gid=()=>"n"+(seq++);

function mkNote(o={}){
  return{id:gid(),title:"",content:"",color:"yellow",tags:[],pinned:false,liked:false,
    archived:false,deleted:false,createdAt:new Date().toISOString(),
    updatedAt:new Date().toISOString(),font:"outfit",fontSize:15,
    checklist:false,checkItems:[],...o};
}
function col(id){return COLORS.find(c=>c.id===id)||COLORS[0];}
function wc(t){return t.trim()?t.trim().split(/\s+/).length:0;}
function ago(iso){
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";
  if(s<86400)return Math.floor(s/3600)+"h ago";if(s<604800)return Math.floor(s/86400)+"d ago";
  return new Date(iso).toLocaleDateString();
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ══ PERSIST ══ */
async function load(){
  try{
    if(window.storage){
      const r=await window.storage.get("un3");
      if(r?.value){const d=JSON.parse(r.value);notes=d.notes||[];theme=d.theme||"light";applyTheme(theme,false);if(notes.length)activeId=notes[0].id;return;}
    }
  }catch(e){}
  const demo=mkNote({
    title:"Welcome to UltraNotes ✨",
    content:"Cleaner, smarter, 5× better.\n\n• Note cards show their full color — not just a border\n• 7 themes: Light · Dark · Obsidian · Midnight · Forest · Ember · Paper\n• 12 note colors with rich palettes\n• 4 font choices + adjustable size\n• Tags, search, sort, color filter\n• Pin · Like · Archive · Trash · Duplicate\n• Checklist mode with progress\n• Right-click context menu on cards\n• Auto-save across sessions\n\nPress + or Ctrl+N to begin.",
    color:"indigo",pinned:true
  });
  notes=[demo];activeId=demo.id;
}
function save(){
  setSave("saving");
  if(saveT)clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    try{if(window.storage)await window.storage.set("un3",JSON.stringify({notes,theme}));}catch(e){}
    setSave("saved");
  },700);
}
function setSave(s){
  document.getElementById("sdot").className="sdot "+s;
  document.getElementById("slabel").textContent=s==="saving"?"Saving…":"Auto-saved";
}

/* ══ THEME ══ */
function applyTheme(t,persist=true){
  theme=t;document.body.className=t==="light"?"":t;
  document.querySelectorAll(".tb").forEach(b=>b.classList.toggle("on",b.dataset.t===t));
  if(persist)save();
}

/* ══ FILTER ══ */
function filtered(){
  const q=document.getElementById("q").value.toLowerCase();
  return notes
    .filter(n=>{
      if(view==="archived")return n.archived&&!n.deleted;
      if(view==="trash")return n.deleted;
      if(view==="liked")return n.liked&&!n.archived&&!n.deleted;
      return !n.archived&&!n.deleted;
    })
    .filter(n=>!fc||n.color===fc)
    .filter(n=>!ftag||n.tags.includes(ftag))
    .filter(n=>!q||n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q)||n.tags.some(t=>t.toLowerCase().includes(q)))
    .sort((a,b)=>{
      if(a.pinned!==b.pinned)return b.pinned-a.pinned;
      if(sort==="updated")return new Date(b.updatedAt)-new Date(a.updatedAt);
      if(sort==="created")return new Date(b.createdAt)-new Date(a.createdAt);
      if(sort==="alpha")return a.title.localeCompare(b.title);
      return 0;
    });
}

/* ══ RENDER ══ */
function render(){renderCstrip();renderTstrip();renderNoteList();renderEditor();}

function renderCstrip(){
  const cs=document.getElementById("cstrip");
  cs.innerHTML=`<button class="cf-all${!fc?" on":""}" data-fc="">All</button>`;
  COLORS.forEach(c=>{
    const d=document.createElement("div");
    d.className="cdot"+(fc===c.id?" on":"");
    d.dataset.fc=c.id;d.title=c.label;
    d.style.cssText=`background:${c.bg};border-color:${c.border};`+(fc===c.id?`outline:2.5px solid ${c.border};outline-offset:2px;width:22px;height:22px`:"");
    cs.appendChild(d);
  });
}

function renderTstrip(){
  const tags=[...new Set(notes.filter(n=>!n.deleted).flatMap(n=>n.tags))];
  const ts=document.getElementById("tstrip");
  if(!tags.length){ts.style.display="none";return;}
  ts.style.display="flex";ts.innerHTML="";
  tags.forEach(tag=>{
    const b=document.createElement("button");
    b.className="tpf"+(ftag===tag?" on":"");
    b.textContent="# "+tag;
    b.onclick=()=>{ftag=ftag===tag?"":tag;render();};
    ts.appendChild(b);
  });
}

function renderNoteList(){
  const list=document.getElementById("note-list");
  const f=filtered();
  document.getElementById("ncount").textContent=f.length?f.length+" note"+(f.length>1?"s":""):"";
  if(!f.length){
    const msgs={trash:"🗑️ Trash is empty",archived:"📦 Nothing here",liked:"❤️ No liked notes",notes:"✨ No notes yet"};
    list.innerHTML=`<div class="empty-list">${msgs[view]||"No notes"}</div>`;return;
  }
  list.innerHTML="";
  f.forEach((note,i)=>{
    const c=col(note.color);
    const isActive=note.id===activeId;
    const preview=note.checklist?`☑ ${note.checkItems.length} items`:(note.content||"Empty note");
    const tagsH=note.tags.slice(0,2).map(t=>`<span class="nc-tag">${esc(t)}</span>`).join("");
    const icons=(note.pinned?'<span class="nc-ico">📌</span>':"")+(note.liked?'<span class="nc-ico">❤️</span>':"");

    const div=document.createElement("div");
    div.className="nc"+(isActive?" sel":"");
    div.dataset.id=note.id;
    // ★ Full color card — background = note color
    div.style.cssText=`background:${c.bg};color:${c.text};box-shadow:${isActive?`0 6px 24px rgba(0,0,0,.28)`:c.id==="dark"?"0 2px 8px rgba(0,0,0,.5)":"0 1px 4px rgba(0,0,0,.1)"};animation:fadeUp .2s ease both;animation-delay:${i*25}ms;`;
    if(isActive)div.style.borderColor="rgba(255,255,255,.5)";

    div.innerHTML=`
      <div style="display:flex;align-items:flex-start;gap:4px;">
        ${icons}
        <div class="nc-title" style="color:${c.text}">${esc(note.title||"Untitled")}</div>
      </div>
      <div class="nc-preview" style="color:${c.text}">${esc(preview)}</div>
      <div class="nc-foot">
        <span class="nc-time" style="color:${c.text}">${ago(note.updatedAt)}</span>
        <div class="nc-badges">${tagsH}</div>
      </div>`;
    div.addEventListener("click",()=>{activeId=note.id;render();});
    div.addEventListener("contextmenu",e=>{e.preventDefault();ctxId=note.id;showCtx(e);});
    list.appendChild(div);
  });
}

function renderEditor(){
  const note=notes.find(n=>n.id===activeId);
  const nnh=document.getElementById("nnh"),tc=document.getElementById("tc");
  const eh=document.getElementById("eh"),eb=document.getElementById("ebody");
  const ebb=document.getElementById("ebb"),es=document.getElementById("es");
  const ep=document.getElementById("epane");

  if(!note){
    nnh.style.display="";tc.style.display="none";
    eh.style.display="none";eb.style.display="none";ebb.style.display="none";
    es.style.display="flex";ep.style.background="var(--bg2)";return;
  }
  nnh.style.display="none";tc.style.display="flex";
  eh.style.display="block";eb.style.display="flex";ebb.style.display="flex";es.style.display="none";

  const c=col(note.color);
  ep.style.background=c.bg;

  // colors in toolbar
  const tcc=document.getElementById("tc-colors");tcc.innerHTML="";
  COLORS.forEach(cl=>{
    const d=document.createElement("div");
    d.className="cdot"+(note.color===cl.id?" on":"");d.title=cl.label;
    d.style.cssText=`background:${cl.bg};border-color:${cl.border};`+(note.color===cl.id?`outline:2.5px solid ${cl.border};outline-offset:2px;width:22px;height:22px`:"");
    d.onclick=()=>{upd(activeId,"color",cl.id);render();};
    tcc.appendChild(d);
  });

  document.getElementById("fsel").value=note.font;
  document.getElementById("fsz-v").textContent=note.fontSize;
  document.getElementById("pin-btn").classList.toggle("on",note.pinned);
  document.getElementById("like-btn").classList.toggle("on",note.liked);
  document.getElementById("cl-btn").classList.toggle("on",note.checklist);

  const isT=note.deleted;
  document.getElementById("arch-btn").style.display=isT?"none":"";
  document.getElementById("del-btn").style.display=isT?"none":"";
  document.getElementById("restore-btn").style.display=isT?"":"none";
  document.getElementById("pdel-btn").style.display=isT?"":"none";

  const nt=document.getElementById("note-title");
  nt.style.color=c.text;nt.style.fontFamily=FONTS[note.font];
  if(nt.value!==note.title)nt.value=note.title;

  renderTagEditor(note,c);

  const ta=document.getElementById("note-content");
  const cla=document.getElementById("cl-area");
  if(note.checklist){
    ta.style.display="none";cla.style.display="flex";renderChecklist(note,c);
  }else{
    ta.style.display="block";cla.style.display="none";
    ta.style.color=c.text;ta.style.fontSize=note.fontSize+"px";ta.style.fontFamily=FONTS[note.font];
    if(ta.value!==note.content)ta.value=note.content;
  }

  document.getElementById("bb-c").textContent=note.content.length+" chars";
  document.getElementById("bb-w").textContent=wc(note.content)+" words";
  document.getElementById("bb-u").textContent="Updated "+ago(note.updatedAt);
}

function renderTagEditor(note,c){
  const cont=document.getElementById("tge");
  cont.innerHTML=`<span class="meta-txt" id="meta-txt" style="color:${c.text}">${new Date(note.createdAt).toLocaleDateString()} · ${wc(note.content)} words</span>`;
  note.tags.forEach(tag=>{
    const p=document.createElement("button");p.className="t-pill";
    p.style.cssText=`background:${c.border}2A;color:${c.text};`;
    p.innerHTML=`# ${esc(tag)} <span style="opacity:.5">✕</span>`;
    p.onclick=()=>{upd(activeId,"tags",note.tags.filter(t=>t!==tag));render();};
    cont.appendChild(p);
  });
  const ab=document.createElement("button");ab.className="add-tag";ab.style.color=c.text+"99";ab.textContent="+ tag";
  ab.onclick=()=>{
    ab.style.display="none";
    const inp=document.createElement("input");inp.className="tag-inp-i";inp.placeholder="tag…";inp.style.color=c.text;
    cont.insertBefore(inp,ab);inp.focus();
    const commit=()=>{const v=inp.value.trim();if(v&&!note.tags.includes(v))upd(activeId,"tags",[...note.tags,v]);render();};
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")commit();if(e.key==="Escape")render();});
    inp.addEventListener("blur",()=>setTimeout(commit,100));
  };
  cont.appendChild(ab);
}

function renderChecklist(note,c){
  const area=document.getElementById("cl-area");area.innerHTML="";
  (note.checkItems||[]).forEach(item=>{
    const row=document.createElement("div");row.className="ci"+(item.done?" done":"");
    const cb=document.createElement("input");cb.type="checkbox";cb.checked=item.done;cb.style.accentColor=c.border;
    cb.onchange=()=>{
      const n=notes.find(x=>x.id===activeId);if(!n)return;
      n.checkItems=n.checkItems.map(i=>i.id===item.id?{...i,done:cb.checked}:i);
      n.updatedAt=new Date().toISOString();save();renderChecklist(n,c);renderNoteList();
    };
    const inp=document.createElement("input");inp.type="text";inp.className="ci-txt";inp.value=item.text;inp.placeholder="Item…";
    inp.style.cssText=`color:${c.text};font-size:${note.fontSize}px;font-family:${FONTS[note.font]};border-bottom-color:${c.border}44;`;
    if(item.done)inp.style.cssText+=`text-decoration:line-through;opacity:.42;`;
    inp.oninput=()=>{
      const n=notes.find(x=>x.id===activeId);if(!n)return;
      n.checkItems=n.checkItems.map(i=>i.id===item.id?{...i,text:inp.value}:i);
      n.updatedAt=new Date().toISOString();save();
    };
    const rm=document.createElement("button");rm.className="ci-rm";rm.textContent="✕";
    rm.onclick=()=>{const n=notes.find(x=>x.id===activeId);if(!n)return;n.checkItems=n.checkItems.filter(i=>i.id!==item.id);n.updatedAt=new Date().toISOString();save();renderChecklist(n,c);};
    row.append(cb,inp,rm);area.appendChild(row);
  });
  const ab=document.createElement("button");ab.className="add-ci";ab.style.color=c.text+"cc";ab.textContent="+ Add item";
  ab.onclick=()=>{const n=notes.find(x=>x.id===activeId);if(!n)return;n.checkItems=[...(n.checkItems||[]),{id:gid(),text:"",done:false}];n.updatedAt=new Date().toISOString();save();renderChecklist(n,c);};
  area.appendChild(ab);
  const done=(note.checkItems||[]).filter(i=>i.done).length,tot=(note.checkItems||[]).length;
  if(tot>0){const p=document.createElement("div");p.className="cl-prog";p.style.color=c.text+"88";p.textContent=`${done}/${tot} completed`;area.appendChild(p);}
}

/* ══ MUTATIONS ══ */
function upd(id,f,v){const n=notes.find(x=>x.id===id);if(!n)return;n[f]=v;n.updatedAt=new Date().toISOString();save();}
function newNote(){const n=mkNote();notes.unshift(n);activeId=n.id;view="notes";document.querySelectorAll(".np").forEach(b=>b.classList.toggle("on",b.dataset.v==="notes"));save();render();setTimeout(()=>document.getElementById("note-title")?.focus(),50);}
function dupNote(id){const s=notes.find(n=>n.id===id);if(!s)return;const d={...s,id:gid(),title:(s.title||"")+" (copy)",createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),pinned:false,checkItems:(s.checkItems||[]).map(i=>({...i,id:gid()}))};notes.unshift(d);activeId=d.id;save();render();}
function archNote(id){const n=notes.find(x=>x.id===id);if(n){n.archived=true;n.updatedAt=new Date().toISOString();}if(activeId===id)activeId=null;save();render();}
function softDel(id){const n=notes.find(x=>x.id===id);if(n){n.deleted=true;n.archived=false;n.updatedAt=new Date().toISOString();}if(activeId===id)activeId=null;save();render();}
function restore(id){const n=notes.find(x=>x.id===id);if(n){n.deleted=false;n.archived=false;n.updatedAt=new Date().toISOString();}save();render();}
function permDel(id){notes=notes.filter(n=>n.id!==id);if(activeId===id)activeId=null;save();render();}

/* ══ TOAST ══ */
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}

/* ══ CTX MENU ══ */
function showCtx(e){
  const m=document.getElementById("ctx");m.style.display="block";
  const x=Math.min(e.clientX,window.innerWidth-180),y=Math.min(e.clientY,window.innerHeight-200);
  m.style.left=x+"px";m.style.top=y+"px";
}
document.getElementById("ctx").addEventListener("click",e=>{
  const it=e.target.closest(".ctx-i");if(!it||!ctxId)return;
  const n=notes.find(x=>x.id===ctxId);if(!n)return;
  const a=it.dataset.a;
  if(a==="pin"){n.pinned=!n.pinned;n.updatedAt=new Date().toISOString();save();render();}
  else if(a==="like"){n.liked=!n.liked;n.updatedAt=new Date().toISOString();save();render();}
  else if(a==="dupe")dupNote(ctxId);
  else if(a==="arch")archNote(ctxId);
  else if(a==="del")softDel(ctxId);
  document.getElementById("ctx").style.display="none";
});
document.addEventListener("click",()=>document.getElementById("ctx").style.display="none");

/* ══ EVENTS ══ */
document.getElementById("new-btn").addEventListener("click",newNote);
document.getElementById("es-new").addEventListener("click",newNote);

document.getElementById("hide-sb").addEventListener("click",()=>{
  document.getElementById("sidebar").classList.add("hidden");
  document.getElementById("expand-btn").style.display="flex";
});
document.getElementById("expand-btn").addEventListener("click",()=>{
  document.getElementById("sidebar").classList.remove("hidden");
  document.getElementById("expand-btn").style.display="none";
});

document.getElementById("q").addEventListener("input",function(){
  document.getElementById("q-clr").style.display=this.value?"":"none";render();
});
document.getElementById("q-clr").addEventListener("click",()=>{
  document.getElementById("q").value="";document.getElementById("q-clr").style.display="none";render();
});

document.getElementById("sort-sel").addEventListener("change",function(){sort=this.value;render();});

document.querySelectorAll(".np").forEach(b=>b.addEventListener("click",()=>{
  view=b.dataset.v;activeId=null;
  document.querySelectorAll(".np").forEach(x=>x.classList.toggle("on",x.dataset.v===view));render();
}));

document.getElementById("cstrip").addEventListener("click",e=>{
  const el=e.target.closest("[data-fc]");if(!el)return;fc=el.dataset.fc;render();
});

document.querySelectorAll(".tb").forEach(b=>b.addEventListener("click",()=>applyTheme(b.dataset.t)));

document.getElementById("note-title").addEventListener("input",function(){
  if(!activeId)return;upd(activeId,"title",this.value);renderNoteList();
  const n=notes.find(x=>x.id===activeId);if(n){const m=document.getElementById("meta-txt");if(m)m.textContent=new Date(n.createdAt).toLocaleDateString()+" · "+wc(n.content)+" words";}
});

document.getElementById("note-content").addEventListener("input",function(){
  if(!activeId)return;upd(activeId,"content",this.value);
  document.getElementById("bb-c").textContent=this.value.length+" chars";
  document.getElementById("bb-w").textContent=wc(this.value)+" words";
  const n=notes.find(x=>x.id===activeId);if(n){const m=document.getElementById("meta-txt");if(m)m.textContent=new Date(n.createdAt).toLocaleDateString()+" · "+wc(this.value)+" words";}
});

document.getElementById("fsel").addEventListener("change",function(){
  if(!activeId)return;upd(activeId,"font",this.value);
  const n=notes.find(x=>x.id===activeId);if(!n)return;
  document.getElementById("note-title").style.fontFamily=FONTS[n.font];
  document.getElementById("note-content").style.fontFamily=FONTS[n.font];
});

document.getElementById("fsz-dn").addEventListener("click",()=>{
  if(!activeId)return;const n=notes.find(x=>x.id===activeId);if(!n)return;
  n.fontSize=Math.max(10,(n.fontSize||15)-1);n.updatedAt=new Date().toISOString();save();
  document.getElementById("fsz-v").textContent=n.fontSize;
  document.getElementById("note-content").style.fontSize=n.fontSize+"px";
});
document.getElementById("fsz-up").addEventListener("click",()=>{
  if(!activeId)return;const n=notes.find(x=>x.id===activeId);if(!n)return;
  n.fontSize=Math.min(36,(n.fontSize||15)+1);n.updatedAt=new Date().toISOString();save();
  document.getElementById("fsz-v").textContent=n.fontSize;
  document.getElementById("note-content").style.fontSize=n.fontSize+"px";
});

document.getElementById("pin-btn").addEventListener("click",()=>{if(!activeId)return;const n=notes.find(x=>x.id===activeId);if(n){n.pinned=!n.pinned;n.updatedAt=new Date().toISOString();save();render();}});
document.getElementById("like-btn").addEventListener("click",()=>{if(!activeId)return;const n=notes.find(x=>x.id===activeId);if(n){n.liked=!n.liked;n.updatedAt=new Date().toISOString();save();render();}});
document.getElementById("cl-btn").addEventListener("click",()=>{if(!activeId)return;const n=notes.find(x=>x.id===activeId);if(n){n.checklist=!n.checklist;n.updatedAt=new Date().toISOString();save();renderEditor();}});
document.getElementById("dupe-btn").addEventListener("click",()=>{if(activeId)dupNote(activeId);});
document.getElementById("copy-btn").addEventListener("click",()=>{
  const n=notes.find(x=>x.id===activeId);if(!n)return;
  const t=`${n.title}\n${"─".repeat(40)}\n${n.content}\n\nTags: ${n.tags.join(", ")||"none"}\nCreated: ${new Date(n.createdAt).toLocaleString()}\nUpdated: ${new Date(n.updatedAt).toLocaleString()}`;
  navigator.clipboard.writeText(t).then(()=>toast("📋 Copied!")).catch(()=>toast("❌ Copy failed"));
});
document.getElementById("arch-btn").addEventListener("click",()=>{if(activeId)archNote(activeId);});
document.getElementById("del-btn").addEventListener("click",()=>{if(activeId)softDel(activeId);});
document.getElementById("restore-btn").addEventListener("click",()=>{if(activeId){restore(activeId);toast("♻️ Restored!");}});
document.getElementById("pdel-btn").addEventListener("click",()=>{if(activeId&&confirm("Permanently delete? This cannot be undone."))permDel(activeId);});

document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="n"){e.preventDefault();newNote();}
  if((e.ctrlKey||e.metaKey)&&e.key==="d"){e.preventDefault();if(activeId)dupNote(activeId);}
});
