<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaTasks — Supernova Task Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030308;--bg2:#0a0a15;--bg3:#10101f;
  --bd:#1a1a2e;--bd2:#2a2a44;
  --tx:#e8e8f0;--tx2:#a0a0c0;--tx3:#606080;
  --red:#ff4444;--orange:#ff8844;--yellow:#ffdd44;--white:#ffffff;--blue:#4488ff;--purple:#8844ff;
  --nebula1:#ff006650;--nebula2:#00ffff40;--nebula3:#ff00ff30;
  --f:'Exo 2',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;--fd:'Orbitron',sans-serif
}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--tx);overflow:hidden}
::selection{background:rgba(255,255,255,.15)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* Deep Space Background */
.space-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none}
.stars-layer{position:absolute;inset:0;background:radial-gradient(1px 1px at var(--x) var(--y),rgba(255,255,255,.8),transparent);
  background-size:200px 200px}
.nebula{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4}
.nebula-1{width:600px;height:400px;background:var(--nebula1);top:10%;left:10%;animation:drift 30s infinite}
.nebula-2{width:500px;height:500px;background:var(--nebula2);bottom:10%;right:10%;animation:drift 25s infinite reverse}
.nebula-3{width:400px;height:300px;background:var(--nebula3);top:50%;left:50%;animation:drift 35s infinite}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.1)}50%{transform:translate(-20px,30px) scale(.9)}75%{transform:translate(20px,20px) scale(1.05)}}

/* Parallax Stars */
.parallax-stars{position:absolute;inset:0}
.star{position:absolute;border-radius:50%;background:white}
.star.layer-1{animation:twinkle 3s infinite}
.star.layer-2{animation:twinkle 4s infinite .5s}
.star.layer-3{animation:twinkle 5s infinite 1s}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}

/* Console Header */
.console{height:60px;background:linear-gradient(180deg,rgba(20,20,40,.95) 0%,rgba(10,10,25,.98) 100%);
  border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:16px;
  backdrop-filter:blur(10px);position:relative;z-index:100}
.console::before{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(68,136,255,.5),transparent)}
.console-brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,#fff 0%,#ffdd44 30%,#ff8844 60%,#ff4444 100%);
  box-shadow:0 0 20px rgba(255,200,100,.5);animation:starPulse 2s infinite}
@keyframes starPulse{0%,100%{box-shadow:0 0 20px rgba(255,200,100,.5)}50%{box-shadow:0 0 30px rgba(255,200,100,.8)}}
.brand-text{font-family:var(--fd);font-size:20px;font-weight:700;letter-spacing:3px;
  background:linear-gradient(90deg,#fff,#ffdd44,#ff8844);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.console-sep{width:1px;height:30px;background:var(--bd)}
.console-nav{display:flex;gap:4px}
.nav-btn{padding:8px 16px;background:rgba(255,255,255,.03);border:1px solid transparent;border-radius:8px;
  color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.nav-btn:hover{background:rgba(255,255,255,.06);color:var(--tx)}
.nav-btn.active{background:rgba(68,136,255,.1);border-color:rgba(68,136,255,.3);color:var(--blue)}
.console-search{flex:1;max-width:300px;margin:0 20px;position:relative}
.search-input{width:100%;padding:8px 16px 8px 36px;background:rgba(255,255,255,.03);border:1px solid var(--bd);
  border-radius:20px;color:var(--tx);font-size:12px;outline:none;transition:.2s}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 15px rgba(68,136,255,.2)}
.search-input::placeholder{color:var(--tx3)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:12px}
.console-status{display:flex;gap:16px;margin-left:auto;align-items:center}
.status-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx2)}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-dot.green{background:#00ff88;box-shadow:0 0 8px #00ff88}
.status-dot.amber{background:#ffaa00;box-shadow:0 0 8px #ffaa00;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.add-btn{padding:8px 20px;background:linear-gradient(135deg,rgba(68,136,255,.2),rgba(136,68,255,.15));
  border:1px solid rgba(68,136,255,.3);border-radius:20px;color:var(--blue);font-size:12px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
.add-btn:hover{background:linear-gradient(135deg,rgba(68,136,255,.3),rgba(136,68,255,.25));transform:scale(1.02)}

/* Main Content */
.main{display:flex;height:calc(100vh - 60px);overflow:hidden}

/* Sidebar */
.sidebar{width:260px;background:rgba(10,10,20,.7);border-right:1px solid var(--bd);
  backdrop-filter:blur(10px);display:flex;flex-direction:column;z-index:50}
.sidebar-section{padding:16px}
.sidebar-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;
  margin-bottom:12px;display:flex;align-items:center;gap:6px}
.mission-control{background:rgba(255,255,255,.02);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:12px}
.mc-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.mc-icon{font-size:16px}
.mc-title{font-size:12px;font-weight:600}
.mc-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc-stat{background:rgba(0,0,0,.3);border-radius:8px;padding:10px;text-align:center}
.mc-stat-value{font-family:var(--fd);font-size:20px;font-weight:700}
.mc-stat-value.urgent{color:var(--red)}
.mc-stat-value.normal{color:var(--blue)}
.mc-stat-label{font-size:9px;color:var(--tx3);text-transform:uppercase;margin-top:2px}
.countdown-item{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,68,68,.05);
  border:1px solid rgba(255,68,68,.2);border-radius:8px;margin-top:10px}
.countdown-icon{font-size:18px}
.countdown-info{flex:1}
.countdown-title{font-size:11px;font-weight:600;color:var(--tx)}
.countdown-time{font-family:var(--fm);font-size:13px;color:var(--red);margin-top:2px}
.projects-list{display:flex;flex-direction:column;gap:4px}
.project-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s}
.project-item:hover{background:rgba(255,255,255,.03)}
.project-item.active{background:rgba(68,136,255,.1);border:1px solid rgba(68,136,255,.2)}
.project-sun{width:24px;height:24px;border-radius:50%;flex-shrink:0}
.project-sun.red{background:radial-gradient(circle,#ff6666,#ff4444,#aa2222);box-shadow:0 0 10px #ff4444}
.project-sun.orange{background:radial-gradient(circle,#ffaa66,#ff8844,#aa5522);box-shadow:0 0 10px #ff8844}
.project-sun.yellow{background:radial-gradient(circle,#ffee88,#ffdd44,#aa9922);box-shadow:0 0 10px #ffdd44}
.project-sun.blue{background:radial-gradient(circle,#88aaff,#4488ff,#2244aa);box-shadow:0 0 10px #4488ff}
.project-name{flex:1;font-size:12px}
.project-count{font-size:10px;color:var(--tx3);padding:2px 8px;background:rgba(255,255,255,.05);border-radius:10px}
.dark-matter{margin-top:auto;padding:16px;border-top:1px solid var(--bd)}
.dm-btn{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(136,68,255,.05);
  border:1px dashed rgba(136,68,255,.3);border-radius:10px;cursor:pointer;transition:.2s;width:100%;color:var(--tx2);font-size:12px}
.dm-btn:hover{background:rgba(136,68,255,.1);color:var(--tx)}

/* Universe View */
.universe{flex:1;position:relative;overflow:hidden}
.gravity-well{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:200px;height:200px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(68,136,255,.1) 0%,transparent 70%);
  animation:gravityPulse 4s infinite}
@keyframes gravityPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.2);opacity:.3}}
.gravity-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:20px;height:20px;border-radius:50%;background:radial-gradient(circle,#fff,#88aaff);
  box-shadow:0 0 30px rgba(136,170,255,.5)}

/* Task Stars */
.task-star{position:absolute;cursor:pointer;transition:transform .3s,box-shadow .3s;z-index:10}
.task-star:hover{transform:scale(1.15);z-index:100}
.star-body{border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center}
.star-body::before{content:'';position:absolute;inset:-4px;border-radius:50%;
  background:inherit;filter:blur(8px);opacity:.5}
.star-glow{position:absolute;inset:-10px;border-radius:50%;background:inherit;filter:blur(15px);opacity:.3;
  animation:starGlow 2s infinite}
@keyframes starGlow{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.4;transform:scale(1.1)}}
/* Star colors by priority */
.star-critical .star-body{background:radial-gradient(circle,#aaccff,#4488ff,#2255aa);box-shadow:0 0 20px #4488ff}
.star-high .star-body{background:radial-gradient(circle,#ffffff,#ffffaa,#ffdd44);box-shadow:0 0 20px #ffdd44}
.star-medium .star-body{background:radial-gradient(circle,#ffcc88,#ff8844,#aa5522);box-shadow:0 0 15px #ff8844}
.star-low .star-body{background:radial-gradient(circle,#ff8888,#ff4444,#aa2222);box-shadow:0 0 10px #ff4444}
.task-card{position:absolute;left:50%;top:100%;transform:translateX(-50%);margin-top:10px;
  width:200px;padding:12px;background:rgba(15,15,30,.95);border:1px solid var(--bd);border-radius:10px;
  backdrop-filter:blur(10px);opacity:0;visibility:hidden;transition:.2s;z-index:1000}
.task-star:hover .task-card{opacity:1;visibility:visible}
.task-card::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%) rotate(45deg);
  width:12px;height:12px;background:rgba(15,15,30,.95);border-left:1px solid var(--bd);border-top:1px solid var(--bd)}
.task-title{font-size:12px;font-weight:600;margin-bottom:6px}
.task-meta{display:flex;gap:8px;font-size:10px;color:var(--tx3)}
.task-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.nebula-tag{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:500}
.nebula-tag.pink{background:rgba(255,0,102,.2);color:#ff6699;border:1px solid rgba(255,0,102,.3)}
.nebula-tag.cyan{background:rgba(0,255,255,.15);color:#00ffff;border:1px solid rgba(0,255,255,.3)}
.nebula-tag.purple{background:rgba(136,68,255,.2);color:#aa88ff;border:1px solid rgba(136,68,255,.3)}
.task-actions{display:flex;gap:6px;margin-top:10px}
.task-action{flex:1;padding:6px;background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:6px;
  color:var(--tx2);font-size:10px;cursor:pointer;text-align:center;transition:.15s}
.task-action:hover{background:rgba(255,255,255,.1);color:var(--tx)}
.task-action.complete{border-color:rgba(0,255,136,.3)}
.task-action.complete:hover{background:rgba(0,255,136,.1);color:#00ff88}

/* Solar System View */
.solar-view{display:none;position:absolute;inset:0}
.solar-view.active{display:block}
.orbit{position:absolute;top:50%;left:50%;border:1px dashed rgba(255,255,255,.1);border-radius:50%;
  transform:translate(-50%,-50%)}
.sun-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,#fff 0%,#ffdd44 40%,#ff8844 70%,#ff4444 100%);
  box-shadow:0 0 60px rgba(255,200,100,.6),0 0 100px rgba(255,150,50,.4);z-index:10}
.sun-label{position:absolute;top:50%;left:50%;transform:translate(-50%,60px);
  font-family:var(--fd);font-size:12px;text-align:center;color:var(--tx);white-space:nowrap}
.planet{position:absolute;border-radius:50%;cursor:pointer;transition:.2s}
.planet:hover{transform:scale(1.3)}
.planet-inner{width:100%;height:100%;border-radius:50%}

/* Space-Time Calendar */
.spacetime-view{display:none;position:absolute;inset:0;padding:30px}
.spacetime-view.active{display:flex;flex-direction:column}
.timeline-curve{flex:1;position:relative}
.timeline-path{position:absolute;left:10%;right:10%;top:50%;height:4px;
  background:linear-gradient(90deg,rgba(68,136,255,.5),rgba(136,68,255,.5));border-radius:2px;
  box-shadow:0 0 20px rgba(100,100,255,.3)}
.timeline-node{position:absolute;top:50%;transform:translate(-50%,-50%);cursor:pointer;transition:.2s}
.timeline-node:hover{transform:translate(-50%,-50%) scale(1.2)}
.timeline-dot{width:16px;height:16px;border-radius:50%;border:2px solid white;box-shadow:0 0 10px currentColor}
.timeline-label{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:10px;
  font-size:10px;color:var(--tx2);white-space:nowrap;text-align:center}
.timeline-task{position:absolute;left:50%;transform:translateX(-50%);padding:10px;
  background:rgba(15,15,30,.9);border:1px solid var(--bd);border-radius:8px;min-width:150px;top:calc(100% + 30px)}

/* Supernova Explosion */
.supernova{position:fixed;pointer-events:none;z-index:9999}
.supernova-particle{position:absolute;border-radius:50%;animation:explode 1s forwards}
@keyframes explode{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
.supernova-ring{position:absolute;border-radius:50%;border:2px solid;animation:ringExpand 1s forwards}
@keyframes ringExpand{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
.supernova-flash{position:fixed;inset:0;background:radial-gradient(circle at var(--cx) var(--cy),rgba(255,255,255,.3),transparent 50%);
  animation:flash .5s forwards;pointer-events:none;z-index:9998}
@keyframes flash{0%{opacity:1}100%{opacity:0}}

/* Wormhole Modal */
.wormhole-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:none;
  align-items:center;justify-content:center}
.wormhole-modal.show{display:flex}
.wormhole-content{width:400px;background:linear-gradient(180deg,rgba(30,30,60,.95),rgba(15,15,35,.98));
  border:1px solid var(--bd);border-radius:16px;overflow:hidden;backdrop-filter:blur(20px)}
.wormhole-header{padding:20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.wormhole-icon{font-size:24px;animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.wormhole-title{font-family:var(--fd);font-size:16px;letter-spacing:1px}
.wormhole-close{margin-left:auto;width:30px;height:30px;border:none;background:rgba(255,255,255,.05);
  border-radius:8px;color:var(--tx3);cursor:pointer;font-size:16px}
.wormhole-close:hover{background:rgba(255,255,255,.1);color:var(--tx)}
.wormhole-body{padding:20px}
.wormhole-task{padding:12px;background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:8px;margin-bottom:16px}
.wormhole-task-title{font-size:13px;font-weight:600}
.wormhole-destinations{display:flex;flex-direction:column;gap:8px}
.wormhole-dest{padding:12px;background:rgba(255,255,255,.02);border:1px solid var(--bd);border-radius:8px;
  cursor:pointer;display:flex;align-items:center;gap:10px;transition:.2s}
.wormhole-dest:hover{background:rgba(136,68,255,.1);border-color:rgba(136,68,255,.3)}

/* Dark Matter Drawer */
.dark-matter-drawer{position:fixed;right:0;top:60px;bottom:0;width:350px;background:rgba(5,5,15,.95);
  border-left:1px solid var(--bd);transform:translateX(100%);transition:.3s;z-index:200;backdrop-filter:blur(20px)}
.dark-matter-drawer.open{transform:translateX(0)}
.dm-header{padding:20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.dm-title{font-family:var(--fd);font-size:14px;letter-spacing:1px}
.dm-close{margin-left:auto;width:30px;height:30px;border:none;background:rgba(255,255,255,.05);
  border-radius:8px;color:var(--tx3);cursor:pointer}
.dm-close:hover{background:rgba(255,255,255,.1);color:var(--tx)}
.dm-list{padding:16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:calc(100vh - 140px)}
.dm-item{padding:14px;background:rgba(136,68,255,.05);border:1px dashed rgba(136,68,255,.2);border-radius:10px}
.dm-item-title{font-size:12px;font-weight:600;margin-bottom:6px}
.dm-item-desc{font-size:10px;color:var(--tx3)}
.dm-item-actions{display:flex;gap:6px;margin-top:10px}
.dm-action{padding:5px 10px;background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:6px;
  color:var(--tx2);font-size:10px;cursor:pointer}
.dm-action:hover{background:rgba(255,255,255,.1);color:var(--tx)}
.dm-action.activate{border-color:rgba(0,255,136,.3)}
.dm-action.activate:hover{background:rgba(0,255,136,.1);color:#00ff88}

/* Add Task Modal */
.add-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:none;align-items:center;justify-content:center}
.add-modal.show{display:flex}
.add-content{width:450px;background:linear-gradient(180deg,rgba(25,25,50,.95),rgba(15,15,35,.98));
  border:1px solid var(--bd);border-radius:16px;backdrop-filter:blur(20px)}
.add-header{padding:20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.add-title{font-family:var(--fd);font-size:16px;letter-spacing:1px}
.add-body{padding:20px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 14px;background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:8px;
  color:var(--tx);font-size:13px;outline:none}
.form-input:focus{border-color:var(--blue)}
.form-input::placeholder{color:var(--tx3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.priority-select{display:flex;gap:8px}
.priority-opt{flex:1;padding:10px;background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:8px;
  cursor:pointer;text-align:center;transition:.2s}
.priority-opt:hover{background:rgba(255,255,255,.06)}
.priority-opt.active{border-width:2px}
.priority-opt.critical.active{border-color:var(--blue);background:rgba(68,136,255,.1)}
.priority-opt.high.active{border-color:var(--yellow);background:rgba(255,221,68,.1)}
.priority-opt.medium.active{border-color:var(--orange);background:rgba(255,136,68,.1)}
.priority-opt.low.active{border-color:var(--red);background:rgba(255,68,68,.1)}
.priority-star{width:20px;height:20px;border-radius:50%;margin:0 auto 6px}
.priority-opt.critical .priority-star{background:radial-gradient(circle,#aaccff,#4488ff)}
.priority-opt.high .priority-star{background:radial-gradient(circle,#ffee88,#ffdd44)}
.priority-opt.medium .priority-star{background:radial-gradient(circle,#ffcc88,#ff8844)}
.priority-opt.low .priority-star{background:radial-gradient(circle,#ff8888,#ff4444)}
.priority-label{font-size:10px;color:var(--tx2)}
.tag-input{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:8px;min-height:44px}
.tag-chip{padding:4px 10px;border-radius:12px;font-size:10px;display:flex;align-items:center;gap:4px}
.tag-chip .remove{cursor:pointer;opacity:.6}
.tag-chip .remove:hover{opacity:1}
.tag-add{background:none;border:none;color:var(--tx3);font-size:12px;cursor:pointer;padding:4px 8px}
.tag-add:hover{color:var(--tx)}
.form-actions{display:flex;gap:10px;margin-top:20px}
.form-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.form-btn.cancel{background:rgba(255,255,255,.05);border:1px solid var(--bd);color:var(--tx2)}
.form-btn.cancel:hover{background:rgba(255,255,255,.1);color:var(--tx)}
.form-btn.submit{background:linear-gradient(135deg,rgba(68,136,255,.3),rgba(136,68,255,.2));
  border:1px solid rgba(68,136,255,.4);color:var(--blue)}
.form-btn.submit:hover{background:linear-gradient(135deg,rgba(68,136,255,.4),rgba(136,68,255,.3))}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;
  background:rgba(20,20,40,.95);border:1px solid var(--bd);border-radius:10px;color:var(--tx);
  font-size:12px;z-index:10000;display:flex;align-items:center;gap:10px;animation:toastIn .3s;backdrop-filter:blur(10px)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- Space Background -->
<div class="space-bg">
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  <div class="parallax-stars" id="starsContainer"></div>
</div>

<!-- Console Header -->
<div class="console">
  <div class="console-brand">
    <div class="brand-icon"></div>
    <span class="brand-text">NOVATASKS</span>
  </div>
  <div class="console-sep"></div>
  <div class="console-nav">
    <button class="nav-btn active" onclick="setView('universe')">🌌 Universe</button>
    <button class="nav-btn" onclick="setView('solar')">☀️ Solar System</button>
    <button class="nav-btn" onclick="setView('spacetime')">⏰ Space-Time</button>
  </div>
  <div class="console-search">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" placeholder="Search the cosmos..." oninput="searchTasks(this.value)">
  </div>
  <div class="console-status">
    <div class="status-item">
      <div class="status-dot green"></div>
      <span>Systems Online</span>
    </div>
    <div class="status-item">
      <div class="status-dot amber" id="urgentIndicator" style="display:none"></div>
      <span id="urgentCount"></span>
    </div>
  </div>
  <button class="add-btn" onclick="showAddModal()">
    <span>✨</span> New Star
  </button>
</div>

<!-- Main Content -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">🎯 Mission Control</div>
      <div class="mission-control">
        <div class="mc-header">
          <span class="mc-icon">🚀</span>
          <span class="mc-title">Launch Status</span>
        </div>
        <div class="mc-stats">
          <div class="mc-stat">
            <div class="mc-stat-value urgent" id="urgentTasks">0</div>
            <div class="mc-stat-label">Critical</div>
          </div>
          <div class="mc-stat">
            <div class="mc-stat-value normal" id="activeTasks">0</div>
            <div class="mc-stat-label">Active</div>
          </div>
        </div>
        <div class="countdown-item" id="nextDeadline" style="display:none">
          <span class="countdown-icon">⏱️</span>
          <div class="countdown-info">
            <div class="countdown-title" id="nextDeadlineTitle">Next Launch</div>
            <div class="countdown-time" id="nextDeadlineTime">00:00:00</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="sidebar-section">
      <div class="sidebar-title">☀️ Solar Systems</div>
      <div class="projects-list" id="projectsList"></div>
    </div>
    
    <div class="dark-matter">
      <button class="dm-btn" onclick="toggleDarkMatter()">
        <span>🌑</span>
        <span>Dark Matter Backlog</span>
        <span style="margin-left:auto" id="dmCount">0</span>
      </button>
    </div>
  </div>

  <!-- Universe View -->
  <div class="universe" id="universeView">
    <div class="gravity-well"></div>
    <div class="gravity-center"></div>
    <div id="taskStars"></div>
  </div>

  <!-- Solar System View -->
  <div class="solar-view" id="solarView">
    <div class="sun-center"></div>
    <div class="sun-label" id="sunLabel">Select a Project</div>
    <div id="orbits"></div>
    <div id="planets"></div>
  </div>

  <!-- Space-Time View -->
  <div class="spacetime-view" id="spacetimeView">
    <div class="timeline-curve">
      <div class="timeline-path"></div>
      <div id="timelineNodes"></div>
    </div>
  </div>
</div>

<!-- Dark Matter Drawer -->
<div class="dark-matter-drawer" id="dmDrawer">
  <div class="dm-header">
    <span>🌑</span>
    <span class="dm-title">DARK MATTER BACKLOG</span>
    <button class="dm-close" onclick="toggleDarkMatter()">×</button>
  </div>
  <div class="dm-list" id="dmList"></div>
</div>

<!-- Wormhole Modal -->
<div class="wormhole-modal" id="wormholeModal">
  <div class="wormhole-content">
    <div class="wormhole-header">
      <span class="wormhole-icon">🌀</span>
      <span class="wormhole-title">WORMHOLE TRANSFER</span>
      <button class="wormhole-close" onclick="closeWormhole()">×</button>
    </div>
    <div class="wormhole-body">
      <div class="wormhole-task" id="wormholeTask"></div>
      <div class="sidebar-title" style="margin-bottom:10px">Select Destination</div>
      <div class="wormhole-destinations" id="wormholeDestinations"></div>
    </div>
  </div>
</div>

<!-- Add Task Modal -->
<div class="add-modal" id="addModal">
  <div class="add-content">
    <div class="add-header">
      <span class="add-title">✨ CREATE NEW STAR</span>
      <button class="wormhole-close" onclick="closeAddModal()">×</button>
    </div>
    <div class="add-body">
      <div class="form-group">
        <label class="form-label">Star Name</label>
        <input type="text" class="form-input" id="taskTitle" placeholder="Enter task name...">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" class="form-input" id="taskDesc" placeholder="Optional description...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Solar System</label>
          <select class="form-input" id="taskProject"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Deadline</label>
          <input type="datetime-local" class="form-input" id="taskDeadline">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Star Class (Priority)</label>
        <div class="priority-select">
          <div class="priority-opt critical" onclick="setPriority('critical')">
            <div class="priority-star"></div>
            <div class="priority-label">Blue Giant</div>
          </div>
          <div class="priority-opt high active" onclick="setPriority('high')">
            <div class="priority-star"></div>
            <div class="priority-label">Yellow Star</div>
          </div>
          <div class="priority-opt medium" onclick="setPriority('medium')">
            <div class="priority-star"></div>
            <div class="priority-label">Orange Star</div>
          </div>
          <div class="priority-opt low" onclick="setPriority('low')">
            <div class="priority-star"></div>
            <div class="priority-label">Red Dwarf</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nebula Tags</label>
        <div class="tag-input" id="tagInput">
          <button class="tag-add" onclick="addTag()">+ Add tag</button>
        </div>
      </div>
      <div class="form-actions">
        <button class="form-btn cancel" onclick="closeAddModal()">Cancel</button>
        <button class="form-btn submit" onclick="createTask()">Launch Star ✨</button>
      </div>
    </div>
  </div>
</div>

<script>
// State
const state = {
  tasks: [],
  projects: [],
  darkMatter: [],
  currentView: 'universe',
  currentProject: null,
  selectedPriority: 'high',
  tags: [],
  wormholeTask: null
};

// Priority sizes
const PRIORITY_SIZE = { critical: 50, high: 40, medium: 32, low: 24 };
const TAG_COLORS = ['pink', 'cyan', 'purple'];

// Initialize
function init() {
  createStars();
  loadState();
  renderAll();
  startCountdown();
}

// Create background stars
function createStars() {
  const container = document.getElementById('starsContainer');
  for (let i = 0; i < 150; i++) {
    const star = document.createElement('div');
    star.className = 'star layer-' + (Math.floor(Math.random() * 3) + 1);
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    star.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(star);
  }
}

// Storage
function saveState() {
  localStorage.setItem('novatasks', JSON.stringify({
    tasks: state.tasks,
    projects: state.projects,
    darkMatter: state.darkMatter
  }));
}

function loadState() {
  const saved = localStorage.getItem('novatasks');
  if (saved) {
    const data = JSON.parse(saved);
    state.tasks = data.tasks || [];
    state.projects = data.projects || [];
    state.darkMatter = data.darkMatter || [];
  }
  
  // Default projects
  if (!state.projects.length) {
    state.projects = [
      { id: 'p1', name: 'Work', color: 'yellow' },
      { id: 'p2', name: 'Personal', color: 'blue' },
      { id: 'p3', name: 'Learning', color: 'orange' }
    ];
  }
  
  // Sample tasks
  if (!state.tasks.length) {
    const now = Date.now();
    state.tasks = [
      { id: genId(), title: 'Complete project proposal', project: 'p1', priority: 'critical', deadline: now + 86400000, tags: ['work'], x: 0, y: 0 },
      { id: genId(), title: 'Review code changes', project: 'p1', priority: 'high', deadline: now + 172800000, tags: ['code'], x: 0, y: 0 },
      { id: genId(), title: 'Schedule team meeting', project: 'p1', priority: 'medium', deadline: now + 259200000, tags: ['meeting'], x: 0, y: 0 },
      { id: genId(), title: 'Update documentation', project: 'p2', priority: 'low', deadline: null, tags: ['docs'], x: 0, y: 0 },
      { id: genId(), title: 'Learn new framework', project: 'p3', priority: 'medium', deadline: now + 604800000, tags: ['learning'], x: 0, y: 0 }
    ];
    positionTasks();
  }
  
  if (!state.darkMatter.length) {
    state.darkMatter = [
      { id: genId(), title: 'Redesign portfolio', desc: 'Someday project' },
      { id: genId(), title: 'Learn piano', desc: 'Maybe next year' }
    ];
  }
}

// Position tasks using gravity well logic
function positionTasks() {
  const centerX = window.innerWidth / 2 - 130;
  const centerY = (window.innerHeight - 60) / 2;
  
  state.tasks.forEach((task, i) => {
    const urgency = getUrgency(task);
    const distance = 100 + (1 - urgency) * 300;
    const angle = (i / state.tasks.length) * Math.PI * 2 + Math.random() * 0.5;
    task.x = centerX + Math.cos(angle) * distance;
    task.y = centerY + Math.sin(angle) * distance;
  });
}

function getUrgency(task) {
  if (!task.deadline) return 0.2;
  const hoursLeft = (task.deadline - Date.now()) / 3600000;
  if (hoursLeft < 0) return 1;
  if (hoursLeft < 24) return 0.9;
  if (hoursLeft < 72) return 0.7;
  if (hoursLeft < 168) return 0.5;
  return 0.3;
}

// Render functions
function renderAll() {
  renderProjects();
  renderTaskStars();
  renderMissionControl();
  renderDarkMatter();
  updateUrgentIndicator();
}

function renderProjects() {
  const list = document.getElementById('projectsList');
  const select = document.getElementById('taskProject');
  
  list.innerHTML = state.projects.map(p => {
    const count = state.tasks.filter(t => t.project === p.id).length;
    return `
      <div class="project-item${state.currentProject === p.id ? ' active' : ''}" onclick="selectProject('${p.id}')">
        <div class="project-sun ${p.color}"></div>
        <span class="project-name">${escHtml(p.name)}</span>
        <span class="project-count">${count}</span>
      </div>
    `;
  }).join('');
  
  select.innerHTML = '<option value="">No project</option>' + 
    state.projects.map(p => `<option value="${p.id}">${escHtml(p.name)}</option>`).join('');
}

function renderTaskStars() {
  const container = document.getElementById('taskStars');
  container.innerHTML = state.tasks.map(task => {
    const size = PRIORITY_SIZE[task.priority];
    const project = state.projects.find(p => p.id === task.project);
    const deadline = task.deadline ? formatDeadline(task.deadline) : 'No deadline';
    
    return `
      <div class="task-star star-${task.priority}" style="left:${task.x}px;top:${task.y}px" data-id="${task.id}"
        onmousedown="startDrag(event,'${task.id}')">
        <div class="star-glow" style="width:${size + 20}px;height:${size + 20}px"></div>
        <div class="star-body" style="width:${size}px;height:${size}px"></div>
        <div class="task-card">
          <div class="task-title">${escHtml(task.title)}</div>
          <div class="task-meta">
            <span>📅 ${deadline}</span>
            ${project ? `<span>☀️ ${project.name}</span>` : ''}
          </div>
          <div class="task-tags">
            ${task.tags.map((t, i) => `<span class="nebula-tag ${TAG_COLORS[i % TAG_COLORS.length]}">${escHtml(t)}</span>`).join('')}
          </div>
          <div class="task-actions">
            <button class="task-action complete" onclick="event.stopPropagation();completeTask('${task.id}')">✓ Complete</button>
            <button class="task-action" onclick="event.stopPropagation();openWormhole('${task.id}')">🌀 Wormhole</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderMissionControl() {
  const critical = state.tasks.filter(t => t.priority === 'critical').length;
  const active = state.tasks.length;
  document.getElementById('urgentTasks').textContent = critical;
  document.getElementById('activeTasks').textContent = active;
  
  // Next deadline
  const upcoming = state.tasks.filter(t => t.deadline).sort((a, b) => a.deadline - b.deadline)[0];
  const deadlineEl = document.getElementById('nextDeadline');
  if (upcoming) {
    deadlineEl.style.display = 'flex';
    document.getElementById('nextDeadlineTitle').textContent = upcoming.title.substring(0, 20);
  } else {
    deadlineEl.style.display = 'none';
  }
}

function startCountdown() {
  setInterval(() => {
    const upcoming = state.tasks.filter(t => t.deadline).sort((a, b) => a.deadline - b.deadline)[0];
    if (upcoming) {
      const diff = upcoming.deadline - Date.now();
      if (diff > 0) {
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('nextDeadlineTime').textContent = 
          `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      } else {
        document.getElementById('nextDeadlineTime').textContent = 'OVERDUE!';
      }
    }
  }, 1000);
}

function renderDarkMatter() {
  document.getElementById('dmCount').textContent = state.darkMatter.length;
  const list = document.getElementById('dmList');
  list.innerHTML = state.darkMatter.map(item => `
    <div class="dm-item">
      <div class="dm-item-title">${escHtml(item.title)}</div>
      <div class="dm-item-desc">${escHtml(item.desc || '')}</div>
      <div class="dm-item-actions">
        <button class="dm-action activate" onclick="activateFromDarkMatter('${item.id}')">🌟 Activate</button>
        <button class="dm-action" onclick="deleteDarkMatter('${item.id}')">🗑️ Delete</button>
      </div>
    </div>
  `).join('') || '<div style="text-align:center;color:var(--tx3);padding:20px">The void is empty</div>';
}

function updateUrgentIndicator() {
  const urgent = state.tasks.filter(t => t.deadline && t.deadline - Date.now() < 86400000).length;
  const indicator = document.getElementById('urgentIndicator');
  const count = document.getElementById('urgentCount');
  if (urgent > 0) {
    indicator.style.display = 'block';
    count.textContent = urgent + ' urgent';
  } else {
    indicator.style.display = 'none';
    count.textContent = '';
  }
}

// View switching
function setView(view) {
  state.currentView = view;
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`[onclick="setView('${view}')"]`).classList.add('active');
  
  document.getElementById('universeView').style.display = view === 'universe' ? 'block' : 'none';
  document.getElementById('solarView').classList.toggle('active', view === 'solar');
  document.getElementById('spacetimeView').classList.toggle('active', view === 'spacetime');
  
  if (view === 'solar') renderSolarView();
  if (view === 'spacetime') renderSpacetimeView();
}

function renderSolarView() {
  const orbitsEl = document.getElementById('orbits');
  const planetsEl = document.getElementById('planets');
  const project = state.projects.find(p => p.id === state.currentProject) || state.projects[0];
  
  document.getElementById('sunLabel').textContent = project ? project.name : 'Select a Project';
  
  const tasks = state.tasks.filter(t => t.project === (project?.id || state.projects[0]?.id));
  const maxDays = 30;
  
  orbitsEl.innerHTML = [1, 2, 3, 4].map(i => 
    `<div class="orbit" style="width:${i * 150}px;height:${i * 150}px"></div>`
  ).join('');
  
  planetsEl.innerHTML = tasks.map((task, i) => {
    const daysUntil = task.deadline ? Math.max(0, (task.deadline - Date.now()) / 86400000) : 15;
    const distance = 80 + (daysUntil / maxDays) * 220;
    const angle = (i / tasks.length) * Math.PI * 2;
    const x = Math.cos(angle) * distance;
    const y = Math.sin(angle) * distance;
    const size = PRIORITY_SIZE[task.priority] * 0.7;
    
    return `
      <div class="planet star-${task.priority}" style="left:calc(50% + ${x}px - ${size/2}px);top:calc(50% + ${y}px - ${size/2}px);width:${size}px;height:${size}px"
        title="${escHtml(task.title)}">
        <div class="planet-inner star-body" style="width:100%;height:100%"></div>
      </div>
    `;
  }).join('');
}

function renderSpacetimeView() {
  const container = document.getElementById('timelineNodes');
  const tasks = state.tasks.filter(t => t.deadline).sort((a, b) => a.deadline - b.deadline);
  
  container.innerHTML = tasks.slice(0, 7).map((task, i) => {
    const pos = 10 + (i / Math.max(tasks.length - 1, 1)) * 80;
    const color = { critical: 'var(--blue)', high: 'var(--yellow)', medium: 'var(--orange)', low: 'var(--red)' }[task.priority];
    
    return `
      <div class="timeline-node" style="left:${pos}%;color:${color}">
        <div class="timeline-dot" style="background:${color}"></div>
        <div class="timeline-label">
          <div style="font-weight:600">${escHtml(task.title.substring(0, 20))}</div>
          <div style="margin-top:4px">${formatDeadline(task.deadline)}</div>
        </div>
      </div>
    `;
  }).join('');
}

// Task interactions
let dragTask = null, dragOffset = { x: 0, y: 0 };

function startDrag(e, id) {
  if (e.target.closest('.task-action')) return;
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  dragTask = { id, task };
  dragOffset = { x: e.clientX - task.x, y: e.clientY - task.y };
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
}

function onDrag(e) {
  if (!dragTask) return;
  dragTask.task.x = e.clientX - dragOffset.x;
  dragTask.task.y = e.clientY - dragOffset.y;
  const el = document.querySelector(`[data-id="${dragTask.id}"]`);
  if (el) {
    el.style.left = dragTask.task.x + 'px';
    el.style.top = dragTask.task.y + 'px';
  }
}

function endDrag() {
  if (dragTask) saveState();
  dragTask = null;
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
}

// Complete task with supernova
function completeTask(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  
  // Get position
  const el = document.querySelector(`[data-id="${id}"]`);
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  
  // Create supernova explosion
  createSupernova(cx, cy, task.priority);
  
  // Remove task
  state.tasks = state.tasks.filter(t => t.id !== id);
  saveState();
  
  setTimeout(() => {
    renderAll();
    toast('⭐ Star went supernova!');
  }, 300);
}

function createSupernova(cx, cy, priority) {
  const colors = {
    critical: ['#4488ff', '#88aaff', '#aaccff'],
    high: ['#ffdd44', '#ffee88', '#ffffaa'],
    medium: ['#ff8844', '#ffaa66', '#ffcc88'],
    low: ['#ff4444', '#ff6666', '#ff8888']
  }[priority];
  
  // Flash
  const flash = document.createElement('div');
  flash.className = 'supernova-flash';
  flash.style.setProperty('--cx', cx + 'px');
  flash.style.setProperty('--cy', cy + 'px');
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 500);
  
  // Particles
  const container = document.createElement('div');
  container.className = 'supernova';
  container.style.left = cx + 'px';
  container.style.top = cy + 'px';
  
  for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.className = 'supernova-particle';
    const angle = (i / 30) * Math.PI * 2;
    const dist = 50 + Math.random() * 150;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    particle.style.setProperty('--tx', tx + 'px');
    particle.style.setProperty('--ty', ty + 'px');
    particle.style.width = particle.style.height = (4 + Math.random() * 8) + 'px';
    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
    particle.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
    container.appendChild(particle);
  }
  
  // Rings
  for (let i = 0; i < 3; i++) {
    const ring = document.createElement('div');
    ring.className = 'supernova-ring';
    ring.style.width = ring.style.height = '40px';
    ring.style.marginLeft = ring.style.marginTop = '-20px';
    ring.style.borderColor = colors[i];
    ring.style.animationDelay = (i * 0.15) + 's';
    container.appendChild(ring);
  }
  
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 1500);
}

// Wormhole
function openWormhole(id) {
  state.wormholeTask = state.tasks.find(t => t.id === id);
  if (!state.wormholeTask) return;
  
  document.getElementById('wormholeTask').innerHTML = `
    <div class="task-title">${escHtml(state.wormholeTask.title)}</div>
  `;
  
  document.getElementById('wormholeDestinations').innerHTML = state.projects
    .filter(p => p.id !== state.wormholeTask.project)
    .map(p => `
      <div class="wormhole-dest" onclick="teleportTask('${p.id}')">
        <div class="project-sun ${p.color}" style="width:20px;height:20px"></div>
        <span>${escHtml(p.name)}</span>
      </div>
    `).join('');
  
  document.getElementById('wormholeModal').classList.add('show');
}

function closeWormhole() {
  document.getElementById('wormholeModal').classList.remove('show');
  state.wormholeTask = null;
}

function teleportTask(projectId) {
  if (!state.wormholeTask) return;
  state.wormholeTask.project = projectId;
  saveState();
  closeWormhole();
  renderAll();
  toast('🌀 Task teleported through wormhole!');
}

// Dark Matter
function toggleDarkMatter() {
  document.getElementById('dmDrawer').classList.toggle('open');
}

function activateFromDarkMatter(id) {
  const item = state.darkMatter.find(i => i.id === id);
  if (!item) return;
  
  state.tasks.push({
    id: genId(),
    title: item.title,
    project: state.projects[0]?.id || null,
    priority: 'medium',
    deadline: null,
    tags: [],
    x: 300 + Math.random() * 200,
    y: 200 + Math.random() * 200
  });
  
  state.darkMatter = state.darkMatter.filter(i => i.id !== id);
  saveState();
  renderAll();
  toast('🌟 Task emerged from dark matter!');
}

function deleteDarkMatter(id) {
  state.darkMatter = state.darkMatter.filter(i => i.id !== id);
  saveState();
  renderDarkMatter();
}

// Add Task Modal
function showAddModal() {
  document.getElementById('addModal').classList.add('show');
  document.getElementById('taskTitle').focus();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('taskDeadline').value = '';
  state.tags = [];
  renderTagInput();
}

function setPriority(p) {
  state.selectedPriority = p;
  document.querySelectorAll('.priority-opt').forEach(opt => {
    opt.classList.toggle('active', opt.classList.contains(p));
  });
}

function addTag() {
  const tag = prompt('Enter tag name:');
  if (tag && !state.tags.includes(tag)) {
    state.tags.push(tag);
    renderTagInput();
  }
}

function removeTag(tag) {
  state.tags = state.tags.filter(t => t !== tag);
  renderTagInput();
}

function renderTagInput() {
  const container = document.getElementById('tagInput');
  container.innerHTML = state.tags.map((t, i) => `
    <div class="tag-chip nebula-tag ${TAG_COLORS[i % TAG_COLORS.length]}">
      ${escHtml(t)}
      <span class="remove" onclick="removeTag('${escHtml(t)}')">×</span>
    </div>
  `).join('') + '<button class="tag-add" onclick="addTag()">+ Add tag</button>';
}

function createTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) { toast('Enter a task name'); return; }
  
  const deadline = document.getElementById('taskDeadline').value;
  
  const task = {
    id: genId(),
    title,
    desc: document.getElementById('taskDesc').value.trim(),
    project: document.getElementById('taskProject').value || null,
    priority: state.selectedPriority,
    deadline: deadline ? new Date(deadline).getTime() : null,
    tags: [...state.tags],
    x: 300 + Math.random() * 300,
    y: 150 + Math.random() * 300
  };
  
  state.tasks.push(task);
  saveState();
  closeAddModal();
  renderAll();
  toast('✨ New star born in the universe!');
}

// Project selection
function selectProject(id) {
  state.currentProject = state.currentProject === id ? null : id;
  renderProjects();
  if (state.currentView === 'solar') renderSolarView();
}

// Search
function searchTasks(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.task-star').forEach(star => {
    const task = state.tasks.find(t => t.id === star.dataset.id);
    const match = !q || task?.title.toLowerCase().includes(q) || task?.tags.some(t => t.toLowerCase().includes(q));
    star.style.opacity = match ? 1 : 0.2;
  });
}

// Helpers
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
function escHtml(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
function formatDeadline(ts) {
  const diff = ts - Date.now();
  if (diff < 0) return 'Overdue';
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Tomorrow';
  if (days < 7) return days + ' days';
  return new Date(ts).toLocaleDateString();
}
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// Init
init();
</script>
</body>
</html>
