<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnippetVault — Code Snippet Library</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1c2333; --bg4: #21283b;
  --card: #161b22; --card-hover: #1c2333;
  --border: #21283b; --border2: #30363d; --border3: #3d4450;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681; --text4: #484f58;
  --accent: #58a6ff; --accent2: #79c0ff; --accent-bg: rgba(88,166,255,.08);
  --green: #3fb950; --green2: #56d364; --green-bg: rgba(63,185,80,.1);
  --red: #f85149; --red-bg: rgba(248,81,73,.1);
  --yellow: #d29922; --yellow-bg: rgba(210,153,34,.1);
  --purple: #bc8cff; --purple-bg: rgba(188,140,255,.1);
  --orange: #f0883e; --pink: #f778ba; --cyan: #76e3ea;
  --radius: 8px; --radius-lg: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif; min-height:100vh; line-height:1.5; }
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
::selection { background:rgba(88,166,255,.3); }

a { color:var(--accent); text-decoration:none; }
a:hover { text-decoration:underline; }

/* HEADER */
.header {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:0 24px; height:62px; display:flex; align-items:center;
  position:sticky; top:0; z-index:100; gap:20px;
}
.logo { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:700; flex-shrink:0; }
.logo-icon {
  width:32px; height:32px; background:linear-gradient(135deg,var(--accent),var(--purple));
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:16px; color:#fff;
}
.logo span { color:var(--accent); }

.search-bar {
  flex:1; max-width:560px; position:relative;
}
.search-bar input {
  width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:6px;
  padding:8px 14px 8px 36px; color:var(--text); font-size:13px; font-family:inherit;
  outline:none; transition:border-color .2s;
}
.search-bar input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(88,166,255,.15); }
.search-bar input::placeholder { color:var(--text3); }
.search-bar .search-icon {
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  color:var(--text3); font-size:14px; pointer-events:none;
}

.header-actions { display:flex; align-items:center; gap:8px; margin-left:auto; }

.btn {
  padding:7px 14px; border-radius:6px; border:1px solid var(--border2);
  background:var(--bg3); color:var(--text); font-size:12px; cursor:pointer;
  font-family:inherit; font-weight:500; display:inline-flex; align-items:center;
  gap:6px; transition:all .15s; white-space:nowrap;
}
.btn:hover { background:var(--bg4); border-color:var(--border3); }
.btn-primary { background:var(--green); border-color:var(--green); color:#fff; }
.btn-primary:hover { background:var(--green2); }
.btn-accent { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn-accent:hover { background:var(--accent2); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-danger { background:var(--red-bg); border-color:rgba(248,81,73,.3); color:var(--red); }
.btn-danger:hover { background:rgba(248,81,73,.2); }
.btn-ghost { background:transparent; border-color:transparent; }
.btn-ghost:hover { background:var(--bg3); }
.btn-icon { padding:6px 8px; }

/* LAYOUT */
.layout { display:flex; min-height:calc(100vh - 62px); }

.sidebar {
  width:256px; min-width:256px; background:var(--bg2); border-right:1px solid var(--border);
  padding:16px 12px; display:flex; flex-direction:column; gap:4px;
  position:sticky; top:62px; height:calc(100vh - 62px); overflow-y:auto;
}
.sidebar-section { margin-bottom:16px; }
.sidebar-title {
  font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text3);
  padding:6px 10px; font-weight:600;
}
.sidebar-item {
  display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:6px;
  cursor:pointer; transition:all .12s; color:var(--text2); font-size:13px;
}
.sidebar-item:hover { background:var(--bg3); color:var(--text); }
.sidebar-item.active { background:var(--accent-bg); color:var(--accent); font-weight:500; }
.sidebar-item .icon { width:18px; text-align:center; font-size:14px; }
.sidebar-item .count {
  margin-left:auto; font-size:10px; color:var(--text4); background:var(--bg);
  padding:1px 6px; border-radius:10px; font-weight:500;
}
.collection-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}

.main-content { flex:1; padding:24px; max-width:960px; }
.main-content.wide { max-width:100%; }

/* SNIPPET CARDS */
.feed-header {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;
}
.feed-header h2 { font-size:20px; font-weight:600; }
.feed-tabs { display:flex; gap:4px; }
.feed-tab {
  padding:5px 12px; border-radius:20px; cursor:pointer; font-size:12px;
  color:var(--text2); background:transparent; border:1px solid transparent;
  font-family:inherit; font-weight:500; transition:all .15s;
}
.feed-tab:hover { color:var(--text); background:var(--bg3); }
.feed-tab.active { background:var(--accent-bg); color:var(--accent); border-color:rgba(88,166,255,.2); }

.snippet-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg);
  margin-bottom:16px; overflow:hidden; transition:border-color .15s;
}
.snippet-card:hover { border-color:var(--border2); }
.snippet-header {
  padding:16px 20px 12px; display:flex; gap:12px; align-items:flex-start;
}
.snippet-votes {
  display:flex; flex-direction:column; align-items:center; gap:2px; min-width:36px; flex-shrink:0;
}
.vote-btn {
  background:none; border:none; cursor:pointer; color:var(--text3); font-size:16px;
  padding:2px; transition:color .15s; line-height:1;
}
.vote-btn:hover { color:var(--accent); }
.vote-btn.upvoted { color:var(--green); }
.vote-btn.downvoted { color:var(--red); }
.vote-count { font-size:14px; font-weight:700; color:var(--text); }

.snippet-info { flex:1; min-width:0; }
.snippet-title-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:4px; }
.snippet-title {
  font-size:16px; font-weight:600; cursor:pointer; color:var(--text);
  transition:color .15s;
}
.snippet-title:hover { color:var(--accent); }
.snippet-lang {
  font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600;
  text-transform:uppercase; letter-spacing:.5px;
}
.snippet-desc { font-size:13px; color:var(--text2); margin-bottom:8px; line-height:1.5; }
.snippet-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.tag {
  font-size:11px; padding:2px 8px; border-radius:20px; cursor:pointer;
  background:var(--accent-bg); color:var(--accent); border:1px solid transparent;
  transition:all .15s; font-weight:500;
}
.tag:hover { border-color:rgba(88,166,255,.3); background:rgba(88,166,255,.15); }

.snippet-meta {
  display:flex; align-items:center; gap:12px; font-size:11px; color:var(--text3);
  flex-wrap:wrap;
}
.snippet-meta .author { color:var(--text2); font-weight:500; }
.meta-sep { color:var(--text4); }
.snippet-actions { display:flex; gap:4px; margin-left:auto; }

/* CODE BLOCK */
.code-wrapper {
  border-top:1px solid var(--border); position:relative;
}
.code-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 16px; background:var(--bg); font-size:11px; color:var(--text3);
  border-bottom:1px solid var(--border);
}
.code-block {
  padding:16px; overflow-x:auto; font-family:'Cascadia Code','Fira Code','JetBrains Mono','SF Mono',Menlo,Consolas,monospace;
  font-size:13px; line-height:1.6; background:var(--bg); margin:0; tab-size:2;
  counter-reset:line;
}
.code-block .line { display:block; }
.code-block .line::before {
  counter-increment:line; content:counter(line);
  display:inline-block; width:2.5em; text-align:right; margin-right:1.5em;
  color:var(--text4); font-size:11px; user-select:none;
}

/* SYNTAX HIGHLIGHT COLORS */
.hl-keyword { color:#ff7b72; }
.hl-string { color:#a5d6ff; }
.hl-comment { color:#8b949e; font-style:italic; }
.hl-function { color:#d2a8ff; }
.hl-number { color:#79c0ff; }
.hl-type { color:#ffa657; }
.hl-operator { color:#ff7b72; }
.hl-property { color:#79c0ff; }
.hl-tag { color:#7ee787; }
.hl-attr { color:#79c0ff; }
.hl-value { color:#a5d6ff; }
.hl-builtin { color:#ffa657; }
.hl-regex { color:#d2a8ff; }
.hl-decorator { color:#ffa657; }
.hl-variable { color:#ffa657; }
.hl-punctuation { color:#8b949e; }

/* LANG COLORS */
.lang-javascript { background:rgba(241,224,90,.12); color:#f1e05a; }
.lang-python { background:rgba(53,114,165,.15); color:#3572a5; }
.lang-typescript { background:rgba(49,120,198,.15); color:#3178c6; }
.lang-rust { background:rgba(222,165,132,.12); color:#dea584; }
.lang-go { background:rgba(0,173,216,.12); color:#00add8; }
.lang-html { background:rgba(227,76,38,.12); color:#e34c26; }
.lang-css { background:rgba(86,61,124,.15); color:#563d7c; }
.lang-java { background:rgba(176,114,25,.12); color:#b07219; }
.lang-cpp { background:rgba(243,75,125,.12); color:#f34b7d; }
.lang-ruby { background:rgba(112,21,22,.15); color:#cc342d; }
.lang-php { background:rgba(79,93,149,.15); color:#4f5d95; }
.lang-swift { background:rgba(240,81,56,.12); color:#f05138; }
.lang-sql { background:rgba(229,195,76,.12); color:#e5c34c; }
.lang-bash { background:rgba(137,224,81,.12); color:#89e051; }
.lang-json { background:rgba(146,146,146,.12); color:#929292; }
.lang-csharp { background:rgba(23,134,0,.12); color:#178600; }
.lang-kotlin { background:rgba(169,123,255,.12); color:#a97bff; }
.lang-dart { background:rgba(0,180,171,.12); color:#00b4ab; }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200;
  display:none; align-items:flex-start; justify-content:center;
  overflow-y:auto; padding:40px 20px; backdrop-filter:blur(3px);
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg);
  width:100%; max-width:700px; box-shadow:0 16px 70px rgba(0,0,0,.5);
}
.modal-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 20px; border-bottom:1px solid var(--border);
}
.modal-header h2 { font-size:16px; font-weight:600; }
.modal-close {
  background:none; border:none; color:var(--text3); font-size:20px;
  cursor:pointer; padding:4px 8px; border-radius:4px;
}
.modal-close:hover { background:var(--bg3); color:var(--text); }
.modal-body { padding:20px; }
.modal-footer {
  display:flex; justify-content:flex-end; gap:8px;
  padding:14px 20px; border-top:1px solid var(--border);
}

.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; font-weight:500; }
.form-row { display:flex; gap:12px; }
.form-row > .form-group { flex:1; }
.form-input {
  width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:6px;
  padding:9px 12px; color:var(--text); font-size:13px; font-family:inherit;
  outline:none; transition:border-color .2s;
}
.form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(88,166,255,.1); }
textarea.form-input { min-height:60px; resize:vertical; }
.code-input {
  font-family:'Cascadia Code','Fira Code','SF Mono',Menlo,Consolas,monospace;
  min-height:180px; line-height:1.6; tab-size:2; font-size:13px;
}
select.form-input { cursor:pointer; }

.tags-input-wrapper {
  display:flex; flex-wrap:wrap; gap:4px; padding:6px 10px; min-height:38px;
  background:var(--bg); border:1px solid var(--border2); border-radius:6px;
  cursor:text; transition:border-color .2s; align-items:center;
}
.tags-input-wrapper:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px rgba(88,166,255,.1); }
.tags-input-wrapper .tag { padding:2px 6px; }
.tags-input-wrapper .tag .remove { cursor:pointer; margin-left:4px; opacity:.6; }
.tags-input-wrapper .tag .remove:hover { opacity:1; }
.tags-input-wrapper input {
  border:none; background:none; color:var(--text); font-size:12px;
  outline:none; flex:1; min-width:80px; font-family:inherit; padding:2px 0;
}

/* DETAIL VIEW */
.detail-back { margin-bottom:16px; }
.detail-header { margin-bottom:20px; }
.detail-title { font-size:24px; font-weight:700; margin-bottom:6px; }
.detail-meta-row {
  display:flex; align-items:center; gap:12px; font-size:12px; color:var(--text3);
  flex-wrap:wrap; margin-bottom:10px;
}
.detail-desc { font-size:14px; color:var(--text2); margin-bottom:16px; line-height:1.7; }
.detail-code-wrapper { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:20px; }
.detail-actions { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }

/* COMMENTS */
.comments-section { margin-top:24px; }
.comments-section h3 { font-size:15px; font-weight:600; margin-bottom:14px; }
.comment-input-row { display:flex; gap:10px; margin-bottom:20px; }
.comment-input-row .avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; font-weight:700; flex-shrink:0; }
.comment-input-row .form-input { flex:1; }
.comment-item { display:flex; gap:10px; padding:12px 0; border-top:1px solid var(--border); }
.comment-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; color:#fff; font-weight:700; flex-shrink:0; }
.comment-body { flex:1; }
.comment-header { font-size:12px; margin-bottom:2px; }
.comment-header .name { font-weight:600; color:var(--text); }
.comment-header .time { color:var(--text3); margin-left:8px; }
.comment-text { font-size:13px; color:var(--text2); line-height:1.5; }

/* COLLECTIONS */
.collections-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
.collection-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:20px; cursor:pointer; transition:all .15s;
}
.collection-card:hover { border-color:var(--border2); background:var(--card-hover); transform:translateY(-1px); }
.collection-card-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.collection-card-header .dot { width:12px; height:12px; border-radius:4px; flex-shrink:0; }
.collection-card-header h4 { font-size:14px; font-weight:600; }
.collection-card .desc { font-size:12px; color:var(--text3); margin-bottom:10px; }
.collection-card .stats { display:flex; gap:12px; font-size:11px; color:var(--text3); }

/* TOAST */
.toast {
  position:fixed; bottom:24px; right:24px; z-index:500;
  background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius);
  padding:12px 18px; font-size:13px; box-shadow:0 8px 30px rgba(0,0,0,.4);
  transform:translateY(100px); opacity:0; transition:all .3s; display:flex; align-items:center; gap:8px;
}
.toast.show { transform:translateY(0); opacity:1; }

/* EMPTY STATE */
.empty-state { text-align:center; padding:60px 20px; }
.empty-state .icon { font-size:48px; margin-bottom:12px; }
.empty-state .title { font-size:16px; font-weight:600; margin-bottom:4px; }
.empty-state .desc { font-size:13px; color:var(--text3); margin-bottom:16px; }

@media(max-width:900px) {
  .sidebar { display:none; }
  .header { padding:0 12px; gap:10px; }
  .main-content { padding:16px; }
  .form-row { flex-direction:column; gap:0; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">⟨⟩</div>
    <div>Snippet<span>Vault</span></div>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search snippets, tags, languages..." oninput="App.onSearch(this.value)">
  </div>
  <div class="header-actions">
    <button class="btn" onclick="App.navigate('collections')">📁 Collections</button>
    <button class="btn-primary btn" onclick="App.showCreateModal()">+ New Snippet</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content" id="main"></main>
</div>

<!-- CREATE/EDIT MODAL -->
<div class="modal-overlay" id="modal-create">
  <div class="modal" style="max-width:740px">
    <div class="modal-header">
      <h2 id="modal-create-title">Create New Snippet</h2>
      <button class="modal-close" onclick="App.closeModal('modal-create')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Title *</label>
        <input class="form-input" id="f-title" placeholder="A descriptive title for your snippet">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea class="form-input" id="f-desc" placeholder="Explain what this snippet does..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Language *</label>
          <select class="form-input" id="f-lang"></select>
        </div>
        <div class="form-group">
          <label>Visibility</label>
          <select class="form-input" id="f-visibility">
            <option value="public">Public</option><option value="private">Private</option><option value="unlisted">Unlisted</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Code *</label>
        <textarea class="form-input code-input" id="f-code" placeholder="Paste your code here..." onkeydown="App.handleTab(event,this)"></textarea>
      </div>
      <div class="form-group">
        <label>Tags</label>
        <div class="tags-input-wrapper" id="tags-wrapper" onclick="document.getElementById('f-tags-input').focus()">
          <input id="f-tags-input" placeholder="Add tags... (press Enter)" onkeydown="App.handleTagInput(event)">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Collection (optional)</label>
          <select class="form-input" id="f-collection"><option value="">None</option></select>
        </div>
        <div class="form-group">
          <label>Author</label>
          <input class="form-input" id="f-author" placeholder="Your name" value="Anonymous">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="App.closeModal('modal-create')">Cancel</button>
      <button class="btn-primary btn" onclick="App.saveSnippet()">Save Snippet</button>
    </div>
  </div>
</div>

<!-- COLLECTION MODAL -->
<div class="modal-overlay" id="modal-collection">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h2 id="modal-coll-title">Create Collection</h2>
      <button class="modal-close" onclick="App.closeModal('modal-collection')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Name *</label><input class="form-input" id="fc-name" placeholder="Collection name"></div>
      <div class="form-group"><label>Description</label><textarea class="form-input" id="fc-desc" placeholder="What's this collection about?"></textarea></div>
      <div class="form-group"><label>Color</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap" id="fc-colors"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="App.closeModal('modal-collection')">Cancel</button>
      <button class="btn-primary btn" onclick="App.saveCollection()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const uid=(()=>{let i=Date.now();return()=>'s'+(++i)})();
const escHtml=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const timeAgo=d=>{const s=Math.floor((Date.now()-new Date(d).getTime())/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';if(s<604800)return Math.floor(s/86400)+'d ago';return new Date(d).toLocaleDateString()};

const LANGUAGES=[
  {id:'javascript',name:'JavaScript',ext:'js'},
  {id:'typescript',name:'TypeScript',ext:'ts'},
  {id:'python',name:'Python',ext:'py'},
  {id:'rust',name:'Rust',ext:'rs'},
  {id:'go',name:'Go',ext:'go'},
  {id:'java',name:'Java',ext:'java'},
  {id:'csharp',name:'C#',ext:'cs'},
  {id:'cpp',name:'C++',ext:'cpp'},

  {id:uid(),title:'Debounce Function',desc:'A reusable debounce utility for limiting function calls. Perfect for search inputs and resize handlers.',lang:'javascript',code:`function debounce(fn, delay = 300) {\n  let timer;\n  return function (...args) {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn.apply(this, args), delay);\n  };\n}\n\n// Usage\nconst search = debounce((query) => {\n  console.log('Searching:', query);\n  fetch(\`/api/search?q=\${query}\`)\n    .then(res => res.json())\n    .then(data => renderResults(data));\n}, 350);`,tags:['utility','performance','events'],author:'DevMaster',votes:42,views:1280,date:'2025-01-15T10:30:00',comments:[{author:'CodeNinja',text:'Great implementation! I use this everywhere.',date:'2025-01-15T12:00:00',avatar:'#f0883e'},{author:'JSFan',text:'You could also add an immediate option for leading edge execution.',date:'2025-01-16T09:00:00',avatar:'#3fb950'}],collection:'',forks:5,bookmarked:true,visibility:'public'},
  {id:uid(),title:'Python Dict Deep Merge',desc:'Recursively merge nested dictionaries without overwriting existing nested structures.',lang:'python',code:`def deep_merge(base: dict, override: dict) -> dict:\n    """Recursively merge two dictionaries."""\n    result = base.copy()\n    for key, value in override.items():\n        if (\n            key in result\n            and isinstance(result[key], dict)\n            and isinstance(value, dict)\n        ):\n            result[key] = deep_merge(result[key], value)\n        else:\n            result[key] = value\n    return result\n\n# Example\nconfig_default = {\n    "database": {"host": "localhost", "port": 5432},\n    "cache": {"enabled": True, "ttl": 300}\n}\nconfig_override = {\n    "database": {"port": 5433, "name": "mydb"},\n    "debug": True\n}\nfinal = deep_merge(config_default, config_override)\nprint(final)`,tags:['dict','recursion','utility','config'],author:'PyWizard',votes:38,views:956,date:'2025-01-14T08:20:00',comments:[{author:'Pythonista',text:'Elegant solution. Works perfectly for config management.',date:'2025-01-14T10:00:00',avatar:'#a371f7'}],collection:'',forks:3,bookmarked:false,visibility:'public'},
  {id:uid(),title:'Rust Error Handling Pattern',desc:'Idiomatic Rust error handling with custom error types and the ? operator for clean propagation.',lang:'rust',code:`use std::fmt;\nuse std::io;\nuse std::num::ParseIntError;\n\n#[derive(Debug)]\nenum AppError {\n    Io(io::Error),\n    Parse(ParseIntError),\n    Custom(String),\n}\n\nimpl fmt::Display for AppError {\n    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n        match self {\n            AppError::Io(e) => write!(f, "IO error: {}", e),\n            AppError::Parse(e) => write!(f, "Parse error: {}", e),\n            AppError::Custom(msg) => write!(f, "{}", msg),\n        }\n    }\n}\n\nimpl From<io::Error> for AppError {\n    fn from(e: io::Error) -> Self { AppError::Io(e) }\n}\n\nimpl From<ParseIntError> for AppError {\n    fn from(e: ParseIntError) -> Self { AppError::Parse(e) }\n}\n\nfn read_config(path: &str) -> Result<u32, AppError> {\n    let content = std::fs::read_to_string(path)?;\n    let port: u32 = content.trim().parse()?;\n    if port > 65535 {\n        return Err(AppError::Custom("Invalid port".into()));\n    }\n    Ok(port)\n}`,tags:['error-handling','patterns','idiomatic'],author:'RustLover',votes:56,views:2100,date:'2025-01-12T15:45:00',comments:[],collection:'',forks:8,bookmarked:false,visibility:'public'},
  {id:uid(),title:'React Custom Hook: useLocalStorage',desc:'A TypeScript React hook that syncs state with localStorage, with SSR safety and type inference.',lang:'typescript',code:`import { useState, useEffect, useCallback } from 'react';\n\nfunction useLocalStorage<T>(\n  key: string,\n  initialValue: T\n): [T, (value: T | ((prev: T) => T)) => void, () => void] {\n  const [storedValue, setStoredValue] = useState<T>(() => {\n    if (typeof window === 'undefined') return initialValue;\n    try {\n      const item = window.localStorage.getItem(key);\n      return item ? JSON.parse(item) : initialValue;\n    } catch {\n      return initialValue;\n    }\n  });\n\n  useEffect(() => {\n    try {\n      window.localStorage.setItem(key, JSON.stringify(storedValue));\n    } catch (error) {\n      console.warn(\`Error setting localStorage key "\${key}":\`, error);\n    }\n  }, [key, storedValue]);\n\n  const remove = useCallback(() => {\n    setStoredValue(initialValue);\n    window.localStorage.removeItem(key);\n  }, [key, initialValue]);\n\n  return [storedValue, setStoredValue, remove];\n}\n\nexport default useLocalStorage;\n\n// Usage\n// const [theme, setTheme] = useLocalStorage('theme', 'dark');`,tags:['react','hooks','typescript','localstorage','state'],author:'ReactPro',votes:71,views:3400,date:'2025-01-10T09:15:00',comments:[{author:'FrontendDev',text:'This is exactly what I needed. The SSR safety check is a nice touch!',date:'2025-01-10T11:00:00',avatar:'#58a6ff'},{author:'TSEnthusiast',text:'Love the generic type inference. Clean API design.',date:'2025-01-11T08:00:00',avatar:'#bc8cff'},{author:'HookMaster',text:'Consider adding a window storage event listener for cross-tab sync.',date:'2025-01-12T14:00:00',avatar:'#f778ba'}],collection:'',forks:12,bookmarked:true,visibility:'public'},
  {id:uid(),title:'SQL Window Functions Cheatsheet',desc:'Common window function patterns for analytics: running totals, rankings, moving averages, and lag/lead.',lang:'sql',code:`-- Running total\nSELECT\n  order_date,\n  amount,\n  SUM(amount) OVER (\n    ORDER BY order_date\n    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n  ) AS running_total\nFROM orders;\n\n-- Rank within groups\nSELECT\n  department,\n  employee_name,\n  salary,\n  RANK() OVER (PARTITION BY department ORDER BY salary DESC) AS dept_rank,\n  DENSE_RANK() OVER (ORDER BY salary DESC) AS overall_rank\nFROM employees;\n\n-- Moving average (7-day)\nSELECT\n  date,\n  revenue,\n  AVG(revenue) OVER (\n    ORDER BY date\n    ROWS BETWEEN 6 PRECEDING AND CURRENT ROW\n  ) AS moving_avg_7d\nFROM daily_revenue;\n\n-- Compare with previous row\nSELECT\n  month,\n  revenue,\n  LAG(revenue, 1) OVER (ORDER BY month) AS prev_month,\n  revenue - LAG(revenue, 1) OVER (ORDER BY month) AS growth\nFROM monthly_stats;`,tags:['analytics','window-functions','cheatsheet','database'],author:'DataEngineer',votes:89,views:5200,date:'2025-01-08T11:00:00',comments:[],collection:'',forks:15,bookmarked:false,visibility:'public'},
  {id:uid(),title:'Go HTTP Middleware Pattern',desc:'Composable middleware pattern in Go using the standard library. Chain logging, auth, CORS, and recovery.',lang:'go',code:`package main\n\nimport (\n\t"log"\n\t"net/http"\n\t"time"\n)\n\ntype Middleware func(http.Handler) http.Handler\n\nfunc Chain(h http.Handler, middlewares ...Middleware) http.Handler {\n\tfor i := len(middlewares) - 1; i >= 0; i-- {\n\t\th = middlewares[i](h)\n\t}\n\treturn h\n}\n\nfunc Logger(next http.Handler) http.Handler {\n\treturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n\t\tstart := time.Now()\n\t\tnext.ServeHTTP(w, r)\n\t\tlog.Printf("%s %s %v", r.Method, r.URL.Path, time.Since(start))\n\t})\n}\n\nfunc Recovery(next http.Handler) http.Handler {\n\treturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n\t\tdefer func() {\n\t\t\tif err := recover(); err != nil {\n\t\t\t\tlog.Printf("panic: %v", err)\n\t\t\t\thttp.Error(w, "Internal Server Error", 500)\n\t\t\t}\n\t\t}()\n\t\tnext.ServeHTTP(w, r)\n\t})\n}\n\nfunc CORS(next http.Handler) http.Handler {\n\treturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n\t\tw.Header().Set("Access-Control-Allow-Origin", "*")\n\t\tw.Header().Set("Access-Control-Allow-Methods", "GET,POST,PUT,DELETE")\n\t\tif r.Method == "OPTIONS" { return }\n\t\tnext.ServeHTTP(w, r)\n\t})\n}\n\nfunc main() {\n\tmux := http.NewServeMux()\n\tmux.HandleFunc("/", func(w http.ResponseWriter, r *http.Request) {\n\t\tw.Write([]byte("Hello!"))\n\t})\n\thandler := Chain(mux, Recovery, Logger, CORS)\n\tlog.Fatal(http.ListenAndServe(":8080", handler))\n}`,tags:['middleware','http','patterns','web'],author:'GoGopher',votes:34,views:1890,date:'2025-01-06T14:30:00',comments:[],collection:'',forks:4,bookmarked:false,visibility:'public'},

  {id:uid(),title:'Bash Script Template',desc:'Production-ready Bash script template with error handling, argument parsing, logging, and cleanup traps.',lang:'bash',code:`#!/usr/bin/env bash\nset -euo pipefail\nIFS=$'\\n\\t'\n\n# --- Configuration ---\nSCRIPT_DIR="$(cd "$(dirname "\${BASH_SOURCE[0]}")" && pwd)"\nLOG_FILE="/tmp/$(basename "$0").log"\nVERBOSE=false\n\n# --- Colors ---\nRED='\\033[0;31m'\nGREEN='\\033[0;32m'\nYELLOW='\\033[1;33m'\nNC='\\033[0m'\n\n# --- Functions ---\nlog()   { echo -e "$(date '+%Y-%m-%d %H:%M:%S') $*" | tee -a "$LOG_FILE"; }\ninfo()  { log "\${GREEN}[INFO]\${NC}  $*"; }\nwarn()  { log "\${YELLOW}[WARN]\${NC}  $*"; }\nerror() { log "\${RED}[ERROR]\${NC} $*" >&2; }\ndie()   { error "$*"; exit 1; }\n\ncleanup() {\n  log "Cleaning up..."\n  # Remove temp files, release locks, etc.\n}\ntrap cleanup EXIT\n\nusage() {\n  cat <<EOF\nUsage: $(basename "$0") [OPTIONS] <command>\n\nOptions:\n  -v, --verbose    Enable verbose output\n  -h, --help       Show this help message\n\nCommands:\n  deploy    Deploy the application\n  rollback  Rollback to previous version\nEOF\n}\n\n# --- Argument Parsing ---\nwhile [[ $# -gt 0 ]]; do\n  case "$1" in\n    -v|--verbose) VERBOSE=true; shift ;;\n    -h|--help)    usage; exit 0 ;;\n    *)            break ;;\n  esac\ndone\n\n[[ $# -lt 1 ]] && { usage; exit 1; }\n\n# --- Main ---\ninfo "Starting script in $SCRIPT_DIR"\ninfo "Command: $1"\n\ncase "$1" in\n  deploy)   info "Deploying..." ;;\n  rollback) info "Rolling back..." ;;\n  *)        die "Unknown command: $1" ;;\nesac\n\ninfo "Done!"`,tags:['template','boilerplate','devops','scripting'],author:'SysAdmin',votes:61,views:3800,date:'2025-01-03T08:00:00',comments:[{author:'ShellWiz',text:'This is my go-to template for every new script. The trap cleanup is essential.',date:'2025-01-03T12:00:00',avatar:'#56d364'}],collection:'',forks:20,bookmarked:true,visibility:'public'},
  {id:uid(),title:'Java Stream API Patterns',desc:'Common Java Stream API patterns: filtering, grouping, collecting, reducing, and flatMapping with examples.',lang:'java',code:`import java.util.*;\nimport java.util.stream.*;\n\npublic class StreamPatterns {\n\n    record Employee(String name, String dept, double salary) {}\n\n    public static void main(String[] args) {\n        var employees = List.of(\n            new Employee("Alice", "Engineering", 95000),\n            new Employee("Bob", "Engineering", 88000),\n            new Employee("Charlie", "Marketing", 72000),\n            new Employee("Diana", "Marketing", 78000),\n            new Employee("Eve", "Engineering", 102000)\n        );\n\n        // Group by department\n        Map<String, List<Employee>> byDept = employees.stream()\n            .collect(Collectors.groupingBy(Employee::dept));\n\n        // Average salary per department\n        Map<String, Double> avgSalary = employees.stream()\n            .collect(Collectors.groupingBy(\n                Employee::dept,\n                Collectors.averagingDouble(Employee::salary)\n            ));\n\n        // Top earner per department\n        Map<String, Optional<Employee>> topEarners = employees.stream()\n            .collect(Collectors.groupingBy(\n                Employee::dept,\n                Collectors.maxBy(Comparator.comparing(Employee::salary))\n            ));\n\n        // Partition by salary threshold\n        Map<Boolean, List<Employee>> partition = employees.stream()\n            .collect(Collectors.partitioningBy(e -> e.salary() > 80000));\n\n        // Salary statistics\n        DoubleSummaryStatistics stats = employees.stream()\n            .mapToDouble(Employee::salary)\n            .summaryStatistics();\n\n        System.out.println("Avg: " + stats.getAverage());\n        System.out.println("Max: " + stats.getMax());\n    }\n}`,tags:['streams','collections','functional','patterns'],author:'JavaDev',votes:28,views:1650,date:'2025-01-0 /* ============================================
   SYNTAX HIGHLIGHTING
   ============================================ */
function highlight(code,lang) {
  let html = escHtml(code);
  const rules = {
    javascript: [
      [/\/\/.*$/gm, 'hl-comment'],
      [/\/\*[\s\S]*?\*\//g, 'hl-comment'],
      [/(["'`])(?:(?!\1|\\).|\\.)*\1/g, 'hl-string'],
      [/\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|new|this|class|extends|import|export|from|default|try|catch|finally|throw|async|await|yield|typeof|instanceof|in|of|delete|void)\b/g, 'hl-keyword'],
      [/\b(\d+\.?\d*)\b/g, 'hl-number'],
      [/\b([A-Z]\w+)\b/g, 'hl-type'],
      [/\b(\w+)(?=\s*\()/g, 'hl-function'],
      [/=&gt;/g, 'hl-operator'],
    ],
    typescript: null,
    python: [
      [/#.*$/gm, 'hl-comment'],
      [/("""[\s\S]*?"""|'''[\s\S]*?''')/g, 'hl-string'],
      [/(["'])(?:(?!\1|\\).|\\.)*\1/g, 'hl-string'],
      [/\b(def|class|if|elif|else|for|while|return|import|from|as|with|try|except|finally|raise|pass|break|continue|and|or|not|in|is|lambda|yield|async|await|True|False|None|self)\b/g, 'hl-keyword'],
      [/\b(\d+\.?\d*)\b/g, 'hl-number'],
      [/@\w+/g, 'hl-decorator'],
      [/\b(\w+)(?=\s*\()/g, 'hl-function'],
      [/\b(dict|list|tuple|set|str|int|float|bool|print|len|range|enumerate|zip|map|filter)\b/g, 'hl-builtin'],
    ],
    rust: [
      [/\/\/.*$/gm, 'hl-comment'],
      [/(["'])(?:(?!\1|\\).|\\.)*\1/g, 'hl-string'],
      [/\b(fn|let|mut|const|struct|enum|impl|trait|pub|use|mod|match|if|else|for|while|loop|return|self|Self|where|type|as|in|ref|move|async|await|unsafe|extern|crate|super|dyn|static)\b/g, 'hl-keyword'],
      [/\b(\d+\.?\d*)\b/g, 'hl-number'],
      [/\b([A-Z]\w+)\b/g, 'hl-type'],
      [/\b(\w+)(?=\s*[\(<])/g, 'hl-function'],
    ],
    go: [
      [/\/\/.*$/gm, 'hl-comment'],
      [/(["'`])(?:(?!\1|\\).|\\.)*\1/g, 'hl-string'],
      [/\b(func|package|import|var|const|type|struct|interface|map|chan|go|defer|return|if|else|for|range|switch|case|default|break|continue|select|fallthrough)\b/g, 'hl-keyword'],
      [/\b(\d+\.?\d*)\b/g, 'hl-number'],
      [/\b([A-Z]\w+)\b/g, 'hl-type'],
      [/\b(\w+)(?=\s*\()/g, 'hl-function'],
    ],
    sql: [
      [/--.*$/gm, 'hl-comment'],
      [/(["'])(?:(?!\1|\\).|\\.)*\1/g, 'hl-string'],
      [/\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AND|OR|NOT|IN|AS|ORDER|BY|GROUP|HAVING|LIMIT|OFFSET|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|ALTER|DROP|INDEX|DISTINCT|UNION|ALL|EXISTS|BETWEEN|LIKE|IS|NULL|COUNT|SUM|AVG|MIN|MAX|CASE|WHEN|THEN|ELSE|END|WITH|OVER|PARTITION|ROWS|RANGE|UNBOUNDED|PRECEDING|FOLLOWING|CURRENT|ROW|RANK|DENSE_RANK|ROW_NUMBER|LAG|LEAD|FIRST_VALUE|LAST_VALUE)\b/gi, 'hl-keyword'],
      [/\b(\d+\.?\d*)\b/g, 'hl-number'],
    ],
    css: [
      [/\/\*[\s\S]*?\*\//g, 'hl-comment'],
      [/(["'])(?:(?!\1|\\).|\\.)*\1/g, 'hl-string'],
      [/([.#][\w-]+)/g, 'hl-function'],
      [/\b(\d+\.?\d*(px|rem|em|%|vh|vw|fr|s|ms)?)\b/g, 'hl-number'],
      [/(--[\w-]+)/g, 'hl-variable'],
      [/@(media|container|keyframes|import|supports|layer|property)\b/g, 'hl-keyword'],
      [/\b(display|grid|flex|gap|padding|margin|border|background|color|font|position|width|height|min|max|repeat|auto-fit|auto-fill|minmax)\b/g, 'hl-property'],
    ],
    bash: [
      [/#.*$/gm, 'hl-comment'],
      [/(["'])(?:(?!\1|\\).|\\.)*\1/g, 'hl-string'],
      [/\b(if|then|else|elif|fi|for|while|do|done|case|esac|function|return|local|export|source|set|unset|shift|trap|exit|echo|read|cat|grep|sed|awk|find|xargs|sort|uniq|wc|head|tail|tee|chmod|chown|mkdir|rm|cp|mv|ln|cd|pwd|date|true|false)\b/g, 'hl-keyword'],
      [/\$\{?\w+\}?/g, 'hl-variable'],
      [/\b(\d+)\b/g, 'hl-number'],
    ],
    java: [
      [/\/\/.*$/gm, 'hl-comment'],
      [/\/\*[\s\S]*?\*\//g, 'hl-comment'],
      [/(["'])(?:(?!\1|\\).|\\.)*\1/g, 'hl-string'],
      [/\b(public|private|protected|class|interface|record|enum|extends|implements|static|final|void|return|if|else|for|while|do|switch|case|break|continue|new|this|super|try|catch|finally|throw|throws|import|package|abstract|synchronized|volatile|transient|native|default|var|yield|sealed|permits)\b/g, 'hl-keyword'],
      [/\b(\d+\.?\d*[fdlFDL]?)\b/g, 'hl-number'],
      [/\b([A-Z]\w+)\b/g, 'hl-type'],
      [/\b(\w+)(?=\s*\()/g, 'hl-function'],
      [/@\w+/g, 'hl-decorator'],
    ],
  };
  rules.typescript = rules.javascript;
  const langRules = rules[lang];
  if(!langRules) {
    const genericRules = [
      [/\/\/.*$/gm, 'hl-comment'], [/#.*$/gm, 'hl-comment'],
      [/(["'`])(?:(?!\1|\\).|\\.)*\1/g, 'hl-string'],
      [/\b(\d+\.?\d*)\b/g, 'hl-number'],
    ];
    for(const [re,cls] of genericRules) html = html.replace(re, m => `<span class="${cls}">${m}</span>`);
    return html;
  }
  const tokens = [];
  for(const [re, cls] of langRules) {
    let match;
    const regex = new RegExp(re.source, re.flags);
    while((match = regex.exec(html)) !== null) {
      tokens.push({ start: match.index, end: match.index + match[0].length, cls, text: match[0] });
    }
  }
  tokens.sort((a,b) => a.start - b.start);
  const filtered = [];
  let lastEnd = 0;
  for(const t of tokens) {
    if(t.start >= lastEnd) { filtered.push(t); lastEnd = t.end; }
  }
  let result = '';
  let pos = 0;
  for(const t of filtered) {
    result += html.slice(pos, t.start);
    result += `<span class="${t.cls}">${t.text}</span>`;
    pos = t.end;
  }
  result += html.slice(pos);
  return result;
}

function renderCode(code, lang) {
  const highlighted = highlight(code, lang);
  const lines = highlighted.split('\n');
  return lines.map(l => `<span class="line">${l}</span>`).join('\n');
}

  init() {
    this.load();
    if(!this.snippets.length) {
      this.snippets = SEED_SNIPPETS;
      this.collections = SEED_COLLECTIONS;
      SEED_SNIPPETS.forEach(s => { if(s.bookmarked) this.userBookmarks.add(s.id); });
      this.save();
    }
    this.populateLangDropdown();
    this.renderSidebar();
    this.navigate('feed');
  },

  load() {
    try {
      this.snippets = JSON.parse(localStorage.getItem('sv_snippets')) || [];
      this.collections = JSON.parse(localStorage.getItem('sv_collections')) || [];
      this.userVotes = JSON.parse(localStorage.getItem('sv_votes')) || {};
      this.userBookmarks = new Set(JSON.parse(localStorage.getItem('sv_bookmarks')) || []);
    } catch(e) {}
  },
  save() {
    try {
      localStorage.setItem('sv_snippets', JSON.stringify(this.snippets));
      localStorage.setItem('sv_collections', JSON.stringify(this.collections));
      localStorage.setItem('sv_votes', JSON.stringify(this.userVotes));
      localStorage.setItem('sv_bookmarks', JSON.stringify([...this.userBookmarks]));
    } catch(e) {}
  },

  populateLangDropdown() {
    $('f-lang').innerHTML = LANGUAGES.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
  },

  toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  },

  closeModal(id) { $(id).classList.remove('show'); },

  // =========== NAVIGATION ===========
  navigate(view, data) {
    this.currentView = view;
    this.renderSidebar();
    if(view === 'feed') this.renderFeed();
    else if(view === 'detail') this.renderDetail(data);
    else if(view === 'collections') this.renderCollections();
    else if(view === 'collection-detail') this.renderCollectionDetail(data);
    else this.renderFeed();
  },

  onSearch(q) {
    this.searchQuery = q.toLowerCase().trim();
    if(this.currentView === 'feed') this.renderFeed();
  },

  // =========== SIDEBAR ===========
  renderSidebar() {
    const allTags = {};
    this.snippets.forEach(s => s.tags.forEach(t => { allTags[t] = (allTags[t]||0)+1; }));
    const sortedTags = Object.entries(allTags).sort((a,b) => b[1]-a[1]).slice(0,15);
    const langCounts = {};
    this.snippets.forEach(s => { langCounts[s.lang] = (langCounts[s.lang]||0)+1; });

    $('sidebar').innerHTML = `
      <div class="sidebar-section">
        <div class="sidebar-title">Browse</div>
        <div class="sidebar-item ${this.currentView==='feed'&&this.currentFilter==='all'?'active':''}" onclick="App.setFilter('all')"><span class="icon">🏠</span>All Snippets<span class="count">${this.snippets.length}</span></div>
        <div class="sidebar-item ${this.currentFilter==='bookmarked'?'active':''}" onclick="App.setFilter('bookmarked')"><span class="icon">⭐</span>Bookmarked<span class="count">${this.userBookmarks.size}</span></div>
        <div class="sidebar-item ${this.currentFilter==='trending'?'active':''}" onclick="App.setFilter('trending')"><span class="icon">🔥</span>Trending</div>
        <div class="sidebar-item ${this.currentFilter==='recent'?'active':''}" onclick="App.setFilter('recent')"><span class="icon">🕐</span>Recent</div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Languages</div>
        ${LANGUAGES.filter(l=>langCounts[l.id]).map(l=>`
          <div class="sidebar-item ${this.currentFilter==='lang:'+l.id?'active':''}" onclick="App.setFilter('lang:${l.id}')">
            <span class="snippet-lang lang-${l.id}" style="font-size:9px;padding:1px 6px">${l.name}</span>
            <span class="count">${langCounts[l.id]||0}</span>
          </div>`).join('')}
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Collections</div>
        ${this.collections.map(c=>{
          const cnt=this.snippets.filter(s=>s.collection===c.id).length;
          return`<div class="sidebar-item" onclick="App.navigate('collection-detail','${c.id}')">
            <div class="collection-dot" style="background:${c.color}"></div>
            ${escHtml(c.name)}<span class="count">${cnt}</span>
          </div>`;
        }).join('')}
        <div class="sidebar-item" onclick="App.showCollectionModal()" style="color:var(--accent)"><span class="icon">+</span>New Collection</div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Popular Tags</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;padding:0 10px">
          ${sortedTags.map(([tag,count])=>`<span class="tag" onclick="App.toggleTagFilter('${tag}')" style="${this.selectedTags.includes(tag)?'background:rgba(88,166,255,.25);border-color:var(--accent)':''}">${tag}</span>`).join('')}
        </div>
      </div>`;
  },

  setFilter(filter) {
    this.currentFilter = filter;
    this.selectedTags = [];
    this.navigate('feed');
  },

  toggleTagFilter(tag) {
    const i = this.selectedTags.indexOf(tag);
    if(i >= 0) this.selectedTags.splice(i,1); else this.selectedTags.push(tag);
    this.currentFilter = 'all';
    this.navigate('feed');
  },

  // =========== FEED ===========
  getFilteredSnippets() {
    let list = [...this.snippets];
    if(this.currentFilter === 'bookmarked') list = list.filter(s => this.userBookmarks.has(s.id));
    else if(this.currentFilter.startsWith('lang:')) { const lang = this.currentFilter.split(':')[1]; list = list.filter(s => s.lang === lang); }
    if(this.selectedTags.length) list = list.filter(s => this.selectedTags.every(t => s.tags.includes(t)));
    if(this.searchQuery) {
      const q = this.searchQuery;
      list = list.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.desc.toLowerCase().includes(q) ||
        s.tags.some(t => t.includes(q)) ||
        s.lang.includes(q) ||
        s.author.toLowerCase().includes(q) ||
        s.code.toLowerCase().includes(q)
      );
    }
    if(this.currentSort === 'votes') list.sort((a,b) => b.votes - a.votes);
    else if(this.currentSort === 'recent') list.sort((a,b) => new Date(b.date) - new Date(a.date));
    else if(this.currentSort === 'views') list.sort((a,b) => b.views - a.views);
    else if(this.currentSort === 'comments') list.sort((a,b) => b.comments.length - a.comments.length);
    if(this.currentFilter === 'trending') { list.sort((a,b) => (b.votes * 2 + b.views * 0.01 + b.comments.length * 5) - (a.votes * 2 + a.views * 0.01 + a.comments.length * 5)); }
    if(this.currentFilter === 'recent') list.sort((a,b) => new Date(b.date) - new Date(a.date));
    return list;
  },

  renderFeed() {
    const snippets = this.getFilteredSnippets();
    const title = this.currentFilter === 'all' ? 'All Snippets' :
      this.currentFilter === 'bookmarked' ? 'Bookmarked' :
      this.currentFilter === 'trending' ? 'Trending' :
      this.currentFilter === 'recent' ? 'Recent' :
      this.currentFilter.startsWith('lang:') ? LANGUAGES.find(l=>l.id===this.currentFilter.split(':')[1])?.name || '' :
      'Snippets';

    $('main').innerHTML = `
      <div class="feed-header">
        <h2>${title} ${this.selectedTags.length?`<span style="font-size:13px;color:var(--text3);font-weight:400">filtered by: ${this.selectedTags.map(t=>`<span class="tag">${t}</span>`).join(' ')}</span>`:''}${this.searchQuery?`<span style="font-size:13px;color:var(--text3);font-weight:400"> matching "${escHtml(this.searchQuery)}"</span>`:''}</h2>
        <div class="feed-tabs">
          <button class="feed-tab ${this.currentSort==='votes'?'active':''}" onclick="App.setSort('votes')">🔥 Top</button>
          <button class="feed-tab ${this.currentSort==='recent'?'active':''}" onclick="App.setSort('recent')">🕐 New</button>
          <button class="feed-tab ${this.currentSort==='views'?'active':''}" onclick="App.setSort('views')">👀 Views</button>
          <button class="feed-tab ${this.currentSort==='comments'?'active':''}" onclick="App.setSort('comments')">💬 Discussed</button>
        </div>
      </div>
      ${snippets.length === 0 ? `<div class="empty-state"><div class="icon">🔍</div><div class="title">No snippets found</div><div class="desc">Try a different search or filter, or create a new snippet.</div><button class="btn-primary btn" onclick="App.showCreateModal()">+ Create Snippet</button></div>` : ''}
      <div id="snippet-feed">${snippets.map(s => this.renderSnippetCard(s)).join('')}</div>`;
  },

  setSort(sort) { this.currentSort = sort; this.renderFeed(); },

  renderSnippetCard(s) {
    const lang = LANGUAGES.find(l => l.id === s.lang);
    const voteState = this.userVotes[s.id] || 0;
    const bm = this.userBookmarks.has(s.id);
    const lines = s.code.split('\n');
    const preview = lines.slice(0, 8).join('\n') + (lines.length > 8 ? '\n// ...' : '');
    return `<div class="snippet-card">
      <div class="snippet-header">
        <div class="snippet-votes">
          <button class="vote-btn ${voteState===1?'upvoted':''}" onclick="App.vote('${s.id}',1)" title="Upvote">▲</button>
          <span class="vote-count">${s.votes}</span>
          <button class="vote-btn ${voteState===-1?'downvoted':''}" onclick="App.vote('${s.id}',-1)" title="Downvote">▼</button>
        </div>
        <div class="snippet-info">
          <div class="snippet-title-row">
            <span class="snippet-title" onclick="App.navigate('detail','${s.id}')">${escHtml(s.title)}</span>
            <span class="snippet-lang lang-${s.lang}">${lang ? lang.name : s.lang}</span>
          </div>
          <div class="snippet-desc">${escHtml(s.desc)}</div>
          <div class="snippet-tags">${s.tags.map(t => `<span class="tag" onclick="App.toggleTagFilter('${t}')">${t}</span>`).join('')}</div>
          <div class="snippet-meta">
            <span class="author">${escHtml(s.author)}</span>
            <span class="meta-sep">·</span>
            <span>${timeAgo(s.date)}</span>
            <span class="meta-sep">·</span>
            <span>👀 ${s.views}</span>
            <span class="meta-sep">·</span>
            <span>💬 ${s.comments.length}</span>
            <span class="meta-sep">·</span>
            <span>🔀 ${s.forks||0}</span>
            <div class="snippet-actions">
              <button class="btn btn-sm btn-ghost" onclick="App.toggleBookmark('${s.id}')" title="Bookmark">${bm?'⭐':'☆'}</button>
              <button class="btn btn-sm btn-ghost" onclick="App.copyCode('${s.id}')" title="Copy">📋</button>
              <button class="btn btn-sm btn-ghost" onclick="App.forkSnippet('${s.id}')" title="Fork">🔀</button>
            </div>
          </div>
        </div>
      </div>
      <div class="code-wrapper">
        <div class="code-header"><span>${lang?lang.name:s.lang} · ${lines.length} lines</span><button class="btn btn-sm btn-ghost" onclick="App.copyCode('${s.id}')">📋 Copy</button></div>
        <pre class="code-block">${renderCode(preview, s.lang)}</pre>
      </div>
    </div>`;
  },

  // =========== DETAIL ===========
  renderDetail(id) {
    const s = this.snippets.find(x => x.id === id);
    if(!s) return this.navigate('feed');
    this.detailId = id;
    s.views = (s.views||0) + 1;
    this.save();
    const lang = LANGUAGES.find(l => l.id === s.lang);
    const voteState = this.userVotes[s.id] || 0;
    const bm = this.userBookmarks.has(s.id);
    const lines = s.code.split('\n');
    const coll = s.collection ? this.collections.find(c => c.id === s.collection) : null;

    $('main').innerHTML = `
      <div class="detail-back"><button class="btn btn-sm btn-ghost" onclick="App.navigate('feed')">← Back to feed</button></div>
      <div class="detail-header">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <div class="snippet-votes" style="flex-direction:row;gap:6px">
            <button class="vote-btn ${voteState===1?'upvoted':''}" onclick="App.vote('${s.id}',1)" style="font-size:20px">▲</button>
            <span class="vote-count" style="font-size:18px">${s.votes}</span>
            <button class="vote-btn ${voteState===-1?'downvoted':''}" onclick="App.vote('${s.id}',-1)" style="font-size:20px">▼</button>
          </div>
          <div>
            <div class="detail-title">${escHtml(s.title)}</div>
            <div class="detail-meta-row">
              <span class="snippet-lang lang-${s.lang}">${lang?lang.name:s.lang}</span>
              <span>by <strong>${escHtml(s.author)}</strong></span>
              <span>·</span><span>${timeAgo(s.date)}</span>
              <span>·</span><span>👀 ${s.views} views</span>
              <span>·</span><span>🔀 ${s.forks||0} forks</span>
              ${coll?`<span>·</span><span style="display:flex;align-items:center;gap:4px"><div class="collection-dot" style="background:${coll.color};width:6px;height:6px"></div>${escHtml(coll.name)}</span>`:''}
            </div>
          </div>
        </div>
        <div class="detail-desc">${escHtml(s.desc)}</div>
        <div class="snippet-tags">${s.tags.map(t=>`<span class="tag" onclick="App.toggleTagFilter('${t}')">${t}</span>`).join('')}</div>
      </div>
      <div class="detail-actions">
        <button class="btn" onclick="App.copyCode('${s.id}')">📋 Copy Code</button>
        <button class="btn" onclick="App.toggleBookmark('${s.id}')">${bm?'⭐ Bookmarked':'☆ Bookmark'}</button>
        <button class="btn" onclick="App.forkSnippet('${s.id}')">🔀 Fork</button>
        <button class="btn" onclick="App.downloadSnippet('${s.id}')">📥 Download</button>
        <button class="btn" onclick="App.shareSnippet('${s.id}')">🔗 Share</button>
        <button class="btn" onclick="App.editSnippet('${s.id}')">✏️ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="App.deleteSnippet('${s.id}')">🗑 Delete</button>
      </div>
      <div class="detail-code-wrapper">
        <div class="code-header"><span>${lang?lang.name:s.lang} · ${lines.length} lines</span><button class="btn btn-sm btn-ghost" onclick="App.copyCode('${s.id}')">📋 Copy</button></div>
        <pre class="code-block">${renderCode(s.code, s.lang)}</pre>
      </div>
      <div class="comments-section">
        <h3>💬 Comments (${s.comments.length})</h3>
        <div class="comment-input-row">
          <div class="avatar">U</div>
          <input class="form-input" id="comment-input" placeholder="Add a comment..." onkeydown="if(event.key==='Enter')App.addComment('${s.id}')">
          <button class="btn btn-sm btn-accent" onclick="App.addComment('${s.id}')">Post</button>
        </div>
        ${s.comments.map(c => `<div class="comment-item">
          <div class="comment-avatar" style="background:${c.avatar||'var(--accent)'}">${(c.author||'U')[0]}</div>
          <div class="comment-body">
            <div class="comment-header"><span class="name">${escHtml(c.author||'Anonymous')}</span><span class="time">${timeAgo(c.date)}</span></div>
            <div class="comment-text">${escHtml(c.text)}</div>
          </div>
        </div>`).join('')}
      </div>`;
  },

  // =========== COLLECTIONS ===========
  renderCollections() {
    $('main').innerHTML = `
      <div class="feed-header"><h2>📁 Collections</h2>
        <button class="btn-primary btn" onclick="App.showCollectionModal()">+ New Collection</button>
      </div>
      <div class="collections-grid">
        ${this.collections.map(c => {
          const cnt = this.snippets.filter(s=>s.collection===c.id).length;
          const langs = [...new Set(this.snippets.filter(s=>s.collection===c.id).map(s=>s.lang))];
          return `<div class="collection-card" onclick="App.navigate('collection-detail','${c.id}')">
            <div class="collection-card-header">
              <div class="dot" style="background:${c.color}"></div>
              <h4>${escHtml(c.name)}</h4>
            </div>
            <div class="desc">${escHtml(c.desc||'')}</div>
            <div class="stats">
              <span>📄 ${cnt} snippets</span>
              ${langs.length?`<span>🗂 ${langs.map(l=>(LANGUAGES.find(x=>x.id===l)||{}).name||l).join(', ')}</span>`:''}
            </div>
          </div>`;
        }).join('')}
        ${this.collections.length===0?'<div class="empty-state"><div class="icon">📁</div><div class="title">No collections yet</div><div class="desc">Create a collection to organize your snippets.</div></div>':''}
      </div>`;
  },

  renderCollectionDetail(collId) {
    const coll = this.collections.find(c=>c.id===collId);
    if(!coll) return this.navigate('collections');
    const snippets = this.snippets.filter(s=>s.collection===collId);
    $('main').innerHTML = `
      <div class="detail-back">
        <button class="btn btn-sm btn-ghost" onclick="App.navigate('collections')">← Back to collections</button>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <div style="width:16px;height:16px;border-radius:4px;background:${coll.color}"></div>
        <h2 style="font-size:22px">${escHtml(coll.name)}</h2>
        <span style="color:var(--text3);font-size:13px">${snippets.length} snippets</span>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="btn btn-sm" onclick="App.editCollection('${coll.id}')">✏️ Edit</button>
          <button class="btn btn-sm btn-danger" onclick="App.deleteCollection('${coll.id}')">🗑</button>
        </div>
      </div>
      ${coll.desc?`<p style="color:var(--text2);margin-bottom:16px;font-size:13px">${escHtml(coll.desc)}</p>`:''}
      ${snippets.length===0?'<div class="empty-state"><div class="icon">📄</div><div class="title">Empty collection</div><div class="desc">Add snippets to this collection when creating or editing them.</div></div>':''}
      ${snippets.map(s => this.renderSnippetCard(s)).join('')}`;
  },

  // =========== ACTIONS ===========
  vote(id, dir) {
    const s = this.snippets.find(x=>x.id===id);if(!s) return;
    const current = this.userVotes[id] || 0;
    if(current === dir) { s.votes -= dir; delete this.userVotes[id]; }
    else { s.votes += dir - current; this.userVotes[id] = dir; }
    this.save();
    if(this.currentView==='detail') this.renderDetail(id); else this.renderFeed();
  },

  toggleBookmark(id) {
    if(this.userBookmarks.has(id)) { this.userBookmarks.delete(id); this.toast('Removed from bookmarks'); }
    else { this.userBookmarks.add(id); this.toast('⭐ Bookmarked!'); }
    this.save();
    if(this.currentView==='detail') this.renderDetail(id); else this.renderFeed();
    this.renderSidebar();
  },

  copyCode(id) {
    const s = this.snippets.find(x=>x.id===id);if(!s) return;
    navigator.clipboard.writeText(s.code).then(()=>this.toast('📋 Code copied to clipboard!'));
  },

  forkSnippet(id) {
    const s = this.snippets.find(x=>x.id===id);if(!s) return;
    const fork = {...JSON.parse(JSON.stringify(s)), id:uid(), title:'[Fork] '+s.title, votes:0, views:0, date:new Date().toISOString(), comments:[], forks:0, author:'You'};
    s.forks = (s.forks||0)+1;
    this.snippets.unshift(fork);
    this.save(); this.toast('🔀 Snippet forked!'); this.navigate('detail', fork.id);
  },

  downloadSnippet(id) {
    const s = this.snippets.find(x=>x.id===id);if(!s)return;
    const lang = LANGUAGES.find(l=>l.id===s.lang);
    const ext = lang?lang.ext:'txt';
    const blob = new Blob([s.code],{type:'text/plain'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = s.title.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()+'.'+ext;
    a.click(); URL.revokeObjectURL(a.href); this.toast('📥 Downloaded!');
  },

  shareSnippet(id) {
    const url = location.href.split('?')[0]+'?snippet='+id;
    navigator.clipboard.writeText(url).then(()=>this.toast('🔗 Link copied!'));
  },

  deleteSnippet(id) {
    if(!confirm('Delete this snippet permanently?'))return;
    this.snippets = this.snippets.filter(s=>s.id!==id);
    this.save(); this.toast('Snippet deleted'); this.navigate('feed');
  },

  addComment(snippetId) {
    const input = $('comment-input');
    const text = input.value.trim(); if(!text) return;
    const s = this.snippets.find(x=>x.id===snippetId);if(!s)return;
    const colors = ['#58a6ff','#3fb950','#d29922','#bc8cff','#f0883e','#f778ba','#76e3ea'];
    s.comments.push({author:'You',text,date:new Date().toISOString(),avatar:colors[Math.floor(Math.random()*colors.length)]});
    this.save(); input.value=''; this.renderDetail(snippetId);
  },

  // =========== CREATE/EDIT ===========
  showCreateModal() {
    this.editingId = null;
    $('modal-create-title').textContent = 'Create New Snippet';
    $('f-title').value=''; $('f-desc').value=''; $('f-lang').value='javascript';
    $('f-code').value=''; $('f-visibility').value='public'; $('f-author').value='Anonymous';
    this.formTags = [];
    this.updateFormTags();
    this.updateCollectionDropdown();
    $('f-collection').value='';
    this.showModal('modal-create');
    setTimeout(()=>$('f-title').focus(),100);
  },

  editSnippet(id) {
    const s = this.snippets.find(x=>x.id===id);if(!s) return;
    this.editingId = id;
    $('modal-create-title').textContent = 'Edit Snippet';
    $('f-title').value = s.title;
    $('f-desc').value = s.desc;
    $('f-lang').value = s.lang;
    $('f-code').value = s.code;
    $('f-visibility').value = s.visibility||'public';
    $('f-author').value = s.author;
    this.formTags = [...s.tags];
    this.updateFormTags();
    this.updateCollectionDropdown();
    $('f-collection').value = s.collection||'';
    this.showModal('modal-create');
  },

  saveSnippet() {
    const title = $('f-title').value.trim();
    const code = $('f-code').value;
    const lang = $('f-lang').value;
    if(!title) return alert('Title is required');
    if(!code) return alert('Code is required');
    const data = {
      title, desc:$('f-desc').value.trim(), lang, code,
      tags:[...this.formTags], visibility:$('f-visibility').value,
      author:$('f-author').value.trim()||'Anonymous',
      collection:$('f-collection').value||'',
    };
    if(this.editingId) {
      const s = this.snippets.find(x=>x.id===this.editingId);
      if(s) Object.assign(s, data);
      this.toast('✅ Snippet updated!');
    } else {
      this.snippets.unshift({
        id:uid(),...data,votes:0,views:0,forks:0,
        date:new Date().toISOString(),comments:[],bookmarked:false
      });
      this.toast('✅ Snippet created!');
    }
    this.save(); this.closeModal('modal-create');
    if(this.editingId && this.currentView==='detail') this.renderDetail(this.editingId);
    else this.navigate('feed');
    this.renderSidebar();
  },

  handleTagInput(e) {
    if(e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = e.target.value.trim().replace(/,/g,'').toLowerCase();
      if(val && !this.formTags.includes(val) && this.formTags.length < 10) {
        this.formTags.push(val);
        this.updateFormTags();
      }
      e.target.value = '';
    }
    if(e.key === 'Backspace' && !e.target.value && this.formTags.length) {
      this.formTags.pop();
      this.updateFormTags();
    }
  },

  removeFormTag(idx) { this.formTags.splice(idx,1); this.updateFormTags(); },

  updateFormTags() {
    const wrapper = $('tags-wrapper');
    const input = wrapper.querySelector('input');
    wrapper.querySelectorAll('.tag').forEach(t=>t.remove());
    this.formTags.forEach((t,i) => {
      const el = document.createElement('span');
      el.className = 'tag';
      el.innerHTML = `${escHtml(t)} <span class="remove" onclick="App.removeFormTag(${i})">&times;</span>`;
      wrapper.insertBefore(el, input);
    });
  },

  handleTab(e, el) {
    if(e.key === 'Tab') {
      e.preventDefault();
      const s = el.selectionStart, end = el.selectionEnd;
      el.value = el.value.substring(0,s)+'  '+el.value.substring(end);
      el.selectionStart = el.selectionEnd = s+2;
    }
  },

  updateCollectionDropdown() {
    $('f-collection').innerHTML = `<option value="">None</option>` +
      this.collections.map(c=>`<option value="${c.id}">${escHtml(c.name)}</option>`).join('');
  },

  // =========== COLLECTIONS CRUD ===========
  showCollectionModal(editId) {
    this.editingCollId = editId||null;
    const coll = editId ? this.collections.find(c=>c.id===editId) : null;
    $('modal-coll-title').textContent = coll ? 'Edit Collection' : 'Create Collection';
    $('fc-name').value = coll ? coll.name : '';
    $('fc-desc').value = coll ? coll.desc : '';
    this.collColor = coll ? coll.color : '#58a6ff';
    $('fc-colors').innerHTML = COLL_COLORS.map(c =>
      `<div style="width:24px;height:24px;border-radius:6px;background:${c};cursor:pointer;border:2px solid ${c===this.collColor?'#fff':'transparent'}" onclick="App.pickCollColor('${c}',this)"></div>`
    ).join('');
    this.showModal('modal-collection');
  },

  editCollection(id) { this.showCollectionModal(id); },

  pickCollColor(c, el) {
    this.collColor = c;
    el.parentElement.querySelectorAll('div').forEach(d => d.style.borderColor = 'transparent');
    el.style.borderColor = '#fff';
  },

  saveCollection() {
    const name = $('fc-name').value.trim();
    if(!name) return alert('Name is required');
    if(this.editingCollId) {
      const c = this.collections.find(x=>x.id===this.editingCollId);
      if(c) { c.name=name; c.desc=$('fc-desc').value.trim(); c.color=this.collColor; }
    } else {
      this.collections.push({id:uid(),name,desc:$('fc-desc').value.trim(),color:this.collColor});
    }
    this.save(); this.closeModal('modal-collection');
    this.toast('✅ Collection saved!');
    this.renderSidebar();
    if(this.currentView==='collections') this.renderCollections();
  },

  deleteCollection(id) {
    if(!confirm('Delete this collection? Snippets will be unassigned.'))return;
    this.snippets.forEach(s=>{if(s.collection===id)s.collection=''});
    this.collections = this.collections.filter(c=>c.id!==id);
    this.save(); this.toast('Collection deleted'); this.navigate('collections'); this.renderSidebar();
  },
};

App.init();
</script>
</body>
</html>
