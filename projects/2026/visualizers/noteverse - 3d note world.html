<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteVerse - 3D Note World</title>
    <style>
        :root {
            --bg: #0a0a12;
            --panel: rgba(15,15,25,0.95);
            --card: rgba(25,25,40,0.9);
            --border: rgba(100,100,150,0.3);
            --text: #e8e8f4;
            --muted: #8888aa;
            --accent: #6366f1;
            --accent2: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        #app { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }
        .logo {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .logo h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span { font-size: 11px; color: var(--muted); }
        
        .search-box {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 13px;
        }
        .search-box input:focus { outline: none; border-color: var(--accent); }
        
        .nav-section {
            padding: 10px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(99,102,241,0.2); color: var(--accent); }
        .nav-item .icon { font-size: 18px; }
        .nav-item .badge {
            margin-left: auto;
            background: var(--accent);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        .nav-item.trash .badge { background: var(--danger); }
        
        .tags-section {
            padding: 15px;
            border-top: 1px solid var(--border);
            flex: 1;
            overflow-y: auto;
        }
        .tags-title {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tag-item:hover { background: rgba(255,255,255,0.1); }
        .tag-dot { width: 8px; height: 8px; border-radius: 50%; }
        
        .new-note-btn {
            margin: 15px;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .new-note-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(99,102,241,0.4); }
        
        /* Canvas Container */
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #worldCanvas {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #worldCanvas:active { cursor: grabbing; }
        
        /* Controls */
        .world-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: var(--panel);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }
        .control-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        .control-btn:hover { background: rgba(255,255,255,0.1); }
        .control-btn.active { background: var(--accent); border-color: var(--accent); }
        
        .view-mode {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: var(--panel);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .stats-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--panel);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 12px;
        }
        .stat-row { display: flex; justify-content: space-between; gap: 20px; margin: 5px 0; }
        .stat-value { color: var(--accent); font-weight: 600; }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 500px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 50%;
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
        }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
        }
        .form-input:focus { outline: none; border-color: var(--accent); }
        textarea.form-input { min-height: 150px; resize: vertical; font-family: inherit; }
        
        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }
        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: white; }
        
        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            min-height: 50px;
        }
        .tag-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--accent);
            border-radius: 15px;
            font-size: 12px;
        }
        .tag-chip button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .tags-input input {
            flex: 1;
            min-width: 100px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 13px;
        }
        .tags-input input:focus { outline: none; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn:hover { transform: translateY(-1px); }
        
        /* Note Preview Panel */
        .preview-panel {
            position: absolute;
            right: -350px;
            top: 80px;
            width: 320px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            transition: right 0.3s;
            z-index: 50;
        }
        .preview-panel.active { right: 20px; }
        .preview-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .preview-content { padding: 15px; max-height: 400px; overflow-y: auto; }
        .preview-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .preview-text { font-size: 13px; color: var(--muted); line-height: 1.6; white-space: pre-wrap; }
        .preview-meta { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }
        .preview-actions { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .preview-actions .btn { flex: 1; }
        
        /* Toast */
        .toast-container { position: fixed; bottom: 100px; right: 20px; z-index: 2000; }
        .toast {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 10px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--accent); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Minimap */
        .minimap {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 150px;
            height: 100px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        #minimapCanvas { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="logo">
                <h1>🌌 NoteVerse</h1>
                <span>Your 3D Note Universe</span>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search notes...">
            </div>
            <nav class="nav-section">
                <div class="nav-item active" data-view="all"><span class="icon">📝</span>All Notes<span class="badge" id="allCount">0</span></div>
                <div class="nav-item" data-view="favorites"><span class="icon">⭐</span>Favorites<span class="badge" id="favCount">0</span></div>
                <div class="nav-item" data-view="recent"><span class="icon">🕐</span>Recent</div>
                <div class="nav-item" data-view="archived"><span class="icon">📦</span>Archived<span class="badge" id="archiveCount">0</span></div>
                <div class="nav-item trash" data-view="trash"><span class="icon">🗑️</span>Trash<span class="badge" id="trashCount">0</span></div>
            </nav>
            <div class="tags-section">
                <div class="tags-title">Tags</div>
                <div id="tagsList"></div>
            </div>
            <button class="new-note-btn" onclick="openNoteModal()">✨ Create New Note</button>
        </aside>
        
        <div class="canvas-container">
            <canvas id="worldCanvas"></canvas>
            
            <div class="stats-panel">
                <div class="stat-row"><span>Total Notes</span><span class="stat-value" id="statTotal">0</span></div>
                <div class="stat-row"><span>This Week</span><span class="stat-value" id="statWeek">0</span></div>
                <div class="stat-row"><span>World Size</span><span class="stat-value" id="statSize">0</span></div>
            </div>
            
            <div class="view-mode">
                <button class="control-btn active" data-mode="orbit" title="Orbit">🌐</button>
                <button class="control-btn" data-mode="grid" title="Grid View">📊</button>
                <button class="control-btn" data-mode="timeline" title="Timeline">📅</button>
                <button class="control-btn" data-mode="galaxy" title="Galaxy">🌌</button>
            </div>
            
            <div class="world-controls">
                <button class="control-btn" onclick="zoomIn()" title="Zoom In">➕</button>
                <button class="control-btn" onclick="zoomOut()" title="Zoom Out">➖</button>
                <button class="control-btn" onclick="resetView()" title="Reset View">🎯</button>
                <button class="control-btn" onclick="toggleAutoRotate()" id="autoRotateBtn" title="Auto Rotate">🔄</button>
                <button class="control-btn" onclick="shuffleNotes()" title="Shuffle">🎲</button>
            </div>
            
            <div class="minimap">
                <canvas id="minimapCanvas"></canvas>
            </div>
            
            <div class="preview-panel" id="previewPanel">
                <div class="preview-header">
                    <span>Note Preview</span>
                    <button class="modal-close" onclick="closePreview()">×</button>
                </div>
                <div class="preview-content">
                    <div class="preview-title" id="previewTitle"></div>
                    <div class="preview-text" id="previewText"></div>
                    <div class="preview-meta" id="previewMeta"></div>
                </div>
                <div class="preview-actions">
                    <button class="btn btn-secondary" onclick="editNote()">✏️ Edit</button>
                    <button class="btn btn-danger" onclick="deleteCurrentNote()">🗑️ Delete</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Note Modal -->
    <div class="modal-overlay" id="noteModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Create Note</span>
                <button class="modal-close" onclick="closeNoteModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-input" id="noteTitle" placeholder="Enter note title...">
                </div>
                <div class="form-group">
                    <label class="form-label">Content</label>
                    <textarea class="form-input" id="noteContent" placeholder="Write your note..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Color</label>
                    <div class="color-picker" id="colorPicker"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Tags (press Enter to add)</label>
                    <div class="tags-input" id="tagsInput">
                        <input type="text" id="tagInput" placeholder="Add tag...">
                    </div>
                </div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
                        <input type="checkbox" id="noteFavorite"> ⭐ Mark as favorite
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeNoteModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveNote()">💾 Save Note</button>
            </div>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ========== IndexedDB Setup ==========
        const DB_NAME = 'NoteVerseDB';
        const DB_VERSION = 1;
        let db;

        const COLORS = ['#6366f1','#ec4899','#10b981','#f59e0b','#ef4444','#06b6d4','#8b5cf6','#14b8a6','#f97316','#84cc16'];

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('notes')) {
                        const store = database.createObjectStore('notes', { keyPath: 'id' });
                        store.createIndex('status', 'status');
                        store.createIndex('createdAt', 'createdAt');
                        store.createIndex('favorite', 'favorite');
                    }
                };
            });
        }

        function dbOperation(storeName, mode, operation) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(storeName, mode);
                const store = transaction.objectStore(storeName);
                const request = operation(store);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function getAllNotes() {
            return dbOperation('notes', 'readonly', store => store.getAll());
        }

        async function addNote(note) {
            return dbOperation('notes', 'readwrite', store => store.add(note));
        }

        async function updateNote(note) {
            return dbOperation('notes', 'readwrite', store => store.put(note));
        }

        async function deleteNotePermanent(id) {
            return dbOperation('notes', 'readwrite', store => store.delete(id));
        }

        // ========== State ==========
        let state = {
            notes: [],
            currentView: 'all',
            selectedNote: null,
            editingNoteId: null,
            searchQuery: '',
            selectedTags: [],
            noteTags: [],
            camera: { x: 0, y: 0, z: 500, rotX: 0.3, rotY: 0 },
            autoRotate: true,
            viewMode: 'orbit',
            notePositions: new Map()
        };

        // ========== Canvas Setup ==========
        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        const miniCanvas = document.getElementById('minimapCanvas');
        const miniCtx = miniCanvas.getContext('2d');

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            miniCanvas.width = 150;
            miniCanvas.height = 100;
        }
        window.addEventListener('resize', resize);
        resize();

        // ========== 3D Math ==========
        function project(x, y, z) {
            const cosX = Math.cos(state.camera.rotX), sinX = Math.sin(state.camera.rotX);
            const cosY = Math.cos(state.camera.rotY), sinY = Math.sin(state.camera.rotY);
            
            let px = x - state.camera.x;
            let py = y - state.camera.y;
            let pz = z;
            
            const y1 = py * cosX - pz * sinX;
            const z1 = py * sinX + pz * cosX;
            const x1 = px * cosY + z1 * sinY;
            const z2 = -px * sinY + z1 * cosY;
            
            const scale = state.camera.z / (state.camera.z + z2);
            return {
                x: canvas.width / 2 + x1 * scale,
                y: canvas.height / 2 + y1 * scale,
                scale: scale,
                z: z2
            };
        }

        function generateNotePositions() {
            const notes = getFilteredNotes();
            const mode = state.viewMode;
            
            notes.forEach((note, i) => {
                let pos;
                switch (mode) {
                    case 'grid':
                        const cols = Math.ceil(Math.sqrt(notes.length));
                        const row = Math.floor(i / cols);
                        const col = i % cols;
                        pos = { x: (col - cols/2) * 150, y: (row - Math.ceil(notes.length/cols)/2) * 120, z: 0 };
                        break;
                    case 'timeline':
                        const dayMs = 86400000;
                        const now = Date.now();
                        const daysAgo = (now - note.createdAt) / dayMs;
                        pos = { x: -daysAgo * 50, y: (i % 5 - 2) * 100, z: Math.sin(i) * 50 };
                        break;
                    case 'galaxy':
                        const angle = (i / notes.length) * Math.PI * 6;
                        const radius = 50 + i * 15;
                        pos = { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius, z: Math.sin(i * 0.5) * 100 };
                        break;
                    default: // orbit
                        const phi = Math.acos(-1 + (2 * i) / notes.length);
                        const theta = Math.sqrt(notes.length * Math.PI) * phi;
                        const r = 200 + Math.random() * 100;
                        pos = { x: r * Math.cos(theta) * Math.sin(phi), y: r * Math.sin(theta) * Math.sin(phi), z: r * Math.cos(phi) };
                }
                state.notePositions.set(note.id, pos);
            });
        }

        // ========== Rendering ==========
        function render() {
            ctx.fillStyle = '#0a0a12';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stars background
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            for (let i = 0; i < 100; i++) {
                const x = (i * 137.5) % canvas.width;
                const y = (i * 73.3) % canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Grid floor
            ctx.strokeStyle = 'rgba(99,102,241,0.1)';
            ctx.lineWidth = 1;
            for (let i = -500; i <= 500; i += 50) {
                const p1 = project(i, 200, -500);
                const p2 = project(i, 200, 500);
                if (p1.scale > 0 && p2.scale > 0) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
                const p3 = project(-500, 200, i);
                const p4 = project(500, 200, i);
                if (p3.scale > 0 && p4.scale > 0) {
                    ctx.beginPath();
                    ctx.moveTo(p3.x, p3.y);
                    ctx.lineTo(p4.x, p4.y);
                    ctx.stroke();
                }
            }
            
            // Sort and render notes
            const notes = getFilteredNotes();
            const projected = notes.map(note => {
                const pos = state.notePositions.get(note.id) || { x: 0, y: 0, z: 0 };
                const p = project(pos.x, pos.y, pos.z);
                return { note, ...p, pos };
            }).filter(n => n.scale > 0).sort((a, b) => b.z - a.z);
            
            projected.forEach(({ note, x, y, scale }) => {
                const size = 80 * scale;
                const isSelected = state.selectedNote?.id === note.id;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(x, y + size/2 + 10, size/2, size/6, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Note card
                const gradient = ctx.createLinearGradient(x - size/2, y - size/2, x + size/2, y + size/2);
                gradient.addColorStop(0, note.color);
                gradient.addColorStop(1, note.color + '88');
                
                ctx.fillStyle = gradient;
                ctx.strokeStyle = isSelected ? '#fff' : 'rgba(255,255,255,0.2)';
                ctx.lineWidth = isSelected ? 3 : 1;
                
                roundRect(ctx, x - size/2, y - size/2, size, size * 0.8, 10 * scale);
                ctx.fill();
                ctx.stroke();
                
                // Title
                ctx.fillStyle = '#fff';
                ctx.font = `${Math.max(10, 14 * scale)}px system-ui`;
                ctx.textAlign = 'center';
                const title = note.title.length > 15 ? note.title.slice(0, 15) + '...' : note.title;
                ctx.fillText(title, x, y - size/6);
                
                // Icons
                if (note.favorite) {
                    ctx.font = `${12 * scale}px system-ui`;
                    ctx.fillText('⭐', x - size/3, y - size/3);
                }
                if (note.status === 'trash') {
                    ctx.fillText('🗑️', x + size/3, y - size/3);
                }
                
                // Preview lines
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = `${Math.max(8, 10 * scale)}px system-ui`;
                const preview = note.content.slice(0, 30);
                ctx.fillText(preview, x, y + size/6);
            });
            
            // Render minimap
            renderMinimap();
            
            if (state.autoRotate) {
                state.camera.rotY += 0.003;
            }
            
            requestAnimationFrame(render);
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function renderMinimap() {
            miniCtx.fillStyle = 'rgba(0,0,0,0.5)';
            miniCtx.fillRect(0, 0, 150, 100);
            
            const notes = getFilteredNotes();
            notes.forEach(note => {
                const pos = state.notePositions.get(note.id);
                if (!pos) return;
                const x = 75 + pos.x / 10;
                const y = 50 + pos.z / 10;
                miniCtx.fillStyle = note.color;
                miniCtx.beginPath();
                miniCtx.arc(x, y, 3, 0, Math.PI * 2);
                miniCtx.fill();
            });
            
            // Camera position
            miniCtx.fillStyle = '#fff';
            miniCtx.beginPath();
            miniCtx.arc(75 + state.camera.x / 10, 50, 4, 0, Math.PI * 2);
            miniCtx.fill();
        }

        // ========== Interaction ==========
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };

        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            lastMouse = { x: e.clientX, y: e.clientY };
            
            // Check for note click
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            
            const notes = getFilteredNotes();
            for (const note of notes) {
                const pos = state.notePositions.get(note.id);
                if (!pos) continue;
                const p = project(pos.x, pos.y, pos.z);
                const size = 80 * p.scale;
                if (mx > p.x - size/2 && mx < p.x + size/2 && my > p.y - size/2 && my < p.y + size/2) {
                    selectNote(note);
                    return;
                }
            }
        });

        canvas.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            state.camera.rotY += dx * 0.005;
            state.camera.rotX += dy * 0.005;
            state.camera.rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, state.camera.rotX));
            lastMouse = { x: e.clientX, y: e.clientY };
        });

        canvas.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mouseleave', () => isDragging = false);

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            state.camera.z += e.deltaY * 0.5;
            state.camera.z = Math.max(200, Math.min(1000, state.camera.z));
        });

        canvas.addEventListener('dblclick', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            
            const notes = getFilteredNotes();
            for (const note of notes) {
                const pos = state.notePositions.get(note.id);
                if (!pos) continue;
                const p = project(pos.x, pos.y, pos.z);
                const size = 80 * p.scale;
                if (mx > p.x - size/2 && mx < p.x + size/2 && my > p.y - size/2 && my < p.y + size/2) {
                    editNoteById(note.id);
                    return;
                }
            }
        });

        // ========== Note Operations ==========
        function getFilteredNotes() {
            let notes = state.notes;
            
            switch (state.currentView) {
                case 'favorites': notes = notes.filter(n => n.favorite && n.status === 'active'); break;
                case 'recent': notes = notes.filter(n => n.status === 'active').sort((a,b) => b.updatedAt - a.updatedAt).slice(0, 20); break;
                case 'archived': notes = notes.filter(n => n.status === 'archived'); break;
                case 'trash': notes = notes.filter(n => n.status === 'trash'); break;
                default: notes = notes.filter(n => n.status === 'active');
            }
            
            if (state.searchQuery) {
                const q = state.searchQuery.toLowerCase();
                notes = notes.filter(n => n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q));
            }
            
            if (state.selectedTags.length > 0) {
                notes = notes.filter(n => state.selectedTags.some(t => n.tags.includes(t)));
            }
            
            return notes;
        }

        function selectNote(note) {
            state.selectedNote = note;
            const panel = document.getElementById('previewPanel');
            panel.classList.add('active');
            document.getElementById('previewTitle').textContent = note.title;
            document.getElementById('previewText').textContent = note.content;
            document.getElementById('previewMeta').innerHTML = `
                <div>Created: ${new Date(note.createdAt).toLocaleDateString()}</div>
                <div>Tags: ${note.tags.length ? note.tags.join(', ') : 'None'}</div>
                <div>Status: ${note.status}</div>
            `;
        }

        function closePreview() {
            document.getElementById('previewPanel').classList.remove('active');
            state.selectedNote = null;
        }

        function openNoteModal(noteId = null) {
            state.editingNoteId = noteId;
            const modal = document.getElementById('noteModal');
            modal.classList.add('active');
            
            document.getElementById('modalTitle').textContent = noteId ? 'Edit Note' : 'Create Note';
            
            // Color picker
            const colorPicker = document.getElementById('colorPicker');
            colorPicker.innerHTML = COLORS.map((c, i) => 
                `<div class="color-option ${i === 0 ? 'selected' : ''}" style="background:${c}" data-color="${c}"></div>`
            ).join('');
            
            colorPicker.querySelectorAll('.color-option').forEach(el => {
                el.onclick = () => {
                    colorPicker.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
                    el.classList.add('selected');
                };
            });
            
            // Tags input
            document.getElementById('tagsInput').innerHTML = '<input type="text" id="tagInput" placeholder="Add tag...">';
            document.getElementById('tagInput').addEventListener('keydown', handleTagInput);
            
            if (noteId) {
                const note = state.notes.find(n => n.id === noteId);
                if (note) {
                    document.getElementById('noteTitle').value = note.title;
                    document.getElementById('noteContent').value = note.content;
                    document.getElementById('noteFavorite').checked = note.favorite;
                    
                    colorPicker.querySelectorAll('.color-option').forEach(el => {
                        el.classList.toggle('selected', el.dataset.color === note.color);
                    });
                    
                    const tagsContainer = document.getElementById('tagsInput');
                    note.tags.forEach(tag => addTagChip(tag, tagsContainer));
                }
            } else {
                document.getElementById('noteTitle').value = '';
                document.getElementById('noteContent').value = '';
                document.getElementById('noteFavorite').checked = false;
            }
        }

        function closeNoteModal() {
            document.getElementById('noteModal').classList.remove('active');
            state.editingNoteId = null;
        }

        function handleTagInput(e) {
            if (e.key === 'Enter' && e.target.value.trim()) {
                e.preventDefault();
                const tag = e.target.value.trim();
                addTagChip(tag, document.getElementById('tagsInput'));
                e.target.value = '';
            }
        }

        function addTagChip(tag, container) {
            const chip = document.createElement('span');
            chip.className = 'tag-chip';
            chip.innerHTML = `${tag}<button onclick="this.parentElement.remove()">×</button>`;
            container.insertBefore(chip, container.querySelector('input'));
        }

        async function saveNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            const color = document.querySelector('.color-option.selected')?.dataset.color || COLORS[0];
            const favorite = document.getElementById('noteFavorite').checked;
            const tags = Array.from(document.querySelectorAll('.tag-chip')).map(el => el.textContent.replace('×', '').trim());
            
            if (!title) { showToast('Please enter a title', 'error'); return; }
            
            const now = Date.now();
            
            if (state.editingNoteId) {
                const note = state.notes.find(n => n.id === state.editingNoteId);
                if (note) {
                    Object.assign(note, { title, content, color, favorite, tags, updatedAt: now });
                    await updateNote(note);
                    showToast('Note updated!', 'success');
                }
            } else {
                const note = {
                    id: 'note_' + now,
                    title, content, color, favorite, tags,
                    status: 'active',
                    createdAt: now,
                    updatedAt: now
                };
                await addNote(note);
                state.notes.push(note);
                showToast('Note created!', 'success');
            }
            
            closeNoteModal();
            generateNotePositions();
            updateUI();
        }

        function editNote() {
            if (state.selectedNote) {
                openNoteModal(state.selectedNote.id);
                closePreview();
            }
        }

        function editNoteById(id) {
            openNoteModal(id);
        }

        async function deleteCurrentNote() {
            if (!state.selectedNote) return;
            
            const note = state.selectedNote;
            if (note.status === 'trash') {
                // Permanent delete
                await deleteNotePermanent(note.id);
                state.notes = state.notes.filter(n => n.id !== note.id);
                showToast('Note permanently deleted', 'success');
            } else {
                // Move to trash
                note.status = 'trash';
                note.deletedAt = Date.now();
                await updateNote(note);
                showToast('Note moved to trash', 'info');
            }
            
            closePreview();
            generateNotePositions();
            updateUI();
        }

        async function restoreNote(id) {
            const note = state.notes.find(n => n.id === id);
            if (note) {
                note.status = 'active';
                delete note.deletedAt;
                await updateNote(note);
                showToast('Note restored', 'success');
                generateNotePositions();
                updateUI();
            }
        }

        // ========== UI Updates ==========
        function updateUI() {
            const active = state.notes.filter(n => n.status === 'active');
            const trash = state.notes.filter(n => n.status === 'trash');
            const archived = state.notes.filter(n => n.status === 'archived');
            const favs = active.filter(n => n.favorite);
            
            document.getElementById('allCount').textContent = active.length;
            document.getElementById('favCount').textContent = favs.length;
            document.getElementById('trashCount').textContent = trash.length;
            document.getElementById('archiveCount').textContent = archived.length;
            
            document.getElementById('statTotal').textContent = state.notes.length;
            const weekAgo = Date.now() - 7 * 86400000;
            document.getElementById('statWeek').textContent = state.notes.filter(n => n.createdAt > weekAgo).length;
            document.getElementById('statSize').textContent = getFilteredNotes().length;
            
            // Update tags
            const allTags = [...new Set(state.notes.flatMap(n => n.tags))];
            document.getElementById('tagsList').innerHTML = allTags.map(tag => 
                `<span class="tag-item" onclick="toggleTagFilter('${tag}')">
                    <span class="tag-dot" style="background:${COLORS[tag.length % COLORS.length]}"></span>${tag}
                </span>`
            ).join('');
        }

        function toggleTagFilter(tag) {
            const idx = state.selectedTags.indexOf(tag);
            if (idx >= 0) state.selectedTags.splice(idx, 1);
            else state.selectedTags.push(tag);
            generateNotePositions();
        }

        // ========== Controls ==========
        function zoomIn() { state.camera.z = Math.max(200, state.camera.z - 50); }
        function zoomOut() { state.camera.z = Math.min(1000, state.camera.z + 50); }
        function resetView() { state.camera = { x: 0, y: 0, z: 500, rotX: 0.3, rotY: 0 }; }
        function toggleAutoRotate() { 
            state.autoRotate = !state.autoRotate;
            document.getElementById('autoRotateBtn').classList.toggle('active', state.autoRotate);
        }
        function shuffleNotes() { generateNotePositions(); showToast('Notes shuffled!', 'info'); }

        // View mode buttons
        document.querySelectorAll('.view-mode .control-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.view-mode .control-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.viewMode = btn.dataset.mode;
                generateNotePositions();
            };
        });

        // Nav items
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                state.currentView = item.dataset.view;
                generateNotePositions();
                updateUI();
            };
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', e => {
            state.searchQuery = e.target.value;
            generateNotePositions();
        });

        // ========== Toast ==========
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ========== Init ==========
        async function init() {
            await initDB();
            state.notes = await getAllNotes();
            
            // Add sample notes if empty
            if (state.notes.length === 0) {
                const samples = [
                    { title: 'Welcome to NoteVerse! 🌌', content: 'This is your 3D note universe. Create, organize, and explore your notes in a beautiful 3D space.', color: '#6366f1', tags: ['welcome', 'tutorial'] },
                    { title: 'Getting Started', content: 'Click and drag to rotate the view. Scroll to zoom. Double-click a note to edit.', color: '#10b981', tags: ['tutorial'] },
                    { title: 'Pro Tips', content: '1. Use tags to organize notes\n2. Mark important notes as favorites\n3. Try different view modes!', color: '#f59e0b', tags: ['tips'] },
                    { title: 'Ideas Collection', content: 'A place for random ideas and inspiration...', color: '#ec4899', tags: ['ideas'] },
                    { title: 'Project Notes', content: 'Track your project progress here.', color: '#8b5cf6', tags: ['work', 'project'] }
                ];
                
                for (const s of samples) {
                    const note = {
                        id: 'note_' + Date.now() + Math.random(),
                        ...s,
                        favorite: false,
                        status: 'active',
                        createdAt: Date.now() - Math.random() * 86400000 * 7,
                        updatedAt: Date.now()
                    };
                    await addNote(note);
                    state.notes.push(note);
                }
            }
            
            generateNotePositions();
            updateUI();
            render();
        }

        init();
    </script>
</body>
