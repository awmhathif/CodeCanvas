// ===== SHADER PROGRAMS =====
function compileShader(src, type){
  const s = GL.createShader(type);
  GL.shaderSource(s, src);
  GL.compileShader(s);
  if(!GL.getShaderParameter(s, GL.COMPILE_STATUS)){
    console.error(GL.getShaderInfoLog(s));
    return null;
  }
  return s;
}
function createProgram(vs, fs){
  const p = GL.createProgram();
  GL.attachShader(p, compileShader(vs, GL.VERTEX_SHADER));
  GL.attachShader(p, compileShader(fs, GL.FRAGMENT_SHADER));
  GL.linkProgram(p);
  if(!GL.getProgramParameter(p, GL.LINK_STATUS)){
    console.error(GL.getProgramInfoLog(p));
    return null;
  }
  return p;
}

const QUAD_VS = `#version 300 es
in vec2 a_pos;
out vec2 vUv;
void main(){
  vUv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const MAIN_FS = `#version 300 es
precision highp float;
in vec2 vUv;
out vec4 fragColor;

uniform float uTime;
uniform float uPhase;       // 0-5 continuous
uniform vec2 uResolution;
uniform vec2 uMouse;
uniform float uDread;       // 0-1 accumulated dread
uniform float uZoom;        // zoom level for scale phase

// ===== NOISE FUNCTIONS =====
float hash(vec2 p){
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
}
float hash(vec3 p){
  return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453123);
}
float noise2d(vec2 p){
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float noise3d(vec3 p){
  vec3 i = floor(p);
  vec3 f = fract(p);
  f = f*f*(3.0-2.0*f);
  float n000 = hash(i);
  float n100 = hash(i+vec3(1,0,0));
  float n010 = hash(i+vec3(0,1,0));
  float n110 = hash(i+vec3(1,1,0));
  float n001 = hash(i+vec3(0,0,1));
  float n101 = hash(i+vec3(1,0,1));
  float n011 = hash(i+vec3(0,1,1));
  float n111 = hash(i+vec3(1,1,1));
  return mix(mix(mix(n000,n100,f.x),mix(n010,n110,f.x),f.y),
             mix(mix(n001,n101,f.x),mix(n011,n111,f.x),f.y),f.z);
}
float fbm(vec2 p, int oct){
  float v=0.0, a=0.5;
  mat2 rot = mat2(0.8,0.6,-0.6,0.8);
  for(int i=0;i<8;i++){
    if(i>=oct) break;
    v += a * noise2d(p);
    p = rot * p * 2.0;
    a *= 0.5;
  }
  return v;
}
float fbm3(vec3 p, int oct){
  float v=0.0, a=0.5;
  for(int i=0;i<6;i++){
    if(i>=oct) break;
    v += a * noise3d(p);
    p = p * 2.01 + vec3(0.1);
    a *= 0.5;
  }
  return v;
}

// ===== STARS =====
vec3 starfield(vec2 uv, float density, float depth){
  vec3 col = vec3(0.0);
  for(float layer = 0.0; layer < 4.0; layer++){
    vec2 grid = uv * (30.0 + layer * 40.0) * density;
    vec2 id = floor(grid);
    vec2 gv = fract(grid) - 0.5;
    for(int y=-1; y<=1; y++){
      for(int x=-1; x<=1; x++){
        vec2 offs = vec2(float(x), float(y));
        vec2 cellId = id + offs;
        float h = hash(cellId + layer * 100.0);
        if(h > 0.85 - depth*0.1){
          vec2 starPos = offs + vec2(hash(cellId*1.3+layer*7.0), hash(cellId*2.1+layer*13.0)) - 0.5 - gv;
          float d = length(starPos);
          float brightness = smoothstep(0.04 + layer*0.01, 0.0, d);
          brightness *= 0.3 + 0.7 * sin(uTime * (1.0 + h * 3.0) + h * 6.28) * 0.5 + 0.5;
          float temp = h;
          vec3 starCol = temp < 0.33 ? vec3(0.7,0.8,1.0) : temp < 0.66 ? vec3(1.0,0.95,0.8) : vec3(1.0,0.7,0.5);
          col += starCol * brightness * (1.0 - layer * 0.2);
        }
      }
    }
  }
  return col;
}

// ===== NEBULA =====
vec3 nebula(vec2 uv, float t){
  float n1 = fbm(uv * 2.0 + t * 0.02, 6);
  float n2 = fbm(uv * 3.0 - t * 0.015 + 100.0, 5);
  float n3 = fbm(uv * 1.5 + t * 0.01 + 200.0, 4);
  vec3 c1 = vec3(0.05, 0.02, 0.15) * n1;
  vec3 c2 = vec3(0.02, 0.05, 0.12) * n2;
  vec3 c3 = vec3(0.08, 0.01, 0.05) * n3;
  return (c1 + c2 + c3) * 0.8;
}

// ===== GALAXY SPIRAL =====
vec3 galaxy(vec2 uv, float t){
  vec2 center = uv - 0.5;
  float r = length(center);
  float angle = atan(center.y, center.x);
  float spiral = sin(angle * 2.0 - r * 15.0 + t * 0.1) * 0.5 + 0.5;
  float arm = smoothstep(0.0, 0.3, spiral) * exp(-r * 3.0);
  float core = exp(-r * 20.0);
  vec3 armCol = vec3(0.1, 0.15, 0.3) * arm;
  vec3 coreCol = vec3(0.3, 0.25, 0.15) * core;
  return armCol + coreCol;
}

// ===== VOID RENDER =====
vec3 theVoid(vec2 uv, float t){
  float d = length(uv - 0.5);
  float darkness = smoothstep(0.0, 0.5, d);
  float pulse = sin(t * 0.3) * 0.5 + 0.5;
  float voidNoise = fbm(uv * 5.0 + t * 0.05, 6);
  vec3 edge = vec3(0.02, 0.01, 0.04) * (1.0 - darkness) * voidNoise;
  float abyssPulse = smoothstep(0.4, 0.0, d) * pulse * 0.03;
  return edge + vec3(abyssPulse * 0.2, 0.0, abyssPulse);
}

// ===== ENTROPY VISUALIZATION =====
vec3 entropy(vec2 uv, float t){
  float dissolve = uDread;
  vec2 distorted = uv + vec2(
    fbm(uv * 4.0 + t * 0.1, 4) - 0.5,
    fbm(uv * 4.0 + t * 0.1 + 50.0, 4) - 0.5
  ) * dissolve * 0.3;
  float structure = fbm(distorted * 3.0, 6);
  structure = smoothstep(0.3 + dissolve * 0.3, 0.7, structure);
  vec3 col = mix(vec3(0.05, 0.08, 0.15), vec3(0.0), dissolve);
  col += vec3(0.1, 0.05, 0.02) * structure * (1.0 - dissolve);
  float particle = 0.0;
  for(float i=0.0;i<20.0;i++){
    vec2 p = vec2(hash(vec2(i,0.0)), hash(vec2(0.0,i)));
    p = fract(p + t * 0.01 * (1.0 + dissolve));
    float d = length(uv - p);
    particle += smoothstep(0.01, 0.0, d) * (1.0 - dissolve);
  }
  col += vec3(0.15, 0.1, 0.05) * particle;
  return col;
}

// ===== YOU (tiny human perspective) =====
vec3 youPhase(vec2 uv, float t){
  vec3 stars = starfield(uv, 1.5, 0.3);
  float d = length(uv - uMouse);
  float awareness = exp(-d * 8.0) * 0.05;
  vec3 glow = vec3(0.15, 0.04, 0.02) * awareness;
  float breathe = sin(t * 0.8) * 0.5 + 0.5;
  float heartGlow = exp(-d * 30.0) * breathe * 0.03;
  glow += vec3(0.2, 0.02, 0.02) * heartGlow;
  return stars * 0.3 + glow;
}

// ===== SILENCE =====
vec3 silence(vec2 uv, float t){
  float fade = sin(t * 0.1) * 0.5 + 0.5;
  float n = fbm(uv * 2.0, 3) * 0.02 * fade;
  return vec3(n * 0.5, n * 0.3, n);
}

void main(){
  vec2 uv = vUv;
  vec2 aspect = vec2(uResolution.x / uResolution.y, 1.0);
  float t = uTime;
  
  int ph = int(floor(uPhase));
  float blend = fract(uPhase);
  
  vec3 col = vec3(0.0);
  
  // Phase 0: SCALE — zoom through cosmic scales with starfield
  if(ph == 0){
    float zoom = uZoom;
    vec2 suv = (uv - 0.5) * aspect / max(zoom, 0.001) + 0.5;
    vec3 stars = starfield(suv, 1.0 + zoom * 0.5, 0.2);
    vec3 neb = nebula(suv, t);
    col = stars + neb;
    // Show a tiny marker for scale reference
    float markerD = length(uv - 0.5);
    float marker = smoothstep(0.003, 0.001, markerD);
    col += vec3(0.4, 0.1, 0.1) * marker * (sin(t*2.0)*0.5+0.5);
  }
  // Phase 1: TIME — flowing timeline, cosmic clock
  else if(ph == 1){
    vec2 flowUv = uv;
    flowUv.x += t * 0.02;
    vec3 timeNeb = nebula(flowUv, t);
    vec3 stars = starfield(flowUv, 0.8, 0.1);
    // Time stream
    float stream = sin(uv.y * 30.0 + t * 2.0 + fbm(uv * 5.0, 3) * 5.0) * 0.5 + 0.5;
    stream = smoothstep(0.7, 1.0, stream) * 0.05;
    vec3 timeCol = vec3(0.02, 0.05, 0.12) * stream;
    // Arrow of time
    float arrow = smoothstep(0.502, 0.498, abs(uv.y - 0.5));
    arrow *= (sin(uv.x * 50.0 - t * 5.0) * 0.5 + 0.5);
    col = stars * 0.4 + timeNeb + timeCol + vec3(0.02, 0.01, 0.04) * arrow;
  }
  // Phase 2: VOID
  else if(ph == 2){
    col = theVoid(uv, t);
    vec3 distantStars = starfield(uv * 0.3, 0.3, 0.05);
    col += distantStars * 0.15;
  }
  // Phase 3: ENTROPY
  else if(ph == 3){
    col = entropy(uv, t);
  }
  // Phase 4: YOU
  else if(ph == 4){
    col = youPhase(uv, t);
  }
  // Phase 5: SILENCE
  else if(ph == 5){
    col = silence(uv, t);
  }
  
  // Global vignette
  float vig = 1.0 - smoothstep(0.3, 0.85, length((uv - 0.5) * vec2(1.2, 1.0)));
  col *= vig * 0.8 + 0.2;
  
  // Dread tint — shifts color as dread accumulates
  col = mix(col, col * vec3(0.7, 0.8, 1.2), uDread * 0.3);
  
  // Film grain
  float grain = hash(uv * uResolution + fract(t) * 1000.0) * 0.02;
  col += grain;
  
  // Ensure we don't over-brighten
  col = clamp(col, 0.0, 1.0);
  
  fragColor = vec4(col, 1.0);
}`;

// Create program and get uniforms
const prog = createProgram(QUAD_VS, MAIN_FS);
const uTime = GL.getUniformLocation(prog, 'uTime');
const uPhase = GL.getUniformLocation(prog, 'uPhase');
const uRes = GL.getUniformLocation(prog, 'uResolution');
const uMouse = GL.getUniformLocation(prog, 'uMouse');
const uDread = GL.getUniformLocation(prog, 'uDread');
const uZoom = GL.getUniformLocation(prog, 'uZoom');

// Fullscreen quad
const quad = GL.createBuffer();
GL.bindBuffer(GL.ARRAY_BUFFER, quad);
GL.bufferData(GL.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), GL.STATIC_DRAW);
const aPos = GL.getAttribLocation(prog, 'a_pos');

// ===== STATE =====
let dread = 0;
let zoom = 1.0;
let targetZoom = 1.0;
let scaleIndex = 0;
let timeIndex = 0;
let voidIndex = 0;
let entropyIndex = 0;
let youIndex = 0;
let silenceIndex = 0;
let textFadeT = 0;
let textVisible = true;
let lastTextChange = 0;
let thoughtTimer = 0;
let hbPhase = 0;
let autoAdvance = true;

const PHASE_NAMES = ['I. THE SCALE OF SPACE', 'II. THE DEPTH OF TIME', 'III. THE VOID BETWEEN', 'IV. ENTROPY\'S ARROW', 'V. YOU ARE HERE', 'VI. THE SILENCE AFTER'];
const PHASE_INTERVALS = [8000, 10000, 9000, 9000, 10000, 12000]; // ms between fact changes per phase

// ===== DOM ELEMENTS =====
const mainTitle = document.getElementById('main-title');
const mainFact = document.getElementById('main-fact');
const mainQuote = document.getElementById('main-quote');
const phaseLabel = document.getElementById('phase-label');
const cosmicClock = document.getElementById('cosmic-clock');
const scaleLabel = document.getElementById('scale-label');
const youMarker = document.getElementById('you-marker');
const statsDiv = document.getElementById('stats');
const hbLine = document.getElementById('hb-line');
const dreadText = document.getElementById('dread-text');
const thoughtOverlay = document.getElementById('thought-overlay');

// ===== PHASE LOGIC =====
function setPhase(p){
  if(!started) return;
  phase = p;
  phaseT = 0;
  lastTextChange = -99999;
  updateButtons();
  updatePhaseLabel();
  updateContent(true);
  // Reset indices
  if(p === 0) scaleIndex = 0;
  if(p === 1) timeIndex = 0;
  if(p === 2) voidIndex = 0;
  if(p === 3) entropyIndex = 0;
  if(p === 4) youIndex = 0;
  if(p === 5) silenceIndex = 0;
}

function updateButtons(){
  for(let i=0;i<6;i++){
    const b = document.getElementById('b'+i);
    b.classList.toggle('active', i === phase);
  }
}

function updatePhaseLabel(){
  phaseLabel.textContent = PHASE_NAMES[phase];
  phaseLabel.style.opacity = '1';
}

function updateContent(force){
  const now = performance.now();
  const interval = PHASE_INTERVALS[phase];
  if(!force && now - lastTextChange < interval) return;
  lastTextChange = now;
  
  // Fade out, change, fade in
  dreadText.style.opacity = '0';
  setTimeout(() => {
    let data, idx;
    switch(phase){
      case 0:
        data = FACTS.scale[scaleIndex % FACTS.scale.length];
        mainTitle.textContent = data.title;
        mainFact.textContent = data.fact;
        mainQuote.textContent = '';
        scaleLabel.textContent = data.scale;
        targetZoom = Math.pow(0.5, scaleIndex);
        scaleIndex = (scaleIndex + 1) % FACTS.scale.length;
        break;
      case 1:
        data = FACTS.time[timeIndex % FACTS.time.length];
        mainTitle.textContent = data.title;
        mainFact.textContent = data.fact;
        mainQuote.textContent = data.time;
        scaleLabel.textContent = data.time;
        timeIndex = (timeIndex + 1) % FACTS.time.length;
        break;
      case 2:
        data = FACTS.void[voidIndex % FACTS.void.length];
        mainTitle.textContent = 'THE VOID';
        mainFact.textContent = data;
        mainQuote.textContent = '';
        scaleLabel.textContent = '∅';
        voidIndex = (voidIndex + 1) % FACTS.void.length;
        break;
      case 3:
        data = FACTS.entropy[entropyIndex % FACTS.entropy.length];
        mainTitle.textContent = 'ENTROPY';
        mainFact.textContent = data;
        mainQuote.textContent = 'S → S_max';
        scaleLabel.textContent = 'ΔS ≥ 0';
        entropyIndex = (entropyIndex + 1) % FACTS.entropy.length;
        break;
      case 4:
        data = FACTS.you[youIndex % FACTS.you.length];
        mainTitle.textContent = 'YOU';
        mainFact.textContent = data;
        mainQuote.textContent = '';
        scaleLabel.textContent = '1 / ∞';
        youIndex = (youIndex + 1) % FACTS.you.length;
        break;
      case 5:
        data = FACTS.silence[silenceIndex % FACTS.silence.length];
        mainTitle.textContent = '';
        mainFact.textContent = '';
        mainQuote.textContent = data;
        scaleLabel.textContent = '...';
        silenceIndex = (silenceIndex + 1) % FACTS.silence.length;
        break;
    }
    dreadText.style.opacity = '1';
  }, 1000);
}

// ===== FLOATING THOUGHTS =====
function spawnThought(){
  const el = document.createElement('div');
  el.className = 'floating-thought';
  el.textContent = FLOATING_THOUGHTS[Math.floor(Math.random() * FLOATING_THOUGHTS.length)];
  el.style.left = (10 + Math.random() * 80) + '%';
  el.style.top = (60 + Math.random() * 30) + '%';
  el.style.animationDuration = (15 + Math.random() * 15) + 's';
  el.style.fontSize = (8 + Math.random() * 5) + 'px';
  thoughtOverlay.appendChild(el);
  setTimeout(() => el.remove(), 30000);
}

// ===== HEARTBEAT =====
function updateHeartbeat(t){
  let points = '';
  for(let x = 0; x < 80; x++){
    let y = 10;
    const phase4 = phase === 4;
    const freq = phase4 ? 1.0 : 0.3;
    const amp = phase4 ? 6 : 2;
    const px = (x / 80) * Math.PI * 8;
    const beat = Math.exp(-((px % (Math.PI*2)) - 1.0) * ((px % (Math.PI*2)) - 1.0) * 2.0);
    y -= beat * amp * Math.sin(t * freq * 5 + px * 3) * (1.0 - dread * 0.5);
    points += x + ',' + y.toFixed(1) + ' ';
  }
  hbLine.setAttribute('points', points.trim());
  hbLine.setAttribute('stroke', phase === 4 ? '#441111' : '#221111');
}

// ===== YOU MARKER =====
function updateYouMarker(){
  if(phase === 4 || phase === 0){
    youMarker.style.opacity = '1';
    youMarker.style.left = (W/2 - 20) + 'px';
    youMarker.style.top = (H/2 - 20) + 'px';
  } else {
    youMarker.style.opacity = '0';
  }
}

// ===== COSMIC CLOCK =====
function updateCosmicClock(t){
  const age = 13.8e9; // universe age in years
  const elapsed = age + t * 1000; // pretend seconds = millennia for drama
  const heat = 1e100;
  const pct = (elapsed / heat * 100);
  
  let timeStr = '';
  if(phase === 1){
    const era = t < 10 ? 'Stelliferous Era' : t < 30 ? 'Degenerate Era' : t < 50 ? 'Black Hole Era' : 'Dark Era';
    timeStr = `COSMIC AGE: 13,800,000,000 years<br>ERA: ${era}<br>REMAINING: effectively ∞`;
  } else if(phase === 3){
    timeStr = `ENTROPY: increasing<br>STRUCTURE: dissolving<br>DREAD LEVEL: ${(dread*100).toFixed(1)}%`;
  } else if(phase === 4){
    timeStr = `YOUR LIFETIME: ~2.5 billion heartbeats<br>ELAPSED: ${Math.floor(t*80).toLocaleString()}<br>REMAINING: unknown`;
  } else if(phase === 5){
    timeStr = `...`;
  } else {
    timeStr = `OBSERVABLE: 93 billion ly<br>ZOOM: ${zoom.toExponential(2)}<br>SCALE INDEX: ${scaleIndex}/${FACTS.scale.length}`;
  }
  cosmicClock.innerHTML = timeStr;
}

// ===== STATS =====
function updateStats(){
  const elapsed = ((performance.now() - startTime) / 1000).toFixed(0);
  statsDiv.innerHTML = `RUNTIME: ${elapsed}s<br>PHASE: ${phase + 1}/6<br>DREAD: ${(dread*100).toFixed(1)}%<br>THOUGHTS: ${thoughtOverlay.children.length}`;
}

// ===== MOUSE =====
document.addEventListener('mousemove', e => {
  mouseX = e.clientX / W;
  mouseY = 1.0 - e.clientY / H;
});

document.addEventListener('wheel', e => {
  if(phase === 0){
    scrollAccum += e.deltaY * 0.001;
    targetZoom = Math.max(0.001, Math.min(10, targetZoom * (1 - e.deltaY * 0.002)));
  }
}, {passive:true});

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if(!started) { startExperience(); return; }
  const k = e.key;
  if(k >= '1' && k <= '6') setPhase(parseInt(k) - 1);
  if(k === 'ArrowRight'){
    if(phase < 5) setPhase(phase + 1);
  }
  if(k === 'ArrowLeft'){
    if(phase > 0) setPhase(phase - 1);
  }
  if(k === ' '){
    autoAdvance = !autoAdvance;
    e.preventDefault();
  }
});

// ===== START =====
let startTime = 0;

function startExperience(){
  if(started) return;
  started = true;
  startTime = performance.now();
  const intro = document.getElementById('intro-overlay');
  intro.style.opacity = '0';
  setTimeout(() => intro.style.display = 'none', 2000);
  setPhase(0);
  requestAnimationFrame(loop);
}

// ===== MAIN LOOP =====
function loop(now){
  if(!started) { requestAnimationFrame(loop); return; }
  
  const dt = 1/60;
  globalT = (now - startTime) / 1000;
  phaseT += dt;
  
  // Dread accumulates over time
  dread = Math.min(1.0, dread + dt * 0.003 * (1 + phase * 0.5));
  
  // Zoom interpolation
  zoom += (targetZoom - zoom) * 0.02;
  
  // Auto-advance content
  if(autoAdvance){
    updateContent(false);
  }
  
  // Floating thoughts
  thoughtTimer += dt;
  if(thoughtTimer > 4 + Math.random() * 3){
    thoughtTimer = 0;
    if(thoughtOverlay.children.length < 12) spawnThought();
  }
  
  // ===== RENDER =====
  GL.clearColor(0, 0, 0, 1);
  GL.clear(GL.COLOR_BUFFER_BIT);
  
  GL.useProgram(prog);
  GL.uniform1f(uTime, globalT);
  GL.uniform1f(uPhase, phase);
  GL.uniform2f(uRes, C.width, C.height);
  GL.uniform2f(uMouse, mouseX, mouseY);
  GL.uniform1f(uDread, dread);
  GL.uniform1f(uZoom, zoom);
  
  GL.bindBuffer(GL.ARRAY_BUFFER, quad);
  GL.enableVertexAttribArray(aPos);
  GL.vertexAttribPointer(aPos, 2, GL.FLOAT, false, 0, 0);
  GL.drawArrays(GL.TRIANGLE_STRIP, 0, 4);
  
  // DOM updates (throttled)
  if(Math.floor(globalT * 4) !== Math.floor((globalT - dt) * 4)){
    updateCosmicClock(globalT);
    updateStats();
    updateYouMarker();
  }
  updateHeartbeat(globalT);
  
  requestAnimationFrame(loop);
}

// Pre-start idle render
requestAnimationFrame(function idle(now){
  if(started) return;
  GL.clearColor(0,0,0,1);
  GL.clear(GL.COLOR_BUFFER_BIT);
  
  GL.useProgram(prog);
  GL.uniform1f(uTime, now/1000);
  GL.uniform1f(uPhase, 5); // silence by default
  GL.uniform2f(uRes, C.width, C.height);
  GL.uniform2f(uMouse, 0.5, 0.5);
  GL.uniform1f(uDread, 0);
  GL.uniform1f(uZoom, 1);
  
  GL.bindBuffer(GL.ARRAY_BUFFER, quad);
  GL.enableVertexAttribArray(aPos);
  GL.vertexAttribPointer(aPos, 2, GL.FLOAT, false, 0, 0);
  GL.drawArrays(GL.TRIANGLE_STRIP, 0, 4);
  
  requestAnimationFrame(idle);
});
</script>
