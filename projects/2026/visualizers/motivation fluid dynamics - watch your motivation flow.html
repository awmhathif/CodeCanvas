<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motivation Fluid Dynamics - Watch Your Motivation Flow</title>
    <style>
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #101018;
            --bg-tertiary: #18182a;
            --bg-card: #1a1a2e;
            --text-primary: #e8e8f4;
            --text-secondary: #9898b8;
            --text-muted: #5858780;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --fluid-primary: #3b82f6;
            --fluid-secondary: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #2a2a40;
            --border-light: #3a3a55;
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, var(--bg-secondary), transparent);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--fluid-primary), var(--fluid-secondary));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--fluid-primary), var(--fluid-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            justify-content: center;
            border-radius: 50%;
        }

        select.scenario-select {
            padding: 10px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            height: 100vh;
            padding-top: 76px;
        }

        /* Side Panels */
        .side-panel {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .side-panel.right {
            border-right: none;
            border-left: 1px solid var(--border);
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title-icon {
            font-size: 20px;
        }

        .add-btn {
            width: 32px;
            height: 32px;
            background: var(--accent-primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .add-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .item-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .item-card:hover {
            border-color: var(--accent-primary);
        }

        .item-card.inactive {
            opacity: 0.5;
        }

        .item-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .item-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .item-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
        }

        .item-toggle {
            width: 40px;
            height: 22px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 11px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
        }

        .item-toggle.active {
            background: var(--success);
        }

        .item-toggle::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }

        .item-toggle.active::after {
            transform: translateX(18px);
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rate-label {
            font-size: 11px;
            color: var(--text-muted);
            min-width: 65px;
        }

        .rate-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--bg-tertiary);
            border-radius: 3px;
            cursor: pointer;
        }

        .rate-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
        }

        .rate-value {
            font-size: 12px;
            font-weight: 600;
            min-width: 24px;
            text-align: right;
        }

        .item-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .item-action-btn {
            flex: 1;
            padding: 6px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .item-action-btn:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .item-action-btn.boost {
            border-color: var(--success);
            color: var(--success);
        }

        .item-action-btn.plug {
            border-color: var(--warning);
            color: var(--warning);
        }

        /* Center Container */
        .center-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Tank Container */
        .tank-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .tank-wrapper {
            position: relative;
            width: 400px;
            height: 500px;
        }

        #fluidCanvas {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: var(--radius);
        }

        .tank-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            border: 4px solid var(--border-light);
            border-radius: var(--radius);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        .tank-label {
            position: absolute;
            left: -60px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .level-markers {
            position: absolute;
            right: -40px;
            top: 0;
            bottom: 0;
            width: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px 0;
        }

        .level-mark {
            font-size: 10px;
            color: var(--text-muted);
            text-align: left;
        }

        /* Flow Indicators */
        .flow-indicator {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .flow-in {
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--success);
            border-color: var(--success);
        }

        .flow-out {
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--danger);
            border-color: var(--danger);
        }

        /* Stats Dashboard */
        .stats-dashboard {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 20px;
            min-width: 140px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
        }

        .stat-value.positive { color: var(--success); }
        .stat-value.negative { color: var(--danger); }
        .stat-value.neutral { color: var(--fluid-primary); }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-chart {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            height: 80px;
            position: relative;
            overflow: hidden;
        }

        #historyCanvas {
            width: 100%;
            height: 100%;
        }

        /* Gauge */
        .gauge-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
        }

        #gaugeCanvas {
            width: 100%;
            height: 100%;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 420px;
            max-width: 90vw;
            box-shadow: var(--shadow);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-tertiary);
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .type-option {
            padding: 10px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            transition: all 0.2s;
        }

        .type-option:hover {
            border-color: var(--accent-primary);
        }

        .type-option.selected {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.2);
        }

        .type-option-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 100px;
            right: 24px;
            z-index: 300;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 20px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.warning { border-left: 4px solid var(--warning); }
        .toast.danger { border-left: 4px solid var(--danger); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Responsive */
        @media (max-width: 1200px) {
            .side-panel { width: 240px; }
            .tank-wrapper { width: 320px; height: 400px; }
        }

        @media (max-width: 900px) {
            .side-panel { display: none; }
            .stats-dashboard { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">💧</div>
            <div class="logo-text">
                <h1>Motivation Fluid Dynamics</h1>
                <span>Watch your motivation flow</span>
            </div>
        </div>
        <div class="header-controls">
            <select class="scenario-select" id="scenarioSelect" onchange="loadScenario()">
                <option value="balanced">Balanced Day</option>
                <option value="morning">Morning Energy</option>
                <option value="slump">Afternoon Slump</option>
                <option value="flow">Flow State</option>
                <option value="crisis">Crisis Mode</option>
                <option value="burnout">Burnout</option>
                <option value="custom">Custom</option>
            </select>
            <button class="btn btn-secondary" onclick="resetSimulation()">🔄 Reset</button>
            <button class="btn btn-primary" onclick="toggleSimulation()">
                <span id="simToggleIcon">⏸️</span>
                <span id="simToggleText">Pause</span>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sources Panel -->
        <aside class="side-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="panel-title-icon">⬆️</span>
                    Sources
                </div>
                <button class="add-btn" onclick="openSourceModal()">+</button>
            </div>
            <div class="panel-content" id="sourcesPanel"></div>
        </aside>

        <!-- Center Container -->
        <div class="center-container">
            <div class="tank-container">
                <div class="tank-wrapper">
                    <canvas id="fluidCanvas"></canvas>
                    <div class="tank-overlay"></div>
                    <div class="tank-label">MOTIVATION</div>
                    <div class="level-markers">
                        <span class="level-mark">100%</span>
                        <span class="level-mark">75%</span>
                        <span class="level-mark">50%</span>
                        <span class="level-mark">25%</span>
                        <span class="level-mark">0%</span>
                    </div>
                    <div class="flow-indicator flow-in" id="flowInIndicator">
                        <span>⬇️</span>
                        <span id="flowInRate">+0.0</span>/s
                    </div>
                    <div class="flow-indicator flow-out" id="flowOutIndicator">
                        <span>⬆️</span>
                        <span id="flowOutRate">-0.0</span>/s
                    </div>
                </div>
                <div class="gauge-container">
                    <canvas id="gaugeCanvas"></canvas>
                </div>
            </div>

            <!-- Stats Dashboard -->
            <div class="stats-dashboard">
                <div class="stat-card">
                    <div class="stat-value neutral" id="levelValue">50%</div>
                    <div class="stat-label">Current Level</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="netFlowValue">+0.0</div>
                    <div class="stat-label">Net Flow</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value neutral" id="timeEstimate">--</div>
                    <div class="stat-label">Time to Change</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="biggestDrain">--</div>
                    <div class="stat-label">Biggest Drain</div>
                </div>
                <div class="history-chart">
                    <canvas id="historyCanvas"></canvas>
                </div>
            </div>
        </div>

        <!-- Drains Panel -->
        <aside class="side-panel right">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="panel-title-icon">⬇️</span>
                    Drains
                </div>
                <button class="add-btn" onclick="openDrainModal()">+</button>
            </div>
            <div class="panel-content" id="drainsPanel"></div>
        </aside>
    </div>

    <!-- Source Modal -->
    <div class="modal-overlay" id="sourceModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Add Motivation Source</span>
                <button class="modal-close" onclick="closeSourceModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-input" id="sourceName" placeholder="What motivates you?">
                </div>
                <div class="form-group">
                    <label class="form-label">Type</label>
                    <div class="type-grid" id="sourceTypeGrid"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Flow Rate (1-10)</label>
                    <input type="range" class="rate-slider" id="sourceRate" min="1" max="10" value="5" style="width:100%">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeSourceModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSource()">Add Source</button>
            </div>
        </div>
    </div>

    <!-- Drain Modal -->
    <div class="modal-overlay" id="drainModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Add Motivation Drain</span>
                <button class="modal-close" onclick="closeDrainModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-input" id="drainName" placeholder="What drains your motivation?">
                </div>
                <div class="form-group">
                    <label class="form-label">Type</label>
                    <div class="type-grid" id="drainTypeGrid"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Drain Rate (1-10)</label>
                    <input type="range" class="rate-slider" id="drainRate" min="1" max="10" value="5" style="width:100%">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeDrainModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveDrain()">Add Drain</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // =====================================================
        // Configuration
        // =====================================================
        const SOURCE_TYPES = {
            purpose: { name: 'Purpose', icon: '🎯', color: '#6366f1' },
            achievement: { name: 'Achievement', icon: '🏆', color: '#10b981' },
            growth: { name: 'Growth', icon: '🌱', color: '#8b5cf6' },
            connection: { name: 'Connection', icon: '💕', color: '#ec4899' },
            recognition: { name: 'Recognition', icon: '⭐', color: '#f59e0b' },
            autonomy: { name: 'Autonomy', icon: '🦅', color: '#06b6d4' },
            mastery: { name: 'Mastery', icon: '🎓', color: '#14b8a6' },
            passion: { name: 'Passion', icon: '🔥', color: '#ef4444' }
        };

        const DRAIN_TYPES = {
            doubt: { name: 'Self-Doubt', icon: '😰', color: '#64748b' },
            fear: { name: 'Fear', icon: '😨', color: '#1e293b' },
            procrastination: { name: 'Procrastination', icon: '😴', color: '#78716c' },
            burnout: { name: 'Burnout', icon: '🔥', color: '#dc2626' },
            comparison: { name: 'Comparison', icon: '👀', color: '#7c3aed' },
            perfectionism: { name: 'Perfectionism', icon: '✨', color: '#0891b2' },
            rejection: { name: 'Rejection', icon: '💔', color: '#be123c' },
            uncertainty: { name: 'Uncertainty', icon: '❓', color: '#6b7280' }
        };

        const SCENARIOS = {
            balanced: {
                sources: [
                    { name: 'Career Goals', type: 'purpose', rate: 5, active: true },
                    { name: 'Learning New Skills', type: 'growth', rate: 4, active: true },

        const PHYSICS = {
            gravity: 0.15,

            particles: [],

        let fluidCanvas, historyCanvas, gaugeCanvas;

        // =====================================================
        // Initialization
        // =====================================================
        function init() {
            setupCanvases();
            setupTypeGrids();
            loadScenario();
            startSimulation();
            
            // History recording
            setInterval(recordHistory, 1000);

        function setupCanvases() {
            fluidCanvas = document.getElementById('fluidCanvas');
            historyCanvas = document.getElementById('historyCanvas');
            gaugeCanvas = document.getElementById('gaugeCanvas');

            resizeCanvases();
            window.addEventListener('resize', resizeCanvases);

            fluidCtx = fluidCanvas.getContext('2d');
            historyCtx = historyCanvas.getContext('2d');
            gaugeCtx = gaugeCanvas.getContext('2d');
        }

        function resizeCanvases() {
            const tankWrapper = document.querySelector('.tank-wrapper');
            fluidCanvas.width = tankWrapper.clientWidth;
            fluidCanvas.height = tankWrapper.clientHeight;

            const historyWrapper = document.querySelector('.history-chart');
            historyCanvas.width = historyWrapper.clientWidth;
            historyCanvas.height = historyWrapper.clientHeight;

            gaugeCanvas.width = 120;
            gaugeCanvas.height = 120;

            initFluidParticles();
        }

        function initFluidParticles() {
            fluidState.particles = [];
            fluidState.bubbles = [];
            fluidState.wavePoints = [];

            // Initialize wave points
            const waveCount = Math.ceil(fluidCanvas.width / 10);
            for (let i = 0; i <= waveCount; i++) {
                fluidState.wavePoints.push({
                    x: (i / waveCount) * fluidCanvas.width,
                    y: 0,
                    vy: 0
                });
            }
        }

        function setupTypeGrids() {
            // Source types
            const sourceGrid = document.getElementById('sourceTypeGrid');
            sourceGrid.innerHTML = Object.entries(SOURCE_TYPES).map(([key, type]) => `
                <div class="type-option ${key === state.selectedSourceType ? 'selected' : ''}"

                <div class="type-option ${key === state.selectedDrainType ? 'selected' : ''}" 
                     onclick="selectDrainType('${key}')" data-type="${key}">

                    <div>${type.name}</div>
                </div>
            `).join('');

        // =====================================================
        // Scenario Management
        // =====================================================
        function loadScenario() {
            const scenarioKey = document.getElementById('scenarioSelect').value;
            const scenario = SCENARIOS[scenarioKey];

            state.sources = scenario.sources.map((s, i) => ({
                id: 'src_' + Date.now() + '_' + i,
                ...s
            }));

            state.drains = scenario.drains.map((d, i) => ({
                id: 'drn_' + Date.now() + '_' + i,
                ...d
            }));

            state.motivationLevel = scenario.level;
            state.history = [];
            state.boosts = {};
            state.plugs = {};

            renderSources();
            renderDrains();
            initFluidParticles();
        }

                return `
                    <div class="item-card ${!source.active ? 'inactive' : ''}">

        function toggleDrain(id) {

        // =====================================================
        // Simulation
        // =====================================================
        function startSimulation() {
            function gameLoop() {
                if (state.running) {
                    updateSimulation();
                }
                renderFluid();
                renderGauge();
                renderHistoryChart();
                updateStats();
                animationId = requestAnimationFrame(gameLoop);
            }
            gameLoop();
        }

        function toggleSimulation() {
            state.running = !state.running;
            document.getElementById('simToggleIcon').textContent = state.running ? '⏸️' : '▶️';
            document.getElementById('simToggleText').textContent = state.running ? 'Pause' : 'Play';
        }

        function updateSimulation() {
            const dt = 1/60;

            // Calculate inflow
            let inflow = 0;
            state.sources.forEach(source => {
                if (source.active) {
                    let rate = source.rate;
                    if (state.boosts[source.id]) rate *= 2;
                    inflow += rate * 0.1 * dt;
                }
            });

            // Calculate outflow
            let outflow = 0;
            state.drains.forEach(drain => {
                if (drain.active && !state.plugs[drain.id]) {
                    outflow += drain.rate * 0.1 * dt;
                }
            });

            // Update level
            state.motivationLevel += inflow - outflow;
            state.motivationLevel = Math.max(0, Math.min(100, state.motivationLevel));

            // Add particles for inflow
            if (inflow > 0 && Math.random() < inflow * 10) {
                addInflowParticle();
            }

            // Add bubbles for outflow
            if (outflow > 0 && Math.random() < outflow * 5) {
                addBubble();
            }

            // Update wave physics
            updateWaves();
        }

        function updateWaves() {
            const points = fluidState.wavePoints;
            const targetY = fluidCanvas.height * (1 - state.motivationLevel / 100);

            // Add some random perturbation
            if (Math.random() < 0.1) {
                const idx = Math.floor(Math.random() * points.length);
                points[idx].vy += (Math.random() - 0.5) * 2;
            }

            // Update wave points
            for (let i = 0; i < points.length; i++) {
                const point = points[i];
                const prevY = i > 0 ? points[i-1].y : point.y;
                const nextY = i < points.length - 1 ? points[i+1].y : point.y;

                // Spring force toward neighbors
                const springForce = (prevY + nextY) / 2 - point.y;
                // Spring force toward target level
                const levelForce = (targetY - point.y) * 0.05;

                point.vy += springForce * PHYSICS.surfaceTension + levelForce;
                point.vy *= PHYSICS.viscosity;
                point.y += point.vy;
            }

            fluidState.waveOffset += PHYSICS.waveSpeed;
        }

        function addInflowParticle() {
            const activeColors = state.sources
                .filter(s => s.active)
                .map(s => SOURCE_TYPES[s.type].color);
            
            if (activeColors.length === 0) return;

            fluidState.particles.push({
                x: fluidCanvas.width / 2 + (Math.random() - 0.5) * 100,
                y: 0,
                vx: (Math.random() - 0.5) * 2,
                vy: Math.random() * 3 + 1,
                radius: Math.random() * 4 + 2,
                color: activeColors[Math.floor(Math.random() * activeColors.length)],
                alpha: 1
            });
        }

        function addBubble() {
            const surfaceY = fluidCanvas.height * (1 - state.motivationLevel / 100);
            
            fluidState.bubbles.push({
                x: Math.random() * fluidCanvas.width,
                y: fluidCanvas.height - 20,
                vy: -Math.random() * 2 - 1,
                radius: Math.random() * 6 + 3,
                alpha: 0.6
            });
        }

        // =====================================================
        // Rendering
        // =====================================================
        function renderFluid() {
            const ctx = fluidCtx;
            const width = fluidCanvas.width;
            const height = fluidCanvas.height;

            // Clear
            ctx.clearRect(0, 0, width, height);

            // Background gradient
            const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
            bgGrad.addColorStop(0, '#0a0a15');
            bgGrad.addColorStop(1, '#151525');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, width, height);

            // Draw fluid
            const surfaceY = height * (1 - state.motivationLevel / 100);

            // Create gradient for fluid
            const fluidGrad = ctx.createLinearGradient(0, surfaceY, 0, height);
            
            // Mix colors from active sources
            const activeColors = state.sources
                .filter(s => s.active)
                .map(s => SOURCE_TYPES[s.type].color);
            
            if (activeColors.length > 0) {
                fluidGrad.addColorStop(0, activeColors[0] + '99');
                fluidGrad.addColorStop(0.5, activeColors[Math.floor(activeColors.length / 2)] + 'cc');
                fluidGrad.addColorStop(1, activeColors[activeColors.length - 1] + 'ff');
            } else {
                fluidGrad.addColorStop(0, '#3b82f699');
                fluidGrad.addColorStop(1, '#1e40afff');
            }

            // Draw fluid body with wave surface
            ctx.beginPath();
            ctx.moveTo(0, height);

            const points = fluidState.wavePoints;
            if (points.length > 0) {
                ctx.lineTo(0, points[0].y);
                
                for (let i = 0; i < points.length - 1; i++) {
                    const xc = (points[i].x + points[i + 1].x) / 2;
                    const yc = (points[i].y + points[i + 1].y) / 2;
                    ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
                }
                
                ctx.lineTo(width, points[points.length - 1].y);
            } else {
                ctx.lineTo(0, surfaceY);
                ctx.lineTo(width, surfaceY);
            }

            ctx.lineTo(width, height);
            ctx.closePath();
            ctx.fillStyle = fluidGrad;
            ctx.fill();

            // Surface highlight
            ctx.beginPath();
            if (points.length > 0) {
                ctx.moveTo(0, points[0].y);
                for (let i = 0; i < points.length - 1; i++) {
                    const xc = (points[i].x + points[i + 1].x) / 2;
                    const yc = (points[i].y + points[i + 1].y) / 2;
                    ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
                }
                ctx.lineTo(width, points[points.length - 1].y);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Update and draw particles
            fluidState.particles = fluidState.particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += PHYSICS.gravity;
                p.alpha -= 0.01;

                if (p.y > surfaceY) {
                    // Splash effect
                    const idx = Math.floor((p.x / width) * points.length);
                    if (points[idx]) {
                        points[idx].vy += p.vy * 0.3;
                    }
                    return false;
                }

                if (p.alpha > 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color + Math.floor(p.alpha * 255).toString(16).padStart(2, '0');
                    ctx.fill();
                    return true;
                }
                return false;
            });

            // Update and draw bubbles
            fluidState.bubbles = fluidState.bubbles.filter(b => {
                b.y += b.vy;
                b.x += Math.sin(b.y * 0.05) * 0.5;
                b.alpha -= 0.005;

                if (b.y < surfaceY || b.alpha <= 0) {
                    return false;
                }

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${b.alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();

                // Bubble highlight
                ctx.beginPath();
                ctx.arc(b.x - b.radius * 0.3, b.y - b.radius * 0.3, b.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${b.alpha * 0.5})`;
                ctx.fill();

                return true;
            });

            // Draw drain holes at bottom
            const activeDrains = state.drains.filter(d => d.active && !state.plugs[d.id]);
            activeDrains.forEach((drain, i) => {
                const x = (width / (activeDrains.length + 1)) * (i + 1);
                const y = height - 15;
                const type = DRAIN_TYPES[drain.type];
                const size = 8 + drain.rate;

                // Drain vortex effect
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                const vortexGrad = ctx.createRadialGradient(x, y, 0, x, y, size);
                vortexGrad.addColorStop(0, '#000');
                vortexGrad.addColorStop(0.7, type.color + '88');
                vortexGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = vortexGrad;
                ctx.fill();

                // Swirl lines
                ctx.strokeStyle = type.color + '44';
                ctx.lineWidth = 1;
                for (let j = 0; j < 3; j++) {
                    const angle = (Date.now() / 500 + j * 2) % (Math.PI * 2);
                    ctx.beginPath();
                    ctx.arc(x, y, size * 0.7, angle, angle + 1);
                    ctx.stroke();
                }
            });

            // Draw source pipes at top
            const activeSources = state.sources.filter(s => s.active);
            activeSources.forEach((source, i) => {
                const x = (width / (activeSources.length + 1)) * (i + 1);
                const type = SOURCE_TYPES[source.type];
                const rate = state.boosts[source.id] ? source.rate * 2 : source.rate;

                // Pipe
                ctx.fillStyle = type.color + '44';
                ctx.fillRect(x - 15, 0, 30, 20);
                
                // Flow
                if (state.running) {
                    const flowHeight = rate * 3;
                    const flowGrad = ctx.createLinearGradient(x, 0, x, flowHeight + 20);
                    flowGrad.addColorStop(0, type.color);
                    flowGrad.addColorStop(1, type.color + '00');
                    ctx.fillStyle = flowGrad;
                    ctx.fillRect(x - 5 - rate, 15, 10 + rate * 2, flowHeight);
                }
            });

            // Level indicator line
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 1;
            for (let i = 25; i < 100; i += 25) {
                const y = height * (1 - i / 100);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        function renderGauge() {
            const ctx = gaugeCtx;
            const size = 120;
            const center = size / 2;
            const radius = 45;

            ctx.clearRect(0, 0, size, size);

            // Calculate net flow
            let inflow = 0;
            state.sources.forEach(s => {
                if (s.active) {
                    inflow += state.boosts[s.id] ? s.rate * 2 : s.rate;
                }
            });

            let outflow = 0;
            state.drains.forEach(d => {
                if (d.active && !state.plugs[d.id]) {
                    outflow += d.rate;
                }
            });

            const netFlow = inflow - outflow;
            const maxFlow = 20;
            const normalizedFlow = Math.max(-1, Math.min(1, netFlow / maxFlow));

            // Background arc
            ctx.beginPath();
            ctx.arc(center, center, radius, Math.PI * 0.75, Math.PI * 2.25);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Colored arc
            const startAngle = Math.PI * 1.5;
            const endAngle = startAngle + (normalizedFlow * Math.PI * 0.75);

            ctx.beginPath();
            if (normalizedFlow >= 0) {
                ctx.arc(center, center, radius, startAngle, endAngle);
                ctx.strokeStyle = '#10b981';
            } else {
                ctx.arc(center, center, radius, endAngle, startAngle);
                ctx.strokeStyle = '#ef4444';
            }
            ctx.lineWidth = 8;
            ctx.stroke();

            // Center text
            ctx.fillStyle = netFlow >= 0 ? '#10b981' : '#ef4444';
            ctx.font = 'bold 16px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText((netFlow >= 0 ? '+' : '') + netFlow.toFixed(1), center, center - 5);
            
            ctx.fillStyle = '#888';
            ctx.font = '10px system-ui';
            ctx.fillText('NET FLOW', center, center + 12);
        }

        function renderHistoryChart() {
            const ctx = historyCtx;
            const width = historyCanvas.width;
            const height = historyCanvas.height;

            ctx.clearRect(0, 0, width, height);

            if (state.history.length < 2) {
                ctx.fillStyle = '#666';
                ctx.font = '12px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText('Collecting data...', width / 2, height / 2);
                return;
            }

            // Draw gradient fill
            ctx.beginPath();
            ctx.moveTo(0, height);

            const step = width / (state.history.length - 1);
            state.history.forEach((point, i) => {
                const x = i * step;
                const y = height - (point.level / 100) * height;
                if (i === 0) {
                    ctx.lineTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.lineTo(width, height);
            ctx.closePath();

            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, 'rgba(99, 102, 241, 0.3)');
            grad.addColorStop(1, 'rgba(99, 102, 241, 0)');
            ctx.fillStyle = grad;
            ctx.fill();

            // Draw line
            ctx.beginPath();
            state.history.forEach((point, i) => {
                const x = i * step;
                const y = height - (point.level / 100) * height;
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Reference lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            [25, 50, 75].forEach(level => {
                const y = height - (level / 100) * height;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            });
            ctx.setLineDash([]);
        }

        function recordHistory() {
            state.history.push({
                level: state.motivationLevel,
                timestamp: Date.now()
            });

            if (state.history.length > 100) {
                state.history.shift();
            }
        }

        function updateStats() {
            // Level
            const levelEl = document.getElementById('levelValue');
            levelEl.textContent = Math.round(state.motivationLevel) + '%';
            levelEl.className = 'stat-value ' + (
                state.motivationLevel > 60 ? 'positive' : 
                state.motivationLevel < 30 ? 'negative' : 'neutral'
            );

            // Net flow
            let inflow = 0;
            state.sources.forEach(s => {
                if (s.active) {
                    inflow += state.boosts[s.id] ? s.rate * 2 : s.rate;
                }
            });

            let outflow = 0;
            state.drains.forEach(d => {
                if (d.active && !state.plugs[d.id]) {
                    outflow += d.rate;
                }
            });

            const netFlow = inflow - outflow;
            const netFlowEl = document.getElementById('netFlowValue');
            netFlowEl.textContent = (netFlow >= 0 ? '+' : '') + netFlow.toFixed(1);
            netFlowEl.className = 'stat-value ' + (netFlow > 0 ? 'positive' : netFlow < 0 ? 'negative' : 'neutral');

            // Flow indicators
            document.getElementById('flowInRate').textContent = '+' + inflow.toFixed(1);
            document.getElementById('flowOutRate').textContent = '-' + outflow.toFixed(1);

            // Time estimate
            const timeEl = document.getElementById('timeEstimate');
            if (Math.abs(netFlow) < 0.1) {
                timeEl.textContent = 'Stable';
            } else if (netFlow > 0) {
                const timeToFull = (100 - state.motivationLevel) / (netFlow * 0.1);
                timeEl.textContent = formatTime(timeToFull) + ' to full';
            } else {
                const timeToEmpty = state.motivationLevel / (Math.abs(netFlow) * 0.1);
                timeEl.textContent = formatTime(timeToEmpty) + ' to empty';
            }

            // Biggest drain
            const biggestDrainEl = document.getElementById('biggestDrain');
            const activeDrains = state.drains.filter(d => d.active && !state.plugs[d.id]);
            if (activeDrains.length > 0) {
                const biggest = activeDrains.reduce((max, d) => d.rate > max.rate ? d : max);
                biggestDrainEl.textContent = biggest.name.substring(0, 12);
                biggestDrainEl.style.color = DRAIN_TYPES[biggest.type].color;
            } else {
                biggestDrainEl.textContent = 'None';
                biggestDrainEl.style.color = 'var(--success)';
            }
        }

        function formatTime(seconds) {
            if (seconds < 60) return Math.round(seconds) + 's';
            if (seconds < 3600) return Math.round(seconds / 60) + 'm';
            return Math.round(seconds / 3600) + 'h';
        }

        // =====================================================
        // Utilities
        // =====================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✓' : type === 'warning' ? '⚠' : '✕'}</span>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
