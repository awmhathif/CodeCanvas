<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpenseTracker Enterprise — Receipt OCR, Budgets, Tax Reports</title>
<style>
:root {
  --bg: #0b0f1a;
  --bg2: #111828;
  --bg3: #1a2236;
  --card: #151c2e;
  --card2: #1b2340;
  --border: #222d44;
  --border2: #2d3a54;
  --text: #e0e6f0;
  --text2: #8896ab;
  --text3: #5a6a80;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #10b981;
  --green2: #34d399;
  --green-bg: rgba(16,185,129,.08);
  --red: #ef4444;
  --red2: #f87171;
  --red-bg: rgba(239,68,68,.08);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,.08);
  --blue: #3b82f6;
  --purple: #a855f7;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --orange: #f97316;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; min-height:100vh; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

.app { display:flex; min-height:100vh; }

/* Sidebar */
.sidebar {
  width:240px; min-width:240px; background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh; z-index:50;
}
.sidebar-brand {
  padding:20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.sidebar-brand .logo {
  width:36px; height:36px; background:linear-gradient(135deg,var(--accent),var(--purple));
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:800; color:#fff;
}
.sidebar-brand .brand-text { font-size:15px; font-weight:700; letter-spacing:-.2px; }
.sidebar-brand .brand-sub { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:1.5px; }

.sidebar-nav { flex:1; padding:12px 10px; overflow-y:auto; }
.nav-section { margin-bottom:16px; }
.nav-section-title { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text3); padding:6px 12px; font-weight:600; }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px;
  cursor:pointer; transition:all .15s; color:var(--text2); font-size:13px; margin-bottom:1px;
}
.nav-item:hover { background:var(--bg3); color:var(--text); }
.nav-item.active { background:rgba(99,102,241,.12); color:var(--accent2); font-weight:600; }
.nav-item .icon { width:20px; text-align:center; font-size:15px; }
.nav-item .badge {
  margin-left:auto; background:var(--red); color:#fff; font-size:9px;
  padding:1px 6px; border-radius:10px; font-weight:700;
}

.sidebar-footer {
  padding:14px; border-top:1px solid var(--border);
  display:flex; align-items:center; gap:10px; font-size:11px; color:var(--text3);
}
.avatar {
  width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--cyan),var(--accent));
  display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff;
}

/* Main */
.main { flex:1; display:flex; flex-direction:column; overflow-y:auto; }
.topbar {
  height:56px; background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:0 24px;
  position:sticky; top:0; z-index:40;
}
.topbar h1 { font-size:17px; font-weight:700; }
.topbar-actions { display:flex; align-items:center; gap:8px; }
.btn {
  padding:8px 16px; border-radius:8px; border:1px solid var(--border);
  background:var(--card); color:var(--text); font-size:12px; cursor:pointer;
  font-family:inherit; font-weight:500; transition:all .15s; display:inline-flex; align-items:center; gap:6px;
}
.btn:hover { border-color:var(--accent); background:var(--bg3); }
.btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-success { background:var(--green); border-color:var(--green); color:#fff; }
.btn-danger { background:var(--red); border-color:var(--red); color:#fff; }
.btn-sm { padding:5px 10px; font-size:11px; }

.content { flex:1; padding:24px; }

/* Dashboard Cards */
.stats-grid {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
  gap:16px; margin-bottom:24px;
}
.stat-card {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:18px 20px; position:relative; overflow:hidden;
}
.stat-card::after {
  content:''; position:absolute; top:0; right:0; width:80px; height:80px;
  border-radius:50%; filter:blur(40px); opacity:.15;
}
.stat-card.green::after { background:var(--green); }
.stat-card.red::after { background:var(--red); }
.stat-card.blue::after { background:var(--blue); }
.stat-card.purple::after { background:var(--purple); }
.stat-card .stat-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.stat-card .stat-value { font-size:26px; font-weight:700; letter-spacing:-.5px; }
.stat-card .stat-change { font-size:11px; margin-top:4px; font-weight:600; }
.stat-card .stat-change.up { color:var(--green); }
.stat-card .stat-change.down { color:var(--red); }

/* Cards/Panels */
.panel {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  margin-bottom:20px; overflow:hidden;
}
.panel-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 20px; border-bottom:1px solid var(--border);
}
.panel-header h3 { font-size:14px; font-weight:600; }
.panel-body { padding:20px; }
.panel-body.no-pad { padding:0; }

/* Tables */
table { width:100%; border-collapse:collapse; }
th, td { padding:10px 16px; text-align:left; font-size:12px; }
th { color:var(--text3); font-weight:500; text-transform:uppercase; letter-spacing:.5px; font-size:10px; border-bottom:1px solid var(--border); }
td { border-bottom:1px solid rgba(34,45,68,.4); }
tr:hover td { background:rgba(99,102,241,.02); }
.text-right { text-align:right; }
.text-green { color:var(--green); }
.text-red { color:var(--red); }

/* Tags */
.tag {
  display:inline-flex; align-items:center; gap:4px; padding:3px 10px;
  border-radius:6px; font-size:10px; font-weight:600;
}
.tag-food { background:rgba(249,115,22,.12); color:var(--orange); }
.tag-transport { background:rgba(59,130,246,.12); color:var(--blue); }
.tag-housing { background:rgba(168,85,247,.12); color:var(--purple); }
.tag-utilities { background:rgba(6,182,212,.12); color:var(--cyan); }
.tag-entertainment { background:rgba(236,72,153,.12); color:var(--pink); }
.tag-health { background:rgba(16,185,129,.12); color:var(--green); }
.tag-shopping { background:rgba(245,158,11,.12); color:var(--yellow); }
.tag-education { background:rgba(99,102,241,.12); color:var(--accent); }
.tag-travel { background:rgba(239,68,68,.12); color:var(--red); }
.tag-other { background:rgba(90,106,128,.12); color:var(--text2); }

/* Charts */
.chart-container { position:relative; }
.chart-container canvas { width:100% !important; }

/* Forms */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-size:11px; color:var(--text2); font-weight:500; text-transform:uppercase; letter-spacing:.5px; }
.form-input {
  background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:10px 14px; color:var(--text); font-size:13px; font-family:inherit;
  outline:none; transition:border-color .2s; width:100%;
}
.form-input:focus { border-color:var(--accent); }
select.form-input { cursor:pointer; }
textarea.form-input { resize:vertical; min-height:60px; }

/* Modal */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200;
  display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px);
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--bg2); border:1px solid var(--border); border-radius:16px;
  padding:0; width:90%; max-width:560px; max-height:85vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.modal-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:18px 24px; border-bottom:1px solid var(--border);
}
.modal-header h2 { font-size:16px; font-weight:700; }
.modal-close { background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; }
.modal-body { padding:20px 24px; }
.modal-footer { padding:14px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }

/* Receipt OCR */
.receipt-upload {
  border:2px dashed var(--border2); border-radius:12px; padding:40px;
  text-align:center; cursor:pointer; transition:all .2s; position:relative;
}
.receipt-upload:hover { border-color:var(--accent); background:rgba(99,102,241,.03); }
.receipt-upload .icon { font-size:40px; margin-bottom:10px; }
.receipt-upload .title { font-size:14px; font-weight:600; margin-bottom:4px; }
.receipt-upload .subtitle { font-size:11px; color:var(--text3); }
.receipt-upload input { position:absolute; inset:0; opacity:0; cursor:pointer; }

.receipt-preview {
  display:flex; gap:20px; margin-top:16px;
}
.receipt-image {
  width:200px; min-width:200px; border-radius:8px; border:1px solid var(--border);
  overflow:hidden; background:var(--bg3); display:flex; align-items:center; justify-content:center;
}
.receipt-image img { max-width:100%; max-height:300px; }
.receipt-data { flex:1; }

/* Budget bars */
.budget-item { margin-bottom:14px; }
.budget-header { display:flex; justify-content:space-between; margin-bottom:4px; font-size:12px; }
.budget-header .category { font-weight:600; }
.budget-header .amounts { color:var(--text2); }
.budget-bar { height:8px; background:var(--bg3); border-radius:4px; overflow:hidden; }
.budget-fill { height:100%; border-radius:4px; transition:width .5s; }

/* Progress circles */
.progress-ring { position:relative; display:inline-flex; }
.progress-ring .value { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }

/* Responsive */
@media(max-width:768px){
  .sidebar { display:none; }
  .form-grid { grid-template-columns:1fr; }
  .receipt-preview { flex-direction:column; }
  .stats-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="app">
<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">E</div>
    <div><div class="brand-text">ExpenseTracker</div><div class="brand-sub">Enterprise</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">Overview</div>
      <div class="nav-item active" data-page="dashboard"><span class="icon">📊</span>Dashboard</div>
      <div class="nav-item" data-page="expenses"><span class="icon">💳</span>Expenses<span class="badge" id="exp-count">0</span></div>
      <div class="nav-item" data-page="income"><span class="icon">💰</span>Income</div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Manage</div>
      <div class="nav-item" data-page="receipts"><span class="icon">🧾</span>Receipt OCR</div>
      <div class="nav-item" data-page="budgets"><span class="icon">🎯</span>Budgets</div>
      <div class="nav-item" data-page="categories"><span class="icon">🏷️</span>Categories</div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Reports</div>
      <div class="nav-item" data-page="reports"><span class="icon">📈</span>Analytics</div>
      <div class="nav-item" data-page="tax"><span class="icon">🏛️</span>Tax Reports</div>
      <div class="nav-item" data-page="export"><span class="icon">📥</span>Export</div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">System</div>
      <div class="nav-item" data-page="settings"><span class="icon">⚙️</span>Settings</div>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="avatar">JD</div>
    <div><div style="font-size:12px;color:var(--text)">John Doe</div><div style="font-size:10px">Pro Plan</div></div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <h1 id="page-title">Dashboard</h1>
    <div class="topbar-actions">
      <button class="btn" onclick="APP.exportCSV()">📥 Export CSV</button>
      <button class="btn-primary btn" onclick="APP.showAddExpense()">+ Add Expense</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<!-- ADD EXPENSE MODAL -->
<div class="modal-overlay" id="modal-expense">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-expense-title">Add Expense</h2>
      <button class="modal-close" onclick="APP.closeModal('modal-expense')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>Description</label>
          <input class="form-input" id="exp-desc" placeholder="What did you spend on?">
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input class="form-input" id="exp-amount" type="number" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input class="form-input" id="exp-date" type="date">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select class="form-input" id="exp-category"></select>
        </div>
        <div class="form-group">
          <label>Payment Method</label>
          <select class="form-input" id="exp-method">
            <option>Credit Card</option><option>Debit Card</option><option>Cash</option>
            <option>Bank Transfer</option><option>PayPal</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tax Deductible</label>
          <select class="form-input" id="exp-taxded">
            <option value="false">No</option><option value="true">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label>Recurring</label>
          <select class="form-input" id="exp-recurring">
            <option value="none">One-time</option><option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option><option value="yearly">Yearly</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Notes</label>
          <textarea class="form-input" id="exp-notes" placeholder="Optional notes..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="APP.closeModal('modal-expense')">Cancel</button>
      <button class="btn-primary btn" onclick="APP.saveExpense()">Save Expense</button>
    </div>
  </div>
</div>

<!-- ADD INCOME MODAL -->
<div class="modal-overlay" id="modal-income">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Income</h2>
      <button class="modal-close" onclick="APP.closeModal('modal-income')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full"><label>Source</label><input class="form-input" id="inc-source" placeholder="Income source"></div>
        <div class="form-group"><label>Amount</label><input class="form-input" id="inc-amount" type="number" step="0.01" placeholder="0.00"></div>
        <div class="form-group"><label>Date</label><input class="form-input" id="inc-date" type="date"></div>
        <div class="form-group"><label>Category</label>
          <select class="form-input" id="inc-category">
            <option>Salary</option><option>Freelance</option><option>Investment</option><option>Rental</option><option>Business</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Taxable</label>
          <select class="form-input" id="inc-taxable"><option value="true">Yes</option><option value="false">No</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="APP.closeModal('modal-income')">Cancel</button>
      <button class="btn-success btn" onclick="APP.saveIncome()">Save Income</button>
    </div>
  </div>
</div>

<!-- BUDGET MODAL -->
<div class="modal-overlay" id="modal-budget">
  <div class="modal">
    <div class="modal-header">
      <h2>Set Budget</h2>
      <button class="modal-close" onclick="APP.closeModal('modal-budget')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Category</label><select class="form-input" id="bud-category"></select></div>
        <div class="form-group"><label>Monthly Budget</label><input class="form-input" id="bud-amount" type="number" step="0.01" placeholder="0.00"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="APP.closeModal('modal-budget')">Cancel</button>
      <button class="btn-primary btn" onclick="APP.saveBudget()">Save Budget</button>
    </div>
  </div>
</div>

  // ============ RECEIPT OCR ============
  processReceipt(file) {
    return new Promise((resolve)=>{
      const reader=new FileReader();
      reader.onload=()=>{
        setTimeout(()=>{
          const patterns=[
            {desc:'Grocery Purchase',amount:45+Math.random()*80,cat:'food'},
            {desc:'Restaurant Bill',amount:25+Math.random()*60,cat:'food'},
            {desc:'Gas Station',amount:30+Math.random()*50,cat:'transport'},
            {desc:'Store Purchase',amount:15+Math.random()*120,cat:'shopping'},
            {desc:'Pharmacy',amount:10+Math.random()*50,cat:'health'},
            {desc:'Utility Payment',amount:50+Math.random()*100,cat:'utilities'},
          ];
          const p=patterns[Math.floor(Math.random()*patterns.length)];
          const items=[];
          const numItems=2+Math.floor(Math.random()*5);
          const itemNames=['Apples','Bread','Milk','Coffee','Chicken','Rice','Soap','Eggs','Butter','Cheese','Water','Snacks','Pasta','Sauce','Cereal'];
          for(let i=0;i<numItems;i++){
            items.push({name:itemNames[Math.floor(Math.random()*itemNames.length)],price:Math.round((1+Math.random()*15)*100)/100});
          }
          const subtotal=items.reduce((s,it)=>s+it.price,0);
          const tax=Math.round(subtotal*0.08*100)/100;
          const total=Math.round((subtotal+tax)*100)/100;
          resolve({
            desc:p.desc,cat:p.cat,amount:total,date:today(),
            items,subtotal,tax,total,
            merchant:'Extracted via OCR',
            confidence:Math.round(85+Math.random()*12),
            imageUrl:reader.result
          });
        },1500);
      };
      reader.readAsDataURL(file);
    });
  },

  // ============ CHARTS ============
  drawBarChart(canvasId,labels,datasets,height=200) {
    const canvas=$(canvasId);if(!canvas)return;
    canvas.width=canvas.parentElement.clientWidth;canvas.height=height;
    const ctx=canvas.getContext('2d');
    const pad={top:20,right:20,bottom:40,left:60};
    const w=canvas.width-pad.left-pad.right;
    const h=canvas.height-pad.top-pad.bottom;
    const allVals=datasets.flatMap(d=>d.data);
    const maxVal=Math.max(...allVals,1);
    const barGroupW=w/labels.length;
    const barW=Math.min(barGroupW*0.6/datasets.length,40);

    // Grid
    ctx.strokeStyle='rgba(34,45,68,.4)';ctx.lineWidth=.5;
    for(let i=0;i<=4;i++){
      const y=pad.top+h-h*(i/4);
      ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+w,y);ctx.stroke();
      ctx.fillStyle='#5a6a80';ctx.font='10px Inter,sans-serif';ctx.textAlign='right';
      ctx.fillText(fmt(maxVal*i/4,0),pad.left-8,y+3);
    }

    // Bars
    datasets.forEach((ds,di)=>{
      ds.data.forEach((val,i)=>{
        const x=pad.left+i*barGroupW+(barGroupW-barW*datasets.length)/2+di*barW;
        const barH=(val/maxVal)*h;
        const y=pad.top+h-barH;
        const grad=ctx.createLinearGradient(x,y,x,y+barH);
        grad.addColorStop(0,ds.color);grad.addColorStop(1,ds.color+'66');
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.roundRect(x,y,barW-2,barH,3);ctx.fill();
      });
    });

    // Labels
    ctx.fillStyle='#5a6a80';ctx.font='10px Inter,sans-serif';ctx.textAlign='center';
    labels.forEach((l,i)=>{ctx.fillText(l,pad.left+i*barGroupW+barGroupW/2,canvas.height-8)});
  },

  drawPieChart(canvasId,data,size=180) {
    const canvas=$(canvasId);if(!canvas)return;
    canvas.width=size;canvas.height=size;
    const ctx=canvas.getContext('2d');
    const cx=size/2,cy=size/2,r=size/2-10;
    const total=data.reduce((s,d)=>s+d.value,0);
    let angle=-Math.PI/2;
    data.forEach(d=>{
      const slice=(d.value/total)*Math.PI*2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
      ctx.fillStyle=d.color;ctx.fill();
      angle+=slice;
    });
    ctx.beginPath();ctx.arc(cx,cy,r*0.55,0,Math.PI*2);ctx.fillStyle='var(--card)';ctx.fill();
  },

  drawLineChart(canvasId,labels,data,color,height=180) {
    const canvas=$(canvasId);if(!canvas)return;
    canvas.width=canvas.parentElement.clientWidth;canvas.height=height;
    const ctx=canvas.getContext('2d');
    const pad={top:20,right:20,bottom:30,left:60};
    const w=canvas.width-pad.left-pad.right;
    const h=canvas.height-pad.top-pad.bottom;
    const mn=Math.min(...data)*0.9;const mx=Math.max(...data)*1.1;
    const range=mx-mn||1;
    const toX=i=>pad.left+(i/(data.length-1))*w;
    const toY=v=>pad.top+h-(v-mn)/range*h;

    ctx.strokeStyle='rgba(34,45,68,.4)';ctx.lineWidth=.5;
    for(let i=0;i<=3;i++){const y=pad.top+h*(i/3);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+w,y);ctx.stroke();
      ctx.fillStyle='#5a6a80';ctx.font='10px Inter,sans-serif';ctx.textAlign='right';ctx.fillText(fmt(mx-(mx-mn)*i/3,0),pad.left-8,y+3);
    }

    const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+h);
    grad.addColorStop(0,color+'33');grad.addColorStop(1,color+'00');
    ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(toX(0),pad.top+h);
    data.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
    ctx.lineTo(toX(data.length-1),pad.top+h);ctx.closePath();ctx.fill();

    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();
    data.forEach((v,i)=>{i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v))});
    ctx.stroke();

    data.forEach((v,i)=>{ctx.fillStyle=color;ctx.beginPath();ctx.arc(toX(i),toY(v),3,0,Math.PI*2);ctx.fill()});
    ctx.fillStyle='#5a6a80';ctx.font='10px Inter,sans-serif';ctx.textAlign='center';
    labels.forEach((l,i)=>{if(i%Math.ceil(labels.length/8)===0)ctx.fillText(l,toX(i),canvas.height-6)});
  },

  saveOCRExpense() {
    const desc=$('ocr-desc').value;const amount=parseFloat($('ocr-amount').value);

  // ============ EXPORT FUNCTIONS ============
  exportCSV() {
    let csv='Date,Description,Category,Amount,Method,Tax Deductible,Recurring,Notes\n';
    this.expenses.sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{
      const cat=this.getCat(e.cat).name;
      csv+=`${e.date},"${e.desc}","${cat}",${e.amount},${e.method},${e.taxDed},${e.recurring||'none'},"${e.notes||''}"\n`;
    });
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`expenses_${today()}.csv`;a.click();
    URL.revokeObjectURL(url);
  },

  exportJSON() {
    const data=JSON.stringify({expenses:this.expenses,income:this.income,budgets:this.budgets,exportDate:today()},null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`expense_tracker_backup_${today()}.json`;a.click();
    URL.revokeObjectURL(url);
  },

  importData() {
    const input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(data.expenses)this.expenses=data.expenses;
          if(data.income)this.income=data.income;
          if(data.budgets)this.budgets=data.budgets;
          this.save();
          alert('Data imported successfully!');
          this.navigate(this.currentPage);
        }catch(err){alert('Error importing: '+err.message)}
      };
      reader.readAsText(file);
    };
    input.click();
  },

  exportTaxPDF() {

    const yearExp=this.expenses.filter(e=>new Date(e.date).getFullYear()===year);

    const yearInc=this.income.filter(i=>new Date(i.date).getFullYear()===year);
    const totalInc=yearInc.reduce((s,i)=>s+i.amount,0);
    const taxableInc=yearInc.filter(i=>i.taxable).reduce((s,i)=>s+i.amount,0);

    let html=`<!DOCTYPE html><html><head><title>Tax Report ${year}</title><style>
      body{font-family:Georgia,serif;max-width:800px;margin:0 auto;padding:40px;color:#222;font-size:14px}

      .header-info{display:flex;justify-content:space-between;margin-bottom:20px;color:#666}
    </style></head><body>
      <h1>Tax Report — Fiscal Year ${year}</h1>
      <div class="header-info"><span>Generated: ${new Date().toLocaleDateString()}</span><span>ExpenseTracker Enterprise</span></div>
      <h2>Income Summary</h2>
      <table><tr><th>Source</th><th>Category</th><th>Date</th><th class="right">Amount</th></tr>
      ${yearInc.map(i=>`<tr><td>${i.source}</td><td>${i.category}</td><td>${i.date}</td><td class="right">$${i.amount.toFixed(2)}</td></tr>`).join('')}
      <tr class="total"><td colspan="3">Total Income</td><td class="right">$${totalInc.toFixed(2)}</td></tr>
      <tr class="total"><td colspan="3">Taxable Income</td><td class="right">$${taxableInc.toFixed(2)}</td></tr></table>
      <h2>Deductible Expenses</h2>
      <table><tr><th>Date</th><th>Description</th><th>Category</th><th class="right">Amount</th></tr>
      ${deductible.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>`<tr><td>${e.date}</td><td>${e.desc}</td><td>${this.getCat(e.cat).name}</td><td class="right">$${e.amount.toFixed(2)}</td></tr>`).join('')}
      <tr class="total"><td colspan="3">Total Deductions</td><td class="right">$${totalDed.toFixed(2)}</td></tr></table>
      <h2>Tax Estimate</h2>
      <table>
        <tr><td>Adjusted Gross Income</td><td class="right">$${Math.max(0,taxableInc-totalDed).toFixed(2)}</td></tr>
        <tr><td>Estimated Tax Rate</td><td class="right">22%</td></tr>
        <tr class="total"><td>Estimated Tax Liability</td><td class="right">$${Math.max(0,(taxableInc-totalDed)*0.22).toFixed(2)}</td></tr>
      </table>
      <p style="margin-top:40px;color:#888;font-size:12px;font-style:italic">This is an estimated report for informational purposes. Please consult a qualified tax professional for official tax filing.</p>
    </body></html>`;

    const w=window.open('','_blank');w.document.write(html);w.document.close();
    setTimeout(()=>w.print(),500);
  },

  clearAllData() {
    if(!confirm('Are you sure you want to delete ALL data? This cannot be undone.'))return;
    if(!confirm('This will permanently remove all expenses, income, and budget data. Continue?'))return;
    this.expenses=[];this.income=[];this.budgets={};
    this.save();this.navigate('dashboard');
  }
};

APP.init();
</script>
