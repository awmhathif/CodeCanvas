<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherry Blossom - Four Seasons in 60 Seconds</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #87ceeb;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            padding: 20px;
            border-radius: 15px;
            color: white;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .controls h3 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #ffb7c5;
        }

        .season-display {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .progress-bar {
            width: 250px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff69b4, #ffa500, #90ee90, #87ceeb);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .time-display {
            font-size: 16px;
            margin-bottom: 10px;
            color: #ffd700;
            text-align: center;
        }

        button {
            margin: 10px 5px 0 0;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .info {
            margin-top: 15px;
            font-size: 11px;
            opacity: 0.8;
            line-height: 1.5;
        }

        .emoji-indicator {
            font-size: 40px;
            text-align: center;
            margin: 10px 0;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>
    <div class="controls">
        <h3>🌸 Cherry Blossom Seasons 🌸</h3>
        
        <div class="emoji-indicator" id="seasonEmoji">🌸</div>
        <div class="season-display" id="seasonDisplay">Spring</div>
        <div class="time-display" id="timeDisplay">0:00 / 1:00</div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        
        <button id="playPause">⏸ Pause</button>
        <button id="restart">🔄 Restart</button>
        <button id="record">📹 Record</button>
        
        <div class="info">
            🌸 Spring: Cherry blossoms bloom<br>
            ☀️ Summer: Lush green leaves<br>
            🍂 Autumn: Golden falling leaves<br>
            ❄️ Winter: Snow-covered branches
        </div>
    </div>

    <canvas id="seasonCanvas"></canvas>

    <script>
        const canvas = document.getElementById('seasonCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Animation timing
        const TOTAL_DURATION = 60000; // 60 seconds
        const SEASON_DURATION = TOTAL_DURATION / 4; // 15 seconds per season
        let startTime = Date.now();
        let elapsedTime = 0;
        let isPlaying = true;
        let isPaused = false;

        // UI Elements
        const seasonDisplay = document.getElementById('seasonDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const progressFill = document.getElementById('progressFill');
        const playPauseBtn = document.getElementById('playPause');
        const restartBtn = document.getElementById('restart');
        const recordBtn = document.getElementById('record');
        const seasonEmoji = document.getElementById('seasonEmoji');

        // Seasons data
        const seasons = [
            { 
                name: 'Spring', 
                emoji: '🌸',
                skyTop: '#87ceeb',
                skyBottom: '#e0f6ff',
                groundColor: '#90ee90',
                trunkColor: '#4a3020',
                primaryColor: '#ffb7c5',
                secondaryColor: '#ff69b4',
                accentColor: '#ffffff'
            },
            { 
                name: 'Summer', 
                emoji: '☀️',
                skyTop: '#4a90e2',
                skyBottom: '#87ceeb',
                groundColor: '#228b22',
                trunkColor: '#5d4037',
                primaryColor: '#32cd32',
                secondaryColor: '#228b22',
                accentColor: '#90ee90'
            },
            { 
                name: 'Autumn', 
                emoji: '🍂',
                skyTop: '#ff9966',
                skyBottom: '#ffcc99',
                groundColor: '#d2691e',
                trunkColor: '#3e2723',
                primaryColor: '#ff8c00',
                secondaryColor: '#ff6347',
                accentColor: '#ffd700'
            },
            { 
                name: 'Winter', 
                emoji: '❄️',
                skyTop: '#b0c4de',
                skyBottom: '#e6f2ff',
                groundColor: '#ffffff',
                trunkColor: '#2d2d2d',
                primaryColor: '#ffffff',
                secondaryColor: '#e0e0e0',
                accentColor: '#b0e0e6'
            }
        ];

        // Tree structure
        class Branch {
            constructor(x, y, angle, length, depth) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.length = length;
                this.depth = depth;
                this.endX = x + Math.cos(angle) * length;
                this.endY = y + Math.sin(angle) * length;
                this.children = [];
            }

            grow() {
                if (this.depth > 0) {
                    const numBranches = this.depth > 6 ? 2 : 3;
                    for (let i = 0; i < numBranches; i++) {
                        const angleOffset = (Math.random() - 0.5) * 0.8;
                        const newAngle = this.angle + angleOffset;
                        const newLength = this.length * (0.6 + Math.random() * 0.2);
                        const branch = new Branch(
                            this.endX,
                            this.endY,
                            newAngle,
                            newLength,
                            this.depth - 1
                        );
                        this.children.push(branch);
                        branch.grow();
                    }
                }
            }

            draw(ctx, seasonProgress, currentSeason) {
                const season = seasons[currentSeason];
                const width = Math.max(1, this.depth * 2);
                
                ctx.strokeStyle = season.trunkColor;
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.endX, this.endY);
                ctx.stroke();

                // Draw blossoms/leaves at branch ends
                if (this.depth <= 2 && this.children.length === 0) {
                    this.drawSeasonalElement(ctx, seasonProgress, currentSeason);
                }

                // Recursively draw children
                this.children.forEach(child => child.draw(ctx, seasonProgress, currentSeason));
            }

            drawSeasonalElement(ctx, seasonProgress, currentSeason) {
                const season = seasons[currentSeason];
                
                if (currentSeason === 0) { // Spring - Cherry Blossoms
                    const bloomProgress = Math.min(1, seasonProgress * 2);
                    if (bloomProgress > 0) {
                        for (let i = 0; i < 5; i++) {
                            const offsetX = (Math.random() - 0.5) * 20;
                            const offsetY = (Math.random() - 0.5) * 20;
                            const size = (3 + Math.random() * 4) * bloomProgress;
                            
                            // Petal cluster
                            for (let p = 0; p < 5; p++) {
                                const petalAngle = (p / 5) * Math.PI * 2;
                                const petalX = this.endX + offsetX + Math.cos(petalAngle) * size;
                                const petalY = this.endY + offsetY + Math.sin(petalAngle) * size;
                                
                                ctx.fillStyle = Math.random() > 0.5 ? season.primaryColor : season.secondaryColor;
                                ctx.beginPath();
                                ctx.ellipse(petalX, petalY, size, size * 1.5, petalAngle, 0, Math.PI * 2);
                                ctx.fill();
                            }
                            
                            // Center
                            ctx.fillStyle = '#ffd700';
                            ctx.beginPath();
                            ctx.arc(this.endX + offsetX, this.endY + offsetY, size * 0.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                } else if (currentSeason === 1) { // Summer - Green Leaves
                    const leafProgress = Math.min(1, seasonProgress * 1.5);
                    if (leafProgress > 0) {
                        for (let i = 0; i < 8; i++) {
                            const offsetX = (Math.random() - 0.5) * 25;
                            const offsetY = (Math.random() - 0.5) * 25;
                            const size = (4 + Math.random() * 3) * leafProgress;
                            
                            ctx.fillStyle = Math.random() > 0.3 ? season.primaryColor : season.secondaryColor;
                            ctx.beginPath();
                            ctx.ellipse(
                                this.endX + offsetX,
                                this.endY + offsetY,
                                size,
                                size * 1.8,
                                Math.random() * Math.PI,
                                0,
                                Math.PI * 2
                            );
                            ctx.fill();
                        }
                    }
                } else if (currentSeason === 2) { // Autumn - Falling Leaves
                    const leafProgress = Math.max(0, 1 - seasonProgress * 1.5);
                    if (leafProgress > 0) {
                        for (let i = 0; i < 6; i++) {
                            const offsetX = (Math.random() - 0.5) * 20;
                            const offsetY = (Math.random() - 0.5) * 20;
                            const size = (4 + Math.random() * 3) * leafProgress;
                            
                            const colors = [season.primaryColor, season.secondaryColor, season.accentColor];
                            ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                            ctx.beginPath();
                            ctx.ellipse(
                                this.endX + offsetX,
                                this.endY + offsetY,
                                size,
                                size * 1.8,
                                Math.random() * Math.PI,
                                0,
                                Math.PI * 2
                            );
                            ctx.fill();
                        }
                    }
                } else if (currentSeason === 3) { // Winter - Snow
                    const snowProgress = Math.min(1, seasonProgress * 1.5);
                    if (snowProgress > 0) {
                        for (let i = 0; i < 4; i++) {
                            const offsetX = (Math.random() - 0.5) * 15;
                            const offsetY = (Math.random() - 0.5) * 15;
                            const size = (2 + Math.random() * 3) * snowProgress;
                            
                            ctx.fillStyle = season.primaryColor;
                            ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                            ctx.shadowBlur = 5;
                            ctx.beginPath();
                            ctx.arc(this.endX + offsetX, this.endY + offsetY, size, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                    }
                }
            }
        }

        // Falling particles (petals, leaves, snow)
        class Particle {
            constructor(x, y, season) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = 1 + Math.random() * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.size = 3 + Math.random() * 4;
                this.season = season;
                this.opacity = 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                
                // Drift effect
                this.vx += (Math.random() - 0.5) * 0.1;
                
                // Fade out near bottom
                if (this.y > canvas.height * 0.8) {
                    this.opacity -= 0.02;
                }
                
                return this.y < canvas.height && this.opacity > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                const season = seasons[this.season];
                
                if (this.season === 0) { // Spring petals
                    ctx.fillStyle = season.primaryColor;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size, this.size * 1.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.season === 2) { // Autumn leaves
                    const colors = [season.primaryColor, season.secondaryColor, season.accentColor];
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size, this.size * 1.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.season === 3) { // Winter snowflakes
                    ctx.strokeStyle = season.primaryColor;
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 6; i++) {
                        ctx.save();
                        ctx.rotate((i / 6) * Math.PI * 2);
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(0, -this.size);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
                
                ctx.restore();
            }
        }

        // Initialize tree
        let tree = null;
        let particles = [];

        function createTree() {
            const startX = canvas.width / 2;
            const startY = canvas.height * 0.85;
            const initialAngle = -Math.PI / 2;
            const initialLength = canvas.height * 0.15;
            
            tree = new Branch(startX, startY, initialAngle, initialLength, 10);
            tree.grow();
        }

        createTree();

        // Get current season and progress
        function getSeasonInfo(elapsed) {
            const totalProgress = elapsed / TOTAL_DURATION;
            const seasonIndex = Math.min(3, Math.floor(totalProgress * 4));
            const seasonProgress = (totalProgress * 4) % 1;
            
            return {
                index: seasonIndex,
                progress: seasonProgress,
                season: seasons[seasonIndex]
            };
        }

        // Draw background
        function drawBackground(season) {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, season.skyTop);
            gradient.addColorStop(1, season.skyBottom);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Ground
            ctx.fillStyle = season.groundColor;
            ctx.fillRect(0, canvas.height * 0.85, canvas.width, canvas.height * 0.15);
            
            // Ground gradient for depth
            const groundGradient = ctx.createLinearGradient(0, canvas.height * 0.85, 0, canvas.height);
            groundGradient.addColorStop(0, season.groundColor);
            groundGradient.addColorStop(1, shadeColor(season.groundColor, -20));
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, canvas.height * 0.85, canvas.width, canvas.height * 0.15);
        }

        // Draw sun/moon
        function drawCelestial(seasonIndex) {
            let x, y, color, size;
            
            if (seasonIndex === 1) { // Summer - bright sun
                x = canvas.width * 0.8;
                y = canvas.height * 0.15;
                color = '#ffd700';
                size = 40;
                
                // Sun rays
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
                ctx.lineWidth = 3;
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(x + Math.cos(angle) * size, y + Math.sin(angle) * size);
                    ctx.lineTo(x + Math.cos(angle) * (size + 20), y + Math.sin(angle) * (size + 20));
                    ctx.stroke();
                }
            } else if (seasonIndex === 3) { // Winter - pale sun
                x = canvas.width * 0.8;
                y = canvas.height * 0.2;
                color = '#fffacd';
                size = 35;
            } else { // Spring/Autumn - moderate sun
                x = canvas.width * 0.8;
                y = canvas.height * 0.18;
                color = '#ffeb3b';
                size = 38;
            }
            
            // Glow
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 2);
            gradient.addColorStop(0, color);
            gradient.addColorStop(0.5, `${color}66`);
            gradient.addColorStop(1, `${color}00`);
            ctx.fillStyle = gradient;
            ctx.fillRect(x - size * 2, y - size * 2, size * 4, size * 4);
            
            // Body
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
        }

        // Utility: shade color
        function shadeColor(color, percent) {
            const num = parseInt(color.replace("#",""), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 +
                (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255))
                .toString(16).slice(1);
        }

        // Update particles
        function updateParticles(seasonIndex) {
            // Add new particles
            if (seasonIndex === 0 && Math.random() > 0.92) { // Spring petals
                particles.push(new Particle(
                    canvas.width / 2 + (Math.random() - 0.5) * 200,
                    canvas.height * 0.3,
                    0
                ));
            } else if (seasonIndex === 2 && Math.random() > 0.9) { // Autumn leaves
                particles.push(new Particle(
                    canvas.width / 2 + (Math.random() - 0.5) * 200,
                    canvas.height * 0.3,
                    2
                ));
            } else if (seasonIndex === 3 && Math.random() > 0.95) { // Winter snow
                particles.push(new Particle(
                    Math.random() * canvas.width,
                    0,
                    3
                ));
            }
            
            // Update and filter particles
            particles = particles.filter(p => p.update());
            
            // Draw particles
            particles.forEach(p => p.draw(ctx));
        }

        // Format time
        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // Animation loop
        function animate() {
            if (!isPaused) {
                const now = Date.now();
                elapsedTime = now - startTime;
                
                // Loop after 60 seconds
                if (elapsedTime >= TOTAL_DURATION) {
                    startTime = now;
                    elapsedTime = 0;
                }
            }
            
            const seasonInfo = getSeasonInfo(elapsedTime);
            
            // Draw scene
            drawBackground(seasonInfo.season);
            drawCelestial(seasonInfo.index);
            
            if (tree) {
                tree.draw(ctx, seasonInfo.progress, seasonInfo.index);
            }
            
            updateParticles(seasonInfo.index);
            
            // Update UI
            seasonDisplay.textContent = seasonInfo.season.name;
            seasonEmoji.textContent = seasonInfo.season.emoji;
            timeDisplay.textContent = `${formatTime(elapsedTime)} / 1:00`;
            progressFill.style.width = `${(elapsedTime / TOTAL_DURATION) * 100}%`;
            
            requestAnimationFrame(animate);
        }

        // Controls
        playPauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            if (!isPaused) {
                startTime = Date.now() - elapsedTime;
            }
            playPauseBtn.textContent = isPaused ? '▶ Play' : '⏸ Pause';
        });

        restartBtn.addEventListener('click', () => {
            startTime = Date.now();
            elapsedTime = 0;
            particles = [];
            isPaused = false;
            playPauseBtn.textContent = '⏸ Pause';
        });

        recordBtn.addEventListener('click', () => {
            alert('Recording feature: Use browser screen recording tools like OBS Studio, or browser extensions to capture this animation!');
        });

        // Start animation
        animate();
    </script>
</body>
</html>
