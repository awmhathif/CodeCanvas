<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS NEXUS | Ultimate Focus System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #ff00ff;
            --tertiary: #0aff00;
            --alert: #ff2a2a;
            --bg-dark: #05050a;
            --bg-panel: rgba(10, 15, 25, 0.85);
            --glass: rgba(255, 255, 255, 0.05);
            --grid-line: rgba(0, 243, 255, 0.1);
            --font-main: 'Rajdhani', sans-serif;
            --font-display: 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --glow-spread: 10px;
        }

        /* --- GLOBAL RESET & LAYOUT --- */
        * { box-sizing: border-box; user-select: none; scrollbar-width: thin; scrollbar-color: var(--primary) var(--bg-dark); }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- BACKGROUND FX --- */
        #canvas-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            opacity: 0.15;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9998; pointer-events: none;
            background: radial-gradient(circle, transparent 60%, #000 150%);
        }

        /* --- APP CONTAINER --- */
        #app {
            position: relative; z-index: 10;
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            grid-template-rows: 70px 1fr 50px;
            height: 100vh;
            gap: 15px;
            padding: 15px;
        }

        /* --- UTILITIES --- */
        .neon-text { text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary); color: var(--primary); }
        .neon-text-sec { text-shadow: 0 0 5px var(--secondary), 0 0 10px var(--secondary); color: var(--secondary); }
        .neon-border { border: 1px solid var(--primary); box-shadow: 0 0 5px var(--primary), inset 0 0 10px rgba(0, 243, 255, 0.2); }
        .panel {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }
        .panel::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 20px; height: 20px;
            border-bottom: 2px solid var(--primary); border-right: 2px solid var(--primary);
        }

        /* --- HEADER --- */
        header {
            grid-column: 1 / -1;
            display: flex; justify-content: space-between; items-center;
            padding: 0 20px;
            background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--grid-line);
        }
        .logo { font-family: var(--font-display); font-size: 28px; font-weight: 900; letter-spacing: 2px; }
        .system-time { font-family: var(--font-mono); font-size: 18px; color: var(--tertiary); }
        .top-controls button {
            background: transparent; border: 1px solid var(--primary); color: var(--primary);
            padding: 5px 15px; margin-left: 10px; cursor: pointer; transition: 0.3s;
            font-family: var(--font-mono); text-transform: uppercase;
        }
        .top-controls button:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        /* --- SIDEBAR NAV --- */
        nav {
            grid-column: 1; grid-row: 2;
            display: flex; flex-direction: column; gap: 10px;
            padding: 10px;
        }
        .nav-btn {
            padding: 15px; border: 1px solid transparent; background: rgba(255,255,255,0.03);
            color: #aaa; text-align: left; cursor: pointer;
            font-family: var(--font-display); letter-spacing: 1px; transition: 0.3s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .nav-btn:hover { background: rgba(0, 243, 255, 0.1); color: #fff; padding-left: 20px; }
        .nav-btn.active {
            background: rgba(0, 243, 255, 0.2); border-left: 4px solid var(--primary);
            color: var(--primary); text-shadow: 0 0 8px var(--primary);
        }

        /* --- MAIN DASHBOARD --- */
        #main-display {
            grid-column: 2; grid-row: 2;
            position: relative;
        }
        .view-section {
            display: none; height: 100%; width: 100%;
            flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.5s ease forwards;
        }
        .view-section.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* --- RIGHT PANEL (STATS) --- */
        aside {
            grid-column: 3; grid-row: 2;
            display: flex; flex-direction: column; gap: 15px;
            padding: 10px;
        }
        .stat-card {
            background: rgba(0,0,0,0.3); padding: 15px;
            border-left: 2px solid var(--secondary);
        }
        .stat-val { font-family: var(--font-mono); font-size: 24px; color: #fff; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }

        /* --- FOOTER --- */
        footer {
            grid-column: 1 / -1; grid-row: 3;
            border-top: 1px solid var(--grid-line);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-size: 12px; color: #666;
        }
        .progress-bar {
            width: 300px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; position: relative;
        }
        .progress-fill {
            height: 100%; width: 0%; background: var(--secondary);
            box-shadow: 0 0 10px var(--secondary); transition: width 0.5s ease;
        }

        /* --- CLOCK STYLES --- */
        .big-time {
            font-family: var(--font-mono); font-size: 120px;
            font-weight: bold; letter-spacing: -5px;
            position: relative; z-index: 2;
        }
        
        /* Circular Progress (SVG) */
        .circle-container { position: relative; width: 400px; height: 400px; }
        svg.timer-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
        .circle-bg { stroke: #222; }
        .circle-prog { stroke: var(--primary); filter: drop-shadow(0 0 5px var(--primary)); }
        
        .timer-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center;
        }
        .timer-status { text-transform: uppercase; letter-spacing: 5px; font-size: 18px; margin-bottom: 10px; }

        /* Analog Clock Canvas */
        #analog-canvas { background: transparent; }

        /* Binary Clock */
        .binary-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 20px; }
        .bit-col { display: flex; flex-direction: column-reverse; gap: 8px; }
        .bit { width: 20px; height: 20px; background: #222; border-radius: 50%; transition: 0.2s; }
        .bit.on { background: var(--tertiary); box-shadow: 0 0 8px var(--tertiary); }

        /* Controls */
        .control-row { display: flex; gap: 20px; margin-top: 30px; }
        .ctrl-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid var(--primary);
            color: var(--primary); font-size: 24px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: 0.2s all;
        }
        .ctrl-btn:hover { background: var(--primary); color: #000; transform: scale(1.1); box-shadow: 0 0 20px var(--primary); }
        .ctrl-btn.secondary { border-color: var(--secondary); color: var(--secondary); }
        .ctrl-btn.secondary:hover { background: var(--secondary); box-shadow: 0 0 20px var(--secondary); }

        /* Laps Table */
        .lap-container {
            width: 100%; max-height: 200px; overflow-y: auto; margin-top: 20px;
            background: rgba(0,0,0,0.4); border: 1px solid #333;
        }
        .lap-row { display: grid; grid-template-columns: 50px 1fr 1fr; padding: 8px; border-bottom: 1px solid #222; font-family: var(--font-mono); }
        .lap-row:first-child { color: var(--tertiary); position: sticky; top: 0; background: #111; }

        /* Notification Toast */
        .toast-container { position: fixed; bottom: 80px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: rgba(0, 10, 20, 0.95); border-left: 4px solid var(--tertiary);
            padding: 15px 25px; color: #fff; min-width: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show { transform: translateX(0); }
        .toast-title { font-weight: bold; color: var(--tertiary); margin-bottom: 5px; }

        /* Settings Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 10000; display: none; align-items: center; justify-content: center;
        }
        .modal {
            background: var(--bg-dark); border: 1px solid var(--primary);
            width: 500px; max-width: 90%; padding: 30px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
        }
        .setting-group { margin-bottom: 20px; }
        .setting-group label { display: block; color: var(--primary); margin-bottom: 8px; font-family: var(--font-display); }
        .setting-group input, .setting-group select {
            width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 10px; font-family: var(--font-mono);
        }
        
        /* Badges Grid */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .badge {
            background: #111; padding: 10px; text-align: center; border: 1px solid #333; opacity: 0.3; grayscale: 100%;
        }
        .badge.unlocked { opacity: 1; border-color: var(--secondary); filter: none; box-shadow: 0 0 10px rgba(255, 0, 255, 0.3); }
        .badge-icon { font-size: 24px; display: block; margin-bottom: 5px; }
        
    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <canvas id="canvas-bg"></canvas>

    <!-- App Structure -->
    <div id="app">
        
        <!-- Header -->
        <header>
            <div class="logo neon-text">CHRONOS<span style="color:#fff">_NEXUS</span></div>
            <div class="system-time" id="global-clock">00:00:00</div>
            <div class="top-controls">
                <button onclick="Nexus.toggleFullscreen()">[ ] Fullscreen</button>
                <button onclick="Nexus.toggleSettings()">Settings</button>
                <button onclick="Nexus.toggleSound()" id="sound-btn">Sound: ON</button>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="panel">
            <div class="nav-btn active" onclick="Nexus.switchTab('focus')">FOCUS CORE</div>
            <div class="nav-btn" onclick="Nexus.switchTab('stopwatch')">CHRONOGRAPH</div>
            <div class="nav-btn" onclick="Nexus.switchTab('world')">WORLD CLOCK</div>
            <div class="nav-btn" onclick="Nexus.switchTab('interval')">INTERVAL TRAINER</div>
            <div class="nav-btn" onclick="Nexus.switchTab('visual')">VISUALIZERS</div>
        </nav>

        <!-- Main Display -->
        <main id="main-display" class="panel">
            
            <!-- 1. FOCUS CORE (Pomodoro) -->
            <div id="view-focus" class="view-section active">
                <div class="circle-container">
                    <svg class="timer-svg">
                        <circle class="circle-bg" cx="200" cy="200" r="180"></circle>
                        <circle class="circle-prog" id="focus-circle" cx="200" cy="200" r="180" stroke-dasharray="1131" stroke-dashoffset="0"></circle>
                    </svg>
                    <div class="timer-overlay">
                        <div class="timer-status neon-text-sec" id="focus-mode">FOCUS</div>
                        <div class="big-time neon-text" id="focus-display">25:00</div>
                        <div style="font-family: var(--font-mono); color: #888;">SESSION <span id="session-count">1</span>/4</div>
                    </div>
                </div>
                <div class="control-row">
                    <button class="ctrl-btn" onclick="FocusEngine.toggleTimer()"><i id="focus-icon">▶</i></button>
                    <button class="ctrl-btn secondary" onclick="FocusEngine.resetTimer()">↻</button>
                    <button class="ctrl-btn secondary" onclick="FocusEngine.skipPhase()">⏭</button>
                </div>
            </div>

            <!-- 2. STOPWATCH -->
            <div id="view-stopwatch" class="view-section">
                <div class="big-time neon-text-sec" id="sw-display">00:00.00</div>
                <div class="control-row">
                    <button class="ctrl-btn" onclick="Stopwatch.toggle()">▶</button>
                    <button class="ctrl-btn secondary" onclick="Stopwatch.lap()">⚑</button>
                    <button class="ctrl-btn secondary" onclick="Stopwatch.reset()">↻</button>
                </div>
                <div class="lap-container">
                    <div class="lap-row"><div>#</div><div>SPLIT</div><div>TOTAL</div></div>
                    <div id="lap-list"></div>
                </div>
            </div>

            <!-- 3. WORLD CLOCK -->
            <div id="view-world" class="view-section" style="flex-direction: row; flex-wrap: wrap; gap: 20px; align-content: center;">
                <!-- Generated by JS -->
            </div>

            <!-- 4. INTERVAL -->
            <div id="view-interval" class="view-section">
                <div style="font-size: 80px; font-weight: bold; color: var(--tertiary);" id="int-display">00:00</div>
                <div style="font-size: 24px; margin-top: 10px;" id="int-status">READY</div>
                <div style="margin-top: 20px; font-family: var(--font-mono);">
                    SETS: <span id="int-sets">0</span>/8
                </div>
                <div class="control-row">
                    <button class="ctrl-btn" onclick="IntervalTimer.start()">▶</button>
                    <button class="ctrl-btn secondary" onclick="IntervalTimer.reset()">↻</button>
                </div>
                <div style="margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 300px;">
                    <label>Work (s)</label> <input type="number" id="int-work-in" value="30" style="background:#111; color:#fff; border:1px solid #333;">
                    <label>Rest (s)</label> <input type="number" id="int-rest-in" value="10" style="background:#111; color:#fff; border:1px solid #333;">
                </div>
            </div>

            <!-- 5. VISUALIZERS (Analog + Binary) -->
            <div id="view-visual" class="view-section">
                <div style="display: flex; gap: 40px; align-items: center;">
                    <canvas id="analog-canvas" width="300" height="300"></canvas>
                    <div>
                        <div style="text-align: center; margin-bottom: 10px; color: var(--secondary);">BINARY DATA STREAM</div>
                        <div class="binary-grid" id="binary-clock">
                            <!-- Generated JS -->
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <!-- Sidebar Stats -->
        <aside class="panel">
            <div style="font-family: var(--font-display); color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 5px;">USER STATISTICS</div>
            
            <div class="stat-card">
                <div class="stat-val neon-text" id="stat-xp">0</div>
                <div class="stat-label">NEURO POINTS (XP)</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-val" id="stat-level">1</div>
                <div class="stat-label">CURRENT RANK</div>
            </div>

            <div class="stat-card">
                <div class="stat-val neon-text-sec" id="stat-streak">0</div>
                <div class="stat-label">DAY STREAK</div>
            </div>

            <div style="flex-grow: 1; overflow-y: auto;">
                <div style="font-size: 12px; margin-bottom: 10px; color: #888;">ACHIEVEMENTS</div>
                <div class="badge-grid" id="badge-container">
                    <!-- Badges JS -->
                </div>
            </div>
        </aside>

        <!-- Footer -->
        <footer>
            <div id="status-msg">SYSTEM: ONLINE</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span>LVL PROGRESS</span>
                <div class="progress-bar"><div class="progress-fill" id="xp-bar"></div></div>
            </div>
        </footer>

    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2 class="neon-text" style="margin-top:0;">SYSTEM CONFIG</h2>
            <div class="setting-group">
                <label>Theme Accent</label>
                <select id="theme-select" onchange="Nexus.changeTheme(this.value)">
                    <option value="cyan">Cyber Cyan</option>
                    <option value="gold">Deus Gold</option>
                    <option value="lime">Matrix Green</option>
                    <option value="crimson">Red Alert</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Focus Duration (min)</label>
                <input type="number" id="set-focus-time" value="25">
            </div>
             <div class="setting-group">
                <label>Data Management</label>
                <button onclick="Nexus.exportData()" style="padding: 5px 10px; background: var(--primary); border: none; font-weight: bold;">EXPORT JSON</button>
                <button onclick="Nexus.clearData()" style="padding: 5px 10px; background: var(--alert); border: none; font-weight: bold; color: #fff;">FACTORY RESET</button>
            </div>
            <button onclick="Nexus.toggleSettings()" style="width: 100%; padding: 10px; border: 1px solid #555; background: transparent; color: #fff; cursor: pointer;">CLOSE</button>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-area"></div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        /* * CHRONOS NEXUS CORE ENGINE
         * Integrated Sound, Visuals, Logic, and Persistence
         */

        // --- AUDIO ENGINE (Web Audio API) ---
        const AudioEngine = {
            ctx: null,
            enabled: true,
            init() {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
            },
            playTone(freq, type, duration, vol = 0.1) {
                if (!this.enabled) return;
                if (!this.ctx) this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            playClick() { this.playTone(1200, 'sine', 0.05, 0.05); },
            playStart() { 
                this.playTone(400, 'square', 0.1); 
                setTimeout(() => this.playTone(600, 'square', 0.2), 100);
            },
            playAlarm() {
                let count = 0;
                const interval = setInterval(() => {
                    this.playTone(800, 'sawtooth', 0.2, 0.2);
                    setTimeout(() => this.playTone(600, 'sawtooth', 0.2, 0.2), 200);
                    count++;
                    if(count > 4) clearInterval(interval);
                }, 500);
            },
            playUnlock() {
                this.playTone(300, 'sine', 0.1);
                setTimeout(() => this.playTone(500, 'sine', 0.1), 100);
                setTimeout(() => this.playTone(800, 'sine', 0.4), 200);
            }
        };

        // --- DATA PERSISTENCE ---
        const Storage = {
            data: {
                xp: 0,
                level: 1,
                streak: 0,
                lastLogin: null,
                badges: [],
                settings: { theme: 'cyan', focusTime: 25 },
                history: []
            },
            load() {
                const saved = localStorage.getItem('chronos_data');
                if (saved) this.data = { ...this.data, ...JSON.parse(saved) };
                this.checkStreak();
                this.save();
            },
            save() { localStorage.setItem('chronos_data', JSON.stringify(this.data)); },
            checkStreak() {
                const today = new Date().toDateString();
                if (this.data.lastLogin !== today) {
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    if (this.data.lastLogin === yesterday.toDateString()) {
                        this.data.streak++;
                    } else if (this.data.lastLogin !== today) {
                        this.data.streak = 1; // Reset or Start
                    }
                    this.data.lastLogin = today;
                }
            },
            addXP(amount) {
                this.data.xp += amount;
                const nextLevel = this.data.level * 1000;
                if (this.data.xp >= nextLevel) {
                    this.data.level++;
                    Nexus.notify('LEVEL UP', `Rank ${this.data.level} Achieved!`);
                    AudioEngine.playUnlock();
                }
                Gamification.updateUI();
                Gamification.checkBadges();
                this.save();
            }
        };

        // --- GAMIFICATION ---
        const Gamification = {
            badges: [
                { id: 'novice', name: 'Initiate', icon: '⚡', req: 0 },
                { id: 'hour1', name: 'Time Walker', icon: '⏳', req: 60 }, // 60 mins focus
                { id: 'streak3', name: 'Consistent', icon: '🔥', req: 500 }, // XP based placeholder
                { id: 'master', name: 'Chronos Master', icon: '👑', req: 5000 }
            ],
            init() {
                const container = document.getElementById('badge-container');
                container.innerHTML = this.badges.map(b => `
                    <div class="badge" id="badge-${b.id}">
                        <span class="badge-icon">${b.icon}</span>
                        <div style="font-size:10px;">${b.name}</div>
                    </div>
                `).join('');
                this.updateUI();
            },
            updateUI() {
                document.getElementById('stat-xp').textContent = Storage.data.xp;
                document.getElementById('stat-level').textContent = Storage.data.level;
                document.getElementById('stat-streak').textContent = Storage.data.streak;
                
                // XP Bar
                const nextLevel = Storage.data.level * 1000;
                const prevLevel = (Storage.data.level - 1) * 1000;
                const progress = ((Storage.data.xp - prevLevel) / (nextLevel - prevLevel)) * 100;
                document.getElementById('xp-bar').style.width = `${Math.max(0, Math.min(100, progress))}%`;

                // Badges
                this.badges.forEach(b => {
                    if (Storage.data.badges.includes(b.id)) {
                        document.getElementById(`badge-${b.id}`).classList.add('unlocked');
                    }
                });
            },
            checkBadges() {
                // Simplified badge logic based on XP for demo
                this.badges.forEach(b => {
                    if (Storage.data.xp >= b.req && !Storage.data.badges.includes(b.id)) {
                        Storage.data.badges.push(b.id);
                        Nexus.notify('BADGE UNLOCKED', b.name);
                        document.getElementById(`badge-${b.id}`).classList.add('unlocked');
                        AudioEngine.playUnlock();
                    }
                });
            }
        };

        // --- VISUALIZERS ---
        const Visuals = {
            init() {
                this.initBinary();
                this.animateAnalog();
                this.updateWorldClocks();
                setInterval(() => {
                    this.updateBinary();
                    this.updateWorldClocks();
                    document.getElementById('global-clock').textContent = new Date().toLocaleTimeString();
                }, 1000);
            },
            initBinary() {
                const grid = document.getElementById('binary-clock');
                grid.innerHTML = '';
                // 6 columns (H H M M S S), 4 bits each
                for(let i=0; i<6; i++) {
                    const col = document.createElement('div');
                    col.className = 'bit-col';
                    for(let j=0; j<4; j++) {
                        const bit = document.createElement('div');
                        bit.className = 'bit';
                        bit.id = `bit-${i}-${j}`;
                        col.appendChild(bit);
                    }
                    grid.appendChild(col);
                }
            },
            updateBinary() {
                const now = new Date();
                const time = [
                    Math.floor(now.getHours() / 10), now.getHours() % 10,
                    Math.floor(now.getMinutes() / 10), now.getMinutes() % 10,
                    Math.floor(now.getSeconds() / 10), now.getSeconds() % 10
                ];
                time.forEach((val, colIdx) => {
                    for(let bit=0; bit<4; bit++) {
                        const el = document.getElementById(`bit-${colIdx}-${bit}`);
                        if ((val >> bit) & 1) el.classList.add('on');
                        else el.classList.remove('on');
                    }
                });
            },
            animateAnalog() {
                const canvas = document.getElementById('analog-canvas');
                const ctx = canvas.getContext('2d');
                const center = 150;
                
                const draw = () => {
                    ctx.clearRect(0,0,300,300);
                    const now = new Date();
                    
                    // Ring
                    ctx.beginPath();
                    ctx.arc(center, center, 140, 0, Math.PI * 2);
                    ctx.strokeStyle = '#333'; ctx.lineWidth = 10; ctx.stroke();
                    
                    // Ticks
                    for(let i=0; i<60; i++) {
                        ctx.save();
                        ctx.translate(center, center);
                        ctx.rotate(i * 6 * Math.PI/180);
                        ctx.fillStyle = i % 5 === 0 ? '#00f3ff' : '#444';
                        ctx.fillRect(-1, -135, 2, i % 5 === 0 ? 15 : 5);
                        ctx.restore();
                    }

                    // Hands
                    const sec = now.getSeconds();
                    const min = now.getMinutes();
                    const hr = now.getHours() % 12;

                    this.drawHand(ctx, (hr*30 + min*0.5) * Math.PI/180, 80, 6, '#fff');
                    this.drawHand(ctx, (min*6 + sec*0.1) * Math.PI/180, 110, 4, '#0aff00');
                    this.drawHand(ctx, sec * 6 * Math.PI/180, 120, 2, '#ff00ff');

                    // Center
                    ctx.beginPath(); ctx.arc(center, center, 8, 0, Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
                    
                    requestAnimationFrame(draw);
                };
                draw();
            },
            drawHand(ctx, pos, length, width, color) {
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(pos);
                ctx.beginPath();
                ctx.moveTo(0,0);
                ctx.lineTo(0, -length);
                ctx.strokeStyle = color;
                ctx.lineWidth = width;
                ctx.shadowBlur = 10; ctx.shadowColor = color;
                ctx.stroke();
                ctx.restore();
            },
            updateWorldClocks() {
                const zones = ['America/New_York', 'Europe/London', 'Asia/Tokyo', 'Australia/Sydney'];
                const container = document.getElementById('view-world');
                // Only render if empty (first run) or just update text to avoid redraw flicker
                if (container.children.length === 0) {
                    zones.forEach(z => {
                        const div = document.createElement('div');
                        div.className = 'panel';
                        div.style.padding = '20px'; div.style.width = '200px'; div.style.textAlign = 'center';
                        div.innerHTML = `
                            <div style="font-size:12px; color:var(--primary); margin-bottom:10px;">${z.split('/')[1].toUpperCase()}</div>
                            <div class="world-time" data-zone="${z}" style="font-size:32px; font-family:var(--font-mono);"></div>
                            <div class="world-date" data-zone="${z}" style="font-size:12px; color:#666;"></div>
                        `;
                        container.appendChild(div);
                    });
                }
                
                document.querySelectorAll('.world-time').forEach(el => {
                    const z = el.getAttribute('data-zone');
                    const d = new Date().toLocaleTimeString('en-US', { timeZone: z, hour12: false });
                    el.textContent = d;
                });
                document.querySelectorAll('.world-date').forEach(el => {
                    const z = el.getAttribute('data-zone');
                    const d = new Date().toLocaleDateString('en-US', { timeZone: z });
                    el.textContent = d;
                });
            }
        };

        // --- FOCUS ENGINE (POMODORO) ---
        const FocusEngine = {
            timer: null,
            timeLeft: 25 * 60,
            initialTime: 25 * 60,
            isRunning: false,
            mode: 'focus', // focus, short-break, long-break
            sessions: 1,
            
            toggleTimer() {
                if (this.isRunning) this.pause();
                else this.start();
            },
            start() {
                if(this.isRunning) return;
                this.isRunning = true;
                AudioEngine.playStart();
                document.getElementById('focus-icon').textContent = '⏸';
                this.timer = setInterval(() => this.tick(), 1000);
            },
            pause() {
                this.isRunning = false;
                AudioEngine.playClick();
                document.getElementById('focus-icon').textContent = '▶';
                clearInterval(this.timer);
            },
            resetTimer() {
                this.pause();
                this.setTimeBasedOnMode();
                this.updateDisplay();
            },
            tick() {
                if (this.timeLeft > 0) {
                    this.timeLeft--;
                    // XP Generation every minute
                    if(this.timeLeft % 60 === 0 && this.mode === 'focus') {
                        Storage.addXP(10); 
                    }
                    this.updateDisplay();
                } else {
                    this.complete();
                }
            },
            complete() {
                this.pause();
                AudioEngine.playAlarm();
                Nexus.notify('TIMER COMPLETE', `${this.mode.toUpperCase()} Cycle Finished`);
                
                if (this.mode === 'focus') {
                    Storage.addXP(100); // Bonus for completion
                    this.sessions++;
                    if (this.sessions % 4 === 0) {
                        this.mode = 'long-break';
                        this.timeLeft = 15 * 60;
                        Nexus.notify('SUGGESTION', 'Take a Long Break (15m)');
                    } else {
                        this.mode = 'short-break';
                        this.timeLeft = 5 * 60;
                        Nexus.notify('SUGGESTION', 'Take a Short Break (5m)');
                    }
                } else {
                    this.mode = 'focus';
                    this.timeLeft = parseInt(Storage.data.settings.focusTime) * 60;
                }
                
                this.initialTime = this.timeLeft;
                this.updateDisplay();
                this.updateModeUI();
            },
            skipPhase() {
                this.complete(); // Shortcut to logic
                AudioEngine.ctx.resume(); // Ensure audio triggers if blocked
            },
            setTimeBasedOnMode() {
                if(this.mode === 'focus') this.timeLeft = parseInt(Storage.data.settings.focusTime) * 60;
                else if(this.mode === 'short-break') this.timeLeft = 5 * 60;
                else this.timeLeft = 15 * 60;
                this.initialTime = this.timeLeft;
            },
            updateModeUI() {
                document.getElementById('focus-mode').textContent = this.mode.replace('-', ' ');
                document.getElementById('focus-mode').className = this.mode === 'focus' ? 'timer-status neon-text-sec' : 'timer-status neon-text';
                document.getElementById('session-count').textContent = this.sessions;
            },
            updateDisplay() {
                const m = Math.floor(this.timeLeft / 60).toString().padStart(2, '0');
                const s = (this.timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('focus-display').textContent = `${m}:${s}`;
                
                // SVG Circle
                const circle = document.getElementById('focus-circle');
                const circumference = 1131; // 2 * pi * 180
                const offset = circumference - (this.timeLeft / this.initialTime) * circumference;
                circle.style.strokeDashoffset = offset;
            }
        };

        // --- STOPWATCH ---
        const Stopwatch = {
            startTime: 0,
            elapsed: 0,
            interval: null,
            laps: [],
            toggle() {
                if (this.interval) {
                    clearInterval(this.interval);
                    this.interval = null;
                } else {
                    this.startTime = Date.now() - this.elapsed;
                    this.interval = setInterval(() => {
                        this.elapsed = Date.now() - this.startTime;
                        this.update();
                    }, 10);
                }
            },
            reset() {
                clearInterval(this.interval);
                this.interval = null;
                this.elapsed = 0;
                this.laps = [];
                this.update();
                document.getElementById('lap-list').innerHTML = '';
            },
            lap() {
                if (!this.interval) return;
                const lapTime = this.elapsed;
                const lastLap = this.laps.length > 0 ? this.laps[this.laps.length-1].total : 0;
                const split = lapTime - lastLap;
                
                this.laps.push({ split: split, total: lapTime });
                
                const div = document.createElement('div');
                div.className = 'lap-row';
                div.innerHTML = `
                    <div>${this.laps.length.toString().padStart(2,'0')}</div>
                    <div style="color:var(--primary)">${this.format(split)}</div>
                    <div>${this.format(lapTime)}</div>
                `;
                document.getElementById('lap-list').prepend(div);
            },
            update() {
                document.getElementById('sw-display').textContent = this.format(this.elapsed);
            },
            format(ms) {
                const date = new Date(ms);
                const m = date.getMinutes().toString().padStart(2, '0');
                const s = date.getSeconds().toString().padStart(2, '0');
                const mls = Math.floor(date.getMilliseconds() / 10).toString().padStart(2, '0');
                return `${m}:${s}.${mls}`;
            }
        };

        // --- INTERVAL TIMER ---
        const IntervalTimer = {
            sets: 0,
            totalSets: 8,
            state: 'idle', // idle, work, rest
            timer: null,
            timeLeft: 0,
            
            start() {
                if (this.state !== 'idle') return;
                this.sets = 1;
                this.startWork();
            },
            startWork() {
                this.state = 'work';
                this.timeLeft = parseInt(document.getElementById('int-work-in').value);
                this.updateUI('#00f3ff');
                this.runTimer(() => this.startRest());
            },
            startRest() {
                if (this.sets >= 8) {
                    this.reset();
                    Nexus.notify('INTERVALS DONE', 'Training Complete');
                    Storage.addXP(200);
                    return;
                }
                this.state = 'rest';
                this.timeLeft = parseInt(document.getElementById('int-rest-in').value);
                this.updateUI('#ff00ff');
                this.runTimer(() => {
                    this.sets++;
                    this.startWork();
                });
            },
            runTimer(callback) {
                clearInterval(this.timer);
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    this.updateUI(this.state === 'work' ? '#00f3ff' : '#ff00ff');
                    if (this.timeLeft <= 0) {
                        clearInterval(this.timer);
                        AudioEngine.playTone(600, 'square', 0.5);
                        callback();
                    } else if (this.timeLeft <= 3) {
                        AudioEngine.playClick(); // Countdown ticks
                    }
                }, 1000);
            },
            reset() {
                clearInterval(this.timer);
                this.state = 'idle';
                this.sets = 0;
                document.getElementById('int-display').textContent = '00:00';
                document.getElementById('int-status').textContent = 'READY';
                document.getElementById('int-display').style.color = '#fff';
            },
            updateUI(color) {
                const m = Math.floor(this.timeLeft / 60).toString().padStart(2, '0');
                const s = (this.timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('int-display').textContent = `${m}:${s}`;
                document.getElementById('int-display').style.color = color;
                document.getElementById('int-status').textContent = this.state.toUpperCase();
                document.getElementById('int-sets').textContent = this.sets;
            }
        };

        // --- GLOBAL NEXUS CONTROLLER ---
        const Nexus = {
            init() {
                Storage.load();
                Gamification.init();
                Visuals.init();
                this.initParticles();
                
                // Request Notification Permission
                if ("Notification" in window) Notification.requestPermission();
                
                // Apply Settings
                this.changeTheme(Storage.data.settings.theme);
                document.getElementById('set-focus-time').value = Storage.data.settings.focusTime;
            },
            switchTab(tabId) {
                // UI Toggle
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                document.getElementById(`view-${tabId}`).classList.add('active');
                
                // Nav Toggle
                document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
                event.target.classList.add('active');
                
                AudioEngine.playClick();
            },
            notify(title, body) {
                // In-App Toast
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<div class="toast-title">${title}</div><div>${body}</div>`;
                document.getElementById('toast-area').appendChild(toast);
                
                setTimeout(() => toast.classList.add('show'), 100);
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400);
                }, 4000);

                // System Notification
                if (Notification.permission === "granted") {
                    new Notification(title, { body: body });
                }
            },
            toggleSettings() {
                const el = document.getElementById('settings-modal');
                el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
                
                // Save settings on close
                if(el.style.display === 'none') {
                    Storage.data.settings.focusTime = document.getElementById('set-focus-time').value;
                    Storage.save();
                    FocusEngine.timeLeft = parseInt(Storage.data.settings.focusTime) * 60;
                    FocusEngine.updateDisplay();
                }
            },
            changeTheme(val) {
                const r = document.documentElement.style;
                Storage.data.settings.theme = val;
                if(val === 'cyan') {
                    r.setProperty('--primary', '#00f3ff');
                    r.setProperty('--secondary', '#ff00ff');
                } else if (val === 'gold') {
                    r.setProperty('--primary', '#ffd700');
                    r.setProperty('--secondary', '#ff8c00');
                } else if (val === 'lime') {
                    r.setProperty('--primary', '#0aff00');
                    r.setProperty('--secondary', '#003300');
                } else if (val === 'crimson') {
                    r.setProperty('--primary', '#ff0055');
                    r.setProperty('--secondary', '#550000');
                }
            },
            toggleSound() {
                AudioEngine.enabled = !AudioEngine.enabled;
                document.getElementById('sound-btn').textContent = `Sound: ${AudioEngine.enabled ? 'ON' : 'OFF'}`;
            },
            toggleFullscreen() {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else if (document.exitFullscreen) document.exitFullscreen();
            },
            exportData() {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(Storage.data));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "chronos_backup.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            },
            clearData() {
                if(confirm("Factory Reset? This cannot be undone.")) {
                    localStorage.removeItem('chronos_data');
                    location.reload();
                }
            },
            initParticles() {
                const canvas = document.getElementById('canvas-bg');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                let particles = [];
                for(let i=0; i<100; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        size: Math.random() * 2
                    });
                }

                function anim() {
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
                    
                    particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        
                        if(p.x < 0) p.x = canvas.width;
                        if(p.x > canvas.width) p.x = 0;
                        if(p.y < 0) p.y = canvas.height;
                        if(p.y > canvas.height) p.y = 0;

                        ctx.globalAlpha = 0.3;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                        ctx.fill();
                    });
                    
                    // Connect close particles
                    ctx.strokeStyle = ctx.fillStyle;
                    ctx.lineWidth = 0.2;
                    for(let i=0; i<particles.length; i++) {
                        for(let j=i; j<particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            if(dist < 100) {
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }
                    requestAnimationFrame(anim);
                }
                anim();
                
                window.addEventListener('resize', () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                });
            }
        };

        // --- BOOT ---
        window.addEventListener('load', () => Nexus.init());

    </script>
