<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Snake 3D — Full Perspective</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}
canvas{display:block;width:100%;height:100%}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:6px}
.hud-box{background:rgba(0,0,0,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 14px;pointer-events:all}
.hud-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.hud-value{font-size:22px;font-weight:800;color:#fff;line-height:1.1}
.hud-value.score{color:#4ade80}
.hud-value.speed{color:#fbbf24}
.hud-value.length{color:#60a5fa}

/* Controls */
#controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.ctrl-row{display:flex;gap:6px}
.ctrl-btn{width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,.08);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1.5px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;transition:all .15s;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{background:rgba(255,255,255,.2);transform:scale(.92);color:#fff}
.ctrl-btn.space{width:140px;font-size:13px;font-weight:700;letter-spacing:.06em}

/* Camera toggle */
#cam-toggle{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:4px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:3px;pointer-events:all}
.cam-btn{padding:6px 12px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;border:none;background:none;font-family:inherit}
.cam-btn.active{background:rgba(255,255,255,.12);color:#fff}

/* Game Over / Start */
#overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:rgba(0,0,0,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:opacity .4s;gap:16px;padding:24px}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:clamp(28px,6vw,44px);font-weight:900;line-height:1.1}
#overlay h1 span{background:linear-gradient(135deg,#4ade80,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#overlay .sub{font-size:14px;color:rgba(255,255,255,.5);max-width:320px;line-height:1.5}
#overlay .final-score{font-size:48px;font-weight:900;color:#4ade80}
#overlay .high-score{font-size:13px;color:rgba(255,255,255,.4)}
.play-btn{padding:16px 40px;border-radius:16px;background:linear-gradient(135deg,#4ade80,#22c55e);border:none;color:#000;font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 24px rgba(74,222,128,.3)}
.play-btn:active{transform:scale(.96)}
.controls-hint{font-size:11px;color:rgba(255,255,255,.3);max-width:300px;line-height:1.5}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hud-left">
    <div class="hud-box"><div class="hud-label">Score</div><div class="hud-value score" id="h-score">0</div></div>
    <div class="hud-box"><div class="hud-label">Length</div><div class="hud-value length" id="h-length">3</div></div>
  </div>
  <div class="hud-right">
    <div class="hud-box"><div class="hud-label">Speed</div><div class="hud-value speed" id="h-speed">1</div></div>
    <div class="hud-box"><div class="hud-label">High</div><div class="hud-value" id="h-high" style="color:#c084fc">0</div></div>
  </div>
</div>

<div id="cam-toggle">
  <button class="cam-btn active" data-cam="chase" onclick="setCam('chase')">CHASE</button>
  <button class="cam-btn" data-cam="orbit" onclick="setCam('orbit')">ORBIT</button>
  <button class="cam-btn" data-cam="top" onclick="setCam('top')">TOP</button>
  <button class="cam-btn" data-cam="side" onclick="setCam('side')">SIDE</button>
</div>

<div id="controls">
  <div class="ctrl-row"><button class="ctrl-btn" ontouchstart="inputDir('up');event.preventDefault()" onmousedown="inputDir('up')">▲</button></div>
  <div class="ctrl-row">
    <button class="ctrl-btn" ontouchstart="inputDir('left');event.preventDefault()" onmousedown="inputDir('left')">◀</button>
    <button class="ctrl-btn space" ontouchstart="inputDir('boost');event.preventDefault()" onmousedown="inputDir('boost')">BOOST</button>
    <button class="ctrl-btn" ontouchstart="inputDir('right');event.preventDefault()" onmousedown="inputDir('right')">▶</button>
  </div>
  <div class="ctrl-row"><button class="ctrl-btn" ontouchstart="inputDir('down');event.preventDefault()" onmousedown="inputDir('down')">▼</button></div>
</div>

<div id="overlay">
  <h1>Snake <span>3D</span></h1>
  <div class="sub">Navigate a 3D snake across the grid. Eat orbs to grow. Don't hit the walls or yourself!</div>
  <div class="final-score" id="o-score" style="display:none"></div>
  <div class="high-score" id="o-high"></div>
  <button class="play-btn" onclick="startGame()">▶ PLAY</button>
  <div class="controls-hint">🎮 WASD / Arrow Keys to steer<br>Space to boost · 1-4 to switch camera<br>Touch controls below for mobile</div>
</div>

<script>
// ===== WebGL Setup =====
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:true,alpha:false});
if(!gl){document.body.innerHTML='<p style="color:#fff;padding:40px">WebGL2 required</p>';throw 'no gl';}

let W, H, aspect;
const DPR = Math.min(window.devicePixelRatio, 2);

function resize(){
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  aspect = W / H;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ===== Shader Compilation =====
function compileShader(src, type){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}
  return s;
}
function createProgram(vs, fs){
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(p));return null;}
  return p;
}

// ===== Shaders =====
const VS = `#version 300 es
layout(location=0) in vec3 aPos;
layout(location=1) in vec3 aNorm;
uniform mat4 uMVP;
uniform mat4 uModel;
uniform mat3 uNormalMat;
out vec3 vNorm;
out vec3 vWorldPos;
out vec3 vLocalPos;
void main(){
  vec4 world = uModel * vec4(aPos, 1.0);
  vWorldPos = world.xyz;
  vLocalPos = aPos;
  vNorm = normalize(uNormalMat * aNorm);
  gl_Position = uMVP * vec4(aPos, 1.0);
}`;

const FS = `#version 300 es
precision highp float;
in vec3 vNorm;
in vec3 vWorldPos;
in vec3 vLocalPos;
uniform vec3 uColor;
uniform vec3 uCamPos;
uniform float uEmissive;
uniform float uTime;
uniform int uType; // 0=normal, 1=food, 2=grid, 3=snakeHead, 4=wall
out vec4 fragColor;
void main(){
  vec3 N = normalize(vNorm);
  // Main directional light
  vec3 lightDir = normalize(vec3(0.5, 1.0, 0.3));
  float diff = max(dot(N, lightDir), 0.0);
  // Rim light
  vec3 viewDir = normalize(uCamPos - vWorldPos);
  float rim = pow(1.0 - max(dot(viewDir, N), 0.0), 3.0);
  // Specular
  vec3 halfDir = normalize(lightDir + viewDir);
  float spec = pow(max(dot(N, halfDir), 0.0), 32.0);

  vec3 ambient = uColor * 0.15;
  vec3 col = ambient + uColor * diff * 0.7 + vec3(1.0) * spec * 0.3;
  col += uColor * rim * 0.3;
  col += uColor * uEmissive;

  // Food glow pulse
  if(uType == 1){
    float pulse = sin(uTime * 4.0) * 0.5 + 0.5;
    col += uColor * pulse * 0.4;
    col += vec3(1.0) * spec * 0.5;
  }
  // Grid
  if(uType == 2){
    col *= 0.4;
    col += vec3(0.02);
  }
  // Snake head
  if(uType == 3){
    col += uColor * 0.2;
    float eyeGlow = pow(max(dot(viewDir, N), 0.0), 8.0);
    col += vec3(1.0, 1.0, 0.5) * eyeGlow * 0.15;
  }
  // Wall subtle glow
  if(uType == 4){
    float edge = 1.0 - smoothstep(0.0, 0.1, min(min(fract(vLocalPos.x*2.0), fract(vLocalPos.z*2.0)), fract(vLocalPos.y*2.0)));
    col += vec3(0.3, 0.4, 0.6) * edge * 0.08;
  }

  // Fog
  float dist = length(vWorldPos - uCamPos);
  float fog = 1.0 - exp(-dist * 0.015);
  col = mix(col, vec3(0.02, 0.02, 0.05), fog);

  fragColor = vec4(col, 1.0);
}`;

const prog = createProgram(VS, FS);
const uMVP = gl.getUniformLocation(prog, 'uMVP');
const uModel = gl.getUniformLocation(prog, 'uModel');
const uNormalMat = gl.getUniformLocation(prog, 'uNormalMat');
const uColor = gl.getUniformLocation(prog, 'uColor');
const uCamPos = gl.getUniformLocation(prog, 'uCamPos');
const uEmissive = gl.getUniformLocation(prog, 'uEmissive');
const uTime = gl.getUniformLocation(prog, 'uTime');
const uType = gl.getUniformLocation(prog, 'uType');

// ===== Geometry Builders =====
function createCubeGeometry(){
  const p=0.5;
  const verts = [
    // Front
    -p,-p, p, 0,0,1,  p,-p, p, 0,0,1,  p, p, p, 0,0,1,  -p, p, p, 0,0,1,
    // Back
     p,-p,-p, 0,0,-1, -p,-p,-p, 0,0,-1, -p, p,-p, 0,0,-1,  p, p,-p, 0,0,-1,
    // Top
    -p, p, p, 0,1,0,   p, p, p, 0,1,0,   p, p,-p, 0,1,0,  -p, p,-p, 0,1,0,
    // Bottom
    -p,-p,-p, 0,-1,0,  p,-p,-p, 0,-1,0,  p,-p, p, 0,-1,0, -p,-p, p, 0,-1,0,
    // Right
     p,-p, p, 1,0,0,   p,-p,-p, 1,0,0,   p, p,-p, 1,0,0,   p, p, p, 1,0,0,
    // Left
    -p,-p,-p,-1,0,0,  -p,-p, p,-1,0,0,  -p, p, p,-1,0,0,  -p, p,-p,-1,0,0
  ];
  const idx = [];
  for(let i=0;i<6;i++){
    const b=i*4;
    idx.push(b,b+1,b+2,b,b+2,b+3);
  }
  return buildMesh(new Float32Array(verts), new Uint16Array(idx));
}

function createSphereGeometry(rings=16, sectors=24){
  const verts=[], idx=[];
  for(let r=0;r<=rings;r++){
    const phi=Math.PI*r/rings;
    const sp=Math.sin(phi), cp=Math.cos(phi);
    for(let s=0;s<=sectors;s++){
      const theta=2*Math.PI*s/sectors;
      const st=Math.sin(theta), ct=Math.cos(theta);
      const x=ct*sp, y=cp, z=st*sp;
      verts.push(x*0.5, y*0.5, z*0.5, x, y, z);
    }
  }
  for(let r=0;r<rings;r++){
    for(let s=0;s<sectors;s++){
      const a=r*(sectors+1)+s;
      const b=a+sectors+1;
      idx.push(a,b,a+1, b,b+1,a+1);
    }
  }
  return buildMesh(new Float32Array(verts), new Uint16Array(idx));
}

function createCylinderGeometry(segs=16){
  const verts=[], idx=[];
  // Side
  for(let i=0;i<=segs;i++){
    const a=2*Math.PI*i/segs;
    const x=Math.cos(a)*0.5, z=Math.sin(a)*0.5;
    verts.push(x,-0.5,z, x,0,z);
    verts.push(x, 0.5,z, x,0,z);
  }
  for(let i=0;i<segs;i++){
    const b=i*2;
    idx.push(b,b+2,b+1, b+1,b+2,b+3);
  }
  // Top cap
  const tc=verts.length/6;
  verts.push(0,0.5,0, 0,1,0);
  for(let i=0;i<=segs;i++){
    const a=2*Math.PI*i/segs;
    verts.push(Math.cos(a)*0.5,0.5,Math.sin(a)*0.5, 0,1,0);
  }
  for(let i=0;i<segs;i++)idx.push(tc,tc+1+i,tc+2+i);
  // Bottom cap
  const bc=verts.length/6;
  verts.push(0,-0.5,0, 0,-1,0);
  for(let i=0;i<=segs;i++){
    const a=2*Math.PI*i/segs;
    verts.push(Math.cos(a)*0.5,-0.5,Math.sin(a)*0.5, 0,-1,0);
  }
  for(let i=0;i<segs;i++)idx.push(bc,bc+2+i,bc+1+i);
  return buildMesh(new Float32Array(verts), new Uint16Array(idx));
}

function buildMesh(verts, indices){
  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);
  const vbo = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 24, 0);
  gl.enableVertexAttribArray(1);
  gl.vertexAttribPointer(1, 3, gl.FLOAT, false, 24, 12);
  const ibo = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, indices, gl.STATIC_DRAW);
  gl.bindVertexArray(null);
  return {vao, count: indices.length};
}

const cubeMesh = createCubeGeometry();
const sphereMesh = createSphereGeometry();
const cylinderMesh = createCylinderGeometry();

// ===== Matrix Math =====
function mat4(){return new Float32Array(16)}
function identity(m){m.fill(0);m[0]=m[5]=m[10]=m[15]=1;return m}
function perspective(fov,asp,near,far){
  const m=mat4();
  const f=1/Math.tan(fov/2);
  m[0]=f/asp;m[5]=f;m[10]=(far+near)/(near-far);m[11]=-1;m[14]=2*far*near/(near-far);
  return m;
}
function lookAt(eye,center,up){
  const m=mat4();
  let zx=eye[0]-center[0],zy=eye[1]-center[1],zz=eye[2]-center[2];
  let l=Math.sqrt(zx*zx+zy*zy+zz*zz);zx/=l;zy/=l;zz/=l;
  let xx=up[1]*zz-up[2]*zy, xy=up[2]*zx-up[0]*zz, xz=up[0]*zy-up[1]*zx;
  l=Math.sqrt(xx*xx+xy*xy+xz*xz);xx/=l;xy/=l;xz/=l;
  let yx=zy*xz-zz*xy, yy=zz*xx-zx*xz, yz=zx*xy-zy*xx;
  m[0]=xx;m[1]=yx;m[2]=zx;m[4]=xy;m[5]=yy;m[6]=zy;m[8]=xz;m[9]=yz;m[10]=zz;
  m[12]=-(xx*eye[0]+xy*eye[1]+xz*eye[2]);
  m[13]=-(yx*eye[0]+yy*eye[1]+yz*eye[2]);
  m[14]=-(zx*eye[0]+zy*eye[1]+zz*eye[2]);
  m[15]=1;
  return m;
}
function multiply(a,b){
  const m=mat4();
  for(let i=0;i<4;i++)for(let j=0;j<4;j++){
    m[j*4+i]=a[i]*b[j*4]+a[4+i]*b[j*4+1]+a[8+i]*b[j*4+2]+a[12+i]*b[j*4+3];
  }
  return m;
}
function translate(x,y,z){const m=mat4();identity(m);m[12]=x;m[13]=y;m[14]=z;return m}
function scale(x,y,z){const m=mat4();identity(m);m[0]=x;m[5]=y;m[10]=z;return m}
function rotateY(a){const m=mat4();identity(m);const c=Math.cos(a),s=Math.sin(a);m[0]=c;m[2]=s;m[8]=-s;m[10]=c;return m}
function rotateX(a){const m=mat4();identity(m);const c=Math.cos(a),s=Math.sin(a);m[5]=c;m[6]=-s;m[9]=s;m[10]=c;return m}
function getNormalMat(model){
  // Extract 3x3 and compute inverse transpose (simplified for uniform scale)
  return new Float32Array([model[0],model[1],model[2],model[4],model[5],model[6],model[8],model[9],model[10]]);
}

// ===== GAME CONFIG =====
const GRID = 20; // Grid size NxN
const CELL = 2; // World units per cell
const HALF = GRID * CELL / 2;

// ===== GAME STATE =====
let snake = [];
let dir = {x:1, z:0};
let nextDir = {x:1, z:0};
let food = {x:0, z:0};
let score = 0;
let highScore = parseInt(localStorage.getItem('snake3d_high'))||0;
let gameRunning = false;
let gameOver = false;
let moveTimer = 0;
let moveInterval = 0.18;
let boostActive = false;
let globalTime = 0;
let camMode = 'chase';
let camAngle = 0; // For orbit
let camPitch = 0.6;
let particles = [];
let trailParticles = [];
let wallFlash = 0;

// ===== CAMERA STATE =====
let camPos = [0, 30, 30];
let camTarget = [0, 0, 0];
let smoothCamPos = [0, 30, 30];
let smoothCamTarget = [0, 0, 0];

// ===== INPUT =====
let inputQueue = [];

function inputDir(d){
  if(!gameRunning && !gameOver){startGame();return}
  if(gameOver)return;
  if(d === 'boost'){boostActive = true; setTimeout(()=>boostActive=false, 2000);return}
  let nd;
  switch(d){
    case 'up': nd={x:0,z:-1};break;
    case 'down': nd={x:0,z:1};break;
    case 'left': nd={x:-1,z:0};break;
    case 'right': nd={x:1,z:0};break;
    default: return;
  }
  // Prevent reverse
  const lastDir = inputQueue.length ? inputQueue[inputQueue.length-1] : dir;
  if(nd.x === -lastDir.x && nd.z === -lastDir.z) return;
  if(inputQueue.length < 3) inputQueue.push(nd);
}

document.addEventListener('keydown', e => {
  if(e.repeat) return;
  switch(e.key){
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); inputDir('up'); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); inputDir('down'); break;
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); inputDir('left'); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); inputDir('right'); break;
    case ' ': e.preventDefault(); inputDir('boost'); break;
    case '1': setCam('chase'); break;
    case '2': setCam('orbit'); break;
    case '3': setCam('top'); break;
    case '4': setCam('side'); break;
  }
});

// Swipe
let touchStartX=0, touchStartY=0;
document.addEventListener('touchstart', e => {
  if(e.target.closest('#controls')||e.target.closest('#cam-toggle')||e.target.closest('#overlay'))return;
  touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend', e => {
  if(e.target.closest('#controls')||e.target.closest('#cam-toggle')||e.target.closest('#overlay'))return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<30&&Math.abs(dy)<30)return;
  if(Math.abs(dx)>Math.abs(dy)){inputDir(dx>0?'right':'left')}
  else{inputDir(dy>0?'down':'up')}
},{passive:true});

// ===== CAMERA =====
function setCam(mode){
  camMode=mode;
  document.querySelectorAll('.cam-btn').forEach(b=>b.classList.toggle('active',b.dataset.cam===mode));
}

function updateCamera(dt){
  const head = snake[0];
  const hx = head.x * CELL, hz = head.z * CELL;

  switch(camMode){
    case 'chase':{
      const behindX = -dir.x * 12;
      const behindZ = -dir.z * 12;
      camPos = [hx + behindX, 14, hz + behindZ];
      camTarget = [hx + dir.x*4, 0, hz + dir.z*4];
      break;
    }
    case 'orbit':{
      camAngle += dt * 0.3;
      const r = 28;
      camPos = [hx + Math.cos(camAngle)*r, 18, hz + Math.sin(camAngle)*r];
      camTarget = [hx, 1, hz];
      break;
    }
    case 'top':{
      camPos = [hx, 40, hz + 0.01];
      camTarget = [hx, 0, hz];
      break;
    }
    case 'side':{
      camPos = [hx + 30, 8, hz];
      camTarget = [hx, 1, hz];
      break;
    }
  }

  // Smooth
  const s = 1 - Math.pow(0.01, dt);
  for(let i=0;i<3;i++){
    smoothCamPos[i] += (camPos[i]-smoothCamPos[i])*s;
    smoothCamTarget[i] += (camTarget[i]-smoothCamTarget[i])*s;
  }
}

// ===== GAME LOGIC =====
function spawnFood(){
  let attempts = 0;
  do{
    food.x = Math.floor(Math.random()*GRID) - GRID/2;
    food.z = Math.floor(Math.random()*GRID) - GRID/2;
    attempts++;
  }while(snake.some(s=>s.x===food.x&&s.z===food.z) && attempts<200);
}

function startGame(){
  snake = [];
  for(let i=0;i<3;i++) snake.push({x:-i, z:0});
  dir = {x:1,z:0};
  nextDir = {x:1,z:0};
  inputQueue = [];
  score = 0;
  moveTimer = 0;
  moveInterval = 0.18;
  boostActive = false;
  gameRunning = true;
  gameOver = false;
  particles = [];
  trailParticles = [];
  spawnFood();
  document.getElementById('overlay').classList.add('hidden');
  updateHUD();
}

function endGame(){
  gameRunning = false;
  gameOver = true;
  wallFlash = 1;
  if(score > highScore){highScore = score; localStorage.setItem('snake3d_high', highScore);}
  // Show overlay
  document.getElementById('o-score').style.display='block';
  document.getElementById('o-score').textContent=score;
  document.getElementById('o-high').textContent='High Score: '+highScore;
  document.getElementById('overlay').querySelector('h1').innerHTML='Game <span>Over</span>';
  document.getElementById('overlay').querySelector('.sub').textContent='You scored '+score+' points with a snake of length '+snake.length+'!';
  document.getElementById('overlay').classList.remove('hidden');
}

function moveSnake(){
  if(inputQueue.length){
    const nd = inputQueue.shift();
    if(nd.x !== -dir.x || nd.z !== -dir.z){
      dir = nd;
    }
  }

  const head = snake[0];
  const newHead = {x: head.x + dir.x, z: head.z + dir.z};

  // Wall collision
  if(newHead.x < -GRID/2 || newHead.x >= GRID/2 || newHead.z < -GRID/2 || newHead.z >= GRID/2){
    endGame(); return;
  }

  // Self collision
  if(snake.some(s => s.x === newHead.x && s.z === newHead.z)){
    endGame(); return;
  }

  snake.unshift(newHead);

  // Food?
  if(newHead.x === food.x && newHead.z === food.z){
    score += 10 + Math.floor(snake.length / 2);
    // Particles
    for(let i=0;i<20;i++){
      particles.push({
        x: food.x*CELL, y:1, z: food.z*CELL,
        vx:(Math.random()-.5)*10, vy:Math.random()*8+2, vz:(Math.random()-.5)*10,
        life:1, color:[0.3+Math.random()*0.7, 0.8+Math.random()*0.2, 0.3+Math.random()*0.3]
      });
    }
    spawnFood();
    // Speed up
    moveInterval = Math.max(0.06, 0.18 - snake.length * 0.003);
  } else {
    snake.pop();
  }

  // Trail particles from head
  trailParticles.push({
    x: newHead.x*CELL, y:0.3, z: newHead.z*CELL,
    life:1, color:[0.3,0.9,0.5]
  });
  if(trailParticles.length>60)trailParticles.shift();

  updateHUD();
}

function updateHUD(){
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-length').textContent = snake.length;
  document.getElementById('h-speed').textContent = Math.round((0.18/moveInterval)*10)/10 + 'x';
  document.getElementById('h-high').textContent = highScore;
}

// ===== DRAW HELPERS =====
function drawMesh(mesh, modelMat, color, emissive, type){
  const mvp = multiply(vpMat, modelMat);
  const normMat = getNormalMat(modelMat);
  gl.uniformMatrix4fv(uMVP, false, mvp);
  gl.uniformMatrix4fv(uModel, false, modelMat);
  gl.uniformMatrix3fv(uNormalMat, false, normMat);
  gl.uniform3fv(uColor, color);
  gl.uniform1f(uEmissive, emissive||0);
  gl.uniform1i(uType, type||0);
  gl.bindVertexArray(mesh.vao);
  gl.drawElements(gl.TRIANGLES, mesh.count, gl.UNSIGNED_SHORT, 0);
}

let vpMat;

// ===== MAIN LOOP =====
let lastTime = 0;

function loop(now){
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, (now - lastTime)/1000);
  lastTime = now;
  globalTime = now/1000;

  // Game tick
  if(gameRunning){
    const interval = boostActive ? moveInterval * 0.4 : moveInterval;
    moveTimer += dt;
    while(moveTimer >= interval){
      moveTimer -= interval;
      moveSnake();
      if(!gameRunning)break;
    }
  }

  // Update particles
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.z+=p.vz*dt;p.vy-=15*dt;p.life-=dt*1.5});
  particles=particles.filter(p=>p.life>0);
  trailParticles.forEach(p=>{p.life-=dt*2});
  trailParticles=trailParticles.filter(p=>p.life>0);
  wallFlash=Math.max(0,wallFlash-dt*3);

  // Camera
  if(snake.length)updateCamera(dt);

  // ===== RENDER =====
  gl.clearColor(0.02,0.02,0.05,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);
  gl.enable(gl.CULL_FACE);
  gl.cullFace(gl.BACK);
  gl.useProgram(prog);
  gl.uniform1f(uTime, globalTime);
  gl.uniform3fv(uCamPos, smoothCamPos);

  const projMat = perspective(Math.PI/3.2, aspect, 0.5, 200);
  const viewMat = lookAt(smoothCamPos, smoothCamTarget, [0,1,0]);
  vpMat = multiply(projMat, viewMat);

  // Ground grid
  for(let x=-GRID/2; x<GRID/2; x++){
    for(let z=-GRID/2; z<GRID/2; z++){
      const bright = (x+z)%2===0;
      const m = multiply(translate(x*CELL, -0.25, z*CELL), scale(CELL*0.98, 0.1, CELL*0.98));
      drawMesh(cubeMesh, m, bright?[0.06,0.06,0.12]:[0.04,0.04,0.09], 0, 2);
    }
  }

  // Walls
  const wallH = 1.5;
  const wallColor = wallFlash>0?[0.8,0.2,0.2]:[0.12,0.14,0.25];
  const wallEmissive = wallFlash*0.5;
  // North/South walls
  for(let x=-GRID/2;x<GRID/2;x++){
    drawMesh(cubeMesh, multiply(translate(x*CELL, wallH/2, -HALF-CELL/2), scale(CELL, wallH, CELL)), wallColor, wallEmissive, 4);
    drawMesh(cubeMesh, multiply(translate(x*CELL, wallH/2, HALF-CELL/2), scale(CELL, wallH, CELL)), wallColor, wallEmissive, 4);
  }
  // East/West walls
  for(let z=-GRID/2;z<=GRID/2;z++){
    drawMesh(cubeMesh, multiply(translate(-HALF-CELL/2, wallH/2, z*CELL), scale(CELL, wallH, CELL)), wallColor, wallEmissive, 4);
    drawMesh(cubeMesh, multiply(translate(HALF-CELL/2, wallH/2, z*CELL), scale(CELL, wallH, CELL)), wallColor, wallEmissive, 4);
  }

  // Food
  {
    const fy = 0.8 + Math.sin(globalTime*3)*0.3;
    const fRot = rotateY(globalTime*2);
    const m = multiply(translate(food.x*CELL, fy, food.z*CELL), multiply(fRot, scale(CELL*0.55, CELL*0.55, CELL*0.55)));
    drawMesh(sphereMesh, m, [1.0,0.85,0.2], 0.5, 1);
    // Glow ring
    const ringScale = 0.8+Math.sin(globalTime*4)*0.15;
    const mr = multiply(translate(food.x*CELL, 0.05, food.z*CELL), scale(CELL*ringScale, 0.05, CELL*ringScale));
    drawMesh(cylinderMesh, mr, [1.0,0.9,0.3], 0.3, 1);
  }

  // Snake
  if(snake.length){
    const snakeLen = snake.length;
    snake.forEach((seg,i)=>{
      const isHead = i===0;
      const t = i/Math.max(1,snakeLen-1); // 0=head, 1=tail

      // Colors gradient: head bright green -> tail blue
      const r = 0.1 + t*0.1;
      const g = 0.85 - t*0.4;
      const b = 0.3 + t*0.5;

      // Size: head bigger, tapers to tail
      const segScale = isHead ? 0.9 : 0.82 - t*0.15;
      const segHeight = isHead ? 1.1 : 0.8 - t*0.15;

      // Y position: head slightly raised
      const sy = isHead ? 0.6 : 0.4 - t*0.05;

      // Bob animation
      const bob = Math.sin(globalTime*5 - i*0.4) * 0.08;

      const m = multiply(
        translate(seg.x*CELL, sy+bob, seg.z*CELL),
        scale(CELL*segScale, CELL*segHeight, CELL*segScale)
      );

      if(isHead){
        // Head is a sphere
        drawMesh(sphereMesh, m, [r,g,b], 0.15, 3);

        // Eyes
        const eyeOffset = 0.3;
        const eyeUp = 0.25;
        const eyeForward = 0.35;
        // Left eye
        const lex = seg.x*CELL + (-dir.z)*eyeOffset + dir.x*eyeForward;
        const lez = seg.z*CELL + (dir.x)*eyeOffset + dir.z*eyeForward;
        const me1 = multiply(translate(lex, sy+bob+eyeUp*CELL, lez), scale(0.25,0.25,0.25));
        drawMesh(sphereMesh, me1, [1,1,1], 0.8, 0);
        // Pupil
        const pe1 = multiply(translate(lex+dir.x*0.08, sy+bob+eyeUp*CELL, lez+dir.z*0.08), scale(0.14,0.14,0.14));
        drawMesh(sphereMesh, pe1, [0.05,0.05,0.1], 0, 0);
        // Right eye
        const rex = seg.x*CELL + (dir.z)*eyeOffset + dir.x*eyeForward;
        const rez = seg.z*CELL + (-dir.x)*eyeOffset + dir.z*eyeForward;
        const me2 = multiply(translate(rex, sy+bob+eyeUp*CELL, rez), scale(0.25,0.25,0.25));
        drawMesh(sphereMesh, me2, [1,1,1], 0.8, 0);
        const pe2 = multiply(translate(rex+dir.x*0.08, sy+bob+eyeUp*CELL, rez+dir.z*0.08), scale(0.14,0.14,0.14));
        drawMesh(sphereMesh, pe2, [0.05,0.05,0.1], 0, 0);

        // Tongue (small red cylinder extending forward)
        if(Math.sin(globalTime*6)>0.3){
          const tongueLen=0.6;
          const tx=seg.x*CELL+dir.x*(CELL*0.5+tongueLen/2);
          const tz=seg.z*CELL+dir.z*(CELL*0.5+tongueLen/2);
          let tongueModel;
          if(dir.x!==0){
            tongueModel=multiply(translate(tx,sy+bob-0.05,tz),multiply(rotateY(0),scale(tongueLen,0.06,0.06)));
          }else{
            tongueModel=multiply(translate(tx,sy+bob-0.05,tz),scale(0.06,0.06,tongueLen));
          }
          drawMesh(cubeMesh,tongueModel,[0.9,0.15,0.15],0.3,0);
        }
      } else {
        // Body segments are rounded cubes (use sphere for roundness)
        const mesh = (i < 3) ? sphereMesh : cubeMesh;
        drawMesh(mesh, m, [r,g,b], 0.05, 0);

        // Dorsal ridge on body
        if(i>0 && i<snakeLen-1){
          const ridgeM=multiply(translate(seg.x*CELL,sy+bob+CELL*segHeight*0.45,seg.z*CELL),scale(CELL*0.15,CELL*0.2,CELL*0.15));
          drawMesh(sphereMesh,ridgeM,[r*0.7,g*1.1,b*0.8],0.1,0);
        }
      }

      // Shadow
      const shadowM=multiply(translate(seg.x*CELL,-0.18,seg.z*CELL),scale(CELL*segScale*0.8,0.02,CELL*segScale*0.8));
      drawMesh(cubeMesh,shadowM,[0,0,0],0,2);
    });
  }

  // Particles
  particles.forEach(p=>{
    const pm=multiply(translate(p.x,p.y,p.z),scale(0.2*p.life,0.2*p.life,0.2*p.life));
    drawMesh(sphereMesh,pm,p.color,p.life,0);
  });

  // Trail particles
  trailParticles.forEach(p=>{
    const pm=multiply(translate(p.x,p.y,p.z),scale(0.3*p.life,0.1*p.life,0.3*p.life));
    drawMesh(sphereMesh,pm,p.color,p.life*0.3,0);
  });

  gl.bindVertexArray(null);
}

// Init overlay
document.getElementById('o-high').textContent = 'High Score: '+highScore;
updateHUD();
requestAnimationFrame(loop);
</script>
