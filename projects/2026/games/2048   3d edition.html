<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048 — 3D Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0a0a0f;color:#e8e8f0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;user-select:none;-webkit-user-select:none}

.app{height:100%;display:flex;flex-direction:column;position:relative}

/* Header */
.hdr{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:100;background:rgba(10,10,15,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.04)}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,#FBBF24,#F59E0B,#F472B6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.03em}
.hdr-scores{display:flex;gap:8px}
.score-box{padding:4px 12px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);text-align:center;min-width:70px}
.score-label{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em}
.score-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:#FBBF24}
.score-box.best .score-val{color:#A78BFA}
.hdr-right{display:flex;gap:5px}
.hb{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.hb:hover{background:rgba(255,255,255,.08);color:#fff}
.hb:active{transform:scale(.9)}

/* 3D Container */
.scene-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;perspective:1200px;cursor:grab}
.scene-wrap:active{cursor:grabbing}
.scene{transform-style:preserve-3d;transition:transform .1s ease-out;will-change:transform}

/* Board */
.board{transform-style:preserve-3d;position:relative}
.board-base{position:absolute;transform-style:preserve-3d}

/* Base platform */
.platform{position:absolute;border-radius:16px;transform-style:preserve-3d}
.platform-top{position:absolute;background:linear-gradient(145deg,#1a1a2e,#16162a);border-radius:16px;border:1px solid rgba(255,255,255,.04)}
.platform-front{position:absolute;background:linear-gradient(180deg,#13132a,#0d0d1e);border-radius:0 0 10px 10px}
.platform-right{position:absolute;background:linear-gradient(180deg,#111128,#0b0b1c);border-radius:0 10px 10px 0}

/* Grid slots */
.grid-slot{position:absolute;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.03);transform-style:preserve-3d;transition:background .2s}

/* Tiles */
.tile{position:absolute;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;transform-style:preserve-3d;transition:all .15s cubic-bezier(.34,1.2,.64,1);cursor:default;will-change:transform,left,top}
.tile-face{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.tile-side-front,.tile-side-back,.tile-side-left,.tile-side-right,.tile-side-top,.tile-side-bottom{position:absolute;backface-visibility:hidden}

.tile.pop{animation:tilePop .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes tilePop{0%{transform:scale3d(.3,.3,.3);opacity:0}60%{transform:scale3d(1.08,1.08,1.08)}100%{transform:scale3d(1,1,1);opacity:1}}
.tile.merge{animation:tileMerge .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes tileMerge{0%{transform:scale3d(1,1,1)}50%{transform:scale3d(1.2,1.2,1.2)}100%{transform:scale3d(1,1,1)}}

/* Controls overlay */
.controls-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:50;padding:6px 12px;border-radius:10px;background:rgba(10,10,15,.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.04)}
.ch-key{padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:10px;color:rgba(255,255,255,.4);font-weight:600;min-width:28px;text-align:center}
.ch-sep{color:rgba(255,255,255,.15);font-size:11px;display:flex;align-items:center;margin:0 4px}

/* D-Pad for mobile */
.dpad{position:absolute;bottom:20px;right:16px;z-index:60;display:none;transform-style:preserve-3d}
.dp-btn{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .1s;position:absolute;-webkit-user-select:none}
.dp-btn:active{background:rgba(251,191,36,.15);color:#FBBF24;transform:scale(.92)}
.dp-up{left:56px;top:0}
.dp-down{left:56px;top:108px}
.dp-left{left:0;top:54px}
.dp-right{left:112px;top:54px}
.dp-center{left:56px;top:54px;width:52px;height:52px;font-size:11px;font-weight:600;color:rgba(255,255,255,.2)}
@media(max-width:768px){.dpad{display:block}.controls-hint{display:none}}
@media(pointer:coarse){.dpad{display:block}.controls-hint{display:none}}

/* Zoom controls */
.zoom-bar{position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:4px}
.zm-btn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;transition:all .15s}
.zm-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.zm-btn:active{transform:scale(.9)}

/* Game Over / Win overlay */
.overlay{position:absolute;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,6,10,.88);backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity .4s}
.overlay.show{opacity:1;pointer-events:auto}
.ov-icon{font-size:56px;margin-bottom:12px}
.ov-title{font-size:32px;font-weight:800;margin-bottom:4px}
.ov-sub{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:24px}
.ov-score{font-size:22px;font-weight:700;color:#FBBF24;margin-bottom:20px}
.ov-btn{padding:12px 32px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.ov-btn:active{transform:scale(.95)}
.ov-btn.primary{background:linear-gradient(135deg,#FBBF24,#F59E0B);color:#000;box-shadow:0 4px 20px rgba(251,191,36,.3)}
.ov-btn.secondary{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.08);margin-top:8px}

/* Toast */
.toast{position:fixed;top:62px;left:50%;transform:translateX(-50%) translateY(-50px);padding:8px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:300;background:rgba(20,20,30,.9);border:1px solid rgba(255,255,255,.08);color:#FBBF24;opacity:0;transition:all .3s cubic-bezier(.34,1.2,.64,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="hdr-left">
      <span class="logo">2048</span>
      <div class="hdr-scores">
        <div class="score-box"><div class="score-label">Score</div><div class="score-val" id="score">0</div></div>
        <div class="score-box best"><div class="score-label">Best</div><div class="score-val" id="best">0</div></div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="hb" id="btnUndo" title="Undo (Z)">↶</button>
      <button class="hb" id="btnNew" title="New Game (N)">⟳</button>
    </div>
  </div>

  <div class="scene-wrap" id="sceneWrap">
    <div class="scene" id="scene">
      <div class="board" id="board"></div>
    </div>

    <div class="zoom-bar">
      <button class="zm-btn" id="zoomIn" title="Zoom In">+</button>
      <button class="zm-btn" id="zoomOut" title="Zoom Out">−</button>
      <button class="zm-btn" id="zoomReset" title="Reset View" style="font-size:12px">⊙</button>
    </div>

    <div class="controls-hint">
      <span class="ch-key">↑↓←→</span>
      <span class="ch-sep">move</span>
      <span class="ch-key">drag</span>
      <span class="ch-sep">rotate</span>
      <span class="ch-key">scroll</span>
      <span class="ch-sep">zoom</span>
      <span class="ch-key">Z</span>
      <span class="ch-sep">undo</span>
    </div>

    <div class="dpad" id="dpad">
      <button class="dp-btn dp-up" data-dir="up">↑</button>
      <button class="dp-btn dp-down" data-dir="down">↓</button>
      <button class="dp-btn dp-left" data-dir="left">←</button>
      <button class="dp-btn dp-right" data-dir="right">→</button>
      <div class="dp-btn dp-center">2048</div>
    </div>
  </div>

  <div class="overlay" id="ovWin">
    <div class="ov-icon">🏆</div>
    <div class="ov-title" style="color:#FBBF24">You Win!</div>
    <div class="ov-sub">You reached 2048!</div>
    <div class="ov-score" id="winScore">Score: 0</div>
    <button class="ov-btn primary" id="btnContinue">Keep Going</button>
    <button class="ov-btn secondary" id="btnNewWin">New Game</button>
  </div>

  <div class="overlay" id="ovLose">
    <div class="ov-icon">💀</div>
    <div class="ov-title" style="color:#F87171">Game Over</div>
    <div class="ov-sub">No more moves!</div>
    <div class="ov-score" id="loseScore">Score: 0</div>
    <button class="ov-btn primary" id="btnRetry">Try Again</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// 2048 — 3D EDITION
// ═══════════════════════════════════════════

const SIZE = 4;
const TILE_SIZE = 80;
const TILE_GAP = 8;
const BOARD_PAD = 12;
const TILE_DEPTH = 18;
const BASE_DEPTH = 24;
const BOARD_SIZE = SIZE * TILE_SIZE + (SIZE + 1) * TILE_GAP + BOARD_PAD * 2;

// Tile colors
const TILE_STYLES = {
  2:    { bg:'#eee4da', color:'#776e65', glow:'rgba(238,228,218,.2)' },
  4:    { bg:'#ede0c8', color:'#776e65', glow:'rgba(237,224,200,.2)' },
  8:    { bg:'#f2b179', color:'#f9f6f2', glow:'rgba(242,177,121,.3)' },
  16:   { bg:'#f59563', color:'#f9f6f2', glow:'rgba(245,149,99,.3)' },
  32:   { bg:'#f67c5f', color:'#f9f6f2', glow:'rgba(246,124,95,.35)' },
  64:   { bg:'#f65e3b', color:'#f9f6f2', glow:'rgba(246,94,59,.4)' },
  128:  { bg:'#edcf72', color:'#f9f6f2', glow:'rgba(237,207,114,.4)' },
  256:  { bg:'#edcc61', color:'#f9f6f2', glow:'rgba(237,204,97,.45)' },
  512:  { bg:'#edc850', color:'#f9f6f2', glow:'rgba(237,200,80,.5)' },
  1024: { bg:'#edc53f', color:'#f9f6f2', glow:'rgba(237,197,63,.5)' },
  2048: { bg:'#edc22e', color:'#f9f6f2', glow:'rgba(237,194,46,.6)' },
  4096: { bg:'#a358db', color:'#f9f6f2', glow:'rgba(163,88,219,.5)' },
  8192: { bg:'#51b6e3', color:'#f9f6f2', glow:'rgba(81,182,227,.5)' },
};

function getStyle(val) {
  return TILE_STYLES[val] || { bg:'#3c3a32', color:'#f9f6f2', glow:'rgba(60,58,50,.4)' };
}

// ─── STATE ───
let grid = [], score = 0, best = parseInt(localStorage.getItem('2048_3d_best') || '0');
let history = [], gameOver = false, won = false, continued = false;
let moving = false;

// Camera
let rotX = -35, rotY = -30, zoom = 1;
let targetRotX = -35, targetRotY = -30, targetZoom = 1;

// ─── DOM ───
const boardEl = document.getElementById('board');
const sceneEl = document.getElementById('scene');
const sceneWrap = document.getElementById('sceneWrap');

// ─── INIT ───
function init() {
  buildBoard();
  newGame();
  updateCamera();
  setupControls();
  animLoop();
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
}

function buildBoard() {
  boardEl.innerHTML = '';
  boardEl.style.width = BOARD_SIZE + 'px';
  boardEl.style.height = BOARD_SIZE + 'px';
  boardEl.style.position = 'relative';
  boardEl.style.transformStyle = 'preserve-3d';
  boardEl.style.transform = `translateX(${-BOARD_SIZE/2}px) translateY(${-BOARD_SIZE/2}px)`;

  // 3D base platform
  const base = document.createElement('div');
  base.className = 'platform';
  base.style.cssText = `width:${BOARD_SIZE}px;height:${BOARD_SIZE}px;transform-style:preserve-3d;position:absolute;top:0;left:0;`;

  // Top face
  const top = document.createElement('div');
  top.className = 'platform-top';
  top.style.cssText = `width:${BOARD_SIZE}px;height:${BOARD_SIZE}px;transform:translateZ(0px);`;
  base.appendChild(top);

  // Front face
  const front = document.createElement('div');
  front.className = 'platform-front';
  front.style.cssText = `width:${BOARD_SIZE}px;height:${BASE_DEPTH}px;transform:rotateX(-90deg) translateZ(${BOARD_SIZE - BASE_DEPTH}px);transform-origin:top;`;
  base.appendChild(front);

  // Right face
  const right = document.createElement('div');
  right.className = 'platform-right';
  right.style.cssText = `width:${BASE_DEPTH}px;height:${BOARD_SIZE}px;transform:rotateY(90deg) translateZ(${BOARD_SIZE - BASE_DEPTH}px);transform-origin:right;`;
  base.appendChild(right);

  // Left face
  const left2 = document.createElement('div');
  left2.style.cssText = `position:absolute;width:${BASE_DEPTH}px;height:${BOARD_SIZE}px;background:linear-gradient(180deg,#0f0f24,#090918);transform:rotateY(-90deg) translateZ(0px);transform-origin:left;`;
  base.appendChild(left2);

  // Back face
  const back = document.createElement('div');
  back.style.cssText = `position:absolute;width:${BOARD_SIZE}px;height:${BASE_DEPTH}px;background:linear-gradient(180deg,#0e0e22,#08081a);transform:rotateX(90deg) translateZ(0px);transform-origin:top;`;
  base.appendChild(back);

  boardEl.appendChild(base);

  // Grid slots
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const slot = document.createElement('div');
      slot.className = 'grid-slot';
      const x = BOARD_PAD + c * (TILE_SIZE + TILE_GAP) + TILE_GAP;
      const y = BOARD_PAD + r * (TILE_SIZE + TILE_GAP) + TILE_GAP;
      slot.style.cssText = `left:${x}px;top:${y}px;width:${TILE_SIZE}px;height:${TILE_SIZE}px;transform:translateZ(1px);`;
      boardEl.appendChild(slot);
    }
  }
}

function newGame() {
  grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  score = 0; gameOver = false; won = false; continued = false;
  history = [];
  document.getElementById('ovWin').classList.remove('show');
  document.getElementById('ovLose').classList.remove('show');
  addRandom(); addRandom();
  renderTiles();
  updateScore();
}

function addRandom() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push({ r, c });
  if (!empty.length) return false;
  const cell = empty[Math.floor(Math.random() * empty.length)];
  grid[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
  return cell;
}

// ─── TILE POSITIONING ───
function tilePos(r, c) {
  return {
    x: BOARD_PAD + c * (TILE_SIZE + TILE_GAP) + TILE_GAP,
    y: BOARD_PAD + r * (TILE_SIZE + TILE_GAP) + TILE_GAP,
  };
}

// ─── RENDER ───
function renderTiles(mergedCells = [], newCell = null) {
  // Remove old tiles
  boardEl.querySelectorAll('.tile').forEach(t => t.remove());

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const val = grid[r][c];
      if (val === 0) continue;
      const pos = tilePos(r, c);
      const style = getStyle(val);
      const tile = document.createElement('div');
      tile.className = 'tile';

      const isMerged = mergedCells.some(m => m.r === r && m.c === c);
      const isNew = newCell && newCell.r === r && newCell.c === c;
      if (isNew) tile.classList.add('pop');
      if (isMerged) tile.classList.add('merge');

      const fontSize = val >= 1024 ? 22 : val >= 128 ? 26 : 32;
      const depth = TILE_DEPTH + (Math.log2(val) - 1) * 2;

      tile.style.cssText = `
        left:${pos.x}px;top:${pos.y}px;
        width:${TILE_SIZE}px;height:${TILE_SIZE}px;
        transform:translateZ(${depth}px);
        transform-style:preserve-3d;
      `;

      // Top face
      const topFace = document.createElement('div');
      topFace.className = 'tile-face';
      topFace.style.cssText = `
        background:${style.bg};color:${style.color};
        font-size:${fontSize}px;font-weight:800;
        box-shadow:0 0 ${Math.log2(val)*3}px ${style.glow};
        border:1px solid rgba(255,255,255,.08);
        transform:translateZ(${depth/2}px);
      `;
      topFace.textContent = val;
      tile.appendChild(topFace);

      // Front face
      const frontFace = document.createElement('div');
      frontFace.style.cssText = `
        position:absolute;width:${TILE_SIZE}px;height:${depth}px;
        background:linear-gradient(180deg,${style.bg},${darken(style.bg,.15)});
        border-radius:0 0 8px 8px;
        transform:rotateX(-90deg) translateZ(${TILE_SIZE/2 + depth/2}px) translateY(${-depth/2}px);
        border:1px solid rgba(0,0,0,.1);
      `;
      tile.appendChild(frontFace);

      // Right face
      const rightFace = document.createElement('div');
      rightFace.style.cssText = `
        position:absolute;width:${depth}px;height:${TILE_SIZE}px;
        background:linear-gradient(180deg,${darken(style.bg,.08)},${darken(style.bg,.2)});
        border-radius:0 8px 8px 0;
        transform:rotateY(90deg) translateZ(${TILE_SIZE/2 + depth/2}px) translateX(${-depth/2}px);
        border:1px solid rgba(0,0,0,.1);
      `;
      tile.appendChild(rightFace);

      // Left face
      const leftFace = document.createElement('div');
      leftFace.style.cssText = `
        position:absolute;width:${depth}px;height:${TILE_SIZE}px;
        background:linear-gradient(180deg,${darken(style.bg,.1)},${darken(style.bg,.22)});
        border-radius:8px 0 0 8px;
        transform:rotateY(-90deg) translateZ(${TILE_SIZE/2 - depth/2}px) translateX(${depth/2}px);
        border:1px solid rgba(0,0,0,.1);
      `;
      tile.appendChild(leftFace);

      boardEl.appendChild(tile);
    }
  }
}

function darken(hex, amount) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, Math.floor(r * (1 - amount)));
  g = Math.max(0, Math.floor(g * (1 - amount)));
  b = Math.max(0, Math.floor(b * (1 - amount)));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ─── GAME LOGIC ───
function move(dir) {
  if (gameOver || moving) return;
  moving = true;

  // Save state for undo
  const prevGrid = grid.map(r => [...r]);
  const prevScore = score;

  let moved = false;
  const merged = [];

  function compress(line) {
    const filtered = line.filter(v => v !== 0);
    const result = [];
    const mergedIdx = [];
    let i = 0;
    while (i < filtered.length) {
      if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
        const newVal = filtered[i] * 2;
        result.push(newVal);
        mergedIdx.push(result.length - 1);
        score += newVal;
        if (newVal === 2048 && !won && !continued) { won = true; }
        i += 2;
      } else {
        result.push(filtered[i]);
        i++;
      }
    }
    while (result.length < SIZE) result.push(0);
    return { result, mergedIdx };
  }

  const newGrid = grid.map(r => [...r]);

  if (dir === 'left') {
    for (let r = 0; r < SIZE; r++) {
      const { result, mergedIdx } = compress(newGrid[r]);
      if (result.join(',') !== newGrid[r].join(',')) moved = true;
      mergedIdx.forEach(ci => merged.push({ r, c: ci }));
      newGrid[r] = result;
    }
  } else if (dir === 'right') {
    for (let r = 0; r < SIZE; r++) {
      const { result, mergedIdx } = compress([...newGrid[r]].reverse());
      result.reverse();
      if (result.join(',') !== newGrid[r].join(',')) moved = true;
      mergedIdx.forEach(ci => merged.push({ r, c: SIZE - 1 - ci }));
      newGrid[r] = result;
    }
  } else if (dir === 'up') {
    for (let c = 0; c < SIZE; c++) {
      const col = [];
      for (let r = 0; r < SIZE; r++) col.push(newGrid[r][c]);
      const { result, mergedIdx } = compress(col);
      let changed = false;
      for (let r = 0; r < SIZE; r++) {
        if (newGrid[r][c] !== result[r]) changed = true;
        newGrid[r][c] = result[r];
      }
      if (changed) moved = true;
      mergedIdx.forEach(ri => merged.push({ r: ri, c }));
    }
  } else if (dir === 'down') {
    for (let c = 0; c < SIZE; c++) {
      const col = [];
      for (let r = 0; r < SIZE; r++) col.push(newGrid[r][c]);
      col.reverse();
      const { result, mergedIdx } = compress(col);
      result.reverse();
      let changed = false;
      for (let r = 0; r < SIZE; r++) {
        if (newGrid[r][c] !== result[r]) changed = true;
        newGrid[r][c] = result[r];
      }
      if (changed) moved = true;
      mergedIdx.forEach(ri => merged.push({ r: SIZE - 1 - ri, c }));
    }
  }

  if (!moved) { moving = false; return; }

  history.push({ grid: prevGrid, score: prevScore });
  if (history.length > 50) history.shift();

  grid = newGrid;
  const newCell = addRandom();

  renderTiles(merged, newCell);
  updateScore();

  setTimeout(() => {
    moving = false;
    if (won && !continued) {
      showWin();
    } else if (isGameOver()) {
      gameOver = true;
      showLose();
    }
  }, 160);
}

function isGameOver() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return false;
      if (c + 1 < SIZE && grid[r][c] === grid[r][c + 1]) return false;
      if (r + 1 < SIZE && grid[r][c] === grid[r + 1][c]) return false;
    }
  return true;
}

function undo() {
  if (!history.length) { toast('Nothing to undo'); return; }
  const prev = history.pop();
  grid = prev.grid;
  score = prev.score;
  gameOver = false;
  document.getElementById('ovLose').classList.remove('show');
  renderTiles();
  updateScore();
  toast('↶ Undone');
}

function updateScore() {
  document.getElementById('score').textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('2048_3d_best', best);
  }
  document.getElementById('best').textContent = best;
}

function showWin() {
  document.getElementById('winScore').textContent = 'Score: ' + score;
  document.getElementById('ovWin').classList.add('show');
}

function showLose() {
  document.getElementById('loseScore').textContent = 'Score: ' + score;
  document.getElementById('ovLose').classList.add('show');
}

// ─── CAMERA ───
function updateCamera() {
  sceneEl.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale3d(${zoom},${zoom},${zoom})`;
}

function animLoop() {
  // Smooth camera
  rotX += (targetRotX - rotX) * 0.12;
  rotY += (targetRotY - rotY) * 0.12;
  zoom += (targetZoom - zoom) * 0.12;

  if (Math.abs(rotX - targetRotX) > 0.01 || Math.abs(rotY - targetRotY) > 0.01 || Math.abs(zoom - targetZoom) > 0.001) {
    updateCamera();
  }

  requestAnimationFrame(animLoop);
}

// ─── CONTROLS ───
function setupControls() {
  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': e.preventDefault(); move('up'); break;
      case 'ArrowDown': case 's': case 'S': e.preventDefault(); move('down'); break;
      case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); move('left'); break;
      case 'ArrowRight': case 'd': case 'D': e.preventDefault(); move('right'); break;
      case 'z': case 'Z': undo(); break;
      case 'n': case 'N': newGame(); break;
      case '+': case '=': targetZoom = Math.min(2, targetZoom + 0.1); break;
      case '-': case '_': targetZoom = Math.max(0.4, targetZoom - 0.1); break;
      case '0': targetRotX = -35; targetRotY = -30; targetZoom = 1; break;
    }
  });

  // Mouse drag to rotate
  let dragging = false, dragStart = { x: 0, y: 0 };
  sceneWrap.addEventListener('mousedown', e => {
    if (e.target.closest('.zm-btn') || e.target.closest('.dp-btn') || e.target.closest('.hb')) return;
    dragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    targetRotY += dx * 0.4;
    targetRotX += dy * 0.4;
    targetRotX = Math.max(-80, Math.min(10, targetRotX));
    dragStart = { x: e.clientX, y: e.clientY };
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  // Scroll to zoom
  sceneWrap.addEventListener('wheel', e => {
    e.preventDefault();
    targetZoom = Math.max(0.4, Math.min(2.5, targetZoom - e.deltaY * 0.001));
  }, { passive: false });

  // Touch: two-finger rotate/zoom, single swipe for game
  let touches = {};
  let swipeStart = null;
  let pinchStart = null;
  let rotateStart = null;
  let isTwoFinger = false;

  sceneWrap.addEventListener('touchstart', e => {
    if (e.target.closest('.dp-btn') || e.target.closest('.zm-btn') || e.target.closest('.hb')) return;

    if (e.touches.length === 1) {
      swipeStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now() };
      isTwoFinger = false;
    } else if (e.touches.length === 2) {
      isTwoFinger = true;
      swipeStart = null;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchStart = Math.hypot(dx, dy);
      rotateStart = {
        x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
        y: (e.touches[0].clientY + e.touches[1].clientY) / 2
      };
    }
  }, { passive: true });

  sceneWrap.addEventListener('touchmove', e => {
    if (e.target.closest('.dp-btn')) return;

    if (e.touches.length === 2 && pinchStart !== null) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      const scale = dist / pinchStart;
      targetZoom = Math.max(0.4, Math.min(2.5, targetZoom * (1 + (scale - 1) * 0.05)));
      pinchStart = dist;

      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      if (rotateStart) {
        targetRotY += (cx - rotateStart.x) * 0.3;
        targetRotX += (cy - rotateStart.y) * 0.3;
        targetRotX = Math.max(-80, Math.min(10, targetRotX));
        rotateStart = { x: cx, y: cy };
      }
    }
  }, { passive: false });

  sceneWrap.addEventListener('touchend', e => {
    if (e.touches.length < 2) { pinchStart = null; rotateStart = null; }

    if (swipeStart && !isTwoFinger && e.changedTouches.length === 1) {
      const t = e.changedTouches[0];
      const dx = t.clientX - swipeStart.x;
      const dy = t.clientY - swipeStart.y;
      const dt = Date.now() - swipeStart.time;
      const dist = Math.hypot(dx, dy);

      if (dist > 30 && dt < 500) {
        if (Math.abs(dx) > Math.abs(dy)) {
          move(dx > 0 ? 'right' : 'left');
        } else {
          move(dy > 0 ? 'down' : 'up');
        }
      }
      swipeStart = null;
    }
  });

  // D-Pad
  document.querySelectorAll('.dp-btn[data-dir]').forEach(b => {
    b.addEventListener('click', () => move(b.dataset.dir));
  });

  // Zoom buttons
  document.getElementById('zoomIn').addEventListener('click', () => { targetZoom = Math.min(2.5, targetZoom + 0.15); });
  document.getElementById('zoomOut').addEventListener('click', () => { targetZoom = Math.max(0.4, targetZoom - 0.15); });
  document.getElementById('zoomReset').addEventListener('click', () => { targetRotX = -35; targetRotY = -30; targetZoom = 1; });

  // Header buttons
  document.getElementById('btnNew').addEventListener('click', newGame);
  document.getElementById('btnUndo').addEventListener('click', undo);

  // Overlay buttons
  document.getElementById('btnContinue').addEventListener('click', () => {
    continued = true;
    document.getElementById('ovWin').classList.remove('show');
  });
  document.getElementById('btnNewWin').addEventListener('click', () => {
    document.getElementById('ovWin').classList.remove('show');
    newGame();
  });
  document.getElementById('btnRetry').addEventListener('click', () => {
    document.getElementById('ovLose').classList.remove('show');
    newGame();
  });
}

// ─── HELPERS ───
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── START ───
init();
</script>
