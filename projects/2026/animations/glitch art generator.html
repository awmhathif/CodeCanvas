<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Art Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 255, 0, 0.05) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            animation: scanlines 0.1s linear infinite;
        }

        @keyframes scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 4px; }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(0, 255, 0, 0.1);
            padding: 30px;
            border: 2px solid #00ff00;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            position: relative;
        }

        header::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ff00, #ff00ff, #00ffff);
            z-index: -1;
            opacity: 0.3;
            filter: blur(10px);
        }

        h1 {
            font-size: 3em;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 
                0 0 10px #00ff00,
                0 0 20px #00ff00,
                0 0 30px #00ff00;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-2px, -2px); }
            40% { transform: translate(2px, 2px); }
        }

        .subtitle {
            color: #ff00ff;
            font-size: 1.2em;
            margin-top: 10px;
            text-shadow: 0 0 10px #ff00ff;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        .sidebar {
            background: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            padding: 25px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.3);
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 1.2em;
            color: #00ffff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffff;
        }

        .upload-area {
            border: 3px dashed #00ff00;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 255, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: #ff00ff;
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .upload-area.dragover {
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        input[type="file"] {
            display: none;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            display: block;
            margin-bottom: 8px;
            color: #00ff00;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(0, 255, 0, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00ff00;
            cursor: pointer;
            box-shadow: 0 0 10px #00ff00;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00ff00;
            cursor: pointer;
            box-shadow: 0 0 10px #00ff00;
            border: none;
        }

        .slider-value {
            float: right;
            color: #ff00ff;
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #00ff00, #00ffff);
            color: #000;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.secondary {
            background: linear-gradient(45deg, #ff00ff, #ff00aa);
        }

        button.danger {
            background: linear-gradient(45deg, #ff0000, #ff0066);
        }

        .viewport {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            padding: 30px;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #canvas {
            max-width: 100%;
            max-height: 80vh;
            image-rendering: pixelated;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        .effect-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .effect-btn {
            padding: 12px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85em;
            font-weight: bold;
        }

        .effect-btn:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            transform: scale(1.05);
        }

        .effect-btn.active {
            background: rgba(255, 0, 255, 0.3);
            border-color: #ff00ff;
            color: #ff00ff;
        }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .preset-btn {
            padding: 12px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85em;
        }

        .preset-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 255, 0, 0.3);
            border-top: 4px solid #00ff00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            padding: 20px 30px;
            z-index: 2000;
            min-width: 300px;
            display: none;
            animation: slideIn 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }

        .notification.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification-success {
            border-color: #00ff00;
            color: #00ff00;
        }

        .notification-error {
            border-color: #ff0000;
            color: #ff0000;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(0, 255, 0, 0.5);
        }

        .empty-state-icon {
            font-size: 5em;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #00ff00;
        }

        .checkbox-group label {
            color: #00ff00;
            cursor: pointer;
            font-size: 0.9em;
        }

        .info-panel {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.85em;
            line-height: 1.6;
        }

        .info-title {
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            h1 {
                font-size: 2em;
            }
        }

        .color-channel {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .channel-btn {
            flex: 1;
            padding: 8px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            font-size: 0.85em;
        }

        .channel-btn.red {
            border-color: #ff0000;
            color: #ff0000;
        }

        .channel-btn.green {
            border-color: #00ff00;
            color: #00ff00;
        }

        .channel-btn.blue {
            border-color: #0000ff;
            color: #0000ff;
        }

        .channel-btn.active {
            background: currentColor;
            color: #000;
        }

        .history-panel {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            margin-top: 10px;
        }

        .history-item {
            padding: 8px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <header>
            <h1>⚡ GLITCH ART GENERATOR ⚡</h1>
            <p class="subtitle">DATABEND // CORRUPT // DISTORT</p>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="section">
                    <div class="section-title">↑ UPLOAD</div>
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                        <div class="upload-icon">📁</div>
                        <div>DRAG & DROP IMAGE</div>
                        <div style="font-size: 0.8em; margin-top: 10px; opacity: 0.7;">OR CLICK TO BROWSE</div>
                        <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">⚙ GLITCH MODE</div>
                    <div class="control-group">
                        <select id="glitchMode" onchange="applyGlitch()">
                            <option value="pixelSort">PIXEL SORT</option>
                            <option value="rgbShift">RGB SHIFT</option>
                            <option value="scanlines">SCANLINES</option>
                            <option value="databend">DATABEND</option>
                            <option value="corruption">CORRUPTION</option>
                            <option value="chromatic">CHROMATIC ABERRATION</option>
                            <option value="pixelate">PIXELATE</option>
                            <option value="noise">DIGITAL NOISE</option>
                            <option value="wave">WAVE DISTORTION</option>
                            <option value="bitcrush">BIT CRUSH</option>
                        </select>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">🎚 INTENSITY</div>
                    <div class="control-group">
                        <label class="control-label">
                            STRENGTH
                            <span class="slider-value" id="intensityValue">50</span>
                        </label>
                        <input type="range" id="intensity" min="1" max="100" value="50" oninput="updateIntensity()">
                    </div>
                    <div class="control-group">
                        <label class="control-label">
                            CHAOS LEVEL
                            <span class="slider-value" id="chaosValue">30</span>
                        </label>
                        <input type="range" id="chaos" min="0" max="100" value="30" oninput="updateChaos()">
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">🎨 PRESETS</div>
                    <div class="preset-grid">
                        <button class="preset-btn" onclick="loadPreset('vhs')">VHS TAPE</button>
                        <button class="preset-btn" onclick="loadPreset('cyberpunk')">CYBERPUNK</button>
                        <button class="preset-btn" onclick="loadPreset('glitch')">GLITCH HELL</button>
                        <button class="preset-btn" onclick="loadPreset('retro')">RETRO TV</button>
                        <button class="preset-btn" onclick="loadPreset('digital')">DIGITAL DECAY</button>
                        <button class="preset-btn" onclick="loadPreset('static')">STATIC NOISE</button>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">🔧 EFFECTS</div>
                    <div class="effect-buttons">
                        <button class="effect-btn" onclick="toggleEffect('rgbSplit')">RGB SPLIT</button>
                        <button class="effect-btn" onclick="toggleEffect('vhsNoise')">VHS NOISE</button>
                        <button class="effect-btn" onclick="toggleEffect('pixelSort')">PIXEL SORT</button>
                        <button class="effect-btn" onclick="toggleEffect('scanlines')">SCANLINES</button>
                        <button class="effect-btn" onclick="toggleEffect('colorShift')">COLOR SHIFT</button>
                        <button class="effect-btn" onclick="toggleEffect('blockCorrupt')">BLOCK CORRUPT</button>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">💾 ACTIONS</div>
                    <button onclick="applyRandomGlitch()">🎲 RANDOM GLITCH</button>
                    <button onclick="applyGlitch()" class="secondary">⚡ APPLY EFFECT</button>
                    <button onclick="resetImage()">🔄 RESET</button>
                    <button onclick="downloadImage()">💾 DOWNLOAD</button>
                </div>
            </div>

            <div class="viewport">
                <canvas id="canvas"></canvas>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div>CORRUPTING DATA...</div>
                </div>

                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">🖼️</div>
                    <h3>NO IMAGE LOADED</h3>
                    <p>UPLOAD AN IMAGE TO BEGIN GLITCHING</p>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // Canvas and Image State
        let canvas, ctx;
        let originalImage = null;
        let currentImageData = null;
        let activeEffects = new Set();
        let history = [];

        // Initialize
        function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            // Drag and drop
            const uploadArea = document.getElementById('uploadArea');
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    loadImage(file);
                }
            });
        }

        // File Handling
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                loadImage(file);
            }
        }

        function loadImage(file) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Set canvas size
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    // Draw original image
                    ctx.drawImage(img, 0, 0);
                    
                    // Store original
                    originalImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    currentImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    // Hide empty state
                    document.getElementById('emptyState').style.display = 'none';
                    canvas.style.display = 'block';
                    
                    showNotification('IMAGE LOADED', 'success');
                };
                img.src = e.target.result;
            };
            
            reader.readAsDataURL(file);
        }

        // Slider Updates
        function updateIntensity() {
            const value = document.getElementById('intensity').value;
            document.getElementById('intensityValue').textContent = value;
        }

        function updateChaos() {
            const value = document.getElementById('chaos').value;
            document.getElementById('chaosValue').textContent = value;
        }

        // Glitch Effects
        function applyGlitch() {
            if (!originalImage) {
                showNotification('NO IMAGE LOADED', 'error');
                return;
            }

            showLoading(true);

            setTimeout(() => {
                const mode = document.getElementById('glitchMode').value;
                const intensity = parseInt(document.getElementById('intensity').value);
                const chaos = parseInt(document.getElementById('chaos').value);

                // Reset to original
                ctx.putImageData(originalImage, 0, 0);
                currentImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                // Apply effect
                switch(mode) {
                    case 'pixelSort':
                        pixelSort(intensity, chaos);
                        break;
                    case 'rgbShift':
                        rgbShift(intensity);
                        break;
                    case 'scanlines':
                        applyScanlines(intensity);
                        break;
                    case 'databend':
                        databend(intensity, chaos);
                        break;
                    case 'corruption':
                        corruption(intensity, chaos);
                        break;
                    case 'chromatic':
                        chromaticAberration(intensity);
                        break;
                    case 'pixelate':
                        pixelate(intensity);
                        break;
                    case 'noise':
                        digitalNoise(intensity, chaos);
                        break;
                    case 'wave':
                        waveDistortion(intensity, chaos);
                        break;
                    case 'bitcrush':
                        bitCrush(intensity);
                        break;
                }

                // Apply active effects
                activeEffects.forEach(effect => {
                    applyEffect(effect);
                });

                showLoading(false);
                showNotification('GLITCH APPLIED', 'success');
            }, 100);
        }

        function pixelSort(intensity, chaos) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = canvas.width;
            const height = canvas.height;

            const threshold = 255 - (intensity * 2.55);
            const sortLength = Math.floor(intensity / 2);

            for (let y = 0; y < height; y++) {
                if (Math.random() * 100 > chaos) continue;

                let x = 0;
                while (x < width) {
                    const startX = x;
                    let endX = x;

                    // Find sorting region
                    while (endX < width && endX - startX < sortLength) {
                        const idx = (y * width + endX) * 4;
                        const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
                        if (brightness > threshold) break;
                        endX++;
                    }

                    // Sort pixels
                    if (endX > startX + 1) {
                        const pixels = [];
                        for (let i = startX; i < endX; i++) {
                            const idx = (y * width + i) * 4;
                            pixels.push({
                                r: data[idx],
                                g: data[idx + 1],
                                b: data[idx + 2],
                                a: data[idx + 3],
                                brightness: (data[idx] + data[idx + 1] + data[idx + 2]) / 3
                            });
                        }

                        pixels.sort((a, b) => a.brightness - b.brightness);

                        for (let i = 0; i < pixels.length; i++) {
                            const idx = (y * width + (startX + i)) * 4;
                            data[idx] = pixels[i].r;
                            data[idx + 1] = pixels[i].g;
                            data[idx + 2] = pixels[i].b;
                            data[idx + 3] = pixels[i].a;
                        }
                    }

                    x = endX + 1;
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function rgbShift(intensity) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const shift = Math.floor(intensity / 5);

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.putImageData(imageData, 0, 0);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Red channel
            ctx.globalCompositeOperation = 'screen';
            ctx.drawImage(tempCanvas, -shift, 0);
            
            // Green channel
            ctx.drawImage(tempCanvas, 0, 0);
            
            // Blue channel
            ctx.drawImage(tempCanvas, shift, 0);
            
            ctx.globalCompositeOperation = 'source-over';
        }

        function applyScanlines(intensity) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const lineHeight = Math.max(1, Math.floor(100 / intensity));

            for (let y = 0; y < canvas.height; y += lineHeight * 2) {
                for (let x = 0; x < canvas.width; x++) {
                    const idx = (y * canvas.width + x) * 4;
                    data[idx] *= 0.5;
                    data[idx + 1] *= 0.5;
                    data[idx + 2] *= 0.5;
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function databend(intensity, chaos) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            const corruptionRate = intensity / 100;
            const chunkSize = Math.floor(chaos / 10) + 1;

            for (let i = 0; i < data.length; i += 4) {
                if (Math.random() < corruptionRate) {
                    const offset = Math.floor(Math.random() * chunkSize) * 4;
                    const sourceIdx = Math.min(i + offset, data.length - 4);
                    
                    data[i] = data[sourceIdx];
                    data[i + 1] = data[sourceIdx + 1];
                    data[i + 2] = data[sourceIdx + 2];
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function corruption(intensity, chaos) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            const blockSize = Math.floor(chaos / 5) + 10;
            const numBlocks = Math.floor((intensity * canvas.width * canvas.height) / (blockSize * blockSize * 100));

            for (let i = 0; i < numBlocks; i++) {
                const x = Math.floor(Math.random() * (canvas.width - blockSize));
                const y = Math.floor(Math.random() * (canvas.height - blockSize));
                
                const sourceX = Math.floor(Math.random() * (canvas.width - blockSize));
                const sourceY = Math.floor(Math.random() * (canvas.height - blockSize));

                for (let by = 0; by < blockSize; by++) {
                    for (let bx = 0; bx < blockSize; bx++) {
                        const destIdx = ((y + by) * canvas.width + (x + bx)) * 4;
                        const srcIdx = ((sourceY + by) * canvas.width + (sourceX + bx)) * 4;
                        
                        data[destIdx] = data[srcIdx];
                        data[destIdx + 1] = data[srcIdx + 1];
                        data[destIdx + 2] = data[srcIdx + 2];
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function chromaticAberration(intensity) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const offset = Math.floor(intensity / 10);

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.putImageData(imageData, 0, 0);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Create RGB channels with offsets
            const channels = [
                { offset: -offset, color: 'red' },
                { offset: 0, color: 'green' },
                { offset: offset, color: 'blue' }
            ];

            ctx.globalCompositeOperation = 'lighter';
            
            channels.forEach(channel => {
                tempCtx.clearRect(0, 0, canvas.width, canvas.height);
                tempCtx.putImageData(imageData, 0, 0);
                
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.drawImage(tempCanvas, channel.offset, 0);
                ctx.restore();
            });

            ctx.globalCompositeOperation = 'source-over';
        }

        function pixelate(intensity) {
            const pixelSize = Math.max(1, Math.floor(intensity / 5));
            const width = canvas.width;
            const height = canvas.height;

            ctx.imageSmoothingEnabled = false;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = Math.floor(width / pixelSize);
            tempCanvas.height = Math.floor(height / pixelSize);
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
            ctx.drawImage(tempCanvas, 0, 0, width, height);
        }

        function digitalNoise(intensity, chaos) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            const noiseAmount = intensity / 100;

            for (let i = 0; i < data.length; i += 4) {
                if (Math.random() < noiseAmount) {
                    const noise = (Math.random() - 0.5) * chaos * 2;
                    data[i] = Math.max(0, Math.min(255, data[i] + noise));
                    data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + noise));
                    data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + noise));
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function waveDistortion(intensity, chaos) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const newData = ctx.createImageData(canvas.width, canvas.height);

            const amplitude = intensity / 5;
            const frequency = chaos / 1000;

            for (let y = 0; y < canvas.height; y++) {
                const offset = Math.sin(y * frequency) * amplitude;
                
                for (let x = 0; x < canvas.width; x++) {
                    const sourceX = Math.floor(x + offset);
                    
                    if (sourceX >= 0 && sourceX < canvas.width) {
                        const destIdx = (y * canvas.width + x) * 4;
                        const srcIdx = (y * canvas.width + sourceX) * 4;
                        
                        newData.data[destIdx] = imageData.data[srcIdx];
                        newData.data[destIdx + 1] = imageData.data[srcIdx + 1];
                        newData.data[destIdx + 2] = imageData.data[srcIdx + 2];
                        newData.data[destIdx + 3] = imageData.data[srcIdx + 3];
                    }
                }
            }

            ctx.putImageData(newData, 0, 0);
        }

        function bitCrush(intensity) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            const bits = Math.max(1, 8 - Math.floor(intensity / 15));
            const levels = Math.pow(2, bits);
            const step = 256 / levels;

            for (let i = 0; i < data.length; i += 4) {
                data[i] = Math.floor(data[i] / step) * step;
                data[i + 1] = Math.floor(data[i + 1] / step) * step;
                data[i + 2] = Math.floor(data[i + 2] / step) * step;
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // Effect Toggles
        function toggleEffect(effect) {
            const btn = event.target;
            
            if (activeEffects.has(effect)) {
                activeEffects.delete(effect);
                btn.classList.remove('active');
            } else {
                activeEffects.add(effect);
                btn.classList.add('active');
            }

            applyGlitch();
        }

        function applyEffect(effect) {
            const intensity = parseInt(document.getElementById('intensity').value);
            
            switch(effect) {
                case 'rgbSplit':
                    rgbShift(intensity / 2);
                    break;
                case 'vhsNoise':
                    digitalNoise(30, 50);
                    break;
                case 'pixelSort':
                    pixelSort(intensity / 3, 50);
                    break;
                case 'scanlines':
                    applyScanlines(50);
                    break;
                case 'colorShift':
                    chromaticAberration(intensity / 2);
                    break;
                case 'blockCorrupt':
                    corruption(30, intensity);
                    break;
            }
        }

        // Presets
        function loadPreset(preset) {
            if (!originalImage) {
                showNotification('NO IMAGE LOADED', 'error');
                return;
            }

            const presets = {
                vhs: { mode: 'scanlines', intensity: 60, chaos: 40, effects: ['vhsNoise', 'rgbSplit'] },
                cyberpunk: { mode: 'chromatic', intensity: 80, chaos: 60, effects: ['rgbSplit', 'colorShift'] },
                glitch: { mode: 'corruption', intensity: 90, chaos: 80, effects: ['blockCorrupt', 'rgbSplit'] },
                retro: { mode: 'pixelate', intensity: 50, chaos: 30, effects: ['scanlines'] },
                digital: { mode: 'databend', intensity: 70, chaos: 70, effects: ['vhsNoise', 'blockCorrupt'] },
                static: { mode: 'noise', intensity: 85, chaos: 90, effects: ['vhsNoise'] }
            };

            const config = presets[preset];
            
            document.getElementById('glitchMode').value = config.mode;
            document.getElementById('intensity').value = config.intensity;
            document.getElementById('chaos').value = config.chaos;
            
            updateIntensity();
            updateChaos();
            
            // Clear and set effects
            activeEffects.clear();
            document.querySelectorAll('.effect-btn').forEach(btn => btn.classList.remove('active'));
            
            config.effects.forEach(effect => {
                activeEffects.add(effect);
            });

            applyGlitch();
            showNotification(`${preset.toUpperCase()} PRESET LOADED`, 'success');
        }

        // Random Glitch
        function applyRandomGlitch() {
            if (!originalImage) {
                showNotification('NO IMAGE LOADED', 'error');
                return;
            }

            const modes = ['pixelSort', 'rgbShift', 'scanlines', 'databend', 'corruption', 
                          'chromatic', 'pixelate', 'noise', 'wave', 'bitcrush'];
            
            document.getElementById('glitchMode').value = modes[Math.floor(Math.random() * modes.length)];
            document.getElementById('intensity').value = Math.floor(Math.random() * 100);
            document.getElementById('chaos').value = Math.floor(Math.random() * 100);
            
            updateIntensity();
            updateChaos();
            
            applyGlitch();
        }

        // Reset & Download
        function resetImage() {
            if (!originalImage) return;

            ctx.putImageData(originalImage, 0, 0);
            activeEffects.clear();
            document.querySelectorAll('.effect-btn').forEach(btn => btn.classList.remove('active'));
            
            showNotification('IMAGE RESET', 'success');
        }

        function downloadImage() {
            if (!originalImage) {
                showNotification('NO IMAGE LOADED', 'error');
                return;
            }

            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `glitch-art-${Date.now()}.png`;
                link.click();
                URL.revokeObjectURL(url);
                
                showNotification('IMAGE DOWNLOADED', 'success');
            });
        }

        // UI Functions
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.className = `notification notification-${type} active`;
            notification.textContent = message;

            setTimeout(() => {
                notification.classList.remove('active');
            }, 3000);
        }

        // Initialize
        window.addEventListener('load', init);
    </script>
</body>
