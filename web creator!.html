<!DOCTYPE html><html lang="en"><head><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Web Creator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
            color: #00ff88;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .command-panel {
            width: 400px;
            background: rgba(0, 0, 0, 0.8);
            border-right: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff88;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #00ff88, 0 0 10px #00ff88; }
            to { text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 30px #00ff88; }
        }

        .command-input {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00ff88;
            border-radius: 10px;
            color: #00ff88;
            padding: 15px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 120px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            outline: none;
        }

        .command-input:focus {
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
            border-color: #00ffff;
        }

        .execute-btn {
            background: linear-gradient(45deg, #00ff88, #00ffff);
            border: none;
            border-radius: 10px;
            color: #000;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            transition: all 0.3s ease;
        }

        .execute-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(0, 255, 136, 0.5);
        }

        .clear-btn {
            background: linear-gradient(45deg, #ff4444, #ff6666);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }

        .examples {
            margin-top: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .examples h3 {
            color: #00ffff;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #00ffff;
        }

        .example {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 5px;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .example:hover {
            background: rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .workspace {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
        }

        .output-log {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            max-height: 200px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-radius: 3px;
        }

        .log-success {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .log-error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .log-info {
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
        }

        .dynamic-element {
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .generated-button {
            background: linear-gradient(45deg, #00ff88, #00ffff);
            border: none;
            border-radius: 8px;
            color: #000;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            transition: all 0.3s ease;
        }

        .generated-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .generated-card {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 255, 255, 0.1));
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .command-panel {
                width: 100%;
                height: 300px;
            }
            .workspace {
                height: calc(100vh - 300px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="command-panel">
            <h1 class="title">🚀 WEB CREATOR</h1>
            <textarea class="command-input" id="commandInput" placeholder="Type your instructions here...
Examples:
- create a button with text 'Click Me'
- add a header saying 'Welcome'
- make a card with title 'My Card'
- change background to blue
- create a list with items apple, banana, orange
- add an image placeholder
- make a form with name and email fields"></textarea>
            
            <button class="execute-btn" onclick="executeCommand()">🔥 EXECUTE</button>
            <button class="clear-btn" onclick="clearWorkspace()">🗑️ CLEAR ALL</button>
            
            <div class="examples">
                <h3>Quick Examples:</h3>
                <div class="example" onclick="setCommand('create a glowing button with text Hello World')">Create glowing button</div>
                <div class="example" onclick="setCommand('add a header with text Welcome to my site')">Add header</div>
                <div class="example" onclick="setCommand('make a card with title My Project and text This is awesome')">Create card</div>
                <div class="example" onclick="setCommand('create a navigation menu with Home, About, Contact')">Navigation menu</div>
                <div class="example" onclick="setCommand('add a form with name, email, message fields')">Contact form</div>
                <div class="example" onclick="setCommand('create a grid of 6 colored boxes')">Color grid</div>
                <div class="example" onclick="setCommand('make a pricing table with 3 plans')">Pricing table</div>
                <div class="example" onclick="setCommand('add a hero section with title and subtitle')">Hero section</div>
                <div class="example" onclick="setCommand('create a timeline with 4 events')">Timeline</div>
                <div class="example" onclick="setCommand('make a dashboard with stats cards')">Dashboard</div>
            </div>
        </div>
        
        <div class="workspace" id="workspace">
            <div style="text-align: center; margin-top: 100px; opacity: 0.7;">
                <h2 style="color: #00ffff; text-shadow: 0 0 10px #00ffff;">✨ Dynamic Workspace ✨</h2>
                <p style="margin-top: 20px; font-size: 18px;">Start typing commands to create amazing content!</p>
            </div>
        </div>
    </div>

    <div class="output-log" id="outputLog"></div>

    <script>
        let elementCounter = 0;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('outputLog');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            // Keep only last 20 logs
            while (logDiv.children.length > 20) {
                logDiv.removeChild(logDiv.firstChild);
            }
        }

        function setCommand(command) {
            document.getElementById('commandInput').value = command;
        }

        function clearWorkspace() {
            const workspace = document.getElementById('workspace');
            workspace.innerHTML = `
                <div style="text-align: center; margin-top: 100px; opacity: 0.7;">
                    <h2 style="color: #00ffff; text-shadow: 0 0 10px #00ffff;">✨ Dynamic Workspace ✨</h2>
                    <p style="margin-top: 20px; font-size: 18px;">Start typing commands to create amazing content!</p>
                </div>
            `;
            elementCounter = 0;
            log('Workspace cleared', 'info');
        }

        function executeCommand() {
            const command = document.getElementById('commandInput').value.toLowerCase().trim();
            if (!command) {
                log('Please enter a command', 'error');
                return;
            }

            log(`Executing: ${command}`, 'info');

            try {
                if (command.includes('create') && command.includes('button')) {
                    createButton(command);
                } else if (command.includes('add') && (command.includes('header') || command.includes('title'))) {
                    createHeader(command);
                } else if (command.includes('card') || command.includes('box')) {
                    createCard(command);
                } else if (command.includes('list')) {
                    createList(command);
                } else if (command.includes('form')) {
                    createForm(command);
                } else if (command.includes('navigation') || command.includes('menu')) {
                    createNavigation(command);
                } else if (command.includes('grid')) {
                    createGrid(command);
                } else if (command.includes('pricing') && command.includes('table')) {
                    createPricingTable(command);
                } else if (command.includes('hero')) {
                    createHeroSection(command);
                } else if (command.includes('timeline')) {
                    createTimeline(command);
                } else if (command.includes('dashboard')) {
                    createDashboard(command);
                } else if (command.includes('change') && command.includes('background')) {
                    changeBackground(command);
                } else if (command.includes('image')) {
                    createImage(command);
                } else {
                    createGenericElement(command);
                }
                
                log('Command executed successfully', 'success');
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        function createButton(command) {
            const textMatch = command.match(/['"`]([^'"`]+)['"`]/) || command.match(/text\s+(\w+)/);
            const text = textMatch ? textMatch[1] : 'Click Me';
            
            const button = document.createElement('button');
            button.className = 'generated-button';
            button.textContent = text;
            button.onclick = () => log(`Button "${text}" clicked!`, 'info');
            
            addToWorkspace(button);
        }

        function createHeader(command) {
            const textMatch = command.match(/['"`]([^'"`]+)['"`]/) || command.match(/saying\s+([^,.\n]+)/);
            const text = textMatch ? textMatch[1] : 'Header Title';
            
            const level = command.includes('big') ? 1 : command.includes('small') ? 3 : 2;
            const header = document.createElement(`h${level}`);
            header.textContent = text;
            header.style.cssText = `
                color: #00ffff;
                text-shadow: 0 0 10px #00ffff;
                text-align: center;
                margin: 20px 0;
            `;
            
            addToWorkspace(header);
        }

        function createCard(command) {
            const titleMatch = command.match(/title\s+['"`]?([^'"`\n,]+)['"`]?/);
            const textMatch = command.match(/text\s+['"`]?([^'"`\n]+)['"`]?/);
            
            const title = titleMatch ? titleMatch[1].trim() : 'Card Title';
            const text = textMatch ? textMatch[1].trim() : 'This is a card description.';
            
            const card = document.createElement('div');
            card.className = 'generated-card';
            card.innerHTML = `
                <h3 style="color: #00ffff; margin-bottom: 10px; text-shadow: 0 0 5px #00ffff;">${title}</h3>
                <p style="color: #ffffff; line-height: 1.6;">${text}</p>
            `;
            
            addToWorkspace(card);
        }

        function createList(command) {
            const itemsMatch = command.match(/with\s+items?\s+([^.\n]+)/);
            let items = ['Item 1', 'Item 2', 'Item 3'];
            
            if (itemsMatch) {
                items = itemsMatch[1].split(/[,\s]+/).filter(item => item.length > 0);
            }
            
            const list = document.createElement('ul');
            list.style.cssText = `
                background: rgba(0, 255, 136, 0.1);
                border: 1px solid rgba(0, 255, 136, 0.3);
                border-radius: 10px;
                padding: 20px;
                margin: 15px 0;
            `;
            
            items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                li.style.cssText = `
                    color: #00ff88;
                    margin: 8px 0;
                    padding: 5px;
                    border-left: 3px solid #00ff88;
                    padding-left: 15px;
                `;
                list.appendChild(li);
            });
            
            addToWorkspace(list);
        }

        function createForm(command) {
            const fields = ['name', 'email'];
            if (command.includes('message')) fields.push('message');
            if (command.includes('phone')) fields.push('phone');
            
            const form = document.createElement('form');
            form.style.cssText = `
                background: rgba(0, 255, 136, 0.1);
                border: 2px solid rgba(0, 255, 136, 0.3);
                border-radius: 15px;
                padding: 25px;
                margin: 15px 0;
                max-width: 400px;
            `;
            
            fields.forEach(field => {
                const label = document.createElement('label');
                label.textContent = field.charAt(0).toUpperCase() + field.slice(1);
                label.style.cssText = `
                    display: block;
                    color: #00ffff;
                    margin: 10px 0 5px 0;
                    text-shadow: 0 0 5px #00ffff;
                `;
                
                const input = document.createElement(field === 'message' ? 'textarea' : 'input');
                if (field !== 'message') input.type = field === 'email' ? 'email' : 'text';
                input.style.cssText = `
                    width: 100%;
                    padding: 10px;
                    border: 1px solid #00ff88;
                    border-radius: 5px;
                    background: rgba(0, 0, 0, 0.6);
                    color: #00ff88;
                    font-family: 'Courier New', monospace;
                `;
                
                form.appendChild(label);
                form.appendChild(input);
            });
            
            const submitBtn = document.createElement('button');
            submitBtn.type = 'button';
            submitBtn.textContent = 'Submit';
            submitBtn.className = 'generated-button';
            submitBtn.style.marginTop = '15px';
            submitBtn.onclick = () => log('Form submitted!', 'success');
            
            form.appendChild(submitBtn);
            addToWorkspace(form);
        }

        function createNavigation(command) {
            const items = ['Home', 'About', 'Services', 'Contact'];
            if (command.includes('with')) {
                const match = command.match(/with\s+([^.\n]+)/);
                if (match) {
                    const customItems = match[1].split(/[,\s]+/).filter(item => item.length > 0);
                    if (customItems.length > 0) items.splice(0, items.length, ...customItems);
                }
            }
            
            const nav = document.createElement('nav');
            nav.style.cssText = `
                background: linear-gradient(45deg, rgba(0, 255, 136, 0.2), rgba(0, 255, 255, 0.2));
                border: 1px solid rgba(0, 255, 136, 0.5);
                border-radius: 10px;
                padding: 15px;
                margin: 15px 0;
                display: flex;
                justify-content: space-around;
                flex-wrap: wrap;
            `;
            
            items.forEach(item => {
                const link = document.createElement('a');
                link.textContent = item;
                link.href = '#';
                link.style.cssText = `
                    color: #00ffff;
                    text-decoration: none;
                    padding: 8px 15px;
                    border-radius: 5px;
                    transition: all 0.3s ease;
                    text-shadow: 0 0 5px #00ffff;
                `;
                link.onmouseover = () => {
                    link.style.background = 'rgba(0, 255, 255, 0.2)';
                    link.style.boxShadow = '0 0 10px rgba(0, 255, 255, 0.5)';
                };
                link.onmouseout = () => {
                    link.style.background = 'transparent';
                    link.style.boxShadow = 'none';
                };
                nav.appendChild(link);
            });
            
            addToWorkspace(nav);
        }

        function createGrid(command) {
            const numberMatch = command.match(/(\d+)/);
            const count = numberMatch ? parseInt(numberMatch[1]) : 6;
            
            const grid = document.createElement('div');
            grid.style.cssText = `
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
                margin: 20px 0;
            `;
            
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#feca57', '#ff9ff3'];
            
            for (let i = 0; i < count; i++) {
                const box = document.createElement('div');
                box.style.cssText = `
                    height: 100px;
                    background: ${colors[i % colors.length]};
                    border-radius: 10px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: white;
                    font-weight: bold;
                    box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
                    transition: transform 0.3s ease;
                `;
                box.textContent = `Box ${i + 1}`;
                box.onmouseover = () => box.style.transform = 'scale(1.05)';
                box.onmouseout = () => box.style.transform = 'scale(1)';
                grid.appendChild(box);
            }
            
            addToWorkspace(grid);
        }

        function createPricingTable(command) {
            const plans = [
                { name: 'Basic', price: '$9', features: ['Feature 1', 'Feature 2', 'Support'] },
                { name: 'Pro', price: '$19', features: ['Everything in Basic', 'Advanced Features', 'Priority Support'] },
                { name: 'Enterprise', price: '$39', features: ['Everything in Pro', 'Custom Solutions', '24/7 Support'] }
            ];
            
            const container = document.createElement('div');
            container.style.cssText = `
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                margin: 20px 0;
            `;
            
            plans.forEach((plan, index) => {
                const card = document.createElement('div');
                card.style.cssText = `
                    background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 255, 255, 0.1));
                    border: 2px solid ${index === 1 ? '#00ffff' : 'rgba(0, 255, 136, 0.3)'};
                    border-radius: 15px;
                    padding: 25px;
                    text-align: center;
                    position: relative;
                    ${index === 1 ? 'transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);' : ''}
                `;
                
                card.innerHTML = `
                    <h3 style="color: #00ffff; margin-bottom: 10px; text-shadow: 0 0 5px #00ffff;">${plan.name}</h3>
                    <div style="font-size: 2em; color: #00ff88; margin: 15px 0; text-shadow: 0 0 10px #00ff88;">${plan.price}</div>
                    <div style="color: #ffffff; margin-bottom: 20px;">per month</div>
                    ${plan.features.map(feature => `<div style="color: #00ff88; margin: 8px 0; padding: 5px;">✓ ${feature}</div>`).join('')}
                    <button class="generated-button" style="margin-top: 20px;" onclick="log('Selected ${plan.name} plan!', 'success')">Choose Plan</button>
                `;
                
                container.appendChild(card);
            });
            
            addToWorkspace(container);
        }

        function createHeroSection(command) {
            const titleMatch = command.match(/title\s+['"`]?([^'"`\n,]+)['"`]?/);
            const subtitleMatch = command.match(/subtitle\s+['"`]?([^'"`\n]+)['"`]?/);
            
            const title = titleMatch ? titleMatch[1].trim() : 'Welcome to the Future';
            const subtitle = subtitleMatch ? subtitleMatch[1].trim() : 'Experience the next generation of web development';
            
            const hero = document.createElement('div');
            hero.style.cssText = `
                background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 255, 255, 0.2));
                border: 2px solid rgba(0, 255, 136, 0.5);
                border-radius: 20px;
                padding: 60px 40px;
                margin: 20px 0;
                text-align: center;
                position: relative;
                overflow: hidden;
            `;
            
            hero.innerHTML = `
                <h1 style="color: #00ffff; font-size: 3em; margin-bottom: 20px; text-shadow: 0 0 20px #00ffff; animation: glow 2s ease-in-out infinite alternate;">${title}</h1>
                <p style="color: #00ff88; font-size: 1.2em; margin-bottom: 30px; text-shadow: 0 0 10px #00ff88;">${subtitle}</p>
                <button class="generated-button" style="font-size: 1.2em; padding: 15px 30px;" onclick="log('Hero button clicked!', 'success')">Get Started</button>
            `;
            
            addToWorkspace(hero);
        }

        function createTimeline(command) {
            const numberMatch = command.match(/(\d+)/);
            const count = numberMatch ? parseInt(numberMatch[1]) : 4;
            
            const events = [
                { year: '2020', title: 'Project Started', desc: 'Initial concept and planning' },
                { year: '2021', title: 'Development', desc: 'Core features implemented' },
                { year: '2022', title: 'Beta Release', desc: 'Public testing and feedback' },
                { year: '2023', title: 'Launch', desc: 'Official release and celebration' }
            ];
            
            const timeline = document.createElement('div');
            timeline.style.cssText = `
                position: relative;
                margin: 30px 0;
                padding: 20px;
            `;
            
            // Timeline line
            const line = document.createElement('div');
            line.style.cssText = `
                position: absolute;
                left: 50%;
                top: 0;
                bottom: 0;
                width: 2px;
                background: linear-gradient(to bottom, #00ff88, #00ffff);
                box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            `;
            timeline.appendChild(line);
            
            for (let i = 0; i < Math.min(count, events.length); i++) {
                const event = events[i];
                const eventDiv = document.createElement('div');
                eventDiv.style.cssText = `
                    position: relative;
                    margin: 40px 0;
                    ${i % 2 === 0 ? 'text-align: right; padding-right: calc(50% + 30px);' : 'text-align: left; padding-left: calc(50% + 30px);'}
                `;
                
                eventDiv.innerHTML = `
                    <div style="background: rgba(0, 255, 136, 0.1); border: 2px solid rgba(0, 255, 136, 0.3); border-radius: 10px; padding: 15px; position: relative;">
                        <div style="position: absolute; ${i % 2 === 0 ? 'right: -8px;' : 'left: -8px;'} top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88;"></div>
                        <h4 style="color: #00ffff; margin-bottom: 5px; text-shadow: 0 0 5px #00ffff;">${event.year}</h4>
                        <h5 style="color: #00ff88; margin-bottom: 8px;">${event.title}</h5>
                        <p style="color: #ffffff; font-size: 0.9em;">${event.desc}</p>
                    </div>
                `;
                
                timeline.appendChild(eventDiv);
            }
            
            addToWorkspace(timeline);
        }

        function createDashboard(command) {
            const stats = [
                { label: 'Users', value: '12,345', color: '#00ff88' },
                { label: 'Revenue', value: '$98,765', color: '#00ffff' },
                { label: 'Orders', value: '5,432', color: '#ff6b6b' },
                { label: 'Growth', value: '+23%', color: '#4ecdc4' }
            ];
            
            const dashboard = document.createElement('div');
            dashboard.style.cssText = `
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                margin: 20px 0;
            `;
            
            stats.forEach(stat => {
                const card = document.createElement('div');
                card.style.cssText = `
                    background: linear-gradient(135deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.4));
                    border: 2px solid ${stat.color};
                    border-radius: 15px;
                    padding: 25px;
                    text-align: center;
                    box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
                    transition: transform 0.3s ease;
                `;
                
                card.innerHTML = `
                    <div style="color: ${stat.color}; font-size: 2.5em; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px ${stat.color};">${stat.value}</div>
                    <div style="color: #ffffff; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px;">${stat.label}</div>
                `;
                
                card.onmouseover = () => card.style.transform = 'translateY(-5px)';
                card.onmouseout = () => card.style.transform = 'translateY(0)';
                
                dashboard.appendChild(card);
            });
            
            addToWorkspace(dashboard);
        }

        function changeBackground(command) {
            const colorMatch = command.match(/to\s+(\w+)/);
            if (colorMatch) {
                const color = colorMatch[1];
                document.body.style.background = `linear-gradient(135deg, #0a0a0a, ${color}, #16213e)`;
                log(`Background changed to ${color}`, 'success');
            }
        }

        function createImage(command) {
            const img = document.createElement('div');
            img.style.cssText = `
                width: 300px;
                height: 200px;
                background: linear-gradient(45deg, #00ff88, #00ffff);
                border: 2px solid rgba(0, 255, 136, 0.5);
                border-radius: 15px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #000;
                font-weight: bold;
                font-size: 1.2em;
                margin: 15px auto;
                box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            `;
            img.textContent = '🖼️ Image Placeholder';
            
            addToWorkspace(img);
        }

        function createGenericElement(command) {
            const element = document.createElement('div');
            element.style.cssText = `
                background: rgba(0, 255, 136, 0.1);
                border: 1px solid rgba(0, 255, 136, 0.3);
                border-radius: 10px;
                padding: 20px;
                margin: 15px 0;
                color: #00ff88;
                text-align: center;
            `;
            element.innerHTML = `
                <h4 style="color: #00ffff; margin-bottom: 10px;">Custom Element</h4>
                <p>Command: "${command}"</p>
                <small style="color: #ffffff; opacity: 0.8;">This command created a generic element. Try more specific commands for better results!</small>
            `;
            
            addToWorkspace(element);
        }

        function addToWorkspace(element) {
            const workspace = document.getElementById('workspace');
            
            // Remove welcome message if it exists
            if (workspace.children.length === 1 && workspace.firstChild.textContent.includes('Dynamic Workspace')) {
                workspace.innerHTML = '';
            }
            
            const wrapper = document.createElement('div');
            wrapper.className = 'dynamic-element';
            wrapper.appendChild(element);
            
            // Add remove button
            const removeBtn = document.createElement('button');
            removeBtn.textContent = '✖';
            removeBtn.style.cssText = `
                position: absolute;
                top: 5px;
                right: 5px;
                background: rgba(255, 68, 68, 0.8);
                border: none;
                border-radius: 50%;
                width: 25px;
                height: 25px;
                color: white;
                cursor: pointer;
                font-size: 12px;
            `;
            removeBtn.onclick = () => {
                wrapper.remove();
                log('Element removed', 'info');
            };
            
            wrapper.style.position = 'relative';
            wrapper.appendChild(removeBtn);
            
            workspace.appendChild(wrapper);
            elementCounter++;
        }

        // Allow Enter key to execute
        document.getElementById('commandInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                executeCommand();
            }
        });

        // Initial log
        log('Dynamic Web Creator initialized! Start typing commands.', 'success');
    </script>


</body></html>
