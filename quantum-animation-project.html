<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Animation Showcase</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      color: #fff;
    }
    
    .container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    
    .title {
      position: absolute;
      top: 20px;
      font-size: 2.5rem;
      text-align: center;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      z-index: 100;
    }
    
    .controls {
      position: absolute;
      bottom: 20px;
      display: flex;
      gap: 20px;
      z-index: 100;
    }
    
    button {
      background: rgba(0, 255, 255, 0.1);
      color: #0ff;
      border: 1px solid #0ff;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    
    button:hover {
      background: rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
      transform: scale(1.05);
    }
    
    .quantum-field {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    
    .atom-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
    }
    
    .nucleus {
      position: absolute;
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, #ff00ff, #9900ff);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px #ff00ff, 0 0 40px #9900ff;
      z-index: 10;
    }
    
    .electron-shell {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    
    .electron {
      position: absolute;
      width: 15px;
      height: 15px;
      background: #0ff;
      border-radius: 50%;
      box-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      transform-origin: 150px 150px;
    }
    
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.7;
    }
    
    .entanglement-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, rgba(0,255,255,0) 0%, rgba(0,255,255,1) 50%, rgba(0,255,255,0) 100%);
      transform-origin: left center;
      opacity: 0;
      box-shadow: 0 0 5px #0ff;
    }
    
    .wave {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      opacity: 0;
    }
    
    .probability-cloud {
      position: absolute;
      width: 400px;
      height: 400px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
    }
    
    .info-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid #0ff;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
      max-width: 300px;
      z-index: 100;
    }
    
    .info-panel h3 {
      margin-top: 0;
      color: #0ff;
    }
    
    @keyframes rotateOrbit {
      from { transform: rotate(0deg) translateX(150px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(150px) rotate(-360deg); }
    }
    
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes fadeInOut {
      0% { opacity: 0; }
      50% { opacity: 0.7; }
      100% { opacity: 0; }
    }
    
    @keyframes wavePulse {
      0% { transform: scale(0.7); opacity: 0; }
      50% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(2); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Quantum Visualization</h1>
    
    <div class="quantum-field" id="quantumField"></div>
    
    <div class="atom-container" id="atomContainer">
      <div class="nucleus" id="nucleus"></div>
      <div class="electron-shell" style="width: 200px; height: 200px; top: 50px; left: 50px;"></div>
      <div class="electron-shell" style="width: 300px; height: 300px; top: 0; left: 0;"></div>
    </div>
    
    <div class="probability-cloud" id="probabilityCloud"></div>
    
    <div class="controls">
      <button id="electronBtn">Electron View</button>
      <button id="waveBtn">Wave Function</button>
      <button id="entangleBtn">Quantum Entanglement</button>
      <button id="superpositionBtn">Superposition</button>
    </div>
    
    <div class="info-panel" id="infoPanel">
      <h3>Quantum State</h3>
      <p id="infoText">Select a visualization to begin exploring quantum phenomena.</p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const quantumField = document.getElementById('quantumField');
      const atomContainer = document.getElementById('atomContainer');
      const nucleus = document.getElementById('nucleus');
      const probabilityCloud = document.getElementById('probabilityCloud');
      const infoPanel = document.getElementById('infoPanel');
      const infoText = document.getElementById('infoText');
      
      let particles = [];
      let electrons = [];
      let entanglementLines = [];
      let waves = [];
      let animationMode = 'electron';
      let animationFrameId = null;
      
      // Create background particles
      function createParticles() {
        for (let i = 0; i < 200; i++) {
          const particle = document.createElement('div');
          particle.classList.add('particle');
          particle.style.left = `${Math.random() * 100}%`;
          particle.style.top = `${Math.random() * 100}%`;
          particle.style.opacity = Math.random() * 0.5 + 0.2;
          particle.velocity = {
            x: (Math.random() - 0.5) * 0.5,
            y: (Math.random() - 0.5) * 0.5
          };
          quantumField.appendChild(particle);
          particles.push(particle);
        }
      }
      
      // Create electrons
      function createElectrons() {
        // Clear existing electrons
        electrons.forEach(electron => electron.remove());
        electrons = [];
        
        // Create new electrons
        for (let i = 0; i < 6; i++) {
          const electron = document.createElement('div');
          electron.classList.add('electron');
          
          // Distribute electrons between two shells
          if (i < 2) {
            electron.style.animationName = 'rotateOrbit';
            electron.style.animationDuration = '5s';
            electron.style.animationIterationCount = 'infinite';
            electron.style.animationTimingFunction = 'linear';
            electron.style.animationDelay = `${i * 2.5}s`;
            electron.style.width = '10px';
            electron.style.height = '10px';
            electron.style.transformOrigin = '100px 100px';
            electron.shell = 1;
            electron.angle = i * Math.PI;
            electron.radius = 100;
          } else {
            electron.style.animationName = 'rotateOrbit';
            electron.style.animationDuration = '8s';
            electron.style.animationIterationCount = 'infinite';
            electron.style.animationTimingFunction = 'linear';
            electron.style.animationDelay = `${(i-2) * 1.6}s`;
            electron.style.transformOrigin = '150px 150px';
            electron.shell = 2;
            electron.angle = (i-2) * (Math.PI/2);
            electron.radius = 150;
          }
          
          atomContainer.appendChild(electron);
          electrons.push(electron);
        }
      }
      
      // Create entanglement lines
      function createEntanglementLines() {
        // Clear existing lines
        entanglementLines.forEach(line => line.remove());
        entanglementLines = [];
        
        // Create new lines
        for (let i = 0; i < 20; i++) {
          const line = document.createElement('div');
          line.classList.add('entanglement-line');
          line.style.width = `${Math.random() * 300 + 100}px`;
          line.style.left = `${Math.random() * window.innerWidth}px`;
          line.style.top = `${Math.random() * window.innerHeight}px`;
          line.style.transform = `rotate(${Math.random() * 360}deg)`;
          
          quantumField.appendChild(line);
          entanglementLines.push(line);
        }
      }
      
      // Create wave elements
      function createWaves() {
        // Clear existing waves
        waves.forEach(wave => wave.remove());
        waves = [];
        
        for (let i = 0; i < 5; i++) {
          const wave = document.createElement('div');
          wave.classList.add('wave');
          wave.style.border = '1px solid rgba(0, 255, 255, 0.3)';
          wave.style.borderRadius = '50%';
          wave.style.animationName = 'wavePulse';
          wave.style.animationDuration = '4s';
          wave.style.animationIterationCount = 'infinite';
          wave.style.animationDelay = `${i * 0.8}s`;
          
          atomContainer.appendChild(wave);
          waves.push(wave);
        }
      }
      
      // Create probability cloud points
      function createProbabilityCloud() {
        for (let i = 0; i < 200; i++) {
          const point = document.createElement('div');
          point.classList.add('particle');
          
          // Use 3D gaussian distribution for electron probability cloud
          let r = Math.abs(gaussianRandom()) * 150;
          let theta = Math.random() * Math.PI * 2;
          let phi = Math.random() * Math.PI;
          
          let x = r * Math.sin(phi) * Math.cos(theta);
          let y = r * Math.sin(phi) * Math.sin(theta);
          
          point.style.left = `${200 + x}px`;
          point.style.top = `${200 + y}px`;
          point.style.background = '#0ff';
          point.style.boxShadow = '0 0 5px #0ff';
          point.style.opacity = 0;
          
          probabilityCloud.appendChild(point);
        }
      }
      
      // Gaussian random for better electron probability distribution
      function gaussianRandom() {
        let u = 0, v = 0;
        while (u === 0) u = Math.random();
        while (v === 0) v = Math.random();
        return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
      }
      
      // Animate particles
      function animateParticles() {
        particles.forEach(particle => {
          let left = parseFloat(particle.style.left);
          let top = parseFloat(particle.style.top);
          
          left += particle.velocity.x;
          top += particle.velocity.y;
          
          if (left < 0) left = 100;
          if (left > 100) left = 0;
          if (top < 0) top = 100;
          if (top > 100) top = 0;
          
          particle.style.left = `${left}%`;
          particle.style.top = `${top}%`;
        });
      }
      
      // Animate entanglement
      function animateEntanglement() {
        entanglementLines.forEach((line, index) => {
          setTimeout(() => {
            line.style.opacity = 1;
            setTimeout(() => {
              line.style.opacity = 0;
            }, 500);
          }, index * 100);
        });
      }
      
      // Superposition animation
      function animateSuperposition() {
        electrons.forEach(electron => {
          electron.style.animationPlayState = 'paused';
          
          // Clone the electron
          const ghostElectron = electron.cloneNode(true);
          atomContainer.appendChild(ghostElectron);
          
          // Animate the ghost electron to a different position
          setTimeout(() => {
            ghostElectron.style.transition = 'all 1s ease';
            
            const randomAngle = Math.random() * Math.PI * 2;
            const x = 150 + Math.cos(randomAngle) * electron.radius;
            const y = 150 + Math.sin(randomAngle) * electron.radius;
            
            ghostElectron.style.left = `${x}px`;
            ghostElectron.style.top = `${y}px`;
            ghostElectron.style.opacity = '0.5';
            
            // Connect with a quantum line
            const line = document.createElement('div');
            line.classList.add('entanglement-line');
            line.style.width = '100px';
            line.style.opacity = '0.5';
            line.style.position = 'absolute';
            
            atomContainer.appendChild(line);
            
            setTimeout(() => {
              // Collapse the superposition
              ghostElectron.remove();
              line.remove();
              electron.style.animationPlayState = 'running';
            }, 2000);
          }, 500);
        });
      }
      
      // Show probability cloud
      function showProbabilityCloud() {
        atomContainer.style.opacity = '0.3';
        probabilityCloud.style.opacity = '1';
        
        Array.from(probabilityCloud.children).forEach((point, index) => {
          setTimeout(() => {
            point.style.opacity = Math.random() * 0.7 + 0.1;
          }, index * 10);
        });
      }
      
      // Hide probability cloud
      function hideProbabilityCloud() {
        atomContainer.style.opacity = '1';
        probabilityCloud.style.opacity = '0';
        
        Array.from(probabilityCloud.children).forEach(point => {
          point.style.opacity = 0;
        });
      }
      
      // Main animation loop
      function animate() {
        animateParticles();
        animationFrameId = requestAnimationFrame(animate);
      }
      
      // Initialize
      createParticles();
      createElectrons();
      createEntanglementLines();
      createWaves();
      createProbabilityCloud();
      animate();
      
      // Set up buttons
      document.getElementById('electronBtn').addEventListener('click', () => {
        resetAnimations();
        animationMode = 'electron';
        createElectrons();
        infoText.innerHTML = "Classical electron view: Electrons orbit the nucleus in defined shells, similar to a simplified Bohr model.";
      });
      
      document.getElementById('waveBtn').addEventListener('click', () => {
        resetAnimations();
        animationMode = 'wave';
        hideProbabilityCloud();
        showProbabilityCloud();
        infoText.innerHTML = "Wave function view: In quantum mechanics, electrons exist as probability waves rather than discrete particles. This cloud represents where electrons are likely to be found.";
      });
      
      document.getElementById('entangleBtn').addEventListener('click', () => {
        resetAnimations();
        animationMode = 'entangle';
        createEntanglementLines();
        animateEntanglement();
        setInterval(animateEntanglement, 3000);
        infoText.innerHTML = "Quantum entanglement: When particles become entangled, the quantum state of each particle cannot be described independently. A change to one instantaneously affects the other, regardless of distance.";
      });
      
      document.getElementById('superpositionBtn').addEventListener('click', () => {
        resetAnimations();
        animationMode = 'superposition';
        animateSuperposition();
        setInterval(animateSuperposition, 3000);
        infoText.innerHTML = "Quantum superposition: Particles exist in multiple states simultaneously until measured or observed. This visualization shows electrons in superposition of different possible positions.";
      });
      
      // Reset animations
      function resetAnimations() {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
        }
        
        // Clear intervals
        const highestId = window.setTimeout(() => {}, 0);
        for (let i = highestId; i >= 0; i--) {
          window.clearInterval(i);
        }
        
        // Reset elements
        electrons.forEach(electron => electron.remove());
        electrons = [];
        entanglementLines.forEach(line => line.style.opacity = 0);
        waves.forEach(wave => wave.style.opacity = 0);
        hideProbabilityCloud();
        
        // Restart base animation
        animate();
      }
      
      // Make nucleus pulse
      nucleus.style.animation = 'pulse 2s infinite ease-in-out';
      
      // Add glow effects on hover
      document.querySelectorAll('button').forEach(button => {
        button.addEventListener('mouseover', () => {
          button.style.boxShadow = '0 0 20px rgba(0, 255, 255, 0.8)';
        });
        button.addEventListener('mouseout', () => {
          button.style.boxShadow = '0 0 10px rgba(0, 255, 255, 0.5)';
        });
      });
    });
  </script>
</body>
</html>
